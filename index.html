- Snowcone: smallest, ~8TB, portable, can run edge compute (EC2 instances) for small remote-site processing before shipping data back
- Snowball Edge: ~80TB usable, includes significant onboard compute (up to dozens of vCPUs) — used both for bulk data migration AND running workloads at disconnected/remote edge locations (ships, oil rigs, military operations) where there's no reliable connectivity at all
- Snowmobile: a literal shipping container on a truck, up to 100PB — for one-time exabyte-scale data center migrations
- Rule of thumb: if transferring data over your network would take longer than about a week, Snow devices are usually cheaper/faster than the wire
- Key distinction from Outposts/Local Zones: Snow devices are TEMPORARY/PORTABLE and typically shipped back to AWS; Outposts and Local Zones are PERSISTENT infrastructure you operate against indefinitely

**Amazon EKS Anywhere — Kubernetes consistency, anywhere:**
- A deployment option that lets you create and operate Kubernetes clusters on YOUR OWN infrastructure (on-premises servers, VMware vSphere, bare metal) using the same EKS tooling, distro, and operational patterns as EKS in AWS
- Built on EKS Distro — the same Kubernetes distribution AWS curates and validates for its managed EKS service — so your on-prem clusters behave consistently with cloud-based EKS clusters
- Use case: organizations that must run Kubernetes on-premises (regulatory, latency, disconnected environments) but want a single, AWS-supported Kubernetes experience across both on-prem and cloud, easing eventual migration
- Distinguish from EKS on Outposts: EKS Anywhere runs on YOUR hardware anywhere with no Outposts dependency; EKS on Outposts runs on AWS-supplied Outposts hardware in your data center

**AWS Storage Gateway — the ONGOING bridge between on-prem and AWS storage:**
- Three gateway types, each presenting a different on-prem protocol backed by AWS storage:
  - File Gateway: NFS/SMB file shares backed by S3 — on-prem apps read/write files, gateway transparently stores them as S3 objects (with local caching for low-latency access to recently used files)
  - Volume Gateway: iSCSI block storage backed by EBS snapshots — Cached mode keeps frequently accessed data locally with the full dataset in S3; Stored mode keeps the full dataset locally with async backups to S3 as EBS snapshots
  - Tape Gateway: presents a virtual tape library (VTL) interface compatible with existing backup software, storing "tapes" in S3/Glacier — for organizations replacing physical tape infrastructure without changing their backup software
- Critical distinction from Snow Family: Storage Gateway is for CONTINUOUS, ongoing hybrid access; Snow Family is for ONE-TIME (or scheduled bulk) physical data transport

**Putting it together — a decision framework for "where does this workload run?":**
1. Does it need to run ENTIRELY disconnected or at a remote site with no AWS connectivity? → Snowball Edge (compute) for processing, Snowcone for lighter workloads
2. Does the data/workload have to be physically located inside YOUR building for compliance/latency? → Outposts (with EKS on Outposts if Kubernetes is needed) or EKS Anywhere if you don't want Outposts hardware
3. Does it just need to be CLOSE to a specific city's users, with AWS still owning the infrastructure? → Local Zones (or Wavelength if specifically for 5G mobile networks)
4. Does an on-prem application just need ONGOING access to cloud storage via familiar protocols (NFS/SMB/iSCSI/VTL)? → Storage Gateway
5. Is this a ONE-TIME (or scheduled) bulk data move, not an ongoing access pattern? → Snow Family (for huge volumes) or DataSync (for network-based transfer)

**Exam traps:**
- "We need AWS services running on hardware physically inside our secure facility" → Outposts, not Local Zones
- "Our users are concentrated in [specific city] and need ultra-low latency, but we don't want to manage hardware" → Local Zones
- "Mobile app over 5G needs near-instant response times" → Wavelength
- "We need Kubernetes on-premises with the same tooling as our AWS EKS clusters, no AWS hardware required" → EKS Anywhere
- "On-prem application needs to read/write files that are actually stored in S3, with local caching" → Storage Gateway File Gateway`},

          {n:3,text:'Routes tab → Edit routes → Add route. Destination: 0.0.0.0/0. Target: Internet Gateway → lab-igw. Save changes.',warn:'You just made BOTH subnets public. Because this is the main route table and neither subnet has its own explicit association, the IGW route applies to lab-public-1a AND lab-private-1a. Your "private" database subnet now has a path to the internet. This is wrong — and it is exactly the misconfiguration that causes database breaches. You will fix it in Phase 3.'},
          {n:4,text:'To confirm the mistake: Subnets → select lab-private-1a → Route table tab. It shows the main route table with the 0.0.0.0/0 → igw route. A database launched here would be internet-reachable if the security group allowed it.'},
        ]
      },
      {
        id:'p3',
        name:'Phase 3 — Fix It: Explicit Route Tables per Tier',
        type:'fix',
        examConcept:'The correct pattern: create a separate route table for each tier. The public route table gets 0.0.0.0/0 → IGW. The private route table gets 0.0.0.0/0 → NAT Gateway (outbound-only internet) or no internet route at all. Each route table is explicitly associated with its subnet. The main route table is left with only the local route — a safe default.',
        steps:[
          {n:1,text:'First, remove the IGW route from the main route table. Route Tables → main route table for lab-vpc → Routes → Edit routes → delete the 0.0.0.0/0 row → Save. Main route table now only has the local route (10.0.0.0/16 → local). Both subnets are now completely isolated.'},
          {n:2,text:'Create the public route table: Route Tables → Create route table. Name: lab-public-rt. VPC: lab-vpc. Create.'},
          {n:3,text:'Select lab-public-rt → Routes tab → Edit routes → Add route: Destination 0.0.0.0/0, Target: Internet Gateway → lab-igw. Save.'},
          {n:4,text:'lab-public-rt → Subnet associations tab → Edit subnet associations → check lab-public-1a → Save. Now only the public subnet routes to the internet through the IGW.'},
          {n:5,text:'Create a NAT Gateway so the private subnet can reach the internet outbound-only (for things like package installs). VPC → NAT Gateways → Create NAT Gateway. Name: lab-nat. Subnet: lab-public-1a. Connectivity: Public. Click "Allocate Elastic IP." Create NAT gateway.',tip:'NAT Gateway must be in the PUBLIC subnet — it has a public IP and routes through the IGW to the internet. Private subnet instances route to the NAT Gateway, which proxies their outbound traffic. Inbound from the internet cannot reach the private subnet because NAT is one-directional.'},
          {n:6,text:'Wait ~60 seconds for NAT Gateway state to show "Available."'},
          {n:7,text:'Create the private route table: Route Tables → Create route table. Name: lab-private-rt. VPC: lab-vpc. Create.'},
          {n:8,text:'lab-private-rt → Routes → Edit routes → Add route: Destination 0.0.0.0/0, Target: NAT Gateway → lab-nat. Save.'},
          {n:9,text:'lab-private-rt → Subnet associations → Edit subnet associations → check lab-private-1a → Save.'},
          {n:10,text:'Verify: Subnets → lab-private-1a → Route table tab. It now shows lab-private-rt with 0.0.0.0/0 → nat-xxxxxxx. The private subnet can reach the internet outbound only — not reachable inbound.'},
          {n:11,text:'Create security groups. VPC → Security Groups → Create security group.\nName: lab-web-sg. VPC: lab-vpc.\nInbound rules: HTTP (80) from 0.0.0.0/0, SSH (22) from My IP.\nCreate.'},
          {n:12,text:'Create security group.\nName: lab-db-sg. VPC: lab-vpc.\nInbound rules: MySQL/Aurora (3306), Source type: Custom, Source: start typing "lab-web-sg" and select its security group ID from the dropdown.\nCreate.',tip:'You just used a security group as the source for another security group. Only instances that belong to lab-web-sg can reach the database on port 3306. This automatically covers any new web servers added to the group — no IP address management required. This is the production-correct pattern.'},
        ]
      },
      {
        id:'teardown',
        name:'Teardown — NAT Gateway First. Every Time.',
        type:'teardown',
        examConcept:'NAT Gateway costs $0.045/hr = ~$32/month plus $0.045/GB processed. It has no free tier. An Elastic IP that is allocated but not attached costs $0.005/hr. Always delete NAT Gateway and release the Elastic IP before anything else.',
        steps:[
          {n:1,text:'VPC → NAT Gateways → select lab-nat → Actions → Delete NAT gateway → confirm. Wait for state "Deleted" (~1 min).'},
          {n:2,text:'VPC → Elastic IPs → find the EIP with Association status "Unassociated" → select it → Actions → Release Elastic IP addresses → Release.'},
          {n:3,text:'VPC → Internet Gateways → select lab-igw → Actions → Detach from VPC → Detach. Then Actions → Delete internet gateway → Delete.'},
          {n:4,text:'VPC → Route Tables → select lab-public-rt → Actions → Delete route table. Repeat for lab-private-rt. (Cannot delete a route table that is still the main route table or has subnet associations — check Subnet associations tab first and remove them if needed.)'},
          {n:5,text:'VPC → Subnets → select lab-public-1a → Actions → Delete subnet. Repeat for lab-private-1a.'},
          {n:6,text:'VPC → Security Groups → select lab-web-sg → Delete. Repeat for lab-db-sg.'},
          {n:7,text:'VPC → Your VPCs → select lab-vpc → Actions → Delete VPC → type "delete" → Delete. Done.'},
        ]
      }
    ]
  },
];

const ARCH_PRINCIPLES=[
  {
    id:'p1',title:'Constraints are the design',
    summary:"The best architecture is the one that ships on time, within budget, with the team you actually have — not the one you'd build with infinite resources.",
    body:"Every architectural decision is made inside a box of constraints: time, budget, team size and skill, risk tolerance, compliance requirements, and existing technical debt. The most common mistake is ignoring constraints and proposing architecturally ideal solutions that can't be built in the real world. 'We should use microservices' may be correct in theory — but if you have a 3-person team, 6 weeks, and a monolith that works, it's the wrong answer right now. The highest-leverage skill in architecture is clearly identifying the binding constraint and designing directly against it.",
    bullets:["Ask 'what is the most limiting constraint?' before proposing any solution","Time constraints eliminate redesigns — optimize within the current architecture","Budget constraints favor managed services (trade money for engineering time), but require FinOps discipline","Team skill constraints favor boring, well-understood technology over cutting-edge — choose Postgres over Cassandra if your team knows SQL","Compliance constraints (HIPAA, GDPR, PCI) are non-negotiable — they eliminate options, not add them"],
    warning:"The trap: proposing an architecture that requires skills the team doesn't have. A Kubernetes-native microservices platform is the wrong answer for a team that has never managed containers in production."
  },
  {
    id:'p2',title:'Managed services: when the trade is worth it',
    summary:"A managed service trades money for operational responsibility. It is not always the right trade — but it usually is.",
    body:"Every managed service (RDS vs self-managed MySQL, Kinesis vs self-managed Kafka, ECS vs self-managed Kubernetes) involves the same trade: you pay a premium over raw infrastructure in exchange for AWS handling provisioning, patching, scaling, HA configuration, and operational runbooks. The calculus tips in favor of managed services when: (1) the team's differentiation is NOT in operating that service, (2) the engineering hours saved are worth more than the cost premium, (3) the operational risk of running it yourself is high. It tips against managed when the service's opinionated behavior conflicts with your requirements, the cost at scale becomes prohibitive, or your team genuinely has the expertise and needs the control.",
    bullets:["Calculate the real cost of self-managed: engineering hours × hourly rate + incident cost × MTTR","For most 'undifferentiated heavy lifting' (databases, queues, load balancers): managed wins","The break-even point where self-managed beats managed on cost is usually at very high scale (hundreds of nodes)","Vendor lock-in is real but overweighted in most discussions — the cost of re-architecture is almost always higher than the cost of lock-in","'We could run this ourselves' is true for almost everything — the question is whether it's a good use of your team's time"],
    warning:"The self-hosted trap: a 5-person startup running a self-managed Kafka cluster because 'we don't want lock-in.' That cluster will consume 30% of your senior engineer's time. MSK costs $500/month. Your senior engineer costs $200/hour. The math is obvious."
  },
  {
    id:'p3',title:'Stateless first, stateful by exception',
    summary:"If every instance of your application can handle any request without knowing what happened before, you can scale horizontally without limit.",
    body:"Stateful applications bind users to specific instances: sessions, local cache, in-process queues, local filesystem writes. This makes horizontal scaling complex, failover lossy, and Auto Scaling unreliable. The single highest-leverage architectural change for most web applications is removing state from the compute layer and externalizing it: sessions to ElastiCache, uploads to S3, queues to SQS, scheduled jobs to EventBridge + Lambda. After this change, every instance is identical and replaceable. ASG can scale in/out freely. Blue/green deployments become trivial. Failover is instant with no session loss.",
    bullets:["Sessions → ElastiCache Redis or DynamoDB (TTL-based)","File uploads → S3 (never write to local disk in production)","Background jobs → SQS + Lambda or ECS tasks (not cron on a specific instance)","Configuration → Parameter Store or Secrets Manager (not instance-local config files)","The 12-factor app methodology provides the full checklist"],
    warning:"Stateless doesn't mean no state — it means state lives in a purpose-built stateful tier (database, cache, object store), not in the compute tier. Your RDS database is legitimately stateful. Your application servers should not be."
  },
  {
    id:'p4',title:'Cost is a first-class architectural concern',
    summary:"Every architectural decision has a cost dimension. The architect who ignores it will build systems that are technically correct but economically unsustainable.",
    body:"Cost architecture is not 'FinOps' or 'optimization' — it is a design-time concern. The decisions that determine 90% of your AWS costs are made in architecture design, not in a cost review six months later. Key principles: (1) At-rest storage is cheap; in-flight processing is expensive. Design data flows to minimize processing of data you don't need. (2) Egress costs are a tax on poor architecture — data that leaves AWS to the internet (or crosses regions unnecessarily) costs money; keep data flows internal where possible. (3) The cost profile changes dramatically with scale — evaluate cost models at 10x and 100x current load, not just today. (4) Idle compute is wasted money — design for elasticity, not worst-case provisioning.",
    bullets:["Data egress: moving data OUT of AWS to the internet costs $0.09/GB — design data flows to minimize this","Avoid cross-AZ data transfer charges: keep traffic within a single AZ where latency allows","Kinesis vs SQS vs SNS: pricing models differ significantly — match the tool to the traffic pattern","Spot instances for fault-tolerant batch: 90% savings for workloads that can be interrupted","Use Cost Explorer DURING design to model the projected cost of your architecture before you build it"],
    warning:"The 'we'll optimize later' trap: naively loading TBs of raw data through Lambda transformations per record is architecturally simple but costs 100x a batch approach. Cost-naive architectures are hard to fix after they're in production because the optimization often requires redesigning data flows."
  },
  {
    id:'p5',title:"The right database isn't the database you know best",
    summary:"Relational databases are remarkably versatile, but using them for everything is like driving a station wagon on a racetrack — it works, it's just not the right tool.",
    body:"The relational default is understandable: SQL is universal, teams know it, tooling is mature. But the cost of using the wrong database at scale is high: performance degradation, expensive re-architecture, team frustration. The decision tree: Does the data have complex relationships requiring JOINs? → Relational. Is access primarily by a known key with high throughput and low latency requirements? → Key-value (DynamoDB). Are relationships the primary data structure (social graphs, recommendation networks)? → Graph (Neptune). Is the workload write-once, read-many analytical aggregation over large datasets? → Columnar (Redshift, Athena on S3). Is the workload time-series? → Timestream. Need full-text search? → OpenSearch.",
    bullets:["Start with the access patterns, not the data model — 'what queries does this service run?' drives the choice","DynamoDB single-digit-ms at any scale, but requires you to define access patterns upfront — bad for ad-hoc queries","Never use RDS as a queue — SQS exists for this; RDS polling at scale is expensive and fragile","ElastiCache is a complement to a primary database, never a replacement for it (data loss on eviction)","If you're choosing between RDS and Aurora for a new workload: choose Aurora unless you have a specific reason not to"],
    warning:"The worst outcome: realizing 18 months and 100M records in that your relational schema should have been DynamoDB, or vice versa. Data migrations at scale are expensive and risky. Get the database choice right early by defining access patterns before writing the first CREATE TABLE."
  },
  {
    id:'p6',title:'Complexity has a bill — and it comes due late',
    summary:"Every layer of abstraction, every additional service, every microservice boundary you add multiplies your operational surface area. Some complexity earns its keep. Most doesn't.",
    body:"Architectural complexity has direct costs: more things to monitor, more failure modes to handle, more deployment coordination, more junior engineer onboarding time, more cognitive overhead in incidents at 3am. The rule is simple: add complexity only when it solves a real problem you have today, not one you might have in the future. Microservices solve the problem of independent scaling and independent deployability — if you don't have both of those problems right now, a microservices architecture is paying a high operational tax for benefits you don't need. Event-driven architectures enable decoupling and async processing — if your current system doesn't have coupling problems causing real pain, the complexity isn't earning its keep.",
    bullets:["Ask: 'what specific problem does this complexity solve that we have today?'","Monolith → Services when: independent scaling requirements emerge, team size crosses ~20 engineers per service area, deployment coupling causes release bottlenecks","Simple synchronous calls beat event-driven patterns when latency is low and the use case is not genuinely async","'We might need to scale this later' is not a valid reason to add distributed systems complexity today","The most common form of premature optimization is over-architecting for a scale problem that may never materialize"],
    warning:"The startup microservices trap: a 4-person team building 12 microservices because 'that's how Netflix does it.' Netflix has 2,000 engineers and specific scale problems that justify that complexity. A 4-person team needs a monolith with clean internal module boundaries — not 12 separate deployment pipelines, 12 service meshes, and 12 sets of infrastructure to maintain."
  },
];

// ── Vocab / Glossary Data ─────────────────────────────────────────────────────
const VOCAB=[
  // Compute
  {term:'EC2',cat:'Compute',plain:'Rent a virtual computer in the cloud and pay only for what you use.',def:'Elastic Compute Cloud. Resizable virtual servers in the cloud. Choose instance type (CPU/RAM/GPU), OS, and storage. Billed per second (Linux) or per hour (Windows).'},
  {term:'EC2 Auto Scaling',cat:'Compute',plain:'Automatically adds or removes servers to match how busy you are.',def:'Automatically adds or removes EC2 instances based on demand or a schedule. Uses launch templates and scaling policies (target tracking, step, scheduled).'},
  {term:'Lambda',cat:'Compute',plain:'Run code without managing any servers — you pay only when it runs.',def:'Serverless compute that runs code in response to events (API calls, S3 uploads, DynamoDB streams). You pay per 1-ms execution and don\'t manage servers. Max 15-min runtime.'},
  {term:'ECS',cat:'Compute',plain:'Runs your containerized apps without you building the orchestration yourself.',def:'Elastic Container Service. Managed container orchestration for Docker containers. Runs on EC2 (you manage hosts) or Fargate (serverless). Integrates with ALB, IAM, and CloudWatch.'},
  {term:'EKS',cat:'Compute',plain:'Run Kubernetes without managing the tricky control-plane part yourself.',def:'Elastic Kubernetes Service. Managed Kubernetes control plane on AWS. You run worker nodes on EC2 or Fargate. Best for teams already using Kubernetes.'},
  {term:'Fargate',cat:'Compute',plain:'Run containers without ever touching or managing a server.',def:'Serverless compute engine for containers. Works with ECS and EKS. No EC2 instances to manage; you specify CPU/memory per task and pay per second of use.'},
  {term:'Elastic Beanstalk',cat:'Compute',plain:'Upload your app code and AWS handles the deployment and infrastructure.',def:'PaaS that handles deployment, capacity provisioning, load balancing, and monitoring for web apps. You upload code; AWS manages the infrastructure. Good for developers who want speed over control.'},
  {term:'Lightsail',cat:'Compute',plain:'A cheap, simple virtual server bundle for small projects and beginners.',def:'Simplified virtual private servers with predictable pricing. Bundles compute, storage, and networking. Aimed at developers who need a simple VPS without full AWS complexity.'},
  {term:'Batch',cat:'Compute',plain:'Runs huge numbers of background jobs without you managing servers.',def:'Fully managed batch processing. Dynamically provisions EC2 or Spot instances to run hundreds of thousands of batch jobs. Define jobs as Docker containers.'},
  {term:'Outposts',cat:'Compute',plain:'AWS hardware shipped to and installed in your own data center.',def:'AWS-managed rack of hardware delivered to your data center. Runs AWS services on-premises with the same APIs, tools, and hardware as AWS regions.'},

  // Storage
  {term:'S3',cat:'Storage',plain:'Store any file, any amount, accessible from anywhere — like infinite cloud storage.',def:'Simple Storage Service. Object storage with 11 9s durability. Stores objects in buckets, each up to 5 TB. Storage classes include Standard, IA, Glacier, and Intelligent-Tiering.'},
  {term:'S3 Glacier',cat:'Storage',plain:'Very cheap storage for files you rarely need, with slower retrieval.',def:'Low-cost archival storage within S3. Three retrieval tiers: Instant (ms), Flexible (minutes–hours), Deep Archive (up to 12 hrs). Minimum storage duration 90–180 days.'},
  {term:'EBS',cat:'Storage',plain:'A virtual hard drive that attaches to a single server.',def:'Elastic Block Store. Network-attached block storage volumes for EC2. Types: gp3 (general SSD), io2 (provisioned IOPS), st1 (throughput HDD), sc1 (cold HDD). Single-AZ, snapshots are cross-region.'},
  {term:'EFS',cat:'Storage',plain:'A shared drive that many servers can read and write at the same time.',def:'Elastic File System. Managed NFS file system that scales automatically and can be mounted by thousands of EC2 instances across multiple AZs. Two modes: Regional (default) or One Zone.'},
  {term:'FSx for Windows',cat:'Storage',plain:'A Windows-style shared network drive, fully managed by AWS.',def:'Managed Windows File Server using SMB protocol. Supports Active Directory, DFS namespaces, and Windows ACLs. Best for Windows workloads that need shared file storage.'},
  {term:'FSx for Lustre',cat:'Storage',plain:'A super-fast shared drive built for big data and machine learning jobs.',def:'Managed high-performance parallel file system for HPC and ML workloads. Can link to S3 as a data repository. Delivers hundreds of GB/s throughput with sub-ms latency.'},
  {term:'Storage Gateway',cat:'Storage',plain:'Connects your on-premises storage setup to the cloud.',def:'Hybrid cloud storage service. Bridges on-premises environments to S3. Three types: File Gateway (NFS/SMB → S3), Volume Gateway (iSCSI block), Tape Gateway (virtual tape to Glacier).'},
  {term:'AWS Backup',cat:'Storage',plain:'One place to automatically back up everything across AWS.',def:'Centralized backup service that automates and manages backups across EC2, EBS, RDS, DynamoDB, EFS, and more. Supports cross-account and cross-region backup copies.'},
  {term:'DataSync',cat:'Storage',plain:'Quickly and automatically moves large amounts of data into AWS.',def:'Automated data transfer service that moves data between on-premises storage and AWS (S3, EFS, FSx) at up to 10x faster than open-source tools. Handles scheduling, encryption, and verification.'},
  {term:'Snow Family',cat:'Storage',plain:'Physical devices AWS ships you to move huge amounts of data when the internet is too slow.',def:'Physical devices for large-scale data migration or edge compute: Snowcone (8 TB, portable), Snowball Edge (80 TB, compute capable), Snowmobile (100 PB truck). Used when bandwidth is limited.'},

  // Database
  {term:'RDS',cat:'Database',plain:'A managed traditional (SQL) database — AWS handles the upkeep for you.',def:'Relational Database Service. Managed relational databases (MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, Aurora). Handles backups, patching, and Multi-AZ failover automatically.'},
  {term:'Aurora',cat:'Database',plain:"AWS's own faster, cloud-native version of MySQL and PostgreSQL.",def:'AWS-built relational database compatible with MySQL and PostgreSQL. 5x faster than MySQL, 3x faster than PostgreSQL. Storage auto-scales to 128 TB. Aurora Serverless v2 scales compute instantly.'},
  {term:'DynamoDB',cat:'Database',plain:'A super-fast database for simple lookups, no matter how big it gets.',def:'Managed NoSQL key-value and document database. Single-digit ms at any scale. Supports on-demand or provisioned capacity. Features: DAX caching, global tables, point-in-time recovery, streams.'},
  {term:'ElastiCache',cat:'Database',plain:'A speed-boosting cache that sits in front of your database.',def:'Managed in-memory cache service. Two engines: Redis (persistence, pub/sub, sorted sets, Cluster Mode for sharding) and Memcached (simple, multithreaded). Used to reduce database read load.'},
  {term:'Redshift',cat:'Database',plain:'A warehouse for crunching huge amounts of data for business analytics.',def:'Managed columnar data warehouse for analytics (OLAP). Petabyte-scale. Uses MPP architecture. Redshift Spectrum queries S3 data in place. Integrates with QuickSight, Glue, and Athena.'},
  {term:'DocumentDB',cat:'Database',plain:'A managed database for storing flexible, JSON-style documents.',def:'Managed document database compatible with MongoDB APIs. Stores JSON-like documents. Decouples storage and compute; storage scales automatically up to 64 TB.'},
  {term:'Neptune',cat:'Database',plain:'A database built for mapping relationships, like social networks.',def:'Managed graph database. Supports property graph (Gremlin) and RDF (SPARQL). Used for social networks, fraud detection, knowledge graphs. Multi-AZ, up to 15 read replicas.'},
  {term:'QLDB',cat:'Database',plain:'A tamper-proof ledger that records every change that ever happened.',def:'Quantum Ledger Database. Immutable, cryptographically verifiable ledger. Maintains a complete journal of all changes. Used for banking, supply chain, medical records where audit trail is required.'},
  {term:'Timestream',cat:'Database',plain:'A database built for tracking data over time, like sensor readings.',def:'Serverless time-series database. Automatically scales to handle trillions of events per day. Built-in time-series analytics functions. Used for IoT, operational metrics, clickstream data.'},
  {term:'Keyspaces',cat:'Database',plain:'A managed Cassandra-style database with no servers for you to run.',def:'Managed Apache Cassandra-compatible database service. Serverless; no clusters to manage. Automatically replicates 3 ways across AZs. Good for migrating Cassandra workloads to AWS.'},

  // Networking
  {term:'VPC',cat:'Networking',plain:'Your own private, isolated network inside AWS.',def:'Virtual Private Cloud. Logically isolated network in AWS. You define IP ranges (CIDR), subnets (public/private), route tables, internet gateways, and security groups. Foundation of AWS networking.'},
  {term:'Subnet',cat:'Networking',plain:'A smaller slice of your network tied to one physical location.',def:'A range of IP addresses within a VPC. Public subnets route to an Internet Gateway. Private subnets route to a NAT Gateway or VPN. Each subnet lives in exactly one Availability Zone.'},
  {term:'Internet Gateway',cat:'Networking',plain:"The door that lets your network talk to the public internet.",def:'Horizontally scaled, redundant VPC component that allows communication between instances in a VPC and the internet. Attached to a VPC; referenced in route tables of public subnets.'},
  {term:'NAT Gateway',cat:'Networking',plain:'Lets private servers reach the internet without being reachable from it.',def:'Managed Network Address Translation. Allows instances in private subnets to reach the internet while preventing inbound connections. Deployed in a public subnet; highly available within an AZ.'},
  {term:'Security Group',cat:'Networking',plain:'A firewall that wraps around your individual servers.',def:'Stateful virtual firewall for EC2 instances. Controls inbound and outbound traffic at the instance level. Rules are allow-only; return traffic is automatically allowed (stateful).'},
  {term:'NACL',cat:'Networking',plain:'A firewall that wraps around an entire subnet.',def:'Network Access Control List. Stateless subnet-level firewall. Rules are numbered and evaluated in order. Must explicitly allow both inbound AND outbound traffic (stateless). Default NACL allows all traffic.'},
  {term:'Route 53',cat:'Networking',plain:"AWS's DNS service — turns domain names into IP addresses.",def:'Managed DNS service. Supports A, AAAA, CNAME, MX, TXT, and alias records. Routing policies: Simple, Weighted, Latency, Failover, Geolocation, Geoproximity, Multi-value. Also does health checks.'},
  {term:'CloudFront',cat:'Networking',plain:'Speeds up content delivery by caching it closer to your users.',def:'Content Delivery Network (CDN) with 400+ edge locations. Caches static and dynamic content close to users. Integrates with S3, ALB, Lambda@Edge, WAF, and ACM for HTTPS.'},
  {term:'ALB',cat:'Networking',plain:'Spreads web traffic across servers based on the URL or content.',def:'Application Load Balancer. Layer 7 (HTTP/HTTPS/WebSocket). Routes based on path, hostname, headers, query strings. Supports target groups (EC2, Lambda, IPs, containers). Ideal for microservices.'},
  {term:'NLB',cat:'Networking',plain:'Spreads raw network traffic across servers at extreme speed.',def:'Network Load Balancer. Layer 4 (TCP/UDP/TLS). Handles millions of requests per second with ultra-low latency. Preserves source IP. Supports static IPs/Elastic IPs. Best for high-performance or non-HTTP traffic.'},
  {term:'GLB',cat:'Networking',plain:'Routes traffic through third-party security appliances like firewalls.',def:'Gateway Load Balancer. Layer 3 (IP packets). Used to deploy, scale, and manage third-party virtual appliances (firewalls, IDS/IPS). Uses GENEVE protocol. Traffic is inspected then forwarded.'},
  {term:'VPC Peering',cat:'Networking',plain:'A private, direct link connecting two networks together.',def:'Direct network connection between two VPCs using private IPs. Non-transitive (A↔B and B↔C does not mean A↔C). No overlapping CIDR blocks allowed. Works across accounts and regions.'},
  {term:'Transit Gateway',cat:'Networking',plain:'A hub that connects many networks together at once.',def:'Regional network hub that connects VPCs and on-premises networks. Transitive routing — connect many VPCs without peering mesh. Supports multicast and inter-region peering.'},
  {term:'Direct Connect',cat:'Networking',plain:'A dedicated private cable connecting your office straight to AWS.',def:'Dedicated private network connection from your data center to AWS. Consistent latency and bandwidth. Takes weeks to provision. Use Direct Connect Gateway for multi-region access from a single connection.'},
  {term:'VPN',cat:'Networking',plain:'An encrypted tunnel connecting your network to AWS over the internet.',def:'Site-to-Site VPN creates an IPsec tunnel between your on-premises network and a VPC via an internet connection. Quick to set up but subject to internet variability. Client VPN allows individual user connections.'},
  {term:'PrivateLink',cat:'Networking',plain:'Reach another VPC\'s service privately, without going over the internet.',def:'Expose services to other VPCs without internet gateway, NAT, or VPC peering. Uses VPC Endpoints (Interface type). Traffic stays on the AWS network. Secure way to share internal services between accounts.'},
  {term:'VPC Endpoint',cat:'Networking',plain:'A private doorway from your VPC straight to an AWS service.',def:'Enables private connections from VPC to AWS services without internet. Two types: Interface (ENI with private IP, powered by PrivateLink) and Gateway (S3 and DynamoDB only, uses route table entry).'},

  // Security
  {term:'IAM',cat:'Security',plain:'Controls who can access what inside your AWS account.',def:'Identity and Access Management. Controls who can do what in AWS. Components: Users, Groups, Roles, Policies (JSON). Best practices: least privilege, MFA, no root access, use roles for services.'},
  {term:'IAM Role',cat:'Security',plain:'A temporary identity that a user or service can "wear" for permissions.',def:'An IAM identity with specific permissions that can be assumed by AWS services, users, or accounts. Unlike users, roles have no long-term credentials — they issue temporary credentials via STS.'},
  {term:'STS',cat:'Security',plain:'Hands out short-lived access keys instead of permanent ones.',def:'Security Token Service. Issues temporary, limited-privilege credentials (access key ID, secret key, session token). Used by roles, federation (SAML/OIDC), and cross-account access.'},
  {term:'KMS',cat:'Security',plain:'Creates and manages the encryption keys that protect your data.',def:'Key Management Service. Create and control encryption keys used to encrypt data across AWS services. Customer-managed keys (CMKs) vs. AWS-managed keys. Supports key rotation, auditing via CloudTrail.'},
  {term:'Secrets Manager',cat:'Security',plain:'Safely stores and auto-rotates passwords and API keys.',def:'Stores, rotates, and retrieves secrets (DB passwords, API keys). Automatic rotation using Lambda. Fine-grained access via IAM. Charges per secret per month + per 10,000 API calls.'},
  {term:'Parameter Store',cat:'Security',plain:'A simple, free place to store config values and secrets.',def:'AWS Systems Manager feature. Stores configuration data and secrets as parameters. Standard tier is free; Advanced tier supports larger values and higher throughput. Use SecureString for encrypted values.'},
  {term:'Cognito',cat:'Security',plain:"Handles sign-up and sign-in for your app's users.",def:'User identity and access management for web/mobile apps. User Pools: authentication (sign-up/sign-in, MFA, OAuth). Identity Pools: authorization (exchange tokens for temporary AWS credentials).'},
  {term:'WAF',cat:'Security',plain:'A firewall that blocks common web attacks like SQL injection.',def:'Web Application Firewall. Protects against common web exploits (SQLi, XSS). Works with CloudFront, ALB, API Gateway, AppSync. Uses Web ACLs with rules and rule groups. Can block by IP, geo, rate limit.'},

const today=()=>new Date().toISOString().slice(0,10);
const dayOfYear=()=>{const n=new Date();return Math.floor((n-new Date(n.getFullYear(),0,0))/86400000)};
const shuffle=arr=>[...arr].sort(()=>Math.random()-.5);
const pct=(a,b)=>b===0?0:Math.round(a/b*100);

// ── SM-2 Spaced Repetition ────────────────────────────────────────────────────
function sm2Update(prev={},rating){
  // rating: 0=nope, 1=sorta, 2=know
  const ease=Math.max(1.3,(prev.ease||2.5)+(0.1-(2-rating)*(0.08+(2-rating)*0.02)));
  const reps=rating>=1?(prev.reps||0)+1:0;
  let interval=prev.interval||1;
  if(rating<1){interval=1;}
  else if(reps<=1){interval=1;}
  else if(reps===2){interval=6;}
  else{interval=Math.round((prev.interval||1)*ease);}
  const next=new Date();next.setDate(next.getDate()+interval);
  return{ease,reps,interval,nextReview:next.toISOString().slice(0,10)};
}

function renderLessonMd(text,d){
  return text.split('\n').map((line,i)=>{
    if(line.startsWith('**')&&line.endsWith('**'))return<div key={i} className={`${d.color} font-bold text-sm mt-5 mb-2 uppercase tracking-wide`}>{line.slice(2,-2)}</div>;
    if(line.startsWith('- '))return<div key={i} className="text-slate-600 text-sm ml-3 flex gap-2 py-0.5"><span className={`${d.color} mt-0.5 flex-shrink-0`}>•</span><span>{line.slice(2)}</span></div>;
    if(line.match(/^\d+\./))return<div key={i} className="text-slate-600 text-sm ml-3 py-0.5">{line}</div>;
    if(line==='')return<div key={i} className="h-2"/>;
    return<div key={i} className="text-slate-700 text-sm leading-relaxed">{line}</div>;
  });
}

// ── Readiness ─────────────────────────────────────────────────────────────────
function calcReadiness(quizHistory,examHistory,flashConf){
  const dWeights={secure:0.30,resilient:0.26,performing:0.24,cost:0.20};
  const byDomain={};
  let quizSum=0,wSum=0;
  Object.entries(dWeights).forEach(([d,w])=>{
    const qs=quizHistory.filter(h=>h.domain===d);
    const c=qs.filter(h=>h.correct).length;
    byDomain[d]={correct:c,total:qs.length,pct:qs.length>0?Math.round(c/qs.length*100):null};
    if(qs.length>=5){quizSum+=(c/qs.length)*w;wSum+=w;}
  });
  const quizPct=wSum>0?Math.round((quizSum/wSum)*100):0;
  const hasExam=examHistory.length>0;
  const recent=examHistory.slice(-5);
  const avgExam=hasExam?Math.round(recent.reduce((s,e)=>s+e.score,0)/recent.length):0;
  const examPct=hasExam?Math.round(Math.min(100,(avgExam/85)*100)):0;
  const known=(flashConf||[]).filter(f=>f.conf==='know').length;
  const flashPct=Math.round((known/ALL_FLASH.length)*100);
  const tried=new Set(quizHistory.map(h=>h.qid)).size;
  const covPct=Math.round(Math.min(100,(tried/(QUESTIONS.length*0.5))*100));
  const w=hasExam?{exam:0.45,quiz:0.30,flash:0.15,cov:0.10}:{exam:0,quiz:0.55,flash:0.25,cov:0.20};
  const total=Math.round(Math.min(100,examPct*w.exam+quizPct*w.quiz+flashPct*w.flash+covPct*w.cov));
  return{total,examPct,quizPct,flashPct,covPct,byDomain,hasExam,avgExam,known,tried};
}

function ReadinessCard({r,examHistory,quizHistory,setActive,targetDate,readinessHistory}){
  const col=r.total>=80?'#10b981':r.total>=65?'#6366f1':r.total>=40?'#f59e0b':'#94a3b8';
  const msg=r.total>=80?'Ready to book!':r.total>=65?'Almost there':r.total>=40?'Keep going':'Just getting started';
  let days=null;
  if(targetDate){const d=Math.ceil((new Date(targetDate)-new Date())/86400000);if(d>0)days=d;}
  const snaps=readinessHistory||[];
  const lastSnap=snaps.length>=2?snaps[snaps.length-2]:null;
  const trend=lastSnap!==null?r.total-lastSnap.total:null;
  const weakest=Object.entries(r.byDomain).filter(([,v])=>v.total>=5).sort(([,a],[,b])=>(a.pct??100)-(b.pct??100))[0];
  const tiles=[

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({quizHistory,examHistory,flashConf,streak,setActive,settings,startTargeted,gapReport,readinessHistory}){
  const r=useMemo(()=>calcReadiness(quizHistory,examHistory,flashConf),[quizHistory,examHistory,flashConf]);
  const[lessonsRead]=useStore('lesson_read',[]);
  const todayStr=today();

  const domainScores=useMemo(()=>{
    const scores={};
    Object.keys(DOMAINS).forEach(d=>{
      const qs=quizHistory.filter(h=>h.domain===d);
      scores[d]={correct:qs.filter(h=>h.correct).length,total:qs.length};
    });
    return scores;
  },[quizHistory]);

  const todayPlan=useMemo(()=>{
    const ranked=Object.entries(domainScores)
      .filter(([,s])=>s.total>=3)
      .map(([d,s])=>([d,pct(s.correct,s.total)]))
      .sort(([,a],[,b])=>a-b);
    let targetDomain=ranked[0]?ranked[0][0]:null;
    let fromGap=false;
    if(!targetDomain&&gapReport?.worst){
      targetDomain=gapReport.worst[0];
      fromGap=true;
    }
    const dueFlash=ALL_FLASH.filter(c=>{
      const cv=(flashConf||[]).find(x=>x.id===c.id);
      return !cv||!cv.nextReview||cv.nextReview<=todayStr;
    }).length;
    return{targetDomain,dueFlash,fromGap};
  },[domainScores,flashConf,todayStr,gapReport]);

  const hour=new Date().getHours();
  const greeting=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';

  return(
    <div className="dash-wrap" style={{padding:'32px 40px',maxWidth:900,display:'flex',flexDirection:'column',gap:0}}>
      {/* Today's Session */}

        <div className="flex items-start justify-between" style={{marginBottom:12}}>
          <div>
            <div style={{color:'rgba(199,210,254,0.8)',fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:2}}>{new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</div>
            <div style={{fontSize:20,fontWeight:800,color:'white'}}>{greeting}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'6px 12px'}}>
            <span style={{fontSize:18}}>🔥</span>
            <span style={{fontWeight:800,fontSize:15}}>{streak}</span>
            <span style={{color:'rgba(199,210,254,0.8)',fontSize:11}}>day streak</span>
          </div>
        </div>
        <div style={{background:'rgba(255,255,255,0.12)',borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{color:'rgba(199,210,254,0.9)',fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:10}}>Today's Session</div>
          {todayPlan.targetDomain?(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {todayPlan.fromGap&&(
                <div style={{fontSize:10,color:'rgba(199,210,254,0.55)',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:2}}>From your gap assessment</div>
              )}
              <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'white'}}>
                <span style={{width:20,height:20,borderRadius:'50%',background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0}}>1</span>
                <span><strong>10 questions</strong> · {DOMAINS[todayPlan.targetDomain].label} <span style={{color:'rgba(199,210,254,0.7)'}}>{todayPlan.fromGap?'(your weakest from assessment)':'(your weakest)'}</span></span>
              </div>
              {todayPlan.dueFlash>0&&(
                <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'white'}}>
                  <span style={{width:20,height:20,borderRadius:'50%',background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0}}>2</span>
                  <span><strong>{Math.min(todayPlan.dueFlash,20)} flashcards</strong> <span style={{color:'rgba(199,210,254,0.7)'}}>· due for review</span></span>
                </div>
              )}
              <div style={{color:'rgba(199,210,254,0.65)',fontSize:11,marginTop:2}}>~{todayPlan.dueFlash>0?'15':'8'} min total</div>
            </div>
          ):(
            <div style={{fontSize:13,color:'white'}}>
              {quizHistory.length===0
                ?<span>Start with the <strong>gap assessment</strong> to build your plan</span>
                :<span><strong>10 questions</strong> across all domains · ~8 min</span>}
            </div>
          )}
        </div>
        <button
          onClick={()=>todayPlan.targetDomain?startTargeted(todayPlan.targetDomain):setActive(quizHistory.length===0?'assessment':'quiz')}
          style={{width:'100%',background:'rgba(255,255,255,0.1)',color:'white',fontWeight:700,fontSize:13,padding:'11px 0',borderRadius:8,border:'1px solid rgba(255,255,255,0.15)',cursor:'pointer',backdropFilter:'blur(8px)'}}>
          {todayPlan.targetDomain?`Start: ${DOMAINS[todayPlan.targetDomain].label} session →`:"Start today's session →"}

        {[
          {label:'Quiz Answers',val:quizHistory.length,sub:`${quizHistory.filter(h=>h.correct).length} correct`,accent:'#22c55e'},
          {label:'Lessons Done',val:`${lessonsRead.length}/${LESSONS.length}`,sub:'completed',accent:'#38bdf8'},
          {label:'Questions Tried',val:`${r.tried}/${QUESTIONS.length}`,sub:'unique seen',accent:'#f59e0b'},
          {label:'Day Streak',val:`${streak} 🔥`,sub:'days in a row',accent:'#a78bfa'},
        ].map((c,i)=>(
          <div key={c.label} style={{padding:'20px 24px',borderRight:i<3?'1px solid rgba(255,255,255,0.07)':'none'}}>
            <div style={{fontSize:9,color:'#3f3f46',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:10}}>{c.label}</div>
            <div style={{fontSize:28,fontWeight:900,color:c.accent,letterSpacing:'-0.03em',marginBottom:4}}>{c.val}</div>
            <div style={{fontSize:11,color:'#404048'}}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div className="two-col-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        <div style={{padding:'28px 24px',borderRight:'1px solid rgba(255,255,255,0.07)'}}>
          <div style={{fontSize:9,color:'#3f3f46',fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:20}}>Domain Performance</div>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {Object.entries(DOMAINS).map(([key,d])=>{
              const s=domainScores[key]||{correct:0,total:0};
              const score=s.total?pct(s.correct,s.total):0;
              const accent={secure:'#22c55e',resilient:'#38bdf8',performing:'#f59e0b',cost:'#a78bfa'}[key];
              return(
                <div key={key}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:7}}>

          <div style={{fontSize:9,color:'#3f3f46',fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:20}}>Quick Access</div>
          <div style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>

              {label:'Learn',id:'learn',accent:'#22c55e'},
              {label:'Practice Quiz',id:'quiz',accent:'#38bdf8'},
              {label:'Flashcards',id:'flashcards',accent:'#f59e0b'},
              {label:'Practice Exam',id:'exam',accent:'#a78bfa'},
            ].map(a=>(
              <button key={a.id} onClick={()=>setActive(a.id)}
                style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:'14px 0',background:'none',border:'none',borderBottom:'1px solid rgba(255,255,255,0.05)',cursor:'pointer',fontSize:13,color:'#8c8c94',fontWeight:500,transition:'color .1s'}}
                onMouseEnter={e=>e.currentTarget.style.color=a.accent}
                onMouseLeave={e=>e.currentTarget.style.color='#8c8c94'}>
                <span>{a.label}</span>
                <span style={{fontSize:12}}>→</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {gapReport&&(
        <div style={{borderBottom:'1px solid rgba(255,255,255,0.07)',padding:'20px 24px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div style={{fontSize:9,color:'#3f3f46',fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',minWidth:80}}>Gap Report</div>
          <div style={{display:'flex',gap:16,flex:1,flexWrap:'wrap'}}>

              const acc={secure:'#22c55e',resilient:'#38bdf8',performing:'#f59e0b',cost:'#a78bfa'}[d];
              const ok=s>=70;
              return(
                <div key={d} style={{display:'flex',alignItems:'center',gap:6}}>
