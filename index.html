<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── AWS abbreviation expansion ───────────────────────────────────────────────
// Every abbreviated AWS service/term rendered anywhere in the app gets its full
// name appended in parentheses, e.g. "S3 (Simple Storage Service)". Applied at
// render time (see the React.createElement patch below), so it covers questions,
// flashcards, lessons, labs, the glossary, and all UI text without touching data.
const ABBR={
  // Services
  S3:'Simple Storage Service',EC2:'Elastic Compute Cloud',IAM:'Identity and Access Management',
  STS:'Security Token Service',KMS:'Key Management Service',SQS:'Simple Queue Service',
  SNS:'Simple Notification Service',SES:'Simple Email Service',RDS:'Relational Database Service',
  EBS:'Elastic Block Store',EFS:'Elastic File System',ECS:'Elastic Container Service',
  EKS:'Elastic Kubernetes Service',ECR:'Elastic Container Registry',EMR:'Elastic MapReduce',
  ELB:'Elastic Load Balancing',ALB:'Application Load Balancer',NLB:'Network Load Balancer',
  GLB:'Gateway Load Balancer',CLB:'Classic Load Balancer',VPC:'Virtual Private Cloud',
  WAF:'Web Application Firewall',ACM:'AWS Certificate Manager',SSM:'AWS Systems Manager',
  DMS:'Database Migration Service',MGN:'Application Migration Service',
  MSK:'Managed Streaming for Apache Kafka',QLDB:'Quantum Ledger Database',
  DAX:'DynamoDB Accelerator',RAM:'Resource Access Manager',CDK:'Cloud Development Kit',
  SCT:'Schema Conversion Tool',DX:'Direct Connect',
  // AWS concepts & exam terms
  SCP:'Service Control Policy',NACL:'Network Access Control List',ACL:'Access Control List',
  SG:'Security Group',ASG:'Auto Scaling Group',AMI:'Amazon Machine Image',
  AZ:'Availability Zone',OU:'Organizational Unit',TGW:'Transit Gateway',IGW:'Internet Gateway',
  NAT:'Network Address Translation',EIP:'Elastic IP address',ENI:'Elastic Network Interface',
  ENA:'Elastic Network Adapter',EFA:'Elastic Fabric Adapter',OAC:'Origin Access Control',
  OAI:'Origin Access Identity',GSI:'Global Secondary Index',LSI:'Local Secondary Index',
  DLQ:'Dead-Letter Queue',FIFO:'First-In, First-Out',TTL:'Time To Live',
  IOPS:'Input/Output Operations Per Second',RTO:'Recovery Time Objective',
  RPO:'Recovery Point Objective',DR:'Disaster Recovery',CRR:'Cross-Region Replication',
  RTC:'Replication Time Control',IMDS:'Instance Metadata Service',KCL:'Kinesis Client Library',
  MPP:'Massively Parallel Processing',IaC:'Infrastructure as Code',CDC:'Change Data Capture',
  RI:'Reserved Instance',SP:'Savings Plan',IA:'Infrequent Access',CMK:'Customer Master Key',
  DEK:'Data Encryption Key',HSM:'Hardware Security Module',MFA:'Multi-Factor Authentication',
  SSO:'Single Sign-On',PII:'Personally Identifiable Information',
  DDoS:'Distributed Denial of Service',DRT:'DDoS Response Team',SLA:'Service Level Agreement',
  TPS:'Transactions Per Second',RPS:'Requests Per Second',
  // Security & identity
  SAML:'Security Assertion Markup Language',OIDC:'OpenID Connect',JWT:'JSON Web Token',
  IdP:'Identity Provider',PKI:'Public Key Infrastructure',CA:'Certificate Authority',
  U2F:'Universal 2nd Factor',TOTP:'Time-based One-Time Password',XSS:'Cross-Site Scripting',
  SQLi:'SQL injection',OWASP:'Open Worldwide Application Security Project',
  CVE:'Common Vulnerabilities and Exposures',
  // Email & protocols
  DKIM:'DomainKeys Identified Mail',SPF:'Sender Policy Framework',
  DMARC:'Domain-based Message Authentication, Reporting and Conformance',
  SMTP:'Simple Mail Transfer Protocol',SFTP:'SSH File Transfer Protocol',
  FTPS:'File Transfer Protocol Secure',NFS:'Network File System',SMB:'Server Message Block',
  CIDR:'Classless Inter-Domain Routing',DNS:'Domain Name System',VPN:'Virtual Private Network',
  CDN:'Content Delivery Network',
  // General tech
  ML:'Machine Learning',BI:'Business Intelligence',ETL:'Extract, Transform, Load',
  HPC:'High-Performance Computing',OLAP:'Online Analytical Processing',
  MPI:'Message Passing Interface',K8s:'Kubernetes',IoT:'Internet of Things',
  VPS:'Virtual Private Server',PaaS:'Platform as a Service',VM:'Virtual Machine',
  CLI:'Command Line Interface',SDK:'Software Development Kit',DDL:'Data Definition Language',
  SSD:'Solid State Drive',HDD:'Hard Disk Drive',
};
// Expansions whose auto-pluralized form would read wrong
const ABBR_PLURAL_OVERRIDE={CIDR:'Classless Inter-Domain Routing',CVE:'Common Vulnerabilities and Exposures',IOPS:'Input/Output Operations Per Second'};
const pluralizeLast=full=>{
  const w=full.split(' ');const last=w[w.length-1];
  w[w.length-1]=/(?:x|ch|sh|s)$/.test(last)?last+'es':/[^aeiou]y$/.test(last)?last.slice(0,-1)+'ies':last+'s';
  return w.join(' ');
};
const ABBR_RE=new RegExp('\\b('+Object.keys(ABBR).sort((a,b)=>b.length-a.length).join('|')+')(s)?\\b','g');
function expandAbbr(text){
  if(typeof text!=='string'||!text)return text;
  const seen=new Set();
  return text.replace(ABBR_RE,(m,base,plural,off,str)=>{
    const prev=str[off-1]||'';
    const rest=str.slice(off+m.length);
    // Already sitting next to its own expansion, e.g. "Service Control Policies (SCPs)"
    // or "DEK (Data Encryption Key)" — leave it, and count it as introduced.
    if(prev==='('||/^\s*\(/.test(rest)){seen.add(base);return m;}
    // Skip slash/hyphen compounds ("CPU/RAM/GPU", "Multi-AZ", "S3-IA") and possessives ("ASG's")
    if(prev==='/'||prev==='-'||rest[0]==='/'||rest[0]==='-'||rest[0]==="'")return m;
    if(seen.has(base))return m; // expand only the first occurrence per text chunk
    seen.add(base);
    const full=plural?(ABBR_PLURAL_OVERRIDE[base]||pluralizeLast(ABBR[base])):ABBR[base];
    return m+' ('+full+')';
  });
}
// Patch React.createElement so every string child rendered by any component is
// expanded. Elements can opt out with data-noexpand (used where the expansion
// would reveal a quiz/flashcard answer).
const SKIP_EXPAND_TAGS=new Set(['textarea','input','script','style']);
const _createElement=React.createElement;
React.createElement=function(type,props,...children){
  if((typeof type==='string'&&SKIP_EXPAND_TAGS.has(type))||(props&&props['data-noexpand'])){
    return _createElement(type,props,...children);
  }
  return _createElement(type,props,...children.map(c=>typeof c==='string'?expandAbbr(c):c));
};

// ── Storage ──────────────────────────────────────────────────────────────────
const S={
  get:(k)=>{try{const w=window.storage;return JSON.parse(w?w.getItem(k):localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>{try{const s=JSON.stringify(v);window.storage?window.storage.setItem(k,s):localStorage.setItem(k,s)}catch{}}
};
const useStore=(k,def)=>{
  const[v,sv]=useState(()=>{const s=S.get(k);return s!==null?s:def});
  const set=useCallback(x=>{const n=typeof x==='function'?x(v):x;sv(n);S.set(k,n)},[k,v]);
  return[v,set];
};

// ── Domain meta ──────────────────────────────────────────────────────────────
const DOMAINS={
  secure:{label:'Secure',color:'text-emerald-600',bg:'bg-emerald-50',border:'border-emerald-300',pct:30},
  resilient:{label:'Resilient',color:'text-sky-600',bg:'bg-sky-50',border:'border-sky-300',pct:26},
  performing:{label:'Performing',color:'text-amber-600',bg:'bg-amber-50',border:'border-amber-300',pct:24},
  cost:{label:'Cost',color:'text-violet-600',bg:'bg-violet-50',border:'border-violet-300',pct:20},
};

// ── Question Bank (167 questions) ─────────────────────────────────────────────
const QUESTIONS=[
// ── SECURE (20) ──
{id:1,domain:'secure',sub:'IAM',q:'A company needs to grant an EC2 instance access to S3 without hardcoding credentials. What is the recommended approach?',opts:['Embed IAM access keys in user data','Attach an IAM role to the EC2 instance','Store credentials in AWS Secrets Manager and retrieve at startup','Create an IAM user and install the CLI'],ans:1,exp:'IAM roles attached to EC2 instances provide temporary, automatically-rotated credentials via the metadata service. No static keys needed.',plain:'Give EC2 an IAM role instead of hardcoded keys — it gets temporary credentials automatically.'},
{id:2,domain:'secure',sub:'IAM',q:'Which IAM policy type can restrict what services even the root account can use across an AWS Organization?',opts:['Permission Boundaries','Resource-based Policies','Service Control Policies (SCPs)','Session Policies'],ans:2,exp:'SCPs are org-level guardrails that restrict maximum permissions for all accounts in an OU, including the root user of member accounts.',plain:'SCPs are org-wide guardrails that limit what every account (even the root user) can do.'},
{id:3,domain:'secure',sub:'Network',q:'A security team wants to block traffic from specific IP ranges at the subnet level. Which service should they use?',opts:['Security Groups','Network ACLs','AWS WAF','AWS Shield'],ans:1,exp:'NACLs are stateless, subnet-level firewalls that support explicit DENY rules. Security Groups are stateful and instance-level with no explicit deny.',plain:'NACLs filter traffic at the subnet level and can explicitly block IPs; Security Groups can\'t.'},
{id:4,domain:'secure',sub:'Encryption',q:'A company wants to control when their KMS keys are rotated and keep key material in their own HSMs. Which key type should they use?',opts:['AWS managed keys','Customer managed keys','AWS owned keys','CloudHSM with automatic KMS integration'],ans:1,exp:'Customer managed keys give full control over rotation schedule, key policies, and optionally allow importing external key material.',plain:'Customer-managed KMS keys let you set your own rotation schedule and policies.'},
{id:5,domain:'secure',sub:'S3',q:'An S3 bucket contains sensitive PII. A bucket policy allows public read. An IAM policy denies read. What is the effective permission for an IAM user?',opts:['Allow — bucket policy wins','Deny — explicit deny always wins','Allow — both must allow for access','Deny — default deny applies when policies conflict'],ans:1,exp:'An explicit Deny in any policy always overrides Allow. The IAM deny makes the effective permission Deny regardless of the bucket policy.',plain:'An explicit IAM deny always beats an allow, even from a public bucket policy.'},
{id:6,domain:'secure',sub:'Detection',q:'Which service uses machine learning to detect unusual API call patterns and potential threats in AWS accounts?',opts:['AWS Inspector','AWS Macie','Amazon GuardDuty','AWS Security Hub'],ans:2,exp:'GuardDuty continuously analyzes CloudTrail, VPC Flow Logs, and DNS logs using ML to detect threats like credential compromise and crypto-mining.',plain:'GuardDuty uses machine learning on your logs to spot suspicious account activity automatically.'},
{id:7,domain:'secure',sub:'Detection',q:'A company needs to automatically discover and protect sensitive data stored in S3 buckets. Which service does this?',opts:['GuardDuty','Macie','Inspector','Config'],ans:1,exp:'Macie uses ML to automatically discover, classify, and protect sensitive data (PII, financial data) in S3.',plain:'Macie automatically finds and classifies sensitive data like PII sitting in your S3 buckets.'},
{id:8,domain:'secure',sub:'Secrets',q:'An application needs database credentials that automatically rotate every 30 days. Which service handles this?',opts:['AWS KMS','AWS Secrets Manager','SSM Parameter Store SecureString','AWS Certificate Manager'],ans:1,exp:'Secrets Manager natively integrates with RDS, Redshift, and DocumentDB to automatically rotate credentials on a schedule using Lambda.',plain:'Secrets Manager can auto-rotate database passwords on a schedule for you.'},
{id:9,domain:'secure',sub:'Cognito',q:'A mobile app needs user sign-up/sign-in with social identity provider (Google) federation. Which Cognito component handles this?',opts:['Cognito Identity Pools','Cognito User Pools','Cognito Sync','AWS IAM Identity Center'],ans:1,exp:'User Pools handle authentication (sign-up/sign-in, MFA, social federation). Identity Pools handle authorization (swap tokens for AWS credentials).',plain:'Cognito User Pools handle sign-up/sign-in, including letting users log in with Google.'},
{id:10,domain:'secure',sub:'Network',q:'A developer wants to access S3 from an EC2 instance in a private VPC without traffic leaving the AWS network. What should they use?',opts:['NAT Gateway','Internet Gateway','VPC Gateway Endpoint','VPC Interface Endpoint'],ans:2,exp:'Gateway Endpoints for S3 and DynamoDB route traffic through the AWS private network at no additional cost. Interface Endpoints use PrivateLink and incur hourly charges.',plain:'A VPC Gateway Endpoint lets private EC2 instances reach S3 without ever touching the internet.'},
{id:11,domain:'secure',sub:'Compliance',q:'Which service records all API calls made in an AWS account for auditing and compliance?',opts:['CloudWatch Logs','AWS Config','CloudTrail','VPC Flow Logs'],ans:2,exp:'CloudTrail records who made API calls, when, from where, and what changed. It\'s the primary audit trail for AWS account activity.',plain:'CloudTrail is the log of every API call made in your account — who did what, when.'},
{id:12,domain:'secure',sub:'Compliance',q:'A company must prove their AWS resources have been configured correctly continuously. Which service tracks resource configuration changes over time?',opts:['CloudTrail','AWS Config','Security Hub','Systems Manager'],ans:1,exp:'AWS Config records resource configurations and changes over time, enabling compliance auditing, security analysis, and change tracking.',plain:'AWS Config tracks how your resources\' settings have changed over time.'},
{id:13,domain:'secure',sub:'IAM',q:'A contractor needs temporary access to an AWS account for 3 days. What is the most secure approach?',opts:['Create an IAM user, delete after 3 days','Share the root account credentials','Use IAM roles with STS AssumeRole and time-limited session','Add to an IAM group with expiring permissions'],ans:2,exp:'STS AssumeRole provides short-lived, temporary credentials without creating permanent IAM users. Sessions can be limited to hours.',plain:'Use STS to hand a contractor short-lived, temporary credentials instead of permanent ones.'},
{id:14,domain:'secure',sub:'Network',q:'Which AWS WAF feature can rate-limit requests from a single IP address?',opts:['Managed Rule Groups','IP Set Rules','Rate-based Rules','Geo Match Rules'],ans:2,exp:'WAF rate-based rules automatically block IPs that exceed a defined request threshold within a 5-minute window — effective against DDoS and brute-force.',plain:'WAF rate-based rules automatically block an IP that\'s sending too many requests too fast.'},
{id:15,domain:'secure',sub:'Network',q:'An application needs protection against infrastructure-layer DDoS attacks at no extra cost. Which service provides this automatically?',opts:['AWS WAF','AWS Shield Standard','AWS Shield Advanced','AWS Firewall Manager'],ans:1,exp:'Shield Standard is automatically enabled for all AWS accounts at no cost and protects against common Layer 3/4 DDoS attacks.',plain:'Shield Standard is free, automatic protection against basic network-level DDoS attacks.'},
{id:16,domain:'secure',sub:'Encryption',q:'Which service provides dedicated hardware security modules (HSMs) under your exclusive control for regulatory requirements?',opts:['AWS KMS','AWS CloudHSM','AWS Secrets Manager','AWS Certificate Manager'],ans:1,exp:'CloudHSM provides FIPS 140-2 Level 3 validated HSMs in a single-tenant environment. KMS is multi-tenant. CloudHSM gives you full key control.',plain:'CloudHSM gives you dedicated, single-tenant hardware security modules you fully control.'},
{id:17,domain:'secure',sub:'IAM',q:'A role has a permission boundary that allows S3:* and EC2:*. The role\'s identity policy allows S3:*, EC2:*, and RDS:*. What can the role do?',opts:['S3, EC2, and RDS — identity policy wins','S3 and EC2 only — intersection of both policies','Nothing — conflicting policies cancel out','RDS only — most restrictive wins'],ans:1,exp:'Permission boundaries set the maximum permissions. The effective permission is the intersection: what both the identity policy AND boundary allow. RDS is outside the boundary.',plain:'A permission boundary caps what a role can ever do — only the overlap between it and the role\'s own policy actually works.'},
{id:18,domain:'secure',sub:'S3',q:'How should you ensure all objects uploaded to S3 are encrypted at rest, even if the uploader forgets to specify encryption?',opts:['Enable bucket versioning','Set default encryption on the bucket','Use a bucket policy that denies unencrypted uploads','Both B and C'],ans:3,exp:'IAM controls who can access your data, but encryption protects the data itself if access controls are ever bypassed. Default bucket encryption (B) auto-encrypts any object whose PUT request is missing an encryption header — zero developer action required. But default encryption alone can be worked around if a client explicitly sends unencrypted data. A bucket policy denying requests without s3:x-amz-server-side-encryption (C) closes that gap. Together they guarantee encryption at rest regardless of what the uploader does.',plain:'Combine default bucket encryption with a policy that rejects unencrypted uploads to guarantee everything is encrypted.'},
{id:19,domain:'secure',sub:'Network',q:'A company runs a web app behind an ALB. They want to block SQL injection attacks. What should they implement?',opts:['Security Groups with deep packet inspection','AWS WAF with SQL injection match rules','Network ACLs with payload filtering','AWS Shield Advanced'],ans:1,exp:'WAF operates at Layer 7 and can inspect HTTP request bodies, headers, and query strings for SQL injection patterns. Security groups and NACLs are Layer 3/4 only.',plain:'WAF inspects HTTP traffic at Layer 7, so it\'s the right tool to catch SQL injection attempts.'},
{id:20,domain:'secure',sub:'IAM',q:'Which IAM feature lets you test what actions a principal can perform without actually making API calls?',opts:['IAM Access Analyzer','IAM Policy Simulator','AWS Trusted Advisor','CloudTrail Insights'],ans:1,exp:'IAM Policy Simulator lets you test the effect of IAM policies against specific actions and resources before applying them to production.',plain:'IAM Policy Simulator lets you safely test what a policy would allow before using it for real.'},
{id:20.1,domain:'secure',sub:'Encryption',q:'A security architect tells her team: "Even with perfect IAM configuration, we still need S3 encryption at rest." What specific threat does encryption at rest protect against that IAM controls cannot?',opts:['Unauthorized API calls from external attackers brute-forcing credentials','Someone gaining physical access to the underlying storage hardware and reading raw data directly','Accidental public bucket policies exposing objects to the internet','Cross-account access from a misconfigured resource-based policy'],ans:1,exp:'IAM controls logical access — it governs who can call AWS APIs. But your S3 data is physically written to hard drives in an AWS data center. If someone gains physical access to that hardware (a malicious insider, a stolen drive, a rogue data center employee), your IAM policy is irrelevant — they\'re not going through the API. Encryption at rest means the raw bytes on disk are unreadable ciphertext. Without the KMS key, the data is worthless even if you have the physical drive. This is why defense in depth requires both layers: access controls AND encryption.',plain:'Encryption at rest protects data even if someone physically grabs the storage hardware — IAM can\'t stop that.'},

// ── RESILIENT (17) ──
{id:21,domain:'resilient',sub:'Multi-AZ',q:'An RDS MySQL instance fails. What happens with Multi-AZ enabled?',opts:['AWS sends an alert; manual failover required','Automatic failover to standby in same AZ','Automatic failover to standby in different AZ within ~1-2 min','Read replica is promoted automatically'],ans:2,exp:'RDS Multi-AZ maintains a synchronous standby in a different AZ. Failover is automatic, typically completing in 1-2 minutes with no data loss.',plain:'With Multi-AZ, RDS automatically fails over to a standby in another AZ within a couple minutes.'},
{id:22,domain:'resilient',sub:'Load Balancing',q:'Which load balancer type supports WebSockets and HTTP/2 natively and routes based on path and host?',opts:['Classic Load Balancer','Network Load Balancer','Application Load Balancer','Gateway Load Balancer'],ans:2,exp:'ALB is Layer 7 and supports path-based routing, host-based routing, HTTP/2, WebSockets, and gRPC. NLB is Layer 4, optimized for TCP/UDP performance.',plain:'ALB is the load balancer that understands HTTP and can route by URL path or hostname.'},
{id:23,domain:'resilient',sub:'DNS',q:'A company needs DNS failover — primary region down should automatically route to backup. Which Route 53 policy?',opts:['Latency routing','Weighted routing','Failover routing','Geoproximity routing'],ans:2,exp:'Route 53 Failover routing uses health checks. When the primary endpoint fails health checks, traffic is automatically routed to the secondary.',plain:'Route 53 Failover routing uses health checks to automatically send traffic to backup when primary goes down.'},
{id:24,domain:'resilient',sub:'Decoupling',q:'Two microservices are tightly coupled. If Service B slows down, Service A queues up and crashes. What AWS pattern solves this?',opts:['Direct Lambda invocation','SQS queue between services','API Gateway with throttling','ElastiCache caching layer'],ans:1,exp:'SQS decouples producers from consumers. Service A writes to the queue at its own pace; Service B reads at its own pace. Neither is blocked by the other.',plain:'Put an SQS queue between two services so a slow one can\'t crash the other.'},
{id:25,domain:'resilient',sub:'Auto Scaling',q:'An ASG\'s scale-out policy triggers but new instances are failing health checks. The ASG keeps launching and terminating instances. What is this called?',opts:['Scaling thrash','Instance refresh loop','Impaired status loop','Scaling oscillation'],ans:2,exp:'This is a scaling loop / thrash. Fix: investigate why instances fail health checks (bad AMI, misconfigured user data), set a cooldown, or use instance warmup.',plain:'When instances keep launching and failing health checks in a loop, that\'s "scaling thrash" — usually a bad AMI or startup script.'},
{id:26,domain:'resilient',sub:'Database',q:'Which Aurora feature allows read scaling across up to 15 replicas with minimal replication lag using shared storage?',opts:['Multi-AZ replicas','Aurora Global Database','Aurora Read Replicas','RDS Read Replicas'],ans:2,exp:'Aurora Read Replicas share the same underlying storage volume as the primary, giving sub-10ms replication lag. Up to 15 replicas vs 5 for standard RDS.',plain:'Aurora Replicas share the primary\'s storage, so they barely lag behind and scale reads further than normal RDS.'},
{id:27,domain:'resilient',sub:'Messaging',q:'A notification system needs to fan-out a single message to SQS queues, Lambda functions, and email subscribers simultaneously. Which service?',opts:['SQS with multiple consumers','SNS with multiple subscriptions','EventBridge with multiple targets','Kinesis with multiple shards'],ans:1,exp:'SNS is a pub/sub service that pushes messages to multiple subscribers (SQS, Lambda, HTTP, email, SMS) simultaneously via a single publish call.',plain:'SNS can push one message out to many different subscribers (queues, functions, email) at once.'},
{id:28,domain:'resilient',sub:'S3',q:'A company needs their S3 data replicated to another region for disaster recovery. Objects must appear in the destination within minutes. Which feature?',opts:['S3 batch operations','S3 Cross-Region Replication (CRR)','S3 Transfer Acceleration','S3 Sync with Lambda'],ans:1,exp:'S3 CRR asynchronously replicates objects to a destination bucket in another region. Enable S3 Replication Time Control (RTC) for a 15-minute SLA.',plain:'S3 Cross-Region Replication automatically copies objects to another region, often within minutes.'},
{id:29,domain:'resilient',sub:'Disaster Recovery',q:'RTO is 4 hours, RPO is 1 hour. Which DR strategy is most cost-effective?',opts:['Multi-site active-active','Warm standby','Pilot light','Backup and restore'],ans:2,exp:'Pilot light keeps minimal core infrastructure running (DB replication, no app servers). Recovery involves scaling up. Good for RTO hours, RPO minutes. Warm standby is more expensive (scaled-down full copy).',plain:'Pilot light keeps just the core database running in the DR region and scales up the rest only when needed — cheap and good enough for hours-level RTO.'},
{id:30,domain:'resilient',sub:'Auto Scaling',q:'You want new EC2 instances to pass health checks before receiving production traffic. Which ASG feature handles this?',opts:['Scaling cooldown','Instance warmup period','Health check grace period','Lifecycle hooks'],ans:3,exp:'Lifecycle hooks pause instance launch/termination transitions, allowing custom actions (run scripts, wait for app startup). Health check grace period prevents early termination during bootstrap.',plain:'Lifecycle hooks let an ASG pause before sending traffic to a new instance until it\'s actually ready.'},
{id:31,domain:'resilient',sub:'Global',q:'A gaming app needs sub-10ms global latency with automatic cross-region failover and static IP addresses. Which service?',opts:['CloudFront','Route 53 with latency routing','AWS Global Accelerator','ALB in multiple regions'],ans:2,exp:'Global Accelerator provides static Anycast IPs, routes via AWS backbone, and automatically reroutes traffic to healthy endpoints — ideal for non-HTTP and latency-critical apps.',plain:'Global Accelerator gives you static IPs and routes traffic over AWS\'s fast private backbone for low global latency.'},
{id:32,domain:'resilient',sub:'Database',q:'DynamoDB is experiencing hot partition issues. A single product ID is receiving 90% of reads. What\'s the best solution?',opts:['Increase read capacity units','Enable DynamoDB Streams','Add DAX caching layer','Change partition key to include a random suffix'],ans:2,exp:'DAX (DynamoDB Accelerator) is an in-memory cache that absorbs read spikes on hot items. Changing the partition key is a data migration. DAX requires no app code changes for read-through caching.',plain:'DAX adds an in-memory cache in front of DynamoDB to absorb spikes on a "hot" item.'},
{id:33,domain:'resilient',sub:'Load Balancing',q:'An application requires ultra-low latency and handles millions of TCP connections per second. Which load balancer is optimal?',opts:['ALB','NLB','CLB','GLB'],ans:1,exp:'NLB operates at Layer 4 (TCP/UDP/TLS), handles millions of requests/second, preserves source IP, and supports static IPs/Elastic IPs — designed for extreme performance.',plain:'NLB handles massive numbers of raw TCP connections with the lowest possible latency.'},
{id:34,domain:'resilient',sub:'Messaging',q:'An e-commerce app must process each order exactly once. Messages must not be processed by multiple consumers simultaneously. Which SQS queue type?',opts:['Standard Queue','FIFO Queue','Dead Letter Queue','Delay Queue'],ans:1,exp:'SQS FIFO guarantees exactly-once processing and ordering. Standard queues have at-least-once delivery and may deliver duplicates. FIFO has 3,000 msg/s with batching.',plain:'SQS FIFO guarantees each message is processed exactly once, in order, with no duplicates.'},
{id:35,domain:'resilient',sub:'Networking',q:'A company\'s primary on-premises connection is Direct Connect. They need a backup for when it fails. What is the most cost-effective backup?',opts:['Second Direct Connect connection','Site-to-Site VPN as backup','CloudFront private connectivity','AWS PrivateLink'],ans:1,exp:'A Site-to-Site VPN over the internet is the cost-effective backup. It automatically activates when Direct Connect fails. A second DX circuit is more reliable but expensive.',plain:'A Site-to-Site VPN is the cheap backup option if your Direct Connect line ever fails.'},
{id:36,domain:'resilient',sub:'Containers',q:'An ECS task needs to maintain exactly 3 running containers at all times, replacing any that fail. Which ECS launch configuration achieves this?',opts:['ECS Cluster with manual task placement','ECS Service with desired count=3','Scheduled ECS task','ECS task with restart policy'],ans:1,exp:'An ECS Service maintains the desired count of tasks, automatically replacing failed tasks and distributing across AZs when properly configured.',plain:'An ECS Service keeps a set number of containers running, replacing any that crash.'},
{id:37,domain:'resilient',sub:'Monitoring',q:'An application in us-east-1 should automatically fail over to us-west-2 when error rate exceeds 5%. Which combination achieves this?',opts:['CloudWatch Alarm + Route 53 health check + Failover routing','CloudTrail + SNS + Lambda','AWS Config + EventBridge + Lambda','X-Ray + ALB weighted routing'],ans:0,exp:'CloudWatch monitors metrics, triggers alarms, which can report to Route 53 health checks. Route 53 Failover routing then switches DNS to the secondary region.',plain:'Combine a CloudWatch alarm with a Route 53 health check and failover routing to auto-fail-over regions on errors.'},

// ── HIGH-PERFORMING (16) ──
{id:38,domain:'performing',sub:'Caching',q:'An application has a read-heavy relational database. Which caching solution supports complex data structures, Lua scripting, and pub/sub?',opts:['ElastiCache Memcached','ElastiCache Redis','DynamoDB DAX','CloudFront'],ans:1,exp:'ElastiCache Redis supports sorted sets, lists, pub/sub, Lua scripting, persistence, and clustering. Memcached is simpler, multithreaded, for pure key-value caching.',plain:'Redis supports rich data structures and pub/sub; Memcached is simpler and just does basic caching.'},
{id:39,domain:'performing',sub:'CDN',q:'A media company streams 4K video to global users. Origin is in us-east-1. How do you minimize latency and reduce origin load?',opts:['Deploy EC2 in every region','Use Route 53 latency routing to multiple ALBs','Use CloudFront with S3 origin and regional edge caches','Use Global Accelerator with S3'],ans:2,exp:'CloudFront caches content at 400+ edge locations globally. Regional Edge Caches sit between edges and origin, further reducing origin requests. Perfect for static/media content.',plain:'CloudFront caches your content at edge locations worldwide to cut latency and reduce load on your origin.'},
{id:40,domain:'performing',sub:'Database',q:'A table in DynamoDB is accessed via email address but queries need to search by last name. What\'s the most efficient solution?',opts:['Scan the full table and filter','Create a Global Secondary Index on last_name','Duplicate data into a second table','Use DynamoDB Streams to maintain a sorted list'],ans:1,exp:'GSIs allow queries on non-primary-key attributes. They have their own provisioned throughput and are eventually consistent. Much more efficient than full table scans.',plain:'A DynamoDB Global Secondary Index lets you efficiently query by an attribute that isn\'t the main key.'},
{id:41,domain:'performing',sub:'Compute',q:'A batch job processes 100GB files nightly in 2 hours. It is cost-sensitive. Which compute option provides the best price/performance?',opts:['On-demand EC2 r5.4xlarge','Spot EC2 instances with checkpointing','Lambda with 10GB memory','Fargate Spot tasks'],ans:1,exp:'Spot instances offer up to 90% discount. With checkpointing (save state periodically), interruptions don\'t restart from zero. Ideal for fault-tolerant batch jobs.',plain:'Spot Instances with checkpointing are cheap and fine for batch jobs that can resume if interrupted.'},
{id:42,domain:'performing',sub:'Storage',q:'An application needs high-throughput block storage (10GB/s) for a distributed database that requires shared access from multiple EC2 instances simultaneously.',opts:['EBS gp3','EBS io2 Block Express','Amazon EFS','Amazon FSx for Lustre'],ans:3,exp:'FSx for Lustre is a high-performance parallel file system (sub-millisecond latency, hundreds of GB/s). EFS handles shared access but at lower throughput. EBS is single-instance only.',plain:'FSx for Lustre is the high-throughput shared file system built for things like heavy distributed databases.'},
{id:43,domain:'performing',sub:'Networking',q:'Which EC2 feature allows instances to achieve network bandwidth up to 100 Gbps using SR-IOV?',opts:['Elastic Fabric Adapter','Enhanced Networking (ENA)','Placement Groups','Elastic Network Adapter'],ans:1,exp:'Enhanced Networking via ENA (Elastic Network Adapter) uses SR-IOV to provide high bandwidth, low latency, and lower CPU utilization. EFA is for HPC (MPI workloads).',plain:'Enhanced Networking (ENA) gives EC2 instances very high bandwidth and low latency.'},
{id:44,domain:'performing',sub:'Serverless',q:'A Lambda function processes images and takes 45 seconds. API Gateway times out at 29 seconds. How do you fix this?',opts:['Increase API Gateway timeout','Use async Lambda invocation via SQS + polling','Use Step Functions Express Workflow','Deploy to ECS instead'],ans:1,exp:'API Gateway has a hard 29-second timeout. For long-running tasks: use async pattern — API returns 202, client polls an SQS/DynamoDB result store, or use WebSocket API.',plain:'For Lambda jobs longer than 29 seconds, make the call async and have the client poll for the result instead of waiting on API Gateway.'},
{id:45,domain:'performing',sub:'Analytics',q:'A company needs to query 5TB of log data in S3 using standard SQL without loading it into a database. Which service?',opts:['Amazon Redshift','Amazon RDS','Amazon Athena','Amazon EMR'],ans:2,exp:'Athena is serverless SQL-on-S3. Query directly using Presto/Trino. Pay per query ($5/TB scanned). Use Parquet + partitioning to reduce costs. No infrastructure to manage.',plain:'Athena lets you run plain SQL directly against files sitting in S3 — no database to load.'},
{id:46,domain:'performing',sub:'Database',q:'An RDS instance handles 10,000 read queries/second. Single instance is at 100% CPU. Which solution provides horizontal read scaling?',opts:['Upgrade to larger instance class','Enable Multi-AZ','Add read replicas','Enable automated backups'],ans:2,exp:'RDS Read Replicas use async replication to create up to 5 readable copies. Applications point read traffic to replica endpoints. Multi-AZ standby is NOT readable.',plain:'Read replicas are the way to scale out reads horizontally when one RDS instance maxes out its CPU.'},
{id:47,domain:'performing',sub:'Streaming',q:'A real-time analytics pipeline needs to ingest 1 million events/second and replay data from the last 7 days. Which service?',opts:['SQS Standard','SQS FIFO','Amazon Kinesis Data Streams','Amazon MQ'],ans:2,exp:'Kinesis Data Streams supports real-time ingestion at massive scale with configurable retention (1-365 days) for replay. SQS doesn\'t support replay. Use enhanced fan-out for multiple consumers.',plain:'Kinesis Data Streams handles massive real-time ingestion and can replay data for up to a year.'},
{id:48,domain:'performing',sub:'Storage',q:'An EC2 instance needs the highest possible IOPS for a transactional database. What EBS volume type should you choose?',opts:['gp2','gp3','io2 Block Express','st1'],ans:2,exp:'io2 Block Express delivers up to 256,000 IOPS and 4,000 MB/s throughput — the highest performance EBS volume. Use for latency-sensitive databases like Oracle, SQL Server, SAP.',plain:'io2 Block Express is the EBS volume type built for the absolute highest IOPS needs.'},
{id:49,domain:'performing',sub:'Compute',q:'Which EC2 placement group type puts all instances on the same physical hardware for lowest possible network latency?',opts:['Spread placement group','Partition placement group','Cluster placement group','Availability Zone placement'],ans:2,exp:'Cluster placement groups pack instances on the same rack in a single AZ, enabling 10Gbps+ instance bandwidth and the lowest network latency. Risk: single rack failure.',plain:'Cluster placement groups pack instances physically close together for the lowest possible network latency.'},
{id:50,domain:'performing',sub:'CDN',q:'CloudFront is serving stale content after a deployment. How do you immediately invalidate cached objects?',opts:['Increase TTL then decrease it','Create a CloudFront invalidation for the paths','Delete and recreate the distribution','Use origin failover to bust the cache'],ans:1,exp:'CloudFront invalidations remove specific files from edge caches before their TTL expires. Use /* for all objects. First 1,000 paths/month are free; $0.005 per path after.',plain:'Create a CloudFront invalidation to immediately clear stale cached files after a deploy.'},
{id:51,domain:'performing',sub:'Database',q:'An Aurora cluster handles 50,000 writes/second. You need to add analytics queries without impacting write performance. Best approach?',opts:['Add Aurora read replicas','Enable Aurora Parallel Query','Create Aurora Global Database read region','Use Aurora Serverless v2'],ans:0,exp:'Aurora Read Replicas can handle analytics queries using the same shared storage. They add zero write overhead to the primary and can be independently scaled for query workloads.',plain:'Aurora read replicas can take on analytics queries without slowing down the primary\'s writes.'},
{id:52,domain:'performing',sub:'Serverless',q:'A Lambda function is cold-starting 5 seconds on every invocation during business hours. How do you eliminate cold starts without changing code?',opts:['Increase Lambda memory to 10GB','Enable Provisioned Concurrency','Deploy in a VPC with NAT Gateway','Use Lambda@Edge'],ans:1,exp:'Provisioned Concurrency pre-initializes Lambda execution environments, eliminating cold starts entirely. It runs 24/7 so it has cost. Use auto scaling to adjust based on schedule.',plain:'Provisioned Concurrency keeps Lambda environments pre-warmed so there\'s no cold-start delay.'},
{id:53,domain:'performing',sub:'Networking',q:'Users in Europe are experiencing 300ms latency to your us-east-1 ALB. Which service can reduce this to <50ms using the AWS backbone?',opts:['CloudFront','Route 53 latency routing','AWS Global Accelerator','VPC Peering'],ans:2,exp:'Global Accelerator routes user traffic to the nearest AWS edge location, then uses the AWS private backbone to reach the origin — significantly faster than public internet routing.',plain:'Global Accelerator routes distant users onto AWS\'s private backbone early, cutting latency dramatically.'},

// ── COST-OPTIMIZED (12) ──
{id:54,domain:'cost',sub:'EC2 Pricing',q:'A production workload runs 24/7 for the next 3 years. Which purchasing option provides the maximum discount (~72%) vs on-demand?',opts:['Spot Instances','On-Demand Instances','3-year Reserved Instances (All Upfront)','Savings Plans (Compute, 3-year)'],ans:2,exp:'3-year All-Upfront Reserved Instances provide up to 72% discount. Savings Plans offer ~66% with more flexibility (switch instance family/region). Spot can be 90% off but isn\'t suitable for 24/7 prod.',plain:'3-year all-upfront Reserved Instances give the biggest possible discount for a steady, long-term workload.'},
{id:55,domain:'cost',sub:'S3',q:'Objects in S3 are accessed frequently for 30 days, then rarely for 90 days, then never. What lifecycle policy minimizes cost?',opts:['S3 Standard only','S3 Standard → S3-IA at 30 days → Glacier at 120 days','S3 Intelligent-Tiering only','S3 Standard → Glacier at 30 days'],ans:1,exp:'Standard for frequent access, S3-IA (30-day min) for infrequent, then Glacier for archival. Intelligent-Tiering has per-object monitoring costs that outweigh savings for predictable patterns.',plain:'Move objects through Standard → Standard-IA → Glacier as they get accessed less often, to save money.'},
{id:56,domain:'cost',sub:'Compute',q:'A development environment runs 8 hours/day, 5 days/week. Which EC2 option saves the most money vs on-demand?',opts:['Reserved Instances','Spot Instances','Scheduled Reserved Instances','On-Demand with auto stop/start'],ans:3,exp:'On-demand with Lambda/EventBridge scheduled stop/start means you pay only for ~1,680 hrs/year vs 8,760 for 24/7. Only pay for what runs. No RI commitment needed for variable schedules.',plain:'Schedule dev/test EC2 instances to stop outside of business hours — you only pay while they run.'},
{id:57,domain:'cost',sub:'Data Transfer',q:'Which data transfer pattern incurs NO additional AWS charges?',opts:['EC2 to internet (egress)','EC2 in AZ-A to EC2 in AZ-B same region','EC2 to S3 in same region','S3 to CloudFront'],ans:2,exp:'EC2 → S3 in the same region is free. EC2 inter-AZ traffic costs $0.01/GB each way. CloudFront → internet is charged. S3 → CloudFront origin fetch is free.',plain:'EC2-to-S3 transfer in the same region is free; crossing AZs or regions usually costs money.'},
{id:58,domain:'cost',sub:'Rightsizing',q:'An EC2 fleet consistently uses 15% CPU and 20% memory. What should you do?',opts:['Add more instances for headroom','Enable Auto Scaling to scale to zero','Use AWS Compute Optimizer to rightsizing recommendations','Switch to Reserved Instances immediately'],ans:2,exp:'Compute Optimizer uses ML to analyze CloudWatch metrics and recommends optimal instance types. Rightsizing before committing to RIs avoids locking into oversized instances.',plain:'Use Compute Optimizer\'s ML-based recommendations before committing to Reserved Instances, so you don\'t lock in an oversized instance.'},
{id:59,domain:'cost',sub:'Serverless',q:'A microservice handles 100 requests/day with variable load. Which compute model is most cost-efficient?',opts:['Always-on t3.nano EC2','Lambda (pay per invocation)','ECS Fargate with min 1 task','Lightsail instance'],ans:1,exp:'Lambda charges per invocation and duration. At 100 requests/day, cost is negligible (well within free tier). Any always-on instance costs ~$3-5/month minimum regardless of traffic.',plain:'For tiny, unpredictable traffic, Lambda\'s pay-per-invocation pricing beats running anything 24/7.'},
{id:60,domain:'cost',sub:'S3',q:'A company stores 500TB of compliance data that must be retained 7 years but almost never accessed. What is the most cost-effective storage class?',opts:['S3 Standard','S3 Glacier Flexible Retrieval','S3 Glacier Deep Archive','S3 One Zone-IA'],ans:2,exp:'Glacier Deep Archive is $0.00099/GB/month (vs Standard $0.023/GB). For 500TB: ~$495/month vs ~$11,500/month. Retrieval within 12 hours. Minimum 180-day storage duration.',plain:'Glacier Deep Archive is by far the cheapest place to park data you almost never need to touch.'},
{id:61,domain:'cost',sub:'Networking',q:'A VPC has a NAT Gateway processing 10TB/month for EC2 instances accessing S3. How can you eliminate this cost?',opts:['Use NAT Instance instead','Use a VPC Gateway Endpoint for S3','Move EC2 to public subnets','Use CloudFront as proxy'],ans:1,exp:'S3 and DynamoDB Gateway Endpoints route traffic over the AWS private network — free, no NAT Gateway needed. NAT Gateway charges $0.045/GB processed, so 10TB = $450/month saved.',plain:'A VPC Gateway Endpoint for S3 removes that traffic from the NAT Gateway, eliminating its per-GB charge.'},
{id:62,domain:'cost',sub:'Database',q:'An RDS instance runs 2 hours/day for dev testing. It\'s provisioned 24/7. What change saves the most money?',opts:['Switch to smaller instance','Use RDS on Graviton processors','Automate stop/start on schedule','Convert to Aurora Serverless v2'],ans:2,exp:'RDS can be stopped for up to 7 days (restarts automatically after). Stop/start on schedule means paying only for storage when stopped vs full instance pricing. Aurora Serverless scales to zero but needs testing.',plain:'Stopping a rarely-used RDS instance on a schedule saves much more than just resizing it.'},
{id:63,domain:'cost',sub:'Savings Plans',q:'A company wants flexibility to change instance families and regions while still getting ~66% discount. Which option?',opts:['EC2 Instance Savings Plans','Compute Savings Plans','Convertible Reserved Instances','Standard Reserved Instances'],ans:1,exp:'Compute Savings Plans apply to EC2, Lambda, and Fargate across all regions, instance families, and OS types. EC2 Instance Savings Plans are cheaper but locked to a region and instance family.',plain:'Compute Savings Plans give a solid discount while staying flexible across instance types, regions, and services.'},
{id:64,domain:'cost',sub:'Optimization',q:'Which AWS service provides automated cost optimization recommendations across compute, storage, and database services?',opts:['Cost Explorer','AWS Budgets','AWS Trusted Advisor','Compute Optimizer'],ans:2,exp:'Trusted Advisor checks across cost optimization, performance, security, fault tolerance, and service limits. It flags underutilized EC2, idle load balancers, unassociated EIPs, and more.',plain:'Trusted Advisor scans cost, performance, security, and limits all in one automated check.'},
{id:65,domain:'cost',sub:'Storage',q:'S3 Intelligent-Tiering is monitoring 10 million small objects (each <128KB). Is this cost-effective?',opts:['Yes — it always saves money','No — monitoring fee ($0.0025/1000 objects) exceeds savings for small objects','Yes — small objects are automatically excluded','No — Intelligent-Tiering doesn\'t support small objects'],ans:1,exp:'Objects <128KB are never moved to cheaper tiers by Intelligent-Tiering, but still incur the $0.0025/1000 objects monitoring fee. For small objects, use S3 Standard or manually apply lifecycle rules.',plain:'Intelligent-Tiering\'s per-object monitoring fee can actually cost more than it saves on lots of tiny objects.'},
// ── Official Practice Questions (AWS SAA-C03) ─────────────────────────────────
{id:66,domain:'resilient',sub:'ECS',q:'A solutions architect is designing a solution to run a containerized web application using Amazon ECS. The architect wants to minimize cost by running multiple copies of a task on each container instance, with task copies scaling as load changes. Which routing solution distributes the load to the multiple tasks?',opts:['Configure an ALB to distribute requests using path-based routing.','Configure an ALB to distribute requests using dynamic host port mapping.','Configure a Route 53 alias record set with a failover routing policy.','Configure a Route 53 alias record set with a weighted routing policy.'],ans:1,exp:'Dynamic host port mapping allows multiple tasks from the same ECS service to run on each container instance by assigning random host ports. The ALB dynamically routes to all registered tasks. Path-based routing separates services, not task copies of the same service.',plain:'Dynamic host port mapping lets an ALB route to many copies of the same task on one instance.'},
{id:67,domain:'secure',sub:'VPC',q:'A company must configure a VPC so backend RDS instances cannot be accessed from the internet but are accessible from the app tier over a specified port only. Which action is correct? (Official Q2 — select any one correct answer)',opts:['Specify a DB subnet group containing only private subnets for the DB instances.','Attach an elastic network interface with a private IPv4 address to each DB instance.','Configure AWS Shield with the VPC and update route tables.','Configure Direct Connect on the database port between app and backend.','Add an inbound rule to the DB security group allowing the app tier SG over the DB port only.'],ans:[0,4],exp:'Two actions are correct: (A) Private subnets block all internet routing to DB instances. (E) A security group rule restricts DB access to only the application tier SG on the specific port. Together these enforce network isolation + least-privilege access control.',plain:'Put the database in private subnets and only allow the app tier\'s security group to reach its port.'},
{id:68,domain:'resilient',sub:'Multi-AZ',q:'An application runs on two EC2 instances behind a Network Load Balancer in a single Availability Zone. What should a solutions architect do to make this architecture more highly available?',opts:['Create a new VPC with two EC2 instances in the same AZ. Create a VPC peering connection.','Replace the NLB with an ALB configured with instances in an Auto Scaling group.','Configure Route 53 health checks on the EC2 instances. Add a failover routing policy.','Place the EC2 instances in an ASG that extends across multiple AZs. Designate the ASG as the NLB target.'],ans:3,exp:'Extending the ASG across multiple AZs eliminates the single-AZ single point of failure. The NLB distributes traffic across AZs automatically. VPC peering doesn\'t move instances to another AZ. Swapping ALB for NLB provides no additional availability.',plain:'Spread the EC2 instances across multiple AZs inside an Auto Scaling group behind the load balancer.'},
{id:69,domain:'resilient',sub:'Auto Scaling',q:'A reporting app on EC2 behind an ALB can take up to 15 minutes to respond to complex requests. Users receive 5xx errors during scale-in events while requests are being processed. What should the solutions architect do?',opts:['Enable sticky sessions for the target group.','Increase the instance size in the ALB target group.','Increase the Auto Scaling cooldown period to more than the longest response time.','Increase the deregistration delay timeout for the target group to greater than 900 seconds.'],ans:3,exp:'Deregistration delay (default 300s) allows in-flight requests to complete before an instance is deregistered. Increase it to >900 seconds (15 min) to cover the longest processing time. Cooldown affects when new scale actions trigger, not how gracefully instances are removed.',plain:'Increase the target group\'s deregistration delay so in-flight long requests can finish before an instance is removed during scale-in.'},
{id:70,domain:'performing',sub:'Messaging',q:'A migration requires sending email notifications to customers using only fully managed AWS services. Which solution meets this requirement?',opts:['Configure SQS with a standard queue.','Deploy an EC2 instance to host the application server.','Configure SQS with a FIFO queue.','Configure SNS with the protocol of email.'],ans:3,exp:'SNS is a fully managed pub/sub service that natively supports email as a subscription protocol, directly delivering messages to recipients. SQS is a queue and cannot push to external email endpoints. EC2 is not a managed service.',plain:'SNS can deliver notifications straight to email — no servers needed.'},
{id:71,domain:'cost',sub:'EC2 Pricing',q:'A company used EC2 Spot Instances for a demo that is now complete. A solutions architect must remove them to stop incurring costs. What should they do?',opts:['Cancel the Spot request only.','Terminate the Spot Instances only.','Cancel the Spot request, then terminate the Spot Instances.','Terminate the Spot Instances, then cancel the Spot request.'],ans:2,exp:'Order matters: cancel the Spot request FIRST to prevent AWS from relaunching new instances, THEN terminate existing ones. Terminating without cancelling the request causes new instances to launch. Cancelling without terminating leaves existing instances running and billing.',plain:'Cancel the Spot request first, then terminate the instances — otherwise AWS just relaunches them.'},
{id:72,domain:'performing',sub:'Compute',q:'A company needs to look up configuration details about how a Linux-based EC2 instance was launched. Which command gathers the system metadata?',opts:['curl http://169.254.169.254/latest/meta-data','curl http://localhost/latest/meta-data','curl http://254.169.254.169/latest/meta-data','curl http://192.168.0.1/latest/meta-data'],ans:0,exp:'The EC2 Instance Metadata Service (IMDS) is always available at the link-local address 169.254.169.254. This is a non-routable address reserved for this purpose. localhost resolves to 127.0.0.1 — metadata is not served there.',plain:'EC2\'s instance metadata is always reachable at the special address 169.254.169.254.'},
{id:73,domain:'performing',sub:'S3',q:'An on-premises application uploads log files of 20–30 GB to S3. The network experiences intermittent failures causing upload failures. Which solution resolves this with minimum operational overhead?',opts:['Enable S3 Transfer Acceleration.','Copy files to EC2 in the closest Region. Use S3 Lifecycle policies to copy to S3.','Use multipart upload to Amazon S3.','Upload to two Regions simultaneously. Enable Cross-Region Replication.'],ans:2,exp:'Multipart upload splits large files into independently uploaded parts (each 5MB–5GB). If a part fails, only that part is retried — not the whole file. Required for objects >5GB. Transfer Acceleration speeds up uploads but doesn\'t solve intermittent failure retry.',plain:'Multipart upload splits a big file into chunks so only the failed chunk needs retrying, not the whole upload.'},
{id:74,domain:'performing',sub:'Storage',q:'A new database on EC2 requires a single EBS volume supporting up to 20,000 IOPS. Which EBS volume type meets this requirement?',opts:['Throughput Optimized HDD (st1)','Provisioned IOPS SSD (io1/io2)','General Purpose SSD (gp2/gp3)','Cold HDD (sc1)'],ans:1,exp:'io1/io2 Provisioned IOPS SSD supports up to 64,000 IOPS per volume. gp3 maxes at 16,000 IOPS (insufficient for 20,000). st1 and sc1 are HDD-backed, designed for throughput not high IOPS — unsuitable for transactional databases.',plain:'io1/io2 Provisioned IOPS volumes are the EBS type built for very high, guaranteed IOPS.'},
{id:75,domain:'resilient',sub:'Auto Scaling',q:'An image-processing app uses SQS + EC2 consumers. Processing can take up to 20 minutes. When volume spikes, the SQS backlog grows and users report delays. Which solution improves performance per cloud best practices?',opts:['Purchase Dedicated Instances for peak demand.','Convert SQS standard queue to FIFO and increase visibility timeout.','Configure Lambda as the SQS consumer.','Create an ASG of EC2 consumer instances. Configure the ASG to scale based on the ApproximateNumberOfMessages CloudWatch metric.'],ans:3,exp:'Scaling an ASG on SQS queue depth (ApproximateNumberOfMessages) is the canonical AWS auto-scaling pattern. Lambda is eliminated because processing can take 20 min — Lambda\'s max timeout is 15 min. Dedicated Instances don\'t auto-scale.',plain:'Scale the EC2 consumer fleet based on how many messages are piling up in the SQS queue.'},
{id:76,domain:'performing',sub:'Database',q:'A chat app stores messages in a key-value data model. Groups of users read messages repeatedly. The solution must handle a high read rate and deliver messages with microsecond latency. Which database solution meets this?',opts:['Amazon Aurora with Aurora Replicas','Amazon DynamoDB with DynamoDB Accelerator (DAX)','Amazon Aurora with ElastiCache for Memcached','Amazon Neptune with ElastiCache for Memcached'],ans:1,exp:'DynamoDB is a managed NoSQL database that natively supports key-value data models. DAX is an in-memory cache delivering microsecond read latency without application changes. Aurora is a relational database (not key-value) and cannot consistently achieve microsecond latency.',plain:'DynamoDB plus a DAX cache gives the microsecond-level read speed a chat app needs.'},
{id:77,domain:'secure',sub:'IAM',q:'A security team in a separate AWS account needs read-only access to production account settings during periodic audits. Which solution follows AWS security best practices?',opts:['Create IAM users for each security team member in the production account with required permissions.','Create an IAM role in the production account with required permissions. Add the security team account to the trust policy.','Create one IAM user in production with admin privileges for the security team to share.','Create IAM users in production for the security team. Attach permissions to an IAM group.'],ans:1,exp:'Cross-account IAM roles are the AWS security best practice. The role in the production account has least-privilege permissions. The trust policy allows the security account to assume the role via STS. No permanent IAM users or long-term credentials are created in production.',plain:'Use a cross-account IAM role with a trust policy instead of creating IAM users in the production account.'},
{id:78,domain:'cost',sub:'Serverless',q:'A new application needs an application layer and an OLTP relational database. It must be always available but will have long idle periods. Which solution is MOST cost-effective?',opts:['ECS on Fargate with Aurora Serverless for the database.','EC2 burstable instances with Amazon Redshift for the database.','EC2 + MySQL via CloudFormation — delete the stack during idle periods.','EC2 ASG behind ALB with RDS for MySQL.'],ans:0,exp:'Fargate charges only for running tasks — idle periods cost nothing. Aurora Serverless v2 scales to zero (or near-zero) during inactivity. Together, compute and database costs are near-zero when idle. Redshift is OLAP, not OLTP. Deleting the CF stack loses database data.',plain:'Fargate plus Aurora Serverless both scale to near-zero cost during idle periods.'},
{id:79,domain:'cost',sub:'S3',q:'A company must retain data for at least 5 years. Data is rarely accessed after storage but must be accessible within 2 hours. Which solution is MOST cost-effective?',opts:['Store in EFS. Access via AWS Direct Connect.','Store in S3. Use a Lifecycle policy to transition to S3 Glacier.','Store in EBS. Create snapshots stored in S3.','Store in S3. Use a Lifecycle policy to transition to S3 Standard-IA.'],ans:1,exp:'S3 Glacier Flexible Retrieval meets the 2-hour retrieval SLA at ~$0.0036/GB/month — far cheaper than Standard-IA ($0.0125/GB). S3 as landing tier + Glacier for archival is the cost-optimal pattern for rarely-accessed long-retention data.',plain:'For data that\'s rarely touched but needs a few hours to retrieve, Glacier Flexible Retrieval is the cheap option.'},
{id:80,domain:'resilient',sub:'S3',q:'A company stores legal documents in S3, re-uploading with the same object key. They need to download older versions and protect against accidental deletion. What is the MOST operationally efficient solution?',opts:['Enable S3 Versioning on the bucket.','Enable MFA delete on the bucket.','Configure S3 Cross-Region Replication to another Region.','Configure an S3 Lifecycle policy to archive to Glacier after 30 days.'],ans:0,exp:'S3 Versioning preserves all versions of every object. Overwriting an object creates a new version; deleting creates a delete marker, not permanent removal. MFA delete adds extra protection but is not itself versioning. CRR requires versioning as a prerequisite anyway.',plain:'S3 Versioning keeps every past copy of an object so nothing is truly lost on overwrite or delete.'},
{id:81,domain:'secure',sub:'Network',q:'A company runs its website on EC2 behind an ALB that is the CloudFront origin. They want protection against cross-site scripting (XSS) and SQL injection. Which approach is correct?',opts:['Enable Shield Advanced. List the CloudFront distribution as a protected resource.','Define a Shield Advanced policy in Firewall Manager to block XSS and SQL injection.','Set up AWS WAF on the CloudFront distribution with rules blocking XSS and SQL injection.','Deploy Firewall Manager on EC2 instances with rules blocking XSS and SQL injection.'],ans:2,exp:'AWS WAF is a Layer 7 firewall that inspects HTTP request bodies, headers, and query strings for XSS patterns and SQL injection code. Shield protects against DDoS (L3/4 network attacks), not application-layer vulnerabilities. Firewall Manager orchestrates WAF/Shield — it is not installed on instances.',plain:'Put AWS WAF on the CloudFront distribution to catch XSS and SQL injection at the HTTP layer.'},
{id:82,domain:'performing',sub:'Networking',q:'Which TWO components are required to build a site-to-site VPN connection on AWS? (Select TWO — any correct answer accepted)',opts:['An internet gateway','A NAT gateway','A customer gateway','Amazon API Gateway','A virtual private gateway'],ans:[2,4],exp:'Site-to-site VPN requires exactly two endpoints: Customer Gateway (represents the on-premises router/device configured in your data center) and Virtual Private Gateway (AWS-side VPN endpoint attached to the VPC). Internet Gateway is for public internet traffic, not encrypted VPN. NAT Gateway provides outbound internet for private subnets.',plain:'A site-to-site VPN needs a Customer Gateway (on-prem side) and a Virtual Private Gateway (AWS side).'},
{id:83,domain:'cost',sub:'Storage',q:'A media company needs up to 400 GB of temporary storage discarded after graphic rendering, with ~40,000 random IOPS required. What is the MOST cost-effective storage option?',opts:['Storage optimized EC2 instance with instance store storage.','Storage optimized EC2 instance with Provisioned IOPS SSD (io1/io2) EBS.','Burstable EC2 instance with Throughput Optimized HDD (st1) EBS.','Burstable EC2 instance with Amazon S3 over a VPC endpoint.'],ans:0,exp:'Instance store on storage-optimized instances (like i3/i3en) delivers hundreds of thousands of IOPS at no additional cost beyond the instance hourly rate. Since data is discarded after rendering, the ephemeral nature of instance store is not a drawback. io1/io2 adds per-GB cost on top.',plain:'Instance store on storage-optimized instances gives huge IOPS for free when the data is disposable anyway.'},
{id:84,domain:'secure',sub:'Cognito',q:'A company is building a mobile app requiring authorization, authentication, and user management from one central source for both internal and external users. Which solution meets these requirements?',opts:['IAM roles','IAM users and groups','Amazon Cognito user pools','AWS Security Token Service (STS)'],ans:2,exp:'Cognito User Pools provide a complete user directory for web/mobile apps: sign-up/sign-in, MFA, social federation (Google/Facebook), and JWT tokens. IAM is for AWS resource access control, not end-user application authentication. STS issues temporary credentials but doesn\'t manage user identities.',plain:'Cognito User Pools are the all-in-one identity solution for sign-up, sign-in, and user management.'},
{id:85,domain:'cost',sub:'Data Transfer',q:'A company stores satellite images in S3 and must replicate 60 TB to on-premises monthly for compliance. What is the MOST cost-effective transfer method?',opts:['Export from S3 to an AWS Snowball Edge Storage Optimized device monthly. Ship to on-premises. Return within a week.','Copy to a new S3 Standard-IA bucket. Use Storage Gateway File Gateway to transfer to on-premises. Delete after transfer.','Copy to a new S3 Standard-IA bucket. Use S3 to transfer directly to on-premises. Delete after transfer.','Create a CloudFront distribution. Download from CloudFront to on-premises monthly.'],ans:0,exp:'60 TB internet egress costs ~$5,400/month ($0.09/GB). Snowball Edge base price + shipping + $0.03/GB data-out-of-AWS = ~$2,100. Snowball is ~2.5× cheaper for bulk transfers. Copying to another S3 bucket adds unnecessary replication cost. CloudFront egress pricing is similar to direct S3 egress.',plain:'For very large one-time or recurring data dumps, shipping a Snowball Edge beats paying for internet egress.'},
{id:86,domain:'performing',sub:'Networking',q:'A media streaming service aims to boost the performance and availability of its global platform, which relies on UDP for data transmission. The company needs a solution that allows for swift regional failover in the event of a regional outage, while still using their proprietary DNS system. Which AWS service should they implement?',opts:['AWS Global Accelerator','AWS Elastic Load Balancing (ELB)','Amazon CloudFront'],ans:0,exp:'Global Accelerator is tailored for enhancing performance and availability of applications by leveraging the AWS global network. It is ideal for UDP-based applications such as media streaming, as it offers rapid regional failover and improves performance by minimizing latency and jitter. CloudFront is HTTP/HTTPS only. ELB operates within a single region and does not provide global failover. Since the company retains its own DNS, Global Accelerator\'s Anycast IPs integrate cleanly without requiring Route 53.',plain:'Global Accelerator is built for UDP-based apps needing fast regional failover, since CloudFront only handles HTTP.'},
{id:87,domain:'performing',sub:'S3',q:'A company needs to transfer a 2 GB compressed data file daily to Amazon S3 from a remote location. What is the most efficient method to achieve this?',opts:['Perform a single upload operation.','Utilize only multipart upload without acceleration.','Use multipart upload with Amazon S3 Transfer Acceleration.'],ans:2,exp:'To efficiently upload large files to Amazon S3, the combination of multipart upload and S3 Transfer Acceleration is recommended. Transfer Acceleration leverages Amazon CloudFront\'s global edge network to optimize the transfer path, reducing latency and increasing speed. Multipart upload allows the file to be divided into smaller parts that can be uploaded concurrently, enhancing speed and reliability. Using either technique alone provides less benefit than combining both.',plain:'Combine multipart upload with S3 Transfer Acceleration to upload large files fastest.'},
{id:88,domain:'performing',sub:'Caching',q:'A logistics company needs to optimize its application to handle a surge in real-time tracking data as its fleet size doubles. Which solution ensures high performance with low latency for frequent data updates and retrievals?',opts:['Configure Multi-AZ for the main RDS instance to improve write durability and distribute reads via read replicas during high demand periods.','Transition the tracking data to Amazon OpenSearch Service, leveraging its geospatial capabilities for real-time data indexing and visualization.','Deploy an Amazon ElastiCache for Redis cluster to cache tracking data, using a TTL-based eviction policy to manage data freshness and reduce database load.'],ans:2,exp:'Implementing Amazon ElastiCache for Redis offers a scalable and low-latency solution for managing frequent data updates and retrievals. Redis, being an in-memory data store, provides sub-millisecond response times, which is crucial for real-time tracking applications. By caching tracking data in Redis with a TTL eviction policy, the system can offload the primary database, ensuring quick access to the most recent data.',plain:'Cache frequently-changing tracking data in ElastiCache for Redis with a TTL to keep it fresh and fast.'},
{id:89,domain:'cost',sub:'Database',q:'A company is planning to set up read replicas for their Amazon RDS database to improve read performance. What should they consider regarding data transfer costs?',opts:['Data transfer costs apply when replicating data to read replicas in different AWS Regions.','Data transfer costs apply when replicating data to read replicas within the same AWS Region.','Data transfer costs apply when replicating data to read replicas within the same Availability Zone.'],ans:0,exp:'Data transfer between Amazon RDS instances within the same AWS Region does not incur charges. However, if read replicas are set up in different AWS Regions, data transfer costs will apply. Cross-AZ replication within the same region is also free for RDS read replicas.',plain:'RDS read-replica traffic is free within the same region but costs money across regions.'},
{id:90,domain:'performing',sub:'Database',q:'A logistics company is revamping its package tracking system to handle real-time data updates. The IT department needs a NoSQL database that provides low-latency access, can scale out easily, and operates without server management. Which database solution should they choose?',opts:['Amazon DynamoDB','Amazon RDS','Amazon Redshift'],ans:0,exp:'Amazon DynamoDB is a fully managed NoSQL database service that delivers single-digit millisecond response times and supports horizontal scaling. It is serverless, making it suitable for applications that require fast and consistent performance. Amazon RDS is a relational database and requires server management decisions. Amazon Redshift is a data warehouse optimized for OLAP analytics, not low-latency key-value or document operations.',plain:'DynamoDB is the fully managed, serverless NoSQL choice for fast, scalable key-value data.'},
{id:91,domain:'resilient',sub:'Hybrid',q:'A financial institution wants to modernize its application infrastructure while ensuring that all sensitive customer data remains within its own data centers. Which AWS service should the institution implement to achieve this goal?',opts:['Implement AWS Snowball Edge for on-site data processing and periodically transfer data to Amazon S3 for analysis.','Deploy an AWS Outposts rack in the data center and use Amazon EKS Anywhere to manage Kubernetes clusters locally, integrating with AWS services.','Set up Amazon ECS with Fargate in an AWS Local Zone and connect it to the data center via a secure VPN.'],ans:1,exp:'The best solution is to deploy an AWS Outposts rack within the financial institution\'s data center and utilize Amazon EKS Anywhere on Outposts. This allows the institution to run Kubernetes clusters on-premises, leveraging AWS APIs and services while ensuring all data stays within the local data center, meeting data residency and compliance requirements. Snowball Edge is a data-transfer device, not a persistent application platform. Local Zone still routes data through AWS infrastructure.',plain:'AWS Outposts with EKS Anywhere lets you run Kubernetes on AWS-managed hardware that physically stays in your data center.'},
{id:92,domain:'resilient',sub:'Compute',q:'A company has duplicated an Amazon Machine Image (AMI) from Region A to Region B. What resources are now present in Region B?',opts:['One AMI and one snapshot are present in Region B.','One EC2 instance and one AMI are present in Region B.','One EC2 instance, one AMI, and one snapshot are present in Region B.'],ans:0,exp:'Copying an AMI to another region creates a new AMI and an associated EBS snapshot in the target region. It does not create an EC2 instance automatically — the copied AMI can be used to launch new instances in Region B as needed. This is a common exam trap: copying an AMI moves the image definition and its backing snapshot, nothing more.',plain:'Copying an AMI to another region only creates a new AMI and snapshot there — not a running instance.'},
{id:93,domain:'secure',sub:'Governance',q:'A tech startup aims to separate its development, staging, and production environments using distinct AWS accounts. They need centralized management of network resources and automatic application of security policies when new accounts are established. Which approach best fulfills these requirements while keeping operational complexity low?',opts:['Leverage AWS Organizations to create accounts and a shared networking account with a centralized VPC. Share VPC subnets using AWS RAM and manually enforce policies with SCPs.','Utilize AWS Service Catalog to establish approved VPC templates. Deploy a separate account from the catalog and apply networking policies using AWS Config conformance packs.','Implement AWS Control Tower to manage account creation and governance. Set up a centralized VPC in a shared networking account and distribute its subnets to other accounts using AWS Resource Access Manager (AWS RAM).'],ans:2,exp:'AWS Control Tower is tailored for managing multi-account AWS setups, offering automated account creation with integrated security and compliance features like Service Control Policies (SCPs) and AWS Config rules. By setting up a centralized VPC in a shared networking account, you can efficiently manage and distribute network resources across accounts using AWS RAM. This strategy reduces redundancy, cuts costs, and ensures uniform security practices with minimal operational burden. Option A requires manual SCP enforcement — higher complexity.',plain:'AWS Control Tower automates multi-account setup, central networking, and security guardrails with the least manual effort.'},
{id:94,domain:'performing',sub:'Storage',q:'A graphic design company is seeking a managed file storage solution on AWS for their collaborative editing software that requires support for the SMB protocol with minimal setup and maintenance. Which AWS service should they choose?',opts:['Set up an Amazon EC2 instance with Windows Server and configure a file share for SMB access.','Utilize Amazon S3 with Transfer Acceleration for file storage and access via HTTPS.','Deploy an Amazon FSx for Windows File Server and connect it to the design software using the SMB protocol.'],ans:2,exp:'Amazon FSx for Windows File Server is the ideal choice because it offers a fully managed file storage service that natively supports the SMB protocol. This service reduces the need for manual configuration and ongoing maintenance, as it automatically handles tasks such as patching, backups, and scaling — making it a low-overhead solution compared to self-managed alternatives. Amazon S3 does not support SMB. An EC2-based Windows file server requires manual patching and administration.',plain:'Amazon FSx for Windows File Server is the managed option that natively speaks the SMB protocol.'},
// ── Secure ────────────────────────────────────────────────────────────────────
{id:95,domain:'secure',sub:'IAM',q:'A solutions architect must grant an EC2 instance permission to write to a specific S3 bucket. Which is the MOST secure method?',opts:['Create an IAM user, generate access keys, and store them in the EC2 instance environment variables.','Create an IAM role with an S3 write policy and attach it to the EC2 instance as an instance profile.','Embed access keys directly in the application source code.','Store IAM access keys in AWS Secrets Manager and retrieve them on startup.'],ans:1,exp:'IAM instance profiles attach a role to an EC2 instance. The EC2 instance retrieves short-lived credentials automatically via the Instance Metadata Service (IMDS) — no long-term keys are needed anywhere. This is the AWS security best practice. Environment variables, source code, and Secrets Manager-fetched keys all still rely on long-term static credentials, which can be leaked or rotated improperly.',plain:'Attach an IAM role (instance profile) to EC2 — never put access keys directly on the instance.'},
{id:96,domain:'secure',sub:'Secrets Manager',q:'An application on ECS retrieves an RDS database password from an environment variable set at deployment time. A security review requires eliminating static credentials. What is the RECOMMENDED solution with automatic rotation?',opts:['Store the password in S3 with server-side encryption and read it at startup.','Store the password in AWS Secrets Manager, reference it in the ECS task definition, and enable automatic rotation.','Store the password in SSM Parameter Store as a SecureString with manual rotation.','Embed the password in a Docker image layer that is stored in a private ECR repository.'],ans:1,exp:'AWS Secrets Manager is purpose-built for credential management: it encrypts secrets at rest using KMS, provides a versioned API for retrieval, and supports native automatic rotation for RDS, Redshift, and DocumentDB without application changes. ECS task definitions can reference Secrets Manager ARNs directly — the container receives the secret value at launch. SSM Parameter Store SecureString works but requires custom rotation scripts. S3 and Docker layers are not credential management solutions and lack rotation.',plain:'Secrets Manager can store and auto-rotate the database password instead of hardcoding it.'},
{id:97,domain:'secure',sub:'GuardDuty',q:'AWS GuardDuty generates a finding that EC2 instances in a production VPC are communicating with known cryptocurrency mining pools. What is the MOST effective IMMEDIATE containment action?',opts:['Terminate the EC2 instances immediately to stop the activity.','Update the security group of affected instances to deny all inbound and outbound traffic.','Disable GuardDuty to suppress the finding while investigating.','Enable VPC Flow Logs and wait for more data before acting.'],ans:1,exp:'Modifying the security group to block all traffic (effectively quarantining the instance) stops active exfiltration and mining while preserving the instance for forensic analysis. Termination destroys forensic evidence needed to understand the breach. Disabling GuardDuty removes threat detection. VPC Flow Logs support investigation but do not stop the active threat — containment must come first.',plain:'Lock down the security group to quarantine a compromised instance rather than destroying evidence by terminating it.'},
{id:98,domain:'secure',sub:'S3 Security',q:'A compliance requirement states that no S3 object in the company\'s AWS account may ever be publicly accessible, regardless of future bucket policies or object ACLs. Which is the SIMPLEST control that enforces this unconditionally?',opts:['Apply a bucket policy denying s3:PutObjectAcl on every bucket.','Enable S3 Block Public Access at the account level.','Enable S3 Object Ownership with Bucket Owner Enforced on every bucket.','Apply an SCP denying s3:PutBucketPolicy in every account.'],ans:1,exp:'S3 Block Public Access (BPA) at the account level is an override applied before evaluating any bucket policy or object ACL — it cannot be bypassed by any IAM policy within the account. It requires a single setting change and retroactively applies to all current and future buckets. Object Ownership prevents ACL-based public access but doesn\'t block bucket policies that grant public access. Per-bucket policies and SCPs require per-bucket or per-policy maintenance.',plain:'S3 Block Public Access at the account level is a hard override that no bucket policy can bypass.'},
{id:99,domain:'secure',sub:'Encryption',q:'A company wants all new EBS volumes and snapshots to be encrypted by default without requiring developers to specify encryption on each resource. What is the SIMPLEST solution?',opts:['Create an SCP denying creation of unencrypted EBS volumes.','Enable EBS encryption by default in each AWS Region for the account.','Deploy a Lambda function triggered by CloudWatch Events to encrypt new EBS volumes.','Require all EBS volumes to be created via CloudFormation templates that enforce encryption.'],ans:1,exp:'EBS encryption by default is a per-Region account setting that automatically encrypts all new EBS volumes, snapshots copied from unencrypted snapshots, and snapshots created from unencrypted volumes — using the default KMS key. Zero developer action required per volume. SCPs can deny unencrypted volume creation but require complex condition logic. Lambda remediation introduces a window of exposure. CloudFormation requires all teams to use templates, which doesn\'t prevent console or CLI creation.',plain:'Turning on EBS encryption-by-default for the account encrypts every new volume automatically, no developer action needed.'},
