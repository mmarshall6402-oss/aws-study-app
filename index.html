{id:100,domain:'secure',sub:'VPC',q:'A company wants EC2 instances in a private subnet to access Amazon S3 without traffic leaving the AWS network and without requiring a NAT gateway or internet gateway. Which solution is correct?',opts:['VPC Peering to a public VPC that has internet access.','VPC Gateway Endpoint for S3.','AWS Direct Connect with a public VIF.','Interface Endpoint (PrivateLink) for S3.'],ans:1,exp:'A VPC Gateway Endpoint for S3 creates a route table entry directing S3-bound traffic from the VPC through the endpoint — entirely within the AWS network. No internet gateway, NAT gateway, or VPN is required. It is free. Interface Endpoints (PrivateLink) also keep traffic private but use ENIs with hourly charges and are better for services not supported by gateway endpoints. VPC Peering doesn\'t add S3 connectivity. Direct Connect is for on-premises to AWS.',plain:'A VPC Gateway Endpoint lets private instances reach S3 for free, with no NAT or internet gateway involved.'},
{id:101,domain:'secure',sub:'CloudTrail',q:'A company must log all AWS API calls across all Regions and ensure log files cannot be deleted or tampered with. What combination achieves this?',opts:['Enable CloudTrail per-Region with log file validation. Apply a bucket policy denying s3:DeleteObject.','Create a multi-Region trail. Enable log file validation. Apply an S3 bucket policy denying s3:DeleteObject.','Create a multi-Region trail. Send logs to CloudWatch Logs. Enable CloudWatch Logs encryption.','Enable CloudTrail in the primary Region only. Enable S3 Versioning on the log bucket.'],ans:1,exp:'A multi-Region trail captures API activity from every Region in a single configuration. Log file validation creates SHA-256 digest files that detect any tampering or deletion. An S3 bucket policy denying s3:DeleteObject prevents anyone (including account admins) from deleting log files. MFA Delete and S3 Object Lock provide additional protection but the bucket policy is the most direct control. A single-Region trail misses API calls in other Regions.',plain:'A multi-region CloudTrail trail with log file validation and a deny-delete bucket policy gives you tamper-proof, account-wide logging.'},
{id:102,domain:'secure',sub:'Cognito',q:'A mobile app allows users to sign in with Google accounts and then call AWS APIs on their behalf. Which Cognito components are required?',opts:['User Pool handles both Google sign-in and AWS credential vending.','User Pool for Google authentication; Identity Pool to exchange the token for temporary AWS credentials.','Identity Pool for Google authentication; User Pool for AWS credentials.','IAM Identity Center with Google as an external IdP.'],ans:1,exp:'Cognito User Pool federates external identity providers including Google (OAuth 2.0) and issues JWT tokens after authentication. The app then passes the JWT to a Cognito Identity Pool, which calls STS AssumeRoleWithWebIdentity to issue short-lived AWS credentials scoped to an IAM role. User Pools alone cannot issue AWS credentials. Identity Pools handle AuthZ (AWS access), not direct IdP sign-in. IAM Identity Center is designed for workforce users accessing AWS accounts, not consumer mobile app authentication.',plain:'Cognito User Pool handles the Google sign-in; Identity Pool then swaps that token for real AWS credentials.'},
{id:103,domain:'secure',sub:'WAF',q:'A web application behind CloudFront is being hit by an HTTP flood from a small number of IP addresses sending thousands of requests per minute. AWS WAF is deployed on the CloudFront distribution. Which WAF feature directly mitigates this?',opts:['AWS Managed Rules — Core Rule Set (CRS)','Rate-based rule with a per-IP request threshold','Geographic match condition to block the source country','IP set manually listing the attacking IPs'],ans:1,exp:'Rate-based rules count requests from each source IP over a 5-minute rolling window and automatically block any IP exceeding the threshold — ideal for HTTP flood mitigation. The block is automatic and adapts to new attacking IPs. Managed Rules block known exploit patterns (SQLi, XSS) but don\'t rate-limit floods. Geographic blocks affect all users from a country including legitimate ones. IP sets require manual maintenance and can\'t react in real-time to previously unknown IPs.',plain:'A WAF rate-based rule automatically blocks any IP sending too many requests too fast.'},
{id:104,domain:'secure',sub:'SSM',q:'A company wants to eliminate bastion hosts and allow developers to run shell commands on EC2 instances in private subnets without opening any inbound ports. Session activity must be logged. Which solution achieves this?',opts:['EC2 Instance Connect with security group allowing port 22 from developer IPs.','AWS Systems Manager Session Manager.','AWS Client VPN with a custom authorization rule.','AWS Direct Connect with a private VIF to the developer office.'],ans:1,exp:'SSM Session Manager provides browser and CLI shell access to EC2 (and on-premises servers with SSM Agent) with zero inbound ports required. All session activity is logged to CloudTrail, S3, and/or CloudWatch Logs. No SSH keys to manage. EC2 Instance Connect still requires port 22 open. Client VPN provides network access but doesn\'t address bastion host replacement or session logging. Direct Connect is a network connectivity solution, not an access management tool.',plain:'SSM Session Manager gives logged shell access to private instances with zero open inbound ports.'},
{id:105,domain:'secure',sub:'Macie',q:'A company stores millions of customer records in S3 and suspects some buckets may contain undetected PII (SSNs, credit card numbers). Which AWS service automatically identifies and reports on this sensitive data?',opts:['Amazon Inspector','Amazon GuardDuty','Amazon Macie','AWS Config with a custom rule'],ans:2,exp:'Amazon Macie uses ML to automatically discover, classify, and protect sensitive data stored in S3, including PII patterns such as Social Security numbers, passport numbers, and credit card numbers. It provides findings with object-level detail. Inspector assesses EC2 and Lambda for software vulnerabilities and network exposure, not data content. GuardDuty detects threat patterns in CloudTrail/DNS/VPC Flow Logs, not data classification. Config evaluates resource configuration compliance, not file content.',plain:'Macie uses machine learning to automatically find sensitive data like PII hiding in your S3 buckets.'},
{id:106,domain:'secure',sub:'KMS',q:'A company imports key material from its on-premises HSM into a KMS CMK. A regulatory event requires the ability to immediately make encrypted data unreadable without the 7-30 day waiting period for key deletion. What is the correct approach?',opts:['Schedule the CMK for deletion with the minimum waiting period (7 days).','Delete just the imported key material from the CMK, leaving the CMK in place.','Disable the CMK — data becomes unreadable immediately.','Rotate the CMK to use new key material.'],ans:1,exp:'When key material is imported into a CMK, you can delete just the key material independently of the CMK. This immediately renders all data encrypted under that key unreadable (since decryption requires the key material) without the minimum 7-day deletion waiting period. The CMK itself remains, and key material can be re-imported to restore access if needed. Disabling a CMK also stops decryption but doesn\'t "destroy" the key material. Rotation keeps the old key material available for decryption of previously encrypted data.',plain:'Deleting just the imported key material instantly makes data unreadable, without the normal key-deletion waiting period.'},
{id:107,domain:'secure',sub:'Network',q:'A company needs to inspect all VPC traffic — including traffic between VPCs and from VPCs to the internet — using a third-party firewall appliance. Which AWS service enables transparent traffic steering through the appliance?',opts:['Application Load Balancer in front of the firewall appliance in each VPC.','Gateway Load Balancer (GWLB) with the appliance as a target and GWLB Endpoints for traffic steering.','Deploy the firewall as a proxy on EC2 with an Elastic IP.','Configure the firewall as a NAT instance replacing the NAT Gateway.'],ans:1,exp:'Gateway Load Balancer operates at Layer 3, uses GENEVE encapsulation to forward all packets (including non-HTTP) transparently to firewall appliances for inspection, then returns them to their original path. GWLB Endpoints steer traffic from source VPCs through the appliance VPC. ALB operates at L7 HTTP/HTTPS only and cannot transparently forward all traffic types. NAT instance replacement is a single point of failure and complex to scale.',plain:'Gateway Load Balancer transparently routes all VPC traffic through a third-party firewall appliance for inspection.'},
{id:108,domain:'secure',sub:'Config',q:'A company must ensure all EC2 security groups never permit SSH (port 22) from 0.0.0.0/0, and any violation must be automatically remediated without human intervention. Which solution achieves this?',opts:['AWS Inspector with automated findings and patch manager.','AWS Config managed rule "restricted-ssh" with an automatic remediation action using an SSM Automation document.','AWS GuardDuty with an EventBridge rule triggering a Lambda function that fixes the security group.','AWS Trusted Advisor with a script that runs nightly.'],ans:1,exp:'AWS Config\'s managed rule "restricted-ssh" continuously evaluates security groups and flags non-compliant ones. Config auto-remediation can trigger an SSM Automation document (e.g., AWS-DisablePublicAccessForSecurityGroup) immediately upon detection. This is fully automated with no human in the loop. GuardDuty detects active threats, not configuration compliance. Inspector checks OS/app vulnerabilities. Trusted Advisor runs periodic checks and cannot trigger instant auto-remediation.',plain:'AWS Config can detect a bad security group rule and auto-fix it with an SSM Automation document — no human needed.'},
{id:109,domain:'secure',sub:'Organizations',q:'A company uses AWS Organizations and wants to prevent any account — including account administrators — from disabling CloudTrail. Which mechanism enforces this?',opts:['Apply an IAM permissions boundary to every IAM role in every account.','Create an SCP at the Organization root denying cloudtrail:StopLogging and cloudtrail:DeleteTrail.','Enable AWS Config in every account to detect and alert on CloudTrail disablement.','Use CloudWatch Alarms in each account to alert when CloudTrail stops.'],ans:1,exp:'Service Control Policies (SCPs) set the maximum effective permissions for all principals in every account in the OU/organization — overriding even account-level administrator permissions. An SCP deny at the root OU prevents any IAM user or role from calling StopLogging or DeleteTrail regardless of their IAM policies. Permission boundaries only limit individual IAM entities, not account administrators with full IAM control. Config and CloudWatch detect violations but cannot prevent them.',plain:'An SCP at the org root can block even account admins from disabling CloudTrail.'},
{id:110,domain:'secure',sub:'S3',q:'A financial services company must store S3 objects so they cannot be deleted or overwritten for 7 years to comply with SEC Rule 17a-4. Which S3 feature enforces this in WORM (Write-Once-Read-Many) mode?',opts:['S3 Versioning with MFA Delete enabled.','S3 Object Lock in Compliance mode with a 7-year retention period.','S3 Replication to a separate account with object immutability.','S3 Lifecycle policy that prevents transitions for 7 years.'],ans:1,exp:'S3 Object Lock Compliance mode prevents any user — including the root account — from deleting or overwriting objects until the retention period expires. This satisfies SEC Rule 17a-4 and similar WORM requirements. Versioning with MFA Delete adds extra friction for deletion but a user with the MFA device can still delete objects. Replication doesn\'t prevent deletion at the source. Lifecycle policies manage transitions/expirations but can\'t prevent manual deletion.',plain:'S3 Object Lock in Compliance mode makes objects truly undeletable until the retention period ends — even for the root user.'},
{id:111,domain:'secure',sub:'IAM',q:'A developer accidentally committed AWS access keys to a public GitHub repository. What is the CORRECT order of immediate remediation steps?',opts:['1) Rotate the keys 2) Deactivate the old keys 3) Review CloudTrail for unauthorized activity 4) Remove keys from GitHub','1) Deactivate/delete the exposed keys immediately 2) Review CloudTrail for unauthorized API calls 3) Rotate keys or create new ones 4) Remove keys from the repository history','1) Remove keys from GitHub 2) Rotate the keys 3) Review CloudTrail 4) Enable MFA','1) Enable MFA 2) Rotate the keys 3) Delete the old keys 4) Review CloudTrail'],ans:1,exp:'Speed is critical — keys are scraped from public repos within seconds. The correct priority: (1) Immediately deactivate/delete the exposed keys to stop any ongoing abuse; (2) Review CloudTrail to identify any unauthorized activity that already occurred; (3) Issue new credentials; (4) Clean the git history (git-filter-branch or BFG Repo Cleaner). Removing from GitHub first delays the most impactful action: revoking access. Keys in public repos are often already compromised before the developer notices.',plain:'If keys leak, deactivate them immediately first, then check CloudTrail for damage, then rotate, then clean up the source.'},
{id:112,domain:'secure',sub:'Network',q:'A company\'s VPC has public and private subnets. EC2 instances in private subnets need outbound internet access for software updates but must not be reachable from the internet. Which component provides this?',opts:['Internet Gateway attached to the private subnet route table.','NAT Gateway in a public subnet with a route from the private subnet.','Virtual Private Gateway with an internet route.','Egress-Only Internet Gateway for IPv4 traffic.'],ans:1,exp:'A NAT Gateway (placed in a public subnet with an Elastic IP) allows instances in private subnets to initiate outbound connections to the internet while blocking any inbound connections initiated from the internet. The private subnet route table has a default route (0.0.0.0/0) pointing to the NAT Gateway. An Internet Gateway enables bidirectional internet access — not appropriate for private subnets. Egress-Only Internet Gateway is for IPv6 only. Virtual Private Gateways handle VPN connectivity, not general internet access.',plain:'A NAT Gateway lets private instances reach the internet outbound only, with nothing able to reach in.'},

{id:113,domain:'resilient',sub:'Route 53',q:'A company has a primary web application in us-east-1 and a standby in us-west-2. The standby should only receive traffic if the primary is unhealthy, with DNS-based failover happening automatically within minutes. Which Route 53 configuration is correct?',opts:['Weighted routing with 90/10 weight split between primary and standby.','Failover routing — primary record with a health check; secondary record as failover target.','Latency-based routing — Route 53 automatically routes to the fastest Region.','Geolocation routing with us-east-1 as the default and us-west-2 for non-US users.'],ans:1,exp:'Route 53 Failover routing monitors the primary endpoint via health checks and automatically updates DNS responses to the secondary record when the primary is unhealthy. With a low TTL (e.g., 60 seconds), failover completes within 1-2 minutes. Weighted routing doesn\'t fail over automatically — you must change weights manually. Latency routing picks the lowest-latency endpoint regardless of health. Geolocation routing isn\'t a failover mechanism.',plain:'Route 53 Failover routing uses a health check to automatically swap to the standby region within minutes.'},
{id:114,domain:'resilient',sub:'Route 53',q:'A global SaaS application serves users in North America, Europe, and Asia. The company wants to route each user to the AWS Region with the LOWEST measured network latency, not based on geographic location. Which routing policy achieves this?',opts:['Geolocation routing','Geoproximity routing with no bias','Latency-based routing','Multivalue answer routing'],ans:2,exp:'Latency-based routing uses real-time measurements of round-trip time between Route 53 and each configured region endpoint, directing each user to the region delivering the lowest latency. This is based on actual network conditions — a user in Southeast Asia may get better latency from us-west-2 than ap-southeast-1 depending on ISP routing. Geolocation routing uses the geographic origin of the DNS query (IP-to-location mapping), which doesn\'t reflect actual network performance. Geoproximity uses physical distance with optional bias adjustments.',plain:'Latency-based routing sends each user to whichever region actually measures the fastest for them right now.'},
{id:115,domain:'resilient',sub:'ELB',q:'An IoT platform requires a load balancer that supports the MQTT protocol (TCP port 1883), can handle millions of simultaneous connections, and must provide a static IP address per Availability Zone for firewall whitelisting. Which load balancer is correct?',opts:['Application Load Balancer (ALB)','Classic Load Balancer (CLB)','Network Load Balancer (NLB)','Gateway Load Balancer (GWLB)'],ans:2,exp:'Network Load Balancer operates at Layer 4 (TCP/UDP/TLS) — supporting any TCP-based protocol including MQTT. NLB provides one static Elastic IP per AZ (or uses an Elastic IP you bring), making firewall whitelisting straightforward. NLB handles millions of connections per second with ultra-low latency. ALB is Layer 7 HTTP/HTTPS only. CLB is legacy, doesn\'t scale to millions of connections, and has dynamic IPs. GWLB is for transparent traffic inspection, not application load balancing.',plain:'NLB is the Layer-4 load balancer for huge connection counts and static per-AZ IPs, fitting any TCP protocol like MQTT.'},
{id:116,domain:'resilient',sub:'RDS',q:'An RDS MySQL Multi-AZ instance experiences an AZ failure. Which statement CORRECTLY describes the failover?',opts:['A new DB instance is restored from the most recent automated snapshot; takes 20-30 minutes.','The read replica in another AZ is promoted to primary automatically within seconds.','The CNAME DNS endpoint is flipped to the synchronous standby; typically completes in 1-2 minutes.','The application must be restarted pointing to the standby instance\'s separate endpoint.'],ans:2,exp:'RDS Multi-AZ maintains a synchronous standby replica in a different AZ. On primary failure, AWS automatically promotes the standby and updates the DB instance CNAME DNS record to point to the new primary. Applications reconnecting to the same endpoint DNS name automatically reach the new primary — no connection string changes needed. Failover typically takes 60-120 seconds. Read replicas are asynchronous and are NOT part of Multi-AZ automatic failover. Snapshot restore would take many minutes and requires manual action.',plain:'On an AZ failure, Multi-AZ RDS flips the same DNS endpoint to the synchronous standby — apps don\'t need new connection info.'},
{id:117,domain:'resilient',sub:'Aurora',q:'A read-heavy OLTP application needs a relational database that can survive losing an entire Availability Zone without data loss, automatically fail over within 30 seconds, and serve read traffic from multiple endpoints. Which is the BEST solution?',opts:['RDS MySQL Multi-AZ with 5 read replicas','Amazon Aurora with Aurora Replicas across 3 AZs','RDS PostgreSQL with synchronous Multi-AZ standby','Amazon Redshift with Multi-AZ enabled'],ans:1,exp:'Aurora stores 6 copies of data across 3 AZs (2 per AZ), making it resilient to loss of an entire AZ with zero data loss. Aurora Replicas (up to 15) can be promoted to primary in <30 seconds and serve read traffic via the Aurora Reader Endpoint — ideal for read-heavy workloads. Standard RDS Multi-AZ has one non-readable standby and slower failover. Redshift is a data warehouse (OLAP), not OLTP. Aurora provides both the HA and read-scaling requirements.',plain:'Aurora\'s multi-AZ storage and fast-failover replicas survive a full AZ loss with zero data loss.'},
{id:118,domain:'resilient',sub:'DynamoDB',q:'A gaming company needs a database that accepts writes from players in North America, Europe, and Asia simultaneously, replicating changes to all regions within seconds with no single primary. Which capability enables this?',opts:['DynamoDB Streams with Lambda cross-region replication','DynamoDB Global Tables with multi-active replication','DynamoDB DAX in each region','DynamoDB with cross-region read replicas'],ans:1,exp:'DynamoDB Global Tables provide fully managed multi-region, multi-active (every replica accepts reads and writes) replication. Changes propagate to all replica regions typically within one second. DynamoDB Streams + Lambda can replicate data across regions but requires custom code, is eventually consistent, and can cause write conflicts in a multi-active setup. DAX is an in-memory cache, not a replication feature. DynamoDB has no native "read replica" feature — Global Tables are the replication mechanism.',plain:'DynamoDB Global Tables let multiple regions accept writes simultaneously and sync within about a second.'},
{id:119,domain:'resilient',sub:'S3',q:'Application deployment artifacts are uploaded to an S3 bucket in us-east-1 and must be available in eu-west-1 within minutes of upload, automatically, without developer action. What is the MOST operationally efficient solution?',opts:['A Lambda function copies new objects to eu-west-1 on S3 PutObject events.','Enable S3 Cross-Region Replication (CRR) from the source bucket to a destination bucket in eu-west-1.','Run an AWS CLI s3 sync job every 2 minutes via EventBridge Scheduler.','Use S3 Multi-Region Access Points to serve objects from the closest region.'],ans:1,exp:'S3 Cross-Region Replication automatically replicates objects to the destination bucket in another region within minutes — no code, no scheduling, no developer action after initial setup. It supports replication of all objects, specific prefixes, or tag-filtered objects. Lambda-based copying requires maintaining custom code. Scheduled sync has latency up to the sync interval. Multi-Region Access Points route requests to existing data, they don\'t replicate it.',plain:'S3 Cross-Region Replication automatically copies new objects to another region within minutes, with no extra code.'},
{id:120,domain:'resilient',sub:'SQS',q:'An SQS consumer processes messages that take up to 10 minutes. Occasionally the consumer crashes mid-processing, and the message is re-delivered and processed twice, causing data duplication. What is the CORRECT fix?',opts:['Switch to a FIFO queue with content-based deduplication enabled.','Increase the SQS visibility timeout to more than 10 minutes (e.g., 12 minutes).','Enable SQS long polling with a 20-second wait time.','Increase the message retention period to 24 hours.'],ans:1,exp:'When a consumer receives a message, SQS hides it for the visibility timeout. If the consumer crashes and doesn\'t delete the message before the timeout expires, SQS re-delivers it. Setting the timeout to 12 minutes (greater than the 10-minute max processing time) ensures the message stays invisible long enough for normal processing to complete. FIFO with deduplication prevents duplicate sends to the queue but doesn\'t help with consumer crash re-delivery. Long polling reduces empty receives. Retention period controls how long unprocessed messages live in the queue.',plain:'Raise the SQS visibility timeout above your max processing time so messages aren\'t redelivered while still being worked on.'},
{id:121,domain:'resilient',sub:'Disaster Recovery',q:'A company\'s RPO is 1 hour and RTO is 4 hours. Their current backup-and-restore approach takes 8 hours to restore (violates RTO). Which DR strategy meets both targets at the LOWEST additional cost?',opts:['Multi-site active/active — run full production in both primary and DR regions.','Warm standby — keep a scaled-down but running version of production in the DR region.','Pilot light — replicate only the core database to DR; pre-configure (but don\'t run) application servers.','Increase backup frequency to every 30 minutes and optimize restore automation.'],ans:2,exp:'Pilot light keeps only critical components (the database) continuously replicated/running in the DR region. Application servers are pre-configured and can be launched within 1-2 hours on failure — meeting the 4-hour RTO. Database replication (e.g., RDS Multi-Region read replica) keeps data lag well under 1 hour (meeting RPO). Pilot light costs far less than warm standby or active/active. Optimized backup/restore is still unlikely to achieve 4-hour RTO reliably for complex environments.',plain:'Pilot light keeps just the database live in the DR region and meets hours-level RTO/RPO targets cheaply.'},
{id:122,domain:'resilient',sub:'CloudFront',q:'A CloudFront distribution serves an S3 website in us-east-1. During an S3 regional outage, CloudFront returns 503 errors. What feature enables automatic failover to a secondary S3 bucket in us-west-2?',opts:['CloudFront Origin Shield placed in us-west-2','CloudFront Origin Failover with an origin group containing primary and secondary S3 origins','CloudFront field-level encryption with a secondary origin fallback','CloudFront signed URLs pointing to the secondary bucket'],ans:1,exp:'CloudFront Origin Failover lets you configure an origin group with a primary and secondary origin. When the primary origin returns a 5xx error or times out, CloudFront automatically retries the request against the secondary origin — transparently to the user. Using an S3 bucket backed by CRR in us-west-2 as the secondary ensures the content is current. Origin Shield reduces origin load but provides no failover. Field-level encryption is a data protection feature. Signed URLs control access, not failover.',plain:'CloudFront Origin Failover automatically retries a backup origin if the primary one starts erroring.'},
{id:123,domain:'resilient',sub:'ELB',q:'A company deploys application updates using blue/green deployment with an ALB. They want to gradually shift 10% of traffic to the new version, monitor for errors, and roll back automatically if error rates exceed 5%. What is the MOST automated approach?',opts:['Manually adjust Route 53 weighted routing records between blue and green target groups.','Use ALB weighted target groups integrated with AWS CodeDeploy for automated canary deployment and rollback.','Modify the ALB listener rules manually during each deployment.','Use CloudFront with two origins and adjust origin weights.'],ans:1,exp:'ALB weighted target groups allow sending a configurable percentage of traffic to each target group. AWS CodeDeploy integrates natively with ALB for blue/green deployments, supports canary and linear traffic-shifting schedules, and automatically rolls back when a configured CloudWatch alarm (e.g., error rate > 5%) triggers. Route 53 weighted routing has DNS propagation delays making precise, fast rollbacks unreliable. Manual listener rule changes require human intervention. CloudFront is a CDN, not designed for application deployment orchestration.',plain:'ALB weighted target groups plus CodeDeploy give you automated, gradual canary rollouts with auto-rollback on errors.'},
{id:124,domain:'resilient',sub:'Messaging',q:'An order service must publish events so that three downstream services (inventory, shipping, billing) each independently receive every order event. Each service needs its own retry buffer and must process events independently. Which architecture achieves this fan-out?',opts:['One SQS standard queue that all three services poll.','One SNS topic with three SQS queues subscribed — one per downstream service.','One Kinesis Data Stream with three separate consumer applications.','Three separate SQS queues; the order service writes to all three.'],ans:1,exp:'SNS fan-out: the order service publishes one message to an SNS topic; SNS delivers a copy to each subscribed SQS queue. Each downstream service polls its own queue, giving each independent buffering, retry logic, and failure isolation. A single SQS queue would deliver each message to only one of the competing consumers (not all three). Kinesis works but requires consumers to manage shard offsets and is better suited to streaming/analytics. Writing to three queues from the order service couples it to downstream infrastructure.',plain:'Fan out one event to three independent SQS queues via an SNS topic, so each service gets its own copy and buffer.'},
{id:125,domain:'resilient',sub:'Auto Scaling',q:'A web application experiences a predictable surge in traffic every weekday at 9 AM when users log in. EC2 instances take 7 minutes to launch and pass health checks. Users experience slow responses at exactly 9 AM despite having step scaling configured. What is the MOST effective fix?',opts:['Use target tracking scaling with a lower CPU threshold to trigger scaling sooner.','Configure a scheduled scaling action to increase capacity at 8:50 AM on weekdays.','Increase the default cooldown period to allow more instances to launch before the next policy fires.','Switch to larger EC2 instance types so each instance handles more traffic.'],ans:1,exp:'Scheduled scaling pre-emptively adds capacity at 8:50 AM (10 minutes before the spike), giving instances their 7-minute launch time before the 9 AM traffic arrives. Step and target tracking scaling are reactive — they trigger only after CPU or request count rises, meaning instances launch after the spike has already degraded performance. Larger instances help with per-instance capacity but don\'t solve the timing problem. Cooldown adjustments affect how quickly subsequent scaling occurs, not pre-spike capacity.',plain:'Scheduled scaling adds capacity before a predictable traffic spike, instead of reacting after it already started.'},
{id:126,domain:'resilient',sub:'Backup',q:'A company runs RDS, DynamoDB tables, and EFS file systems across multiple AWS accounts. Compliance requires centrally managed backup policies, 90-day retention, and copies stored in a separate, isolated AWS account. Which service fulfills all requirements?',opts:['Individual service backup features (RDS automated backups, DynamoDB PITR, EFS backup policy)','AWS Backup with cross-account copy and backup vaults in the destination account','AWS DataSync with scheduled daily replication to the backup account','AWS DMS replicating all databases to the backup account continuously'],ans:1,exp:'AWS Backup provides centralized backup management for RDS, DynamoDB, EFS, EC2, S3, and other services via backup plans defining schedules and retention. Cross-account copy (enabled via AWS Organizations integration) automatically sends backup copies to an isolated backup account\'s vault. Per-service backup features lack central management and cross-account isolation. DataSync is a file/data migration service, not a backup manager. DMS is for database migration/replication, not backup orchestration with retention policies.',plain:'AWS Backup centrally manages schedules, retention, and cross-account copies for all your different AWS data stores.'},
// ── Performing ────────────────────────────────────────────────────────────────
{id:127,domain:'performing',sub:'EC2',q:'An HPC cluster running tightly-coupled MPI simulations requires sub-millisecond inter-node latency and maximum network bandwidth between EC2 instances. Which placement group type is MOST appropriate?',opts:['Spread placement group — distributes instances across distinct hardware','Partition placement group — groups of instances in isolated partitions','Cluster placement group — instances on the same physical hardware rack','No placement group — AWS optimizes placement automatically'],ans:2,exp:'Cluster placement groups pack instances onto the same underlying hardware rack within a single AZ, enabling 100 Gbps network throughput (with ENA and EFA) and single-digit microsecond latency — essential for MPI. Spread placement groups limit 7 instances per AZ per group and maximize fault isolation (opposite of what HPC needs). Partition groups isolate large distributed workloads across fault domains (for HDFS/Cassandra, not MPI). Default placement makes no guarantees about network proximity.',plain:'Cluster placement groups give the lowest latency and highest bandwidth for tightly-coupled HPC workloads.'},
{id:128,domain:'performing',sub:'Storage',q:'A machine learning training job running on hundreds of EC2 instances requires a shared POSIX file system with sub-millisecond latency, hundreds of GB/s aggregate throughput, and native integration with data stored in S3. Which storage service is MOST appropriate?',opts:['Amazon EFS in Max I/O performance mode','Amazon FSx for Lustre','Amazon EBS Multi-Attach io2 volumes','S3 mounted via s3fs-fuse on each instance'],ans:1,exp:'FSx for Lustre is a fully managed, high-performance parallel file system purpose-built for compute-intensive workloads. It delivers sub-millisecond latencies, hundreds of GB/s aggregate throughput, scales to petabytes, and natively links to S3 (data can be lazily loaded from S3 or written back after processing). EFS Max I/O mode has higher metadata latency and lower per-file throughput — insufficient for demanding ML training. EBS Multi-Attach is limited to 16 instances and one AZ. s3fs is FUSE-based with high latency, not suitable for performance-sensitive training.',plain:'FSx for Lustre is the high-throughput shared file system built for massive parallel ML training jobs, with native S3 integration.'},
{id:129,domain:'performing',sub:'Lambda',q:'A Java-based Lambda function has cold start latencies of 3-4 seconds that are unacceptable for a customer-facing API. The function must remain Java (cannot be rewritten). Traffic is unpredictable with frequent cold starts. Which approach MOST effectively reduces cold start latency?',opts:['Increase the function\'s allocated memory to the maximum (10,240 MB).','Enable Lambda Provisioned Concurrency for the function.','Deploy the function to Lambda@Edge closer to users.','Use Lambda SnapStart for the Java runtime.'],ans:3,exp:'Lambda SnapStart (available for Java 11, 17, and 21) takes a snapshot of the fully initialized execution environment after the init phase completes, then restores execution environments from that snapshot — bypassing the JVM startup and class-loading cost that makes Java cold starts slow. This can reduce cold start latency by up to 90%. Provisioned Concurrency pre-initializes environments but costs money continuously even when idle. Increasing memory speeds up execution but not initialization. Lambda@Edge reduces network latency, not cold start time.',plain:'Lambda SnapStart skips the slow JVM startup by restoring from a pre-warmed snapshot — huge cold-start savings for Java.'},
{id:130,domain:'performing',sub:'API Gateway',q:'A REST API on API Gateway and Lambda handles 1 million requests per day. Many requests query the same product catalog data that changes only once per hour. Lambda timeouts during traffic spikes cause 502 errors. Which solution reduces backend load with the LEAST application change?',opts:['Add an SQS queue between API Gateway and Lambda to buffer spikes.','Enable API Gateway caching with a 1-hour TTL for the product catalog endpoints.','Increase Lambda reserved concurrency to 10,000.','Deploy ElastiCache for Redis and update Lambda to check cache before querying the database.'],ans:1,exp:'API Gateway caching stores endpoint responses in a dedicated cache (TTL up to 1 hour). Repeated requests for the same resource are served from cache without invoking Lambda or hitting the database — dramatically reducing backend load during spikes. Zero application code changes required. SQS between API Gateway and Lambda makes the API asynchronous (no immediate response), breaking REST semantics. Increasing Lambda concurrency doesn\'t reduce database load. ElastiCache requires Lambda code changes.',plain:'API Gateway caching serves repeated requests straight from cache, cutting Lambda and database load with zero code changes.'},
{id:131,domain:'performing',sub:'CloudFront',q:'CloudFront serves a product API where responses vary based on the Accept-Language and Currency HTTP headers. Currently all requests share one cache entry. How should CloudFront be configured to cache separate responses per language/currency combination?',opts:['Forward all headers to the origin by adding them to the Origin Request Policy.','Add Accept-Language and Currency to the CloudFront Cache Policy as cache key headers.','Set the default TTL to 0 to disable caching and always forward to origin.','Use Lambda@Edge to strip the headers before caching.'],ans:1,exp:'CloudFront cache keys determine which requests get different cached responses. Adding Accept-Language and Currency to the Cache Policy\'s header-based cache key causes CloudFront to maintain separate cache entries for each combination — serving the correct localized response from cache. Origin Request Policies control which headers are forwarded to origin, but adding headers there does NOT change the cache key (a common confusion). Setting TTL to 0 eliminates caching entirely. Lambda@Edge stripping headers would lose the localization data.',plain:'Add the headers that vary the response into the CloudFront cache key so each variant gets its own cached copy.'},
{id:132,domain:'performing',sub:'Database',q:'An RDS PostgreSQL primary instance handles 15,000 read queries/second and 300 write queries/second. The instance is CPU-bound on reads. The application cannot be modified to use a caching layer. What is the MOST effective way to scale reads?',opts:['Enable RDS Multi-AZ — distribute read traffic to the standby instance.','Migrate to Amazon Aurora PostgreSQL and distribute reads across up to 15 Aurora Replicas.','Increase the RDS instance to the largest available class.','Add Amazon ElastiCache for PostgreSQL as a read cache.'],ans:1,exp:'Aurora PostgreSQL supports up to 15 Aurora Replicas that share the same underlying storage (no replication lag for reads). The Aurora Reader Endpoint load-balances read connections across all replicas, horizontally scaling read capacity. RDS Multi-AZ standby is NOT readable — it exists only for failover. Increasing instance size vertically scales one node and is quickly exhausted. There is no "ElastiCache for PostgreSQL" — ElastiCache is a standalone cache requiring application changes.',plain:'Switching to Aurora lets you spread reads across up to 15 replicas with no replication lag, fixing a CPU-bound read bottleneck.'},
{id:133,domain:'performing',sub:'Kinesis',q:'An IoT platform ingests 40,000 sensor events per second, each ~1 KB. Events must be processed in real-time, kept in order per device, and must be replayable for up to 7 days. Which service is MOST appropriate?',opts:['Amazon SQS FIFO queue — guarantees ordering and exactly-once delivery.','Amazon Kinesis Data Streams — multiple shards with device ID as partition key.','Amazon SNS — pub/sub fan-out to multiple processors.','Amazon MSK (Managed Kafka) — highest throughput but maximum operational overhead.'],ans:1,exp:'Kinesis Data Streams: 40,000 events/sec × 1 KB = 40 MB/s, manageable with 40+ shards (1 MB/s each). Using device ID as the partition key routes each device\'s events to the same shard, preserving order. Data retention of up to 365 days (7 days default, extendable). Sub-second processing with Lambda or KCL. SQS FIFO has a limit of 3,000 msg/s per queue (insufficient for 40,000/sec) and no replay. SNS has no ordering or replay. MSK provides similar capabilities but requires cluster management.',plain:'Kinesis Data Streams, partitioned by device ID, keeps each device\'s events in order and replayable for real-time IoT ingestion.'},
{id:134,domain:'performing',sub:'DynamoDB',q:'A DynamoDB table has userId (partition key) and orderDate (sort key). An application must efficiently query all orders for a specific user within a date range, sorted by date. How should this query be structured?',opts:['Scan the table with a FilterExpression on userId and orderDate.','Query using KeyConditionExpression: userId = :id AND orderDate BETWEEN :start AND :end.','Create a GSI on orderDate and query by orderDate range.','Create an LSI on a secondary attribute and filter by userId.'],ans:1,exp:'Because userId is the partition key and orderDate is the sort key, a Query with KeyConditionExpression is the correct and efficient access pattern: userId = :id (partition) AND orderDate BETWEEN :start AND :end (sort key range). DynamoDB evaluates this server-side and returns results sorted by orderDate. A Scan reads the entire table (extremely inefficient at scale). A GSI on orderDate only would scatter orders across all partition key values — you couldn\'t efficiently filter by userId. The base table design already matches this exact access pattern.',plain:'Query using both the partition key and a sort-key range — that\'s exactly what DynamoDB\'s key schema is designed for.'},
{id:135,domain:'performing',sub:'Compute',q:'A company runs 150 containerized microservices and wants to avoid all infrastructure management — no EC2 node provisioning, patching, or cluster scaling. Which container platform eliminates ALL infrastructure management?',opts:['Amazon ECS on EC2 with Cluster Auto Scaling.','Amazon EKS with managed node groups.','Amazon ECS or EKS with AWS Fargate.','Amazon EC2 Auto Scaling group with Docker installed.'],ans:2,exp:'AWS Fargate is a serverless compute engine for containers — you define the CPU and memory per task/pod, AWS manages all underlying compute infrastructure (no EC2 instances to provision, patch, or scale). Both ECS and EKS can use Fargate as the launch type. ECS on EC2 and EKS managed node groups both require managing EC2 instances (AMI updates, capacity scaling). EC2 Auto Scaling with Docker is entirely self-managed.',plain:'AWS Fargate removes all server management for containers — no EC2 nodes to patch or scale, for either ECS or EKS.'},
{id:136,domain:'performing',sub:'Networking',q:'A company has 12 VPCs across 4 AWS accounts that need full any-to-any connectivity plus access to an on-premises network via one AWS Direct Connect connection. What is the MOST scalable architecture?',opts:['VPC peering between every pair of VPCs (66 peering connections) plus Direct Connect per account.','AWS Transit Gateway connected to all VPCs, with Direct Connect using a Transit VIF attached to the Transit Gateway.','One shared services VPC peered to all others (hub and spoke) with Direct Connect attached.','AWS VPN to each VPC from on-premises with peering between VPCs.'],ans:1,exp:'AWS Transit Gateway acts as a regional any-to-any routing hub. Each VPC attaches once to the TGW (12 attachments); a Transit VIF on Direct Connect connects to the TGW, giving on-premises access to all VPCs through one connection. VPC peering requires O(n²) connections (12 VPCs = 66 peerings), doesn\'t support transitive routing, and doesn\'t simplify Direct Connect. Hub-and-spoke VPC peering doesn\'t scale, and peering also doesn\'t support transitive routing.',plain:'Transit Gateway is the scalable hub for connecting many VPCs and accounts together, plus Direct Connect, without a tangle of peering.'},
{id:137,domain:'performing',sub:'Analytics',q:'A data team needs to run ad-hoc SQL queries against 200 TB of compressed Parquet files stored in S3, without managing any servers or loading data into a separate database. Query results should appear in seconds to minutes. Which solution is MOST appropriate?',opts:['Load data into Amazon Redshift and run SQL queries.','Use Amazon Athena with an AWS Glue Data Catalog.','Launch an Amazon EMR cluster on-demand for each query session.','Use RDS PostgreSQL with S3 Foreign Data Wrapper.'],ans:1,exp:'Amazon Athena is a serverless interactive query service that runs SQL directly on S3 data using Presto. With Glue Data Catalog for schema management, it queries Parquet efficiently via columnar predicate pushdown — no data loading, no cluster management, pay per TB scanned. Redshift requires loading data and ongoing cluster management. EMR requires cluster provisioning (minutes of startup, ongoing management). RDS Foreign Data Wrapper has poor performance at 200 TB scale and still requires managing an RDS instance.',plain:'Athena runs SQL straight on S3 data using the Glue Catalog — no servers, no loading, pay per query.'},
{id:138,domain:'performing',sub:'ElastiCache',q:'A real-time gaming leaderboard needs to update player scores, retrieve the top 100 players by score in sorted order, and expire daily leaderboard data automatically via TTL. Which solution is BEST suited?',opts:['ElastiCache for Memcached with a hash map structure.','ElastiCache for Redis with sorted sets (ZSET) and key-level TTL.','ElastiCache for Redis with lists and LRANGE queries.','DynamoDB with a GSI on score for sorted reads.'],ans:1,exp:'Redis Sorted Sets (ZSET): ZADD sets or updates a player\'s score; ZREVRANGE retrieves the top N players in sorted order in O(log N + M) time. A TTL on the daily leaderboard key automatically expires it at midnight. This is the canonical Redis leaderboard pattern. Memcached doesn\'t support sorted data structures or key TTL. Redis Lists maintain insertion order, not score order. DynamoDB with a GSI works but adds read latency vs. in-memory and requires careful partition key design for hotspot avoidance.',plain:'Redis sorted sets are the classic way to build a real-time, automatically-sorted leaderboard with built-in expiry.'},
{id:139,domain:'performing',sub:'Compute',q:'A batch scientific simulation takes 60-90 minutes per job and can checkpoint its state every 5 minutes. The company wants to run hundreds of simulations simultaneously at minimum cost. Jobs are interruptible. Which EC2 strategy is MOST cost-effective?',opts:['On-Demand Instances with a large EC2 instance.','Reserved Instances (1-year) for the expected steady base workload.','Spot Instances using a Spot Fleet with checkpointing.','Dedicated Hosts to eliminate per-instance licensing costs.'],ans:2,exp:'Spot Instances offer up to 90% discount. With 5-minute checkpointing, a 2-minute Spot interruption notice means the job restarts losing at most ~7 minutes of work — acceptable for 60-90 minute simulations. Spot Fleet diversifies across instance types and AZs to minimize interruption probability. On-Demand at full price is unnecessary for interruptible batch. Reserved Instances are best for steady 24/7 workloads, not burst batch. Dedicated Hosts are for software licensing requirements, not cost optimization.',plain:'Spot Instances with frequent checkpointing are the cheapest option for big interruptible batch jobs.'},
