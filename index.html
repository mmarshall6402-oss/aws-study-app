<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── Storage ──────────────────────────────────────────────────────────────────
const S={
  get:(k)=>{try{const w=window.storage;return JSON.parse(w?w.getItem(k):localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>{try{const s=JSON.stringify(v);window.storage?window.storage.setItem(k,s):localStorage.setItem(k,s)}catch{}}
};
const useStore=(k,def)=>{
  const[v,sv]=useState(()=>{const s=S.get(k);return s!==null?s:def});
  const set=useCallback(x=>{const n=typeof x==='function'?x(v):x;sv(n);S.set(k,n)},[k,v]);
  return[v,set];
};

// ── Domain meta ──────────────────────────────────────────────────────────────
const DOMAINS={
  secure:{label:'Secure',color:'text-green-400',bg:'bg-green-400/10',border:'border-green-400/30',pct:30},
  resilient:{label:'Resilient',color:'text-cyan-400',bg:'bg-cyan-400/10',border:'border-cyan-400/30',pct:26},
  performing:{label:'Performing',color:'text-orange-400',bg:'bg-orange-400/10',border:'border-orange-400/30',pct:24},
  cost:{label:'Cost',color:'text-pink-400',bg:'bg-pink-400/10',border:'border-pink-400/30',pct:20},
};

// ── Question Bank (65 questions) ──────────────────────────────────────────────
const QUESTIONS=[
// ── SECURE (20) ──
{id:1,domain:'secure',sub:'IAM',q:'A company needs to grant an EC2 instance access to S3 without hardcoding credentials. What is the recommended approach?',opts:['Embed IAM access keys in user data','Attach an IAM role to the EC2 instance','Store credentials in AWS Secrets Manager and retrieve at startup','Create an IAM user and install the CLI'],ans:1,exp:'IAM roles attached to EC2 instances provide temporary, automatically-rotated credentials via the metadata service. No static keys needed.'},
{id:2,domain:'secure',sub:'IAM',q:'Which IAM policy type can restrict what services even the root account can use across an AWS Organization?',opts:['Permission Boundaries','Resource-based Policies','Service Control Policies (SCPs)','Session Policies'],ans:2,exp:'SCPs are org-level guardrails that restrict maximum permissions for all accounts in an OU, including the root user of member accounts.'},
{id:3,domain:'secure',sub:'Network',q:'A security team wants to block traffic from specific IP ranges at the subnet level. Which service should they use?',opts:['Security Groups','Network ACLs','AWS WAF','AWS Shield'],ans:1,exp:'NACLs are stateless, subnet-level firewalls that support explicit DENY rules. Security Groups are stateful and instance-level with no explicit deny.'},
{id:4,domain:'secure',sub:'Encryption',q:'A company wants to control when their KMS keys are rotated and keep key material in their own HSMs. Which key type should they use?',opts:['AWS managed keys','Customer managed keys','AWS owned keys','CloudHSM with automatic KMS integration'],ans:1,exp:'Customer managed keys give full control over rotation schedule, key policies, and optionally allow importing external key material.'},
{id:5,domain:'secure',sub:'S3',q:'An S3 bucket contains sensitive PII. A bucket policy allows public read. An IAM policy denies read. What is the effective permission for an IAM user?',opts:['Allow — bucket policy wins','Deny — explicit deny always wins','Allow — both must allow for access','Deny — default deny applies when policies conflict'],ans:1,exp:'An explicit Deny in any policy always overrides Allow. The IAM deny makes the effective permission Deny regardless of the bucket policy.'},
{id:6,domain:'secure',sub:'Detection',q:'Which service uses machine learning to detect unusual API call patterns and potential threats in AWS accounts?',opts:['AWS Inspector','AWS Macie','Amazon GuardDuty','AWS Security Hub'],ans:2,exp:'GuardDuty continuously analyzes CloudTrail, VPC Flow Logs, and DNS logs using ML to detect threats like credential compromise and crypto-mining.'},
{id:7,domain:'secure',sub:'Detection',q:'A company needs to automatically discover and protect sensitive data stored in S3 buckets. Which service does this?',opts:['GuardDuty','Macie','Inspector','Config'],ans:1,exp:'Macie uses ML to automatically discover, classify, and protect sensitive data (PII, financial data) in S3.'},
{id:8,domain:'secure',sub:'Secrets',q:'An application needs database credentials that automatically rotate every 30 days. Which service handles this?',opts:['AWS KMS','AWS Secrets Manager','SSM Parameter Store SecureString','AWS Certificate Manager'],ans:1,exp:'Secrets Manager natively integrates with RDS, Redshift, and DocumentDB to automatically rotate credentials on a schedule using Lambda.'},
{id:9,domain:'secure',sub:'Cognito',q:'A mobile app needs user sign-up/sign-in with social identity provider (Google) federation. Which Cognito component handles this?',opts:['Cognito Identity Pools','Cognito User Pools','Cognito Sync','AWS IAM Identity Center'],ans:1,exp:'User Pools handle authentication (sign-up/sign-in, MFA, social federation). Identity Pools handle authorization (swap tokens for AWS credentials).'},
{id:10,domain:'secure',sub:'Network',q:'A developer wants to access S3 from an EC2 instance in a private VPC without traffic leaving the AWS network. What should they use?',opts:['NAT Gateway','Internet Gateway','VPC Gateway Endpoint','VPC Interface Endpoint'],ans:2,exp:'Gateway Endpoints for S3 and DynamoDB route traffic through the AWS private network at no additional cost. Interface Endpoints use PrivateLink and incur hourly charges.'},
{id:11,domain:'secure',sub:'Compliance',q:'Which service records all API calls made in an AWS account for auditing and compliance?',opts:['CloudWatch Logs','AWS Config','CloudTrail','VPC Flow Logs'],ans:2,exp:'CloudTrail records who made API calls, when, from where, and what changed. It\'s the primary audit trail for AWS account activity.'},
{id:12,domain:'secure',sub:'Compliance',q:'A company must prove their AWS resources have been configured correctly continuously. Which service tracks resource configuration changes over time?',opts:['CloudTrail','AWS Config','Security Hub','Systems Manager'],ans:1,exp:'AWS Config records resource configurations and changes over time, enabling compliance auditing, security analysis, and change tracking.'},
{id:13,domain:'secure',sub:'IAM',q:'A contractor needs temporary access to an AWS account for 3 days. What is the most secure approach?',opts:['Create an IAM user, delete after 3 days','Share the root account credentials','Use IAM roles with STS AssumeRole and time-limited session','Add to an IAM group with expiring permissions'],ans:2,exp:'STS AssumeRole provides short-lived, temporary credentials without creating permanent IAM users. Sessions can be limited to hours.'},
{id:14,domain:'secure',sub:'Network',q:'Which AWS WAF feature can rate-limit requests from a single IP address?',opts:['Managed Rule Groups','IP Set Rules','Rate-based Rules','Geo Match Rules'],ans:2,exp:'WAF rate-based rules automatically block IPs that exceed a defined request threshold within a 5-minute window — effective against DDoS and brute-force.'},
{id:15,domain:'secure',sub:'Network',q:'An application needs protection against infrastructure-layer DDoS attacks at no extra cost. Which service provides this automatically?',opts:['AWS WAF','AWS Shield Standard','AWS Shield Advanced','AWS Firewall Manager'],ans:1,exp:'Shield Standard is automatically enabled for all AWS accounts at no cost and protects against common Layer 3/4 DDoS attacks.'},
{id:16,domain:'secure',sub:'Encryption',q:'Which service provides dedicated hardware security modules (HSMs) under your exclusive control for regulatory requirements?',opts:['AWS KMS','AWS CloudHSM','AWS Secrets Manager','AWS Certificate Manager'],ans:1,exp:'CloudHSM provides FIPS 140-2 Level 3 validated HSMs in a single-tenant environment. KMS is multi-tenant. CloudHSM gives you full key control.'},
{id:17,domain:'secure',sub:'IAM',q:'A role has a permission boundary that allows S3:* and EC2:*. The role\'s identity policy allows S3:*, EC2:*, and RDS:*. What can the role do?',opts:['S3, EC2, and RDS — identity policy wins','S3 and EC2 only — intersection of both policies','Nothing — conflicting policies cancel out','RDS only — most restrictive wins'],ans:1,exp:'Permission boundaries set the maximum permissions. The effective permission is the intersection: what both the identity policy AND boundary allow. RDS is outside the boundary.'},
{id:18,domain:'secure',sub:'S3',q:'How should you ensure all objects uploaded to S3 are encrypted at rest, even if the uploader forgets to specify encryption?',opts:['Enable bucket versioning','Set default encryption on the bucket','Use a bucket policy that denies unencrypted uploads','Both B and C'],ans:3,exp:'Default bucket encryption auto-encrypts objects missing encryption headers. A deny policy for s3:x-amz-server-side-encryption ensures clients can\'t bypass it.'},
{id:19,domain:'secure',sub:'Network',q:'A company runs a web app behind an ALB. They want to block SQL injection attacks. What should they implement?',opts:['Security Groups with deep packet inspection','AWS WAF with SQL injection match rules','Network ACLs with payload filtering','AWS Shield Advanced'],ans:1,exp:'WAF operates at Layer 7 and can inspect HTTP request bodies, headers, and query strings for SQL injection patterns. Security groups and NACLs are Layer 3/4 only.'},
{id:20,domain:'secure',sub:'IAM',q:'Which IAM feature lets you test what actions a principal can perform without actually making API calls?',opts:['IAM Access Analyzer','IAM Policy Simulator','AWS Trusted Advisor','CloudTrail Insights'],ans:1,exp:'IAM Policy Simulator lets you test the effect of IAM policies against specific actions and resources before applying them to production.'},

// ── RESILIENT (17) ──
{id:21,domain:'resilient',sub:'Multi-AZ',q:'An RDS MySQL instance fails. What happens with Multi-AZ enabled?',opts:['AWS sends an alert; manual failover required','Automatic failover to standby in same AZ','Automatic failover to standby in different AZ within ~1-2 min','Read replica is promoted automatically'],ans:2,exp:'RDS Multi-AZ maintains a synchronous standby in a different AZ. Failover is automatic, typically completing in 1-2 minutes with no data loss.'},
{id:22,domain:'resilient',sub:'Load Balancing',q:'Which load balancer type supports WebSockets and HTTP/2 natively and routes based on path and host?',opts:['Classic Load Balancer','Network Load Balancer','Application Load Balancer','Gateway Load Balancer'],ans:2,exp:'ALB is Layer 7 and supports path-based routing, host-based routing, HTTP/2, WebSockets, and gRPC. NLB is Layer 4, optimized for TCP/UDP performance.'},
{id:23,domain:'resilient',sub:'DNS',q:'A company needs DNS failover — primary region down should automatically route to backup. Which Route 53 policy?',opts:['Latency routing','Weighted routing','Failover routing','Geoproximity routing'],ans:2,exp:'Route 53 Failover routing uses health checks. When the primary endpoint fails health checks, traffic is automatically routed to the secondary.'},
{id:24,domain:'resilient',sub:'Decoupling',q:'Two microservices are tightly coupled. If Service B slows down, Service A queues up and crashes. What AWS pattern solves this?',opts:['Direct Lambda invocation','SQS queue between services','API Gateway with throttling','ElastiCache caching layer'],ans:1,exp:'SQS decouples producers from consumers. Service A writes to the queue at its own pace; Service B reads at its own pace. Neither is blocked by the other.'},
{id:25,domain:'resilient',sub:'Auto Scaling',q:'An ASG\'s scale-out policy triggers but new instances are failing health checks. The ASG keeps launching and terminating instances. What is this called?',opts:['Scaling thrash','Instance refresh loop','Impaired status loop','Scaling oscillation'],ans:2,exp:'This is a scaling loop / thrash. Fix: investigate why instances fail health checks (bad AMI, misconfigured user data), set a cooldown, or use instance warmup.'},
{id:26,domain:'resilient',sub:'Database',q:'Which Aurora feature allows read scaling across up to 15 replicas with minimal replication lag using shared storage?',opts:['Multi-AZ replicas','Aurora Global Database','Aurora Read Replicas','RDS Read Replicas'],ans:2,exp:'Aurora Read Replicas share the same underlying storage volume as the primary, giving sub-10ms replication lag. Up to 15 replicas vs 5 for standard RDS.'},
{id:27,domain:'resilient',sub:'Messaging',q:'A notification system needs to fan-out a single message to SQS queues, Lambda functions, and email subscribers simultaneously. Which service?',opts:['SQS with multiple consumers','SNS with multiple subscriptions','EventBridge with multiple targets','Kinesis with multiple shards'],ans:1,exp:'SNS is a pub/sub service that pushes messages to multiple subscribers (SQS, Lambda, HTTP, email, SMS) simultaneously via a single publish call.'},
{id:28,domain:'resilient',sub:'S3',q:'A company needs their S3 data replicated to another region for disaster recovery. Objects must appear in the destination within minutes. Which feature?',opts:['S3 batch operations','S3 Cross-Region Replication (CRR)','S3 Transfer Acceleration','S3 Sync with Lambda'],ans:1,exp:'S3 CRR asynchronously replicates objects to a destination bucket in another region. Enable S3 Replication Time Control (RTC) for a 15-minute SLA.'},
{id:29,domain:'resilient',sub:'Disaster Recovery',q:'RTO is 4 hours, RPO is 1 hour. Which DR strategy is most cost-effective?',opts:['Multi-site active-active','Warm standby','Pilot light','Backup and restore'],ans:2,exp:'Pilot light keeps minimal core infrastructure running (DB replication, no app servers). Recovery involves scaling up. Good for RTO hours, RPO minutes. Warm standby is more expensive (scaled-down full copy).'},
{id:30,domain:'resilient',sub:'Auto Scaling',q:'You want new EC2 instances to pass health checks before receiving production traffic. Which ASG feature handles this?',opts:['Scaling cooldown','Instance warmup period','Health check grace period','Lifecycle hooks'],ans:3,exp:'Lifecycle hooks pause instance launch/termination transitions, allowing custom actions (run scripts, wait for app startup). Health check grace period prevents early termination during bootstrap.'},
{id:31,domain:'resilient',sub:'Global',q:'A gaming app needs sub-10ms global latency with automatic cross-region failover and static IP addresses. Which service?',opts:['CloudFront','Route 53 with latency routing','AWS Global Accelerator','ALB in multiple regions'],ans:2,exp:'Global Accelerator provides static Anycast IPs, routes via AWS backbone, and automatically reroutes traffic to healthy endpoints — ideal for non-HTTP and latency-critical apps.'},
{id:32,domain:'resilient',sub:'Database',q:'DynamoDB is experiencing hot partition issues. A single product ID is receiving 90% of reads. What\'s the best solution?',opts:['Increase read capacity units','Enable DynamoDB Streams','Add DAX caching layer','Change partition key to include a random suffix'],ans:2,exp:'DAX (DynamoDB Accelerator) is an in-memory cache that absorbs read spikes on hot items. Changing the partition key is a data migration. DAX requires no app code changes for read-through caching.'},
{id:33,domain:'resilient',sub:'Load Balancing',q:'An application requires ultra-low latency and handles millions of TCP connections per second. Which load balancer is optimal?',opts:['ALB','NLB','CLB','GLB'],ans:1,exp:'NLB operates at Layer 4 (TCP/UDP/TLS), handles millions of requests/second, preserves source IP, and supports static IPs/Elastic IPs — designed for extreme performance.'},
{id:34,domain:'resilient',sub:'Messaging',q:'An e-commerce app must process each order exactly once. Messages must not be processed by multiple consumers simultaneously. Which SQS queue type?',opts:['Standard Queue','FIFO Queue','Dead Letter Queue','Delay Queue'],ans:1,exp:'SQS FIFO guarantees exactly-once processing and ordering. Standard queues have at-least-once delivery and may deliver duplicates. FIFO has 3,000 msg/s with batching.'},
{id:35,domain:'resilient',sub:'Networking',q:'A company\'s primary on-premises connection is Direct Connect. They need a backup for when it fails. What is the most cost-effective backup?',opts:['Second Direct Connect connection','Site-to-Site VPN as backup','CloudFront private connectivity','AWS PrivateLink'],ans:1,exp:'A Site-to-Site VPN over the internet is the cost-effective backup. It automatically activates when Direct Connect fails. A second DX circuit is more reliable but expensive.'},
{id:36,domain:'resilient',sub:'Containers',q:'An ECS task needs to maintain exactly 3 running containers at all times, replacing any that fail. Which ECS launch configuration achieves this?',opts:['ECS Cluster with manual task placement','ECS Service with desired count=3','Scheduled ECS task','ECS task with restart policy'],ans:1,exp:'An ECS Service maintains the desired count of tasks, automatically replacing failed tasks and distributing across AZs when properly configured.'},
{id:37,domain:'resilient',sub:'Monitoring',q:'An application in us-east-1 should automatically fail over to us-west-2 when error rate exceeds 5%. Which combination achieves this?',opts:['CloudWatch Alarm + Route 53 health check + Failover routing','CloudTrail + SNS + Lambda','AWS Config + EventBridge + Lambda','X-Ray + ALB weighted routing'],ans:0,exp:'CloudWatch monitors metrics, triggers alarms, which can report to Route 53 health checks. Route 53 Failover routing then switches DNS to the secondary region.'},

// ── HIGH-PERFORMING (16) ──
{id:38,domain:'performing',sub:'Caching',q:'An application has a read-heavy relational database. Which caching solution supports complex data structures, Lua scripting, and pub/sub?',opts:['ElastiCache Memcached','ElastiCache Redis','DynamoDB DAX','CloudFront'],ans:1,exp:'ElastiCache Redis supports sorted sets, lists, pub/sub, Lua scripting, persistence, and clustering. Memcached is simpler, multithreaded, for pure key-value caching.'},
{id:39,domain:'performing',sub:'CDN',q:'A media company streams 4K video to global users. Origin is in us-east-1. How do you minimize latency and reduce origin load?',opts:['Deploy EC2 in every region','Use Route 53 latency routing to multiple ALBs','Use CloudFront with S3 origin and regional edge caches','Use Global Accelerator with S3'],ans:2,exp:'CloudFront caches content at 400+ edge locations globally. Regional Edge Caches sit between edges and origin, further reducing origin requests. Perfect for static/media content.'},
{id:40,domain:'performing',sub:'Database',q:'A table in DynamoDB is accessed via email address but queries need to search by last name. What\'s the most efficient solution?',opts:['Scan the full table and filter','Create a Global Secondary Index on last_name','Duplicate data into a second table','Use DynamoDB Streams to maintain a sorted list'],ans:1,exp:'GSIs allow queries on non-primary-key attributes. They have their own provisioned throughput and are eventually consistent. Much more efficient than full table scans.'},
{id:41,domain:'performing',sub:'Compute',q:'A batch job processes 100GB files nightly in 2 hours. It is cost-sensitive. Which compute option provides the best price/performance?',opts:['On-demand EC2 r5.4xlarge','Spot EC2 instances with checkpointing','Lambda with 10GB memory','Fargate Spot tasks'],ans:1,exp:'Spot instances offer up to 90% discount. With checkpointing (save state periodically), interruptions don\'t restart from zero. Ideal for fault-tolerant batch jobs.'},
{id:42,domain:'performing',sub:'Storage',q:'An application needs high-throughput block storage (10GB/s) for a distributed database that requires shared access from multiple EC2 instances simultaneously.',opts:['EBS gp3','EBS io2 Block Express','Amazon EFS','Amazon FSx for Lustre'],ans:3,exp:'FSx for Lustre is a high-performance parallel file system (sub-millisecond latency, hundreds of GB/s). EFS handles shared access but at lower throughput. EBS is single-instance only.'},
{id:43,domain:'performing',sub:'Networking',q:'Which EC2 feature allows instances to achieve network bandwidth up to 100 Gbps using SR-IOV?',opts:['Elastic Fabric Adapter','Enhanced Networking (ENA)','Placement Groups','Elastic Network Adapter'],ans:1,exp:'Enhanced Networking via ENA (Elastic Network Adapter) uses SR-IOV to provide high bandwidth, low latency, and lower CPU utilization. EFA is for HPC (MPI workloads).'},
{id:44,domain:'performing',sub:'Serverless',q:'A Lambda function processes images and takes 45 seconds. API Gateway times out at 29 seconds. How do you fix this?',opts:['Increase API Gateway timeout','Use async Lambda invocation via SQS + polling','Use Step Functions Express Workflow','Deploy to ECS instead'],ans:1,exp:'API Gateway has a hard 29-second timeout. For long-running tasks: use async pattern — API returns 202, client polls an SQS/DynamoDB result store, or use WebSocket API.'},
{id:45,domain:'performing',sub:'Analytics',q:'A company needs to query 5TB of log data in S3 using standard SQL without loading it into a database. Which service?',opts:['Amazon Redshift','Amazon RDS','Amazon Athena','Amazon EMR'],ans:2,exp:'Athena is serverless SQL-on-S3. Query directly using Presto/Trino. Pay per query ($5/TB scanned). Use Parquet + partitioning to reduce costs. No infrastructure to manage.'},
{id:46,domain:'performing',sub:'Database',q:'An RDS instance handles 10,000 read queries/second. Single instance is at 100% CPU. Which solution provides horizontal read scaling?',opts:['Upgrade to larger instance class','Enable Multi-AZ','Add read replicas','Enable automated backups'],ans:2,exp:'RDS Read Replicas use async replication to create up to 5 readable copies. Applications point read traffic to replica endpoints. Multi-AZ standby is NOT readable.'},
{id:47,domain:'performing',sub:'Streaming',q:'A real-time analytics pipeline needs to ingest 1 million events/second and replay data from the last 7 days. Which service?',opts:['SQS Standard','SQS FIFO','Amazon Kinesis Data Streams','Amazon MQ'],ans:2,exp:'Kinesis Data Streams supports real-time ingestion at massive scale with configurable retention (1-365 days) for replay. SQS doesn\'t support replay. Use enhanced fan-out for multiple consumers.'},
{id:48,domain:'performing',sub:'Storage',q:'An EC2 instance needs the highest possible IOPS for a transactional database. What EBS volume type should you choose?',opts:['gp2','gp3','io2 Block Express','st1'],ans:2,exp:'io2 Block Express delivers up to 256,000 IOPS and 4,000 MB/s throughput — the highest performance EBS volume. Use for latency-sensitive databases like Oracle, SQL Server, SAP.'},
{id:49,domain:'performing',sub:'Compute',q:'Which EC2 placement group type puts all instances on the same physical hardware for lowest possible network latency?',opts:['Spread placement group','Partition placement group','Cluster placement group','Availability Zone placement'],ans:2,exp:'Cluster placement groups pack instances on the same rack in a single AZ, enabling 10Gbps+ instance bandwidth and the lowest network latency. Risk: single rack failure.'},
{id:50,domain:'performing',sub:'CDN',q:'CloudFront is serving stale content after a deployment. How do you immediately invalidate cached objects?',opts:['Increase TTL then decrease it','Create a CloudFront invalidation for the paths','Delete and recreate the distribution','Use origin failover to bust the cache'],ans:1,exp:'CloudFront invalidations remove specific files from edge caches before their TTL expires. Use /* for all objects. First 1,000 paths/month are free; $0.005 per path after.'},
{id:51,domain:'performing',sub:'Database',q:'An Aurora cluster handles 50,000 writes/second. You need to add analytics queries without impacting write performance. Best approach?',opts:['Add Aurora read replicas','Enable Aurora Parallel Query','Create Aurora Global Database read region','Use Aurora Serverless v2'],ans:0,exp:'Aurora Read Replicas can handle analytics queries using the same shared storage. They add zero write overhead to the primary and can be independently scaled for query workloads.'},
{id:52,domain:'performing',sub:'Serverless',q:'A Lambda function is cold-starting 5 seconds on every invocation during business hours. How do you eliminate cold starts without changing code?',opts:['Increase Lambda memory to 10GB','Enable Provisioned Concurrency','Deploy in a VPC with NAT Gateway','Use Lambda@Edge'],ans:1,exp:'Provisioned Concurrency pre-initializes Lambda execution environments, eliminating cold starts entirely. It runs 24/7 so it has cost. Use auto scaling to adjust based on schedule.'},
{id:53,domain:'performing',sub:'Networking',q:'Users in Europe are experiencing 300ms latency to your us-east-1 ALB. Which service can reduce this to <50ms using the AWS backbone?',opts:['CloudFront','Route 53 latency routing','AWS Global Accelerator','VPC Peering'],ans:2,exp:'Global Accelerator routes user traffic to the nearest AWS edge location, then uses the AWS private backbone to reach the origin — significantly faster than public internet routing.'},

// ── COST-OPTIMIZED (12) ──
{id:54,domain:'cost',sub:'EC2 Pricing',q:'A production workload runs 24/7 for the next 3 years. Which purchasing option provides the maximum discount (~72%) vs on-demand?',opts:['Spot Instances','On-Demand Instances','3-year Reserved Instances (All Upfront)','Savings Plans (Compute, 3-year)'],ans:2,exp:'3-year All-Upfront Reserved Instances provide up to 72% discount. Savings Plans offer ~66% with more flexibility (switch instance family/region). Spot can be 90% off but isn\'t suitable for 24/7 prod.'},
{id:55,domain:'cost',sub:'S3',q:'Objects in S3 are accessed frequently for 30 days, then rarely for 90 days, then never. What lifecycle policy minimizes cost?',opts:['S3 Standard only','S3 Standard → S3-IA at 30 days → Glacier at 120 days','S3 Intelligent-Tiering only','S3 Standard → Glacier at 30 days'],ans:1,exp:'Standard for frequent access, S3-IA (30-day min) for infrequent, then Glacier for archival. Intelligent-Tiering has per-object monitoring costs that outweigh savings for predictable patterns.'},
{id:56,domain:'cost',sub:'Compute',q:'A development environment runs 8 hours/day, 5 days/week. Which EC2 option saves the most money vs on-demand?',opts:['Reserved Instances','Spot Instances','Scheduled Reserved Instances','On-Demand with auto stop/start'],ans:3,exp:'On-demand with Lambda/EventBridge scheduled stop/start means you pay only for ~1,680 hrs/year vs 8,760 for 24/7. Only pay for what runs. No RI commitment needed for variable schedules.'},
{id:57,domain:'cost',sub:'Data Transfer',q:'Which data transfer pattern incurs NO additional AWS charges?',opts:['EC2 to internet (egress)','EC2 in AZ-A to EC2 in AZ-B same region','EC2 to S3 in same region','S3 to CloudFront'],ans:2,exp:'EC2 → S3 in the same region is free. EC2 inter-AZ traffic costs $0.01/GB each way. CloudFront → internet is charged. S3 → CloudFront origin fetch is free.'},
{id:58,domain:'cost',sub:'Rightsizing',q:'An EC2 fleet consistently uses 15% CPU and 20% memory. What should you do?',opts:['Add more instances for headroom','Enable Auto Scaling to scale to zero','Use AWS Compute Optimizer to rightsizing recommendations','Switch to Reserved Instances immediately'],ans:2,exp:'Compute Optimizer uses ML to analyze CloudWatch metrics and recommends optimal instance types. Rightsizing before committing to RIs avoids locking into oversized instances.'},
{id:59,domain:'cost',sub:'Serverless',q:'A microservice handles 100 requests/day with variable load. Which compute model is most cost-efficient?',opts:['Always-on t3.nano EC2','Lambda (pay per invocation)','ECS Fargate with min 1 task','Lightsail instance'],ans:1,exp:'Lambda charges per invocation and duration. At 100 requests/day, cost is negligible (well within free tier). Any always-on instance costs ~$3-5/month minimum regardless of traffic.'},
{id:60,domain:'cost',sub:'S3',q:'A company stores 500TB of compliance data that must be retained 7 years but almost never accessed. What is the most cost-effective storage class?',opts:['S3 Standard','S3 Glacier Flexible Retrieval','S3 Glacier Deep Archive','S3 One Zone-IA'],ans:2,exp:'Glacier Deep Archive is $0.00099/GB/month (vs Standard $0.023/GB). For 500TB: ~$495/month vs ~$11,500/month. Retrieval within 12 hours. Minimum 180-day storage duration.'},
{id:61,domain:'cost',sub:'Networking',q:'A VPC has a NAT Gateway processing 10TB/month for EC2 instances accessing S3. How can you eliminate this cost?',opts:['Use NAT Instance instead','Use a VPC Gateway Endpoint for S3','Move EC2 to public subnets','Use CloudFront as proxy'],ans:1,exp:'S3 and DynamoDB Gateway Endpoints route traffic over the AWS private network — free, no NAT Gateway needed. NAT Gateway charges $0.045/GB processed, so 10TB = $450/month saved.'},
{id:62,domain:'cost',sub:'Database',q:'An RDS instance runs 2 hours/day for dev testing. It\'s provisioned 24/7. What change saves the most money?',opts:['Switch to smaller instance','Use RDS on Graviton processors','Automate stop/start on schedule','Convert to Aurora Serverless v2'],ans:2,exp:'RDS can be stopped for up to 7 days (restarts automatically after). Stop/start on schedule means paying only for storage when stopped vs full instance pricing. Aurora Serverless scales to zero but needs testing.'},
{id:63,domain:'cost',sub:'Savings Plans',q:'A company wants flexibility to change instance families and regions while still getting ~66% discount. Which option?',opts:['EC2 Instance Savings Plans','Compute Savings Plans','Convertible Reserved Instances','Standard Reserved Instances'],ans:1,exp:'Compute Savings Plans apply to EC2, Lambda, and Fargate across all regions, instance families, and OS types. EC2 Instance Savings Plans are cheaper but locked to a region and instance family.'},
{id:64,domain:'cost',sub:'Optimization',q:'Which AWS service provides automated cost optimization recommendations across compute, storage, and database services?',opts:['Cost Explorer','AWS Budgets','AWS Trusted Advisor','Compute Optimizer'],ans:2,exp:'Trusted Advisor checks across cost optimization, performance, security, fault tolerance, and service limits. It flags underutilized EC2, idle load balancers, unassociated EIPs, and more.'},
{id:65,domain:'cost',sub:'Storage',q:'S3 Intelligent-Tiering is monitoring 10 million small objects (each <128KB). Is this cost-effective?',opts:['Yes — it always saves money','No — monitoring fee ($0.0025/1000 objects) exceeds savings for small objects','Yes — small objects are automatically excluded','No — Intelligent-Tiering doesn\'t support small objects'],ans:1,exp:'Objects <128KB are never moved to cheaper tiers by Intelligent-Tiering, but still incur the $0.0025/1000 objects monitoring fee. For small objects, use S3 Standard or manually apply lifecycle rules.'},
// ── Official Practice Questions (AWS SAA-C03) ─────────────────────────────────
{id:66,domain:'resilient',sub:'ECS',q:'A solutions architect is designing a solution to run a containerized web application using Amazon ECS. The architect wants to minimize cost by running multiple copies of a task on each container instance, with task copies scaling as load changes. Which routing solution distributes the load to the multiple tasks?',opts:['Configure an ALB to distribute requests using path-based routing.','Configure an ALB to distribute requests using dynamic host port mapping.','Configure a Route 53 alias record set with a failover routing policy.','Configure a Route 53 alias record set with a weighted routing policy.'],ans:1,exp:'Dynamic host port mapping allows multiple tasks from the same ECS service to run on each container instance by assigning random host ports. The ALB dynamically routes to all registered tasks. Path-based routing separates services, not task copies of the same service.'},
{id:67,domain:'secure',sub:'VPC',q:'A company must configure a VPC so backend RDS instances cannot be accessed from the internet but are accessible from the app tier over a specified port only. Which action is correct? (Official Q2 — select any one correct answer)',opts:['Specify a DB subnet group containing only private subnets for the DB instances.','Attach an elastic network interface with a private IPv4 address to each DB instance.','Configure AWS Shield with the VPC and update route tables.','Configure Direct Connect on the database port between app and backend.','Add an inbound rule to the DB security group allowing the app tier SG over the DB port only.'],ans:[0,4],exp:'Two actions are correct: (A) Private subnets block all internet routing to DB instances. (E) A security group rule restricts DB access to only the application tier SG on the specific port. Together these enforce network isolation + least-privilege access control.'},
{id:68,domain:'resilient',sub:'Multi-AZ',q:'An application runs on two EC2 instances behind a Network Load Balancer in a single Availability Zone. What should a solutions architect do to make this architecture more highly available?',opts:['Create a new VPC with two EC2 instances in the same AZ. Create a VPC peering connection.','Replace the NLB with an ALB configured with instances in an Auto Scaling group.','Configure Route 53 health checks on the EC2 instances. Add a failover routing policy.','Place the EC2 instances in an ASG that extends across multiple AZs. Designate the ASG as the NLB target.'],ans:3,exp:'Extending the ASG across multiple AZs eliminates the single-AZ single point of failure. The NLB distributes traffic across AZs automatically. VPC peering doesn\'t move instances to another AZ. Swapping ALB for NLB provides no additional availability.'},
{id:69,domain:'resilient',sub:'Auto Scaling',q:'A reporting app on EC2 behind an ALB can take up to 15 minutes to respond to complex requests. Users receive 5xx errors during scale-in events while requests are being processed. What should the solutions architect do?',opts:['Enable sticky sessions for the target group.','Increase the instance size in the ALB target group.','Increase the Auto Scaling cooldown period to more than the longest response time.','Increase the deregistration delay timeout for the target group to greater than 900 seconds.'],ans:3,exp:'Deregistration delay (default 300s) allows in-flight requests to complete before an instance is deregistered. Increase it to >900 seconds (15 min) to cover the longest processing time. Cooldown affects when new scale actions trigger, not how gracefully instances are removed.'},
{id:70,domain:'performing',sub:'Messaging',q:'A migration requires sending email notifications to customers using only fully managed AWS services. Which solution meets this requirement?',opts:['Configure SQS with a standard queue.','Deploy an EC2 instance to host the application server.','Configure SQS with a FIFO queue.','Configure SNS with the protocol of email.'],ans:3,exp:'SNS is a fully managed pub/sub service that natively supports email as a subscription protocol, directly delivering messages to recipients. SQS is a queue and cannot push to external email endpoints. EC2 is not a managed service.'},
{id:71,domain:'cost',sub:'EC2 Pricing',q:'A company used EC2 Spot Instances for a demo that is now complete. A solutions architect must remove them to stop incurring costs. What should they do?',opts:['Cancel the Spot request only.','Terminate the Spot Instances only.','Cancel the Spot request, then terminate the Spot Instances.','Terminate the Spot Instances, then cancel the Spot request.'],ans:2,exp:'Order matters: cancel the Spot request FIRST to prevent AWS from relaunching new instances, THEN terminate existing ones. Terminating without cancelling the request causes new instances to launch. Cancelling without terminating leaves existing instances running and billing.'},
{id:72,domain:'performing',sub:'Compute',q:'A company needs to look up configuration details about how a Linux-based EC2 instance was launched. Which command gathers the system metadata?',opts:['curl http://169.254.169.254/latest/meta-data','curl http://localhost/latest/meta-data','curl http://254.169.254.169/latest/meta-data','curl http://192.168.0.1/latest/meta-data'],ans:0,exp:'The EC2 Instance Metadata Service (IMDS) is always available at the link-local address 169.254.169.254. This is a non-routable address reserved for this purpose. localhost resolves to 127.0.0.1 — metadata is not served there.'},
{id:73,domain:'performing',sub:'S3',q:'An on-premises application uploads log files of 20–30 GB to S3. The network experiences intermittent failures causing upload failures. Which solution resolves this with minimum operational overhead?',opts:['Enable S3 Transfer Acceleration.','Copy files to EC2 in the closest Region. Use S3 Lifecycle policies to copy to S3.','Use multipart upload to Amazon S3.','Upload to two Regions simultaneously. Enable Cross-Region Replication.'],ans:2,exp:'Multipart upload splits large files into independently uploaded parts (each 5MB–5GB). If a part fails, only that part is retried — not the whole file. Required for objects >5GB. Transfer Acceleration speeds up uploads but doesn\'t solve intermittent failure retry.'},
{id:74,domain:'performing',sub:'Storage',q:'A new database on EC2 requires a single EBS volume supporting up to 20,000 IOPS. Which EBS volume type meets this requirement?',opts:['Throughput Optimized HDD (st1)','Provisioned IOPS SSD (io1/io2)','General Purpose SSD (gp2/gp3)','Cold HDD (sc1)'],ans:1,exp:'io1/io2 Provisioned IOPS SSD supports up to 64,000 IOPS per volume. gp3 maxes at 16,000 IOPS (insufficient for 20,000). st1 and sc1 are HDD-backed, designed for throughput not high IOPS — unsuitable for transactional databases.'},
{id:75,domain:'resilient',sub:'Auto Scaling',q:'An image-processing app uses SQS + EC2 consumers. Processing can take up to 20 minutes. When volume spikes, the SQS backlog grows and users report delays. Which solution improves performance per cloud best practices?',opts:['Purchase Dedicated Instances for peak demand.','Convert SQS standard queue to FIFO and increase visibility timeout.','Configure Lambda as the SQS consumer.','Create an ASG of EC2 consumer instances. Configure the ASG to scale based on the ApproximateNumberOfMessages CloudWatch metric.'],ans:3,exp:'Scaling an ASG on SQS queue depth (ApproximateNumberOfMessages) is the canonical AWS auto-scaling pattern. Lambda is eliminated because processing can take 20 min — Lambda\'s max timeout is 15 min. Dedicated Instances don\'t auto-scale.'},
{id:76,domain:'performing',sub:'Database',q:'A chat app stores messages in a key-value data model. Groups of users read messages repeatedly. The solution must handle a high read rate and deliver messages with microsecond latency. Which database solution meets this?',opts:['Amazon Aurora with Aurora Replicas','Amazon DynamoDB with DynamoDB Accelerator (DAX)','Amazon Aurora with ElastiCache for Memcached','Amazon Neptune with ElastiCache for Memcached'],ans:1,exp:'DynamoDB is a managed NoSQL database that natively supports key-value data models. DAX is an in-memory cache delivering microsecond read latency without application changes. Aurora is a relational database (not key-value) and cannot consistently achieve microsecond latency.'},
{id:77,domain:'secure',sub:'IAM',q:'A security team in a separate AWS account needs read-only access to production account settings during periodic audits. Which solution follows AWS security best practices?',opts:['Create IAM users for each security team member in the production account with required permissions.','Create an IAM role in the production account with required permissions. Add the security team account to the trust policy.','Create one IAM user in production with admin privileges for the security team to share.','Create IAM users in production for the security team. Attach permissions to an IAM group.'],ans:1,exp:'Cross-account IAM roles are the AWS security best practice. The role in the production account has least-privilege permissions. The trust policy allows the security account to assume the role via STS. No permanent IAM users or long-term credentials are created in production.'},
{id:78,domain:'cost',sub:'Serverless',q:'A new application needs an application layer and an OLTP relational database. It must be always available but will have long idle periods. Which solution is MOST cost-effective?',opts:['ECS on Fargate with Aurora Serverless for the database.','EC2 burstable instances with Amazon Redshift for the database.','EC2 + MySQL via CloudFormation — delete the stack during idle periods.','EC2 ASG behind ALB with RDS for MySQL.'],ans:0,exp:'Fargate charges only for running tasks — idle periods cost nothing. Aurora Serverless v2 scales to zero (or near-zero) during inactivity. Together, compute and database costs are near-zero when idle. Redshift is OLAP, not OLTP. Deleting the CF stack loses database data.'},
{id:79,domain:'cost',sub:'S3',q:'A company must retain data for at least 5 years. Data is rarely accessed after storage but must be accessible within 2 hours. Which solution is MOST cost-effective?',opts:['Store in EFS. Access via AWS Direct Connect.','Store in S3. Use a Lifecycle policy to transition to S3 Glacier.','Store in EBS. Create snapshots stored in S3.','Store in S3. Use a Lifecycle policy to transition to S3 Standard-IA.'],ans:1,exp:'S3 Glacier Flexible Retrieval meets the 2-hour retrieval SLA at ~$0.0036/GB/month — far cheaper than Standard-IA ($0.0125/GB). S3 as landing tier + Glacier for archival is the cost-optimal pattern for rarely-accessed long-retention data.'},
{id:80,domain:'resilient',sub:'S3',q:'A company stores legal documents in S3, re-uploading with the same object key. They need to download older versions and protect against accidental deletion. What is the MOST operationally efficient solution?',opts:['Enable S3 Versioning on the bucket.','Enable MFA delete on the bucket.','Configure S3 Cross-Region Replication to another Region.','Configure an S3 Lifecycle policy to archive to Glacier after 30 days.'],ans:0,exp:'S3 Versioning preserves all versions of every object. Overwriting an object creates a new version; deleting creates a delete marker, not permanent removal. MFA delete adds extra protection but is not itself versioning. CRR requires versioning as a prerequisite anyway.'},
{id:81,domain:'secure',sub:'Network',q:'A company runs its website on EC2 behind an ALB that is the CloudFront origin. They want protection against cross-site scripting (XSS) and SQL injection. Which approach is correct?',opts:['Enable Shield Advanced. List the CloudFront distribution as a protected resource.','Define a Shield Advanced policy in Firewall Manager to block XSS and SQL injection.','Set up AWS WAF on the CloudFront distribution with rules blocking XSS and SQL injection.','Deploy Firewall Manager on EC2 instances with rules blocking XSS and SQL injection.'],ans:2,exp:'AWS WAF is a Layer 7 firewall that inspects HTTP request bodies, headers, and query strings for XSS patterns and SQL injection code. Shield protects against DDoS (L3/4 network attacks), not application-layer vulnerabilities. Firewall Manager orchestrates WAF/Shield — it is not installed on instances.'},
{id:82,domain:'performing',sub:'Networking',q:'Which TWO components are required to build a site-to-site VPN connection on AWS? (Select TWO — any correct answer accepted)',opts:['An internet gateway','A NAT gateway','A customer gateway','Amazon API Gateway','A virtual private gateway'],ans:[2,4],exp:'Site-to-site VPN requires exactly two endpoints: Customer Gateway (represents the on-premises router/device configured in your data center) and Virtual Private Gateway (AWS-side VPN endpoint attached to the VPC). Internet Gateway is for public internet traffic, not encrypted VPN. NAT Gateway provides outbound internet for private subnets.'},
{id:83,domain:'cost',sub:'Storage',q:'A media company needs up to 400 GB of temporary storage discarded after graphic rendering, with ~40,000 random IOPS required. What is the MOST cost-effective storage option?',opts:['Storage optimized EC2 instance with instance store storage.','Storage optimized EC2 instance with Provisioned IOPS SSD (io1/io2) EBS.','Burstable EC2 instance with Throughput Optimized HDD (st1) EBS.','Burstable EC2 instance with Amazon S3 over a VPC endpoint.'],ans:0,exp:'Instance store on storage-optimized instances (like i3/i3en) delivers hundreds of thousands of IOPS at no additional cost beyond the instance hourly rate. Since data is discarded after rendering, the ephemeral nature of instance store is not a drawback. io1/io2 adds per-GB cost on top.'},
{id:84,domain:'secure',sub:'Cognito',q:'A company is building a mobile app requiring authorization, authentication, and user management from one central source for both internal and external users. Which solution meets these requirements?',opts:['IAM roles','IAM users and groups','Amazon Cognito user pools','AWS Security Token Service (STS)'],ans:2,exp:'Cognito User Pools provide a complete user directory for web/mobile apps: sign-up/sign-in, MFA, social federation (Google/Facebook), and JWT tokens. IAM is for AWS resource access control, not end-user application authentication. STS issues temporary credentials but doesn\'t manage user identities.'},
{id:85,domain:'cost',sub:'Data Transfer',q:'A company stores satellite images in S3 and must replicate 60 TB to on-premises monthly for compliance. What is the MOST cost-effective transfer method?',opts:['Export from S3 to an AWS Snowball Edge Storage Optimized device monthly. Ship to on-premises. Return within a week.','Copy to a new S3 Standard-IA bucket. Use Storage Gateway File Gateway to transfer to on-premises. Delete after transfer.','Copy to a new S3 Standard-IA bucket. Use S3 to transfer directly to on-premises. Delete after transfer.','Create a CloudFront distribution. Download from CloudFront to on-premises monthly.'],ans:0,exp:'60 TB internet egress costs ~$5,400/month ($0.09/GB). Snowball Edge base price + shipping + $0.03/GB data-out-of-AWS = ~$2,100. Snowball is ~2.5× cheaper for bulk transfers. Copying to another S3 bucket adds unnecessary replication cost. CloudFront egress pricing is similar to direct S3 egress.'},
];

// ── Flashcards ────────────────────────────────────────────────────────────────
const FLASHCARDS=[
  {id:1,domain:'secure',front:'IAM Role vs IAM User',back:'Role: temporary creds via STS, no static keys, assumed by services/users. User: permanent identity with long-term access keys. Use roles for EC2, Lambda, cross-account.'},
  {id:2,domain:'secure',front:'Security Group vs NACL',back:'SG: stateful, instance-level, allow only, evaluates all rules. NACL: stateless, subnet-level, allow+deny, rules evaluated in order (lowest # first).'},
  {id:3,domain:'secure',front:'AWS KMS Key Types',back:'AWS managed: free, auto-rotated yearly, no policy control. Customer managed: $1/month, full policy control, custom rotation. AWS owned: free, invisible, AWS controls.'},
  {id:4,domain:'secure',front:'Cognito: User Pools vs Identity Pools',back:'User Pools = AuthN (who are you?): sign-up, sign-in, tokens. Identity Pools = AuthZ (what can you do?): swap any token for AWS credentials.'},
  {id:5,domain:'secure',front:'S3 Object Ownership & ACLs',back:'Bucket Owner Enforced: disables ACLs, owner owns all objects. ACLs: legacy, per-object. Best practice: disable ACLs, use bucket policies instead.'},
  {id:6,domain:'secure',front:'AWS Shield Standard vs Advanced',back:'Standard: free, auto, L3/4 DDoS protection. Advanced: $3k/month+, L7 protection, DDoS cost protection, 24/7 DRT access, detailed metrics.'},
  {id:7,domain:'secure',front:'VPC Endpoint Types',back:'Gateway Endpoint: S3 + DynamoDB only, free, route table entry. Interface Endpoint (PrivateLink): any service, ENI in VPC, hourly + data charges.'},
  {id:8,domain:'secure',front:'SCP vs Permission Boundary vs Resource Policy',back:'SCP: org-level max perms for all principals in account. Boundary: IAM-level max perms for specific principal. Resource policy: attached to resource, controls who can access it.'},
  {id:9,domain:'resilient',front:'RDS Multi-AZ vs Read Replicas',back:'Multi-AZ: synchronous standby, same region, auto failover, NOT readable. Read Replicas: async, up to 5, readable, cross-region possible, manual promotion.'},
  {id:10,domain:'resilient',front:'Route 53 Routing Policies',back:'Simple: one record. Weighted: A/B traffic split. Latency: lowest latency region. Failover: primary/secondary. Geolocation: based on user location. Geoproximity: bias-adjusted. Multivalue: returns multiple IPs.'},
  {id:11,domain:'resilient',front:'DR Strategies (cost low→high)',back:'Backup & Restore (hours RTO) → Pilot Light (core infra, scale up) → Warm Standby (scaled-down full copy) → Multi-site Active/Active (full scale, near-zero RTO).'},
  {id:12,domain:'resilient',front:'SQS Standard vs FIFO',back:'Standard: at-least-once, best-effort order, unlimited TPS. FIFO: exactly-once, strict order, 3,000 msg/s (batching), .fifo suffix required.'},
  {id:13,domain:'resilient',front:'Aurora vs RDS',back:'Aurora: AWS-built, 3 AZs×2 copies (6 total), auto-grows 10GB increments to 128TB, up to 15 read replicas, ~5× faster than MySQL. Shared storage = fast replication.'},
  {id:14,domain:'resilient',front:'ASG Scaling Policies',back:'Simple: single CloudWatch alarm→action. Step: multiple thresholds, different actions. Target Tracking: maintain metric at target (e.g. 50% CPU). Scheduled: time-based. Predictive: ML-based forecast.'},
  {id:15,domain:'resilient',front:'ELB Types',back:'ALB: L7, HTTP/HTTPS/gRPC, path+host routing, WAF integration. NLB: L4, TCP/UDP/TLS, static IP, millions RPS, preserve source IP. GLB: L3, inline network appliances. CLB: legacy, avoid.'},
  {id:16,domain:'resilient',front:'SNS vs SQS vs EventBridge',back:'SNS: push, fan-out, pub/sub, 10M subs/topic. SQS: pull, queue, decouple. EventBridge: event bus, 90+ sources, routing rules, schema registry, 3rd party.'},
  {id:17,domain:'performing',front:'ElastiCache Redis vs Memcached',back:'Redis: persistence, replication, pub/sub, sorted sets, Lua, Multi-AZ, AUTH. Memcached: multithreaded, simple, no persistence, horizontal scaling via sharding. Choose Redis for almost everything.'},
  {id:18,domain:'performing',front:'EBS Volume Types',back:'gp3: default, 3000 IOPS baseline, 125 MB/s, independent IOPS/throughput config. io2 Block Express: max 256k IOPS, for databases. st1: throughput HDD, big data. sc1: cold HDD, cheapest.'},
  {id:19,domain:'performing',front:'CloudFront Caching',back:'TTL: set via Cache-Control/Expires headers or CloudFront behavior. Invalidations: $0.005/path (after 1000/month free). Origin Shield: regional cache layer reduces origin load. Cache key: URL + headers + cookies + query strings.'},
  {id:20,domain:'performing',front:'Lambda Performance',back:'Memory: 128MB–10GB. Duration: max 15 min. Concurrency: 1000/region default (soft limit). Cold start: ~100ms–3s. Provisioned Concurrency eliminates cold starts. Layers: share code/deps up to 250MB.'},
  {id:21,domain:'performing',front:'DynamoDB Keys & Indexes',back:'Primary key: partition key (hash) or composite (hash+sort). LSI: same partition key, different sort key, created at table creation. GSI: different partition+sort key, created anytime, eventually consistent.'},
  {id:22,domain:'performing',front:'EC2 Placement Groups',back:'Cluster: same rack, lowest latency, 10Gbps+, risk: single rack failure. Spread: separate hardware, max 7 per AZ, for critical instances. Partition: group of racks, for distributed systems (Hadoop, Kafka).'},
  {id:23,domain:'performing',front:'Kinesis Data Streams',back:'Shard: 1MB/s write, 2MB/s read. Records retained 1-365 days. Enhanced fan-out: 2MB/s per consumer per shard (push). Standard: shared 2MB/s (pull). Use KCL for consumer apps.'},
  {id:24,domain:'cost',front:'EC2 Purchasing Options',back:'On-demand: no commitment, most expensive. Reserved (1-3yr): up to 72% off, Standard or Convertible. Spot: up to 90% off, interruptible. Savings Plans: hourly commitment, flexible. Dedicated: compliance, most expensive.'},
  {id:25,domain:'cost',front:'S3 Storage Classes (cost high→low)',back:'Standard ($0.023) → Standard-IA ($0.0125, 30-day min) → One Zone-IA ($0.01) → Glacier Instant ($0.004) → Glacier Flexible ($0.0036) → Deep Archive ($0.00099). All per GB/month.'},
  {id:26,domain:'cost',front:'AWS Trusted Advisor Categories',back:'Cost Optimization: idle/underutilized resources. Performance: service limits, config. Security: open ports, MFA, IAM. Fault Tolerance: backups, Multi-AZ. Service Limits: usage vs limits.'},
  {id:27,domain:'cost',front:'Data Transfer Costs',back:'Free: inbound from internet, same-AZ same-service, S3→CloudFront, S3/DynamoDB via Gateway Endpoint. Charged: outbound to internet, inter-AZ ($0.01/GB), inter-region.'},
  {id:28,domain:'cost',front:'Compute Optimizer vs Trusted Advisor',back:'Compute Optimizer: ML-based, EC2/Lambda/ECS/EBS rightsizing with detailed analysis. Trusted Advisor: broader scope (cost/security/perf/limits), less granular on compute recommendations.'},
  {id:29,domain:'resilient',front:'Aurora Key Features',back:'6 copies across 3 AZs (2 per AZ), auto-scales 10GB→128TB, up to 15 read replicas, 5× faster than MySQL. Global DB: primary + 5 secondary regions, <1s replication. Serverless: auto-scales to zero for intermittent workloads. Backtrack: rewind DB without restore.'},
  {id:30,domain:'performing',front:'DynamoDB DAX vs ElastiCache',back:'DAX: DynamoDB-native in-memory cache, microsecond reads, write-through, 1-10 nodes. ElastiCache: standalone Redis/Memcached, works with any DB. Use DAX exclusively for DynamoDB acceleration; use ElastiCache for RDS or multi-source workloads.'},
  {id:31,domain:'resilient',front:'VPC Core Components',back:'IGW: public subnet → internet (bidirectional). NAT Gateway: private subnet → internet (outbound only). Route Table: directs traffic. NACLs: stateless, subnet-level. VPC Peering: 1:1 non-transitive. Transit Gateway: hub-and-spoke transitive routing across many VPCs.'},
  {id:32,domain:'resilient',front:'Route 53 Record Types & Alias',back:'A: IPv4, AAAA: IPv6, CNAME: hostname→hostname (not root domain). Alias: hostname→AWS resource (works at root, free queries). MX: mail servers. TXT: verification/SPF. Alias can point to ELB, CloudFront, Beanstalk, S3 static website, another Route 53 record.'},
  {id:33,domain:'secure',front:'CloudFront Security Controls',back:'OAC (Origin Access Control): restricts S3 access to CloudFront only (replaces legacy OAI). Signed URLs: single file time-limited access. Signed Cookies: multiple files. WAF: L7 protection. Shield Standard: auto DDoS. Geo-restriction: allowlist or blocklist countries.'},
  {id:34,domain:'performing',front:'CloudFormation Core Concepts',back:'Template (JSON/YAML): declares resources. Stack: set of resources managed together. Change Set: preview changes before applying. StackSets: deploy across multiple accounts/regions with one operation. Nested Stacks: reuse shared components. Drift detection: find manual changes.'},
  {id:35,domain:'secure',front:'CloudTrail vs CloudWatch vs Config',back:'CloudTrail: WHO did WHAT API call and when (audit log, 90 days free). CloudWatch: WHAT is happening now (metrics, logs, alarms, dashboards). Config: WHAT changed over time (resource config history, compliance rules). All three complement each other.'},
  {id:36,domain:'secure',front:'KMS Envelope Encryption',back:'1. Generate DEK (Data Encryption Key) via KMS. 2. Encrypt data with plaintext DEK. 3. Encrypt DEK with CMK → store alongside data. 4. Decrypt: send encrypted DEK to KMS → get plaintext DEK → decrypt data. Never store unencrypted DEK. Reduces KMS API calls.'},
  {id:37,domain:'resilient',front:'Transit Gateway vs VPC Peering',back:'VPC Peering: 1:1, non-transitive, free data transfer, works with intra-region security groups. Transit Gateway: hub-and-spoke, transitive, $0.05/GB + $0.05/hr per attachment, supports multicast, 50 Gbps burst per AZ. Use TGW when connecting more than 3 VPCs.'},
  {id:38,domain:'resilient',front:'Direct Connect vs Site-to-Site VPN',back:'Direct Connect: dedicated 1/10 Gbps physical link, consistent performance, no public internet, weeks to provision, higher cost. VPN: IPSec over internet, minutes to provision, variable performance, cheap. DX + VPN: use as backup. DX Gateway: connects to multiple VPCs/regions.'},
  {id:39,domain:'performing',front:'ECS vs EKS vs Fargate (Launch Type)',back:'ECS: AWS-native orchestration, simple, tight AWS integration, task definitions in JSON. EKS: managed Kubernetes, portable, standard K8s tools. Fargate: serverless compute for ECS or EKS (no EC2 management), billed per vCPU+memory. EC2 launch type: you manage nodes.'},
  {id:40,domain:'secure',front:'Secrets Manager vs SSM Parameter Store',back:'Secrets Manager: auto-rotation for RDS/Redshift/DocumentDB, cross-account sharing, $0.40/secret/month. SSM Parameter Store: free (standard), manual rotation, SecureString via KMS, no rotation automation. Use Secrets Manager for credentials that need automated rotation.'},
  {id:41,domain:'resilient',front:'S3 Glacier Retrieval Options',back:'Glacier Instant Retrieval: ms access (like S3-IA). Glacier Flexible: Expedited 1-5 min, Standard 3-5 hr, Bulk 5-12 hr. Deep Archive: Standard 12 hr, Bulk 48 hr. Min storage: Glacier=90 days, Deep Archive=180 days. Free tier: 10 GB/month standard retrieval.'},
  {id:42,domain:'performing',front:'Redshift Architecture',back:'Leader Node: manages queries & client connections. Compute Nodes: store data & execute queries (up to 128). Massively Parallel Processing (MPP). Columnar storage + compression (no indexes needed). Redshift Spectrum: query S3 data. Runs in one AZ but snapshots can restore to another.'},
  {id:43,domain:'performing',front:'Kinesis Data Streams vs Firehose',back:'Data Streams: real-time (<200ms), manual shard management, 1-365 day retention, custom consumer code. Firehose: near real-time (60s min buffer), fully managed, auto-scales, delivers to S3/Redshift/OpenSearch/Splunk. Use Streams for real-time analytics; Firehose for simple ETL loading.'},
  {id:44,domain:'secure',front:'AWS WAF Rule Types',back:'IP Set: allow/block CIDRs. AWS Managed Rules: OWASP Top 10, bot control, known bad IPs. Rate-based: throttle per IP (DDoS). Geo Match: block/allow countries. Size Constraint: block oversized requests. String/Regex Match: block patterns. WAF attaches to ALB, CloudFront, API Gateway, AppSync.'},
  {id:45,domain:'secure',front:'IAM Policy Evaluation Logic',back:'1. Explicit DENY → always DENY. 2. SCP restricts what is possible. 3. Resource-based policy can ALLOW without identity policy (cross-account). 4. Permission Boundary caps max identity permissions. 5. Session policy limits assumed role. 6. Identity policy. Default: implicit DENY.'},
  {id:46,domain:'cost',front:'Snow Family Sizing Guide',back:'Snowcone: 8TB, battery-powered, portable for edge. Snowball Edge Compute: 40 vCPUs + local compute, edge processing. Snowball Edge Storage: 80TB usable, 52 vCPUs. Snowmobile: truck, up to 100PB, exabyte migrations. Rule of thumb: use Snow when transfer would take >1 week via internet.'},
  {id:47,domain:'performing',front:'EFS vs EBS vs Instance Store',back:'EFS: NFS shared across many EC2, regional multi-AZ, auto-scales to PBs, $0.30/GB/month. EBS: block, one EC2, AZ-specific, fixed provisioned size, $0.08/GB/month. Instance Store: ephemeral, highest IOPS, data lost on stop/terminate. Choose EFS for shared; EBS for single-instance DB/OS.'},
  {id:48,domain:'resilient',front:'API Gateway Types',back:'REST API: full features (usage plans, caching, API keys, request transforms). HTTP API: 70% cheaper, Lambda/HTTP backends only, no AWS service integration. WebSocket API: stateful, real-time (chat, live dashboards). Endpoint: Edge-optimized (CloudFront), Regional, Private (VPC endpoint).'},
  {id:49,domain:'resilient',front:'ELB Routing & Target Groups',back:'ALB path routing: /api/* → API service. ALB host routing: api.example.com vs app.example.com. Weighted target groups: canary/blue-green deployments. NLB: L4 TCP/UDP, static IP, preserve source IP, millions RPS. GLB: inline security appliances (firewalls, IDS). Health check removes unhealthy targets.'},
  {id:50,domain:'cost',front:'AWS Cost Management Tools',back:'Cost Explorer: visualize 12mo history + 12mo forecast, RI/SP recommendations. Budgets: alerts when cost/usage exceeds threshold ($0.10/day). Cost & Usage Report: most detailed, delivered to S3 up to 3×/day. Compute Optimizer: ML-based EC2/Lambda rightsizing. Pricing Calculator: pre-deployment estimates.'},
  {id:51,domain:'performing',front:'Amazon Athena & AWS Glue',back:'Athena: serverless SQL on S3, pay $5/TB scanned, supports CSV/JSON/Parquet/ORC. Use Parquet+compression to cut costs 10×. Glue: serverless ETL, Data Catalog (shared metadata store), Crawlers (auto-discover S3 schemas), Glue Studio (visual ETL). Athena uses Glue Catalog for table definitions.'},
  {id:52,domain:'resilient',front:'AWS DMS & Migration Hub',back:'DMS: migrate databases with minimal downtime, homogeneous (MySQL→MySQL) or heterogeneous (Oracle→Aurora). Schema Conversion Tool (SCT): converts DDL between incompatible engines. Migration Hub: centralized dashboard for all migrations. Application Discovery: inventory on-prem servers before migration.'},
  {id:53,domain:'secure',front:'Amazon Cognito Authentication Flow',back:'User Pools: sign-up/sign-in → JWT tokens (ID, access, refresh). Identity Pools: exchange any token (User Pool JWT, Google, Facebook, SAML) for temporary IAM credentials. Combined: User Pool authenticates → Identity Pool authorizes → access S3/DynamoDB/etc. Scales to millions of users.'},
  {id:54,domain:'performing',front:'EventBridge vs SNS vs SQS',back:'EventBridge: event bus with rules+filters+targets, schema registry, 90+ AWS sources, third-party SaaS, serverless. SNS: pub/sub fan-out, push to Lambda/SQS/email/SMS/HTTP, supports standard and FIFO topics. SQS: queue, pull-based, decouple services, DLQ for failures. EventBridge for event-driven architecture.'},
  {id:55,domain:'resilient',front:'Organizations, SCPs & Control Tower',back:'Organizations: root→OUs→member accounts. SCPs: restrict max permissions in member accounts (NOT management account), do not grant permissions. Consolidated billing: volume discounts across all accounts. Control Tower: extends Org with Landing Zone, Account Factory, guardrails (preventive+detective).'},
];

// ── Daily Lessons ─────────────────────────────────────────────────────────────
const LESSONS=[
  {day:1,domain:'secure',title:'IAM Foundations',content:`**Core concepts:** Users, Groups, Roles, Policies.

**Policy evaluation logic:**
1. Default DENY everything
2. Evaluate all applicable policies
3. Any explicit DENY → final DENY
4. If no explicit DENY and at least one ALLOW → ALLOW

**Key facts:**
- Roles use STS for temporary credentials (15min–36hr)
- Maximum 10 managed policies per user/group/role
- Permission boundary = max permissions ceiling
- SCPs affect all principals including root (except management account)

**Exam trap:** Multi-AZ standby is NOT an IAM concept — that's resilience. SCPs do NOT grant permissions, they only restrict.`},
  {day:2,domain:'secure',title:'S3 Security & Encryption',content:`**Encryption at rest:**
- SSE-S3: AWS manages keys (AES-256)
- SSE-KMS: Customer managed keys, CloudTrail auditable
- SSE-C: Customer provides key per request, AWS encrypts
- Client-side: You encrypt before uploading

**Access control hierarchy:**
Bucket ACL (legacy) → Bucket Policy → IAM Policy → VPC Endpoint Policy

**Key security features:**
- Block Public Access: 4 settings, account OR bucket level
- Object Lock: WORM compliance (Governance vs Compliance mode)
- MFA Delete: requires MFA for version deletion
- Presigned URLs: time-limited access without IAM`},
  {day:3,domain:'resilient',title:'Auto Scaling Deep Dive',content:`**ASG components:**
- Launch Template (preferred) vs Launch Configuration (legacy)
- Min/Max/Desired capacity
- Health check: EC2 (default) or ELB

**Scaling policy types:**
1. Target Tracking — simplest, maintain metric at value
2. Step Scaling — tiered responses to alarm thresholds
3. Simple Scaling — single alarm/action (cooldown applies)
4. Predictive — ML forecast, provision in advance
5. Scheduled — known traffic patterns

**Lifecycle hooks:** pause at launch/terminate → run custom actions → continue/abandon

**Instance refresh:** rolling update of ASG instances with configurable min healthy %.`},
  {day:4,domain:'performing',title:'CloudFront Architecture',content:`**Distribution types:** Web (HTTP/HTTPS), RTMP (legacy streaming)

**Origin types:** S3, ALB, EC2, HTTP endpoint, MediaStore, MediaPackage

**Cache behavior hierarchy:**
Default behavior → Path-based behaviors (evaluated in order)

**Performance features:**
- Origin Shield: reduces origin load (additional caching layer)
- Transfer Acceleration: uses CloudFront edge for S3 uploads
- Lambda@Edge / CloudFront Functions: run code at edge (Functions = faster/cheaper for simple ops)

**Security:** OAC (Origin Access Control) replaces OAI for S3. Signed URLs (1 file) vs Signed Cookies (multiple files).`},
  {day:5,domain:'cost',title:'Pricing Models & Cost Optimization',content:`**Reserved Instances:**
- Standard RI: up to 72% off, can sell in Marketplace
- Convertible RI: up to 66% off, can exchange for different attributes
- Scheduled RI: deprecated, use Savings Plans instead

**Savings Plans (more flexible):**
- Compute Savings Plans: EC2 + Lambda + Fargate, all regions/families
- EC2 Instance Savings Plans: specific region + family, higher discount

**Cost optimization pillars:**
1. Right-size before committing
2. Increase elasticity (stop unused resources)
3. Leverage correct pricing model
4. Optimize storage (S3 lifecycle, EBS snapshots)
5. Measure, monitor, improve (Cost Explorer, Budgets)`},
  {day:6,domain:'secure',title:'VPC Security Architecture',content:`**Defense in depth layers:**
1. NACLs (subnet-level, stateless)
2. Security Groups (instance-level, stateful)
3. AWS WAF (Layer 7, ALB/CloudFront/API GW)
4. AWS Shield (DDoS, L3/4)
5. GuardDuty (threat detection)

**VPC Flow Logs:** capture IP traffic metadata (not packet contents). Source, destination, port, action (ACCEPT/REJECT). Store in S3 or CloudWatch Logs.

**Private connectivity options:**
- VPC Peering: 1:1, non-transitive
- Transit Gateway: hub-and-spoke, transitive, inter-region
- PrivateLink: expose services privately, no VPC peering needed`},
  {day:7,domain:'resilient',title:'Database Resilience Patterns',content:`**RDS:**
- Multi-AZ: sync replication, auto failover ~1-2 min, same region
- Read Replicas: async, readable, cross-region, manual promotion
- Backups: automated (1-35 days PITR), manual snapshots (indefinite)

**Aurora:**
- 6 copies across 3 AZs, self-healing
- Up to 15 read replicas (shared storage = <10ms lag)
- Aurora Global: primary + up to 5 secondary regions, <1s replication
- Backtrack: rewind DB in place without restoring from snapshot

**DynamoDB:**
- Global Tables: multi-region, multi-active, last-writer-wins
- PITR: continuous backups, restore to second
- On-demand vs provisioned: on-demand for unpredictable, provisioned for predictable`},
  {day:8,domain:'performing',title:'Compute Performance Optimization',content:`**EC2 Instance families:**
- C: compute optimized (HPC, gaming, ML inference)
- R/X: memory optimized (in-memory DBs, SAP)
- I/D: storage optimized (NoSQL, data warehousing)
- P/G/Inf: accelerated (ML training, GPU)
- M/T: general purpose

**Graviton (ARM):** up to 40% better price/performance for most workloads

**Networking:**
- Enhanced Networking (ENA): up to 100 Gbps, SR-IOV
- EFA (Elastic Fabric Adapter): HPC, MPI workloads, bypasses OS network stack
- Placement groups: cluster (latency), spread (isolation), partition (distributed systems)

**Storage performance:**
- EBS: per-volume IOPS limits. io2 Block Express = 256k IOPS max
- Instance store: ephemeral, highest IOPS, data lost on stop/terminate`},
  {day:9,domain:'resilient',title:'VPC Networking Deep Dive',content:`**VPC building blocks:**
- CIDR block: /16 to /28. 5 IPs reserved per subnet (network, VPC router, DNS, future, broadcast)
- Internet Gateway (IGW): route 0.0.0.0/0 → IGW for public subnets
- NAT Gateway: managed, AZ-specific, Elastic IP required, outbound IPv4 only

**Security layers:**
1. Security Groups: stateful, instance-level, allow only
2. NACLs: stateless, subnet-level, allow + deny, evaluated lowest # first
3. VPC Flow Logs: capture metadata (not contents), store in S3 or CloudWatch Logs

**Connectivity options:**
- VPC Peering: non-transitive, works across regions and accounts
- Transit Gateway: transitive hub, supports VPN and Direct Connect attachments
- PrivateLink: expose service privately via endpoint (no VPC peering needed)
- VPN: Site-to-Site (IPSec), Client VPN (OpenVPN)

**Exam trap:** Security groups are stateful — return traffic is always allowed. NACLs are stateless — you must allow both inbound AND outbound for each connection.`},
  {day:10,domain:'performing',title:'Container Services Overview',content:`**ECS (Elastic Container Service):**
- AWS-native, simpler, tight integration with ALB/CloudWatch/IAM
- Task Definition (JSON): specifies container images, CPU, memory, ports
- Service: maintains desired task count, handles rolling updates
- Launch types: EC2 (you manage nodes) or Fargate (serverless)

**EKS (Elastic Kubernetes Service):**
- Fully managed Kubernetes control plane
- Standard Kubernetes tooling (kubectl, Helm)
- Node groups: managed (AWS handles lifecycle) or self-managed
- Fargate profiles: run pods serverlessly without nodes

**Fargate:**
- Serverless compute for ECS or EKS
- Billed per vCPU + memory per second
- Each task/pod gets dedicated kernel (no noisy neighbors)
- Use EFS for persistent shared storage with Fargate

**ECR (Elastic Container Registry):**
- Stores Docker images, integrated with ECS/EKS/Lambda
- Images stored in S3 (11 9s durability), cross-region replication`},
  {day:11,domain:'resilient',title:'Database Services Decision Tree',content:`**Relational (RDS):**
- MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, Aurora
- Use when: structured data, ACID compliance, existing SQL workloads
- Aurora preferred: 5× faster MySQL, 3× faster PostgreSQL, auto-grows

**NoSQL Options:**
- DynamoDB: key-value + document, single-digit ms, serverless, global tables
- DocumentDB: MongoDB-compatible, JSON, flexible schema, RBAC
- Neptune: graph database, Gremlin/SPARQL, social networks, knowledge graphs
- ElastiCache: Redis (persistence, pub/sub, Multi-AZ) or Memcached (simple, multithreaded)
- Keyspaces: Apache Cassandra-compatible, CQL, unlimited storage

**Analytics:**
- Redshift: data warehouse, petabyte-scale, columnar, MPP, BI tools
- Athena: serverless SQL on S3, no ETL needed, pay per query

**Migration:**
- DMS: online migration with minimal downtime
- SCT: schema conversion for heterogeneous migrations`},
  {day:12,domain:'secure',title:'Security Services Overview',content:`**Identity & Access:**
- IAM: users/groups/roles/policies, least privilege, MFA
- Cognito: user authentication for apps (User Pools) + AWS access (Identity Pools)
- Directory Service: managed Microsoft AD for enterprise SSO
- RAM: share resources across accounts (subnets, Aurora clusters, etc.)

**Threat Detection & Protection:**
- GuardDuty: ML-based threat detection (DNS, VPC Flow Logs, CloudTrail)
- Inspector: automated vulnerability scanning (EC2, ECR images, Lambda)
- Macie: S3 data classification (PII discovery, sensitive data)
- Security Hub: aggregates findings from all security services + compliance (CIS, PCI)

**Encryption & Secrets:**
- KMS: manage encryption keys, envelope encryption, CloudTrail auditable
- ACM: free SSL/TLS certificates for ALB/CloudFront/API Gateway
- Secrets Manager: store + auto-rotate database credentials, API keys

**Network Protection:**
- WAF: L7 rules (OWASP, rate limiting, geo-blocking)
- Shield Standard: free DDoS protection. Shield Advanced: $3k/month, 24/7 DRT`},
  {day:13,domain:'performing',title:'Serverless Architecture Patterns',content:`**Core serverless services:**
- Lambda: functions up to 15 min, 10GB memory, 1000 concurrency/region
- API Gateway: REST/HTTP/WebSocket APIs, throttling, caching, auth
- DynamoDB: serverless NoSQL, on-demand or provisioned capacity
- SQS/SNS: decouple and fan-out messages
- EventBridge: event-driven routing between services
- Step Functions: orchestrate multi-step workflows with retries/branching

**Lambda best practices:**
- Keep functions small and single-purpose
- Use environment variables for config (not hardcoded)
- Use Layers for shared dependencies (up to 250MB)
- Provisioned Concurrency: eliminate cold starts for latency-sensitive functions
- Lambda@Edge: run code at CloudFront edge (viewer/origin request/response)

**Common patterns:**
- Web: API Gateway → Lambda → DynamoDB
- Event processing: S3/DynamoDB Streams → Lambda
- Fan-out: SNS → multiple SQS queues → Lambda
- Workflow: Step Functions → Lambda → RDS/DynamoDB

**Exam trap:** Lambda max timeout is 15 min. For longer tasks use Fargate or EC2.`},
  {day:14,domain:'performing',title:'Analytics & Streaming Data',content:`**Batch analytics:**
- Athena: serverless SQL on S3, pay $5/TB scanned, use Parquet to cut costs 10×
- EMR: managed Hadoop/Spark clusters, process petabytes, decouples compute from S3 storage
- Redshift: data warehouse, columnar, MPP, Spectrum can query S3 directly
- Glue: serverless ETL, Data Catalog, Crawlers for schema discovery

**Streaming data:**
- Kinesis Data Streams: real-time, 1MB/s per shard write, 2MB/s read, 1-365 day retention
- Kinesis Firehose: fully managed, near real-time (60s buffer), delivers to S3/Redshift/OpenSearch
- MSK (Managed Kafka): run Kafka without managing brokers, ZooKeeper, multi-AZ
- Flink (Managed): real-time stream processing, sub-second latency

**Visualization:**
- QuickSight: serverless BI, auto-forecasting, ML-powered, pay-per-session

**Data lake pattern:**
- Raw data → S3 → Glue Crawlers (catalog) → Athena (query) → QuickSight (visualize)
- Or: Kinesis → S3 → Glue → Redshift Spectrum for mixed workloads`},
  {day:15,domain:'resilient',title:'Resilience & DR Patterns',content:`**RTO vs RPO:**
- RTO: how long can system be down? (Recovery Time Objective)
- RPO: how much data loss is acceptable? (Recovery Point Objective)

**DR strategies (cost/complexity low→high):**
1. Backup & Restore: S3 snapshots, RTO hours, RPO hours
2. Pilot Light: core infra running (DB replication), scale up on DR
3. Warm Standby: scaled-down full copy, reduce RTO to minutes
4. Multi-site Active/Active: full production in 2+ regions, near-zero RTO

**High availability patterns:**
- Multi-AZ: automatic failover within region (RDS, ElastiCache, ALB)
- Multi-region: Route 53 failover/latency routing, Aurora Global
- ASG + ALB: automatically replace unhealthy EC2 instances
- DynamoDB Global Tables: multi-region multi-active (last-writer-wins)

**Backup tools:**
- AWS Backup: centralized backup across RDS, EFS, EBS, DynamoDB, FSx
- S3 Cross-Region Replication: async object-level replication
- RDS automated backups: 1-35 day retention, point-in-time restore`},
  {day:16,domain:'cost',title:'Cost Optimization & FinOps',content:`**Pricing model selection:**
- On-Demand: dev/test, unpredictable, short-lived
- Reserved Instances (1-3yr): steady-state, predictable → up to 72% off
  - Standard RI: specific family/size/OS, can sell in Marketplace
  - Convertible RI: flexible attributes, up to 66% off, cannot sell
- Savings Plans: flexible (compute across EC2+Fargate+Lambda) → up to 66% off
- Spot: fault-tolerant batch, HPC, big data → up to 90% off (interruptible)

**Storage optimization:**
- S3 Intelligent-Tiering: auto-move objects between tiers (unknown access patterns)
- S3 Lifecycle Policies: transition to IA/Glacier after N days
- EBS: snapshot older volumes, delete unattached, use gp3 over gp2

**Compute optimization:**
- Graviton (ARM): up to 40% better price/performance
- Spot Instances for stateless/batch workloads
- Auto Scaling: scale in during off-peak hours
- Compute Optimizer: ML rightsizing recommendations

**Monitoring costs:**
- Cost Explorer: identify top services, view trends
- AWS Budgets: set alerts (cost/usage/RI coverage)
- Cost & Usage Report: most granular, export to S3`},
  {day:17,domain:'secure',title:'Monitoring, Auditing & Compliance',content:`**CloudWatch:**
- Metrics: EC2 (CPU, network, disk), RDS, Lambda, custom namespaces
- Logs: Log Groups → Log Streams, structured queries with Insights
- Alarms: breaches trigger SNS, EC2 actions, Auto Scaling
- Dashboards: cross-account, cross-region visibility
- Container Insights: ECS/EKS metrics. Lambda Insights: function-level metrics

**CloudTrail:**
- Logs every API call: who, what, when, source IP
- Management events: default enabled, 90 days free
- Data events: S3 object-level, Lambda invocations (extra cost)
- Insights: detect unusual API call volume/patterns
- Store in S3 for long-term retention, analyze with Athena

**AWS Config:**
- Records resource configuration history
- Managed rules: common compliance checks (150/region)
- Custom rules: Lambda-backed for custom logic
- Aggregator: compliance view across all accounts in Org
- Use cases: drift detection, compliance reports, change history

**Security Hub → GuardDuty → Inspector → Macie:** findings flow up to Security Hub for centralized view.`},
  {day:18,domain:'resilient',title:'Networking & Content Delivery',content:`**CloudFront CDN:**
- 450+ edge locations globally
- Origins: S3, ALB, EC2, MediaStore, custom HTTP
- Cache behaviors: path-based routing, TTL settings
- Security: WAF, Shield, HTTPS (ACM certs free), signed URLs/cookies
- Lambda@Edge: run code at edge for dynamic content

**Elastic Load Balancing:**
- ALB (L7): HTTP/HTTPS/gRPC, path/host/header routing, WAF, redirects
- NLB (L4): TCP/UDP/TLS, static IP, ultra-low latency, millions RPS
- GLB (L3): inline traffic inspection for security appliances
- All ELBs support cross-zone load balancing, health checks, access logs

**API Gateway:**
- Throttling: 10,000 RPS default, 5,000 burst (per account/region)
- Usage plans + API keys for monetization
- Caching: reduces backend load, configurable TTL
- Auth: IAM, Cognito, Lambda authorizers

**Route 53 advanced:**
- Health checks: monitor endpoints, CloudWatch alarms, other health checks
- Traffic flow: visual routing policy editor
- Private DNS: resolve custom domains within VPC

**Exam tip:** CloudFront reduces latency AND S3 egress costs. Always consider CDN before increasing origin capacity.`},
  {day:19,domain:'performing',title:'Migration & Transfer Services',content:`**7 Rs of migration (cloud journey):**
1. Retire: decommission what you don't need
2. Retain: keep on-premises (regulatory, latency)
3. Rehost (Lift & Shift): move as-is (MGN, VM Import)
4. Relocate: move Kubernetes to EKS, VMware to VMware Cloud on AWS
5. Repurchase: move to SaaS (Salesforce, ServiceNow)
6. Replatform (Lift & Optimize): move to managed services (RDS, Beanstalk)
7. Refactor/Re-architect: rebuild for cloud-native (Lambda, ECS, DynamoDB)

**Migration tools:**
- AWS MGN (Application Migration Service): lift-and-shift EC2 replication
- DMS: database migration with CDC (Change Data Capture)
- DataSync: file transfer from NFS/SMB/S3 to AWS (TLS encrypted, up to 10Gbps)
- Transfer Family: SFTP/FTPS/FTP to/from S3 and EFS
