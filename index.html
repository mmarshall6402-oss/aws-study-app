{id:113,domain:'resilient',sub:'Route 53',q:'A company has a primary web application in us-east-1 and a standby in us-west-2. The standby should only receive traffic if the primary is unhealthy, with DNS-based failover happening automatically within minutes. Which Route 53 configuration is correct?',opts:['Weighted routing with 90/10 weight split between primary and standby.','Failover routing — primary record with a health check; secondary record as failover target.','Latency-based routing — Route 53 automatically routes to the fastest Region.','Geolocation routing with us-east-1 as the default and us-west-2 for non-US users.'],ans:1,exp:'Route 53 Failover routing monitors the primary endpoint via health checks and automatically updates DNS responses to the secondary record when the primary is unhealthy. With a low TTL (e.g., 60 seconds), failover completes within 1-2 minutes. Weighted routing doesn\'t fail over automatically — you must change weights manually. Latency routing picks the lowest-latency endpoint regardless of health. Geolocation routing isn\'t a failover mechanism.'},
{id:114,domain:'resilient',sub:'Route 53',q:'A global SaaS application serves users in North America, Europe, and Asia. The company wants to route each user to the AWS Region with the LOWEST measured network latency, not based on geographic location. Which routing policy achieves this?',opts:['Geolocation routing','Geoproximity routing with no bias','Latency-based routing','Multivalue answer routing'],ans:2,exp:'Latency-based routing uses real-time measurements of round-trip time between Route 53 and each configured region endpoint, directing each user to the region delivering the lowest latency. This is based on actual network conditions — a user in Southeast Asia may get better latency from us-west-2 than ap-southeast-1 depending on ISP routing. Geolocation routing uses the geographic origin of the DNS query (IP-to-location mapping), which doesn\'t reflect actual network performance. Geoproximity uses physical distance with optional bias adjustments.'},
{id:115,domain:'resilient',sub:'ELB',q:'An IoT platform requires a load balancer that supports the MQTT protocol (TCP port 1883), can handle millions of simultaneous connections, and must provide a static IP address per Availability Zone for firewall whitelisting. Which load balancer is correct?',opts:['Application Load Balancer (ALB)','Classic Load Balancer (CLB)','Network Load Balancer (NLB)','Gateway Load Balancer (GWLB)'],ans:2,exp:'Network Load Balancer operates at Layer 4 (TCP/UDP/TLS) — supporting any TCP-based protocol including MQTT. NLB provides one static Elastic IP per AZ (or uses an Elastic IP you bring), making firewall whitelisting straightforward. NLB handles millions of connections per second with ultra-low latency. ALB is Layer 7 HTTP/HTTPS only. CLB is legacy, doesn\'t scale to millions of connections, and has dynamic IPs. GWLB is for transparent traffic inspection, not application load balancing.'},
{id:116,domain:'resilient',sub:'RDS',q:'An RDS MySQL Multi-AZ instance experiences an AZ failure. Which statement CORRECTLY describes the failover?',opts:['A new DB instance is restored from the most recent automated snapshot; takes 20-30 minutes.','The read replica in another AZ is promoted to primary automatically within seconds.','The CNAME DNS endpoint is flipped to the synchronous standby; typically completes in 1-2 minutes.','The application must be restarted pointing to the standby instance\'s separate endpoint.'],ans:2,exp:'RDS Multi-AZ maintains a synchronous standby replica in a different AZ. On primary failure, AWS automatically promotes the standby and updates the DB instance CNAME DNS record to point to the new primary. Applications reconnecting to the same endpoint DNS name automatically reach the new primary — no connection string changes needed. Failover typically takes 60-120 seconds. Read replicas are asynchronous and are NOT part of Multi-AZ automatic failover. Snapshot restore would take many minutes and requires manual action.'},
{id:117,domain:'resilient',sub:'Aurora',q:'A read-heavy OLTP application needs a relational database that can survive losing an entire Availability Zone without data loss, automatically fail over within 30 seconds, and serve read traffic from multiple endpoints. Which is the BEST solution?',opts:['RDS MySQL Multi-AZ with 5 read replicas','Amazon Aurora with Aurora Replicas across 3 AZs','RDS PostgreSQL with synchronous Multi-AZ standby','Amazon Redshift with Multi-AZ enabled'],ans:1,exp:'Aurora stores 6 copies of data across 3 AZs (2 per AZ), making it resilient to loss of an entire AZ with zero data loss. Aurora Replicas (up to 15) can be promoted to primary in <30 seconds and serve read traffic via the Aurora Reader Endpoint — ideal for read-heavy workloads. Standard RDS Multi-AZ has one non-readable standby and slower failover. Redshift is a data warehouse (OLAP), not OLTP. Aurora provides both the HA and read-scaling requirements.'},
{id:118,domain:'resilient',sub:'DynamoDB',q:'A gaming company needs a database that accepts writes from players in North America, Europe, and Asia simultaneously, replicating changes to all regions within seconds with no single primary. Which capability enables this?',opts:['DynamoDB Streams with Lambda cross-region replication','DynamoDB Global Tables with multi-active replication','DynamoDB DAX in each region','DynamoDB with cross-region read replicas'],ans:1,exp:'DynamoDB Global Tables provide fully managed multi-region, multi-active (every replica accepts reads and writes) replication. Changes propagate to all replica regions typically within one second. DynamoDB Streams + Lambda can replicate data across regions but requires custom code, is eventually consistent, and can cause write conflicts in a multi-active setup. DAX is an in-memory cache, not a replication feature. DynamoDB has no native "read replica" feature — Global Tables are the replication mechanism.'},
{id:119,domain:'resilient',sub:'S3',q:'Application deployment artifacts are uploaded to an S3 bucket in us-east-1 and must be available in eu-west-1 within minutes of upload, automatically, without developer action. What is the MOST operationally efficient solution?',opts:['A Lambda function copies new objects to eu-west-1 on S3 PutObject events.','Enable S3 Cross-Region Replication (CRR) from the source bucket to a destination bucket in eu-west-1.','Run an AWS CLI s3 sync job every 2 minutes via EventBridge Scheduler.','Use S3 Multi-Region Access Points to serve objects from the closest region.'],ans:1,exp:'S3 Cross-Region Replication automatically replicates objects to the destination bucket in another region within minutes — no code, no scheduling, no developer action after initial setup. It supports replication of all objects, specific prefixes, or tag-filtered objects. Lambda-based copying requires maintaining custom code. Scheduled sync has latency up to the sync interval. Multi-Region Access Points route requests to existing data, they don\'t replicate it.'},
{id:120,domain:'resilient',sub:'SQS',q:'An SQS consumer processes messages that take up to 10 minutes. Occasionally the consumer crashes mid-processing, and the message is re-delivered and processed twice, causing data duplication. What is the CORRECT fix?',opts:['Switch to a FIFO queue with content-based deduplication enabled.','Increase the SQS visibility timeout to more than 10 minutes (e.g., 12 minutes).','Enable SQS long polling with a 20-second wait time.','Increase the message retention period to 24 hours.'],ans:1,exp:'When a consumer receives a message, SQS hides it for the visibility timeout. If the consumer crashes and doesn\'t delete the message before the timeout expires, SQS re-delivers it. Setting the timeout to 12 minutes (greater than the 10-minute max processing time) ensures the message stays invisible long enough for normal processing to complete. FIFO with deduplication prevents duplicate sends to the queue but doesn\'t help with consumer crash re-delivery. Long polling reduces empty receives. Retention period controls how long unprocessed messages live in the queue.'},
{id:121,domain:'resilient',sub:'Disaster Recovery',q:'A company\'s RPO is 1 hour and RTO is 4 hours. Their current backup-and-restore approach takes 8 hours to restore (violates RTO). Which DR strategy meets both targets at the LOWEST additional cost?',opts:['Multi-site active/active — run full production in both primary and DR regions.','Warm standby — keep a scaled-down but running version of production in the DR region.','Pilot light — replicate only the core database to DR; pre-configure (but don\'t run) application servers.','Increase backup frequency to every 30 minutes and optimize restore automation.'],ans:2,exp:'Pilot light keeps only critical components (the database) continuously replicated/running in the DR region. Application servers are pre-configured and can be launched within 1-2 hours on failure — meeting the 4-hour RTO. Database replication (e.g., RDS Multi-Region read replica) keeps data lag well under 1 hour (meeting RPO). Pilot light costs far less than warm standby or active/active. Optimized backup/restore is still unlikely to achieve 4-hour RTO reliably for complex environments.'},
{id:122,domain:'resilient',sub:'CloudFront',q:'A CloudFront distribution serves an S3 website in us-east-1. During an S3 regional outage, CloudFront returns 503 errors. What feature enables automatic failover to a secondary S3 bucket in us-west-2?',opts:['CloudFront Origin Shield placed in us-west-2','CloudFront Origin Failover with an origin group containing primary and secondary S3 origins','CloudFront field-level encryption with a secondary origin fallback','CloudFront signed URLs pointing to the secondary bucket'],ans:1,exp:'CloudFront Origin Failover lets you configure an origin group with a primary and secondary origin. When the primary origin returns a 5xx error or times out, CloudFront automatically retries the request against the secondary origin — transparently to the user. Using an S3 bucket backed by CRR in us-west-2 as the secondary ensures the content is current. Origin Shield reduces origin load but provides no failover. Field-level encryption is a data protection feature. Signed URLs control access, not failover.'},
{id:123,domain:'resilient',sub:'ELB',q:'A company deploys application updates using blue/green deployment with an ALB. They want to gradually shift 10% of traffic to the new version, monitor for errors, and roll back automatically if error rates exceed 5%. What is the MOST automated approach?',opts:['Manually adjust Route 53 weighted routing records between blue and green target groups.','Use ALB weighted target groups integrated with AWS CodeDeploy for automated canary deployment and rollback.','Modify the ALB listener rules manually during each deployment.','Use CloudFront with two origins and adjust origin weights.'],ans:1,exp:'ALB weighted target groups allow sending a configurable percentage of traffic to each target group. AWS CodeDeploy integrates natively with ALB for blue/green deployments, supports canary and linear traffic-shifting schedules, and automatically rolls back when a configured CloudWatch alarm (e.g., error rate > 5%) triggers. Route 53 weighted routing has DNS propagation delays making precise, fast rollbacks unreliable. Manual listener rule changes require human intervention. CloudFront is a CDN, not designed for application deployment orchestration.'},
{id:124,domain:'resilient',sub:'Messaging',q:'An order service must publish events so that three downstream services (inventory, shipping, billing) each independently receive every order event. Each service needs its own retry buffer and must process events independently. Which architecture achieves this fan-out?',opts:['One SQS standard queue that all three services poll.','One SNS topic with three SQS queues subscribed — one per downstream service.','One Kinesis Data Stream with three separate consumer applications.','Three separate SQS queues; the order service writes to all three.'],ans:1,exp:'SNS fan-out: the order service publishes one message to an SNS topic; SNS delivers a copy to each subscribed SQS queue. Each downstream service polls its own queue, giving each independent buffering, retry logic, and failure isolation. A single SQS queue would deliver each message to only one of the competing consumers (not all three). Kinesis works but requires consumers to manage shard offsets and is better suited to streaming/analytics. Writing to three queues from the order service couples it to downstream infrastructure.'},
{id:125,domain:'resilient',sub:'Auto Scaling',q:'A web application experiences a predictable surge in traffic every weekday at 9 AM when users log in. EC2 instances take 7 minutes to launch and pass health checks. Users experience slow responses at exactly 9 AM despite having step scaling configured. What is the MOST effective fix?',opts:['Use target tracking scaling with a lower CPU threshold to trigger scaling sooner.','Configure a scheduled scaling action to increase capacity at 8:50 AM on weekdays.','Increase the default cooldown period to allow more instances to launch before the next policy fires.','Switch to larger EC2 instance types so each instance handles more traffic.'],ans:1,exp:'Scheduled scaling pre-emptively adds capacity at 8:50 AM (10 minutes before the spike), giving instances their 7-minute launch time before the 9 AM traffic arrives. Step and target tracking scaling are reactive — they trigger only after CPU or request count rises, meaning instances launch after the spike has already degraded performance. Larger instances help with per-instance capacity but don\'t solve the timing problem. Cooldown adjustments affect how quickly subsequent scaling occurs, not pre-spike capacity.'},
{id:126,domain:'resilient',sub:'Backup',q:'A company runs RDS, DynamoDB tables, and EFS file systems across multiple AWS accounts. Compliance requires centrally managed backup policies, 90-day retention, and copies stored in a separate, isolated AWS account. Which service fulfills all requirements?',opts:['Individual service backup features (RDS automated backups, DynamoDB PITR, EFS backup policy)','AWS Backup with cross-account copy and backup vaults in the destination account','AWS DataSync with scheduled daily replication to the backup account','AWS DMS replicating all databases to the backup account continuously'],ans:1,exp:'AWS Backup provides centralized backup management for RDS, DynamoDB, EFS, EC2, S3, and other services via backup plans defining schedules and retention. Cross-account copy (enabled via AWS Organizations integration) automatically sends backup copies to an isolated backup account\'s vault. Per-service backup features lack central management and cross-account isolation. DataSync is a file/data migration service, not a backup manager. DMS is for database migration/replication, not backup orchestration with retention policies.'},
// ── Performing ────────────────────────────────────────────────────────────────
{id:127,domain:'performing',sub:'EC2',q:'An HPC cluster running tightly-coupled MPI simulations requires sub-millisecond inter-node latency and maximum network bandwidth between EC2 instances. Which placement group type is MOST appropriate?',opts:['Spread placement group — distributes instances across distinct hardware','Partition placement group — groups of instances in isolated partitions','Cluster placement group — instances on the same physical hardware rack','No placement group — AWS optimizes placement automatically'],ans:2,exp:'Cluster placement groups pack instances onto the same underlying hardware rack within a single AZ, enabling 100 Gbps network throughput (with ENA and EFA) and single-digit microsecond latency — essential for MPI. Spread placement groups limit 7 instances per AZ per group and maximize fault isolation (opposite of what HPC needs). Partition groups isolate large distributed workloads across fault domains (for HDFS/Cassandra, not MPI). Default placement makes no guarantees about network proximity.'},
{id:128,domain:'performing',sub:'Storage',q:'A machine learning training job running on hundreds of EC2 instances requires a shared POSIX file system with sub-millisecond latency, hundreds of GB/s aggregate throughput, and native integration with data stored in S3. Which storage service is MOST appropriate?',opts:['Amazon EFS in Max I/O performance mode','Amazon FSx for Lustre','Amazon EBS Multi-Attach io2 volumes','S3 mounted via s3fs-fuse on each instance'],ans:1,exp:'FSx for Lustre is a fully managed, high-performance parallel file system purpose-built for compute-intensive workloads. It delivers sub-millisecond latencies, hundreds of GB/s aggregate throughput, scales to petabytes, and natively links to S3 (data can be lazily loaded from S3 or written back after processing). EFS Max I/O mode has higher metadata latency and lower per-file throughput — insufficient for demanding ML training. EBS Multi-Attach is limited to 16 instances and one AZ. s3fs is FUSE-based with high latency, not suitable for performance-sensitive training.'},
{id:129,domain:'performing',sub:'Lambda',q:'A Java-based Lambda function has cold start latencies of 3-4 seconds that are unacceptable for a customer-facing API. The function must remain Java (cannot be rewritten). Traffic is unpredictable with frequent cold starts. Which approach MOST effectively reduces cold start latency?',opts:['Increase the function\'s allocated memory to the maximum (10,240 MB).','Enable Lambda Provisioned Concurrency for the function.','Deploy the function to Lambda@Edge closer to users.','Use Lambda SnapStart for the Java runtime.'],ans:3,exp:'Lambda SnapStart (available for Java 11, 17, and 21) takes a snapshot of the fully initialized execution environment after the init phase completes, then restores execution environments from that snapshot — bypassing the JVM startup and class-loading cost that makes Java cold starts slow. This can reduce cold start latency by up to 90%. Provisioned Concurrency pre-initializes environments but costs money continuously even when idle. Increasing memory speeds up execution but not initialization. Lambda@Edge reduces network latency, not cold start time.'},
{id:130,domain:'performing',sub:'API Gateway',q:'A REST API on API Gateway and Lambda handles 1 million requests per day. Many requests query the same product catalog data that changes only once per hour. Lambda timeouts during traffic spikes cause 502 errors. Which solution reduces backend load with the LEAST application change?',opts:['Add an SQS queue between API Gateway and Lambda to buffer spikes.','Enable API Gateway caching with a 1-hour TTL for the product catalog endpoints.','Increase Lambda reserved concurrency to 10,000.','Deploy ElastiCache for Redis and update Lambda to check cache before querying the database.'],ans:1,exp:'API Gateway caching stores endpoint responses in a dedicated cache (TTL up to 1 hour). Repeated requests for the same resource are served from cache without invoking Lambda or hitting the database — dramatically reducing backend load during spikes. Zero application code changes required. SQS between API Gateway and Lambda makes the API asynchronous (no immediate response), breaking REST semantics. Increasing Lambda concurrency doesn\'t reduce database load. ElastiCache requires Lambda code changes.'},
{id:131,domain:'performing',sub:'CloudFront',q:'CloudFront serves a product API where responses vary based on the Accept-Language and Currency HTTP headers. Currently all requests share one cache entry. How should CloudFront be configured to cache separate responses per language/currency combination?',opts:['Forward all headers to the origin by adding them to the Origin Request Policy.','Add Accept-Language and Currency to the CloudFront Cache Policy as cache key headers.','Set the default TTL to 0 to disable caching and always forward to origin.','Use Lambda@Edge to strip the headers before caching.'],ans:1,exp:'CloudFront cache keys determine which requests get different cached responses. Adding Accept-Language and Currency to the Cache Policy\'s header-based cache key causes CloudFront to maintain separate cache entries for each combination — serving the correct localized response from cache. Origin Request Policies control which headers are forwarded to origin, but adding headers there does NOT change the cache key (a common confusion). Setting TTL to 0 eliminates caching entirely. Lambda@Edge stripping headers would lose the localization data.'},
{id:132,domain:'performing',sub:'Database',q:'An RDS PostgreSQL primary instance handles 15,000 read queries/second and 300 write queries/second. The instance is CPU-bound on reads. The application cannot be modified to use a caching layer. What is the MOST effective way to scale reads?',opts:['Enable RDS Multi-AZ — distribute read traffic to the standby instance.','Migrate to Amazon Aurora PostgreSQL and distribute reads across up to 15 Aurora Replicas.','Increase the RDS instance to the largest available class.','Add Amazon ElastiCache for PostgreSQL as a read cache.'],ans:1,exp:'Aurora PostgreSQL supports up to 15 Aurora Replicas that share the same underlying storage (no replication lag for reads). The Aurora Reader Endpoint load-balances read connections across all replicas, horizontally scaling read capacity. RDS Multi-AZ standby is NOT readable — it exists only for failover. Increasing instance size vertically scales one node and is quickly exhausted. There is no "ElastiCache for PostgreSQL" — ElastiCache is a standalone cache requiring application changes.'},
{id:133,domain:'performing',sub:'Kinesis',q:'An IoT platform ingests 40,000 sensor events per second, each ~1 KB. Events must be processed in real-time, kept in order per device, and must be replayable for up to 7 days. Which service is MOST appropriate?',opts:['Amazon SQS FIFO queue — guarantees ordering and exactly-once delivery.','Amazon Kinesis Data Streams — multiple shards with device ID as partition key.','Amazon SNS — pub/sub fan-out to multiple processors.','Amazon MSK (Managed Kafka) — highest throughput but maximum operational overhead.'],ans:1,exp:'Kinesis Data Streams: 40,000 events/sec × 1 KB = 40 MB/s, manageable with 40+ shards (1 MB/s each). Using device ID as the partition key routes each device\'s events to the same shard, preserving order. Data retention of up to 365 days (7 days default, extendable). Sub-second processing with Lambda or KCL. SQS FIFO has a limit of 3,000 msg/s per queue (insufficient for 40,000/sec) and no replay. SNS has no ordering or replay. MSK provides similar capabilities but requires cluster management.'},
{id:134,domain:'performing',sub:'DynamoDB',q:'A DynamoDB table has userId (partition key) and orderDate (sort key). An application must efficiently query all orders for a specific user within a date range, sorted by date. How should this query be structured?',opts:['Scan the table with a FilterExpression on userId and orderDate.','Query using KeyConditionExpression: userId = :id AND orderDate BETWEEN :start AND :end.','Create a GSI on orderDate and query by orderDate range.','Create an LSI on a secondary attribute and filter by userId.'],ans:1,exp:'Because userId is the partition key and orderDate is the sort key, a Query with KeyConditionExpression is the correct and efficient access pattern: userId = :id (partition) AND orderDate BETWEEN :start AND :end (sort key range). DynamoDB evaluates this server-side and returns results sorted by orderDate. A Scan reads the entire table (extremely inefficient at scale). A GSI on orderDate only would scatter orders across all partition key values — you couldn\'t efficiently filter by userId. The base table design already matches this exact access pattern.'},
{id:135,domain:'performing',sub:'Compute',q:'A company runs 150 containerized microservices and wants to avoid all infrastructure management — no EC2 node provisioning, patching, or cluster scaling. Which container platform eliminates ALL infrastructure management?',opts:['Amazon ECS on EC2 with Cluster Auto Scaling.','Amazon EKS with managed node groups.','Amazon ECS or EKS with AWS Fargate.','Amazon EC2 Auto Scaling group with Docker installed.'],ans:2,exp:'AWS Fargate is a serverless compute engine for containers — you define the CPU and memory per task/pod, AWS manages all underlying compute infrastructure (no EC2 instances to provision, patch, or scale). Both ECS and EKS can use Fargate as the launch type. ECS on EC2 and EKS managed node groups both require managing EC2 instances (AMI updates, capacity scaling). EC2 Auto Scaling with Docker is entirely self-managed.'},
{id:136,domain:'performing',sub:'Networking',q:'A company has 12 VPCs across 4 AWS accounts that need full any-to-any connectivity plus access to an on-premises network via one AWS Direct Connect connection. What is the MOST scalable architecture?',opts:['VPC peering between every pair of VPCs (66 peering connections) plus Direct Connect per account.','AWS Transit Gateway connected to all VPCs, with Direct Connect using a Transit VIF attached to the Transit Gateway.','One shared services VPC peered to all others (hub and spoke) with Direct Connect attached.','AWS VPN to each VPC from on-premises with peering between VPCs.'],ans:1,exp:'AWS Transit Gateway acts as a regional any-to-any routing hub. Each VPC attaches once to the TGW (12 attachments); a Transit VIF on Direct Connect connects to the TGW, giving on-premises access to all VPCs through one connection. VPC peering requires O(n²) connections (12 VPCs = 66 peerings), doesn\'t support transitive routing, and doesn\'t simplify Direct Connect. Hub-and-spoke VPC peering doesn\'t scale, and peering also doesn\'t support transitive routing.'},
{id:137,domain:'performing',sub:'Analytics',q:'A data team needs to run ad-hoc SQL queries against 200 TB of compressed Parquet files stored in S3, without managing any servers or loading data into a separate database. Query results should appear in seconds to minutes. Which solution is MOST appropriate?',opts:['Load data into Amazon Redshift and run SQL queries.','Use Amazon Athena with an AWS Glue Data Catalog.','Launch an Amazon EMR cluster on-demand for each query session.','Use RDS PostgreSQL with S3 Foreign Data Wrapper.'],ans:1,exp:'Amazon Athena is a serverless interactive query service that runs SQL directly on S3 data using Presto. With Glue Data Catalog for schema management, it queries Parquet efficiently via columnar predicate pushdown — no data loading, no cluster management, pay per TB scanned. Redshift requires loading data and ongoing cluster management. EMR requires cluster provisioning (minutes of startup, ongoing management). RDS Foreign Data Wrapper has poor performance at 200 TB scale and still requires managing an RDS instance.'},
{id:138,domain:'performing',sub:'ElastiCache',q:'A real-time gaming leaderboard needs to update player scores, retrieve the top 100 players by score in sorted order, and expire daily leaderboard data automatically via TTL. Which solution is BEST suited?',opts:['ElastiCache for Memcached with a hash map structure.','ElastiCache for Redis with sorted sets (ZSET) and key-level TTL.','ElastiCache for Redis with lists and LRANGE queries.','DynamoDB with a GSI on score for sorted reads.'],ans:1,exp:'Redis Sorted Sets (ZSET): ZADD sets or updates a player\'s score; ZREVRANGE retrieves the top N players in sorted order in O(log N + M) time. A TTL on the daily leaderboard key automatically expires it at midnight. This is the canonical Redis leaderboard pattern. Memcached doesn\'t support sorted data structures or key TTL. Redis Lists maintain insertion order, not score order. DynamoDB with a GSI works but adds read latency vs. in-memory and requires careful partition key design for hotspot avoidance.'},
{id:139,domain:'performing',sub:'Compute',q:'A batch scientific simulation takes 60-90 minutes per job and can checkpoint its state every 5 minutes. The company wants to run hundreds of simulations simultaneously at minimum cost. Jobs are interruptible. Which EC2 strategy is MOST cost-effective?',opts:['On-Demand Instances with a large EC2 instance.','Reserved Instances (1-year) for the expected steady base workload.','Spot Instances using a Spot Fleet with checkpointing.','Dedicated Hosts to eliminate per-instance licensing costs.'],ans:2,exp:'Spot Instances offer up to 90% discount. With 5-minute checkpointing, a 2-minute Spot interruption notice means the job restarts losing at most ~7 minutes of work — acceptable for 60-90 minute simulations. Spot Fleet diversifies across instance types and AZs to minimize interruption probability. On-Demand at full price is unnecessary for interruptible batch. Reserved Instances are best for steady 24/7 workloads, not burst batch. Dedicated Hosts are for software licensing requirements, not cost optimization.'},

{id:140,domain:'cost',sub:'EC2 Purchasing',q:'A company runs a fleet of 20 EC2 instances 24/7 for 3 years. The instance types are fixed and will not change. Which purchasing option provides the GREATEST savings?',opts:['On-Demand Instances','Compute Savings Plans (3-year, all-upfront)','Standard Reserved Instances (3-year, all-upfront)','Spot Instances'],ans:2,exp:'3-year All-Upfront Standard Reserved Instances offer the maximum discount (~72% vs On-Demand) for a specific instance type, region, OS, and tenancy. When the instance type and region are fixed for 3 years, Standard RIs outperform Compute Savings Plans (~66% discount) because Savings Plans trade some discount for flexibility (change instance family, region, or service). Spot Instances cannot be used for 24/7 stable workloads due to interruption risk. On-Demand has no discount.'},
{id:141,domain:'cost',sub:'S3 Storage Classes',q:'A company stores compliance documents in S3 that must be retained 7 years. Files are read frequently in the first 30 days then accessed perhaps once per year for audits (retrieval time up to 5 hours acceptable). Which lifecycle policy is MOST cost-effective?',opts:['Store in S3 Standard indefinitely.','Transition to S3 Standard-IA after 30 days, then to S3 Glacier Flexible Retrieval after 90 days.','Use S3 Intelligent-Tiering for the entire 7 years.','Transition to S3 One Zone-IA after 30 days, then to S3 Glacier Deep Archive after 90 days.'],ans:1,exp:'Standard for 30 days covers frequent access. Standard-IA ($0.0125/GB) covers the transition period where occasional immediate access is needed. Glacier Flexible Retrieval ($0.0036/GB) provides 3-5 hour retrieval (within the 5-hour SLA) for rare audit access — the cheapest class that meets the retrieval time. One Zone-IA stores data in only one AZ — unacceptable for compliance data. Glacier Deep Archive ($0.00099/GB) has 12-48 hour retrieval — may violate the 5-hour SLA. Intelligent-Tiering adds per-object monitoring fees optimized for unpredictable patterns.'},
{id:142,domain:'cost',sub:'Serverless',q:'A REST API receives 300 requests per day, only during business hours (8 AM–6 PM weekdays). Each request takes 3 seconds of compute. What is the MOST cost-effective compute platform?',opts:['EC2 t3.small running 24/7 (On-Demand)','EC2 t3.small Reserved Instance (1-year, no-upfront)','AWS Lambda','ECS Fargate with scheduled scale-in at night'],ans:2,exp:'Lambda charges per invocation + GB-seconds. 300 req/day × 3s × 20 working days ≈ 18,000 GB-seconds/month — this costs cents at Lambda pricing ($0.0000166667/GB-second). The free tier (400,000 GB-seconds/month) likely covers it entirely. EC2 t3.small runs 24/7 even when idle, costing ~$15/month On-Demand or ~$10/month reserved. Fargate scales down but has cold start overhead and minimum billing. Lambda is the canonical choice for low-volume, event-driven APIs with irregular traffic.'},
{id:143,domain:'cost',sub:'Data Transfer',q:'A company is surprised by high data transfer costs between EC2 instances within the same Region. Which scenario DOES incur data transfer charges?',opts:['EC2 in us-east-1a reading objects from Amazon S3 in us-east-1.','EC2 in us-east-1a sending data to EC2 in us-east-1b using private IP addresses.','EC2 in us-east-1a uploading data to S3 in us-east-1.','CloudFront fetching from an S3 origin bucket in the same Region.'],ans:1,exp:'Cross-AZ traffic within the same Region using private IPs is charged at $0.01/GB per direction ($0.02/GB round-trip). This is a commonly overlooked cost, especially for microservices architectures where services in different AZs communicate frequently. EC2-to-S3 in the same Region is free (both inbound to S3 and EC2-initiated transfers within the same region). CloudFront-to-S3 same-Region origin fetches are free. EC2 uploads to same-Region S3 are free.'},
{id:144,domain:'cost',sub:'Savings Plans',q:'A company currently uses c5, m5, and r5 EC2 instances in us-east-1 and eu-west-1. Over the next year they plan to migrate some workloads to Lambda and AWS Fargate. Which purchasing option provides savings AND flexibility to change instance families, regions, and even compute service types?',opts:['Standard Reserved Instances per instance type and region.','EC2 Instance Savings Plans for c5, m5, and r5 in each region.','Compute Savings Plans (3-year).','Convertible Reserved Instances.'],ans:2,exp:'Compute Savings Plans automatically apply to EC2 (any instance family, size, region, OS, tenancy), Lambda, and Fargate — providing ~66% discount. They are ideal when migrating across instance types or services. EC2 Instance Savings Plans apply only to a specific instance family in a region (e.g., c5 in us-east-1). Standard RIs are locked to a specific instance type and region. Convertible RIs can be exchanged but don\'t cover Lambda or Fargate usage.'},
{id:145,domain:'cost',sub:'Spot',q:'A company runs a Spot Instance fleet processing a video rendering job. AWS sends a Spot interruption notice. How much time does the application have to save its state before termination?',opts:['30 seconds','1 minute','2 minutes','5 minutes'],ans:2,exp:'AWS provides exactly 2 minutes of warning before reclaiming a Spot Instance. The interruption notice appears in the EC2 instance metadata at /latest/meta-data/spot/interruption-action and as an EventBridge event. Applications must checkpoint, drain connections, or gracefully terminate within this 2-minute window. Auto Scaling groups automatically request replacement Spot capacity. This 2-minute window is a fixed AWS SLA — designing applications around it is a core Spot Instance best practice.'},
{id:146,domain:'cost',sub:'Storage',q:'A company must retrieve 1 TB of archived data from S3 Glacier Flexible Retrieval within 5 hours at the LOWEST cost. Which retrieval option should they use?',opts:['Expedited (1-5 minutes) — $0.03/GB','Standard (3-5 hours) — $0.01/GB','Bulk (5-12 hours) — $0.0025/GB','Instant (milliseconds) — $0.03/GB from Glacier Instant Retrieval class'],ans:1,exp:'Standard retrieval (3-5 hours) delivers within the required 5-hour window at $0.01/GB = $10 for 1 TB. Expedited (1-5 min) is $0.03/GB = $30 — three times more expensive and faster than required. Bulk retrieval ($0.0025/GB = $2.50) is cheapest but takes 5-12 hours — doesn\'t guarantee meeting the 5-hour SLA. Instant Retrieval is a separate S3 Glacier storage class, not a retrieval tier of Glacier Flexible Retrieval.'},
{id:147,domain:'cost',sub:'Architecture',q:'A company runs an EC2 fleet that polls S3 every 5 seconds for new image uploads to process. CPU averages 4% utilization and costs $600/month. What redesign reduces costs MOST dramatically?',opts:['Switch to smaller EC2 instance types.','Replace On-Demand with Spot Instances.','Replace the polling EC2 fleet with Lambda functions triggered by S3 event notifications.','Add Auto Scaling to scale the fleet down to one instance at night.'],ans:2,exp:'The polling pattern wastes 96% of EC2 compute waiting for uploads that haven\'t arrived. Lambda triggered by S3 PutObject events runs only when an upload occurs — zero cost when idle, pennies per GB of images processed. This can reduce costs from $600/month to under $5/month for typical workloads. Spot Instances and smaller instance types reduce the bill but still pay for idle waiting. Auto Scaling helps with variable traffic, but the core problem is a polling architecture on an event-driven workload.'},
{id:148,domain:'cost',sub:'RDS',q:'AWS Cost Explorer shows an RDS db.r5.8xlarge running at 12% CPU and 25% memory utilization on average. What is the RECOMMENDED cost optimization step?',opts:['Migrate from RDS to DynamoDB to eliminate relational database costs.','Enable Multi-AZ on the current instance to distribute load.','Rightsize to a db.r5.2xlarge or db.r5.4xlarge and monitor performance metrics after the change.','Purchase 3-year All-Upfront Reserved Instances for the current db.r5.8xlarge.'],ans:2,exp:'12% CPU and 25% memory on an 8xlarge indicates severe overprovisioning. Rightsizing to a 2xlarge or 4xlarge can cut RDS costs by 50-75% while maintaining comfortable headroom. AWS Compute Optimizer and RDS Performance Insights can confirm the right target size. Buying RIs for an oversized instance locks in ongoing waste. Multi-AZ doubles cost and doesn\'t reduce per-instance utilization. Migrating to DynamoDB requires significant application changes and isn\'t appropriate for complex relational schemas.'},
{id:149,domain:'cost',sub:'S3',q:'A company\'s application frequently uploads and downloads the same set of 500 MB reference datasets from S3. Each dataset is downloaded by 200 EC2 instances on startup. The company wants to reduce S3 data transfer costs. Which solution is MOST cost-effective?',opts:['Enable S3 Transfer Acceleration for faster downloads.','Use S3 Select to retrieve only needed columns.','Store the datasets in ElastiCache for Redis instead of S3.','Use an S3 VPC Gateway Endpoint so EC2 instances download via the AWS network at no data transfer cost.'],ans:3,exp:'S3 data transfer within the same Region via a Gateway Endpoint is free — traffic stays on the AWS network and doesn\'t incur standard S3-to-EC2 data transfer charges ($0.00/GB within same region). A Gateway Endpoint requires only a route table entry. Transfer Acceleration speeds up transfers but costs extra and doesn\'t reduce transfer fees. S3 Select reduces data volume returned by filtering server-side, but only works for structured data. ElastiCache can cache data but is more expensive than S3 at scale and requires application changes.'},
{id:150,domain:'cost',sub:'Compute',q:'A company runs 30 EC2 On-Demand instances in a dev/test environment that are used only Monday–Friday, 8 AM–6 PM (50 hours/week out of 168). What simple action reduces EC2 costs by approximately 70% without changing instance types?',opts:['Switch to Spot Instances for maximum savings.','Purchase 1-year Reserved Instances for all 30 instances.','Use Instance Scheduler or Auto Scaling Scheduled Actions to stop instances outside business hours.','Migrate the dev/test workloads to Lambda.'],ans:2,exp:'Dev/test instances run 50/168 hours per week = ~30% of the time. Stopping them outside business hours eliminates ~70% of EC2 charges immediately (you pay only for running hours). Instance Scheduler or scheduled Auto Scaling actions automate this. Spot Instances can be interrupted at any time, disrupting active developer sessions. Reserved Instances are billed 24/7 regardless of whether the instance runs — purchasing RIs for 30%-utilized instances wastes money. Migrating to Lambda requires significant application refactoring.'},
{id:151,domain:'cost',sub:'Data Transfer',q:'A company processes large datasets by loading them from S3 into EC2 instances in the same Region for analysis, then uploads the results back to S3. They want to minimize all data transfer charges. What should they verify?',opts:['The EC2 instances are in the same AZ as the S3 bucket.','The EC2 instances use a VPC Gateway Endpoint for S3 and are in the same Region as the S3 bucket.','The EC2 instances are using S3 Transfer Acceleration.','The EC2 instances are Spot Instances to reduce the overall compute cost.'],ans:1,exp:'S3 data transfer from EC2 to S3 (and S3 to EC2) within the same Region using a VPC Gateway Endpoint incurs zero data transfer charges. S3 is a regional service — AZ co-location is irrelevant for S3 transfer costs (unlike EC2-to-EC2 which incurs cross-AZ fees). Transfer Acceleration speeds up uploads but adds fees, not removes them. Spot vs On-Demand affects compute cost but not data transfer cost.'},
{id:152,domain:'cost',sub:'Architecture',q:'A company stores application logs in S3 and runs daily EMR jobs to analyze them. The EMR clusters are provisioned at maximum peak capacity but are only busy for 2 hours of their 8-hour runtime. What optimization reduces cost MOST significantly?',opts:['Switch EMR core nodes to Reserved Instances.','Use EMR managed scaling with Spot Instances for task nodes.','Increase EMR cluster size to finish jobs faster.','Migrate log analysis to a persistent RDS cluster.'],ans:1,exp:'EMR managed scaling automatically adds and removes task nodes (which don\'t store HDFS data) based on workload demand. Using Spot Instances for task nodes saves up to 90% on those nodes. Since task nodes hold no HDFS data, their interruption only slows jobs momentarily — they\'re restarted from the last checkpoint. Core nodes (on On-Demand or Reserved) maintain the cluster. This combination — managed scaling + Spot tasks — is the canonical cost optimization for variable EMR workloads. Larger clusters finish faster but don\'t reduce total cluster-hour cost.'},
{id:153,domain:'cost',sub:'Networking',q:'A company runs a NAT Gateway in each of its 3 Availability Zones for high availability. Each NAT Gateway processes 10 TB/month of outbound traffic. The team notices NAT Gateway data processing fees are a top cost. Which architectural change MOST reduces these costs?',opts:['Replace NAT Gateways with a single NAT instance.','Use a VPC Gateway Endpoint for S3 traffic and an Interface Endpoint for other AWS service traffic, removing that traffic from the NAT Gateway path.','Reduce the number of NAT Gateways to one to cut the hourly charge.','Enable NAT Gateway data compression to reduce processing fees.'],ans:1,exp:'NAT Gateway charges $0.045/GB for all data processed. Traffic to AWS services (S3, DynamoDB via Gateway Endpoint; ECR, SSM, Secrets Manager, CloudWatch via Interface Endpoints) can be routed through VPC endpoints — bypassing the NAT Gateway entirely and eliminating those processing fees. This is commonly the largest component of NAT Gateway costs in containerized workloads (container image pulls from ECR being a major contributor). Reducing to one NAT Gateway saves the hourly fee (~$100/month) but creates an AZ single point of failure. NAT instances have no data compression feature.'},
{id:154,domain:'cost',sub:'EC2',q:'AWS Compute Optimizer recommends downsizing 10 production EC2 instances from m5.4xlarge to m5.2xlarge based on utilization data. The operations team is concerned about performance impact. What is the SAFEST way to act on this recommendation?',opts:['Immediately resize all 10 instances at once during the next maintenance window.','Resize one instance, monitor CPU/memory/application metrics for a week, then proceed with the rest if no degradation is observed.','Dismiss the recommendation — Compute Optimizer can\'t account for traffic spikes.','Purchase Reserved Instances for the current m5.4xlarge size before resizing.'],ans:1,exp:'Rightsize one instance first (a canary approach). Monitor CPU utilization, memory, application response times, and error rates under real production traffic for several days to a week. If metrics remain healthy, proceed with the remaining instances in batches. Compute Optimizer analyzes 14 days of CloudWatch metrics and is generally accurate — dismissing recommendations without validation is a missed cost optimization opportunity. Resizing all 10 at once risks widespread performance impact if the recommendation is wrong for peak scenarios. Buying RIs at the current size locks in ongoing waste.'},
];

const FLASHCARDS=[
  {id:1,domain:'secure',front:'IAM Role vs IAM User',back:'Role: temporary creds via STS, no static keys, assumed by services/users. User: permanent identity with long-term access keys. Use roles for EC2, Lambda, cross-account.'},
  {id:2,domain:'secure',front:'Security Group vs NACL',back:'SG: stateful, instance-level, allow only, evaluates all rules. NACL: stateless, subnet-level, allow+deny, rules evaluated in order (lowest # first).'},
  {id:3,domain:'secure',front:'AWS KMS Key Types',back:'AWS managed: free, auto-rotated yearly, no policy control. Customer managed: $1/month, full policy control, custom rotation. AWS owned: free, invisible, AWS controls.'},
  {id:4,domain:'secure',front:'Cognito: User Pools vs Identity Pools',back:'User Pools = AuthN (who are you?): sign-up, sign-in, tokens. Identity Pools = AuthZ (what can you do?): swap any token for AWS credentials.'},
  {id:5,domain:'secure',front:'S3 Object Ownership & ACLs',back:'Bucket Owner Enforced: disables ACLs, owner owns all objects. ACLs: legacy, per-object. Best practice: disable ACLs, use bucket policies instead.'},
  {id:6,domain:'secure',front:'AWS Shield Standard vs Advanced',back:'Standard: free, auto, L3/4 DDoS protection. Advanced: $3k/month+, L7 protection, DDoS cost protection, 24/7 DRT access, detailed metrics.'},
  {id:7,domain:'secure',front:'VPC Endpoint Types',back:'Gateway Endpoint: S3 + DynamoDB only, free, route table entry. Interface Endpoint (PrivateLink): any service, ENI in VPC, hourly + data charges.'},
  {id:8,domain:'secure',front:'SCP vs Permission Boundary vs Resource Policy',back:'SCP: org-level max perms for all principals in account. Boundary: IAM-level max perms for specific principal. Resource policy: attached to resource, controls who can access it.'},
  {id:9,domain:'resilient',front:'RDS Multi-AZ vs Read Replicas',back:'Multi-AZ: synchronous standby, same region, auto failover, NOT readable. Read Replicas: async, up to 5, readable, cross-region possible, manual promotion.'},
  {id:10,domain:'resilient',front:'Route 53 Routing Policies',back:'Simple: one record. Weighted: A/B traffic split. Latency: lowest latency region. Failover: primary/secondary. Geolocation: based on user location. Geoproximity: bias-adjusted. Multivalue: returns multiple IPs.'},
  {id:11,domain:'resilient',front:'DR Strategies (cost low→high)',back:'Backup & Restore (hours RTO) → Pilot Light (core infra, scale up) → Warm Standby (scaled-down full copy) → Multi-site Active/Active (full scale, near-zero RTO).'},
  {id:12,domain:'resilient',front:'SQS Standard vs FIFO',back:'Standard: at-least-once, best-effort order, unlimited TPS. FIFO: exactly-once, strict order, 3,000 msg/s (batching), .fifo suffix required.'},
  {id:13,domain:'resilient',front:'Aurora vs RDS',back:'Aurora: AWS-built, 3 AZs×2 copies (6 total), auto-grows 10GB increments to 128TB, up to 15 read replicas, ~5× faster than MySQL. Shared storage = fast replication.'},
  {id:14,domain:'resilient',front:'ASG Scaling Policies',back:'Simple: single CloudWatch alarm→action. Step: multiple thresholds, different actions. Target Tracking: maintain metric at target (e.g. 50% CPU). Scheduled: time-based. Predictive: ML-based forecast.'},
  {id:15,domain:'resilient',front:'ELB Types',back:'ALB: L7, HTTP/HTTPS/gRPC, path+host routing, WAF integration. NLB: L4, TCP/UDP/TLS, static IP, millions RPS, preserve source IP. GLB: L3, inline network appliances. CLB: legacy, avoid.'},
  {id:16,domain:'resilient',front:'SNS vs SQS vs EventBridge',back:'SNS: push, fan-out, pub/sub, 10M subs/topic. SQS: pull, queue, decouple. EventBridge: event bus, 90+ sources, routing rules, schema registry, 3rd party.'},
  {id:17,domain:'performing',front:'ElastiCache Redis vs Memcached',back:'Redis: persistence, replication, pub/sub, sorted sets, Lua, Multi-AZ, AUTH. Memcached: multithreaded, simple, no persistence, horizontal scaling via sharding. Choose Redis for almost everything.'},
  {id:18,domain:'performing',front:'EBS Volume Types',back:'gp3: default, 3000 IOPS baseline, 125 MB/s, independent IOPS/throughput config. io2 Block Express: max 256k IOPS, for databases. st1: throughput HDD, big data. sc1: cold HDD, cheapest.'},
  {id:19,domain:'performing',front:'CloudFront Caching',back:'TTL: set via Cache-Control/Expires headers or CloudFront behavior. Invalidations: $0.005/path (after 1000/month free). Origin Shield: regional cache layer reduces origin load. Cache key: URL + headers + cookies + query strings.'},
  {id:20,domain:'performing',front:'Lambda Performance',back:'Memory: 128MB–10GB. Duration: max 15 min. Concurrency: 1000/region default (soft limit). Cold start: ~100ms–3s. Provisioned Concurrency eliminates cold starts. Layers: share code/deps up to 250MB.'},
  {id:21,domain:'performing',front:'DynamoDB Keys & Indexes',back:'Primary key: partition key (hash) or composite (hash+sort). LSI: same partition key, different sort key, created at table creation. GSI: different partition+sort key, created anytime, eventually consistent.'},
  {id:22,domain:'performing',front:'EC2 Placement Groups',back:'Cluster: same rack, lowest latency, 10Gbps+, risk: single rack failure. Spread: separate hardware, max 7 per AZ, for critical instances. Partition: group of racks, for distributed systems (Hadoop, Kafka).'},
  {id:23,domain:'performing',front:'Kinesis Data Streams',back:'Shard: 1MB/s write, 2MB/s read. Records retained 1-365 days. Enhanced fan-out: 2MB/s per consumer per shard (push). Standard: shared 2MB/s (pull). Use KCL for consumer apps.'},
  {id:24,domain:'cost',front:'EC2 Purchasing Options',back:'On-demand: no commitment, most expensive. Reserved (1-3yr): up to 72% off, Standard or Convertible. Spot: up to 90% off, interruptible. Savings Plans: hourly commitment, flexible. Dedicated: compliance, most expensive.'},
  {id:25,domain:'cost',front:'S3 Storage Classes (cost high→low)',back:'Standard ($0.023) → Standard-IA ($0.0125, 30-day min) → One Zone-IA ($0.01) → Glacier Instant ($0.004) → Glacier Flexible ($0.0036) → Deep Archive ($0.00099). All per GB/month.'},
  {id:26,domain:'cost',front:'AWS Trusted Advisor Categories',back:'Cost Optimization: idle/underutilized resources. Performance: service limits, config. Security: open ports, MFA, IAM. Fault Tolerance: backups, Multi-AZ. Service Limits: usage vs limits.'},
  {id:27,domain:'cost',front:'Data Transfer Costs',back:'Free: inbound from internet, same-AZ same-service, S3→CloudFront, S3/DynamoDB via Gateway Endpoint. Charged: outbound to internet, inter-AZ ($0.01/GB), inter-region.'},
  {id:28,domain:'cost',front:'Compute Optimizer vs Trusted Advisor',back:'Compute Optimizer: ML-based, EC2/Lambda/ECS/EBS rightsizing with detailed analysis. Trusted Advisor: broader scope (cost/security/perf/limits), less granular on compute recommendations.'},
  {id:29,domain:'resilient',front:'Aurora Key Features',back:'6 copies across 3 AZs (2 per AZ), auto-scales 10GB→128TB, up to 15 read replicas, 5× faster than MySQL. Global DB: primary + 5 secondary regions, <1s replication. Serverless: auto-scales to zero for intermittent workloads. Backtrack: rewind DB without restore.'},
  {id:30,domain:'performing',front:'DynamoDB DAX vs ElastiCache',back:'DAX: DynamoDB-native in-memory cache, microsecond reads, write-through, 1-10 nodes. ElastiCache: standalone Redis/Memcached, works with any DB. Use DAX exclusively for DynamoDB acceleration; use ElastiCache for RDS or multi-source workloads.'},
  {id:31,domain:'resilient',front:'VPC Core Components',back:'IGW: public subnet → internet (bidirectional). NAT Gateway: private subnet → internet (outbound only). Route Table: directs traffic. NACLs: stateless, subnet-level. VPC Peering: 1:1 non-transitive. Transit Gateway: hub-and-spoke transitive routing across many VPCs.'},
  {id:32,domain:'resilient',front:'Route 53 Record Types & Alias',back:'A: IPv4, AAAA: IPv6, CNAME: hostname→hostname (not root domain). Alias: hostname→AWS resource (works at root, free queries). MX: mail servers. TXT: verification/SPF. Alias can point to ELB, CloudFront, Beanstalk, S3 static website, another Route 53 record.'},
  {id:33,domain:'secure',front:'CloudFront Security Controls',back:'OAC (Origin Access Control): restricts S3 access to CloudFront only (replaces legacy OAI). Signed URLs: single file time-limited access. Signed Cookies: multiple files. WAF: L7 protection. Shield Standard: auto DDoS. Geo-restriction: allowlist or blocklist countries.'},
  {id:34,domain:'performing',front:'CloudFormation Core Concepts',back:'Template (JSON/YAML): declares resources. Stack: set of resources managed together. Change Set: preview changes before applying. StackSets: deploy across multiple accounts/regions with one operation. Nested Stacks: reuse shared components. Drift detection: find manual changes.'},
  {id:35,domain:'secure',front:'CloudTrail vs CloudWatch vs Config',back:'CloudTrail: WHO did WHAT API call and when (audit log, 90 days free). CloudWatch: WHAT is happening now (metrics, logs, alarms, dashboards). Config: WHAT changed over time (resource config history, compliance rules). All three complement each other.'},
  {id:36,domain:'secure',front:'KMS Envelope Encryption',back:'1. Generate DEK (Data Encryption Key) via KMS. 2. Encrypt data with plaintext DEK. 3. Encrypt DEK with CMK → store alongside data. 4. Decrypt: send encrypted DEK to KMS → get plaintext DEK → decrypt data. Never store unencrypted DEK. Reduces KMS API calls.'},
  {id:37,domain:'resilient',front:'Transit Gateway vs VPC Peering',back:'VPC Peering: 1:1, non-transitive, free data transfer, works with intra-region security groups. Transit Gateway: hub-and-spoke, transitive, $0.05/GB + $0.05/hr per attachment, supports multicast, 50 Gbps burst per AZ. Use TGW when connecting more than 3 VPCs.'},
  {id:38,domain:'resilient',front:'Direct Connect vs Site-to-Site VPN',back:'Direct Connect: dedicated 1/10 Gbps physical link, consistent performance, no public internet, weeks to provision, higher cost. VPN: IPSec over internet, minutes to provision, variable performance, cheap. DX + VPN: use as backup. DX Gateway: connects to multiple VPCs/regions.'},
  {id:39,domain:'performing',front:'ECS vs EKS vs Fargate (Launch Type)',back:'ECS: AWS-native orchestration, simple, tight AWS integration, task definitions in JSON. EKS: managed Kubernetes, portable, standard K8s tools. Fargate: serverless compute for ECS or EKS (no EC2 management), billed per vCPU+memory. EC2 launch type: you manage nodes.'},
  {id:40,domain:'secure',front:'Secrets Manager vs SSM Parameter Store',back:'Secrets Manager: auto-rotation for RDS/Redshift/DocumentDB, cross-account sharing, $0.40/secret/month. SSM Parameter Store: free (standard), manual rotation, SecureString via KMS, no rotation automation. Use Secrets Manager for credentials that need automated rotation.'},
  {id:41,domain:'resilient',front:'S3 Glacier Retrieval Options',back:'Glacier Instant Retrieval: ms access (like S3-IA). Glacier Flexible: Expedited 1-5 min, Standard 3-5 hr, Bulk 5-12 hr. Deep Archive: Standard 12 hr, Bulk 48 hr. Min storage: Glacier=90 days, Deep Archive=180 days. Free tier: 10 GB/month standard retrieval.'},
  {id:42,domain:'performing',front:'Redshift Architecture',back:'Leader Node: manages queries & client connections. Compute Nodes: store data & execute queries (up to 128). Massively Parallel Processing (MPP). Columnar storage + compression (no indexes needed). Redshift Spectrum: query S3 data. Runs in one AZ but snapshots can restore to another.'},
  {id:43,domain:'performing',front:'Kinesis Data Streams vs Firehose',back:'Data Streams: real-time (<200ms), manual shard management, 1-365 day retention, custom consumer code. Firehose: near real-time (60s min buffer), fully managed, auto-scales, delivers to S3/Redshift/OpenSearch/Splunk. Use Streams for real-time analytics; Firehose for simple ETL loading.'},
  {id:44,domain:'secure',front:'AWS WAF Rule Types',back:'IP Set: allow/block CIDRs. AWS Managed Rules: OWASP Top 10, bot control, known bad IPs. Rate-based: throttle per IP (DDoS). Geo Match: block/allow countries. Size Constraint: block oversized requests. String/Regex Match: block patterns. WAF attaches to ALB, CloudFront, API Gateway, AppSync.'},
  {id:45,domain:'secure',front:'IAM Policy Evaluation Logic',back:'1. Explicit DENY → always DENY. 2. SCP restricts what is possible. 3. Resource-based policy can ALLOW without identity policy (cross-account). 4. Permission Boundary caps max identity permissions. 5. Session policy limits assumed role. 6. Identity policy. Default: implicit DENY.'},
  {id:46,domain:'cost',front:'Snow Family Sizing Guide',back:'Snowcone: 8TB, battery-powered, portable for edge. Snowball Edge Compute: 40 vCPUs + local compute, edge processing. Snowball Edge Storage: 80TB usable, 52 vCPUs. Snowmobile: truck, up to 100PB, exabyte migrations. Rule of thumb: use Snow when transfer would take >1 week via internet.'},
  {id:47,domain:'performing',front:'EFS vs EBS vs Instance Store',back:'EFS: NFS shared across many EC2, regional multi-AZ, auto-scales to PBs, $0.30/GB/month. EBS: block, one EC2, AZ-specific, fixed provisioned size, $0.08/GB/month. Instance Store: ephemeral, highest IOPS, data lost on stop/terminate. Choose EFS for shared; EBS for single-instance DB/OS.'},
  {id:48,domain:'resilient',front:'API Gateway Types',back:'REST API: full features (usage plans, caching, API keys, request transforms). HTTP API: 70% cheaper, Lambda/HTTP backends only, no AWS service integration. WebSocket API: stateful, real-time (chat, live dashboards). Endpoint: Edge-optimized (CloudFront), Regional, Private (VPC endpoint).'},
  {id:49,domain:'resilient',front:'ELB Routing & Target Groups',back:'ALB path routing: /api/* → API service. ALB host routing: api.example.com vs app.example.com. Weighted target groups: canary/blue-green deployments. NLB: L4 TCP/UDP, static IP, preserve source IP, millions RPS. GLB: inline security appliances (firewalls, IDS). Health check removes unhealthy targets.'},
  {id:50,domain:'cost',front:'AWS Cost Management Tools',back:'Cost Explorer: visualize 12mo history + 12mo forecast, RI/SP recommendations. Budgets: alerts when cost/usage exceeds threshold ($0.10/day). Cost & Usage Report: most detailed, delivered to S3 up to 3×/day. Compute Optimizer: ML-based EC2/Lambda rightsizing. Pricing Calculator: pre-deployment estimates.'},
  {id:51,domain:'performing',front:'Amazon Athena & AWS Glue',back:'Athena: serverless SQL on S3, pay $5/TB scanned, supports CSV/JSON/Parquet/ORC. Use Parquet+compression to cut costs 10×. Glue: serverless ETL, Data Catalog (shared metadata store), Crawlers (auto-discover S3 schemas), Glue Studio (visual ETL). Athena uses Glue Catalog for table definitions.'},
  {id:52,domain:'resilient',front:'AWS DMS & Migration Hub',back:'DMS: migrate databases with minimal downtime, homogeneous (MySQL→MySQL) or heterogeneous (Oracle→Aurora). Schema Conversion Tool (SCT): converts DDL between incompatible engines. Migration Hub: centralized dashboard for all migrations. Application Discovery: inventory on-prem servers before migration.'},
  {id:53,domain:'secure',front:'Amazon Cognito Authentication Flow',back:'User Pools: sign-up/sign-in → JWT tokens (ID, access, refresh). Identity Pools: exchange any token (User Pool JWT, Google, Facebook, SAML) for temporary IAM credentials. Combined: User Pool authenticates → Identity Pool authorizes → access S3/DynamoDB/etc. Scales to millions of users.'},
  {id:54,domain:'performing',front:'EventBridge vs SNS vs SQS',back:'EventBridge: event bus with rules+filters+targets, schema registry, 90+ AWS sources, third-party SaaS, serverless. SNS: pub/sub fan-out, push to Lambda/SQS/email/SMS/HTTP, supports standard and FIFO topics. SQS: queue, pull-based, decouple services, DLQ for failures. EventBridge for event-driven architecture.'},
  {id:55,domain:'resilient',front:'Organizations, SCPs & Control Tower',back:'Organizations: root→OUs→member accounts. SCPs: restrict max permissions in member accounts (NOT management account), do not grant permissions. Consolidated billing: volume discounts across all accounts. Control Tower: extends Org with Landing Zone, Account Factory, guardrails (preventive+detective).'},
];

const LESSONS=[
  {day:1,domain:'secure',title:'IAM Foundations',content:`**Core concepts:** Users, Groups, Roles, Policies.

**Policy evaluation logic:**
1. Default DENY everything
2. Evaluate all applicable policies
3. Any explicit DENY → final DENY
4. If no explicit DENY and at least one ALLOW → ALLOW

**Key facts:**
- Roles use STS for temporary credentials (15min–36hr)
- Maximum 10 managed policies per user/group/role
- Permission boundary = max permissions ceiling
- SCPs affect all principals including root (except management account)

**Exam trap:** Multi-AZ standby is NOT an IAM concept — that's resilience. SCPs do NOT grant permissions, they only restrict.`},
  {day:2,domain:'secure',title:'S3 Security & Encryption',content:`**Encryption at rest:**
- SSE-S3: AWS manages keys (AES-256)
- SSE-KMS: Customer managed keys, CloudTrail auditable
- SSE-C: Customer provides key per request, AWS encrypts
- Client-side: You encrypt before uploading

**Access control hierarchy:**
Bucket ACL (legacy) → Bucket Policy → IAM Policy → VPC Endpoint Policy

**Key security features:**
- Block Public Access: 4 settings, account OR bucket level
- Object Lock: WORM compliance (Governance vs Compliance mode)
- MFA Delete: requires MFA for version deletion
- Presigned URLs: time-limited access without IAM`},
  {day:3,domain:'resilient',title:'Auto Scaling Deep Dive',content:`**ASG components:**
- Launch Template (preferred) vs Launch Configuration (legacy)
- Min/Max/Desired capacity
- Health check: EC2 (default) or ELB

**Scaling policy types:**
1. Target Tracking — simplest, maintain metric at value
2. Step Scaling — tiered responses to alarm thresholds
3. Simple Scaling — single alarm/action (cooldown applies)
4. Predictive — ML forecast, provision in advance
5. Scheduled — known traffic patterns

**Lifecycle hooks:** pause at launch/terminate → run custom actions → continue/abandon

**Instance refresh:** rolling update of ASG instances with configurable min healthy %.`},
  {day:4,domain:'performing',title:'CloudFront Architecture',content:`**Distribution types:** Web (HTTP/HTTPS), RTMP (legacy streaming)

**Origin types:** S3, ALB, EC2, HTTP endpoint, MediaStore, MediaPackage

**Cache behavior hierarchy:**
Default behavior → Path-based behaviors (evaluated in order)

**Performance features:**
- Origin Shield: reduces origin load (additional caching layer)
- Transfer Acceleration: uses CloudFront edge for S3 uploads
- Lambda@Edge / CloudFront Functions: run code at edge (Functions = faster/cheaper for simple ops)

**Security:** OAC (Origin Access Control) replaces OAI for S3. Signed URLs (1 file) vs Signed Cookies (multiple files).`},
  {day:5,domain:'cost',title:'Pricing Models & Cost Optimization',content:`**Reserved Instances:**
- Standard RI: up to 72% off, can sell in Marketplace
- Convertible RI: up to 66% off, can exchange for different attributes
- Scheduled RI: deprecated, use Savings Plans instead

**Savings Plans (more flexible):**
- Compute Savings Plans: EC2 + Lambda + Fargate, all regions/families
- EC2 Instance Savings Plans: specific region + family, higher discount

**Cost optimization pillars:**
1. Right-size before committing
2. Increase elasticity (stop unused resources)
3. Leverage correct pricing model
4. Optimize storage (S3 lifecycle, EBS snapshots)
5. Measure, monitor, improve (Cost Explorer, Budgets)`},
  {day:6,domain:'secure',title:'VPC Security Architecture',content:`**Defense in depth layers:**
1. NACLs (subnet-level, stateless)
2. Security Groups (instance-level, stateful)
3. AWS WAF (Layer 7, ALB/CloudFront/API GW)
4. AWS Shield (DDoS, L3/4)
5. GuardDuty (threat detection)

**VPC Flow Logs:** capture IP traffic metadata (not packet contents). Source, destination, port, action (ACCEPT/REJECT). Store in S3 or CloudWatch Logs.

**Private connectivity options:**
- VPC Peering: 1:1, non-transitive
- Transit Gateway: hub-and-spoke, transitive, inter-region
- PrivateLink: expose services privately, no VPC peering needed`},
  {day:7,domain:'resilient',title:'Database Resilience Patterns',content:`**RDS:**
- Multi-AZ: sync replication, auto failover ~1-2 min, same region
- Read Replicas: async, readable, cross-region, manual promotion
- Backups: automated (1-35 days PITR), manual snapshots (indefinite)

**Aurora:**
- 6 copies across 3 AZs, self-healing
- Up to 15 read replicas (shared storage = <10ms lag)
- Aurora Global: primary + up to 5 secondary regions, <1s replication
- Backtrack: rewind DB in place without restoring from snapshot

**DynamoDB:**
- Global Tables: multi-region, multi-active, last-writer-wins
- PITR: continuous backups, restore to second
- On-demand vs provisioned: on-demand for unpredictable, provisioned for predictable`},
  {day:8,domain:'performing',title:'Compute Performance Optimization',content:`**EC2 Instance families:**
- C: compute optimized (HPC, gaming, ML inference)
- R/X: memory optimized (in-memory DBs, SAP)
- I/D: storage optimized (NoSQL, data warehousing)
- P/G/Inf: accelerated (ML training, GPU)
- M/T: general purpose

**Graviton (ARM):** up to 40% better price/performance for most workloads

**Networking:**
- Enhanced Networking (ENA): up to 100 Gbps, SR-IOV
- EFA (Elastic Fabric Adapter): HPC, MPI workloads, bypasses OS network stack
- Placement groups: cluster (latency), spread (isolation), partition (distributed systems)

**Storage performance:**
- EBS: per-volume IOPS limits. io2 Block Express = 256k IOPS max
- Instance store: ephemeral, highest IOPS, data lost on stop/terminate`},
  {day:9,domain:'resilient',title:'VPC Networking Deep Dive',content:`**VPC building blocks:**
- CIDR block: /16 to /28. 5 IPs reserved per subnet (network, VPC router, DNS, future, broadcast)
- Internet Gateway (IGW): route 0.0.0.0/0 → IGW for public subnets
- NAT Gateway: managed, AZ-specific, Elastic IP required, outbound IPv4 only

**Security layers:**
1. Security Groups: stateful, instance-level, allow only
2. NACLs: stateless, subnet-level, allow + deny, evaluated lowest # first
3. VPC Flow Logs: capture metadata (not contents), store in S3 or CloudWatch Logs

**Connectivity options:**
- VPC Peering: non-transitive, works across regions and accounts
- Transit Gateway: transitive hub, supports VPN and Direct Connect attachments
- PrivateLink: expose service privately via endpoint (no VPC peering needed)
- VPN: Site-to-Site (IPSec), Client VPN (OpenVPN)

**Exam trap:** Security groups are stateful — return traffic is always allowed. NACLs are stateless — you must allow both inbound AND outbound for each connection.`},
  {day:10,domain:'performing',title:'Container Services Overview',content:`**ECS (Elastic Container Service):**
- AWS-native, simpler, tight integration with ALB/CloudWatch/IAM
- Task Definition (JSON): specifies container images, CPU, memory, ports
- Service: maintains desired task count, handles rolling updates
- Launch types: EC2 (you manage nodes) or Fargate (serverless)

**EKS (Elastic Kubernetes Service):**
- Fully managed Kubernetes control plane
- Standard Kubernetes tooling (kubectl, Helm)
- Node groups: managed (AWS handles lifecycle) or self-managed
- Fargate profiles: run pods serverlessly without nodes

**Fargate:**
- Serverless compute for ECS or EKS
- Billed per vCPU + memory per second
- Each task/pod gets dedicated kernel (no noisy neighbors)
- Use EFS for persistent shared storage with Fargate

**ECR (Elastic Container Registry):**
- Stores Docker images, integrated with ECS/EKS/Lambda
- Images stored in S3 (11 9s durability), cross-region replication`},
  {day:11,domain:'resilient',title:'Database Services Decision Tree',content:`**Relational (RDS):**
- MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, Aurora
- Use when: structured data, ACID compliance, existing SQL workloads
- Aurora preferred: 5× faster MySQL, 3× faster PostgreSQL, auto-grows

**NoSQL Options:**
- DynamoDB: key-value + document, single-digit ms, serverless, global tables
- DocumentDB: MongoDB-compatible, JSON, flexible schema, RBAC
- Neptune: graph database, Gremlin/SPARQL, social networks, knowledge graphs
- ElastiCache: Redis (persistence, pub/sub, Multi-AZ) or Memcached (simple, multithreaded)
- Keyspaces: Apache Cassandra-compatible, CQL, unlimited storage

**Analytics:**
- Redshift: data warehouse, petabyte-scale, columnar, MPP, BI tools
- Athena: serverless SQL on S3, no ETL needed, pay per query

**Migration:**
- DMS: online migration with minimal downtime
- SCT: schema conversion for heterogeneous migrations`},
  {day:12,domain:'secure',title:'Security Services Overview',content:`**Identity & Access:**
- IAM: users/groups/roles/policies, least privilege, MFA
- Cognito: user authentication for apps (User Pools) + AWS access (Identity Pools)
- Directory Service: managed Microsoft AD for enterprise SSO
- RAM: share resources across accounts (subnets, Aurora clusters, etc.)

**Threat Detection & Protection:**
- GuardDuty: ML-based threat detection (DNS, VPC Flow Logs, CloudTrail)
- Inspector: automated vulnerability scanning (EC2, ECR images, Lambda)
- Macie: S3 data classification (PII discovery, sensitive data)
- Security Hub: aggregates findings from all security services + compliance (CIS, PCI)

**Encryption & Secrets:**
- KMS: manage encryption keys, envelope encryption, CloudTrail auditable
- ACM: free SSL/TLS certificates for ALB/CloudFront/API Gateway
- Secrets Manager: store + auto-rotate database credentials, API keys

**Network Protection:**
- WAF: L7 rules (OWASP, rate limiting, geo-blocking)
- Shield Standard: free DDoS protection. Shield Advanced: $3k/month, 24/7 DRT`},
  {day:13,domain:'performing',title:'Serverless Architecture Patterns',content:`**Core serverless services:**
- Lambda: functions up to 15 min, 10GB memory, 1000 concurrency/region
- API Gateway: REST/HTTP/WebSocket APIs, throttling, caching, auth
- DynamoDB: serverless NoSQL, on-demand or provisioned capacity
- SQS/SNS: decouple and fan-out messages
- EventBridge: event-driven routing between services
- Step Functions: orchestrate multi-step workflows with retries/branching

**Lambda best practices:**
- Keep functions small and single-purpose
- Use environment variables for config (not hardcoded)
- Use Layers for shared dependencies (up to 250MB)
- Provisioned Concurrency: eliminate cold starts for latency-sensitive functions
- Lambda@Edge: run code at CloudFront edge (viewer/origin request/response)

**Common patterns:**
- Web: API Gateway → Lambda → DynamoDB
- Event processing: S3/DynamoDB Streams → Lambda
- Fan-out: SNS → multiple SQS queues → Lambda
- Workflow: Step Functions → Lambda → RDS/DynamoDB

**Exam trap:** Lambda max timeout is 15 min. For longer tasks use Fargate or EC2.`},
  {day:14,domain:'performing',title:'Analytics & Streaming Data',content:`**Batch analytics:**
- Athena: serverless SQL on S3, pay $5/TB scanned, use Parquet to cut costs 10×
- EMR: managed Hadoop/Spark clusters, process petabytes, decouples compute from S3 storage
- Redshift: data warehouse, columnar, MPP, Spectrum can query S3 directly

**Streaming data:**
- Kinesis Data Streams: real-time, 1MB/s per shard write, 2MB/s read, 1-365 day retention
- Kinesis Firehose: fully managed, near real-time (60s buffer), delivers to S3/Redshift/OpenSearch
- MSK (Managed Kafka): run Kafka without managing brokers, ZooKeeper, multi-AZ
- Flink (Managed): real-time stream processing, sub-second latency

**Visualization:**
- QuickSight: serverless BI, auto-forecasting, ML-powered, pay-per-session

**Data lake pattern:**
- Raw data → S3 → Glue Crawlers (catalog) → Athena (query) → QuickSight (visualize)
- Or: Kinesis → S3 → Glue → Redshift Spectrum for mixed workloads`},
  {day:15,domain:'resilient',title:'Resilience & DR Patterns',content:`**RTO vs RPO:**
- RTO: how long can system be down? (Recovery Time Objective)
- RPO: how much data loss is acceptable? (Recovery Point Objective)

**DR strategies (cost/complexity low→high):**
1. Backup & Restore: S3 snapshots, RTO hours, RPO hours
2. Pilot Light: core infra running (DB replication), scale up on DR
3. Warm Standby: scaled-down full copy, reduce RTO to minutes
4. Multi-site Active/Active: full production in 2+ regions, near-zero RTO

**High availability patterns:**
- Multi-AZ: automatic failover within region (RDS, ElastiCache, ALB)
- Multi-region: Route 53 failover/latency routing, Aurora Global
- ASG + ALB: automatically replace unhealthy EC2 instances
- DynamoDB Global Tables: multi-region multi-active (last-writer-wins)

**Backup tools:**
- AWS Backup: centralized backup across RDS, EFS, EBS, DynamoDB, FSx
- S3 Cross-Region Replication: async object-level replication
- RDS automated backups: 1-35 day retention, point-in-time restore`},
  {day:16,domain:'cost',title:'Cost Optimization & FinOps',content:`**Pricing model selection:**
- On-Demand: dev/test, unpredictable, short-lived
- Reserved Instances (1-3yr): steady-state, predictable → up to 72% off
  - Standard RI: specific family/size/OS, can sell in Marketplace

- Savings Plans: flexible (compute across EC2+Fargate+Lambda) → up to 66% off
- Spot: fault-tolerant batch, HPC, big data → up to 90% off (interruptible)

**Storage optimization:**
- S3 Intelligent-Tiering: auto-move objects between tiers (unknown access patterns)
- S3 Lifecycle Policies: transition to IA/Glacier after N days
- EBS: snapshot older volumes, delete unattached, use gp3 over gp2

**Compute optimization:**
- Graviton (ARM): up to 40% better price/performance
- Spot Instances for stateless/batch workloads
- Auto Scaling: scale in during off-peak hours
- Compute Optimizer: ML rightsizing recommendations

**Monitoring costs:**
- Cost Explorer: identify top services, view trends

  {day:17,domain:'secure',title:'Monitoring, Auditing & Compliance',content:`**CloudWatch:**
- Metrics: EC2 (CPU, network, disk), RDS, Lambda, custom namespaces
- Logs: Log Groups → Log Streams, structured queries with Insights
- Alarms: breaches trigger SNS, EC2 actions, Auto Scaling

**CloudTrail:**

**AWS Config:**

**Security Hub → GuardDuty → Inspector → Macie:** findings flow up to Security Hub for centralized view.`},
  {day:18,domain:'resilient',title:'Networking & Content Delivery',content:`**CloudFront CDN:**
- 450+ edge locations globally
- Origins: S3, ALB, EC2, MediaStore, custom HTTP

**Elastic Load Balancing:**

**API Gateway:**

  {day:19,domain:'performing',title:'Migration & Transfer Services',content:`**7 Rs of migration (cloud journey):**
1. Retire: decommission what you don't need
2. Retain: keep on-premises (regulatory, latency)
3. Rehost (Lift & Shift): move as-is (MGN, VM Import)
4. Relocate: move Kubernetes to EKS, VMware to VMware Cloud on AWS
5. Repurchase: move to SaaS (Salesforce, ServiceNow)
6. Replatform (Lift & Optimize): move to managed services (RDS, Beanstalk)
7. Refactor/Re-architect: rebuild for cloud-native (Lambda, ECS, DynamoDB)

**Migration tools:**
- AWS MGN (Application Migration Service): lift-and-shift EC2 replication
- DMS: database migration with CDC (Change Data Capture)
- DataSync: file transfer from NFS/SMB/S3 to AWS (TLS encrypted, up to 10Gbps)

**Exam trap:** DataSync is for one-time or scheduled data transfer (not real-time streaming). Storage Gateway is for ongoing hybrid access.`},
  {day:20,domain:'resilient',title:'Management & Governance Tools',content:`**Infrastructure as Code:**

**Exam tip:** For multi-account compliance enforcement → Organizations + SCPs + Config Aggregator + Security Hub. Each layer adds a different control plane.`},

// ── Readiness ─────────────────────────────────────────────────────────────────
function calcReadiness(quizHistory,examHistory,flashConf){
  const dWeights={secure:0.30,resilient:0.26,performing:0.24,cost:0.20};
  const byDomain={};
  let quizSum=0,wSum=0;
  Object.entries(dWeights).forEach(([d,w])=>{
    const qs=quizHistory.filter(h=>h.domain===d);
    const c=qs.filter(h=>h.correct).length;
    byDomain[d]={correct:c,total:qs.length,pct:qs.length>0?Math.round(c/qs.length*100):null};
    if(qs.length>=5){quizSum+=(c/qs.length)*w;wSum+=w;}
  });
  const quizPct=wSum>0?Math.round((quizSum/wSum)*100):0;
  const hasExam=examHistory.length>0;
  const recent=examHistory.slice(-5);
  const avgExam=hasExam?Math.round(recent.reduce((s,e)=>s+e.score,0)/recent.length):0;
  const examPct=hasExam?Math.round(Math.min(100,(avgExam/85)*100)):0;
  const known=(flashConf||[]).filter(f=>f.conf==='know').length;
  const flashPct=Math.round((known/FLASHCARDS.length)*100);
  const tried=new Set(quizHistory.map(h=>h.qid)).size;
  const covPct=Math.round(Math.min(100,(tried/(QUESTIONS.length*0.5))*100));
  const w=hasExam?{exam:0.45,quiz:0.30,flash:0.15,cov:0.10}:{exam:0,quiz:0.55,flash:0.25,cov:0.20};
  const total=Math.round(Math.min(100,examPct*w.exam+quizPct*w.quiz+flashPct*w.flash+covPct*w.cov));
  return{total,examPct,quizPct,flashPct,covPct,byDomain,hasExam,avgExam,known,tried};
}

function Lesson(){
  const lessonIdx=dayOfYear()%LESSONS.length;
  const lesson=LESSONS[lessonIdx];
  const d=DOMAINS[lesson.domain];
  const[read,setRead]=useStore('lesson_read',[]);
  const isRead=read.includes(lessonIdx);

  const renderMd=(text)=>text.split('\n').map((line,i)=>{
    if(line.startsWith('**')&&line.endsWith('**'))return<div key={i} className={`${d.color} font-bold text-sm mt-5 mb-2 uppercase tracking-wide`}>{line.slice(2,-2)}</div>;
    if(line.startsWith('- '))return<div key={i} className="text-slate-600 text-sm ml-3 flex gap-2 py-0.5"><span className={`${d.color} mt-0.5 flex-shrink-0`}>•</span><span>{line.slice(2)}</span></div>;
    if(line.match(/^\d+\./))return<div key={i} className="text-slate-600 text-sm ml-3 py-0.5">{line}</div>;
    if(line==='')return<div key={i} className="h-2"/>;
    return<div key={i} className="text-slate-700 text-sm leading-relaxed">{line}</div>;
  });

  return(
    <div className="p-4 md:p-6 max-w-3xl">
      <div className="flex items-center gap-3 mb-5">
        <div className="w-1 self-stretch rounded-full" style={{background:{secure:'#10b981',resilient:'#0ea5e9',performing:'#f59e0b',cost:'#8b5cf6'}[lesson.domain]}}/>
        <div className="flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <h1 className="text-slate-900 text-xl font-bold">{lesson.title}</h1>
            <Tag domain={lesson.domain}/>
          </div>
          <div className="text-slate-400 text-xs mt-1">Lesson {lessonIdx+1} of {LESSONS.length}</div>
        </div>
      </div>
      <div className="bg-white rounded-xl border-l-4 border border-slate-200 p-5 space-y-0.5 shadow-sm" style={{borderLeftColor:{secure:'#10b981',resilient:'#0ea5e9',performing:'#f59e0b',cost:'#8b5cf6'}[lesson.domain]}}>
        {renderMd(lesson.content)}
      </div>
      <div className="mt-4 flex items-center gap-3">
        <button onClick={()=>setRead(r=>isRead?r.filter(x=>x!==lessonIdx):[...r,lessonIdx])}
          className={`text-sm px-4 py-2 rounded-lg border-2 font-medium transition-colors ${isRead?`border-emerald-400 text-emerald-700 bg-emerald-50`:'border-slate-200 text-slate-500 hover:border-slate-300'}`}>
