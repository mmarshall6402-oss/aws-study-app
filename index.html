{id:140,domain:'cost',sub:'EC2 Purchasing',q:'A company runs a fleet of 20 EC2 instances 24/7 for 3 years. The instance types are fixed and will not change. Which purchasing option provides the GREATEST savings?',opts:['On-Demand Instances','Compute Savings Plans (3-year, all-upfront)','Standard Reserved Instances (3-year, all-upfront)','Spot Instances'],ans:2,exp:'3-year All-Upfront Standard Reserved Instances offer the maximum discount (~72% vs On-Demand) for a specific instance type, region, OS, and tenancy. When the instance type and region are fixed for 3 years, Standard RIs outperform Compute Savings Plans (~66% discount) because Savings Plans trade some discount for flexibility (change instance family, region, or service). Spot Instances cannot be used for 24/7 stable workloads due to interruption risk. On-Demand has no discount.',plain:'For a fixed, steady 24/7 workload over years, 3-year all-upfront Reserved Instances beat every other purchasing option.'},
{id:141,domain:'cost',sub:'S3 Storage Classes',q:'A company stores compliance documents in S3 that must be retained 7 years. Files are read frequently in the first 30 days then accessed perhaps once per year for audits (retrieval time up to 5 hours acceptable). Which lifecycle policy is MOST cost-effective?',opts:['Store in S3 Standard indefinitely.','Transition to S3 Standard-IA after 30 days, then to S3 Glacier Flexible Retrieval after 90 days.','Use S3 Intelligent-Tiering for the entire 7 years.','Transition to S3 One Zone-IA after 30 days, then to S3 Glacier Deep Archive after 90 days.'],ans:1,exp:'Standard for 30 days covers frequent access. Standard-IA ($0.0125/GB) covers the transition period where occasional immediate access is needed. Glacier Flexible Retrieval ($0.0036/GB) provides 3-5 hour retrieval (within the 5-hour SLA) for rare audit access — the cheapest class that meets the retrieval time. One Zone-IA stores data in only one AZ — unacceptable for compliance data. Glacier Deep Archive ($0.00099/GB) has 12-48 hour retrieval — may violate the 5-hour SLA. Intelligent-Tiering adds per-object monitoring fees optimized for unpredictable patterns.',plain:'Step data down through Standard → Standard-IA → Glacier Flexible Retrieval based on how often and how fast you need it back.'},
{id:142,domain:'cost',sub:'Serverless',q:'A REST API receives 300 requests per day, only during business hours (8 AM–6 PM weekdays). Each request takes 3 seconds of compute. What is the MOST cost-effective compute platform?',opts:['EC2 t3.small running 24/7 (On-Demand)','EC2 t3.small Reserved Instance (1-year, no-upfront)','AWS Lambda','ECS Fargate with scheduled scale-in at night'],ans:2,exp:'Lambda charges per invocation + GB-seconds. 300 req/day × 3s × 20 working days ≈ 18,000 GB-seconds/month — this costs cents at Lambda pricing ($0.0000166667/GB-second). The free tier (400,000 GB-seconds/month) likely covers it entirely. EC2 t3.small runs 24/7 even when idle, costing ~$15/month On-Demand or ~$10/month reserved. Fargate scales down but has cold start overhead and minimum billing. Lambda is the canonical choice for low-volume, event-driven APIs with irregular traffic.',plain:'For a handful of daily requests, Lambda\'s pay-per-use pricing crushes any always-on EC2 option.'},
{id:143,domain:'cost',sub:'Data Transfer',q:'A company is surprised by high data transfer costs between EC2 instances within the same Region. Which scenario DOES incur data transfer charges?',opts:['EC2 in us-east-1a reading objects from Amazon S3 in us-east-1.','EC2 in us-east-1a sending data to EC2 in us-east-1b using private IP addresses.','EC2 in us-east-1a uploading data to S3 in us-east-1.','CloudFront fetching from an S3 origin bucket in the same Region.'],ans:1,exp:'Cross-AZ traffic within the same Region using private IPs is charged at $0.01/GB per direction ($0.02/GB round-trip). This is a commonly overlooked cost, especially for microservices architectures where services in different AZs communicate frequently. EC2-to-S3 in the same Region is free (both inbound to S3 and EC2-initiated transfers within the same region). CloudFront-to-S3 same-Region origin fetches are free. EC2 uploads to same-Region S3 are free.',plain:'Traffic between AZs in the same region over private IPs is the data-transfer cost people most often overlook.'},
{id:144,domain:'cost',sub:'Savings Plans',q:'A company currently uses c5, m5, and r5 EC2 instances in us-east-1 and eu-west-1. Over the next year they plan to migrate some workloads to Lambda and AWS Fargate. Which purchasing option provides savings AND flexibility to change instance families, regions, and even compute service types?',opts:['Standard Reserved Instances per instance type and region.','EC2 Instance Savings Plans for c5, m5, and r5 in each region.','Compute Savings Plans (3-year).','Convertible Reserved Instances.'],ans:2,exp:'Compute Savings Plans automatically apply to EC2 (any instance family, size, region, OS, tenancy), Lambda, and Fargate — providing ~66% discount. They are ideal when migrating across instance types or services. EC2 Instance Savings Plans apply only to a specific instance family in a region (e.g., c5 in us-east-1). Standard RIs are locked to a specific instance type and region. Convertible RIs can be exchanged but don\'t cover Lambda or Fargate usage.',plain:'Compute Savings Plans flex across instance types, regions, and even Lambda/Fargate — ideal when your architecture is still changing.'},
{id:145,domain:'cost',sub:'Spot',q:'A company runs a Spot Instance fleet processing a video rendering job. AWS sends a Spot interruption notice. How much time does the application have to save its state before termination?',opts:['30 seconds','1 minute','2 minutes','5 minutes'],ans:2,exp:'AWS provides exactly 2 minutes of warning before reclaiming a Spot Instance. The interruption notice appears in the EC2 instance metadata at /latest/meta-data/spot/interruption-action and as an EventBridge event. Applications must checkpoint, drain connections, or gracefully terminate within this 2-minute window. Auto Scaling groups automatically request replacement Spot capacity. This 2-minute window is a fixed AWS SLA — designing applications around it is a core Spot Instance best practice.',plain:'AWS gives you exactly 2 minutes\' warning before reclaiming a Spot Instance.'},
{id:146,domain:'cost',sub:'Storage',q:'A company must retrieve 1 TB of archived data from S3 Glacier Flexible Retrieval within 5 hours at the LOWEST cost. Which retrieval option should they use?',opts:['Expedited (1-5 minutes) — $0.03/GB','Standard (3-5 hours) — $0.01/GB','Bulk (5-12 hours) — $0.0025/GB','Instant (milliseconds) — $0.03/GB from Glacier Instant Retrieval class'],ans:1,exp:'Standard retrieval (3-5 hours) delivers within the required 5-hour window at $0.01/GB = $10 for 1 TB. Expedited (1-5 min) is $0.03/GB = $30 — three times more expensive and faster than required. Bulk retrieval ($0.0025/GB = $2.50) is cheapest but takes 5-12 hours — doesn\'t guarantee meeting the 5-hour SLA. Instant Retrieval is a separate S3 Glacier storage class, not a retrieval tier of Glacier Flexible Retrieval.',plain:'Standard retrieval (3-5 hours) hits the 5-hour deadline at a much lower price than Expedited.'},
{id:147,domain:'cost',sub:'Architecture',q:'A company runs an EC2 fleet that polls S3 every 5 seconds for new image uploads to process. CPU averages 4% utilization and costs $600/month. What redesign reduces costs MOST dramatically?',opts:['Switch to smaller EC2 instance types.','Replace On-Demand with Spot Instances.','Replace the polling EC2 fleet with Lambda functions triggered by S3 event notifications.','Add Auto Scaling to scale the fleet down to one instance at night.'],ans:2,exp:'The polling pattern wastes 96% of EC2 compute waiting for uploads that haven\'t arrived. Lambda triggered by S3 PutObject events runs only when an upload occurs — zero cost when idle, pennies per GB of images processed. This can reduce costs from $600/month to under $5/month for typical workloads. Spot Instances and smaller instance types reduce the bill but still pay for idle waiting. Auto Scaling helps with variable traffic, but the core problem is a polling architecture on an event-driven workload.',plain:'Replace a fleet that polls S3 nonstop with Lambda triggered by S3 events — pay only when something actually uploads.'},
{id:148,domain:'cost',sub:'RDS',q:'AWS Cost Explorer shows an RDS db.r5.8xlarge running at 12% CPU and 25% memory utilization on average. What is the RECOMMENDED cost optimization step?',opts:['Migrate from RDS to DynamoDB to eliminate relational database costs.','Enable Multi-AZ on the current instance to distribute load.','Rightsize to a db.r5.2xlarge or db.r5.4xlarge and monitor performance metrics after the change.','Purchase 3-year All-Upfront Reserved Instances for the current db.r5.8xlarge.'],ans:2,exp:'12% CPU and 25% memory on an 8xlarge indicates severe overprovisioning. Rightsizing to a 2xlarge or 4xlarge can cut RDS costs by 50-75% while maintaining comfortable headroom. AWS Compute Optimizer and RDS Performance Insights can confirm the right target size. Buying RIs for an oversized instance locks in ongoing waste. Multi-AZ doubles cost and doesn\'t reduce per-instance utilization. Migrating to DynamoDB requires significant application changes and isn\'t appropriate for complex relational schemas.',plain:'An oversized, underused RDS instance should be rightsized down (and monitored) rather than just buying Reserved Instances for the bloat.'},
{id:149,domain:'cost',sub:'S3',q:'A company\'s application frequently uploads and downloads the same set of 500 MB reference datasets from S3. Each dataset is downloaded by 200 EC2 instances on startup. The company wants to reduce S3 data transfer costs. Which solution is MOST cost-effective?',opts:['Enable S3 Transfer Acceleration for faster downloads.','Use S3 Select to retrieve only needed columns.','Store the datasets in ElastiCache for Redis instead of S3.','Use an S3 VPC Gateway Endpoint so EC2 instances download via the AWS network at no data transfer cost.'],ans:3,exp:'S3 data transfer within the same Region via a Gateway Endpoint is free — traffic stays on the AWS network and doesn\'t incur standard S3-to-EC2 data transfer charges ($0.00/GB within same region). A Gateway Endpoint requires only a route table entry. Transfer Acceleration speeds up transfers but costs extra and doesn\'t reduce transfer fees. S3 Select reduces data volume returned by filtering server-side, but only works for structured data. ElastiCache can cache data but is more expensive than S3 at scale and requires application changes.',plain:'Use a free S3 Gateway Endpoint so EC2 can fetch the same datasets repeatedly without paying data transfer fees.'},
{id:150,domain:'cost',sub:'Compute',q:'A company runs 30 EC2 On-Demand instances in a dev/test environment that are used only Monday–Friday, 8 AM–6 PM (50 hours/week out of 168). What simple action reduces EC2 costs by approximately 70% without changing instance types?',opts:['Switch to Spot Instances for maximum savings.','Purchase 1-year Reserved Instances for all 30 instances.','Use Instance Scheduler or Auto Scaling Scheduled Actions to stop instances outside business hours.','Migrate the dev/test workloads to Lambda.'],ans:2,exp:'Dev/test instances run 50/168 hours per week = ~30% of the time. Stopping them outside business hours eliminates ~70% of EC2 charges immediately (you pay only for running hours). Instance Scheduler or scheduled Auto Scaling actions automate this. Spot Instances can be interrupted at any time, disrupting active developer sessions. Reserved Instances are billed 24/7 regardless of whether the instance runs — purchasing RIs for 30%-utilized instances wastes money. Migrating to Lambda requires significant application refactoring.',plain:'Scheduling dev/test instances to stop outside business hours cuts costs by roughly the fraction of time they\'re idle.'},
{id:151,domain:'cost',sub:'Data Transfer',q:'A company processes large datasets by loading them from S3 into EC2 instances in the same Region for analysis, then uploads the results back to S3. They want to minimize all data transfer charges. What should they verify?',opts:['The EC2 instances are in the same AZ as the S3 bucket.','The EC2 instances use a VPC Gateway Endpoint for S3 and are in the same Region as the S3 bucket.','The EC2 instances are using S3 Transfer Acceleration.','The EC2 instances are Spot Instances to reduce the overall compute cost.'],ans:1,exp:'S3 data transfer from EC2 to S3 (and S3 to EC2) within the same Region using a VPC Gateway Endpoint incurs zero data transfer charges. S3 is a regional service — AZ co-location is irrelevant for S3 transfer costs (unlike EC2-to-EC2 which incurs cross-AZ fees). Transfer Acceleration speeds up uploads but adds fees, not removes them. Spot vs On-Demand affects compute cost but not data transfer cost.',plain:'Use a VPC Gateway Endpoint and same-region EC2/S3 to keep that data transfer completely free.'},
{id:152,domain:'cost',sub:'Architecture',q:'A company stores application logs in S3 and runs daily EMR jobs to analyze them. The EMR clusters are provisioned at maximum peak capacity but are only busy for 2 hours of their 8-hour runtime. What optimization reduces cost MOST significantly?',opts:['Switch EMR core nodes to Reserved Instances.','Use EMR managed scaling with Spot Instances for task nodes.','Increase EMR cluster size to finish jobs faster.','Migrate log analysis to a persistent RDS cluster.'],ans:1,exp:'EMR managed scaling automatically adds and removes task nodes (which don\'t store HDFS data) based on workload demand. Using Spot Instances for task nodes saves up to 90% on those nodes. Since task nodes hold no HDFS data, their interruption only slows jobs momentarily — they\'re restarted from the last checkpoint. Core nodes (on On-Demand or Reserved) maintain the cluster. This combination — managed scaling + Spot tasks — is the canonical cost optimization for variable EMR workloads. Larger clusters finish faster but don\'t reduce total cluster-hour cost.',plain:'Use EMR managed scaling with Spot task nodes so you\'re not paying full price for capacity that\'s idle most of the time.'},
{id:153,domain:'cost',sub:'Networking',q:'A company runs a NAT Gateway in each of its 3 Availability Zones for high availability. Each NAT Gateway processes 10 TB/month of outbound traffic. The team notices NAT Gateway data processing fees are a top cost. Which architectural change MOST reduces these costs?',opts:['Replace NAT Gateways with a single NAT instance.','Use a VPC Gateway Endpoint for S3 traffic and an Interface Endpoint for other AWS service traffic, removing that traffic from the NAT Gateway path.','Reduce the number of NAT Gateways to one to cut the hourly charge.','Enable NAT Gateway data compression to reduce processing fees.'],ans:1,exp:'NAT Gateway charges $0.045/GB for all data processed. Traffic to AWS services (S3, DynamoDB via Gateway Endpoint; ECR, SSM, Secrets Manager, CloudWatch via Interface Endpoints) can be routed through VPC endpoints — bypassing the NAT Gateway entirely and eliminating those processing fees. This is commonly the largest component of NAT Gateway costs in containerized workloads (container image pulls from ECR being a major contributor). Reducing to one NAT Gateway saves the hourly fee (~$100/month) but creates an AZ single point of failure. NAT instances have no data compression feature.',plain:'Route AWS-service traffic through VPC endpoints instead of the NAT Gateway to cut its biggest per-GB cost driver.'},
{id:154,domain:'cost',sub:'EC2',q:'AWS Compute Optimizer recommends downsizing 10 production EC2 instances from m5.4xlarge to m5.2xlarge based on utilization data. The operations team is concerned about performance impact. What is the SAFEST way to act on this recommendation?',opts:['Immediately resize all 10 instances at once during the next maintenance window.','Resize one instance, monitor CPU/memory/application metrics for a week, then proceed with the rest if no degradation is observed.','Dismiss the recommendation — Compute Optimizer can\'t account for traffic spikes.','Purchase Reserved Instances for the current m5.4xlarge size before resizing.'],ans:1,exp:'Rightsize one instance first (a canary approach). Monitor CPU utilization, memory, application response times, and error rates under real production traffic for several days to a week. If metrics remain healthy, proceed with the remaining instances in batches. Compute Optimizer analyzes 14 days of CloudWatch metrics and is generally accurate — dismissing recommendations without validation is a missed cost optimization opportunity. Resizing all 10 at once risks widespread performance impact if the recommendation is wrong for peak scenarios. Buying RIs at the current size locks in ongoing waste.',plain:'Resize one instance first, watch it for a week, then roll out the rest if it holds up.'},

// ── Additional original scenarios ──
{id:200,domain:'resilient',sub:'Storage',q:'A company duplicated a single EC2 instance into a two-instance fleet behind a load balancer. Each instance has its own EBS volume, so user-uploaded documents saved to one instance aren\'t visible when a later request lands on the other instance. What is the standard fix?',opts:['Enable EBS Multi-Attach on both volumes so each instance can read and write the same volume.','Replace the per-instance EBS volumes with a shared Amazon EFS file system mounted on both instances.','Increase the EBS volume size on both instances so they can hold more documents.','Configure the load balancer to use sticky sessions so each user always hits the same instance.'],ans:1,exp:'EFS is a managed NFS file system that can be mounted concurrently by many instances across multiple AZs, giving every instance the same view of uploaded files — the standard pattern for shared, scale-out file storage. EBS Multi-Attach is limited to specific instance types/volume types (io1/io2), is intended for cluster-aware filesystems (not general-purpose apps), and only works within a single AZ. Bigger volumes don\'t solve the visibility problem. Sticky sessions mask the symptom but break as soon as an instance is replaced or the fleet scales, and don\'t help background jobs that need every file.',plain:'When multiple EC2 instances all need to see the same uploaded files, put the files on EFS instead of separate per-instance EBS volumes.'},
{id:201,domain:'secure',sub:'Organizations',q:'A company\'s AWS Organizations management account owns an S3 bucket of internal reports. It must be reachable only by principals belonging to accounts inside the organization — not by any outside AWS account, even if that account is somehow granted a matching IAM policy. What is the LEAST operational-overhead way to enforce this at the bucket?',opts:['List every current member account ID in the bucket policy Principal element and update it whenever accounts are added or removed.','Add a bucket policy condition using the aws:PrincipalOrgID global condition key set to the organization ID.','Create an IAM group per account and require every caller to assume a role from that group.','Enable S3 Block Public Access on the bucket.'],ans:1,exp:'aws:PrincipalOrgID lets a resource policy allow (or deny) access based on organization membership in one condition key, so the policy keeps working automatically as accounts are added to or removed from the organization — no manual updates needed. Listing account IDs individually works but is high-maintenance and error-prone as the org changes. Per-account IAM groups don\'t change the resource-side trust boundary. Block Public Access prevents public exposure but does nothing to distinguish between organization member accounts and other authenticated AWS accounts.',plain:'aws:PrincipalOrgID on the bucket policy locks access to "any account in my organization" and keeps working automatically as accounts come and go.'},
{id:202,domain:'cost',sub:'Data Transfer',q:'A company operates sensor sites on multiple continents, each generating about 500 GB per day on a fast internet connection, and needs to land all of it in one S3 bucket in a single Region as quickly as possible with the least operational complexity. Which approach fits best?',opts:['Turn on S3 Transfer Acceleration on the destination bucket and have each site upload directly with multipart uploads.','Have each site upload to an S3 bucket in its nearest Region, then use S3 Cross-Region Replication into the destination bucket.','Ship an AWS Snowball Edge device to each site on a recurring schedule and copy data onto it for transfer.','Write the data to an EBS volume on a local EC2 instance and snapshot-copy it to the destination Region nightly.'],ans:0,exp:'S3 Transfer Acceleration routes uploads through CloudFront edge locations onto the AWS backbone, speeding up long-distance transfers over the public internet, and multipart upload lets each site push directly to the destination bucket with no intermediate hops to manage. Since each site already has a high-speed connection and the volume (500 GB/day) doesn\'t require physical shipping, Snowball adds unnecessary logistics and latency (days per cycle). Routing through a per-Region bucket plus Cross-Region Replication adds an extra hop, extra buckets to manage, and replication lag. EBS snapshot copying is slow, batches only once a day, and was designed for volume backups, not continuous data ingestion.',plain:'When every site already has fast internet, turn on S3 Transfer Acceleration and upload straight to the destination bucket — no extra hardware or hops needed.'},
{id:203,domain:'performing',sub:'API Gateway',q:'A public REST API built on API Gateway and Lambda serves read-heavy GET requests where the response rarely changes within a short window. The team wants to cut Lambda invocations and latency for repeated identical requests without changing client behavior. What should they configure?',opts:['Enable API Gateway response caching with a TTL tuned to how often the underlying data changes.','Increase the Lambda function\'s reserved concurrency.','Switch the API from REST API to HTTP API type.','Add an Application Load Balancer in front of API Gateway.'],ans:0,exp:'API Gateway can cache responses per method/stage for a configurable TTL (up to 3600s), so repeated identical requests are served straight from the cache without invoking Lambda at all — cutting both cost and latency. Reserved concurrency guarantees Lambda capacity but doesn\'t reduce the number of invocations. Switching API types changes features and pricing but doesn\'t add caching by itself (HTTP APIs don\'t support the built-in response cache that REST APIs do). Putting an ALB in front adds cost and complexity without a caching layer of its own.',plain:'Turn on API Gateway\'s built-in response caching so repeat requests for the same data skip Lambda entirely.'},
{id:204,domain:'resilient',sub:'Messaging',q:'A checkout service publishes an order-placed event that must fan out to three independent downstream systems: inventory, billing, and shipping. Each system should receive its own copy of every event, and adding a fourth subscriber later shouldn\'t require changing the publisher. Which pattern fits?',opts:['Publish the event to a single SQS standard queue that all three systems poll.','Publish the event to an SNS topic with an SQS queue subscribed per downstream system.','Have the checkout service call each downstream system\'s API directly and retry on failure.','Write the event to a DynamoDB table and have each system poll the table on a schedule.'],ans:1,exp:'SNS fan-out delivers an independent copy of each published message to every subscribed SQS queue, so each downstream system processes events at its own pace with its own retry/DLQ behavior, and a new subscriber can be added just by subscribing another queue — no publisher changes. A single shared SQS queue lets only one consumer process each message (competing consumers), not three independent copies. Direct synchronous API calls couple the checkout service to the availability of all three downstream systems. Polling a DynamoDB table on a schedule adds latency and reinvents what SNS/SQS already do.',plain:'SNS fan-out to one SQS queue per downstream system gives everyone their own copy of every event, and you can add subscribers without touching the publisher.'},
{id:205,domain:'secure',sub:'KMS',q:'A company replicates a DynamoDB Global Table across us-east-1 and eu-west-1 and wants all data encrypted at rest with customer managed KMS keys, using a single logical key that both Regions\' applications can reference without copying ciphertext between Regions during failover.',opts:['Create one customer managed KMS key in us-east-1 and grant eu-west-1 principals cross-Region access to it.','Create a KMS multi-Region key, with a primary key in us-east-1 and a replica key in eu-west-1 sharing the same key ID.','Use the AWS managed aws/dynamodb key, since it already works across all Regions by default.','Export the KMS key material from us-east-1 and import it as a new key in eu-west-1.'],ans:1,exp:'KMS multi-Region keys let you create a primary key and replica keys in other Regions that share the same key material and key ID, so data encrypted in one Region can be decrypted in another without re-encrypting or copying ciphertext across Regions — the standard fit for DynamoDB Global Tables. Standard (single-Region) KMS keys cannot be used to decrypt in another Region even with cross-account/cross-Region IAM grants — the key itself never leaves its Region. AWS managed keys are Region-scoped by design and can\'t be shared as a single logical key across Regions. Manually exporting and reimporting key material creates two independent keys, breaking the "single logical key" requirement and complicating rotation.',plain:'A KMS multi-Region key keeps the same key ID and material in both Regions, so Global Table data encrypted in one Region can be decrypted in the other without copying keys around.'},
{id:206,domain:'performing',sub:'Database',q:'A read-heavy DynamoDB table backs a product catalog. Query latency needs to drop from single-digit milliseconds to microseconds for the most frequently requested items, without re-architecting the application\'s DynamoDB API calls.',opts:['Enable DynamoDB Accelerator (DAX) in front of the table and point the application at the DAX endpoint.','Switch the table from on-demand to provisioned capacity with auto scaling.','Add a Global Secondary Index on the most frequently queried attribute.','Enable DynamoDB Streams and process changes with Lambda.'],ans:0,exp:'DAX is an in-memory cache purpose-built for DynamoDB that sits in front of the table and is API-compatible with the DynamoDB SDK, so the application changes only its endpoint — no query logic changes — and gets microsecond read latency for cached items. Switching capacity modes affects cost and throughput handling, not per-request latency for hot items. A GSI changes which attributes you can query efficiently but doesn\'t cache results or beat DynamoDB\'s normal millisecond latency. Streams capture change events for downstream processing; they don\'t serve reads or reduce latency.',plain:'DAX is a drop-in, DynamoDB-API-compatible cache that gets your hottest reads down to microseconds without rewriting queries.'},
{id:207,domain:'secure',sub:'WAF',q:'A public web application is being hit by a script that sends thousands of requests per minute from a single IP address, degrading performance for legitimate users. Which AWS WAF rule type directly addresses this?',opts:['A rate-based rule that blocks or throttles an IP once it exceeds a request threshold within a rolling time window.','A geo-match rule that blocks traffic from the country the requests originate from.','A SQL injection managed rule group.','An IP set rule listing every known bad IP address to block individually.'],ans:0,exp:'A WAF rate-based rule automatically tracks request counts per IP over a rolling 5-minute window and blocks (or CAPTCHAs/challenges) any IP that crosses the configured threshold — purpose-built for this kind of single-source flooding, and it adapts as the offending IP changes without manual updates. Geo-blocking only helps if the abuse is concentrated in one country, and blocks legitimate users there too. SQLi managed rules protect against a different attack class entirely. Manually maintained IP sets don\'t scale against an attacker that rotates or wasn\'t previously known.',plain:'A WAF rate-based rule automatically throttles any single IP that starts sending too many requests too fast.'},
{id:208,domain:'resilient',sub:'Compute',q:'An Auto Scaling group\'s health check is configured to use only the EC2 status check. Instances are passing that check but the application on some instances is deadlocked and returning HTTP 500s, yet Auto Scaling never replaces them. What should be changed?',opts:['Lower the Auto Scaling group\'s minimum capacity so unhealthy instances are replaced faster.','Switch the health check type to ELB and attach the instances to a target group with an application-level health check path.','Increase the health check grace period so instances have more time to recover.','Enable detailed CloudWatch monitoring on the Auto Scaling group.'],ans:1,exp:'EC2 status checks only detect hardware/hypervisor-level failures (the instance is running) — they say nothing about whether the application on top of it is healthy. Switching the ASG\'s health check type to ELB and defining a target group health check (e.g., an HTTP path that must return 200) lets Auto Scaling detect and replace instances that are up but application-broken. Lowering minimum capacity doesn\'t change what "unhealthy" means. A longer grace period only delays when checks start, it doesn\'t change what\'s being checked. Detailed monitoring shortens metric intervals but doesn\'t add an application-level health signal.',plain:'EC2 status checks only see "is the instance alive" — switch to ELB health checks so Auto Scaling can see "is the app actually responding."'},
{id:209,domain:'performing',sub:'Caching',q:'A session-state store for a web tier needs sub-millisecond reads, native support for complex data structures (sorted sets, lists), and the ability to fail over automatically to a replica if the primary node fails. Which service and engine fits best?',opts:['Amazon ElastiCache for Memcached, since it\'s simpler to operate.','Amazon ElastiCache for Redis (cluster mode) with Multi-AZ automatic failover.','Amazon DynamoDB Accelerator (DAX) as the primary session store.','Amazon RDS for PostgreSQL with a read replica.'],ans:1,exp:'ElastiCache for Redis supports rich data structures (sorted sets, lists, hashes), persistence, and Multi-AZ with automatic failover to a replica — matching both the data-structure and availability requirements. Memcached is simpler but is purely a flat key-value cache with no persistence, no complex data structures, and no built-in replication/failover. DAX only accelerates DynamoDB reads; it isn\'t a general-purpose session store. RDS PostgreSQL can fail over via Multi-AZ too, but relational query latency doesn\'t match an in-memory store\'s sub-millisecond profile for this use case.',plain:'Redis (not Memcached) is the ElastiCache engine with rich data structures and automatic Multi-AZ failover.'},
{id:210,domain:'resilient',sub:'Decoupling',q:'A order-processing Lambda function occasionally fails due to a downstream dependency timeout. Failed events are currently lost because the function has no error handling configured. The team wants failed events captured for later inspection and reprocessing without blocking new events from being processed.',opts:['Configure an SQS dead-letter queue (or Lambda destination on failure) to capture events that fail after retries are exhausted.','Increase the Lambda function\'s timeout setting so the downstream call is less likely to fail.','Set the Lambda function\'s reserved concurrency to 1 so events process strictly one at a time.','Wrap the downstream call in a try/catch block that logs the error to CloudWatch Logs and continues.'],ans:0,exp:'A dead-letter queue (for SQS/SNS-triggered functions) or an on-failure destination (for async invocations) captures the event payload after Lambda\'s built-in retries are exhausted, so nothing is silently dropped and the event can be replayed once the downstream issue is fixed — while new events keep flowing through the function normally. A longer timeout may reduce failures but doesn\'t eliminate or capture the ones that still happen. Reserved concurrency of 1 serializes processing and can create backlogs, but doesn\'t capture failures. Logging the error preserves a record for humans to read but doesn\'t preserve the event in a replayable form.',plain:'Add a dead-letter queue or on-failure destination so events that fail all their retries get captured for replay instead of vanishing.'},
{id:211,domain:'cost',sub:'Storage',q:'A media company stores 50 TB of finished video renders in S3. Access patterns are unpredictable — some files are re-downloaded heavily right after release, others go completely cold within days, and nobody can reliably predict which. The team wants to minimize storage cost without manually managing lifecycle rules or risking retrieval fees on files that turn out to still be hot.',opts:['Manually tag files by expected popularity and apply a lifecycle rule to move each tag group to a different storage class.','Use S3 Intelligent-Tiering, which automatically moves objects between access tiers based on observed usage with no retrieval fees.','Move everything to S3 Glacier Instant Retrieval immediately after upload.','Keep everything in S3 Standard and rely on CloudFront caching to reduce S3 request costs.'],ans:1,exp:'S3 Intelligent-Tiering monitors actual access patterns per object and automatically moves objects between frequent-access and infrequent/archive tiers with no retrieval fees and no operational overhead — built specifically for unpredictable access patterns like this one. Manual tagging requires predicting popularity in advance, which the scenario says isn\'t reliable. Glacier Instant Retrieval charges a retrieval fee and has a minimum storage duration, which would penalize files that turn out to still be frequently accessed. Standard plus CloudFront reduces request costs and latency but does nothing about the underlying S3 storage cost for cold data.',plain:'When you can\'t predict which files will stay hot or go cold, S3 Intelligent-Tiering automates the tiering for you with no retrieval-fee risk.'},
];

const FLASHCARDS=[
  {id:1,domain:'secure',front:'IAM Role vs IAM User',plain:'A Role is a temporary "badge" anyone can borrow; a User is a permanent login with its own keys.',back:'Role: temporary creds via STS, no static keys, assumed by services/users. User: permanent identity with long-term access keys. Use roles for EC2, Lambda, cross-account.'},
  {id:2,domain:'secure',front:'Security Group vs NACL',plain:'Security Groups guard individual servers; NACLs guard the whole subnet and can explicitly block traffic.',back:'SG: stateful, instance-level, allow only, evaluates all rules. NACL: stateless, subnet-level, allow+deny, rules evaluated in order (lowest # first).'},
  {id:3,domain:'secure',front:'AWS KMS Key Types',plain:'AWS-managed keys are free and automatic; customer-managed keys cost a little but you control everything.',back:'AWS managed: free, auto-rotated yearly, no policy control. Customer managed: $1/month, full policy control, custom rotation. AWS owned: free, invisible, AWS controls.'},
  {id:4,domain:'secure',front:'Cognito: User Pools vs Identity Pools',plain:'User Pools log people in; Identity Pools hand out AWS access once they\'re logged in.',back:'User Pools = AuthN (who are you?): sign-up, sign-in, tokens. Identity Pools = AuthZ (what can you do?): swap any token for AWS credentials.'},
  {id:5,domain:'secure',front:'S3 Object Ownership & ACLs',plain:'Modern S3 buckets should disable old-style per-object permissions and use one bucket-wide policy instead.',back:'Bucket Owner Enforced: disables ACLs, owner owns all objects. ACLs: legacy, per-object. Best practice: disable ACLs, use bucket policies instead.'},
  {id:6,domain:'secure',front:'AWS Shield Standard vs Advanced',plain:'Standard is free basic DDoS protection for everyone; Advanced is a paid upgrade with extra protection and a response team.',back:'Standard: free, auto, L3/4 DDoS protection. Advanced: $3k/month+, L7 protection, DDoS cost protection, 24/7 DRT access, detailed metrics.'},
  {id:7,domain:'secure',front:'VPC Endpoint Types',plain:'Gateway Endpoints are free private paths to S3/DynamoDB; Interface Endpoints are paid private paths to nearly any AWS service.',back:'Gateway Endpoint: S3 + DynamoDB only, free, route table entry. Interface Endpoint (PrivateLink): any service, ENI in VPC, hourly + data charges.'},
  {id:8,domain:'secure',front:'SCP vs Permission Boundary vs Resource Policy',plain:'SCPs cap a whole AWS account, boundaries cap one IAM user/role, and resource policies decide who can touch a specific resource.',back:'SCP: org-level max perms for all principals in account. Boundary: IAM-level max perms for specific principal. Resource policy: attached to resource, controls who can access it.'},
  {id:9,domain:'resilient',front:'RDS Multi-AZ vs Read Replicas',plain:'Multi-AZ is a hot backup database for failover; Read Replicas are extra copies you can actually query for more speed.',back:'Multi-AZ: synchronous standby, same region, auto failover, NOT readable. Read Replicas: async, up to 5, readable, cross-region possible, manual promotion.'},
  {id:10,domain:'resilient',front:'Route 53 Routing Policies',plain:'Route 53 can send users to one place, split traffic for testing, route by speed/location, or fail over automatically.',back:'Simple: one record. Weighted: A/B traffic split. Latency: lowest latency region. Failover: primary/secondary. Geolocation: based on user location. Geoproximity: bias-adjusted. Multivalue: returns multiple IPs.'},
  {id:11,domain:'resilient',front:'DR Strategies (cost low→high)',plain:'Disaster recovery options range from cheap-but-slow (restore from backup) to expensive-but-instant (run everything live in two places).',back:'Backup & Restore (hours RTO) → Pilot Light (core infra, scale up) → Warm Standby (scaled-down full copy) → Multi-site Active/Active (full scale, near-zero RTO).'},
  {id:12,domain:'resilient',front:'SQS Standard vs FIFO',plain:'Standard queues are fast but messages might arrive out of order or twice; FIFO queues keep strict order and no duplicates, but slower.',back:'Standard: at-least-once, best-effort order, unlimited TPS. FIFO: exactly-once, strict order, 3,000 msg/s (batching), .fifo suffix required.'},
  {id:13,domain:'resilient',front:'Aurora vs RDS',plain:'Aurora is AWS\'s own faster, more resilient database engine built to outperform standard RDS MySQL/Postgres.',back:'Aurora: AWS-built, 3 AZs×2 copies (6 total), auto-grows 10GB increments to 128TB, up to 15 read replicas, ~5× faster than MySQL. Shared storage = fast replication.'},
  {id:14,domain:'resilient',front:'ASG Scaling Policies',plain:'Auto Scaling can react to one alarm, multiple thresholds, a target metric, a schedule, or even predict future demand.',back:'Simple: single CloudWatch alarm→action. Step: multiple thresholds, different actions. Target Tracking: maintain metric at target (e.g. 50% CPU). Scheduled: time-based. Predictive: ML-based forecast.'},
  {id:15,domain:'resilient',front:'ELB Types',plain:'ALB routes web traffic smartly, NLB handles raw fast network traffic, GLB inserts security appliances inline.',back:'ALB: L7, HTTP/HTTPS/gRPC, path+host routing, WAF integration. NLB: L4, TCP/UDP/TLS, static IP, millions RPS, preserve source IP. GLB: L3, inline network appliances. CLB: legacy, avoid.'},
  {id:16,domain:'resilient',front:'SNS vs SQS vs EventBridge',plain:'SNS broadcasts messages to many subscribers, SQS holds messages in a queue until picked up, EventBridge routes events by rule.',back:'SNS: push, fan-out, pub/sub, 10M subs/topic. SQS: pull, queue, decouple. EventBridge: event bus, 90+ sources, routing rules, schema registry, 3rd party.'},
  {id:17,domain:'performing',front:'ElastiCache Redis vs Memcached',plain:'Redis is the feature-rich, reliable caching choice for almost every use case; Memcached is bare-bones and simple.',back:'Redis: persistence, replication, pub/sub, sorted sets, Lua, Multi-AZ, AUTH. Memcached: multithreaded, simple, no persistence, horizontal scaling via sharding. Choose Redis for almost everything.'},
  {id:18,domain:'performing',front:'EBS Volume Types',plain:'gp3 is the default all-purpose hard drive; io2 is for databases needing top speed; st1/sc1 are cheap spinning disks for big, slow data.',back:'gp3: default, 3000 IOPS baseline, 125 MB/s, independent IOPS/throughput config. io2 Block Express: max 256k IOPS, for databases. st1: throughput HDD, big data. sc1: cold HDD, cheapest.'},
  {id:19,domain:'performing',front:'CloudFront Caching',plain:'CloudFront stores copies of your content close to users and lets you control how long they stay cached.',back:'TTL: set via Cache-Control/Expires headers or CloudFront behavior. Invalidations: $0.005/path (after 1000/month free). Origin Shield: regional cache layer reduces origin load. Cache key: URL + headers + cookies + query strings.'},
  {id:20,domain:'performing',front:'Lambda Performance',plain:'Lambda functions can use up to 10GB memory, run up to 15 minutes, and you can pre-warm them to avoid slow startups.',back:'Memory: 128MB–10GB. Duration: max 15 min. Concurrency: 1000/region default (soft limit). Cold start: ~100ms–3s. Provisioned Concurrency eliminates cold starts. Layers: share code/deps up to 250MB.'},
  {id:21,domain:'performing',front:'DynamoDB Keys & Indexes',plain:'Your main key decides where data lives; extra indexes (LSI/GSI) let you search the same data different ways.',back:'Primary key: partition key (hash) or composite (hash+sort). LSI: same partition key, different sort key, created at table creation. GSI: different partition+sort key, created anytime, eventually consistent.'},
  {id:22,domain:'performing',front:'EC2 Placement Groups',plain:'Cluster packs servers close for speed, Spread keeps them apart for safety, Partition groups them for big distributed systems.',back:'Cluster: same rack, lowest latency, 10Gbps+, risk: single rack failure. Spread: separate hardware, max 7 per AZ, for critical instances. Partition: group of racks, for distributed systems (Hadoop, Kafka).'},
  {id:23,domain:'performing',front:'Kinesis Data Streams',plain:'Data flows through "shards" — each one is a fixed-size pipe for streaming data in and out in real time.',back:'Shard: 1MB/s write, 2MB/s read. Records retained 1-365 days. Enhanced fan-out: 2MB/s per consumer per shard (push). Standard: shared 2MB/s (pull). Use KCL for consumer apps.'},
  {id:24,domain:'cost',front:'EC2 Purchasing Options',plain:'Pay full price anytime (On-Demand), commit for a discount (Reserved/Savings Plans), or bid for leftover capacity cheaply but riskily (Spot).',back:'On-demand: no commitment, most expensive. Reserved (1-3yr): up to 72% off, Standard or Convertible. Spot: up to 90% off, interruptible. Savings Plans: hourly commitment, flexible. Dedicated: compliance, most expensive.'},
  {id:25,domain:'cost',front:'S3 Storage Classes (cost high→low)',plain:'S3 has a sliding scale from "instantly available but pricier" down to "cheapest but takes hours to retrieve."',back:'Standard ($0.023) → Standard-IA ($0.0125, 30-day min) → One Zone-IA ($0.01) → Glacier Instant ($0.004) → Glacier Flexible ($0.0036) → Deep Archive ($0.00099). All per GB/month.'},
  {id:26,domain:'cost',front:'AWS Trusted Advisor Categories',plain:'Trusted Advisor scans your account and flags ways to save money, improve performance, tighten security, and avoid limits.',back:'Cost Optimization: idle/underutilized resources. Performance: service limits, config. Security: open ports, MFA, IAM. Fault Tolerance: backups, Multi-AZ. Service Limits: usage vs limits.'},
  {id:27,domain:'cost',front:'Data Transfer Costs',plain:'Data coming into AWS is free; data leaving AWS or crossing AZs/regions usually costs money.',back:'Free: inbound from internet, same-AZ same-service, S3→CloudFront, S3/DynamoDB via Gateway Endpoint. Charged: outbound to internet, inter-AZ ($0.01/GB), inter-region.'},
  {id:28,domain:'cost',front:'Compute Optimizer vs Trusted Advisor',plain:'Compute Optimizer gives detailed AI-driven rightsizing advice; Trusted Advisor gives a broader but shallower account checkup.',back:'Compute Optimizer: ML-based, EC2/Lambda/ECS/EBS rightsizing with detailed analysis. Trusted Advisor: broader scope (cost/security/perf/limits), less granular on compute recommendations.'},
  {id:29,domain:'resilient',front:'Aurora Key Features',plain:'Aurora keeps 6 copies of your data, grows automatically, replicates fast, and can even scale to zero or rewind mistakes.',back:'6 copies across 3 AZs (2 per AZ), auto-scales 10GB→128TB, up to 15 read replicas, 5× faster than MySQL. Global DB: primary + 5 secondary regions, <1s replication. Serverless: auto-scales to zero for intermittent workloads. Backtrack: rewind DB without restore.'},
  {id:30,domain:'performing',front:'DynamoDB DAX vs ElastiCache',plain:'DAX is a cache built specifically for DynamoDB; ElastiCache is a general-purpose cache for any database.',back:'DAX: DynamoDB-native in-memory cache, microsecond reads, write-through, 1-10 nodes. ElastiCache: standalone Redis/Memcached, works with any DB. Use DAX exclusively for DynamoDB acceleration; use ElastiCache for RDS or multi-source workloads.'},
  {id:31,domain:'resilient',front:'VPC Core Components',plain:'A VPC is your private network, built from gateways for internet access, route tables for traffic direction, and firewalls.',back:'IGW: public subnet → internet (bidirectional). NAT Gateway: private subnet → internet (outbound only). Route Table: directs traffic. NACLs: stateless, subnet-level. VPC Peering: 1:1 non-transitive. Transit Gateway: hub-and-spoke transitive routing across many VPCs.'},
  {id:32,domain:'resilient',front:'Route 53 Record Types & Alias',plain:'DNS records point your domain name to addresses; an Alias record is AWS\'s special, free way to point at AWS resources.',back:'A: IPv4, AAAA: IPv6, CNAME: hostname→hostname (not root domain). Alias: hostname→AWS resource (works at root, free queries). MX: mail servers. TXT: verification/SPF. Alias can point to ELB, CloudFront, Beanstalk, S3 static website, another Route 53 record.'},
  {id:33,domain:'secure',front:'CloudFront Security Controls',plain:'CloudFront can lock down your S3 origin, time-limit access to files, block attacks, and restrict by country.',back:'OAC (Origin Access Control): restricts S3 access to CloudFront only (replaces legacy OAI). Signed URLs: single file time-limited access. Signed Cookies: multiple files. WAF: L7 protection. Shield Standard: auto DDoS. Geo-restriction: allowlist or blocklist countries.'},
  {id:34,domain:'performing',front:'CloudFormation Core Concepts',plain:'CloudFormation lets you describe your infrastructure in a file and deploys/manages it for you as a single unit.',back:'Template (JSON/YAML): declares resources. Stack: set of resources managed together. Change Set: preview changes before applying. StackSets: deploy across multiple accounts/regions with one operation. Nested Stacks: reuse shared components. Drift detection: find manual changes.'},
  {id:35,domain:'secure',front:'CloudTrail vs CloudWatch vs Config',plain:'CloudTrail logs who did what, CloudWatch shows what\'s happening right now, Config tracks how things changed over time.',back:'CloudTrail: WHO did WHAT API call and when (audit log, 90 days free). CloudWatch: WHAT is happening now (metrics, logs, alarms, dashboards). Config: WHAT changed over time (resource config history, compliance rules). All three complement each other.'},
  {id:36,domain:'secure',front:'KMS Envelope Encryption',plain:'Instead of encrypting big data directly with your master key, you encrypt it with a one-time key, then lock that small key with KMS.',back:'1. Generate DEK (Data Encryption Key) via KMS. 2. Encrypt data with plaintext DEK. 3. Encrypt DEK with CMK → store alongside data. 4. Decrypt: send encrypted DEK to KMS → get plaintext DEK → decrypt data. Never store unencrypted DEK. Reduces KMS API calls.'},
  {id:37,domain:'resilient',front:'Transit Gateway vs VPC Peering',plain:'VPC Peering connects two networks directly and free; Transit Gateway is a paid central hub for connecting many networks at once.',back:'VPC Peering: 1:1, non-transitive, free data transfer, works with intra-region security groups. Transit Gateway: hub-and-spoke, transitive, $0.05/GB + $0.05/hr per attachment, supports multicast, 50 Gbps burst per AZ. Use TGW when connecting more than 3 VPCs.'},
  {id:38,domain:'resilient',front:'Direct Connect vs Site-to-Site VPN',plain:'Direct Connect is a dedicated physical cable to AWS — fast and steady but slow to set up; VPN is quick to set up over the internet but less predictable.',back:'Direct Connect: dedicated 1/10 Gbps physical link, consistent performance, no public internet, weeks to provision, higher cost. VPN: IPSec over internet, minutes to provision, variable performance, cheap. DX + VPN: use as backup. DX Gateway: connects to multiple VPCs/regions.'},
  {id:39,domain:'performing',front:'ECS vs EKS vs Fargate (Launch Type)',plain:'ECS is AWS\'s own simple container manager, EKS is managed Kubernetes, and Fargate runs either without you managing servers.',back:'ECS: AWS-native orchestration, simple, tight AWS integration, task definitions in JSON. EKS: managed Kubernetes, portable, standard K8s tools. Fargate: serverless compute for ECS or EKS (no EC2 management), billed per vCPU+memory. EC2 launch type: you manage nodes.'},
  {id:40,domain:'secure',front:'Secrets Manager vs SSM Parameter Store',plain:'Secrets Manager costs more but auto-rotates passwords for you; Parameter Store is free but you rotate things yourself.',back:'Secrets Manager: auto-rotation for RDS/Redshift/DocumentDB, cross-account sharing, $0.40/secret/month. SSM Parameter Store: free (standard), manual rotation, SecureString via KMS, no rotation automation. Use Secrets Manager for credentials that need automated rotation.'},
  {id:41,domain:'resilient',front:'S3 Glacier Retrieval Options',plain:'The cheaper the Glacier tier, the longer you wait to get your data back — from instant to nearly two days.',back:'Glacier Instant Retrieval: ms access (like S3-IA). Glacier Flexible: Expedited 1-5 min, Standard 3-5 hr, Bulk 5-12 hr. Deep Archive: Standard 12 hr, Bulk 48 hr. Min storage: Glacier=90 days, Deep Archive=180 days. Free tier: 10 GB/month standard retrieval.'},
  {id:42,domain:'performing',front:'Redshift Architecture',plain:'Redshift is a data warehouse where one "leader" coordinates many "worker" nodes to crunch huge datasets in parallel.',back:'Leader Node: manages queries & client connections. Compute Nodes: store data & execute queries (up to 128). Massively Parallel Processing (MPP). Columnar storage + compression (no indexes needed). Redshift Spectrum: query S3 data. Runs in one AZ but snapshots can restore to another.'},
  {id:43,domain:'performing',front:'Kinesis Data Streams vs Firehose',plain:'Data Streams is real-time and hands-on; Firehose is "set it and forget it" delivery to storage with a short delay.',back:'Data Streams: real-time (<200ms), manual shard management, 1-365 day retention, custom consumer code. Firehose: near real-time (60s min buffer), fully managed, auto-scales, delivers to S3/Redshift/OpenSearch/Splunk. Use Streams for real-time analytics; Firehose for simple ETL loading.'},
  {id:44,domain:'secure',front:'AWS WAF Rule Types',plain:'WAF is a firewall for your web app that can block by IP, country, known attack patterns, or just too many requests.',back:'IP Set: allow/block CIDRs. AWS Managed Rules: OWASP Top 10, bot control, known bad IPs. Rate-based: throttle per IP (DDoS). Geo Match: block/allow countries. Size Constraint: block oversized requests. String/Regex Match: block patterns. WAF attaches to ALB, CloudFront, API Gateway, AppSync.'},
  {id:45,domain:'secure',front:'IAM Policy Evaluation Logic',plain:'AWS checks every rule that could apply; one explicit "deny" anywhere always wins, otherwise you need an explicit "allow."',back:'1. Explicit DENY → always DENY. 2. SCP restricts what is possible. 3. Resource-based policy can ALLOW without identity policy (cross-account). 4. Permission Boundary caps max identity permissions. 5. Session policy limits assumed role. 6. Identity policy. Default: implicit DENY.'},
  {id:46,domain:'cost',front:'Snow Family Sizing Guide',plain:'Snow devices physically ship your data to AWS — pick the size based on how much data and whether you need it portable or on a truck.',back:'Snowcone: 8TB, battery-powered, portable for edge. Snowball Edge Compute: 40 vCPUs + local compute, edge processing. Snowball Edge Storage: 80TB usable, 52 vCPUs. Snowmobile: truck, up to 100PB, exabyte migrations. Rule of thumb: use Snow when transfer would take >1 week via internet.'},
  {id:47,domain:'performing',front:'EFS vs EBS vs Instance Store',plain:'EFS is shared storage many servers can use at once; EBS is a private drive for one server; Instance Store is super-fast but disappears when the server stops.',back:'EFS: NFS shared across many EC2, regional multi-AZ, auto-scales to PBs, $0.30/GB/month. EBS: block, one EC2, AZ-specific, fixed provisioned size, $0.08/GB/month. Instance Store: ephemeral, highest IOPS, data lost on stop/terminate. Choose EFS for shared; EBS for single-instance DB/OS.'},
  {id:48,domain:'resilient',front:'API Gateway Types',plain:'REST API has every feature but costs more; HTTP API is cheaper and simpler; WebSocket API keeps a live two-way connection open.',back:'REST API: full features (usage plans, caching, API keys, request transforms). HTTP API: 70% cheaper, Lambda/HTTP backends only, no AWS service integration. WebSocket API: stateful, real-time (chat, live dashboards). Endpoint: Edge-optimized (CloudFront), Regional, Private (VPC endpoint).'},
  {id:49,domain:'resilient',front:'ELB Routing & Target Groups',plain:'Load balancers can route by URL path or domain, split traffic for gradual rollouts, and automatically skip unhealthy servers.',back:'ALB path routing: /api/* → API service. ALB host routing: api.example.com vs app.example.com. Weighted target groups: canary/blue-green deployments. NLB: L4 TCP/UDP, static IP, preserve source IP, millions RPS. GLB: inline security appliances (firewalls, IDS). Health check removes unhealthy targets.'},
  {id:50,domain:'cost',front:'AWS Cost Management Tools',plain:'AWS gives you tools to visualize spend, set alerts, get detailed billing data, and estimate costs before you build.',back:'Cost Explorer: visualize 12mo history + 12mo forecast, RI/SP recommendations. Budgets: alerts when cost/usage exceeds threshold ($0.10/day). Cost & Usage Report: most detailed, delivered to S3 up to 3×/day. Compute Optimizer: ML-based EC2/Lambda rightsizing. Pricing Calculator: pre-deployment estimates.'},
  {id:51,domain:'performing',front:'Amazon Athena & AWS Glue',plain:'Athena lets you run SQL directly on files in S3; Glue catalogs and prepares that data so Athena (and others) can find it.',back:'Athena: serverless SQL on S3, pay $5/TB scanned, supports CSV/JSON/Parquet/ORC. Use Parquet+compression to cut costs 10×. Glue: serverless ETL, Data Catalog (shared metadata store), Crawlers (auto-discover S3 schemas), Glue Studio (visual ETL). Athena uses Glue Catalog for table definitions.'},
  {id:52,domain:'resilient',front:'AWS DMS & Migration Hub',plain:'DMS moves your database into AWS with little downtime; Migration Hub gives you one dashboard to track every migration.',back:'DMS: migrate databases with minimal downtime, homogeneous (MySQL→MySQL) or heterogeneous (Oracle→Aurora). Schema Conversion Tool (SCT): converts DDL between incompatible engines. Migration Hub: centralized dashboard for all migrations. Application Discovery: inventory on-prem servers before migration.'},
  {id:53,domain:'secure',front:'Amazon Cognito Authentication Flow',plain:'Users log in through a User Pool, then trade that login for temporary AWS permissions through an Identity Pool.',back:'User Pools: sign-up/sign-in → JWT tokens (ID, access, refresh). Identity Pools: exchange any token (User Pool JWT, Google, Facebook, SAML) for temporary IAM credentials. Combined: User Pool authenticates → Identity Pool authorizes → access S3/DynamoDB/etc. Scales to millions of users.'},
  {id:54,domain:'performing',front:'EventBridge vs SNS vs SQS',plain:'EventBridge routes events by rules from many sources, SNS fans messages out to subscribers, SQS holds messages in a queue.',back:'EventBridge: event bus with rules+filters+targets, schema registry, 90+ AWS sources, third-party SaaS, serverless. SNS: pub/sub fan-out, push to Lambda/SQS/email/SMS/HTTP, supports standard and FIFO topics. SQS: queue, pull-based, decouple services, DLQ for failures. EventBridge for event-driven architecture.'},
  {id:55,domain:'resilient',front:'Organizations, SCPs & Control Tower',plain:'Organizations groups your AWS accounts together; SCPs set the rules they must follow; Control Tower automates setting all of this up.',back:'Organizations: root→OUs→member accounts. SCPs: restrict max permissions in member accounts (NOT management account), do not grant permissions. Consolidated billing: volume discounts across all accounts. Control Tower: extends Org with Landing Zone, Account Factory, guardrails (preventive+detective).'},
  {id:56,domain:'performing',front:'SES Sandbox vs Production Access',plain:'New SES accounts start restricted to verified addresses only; you have to request "production access" to email anyone.',back:'Sandbox (default): can only send TO verified addresses, capped at ~200 emails/24hr & 1/sec. Production access: request via support case, send to any recipient, sending limits scale up automatically based on reputation.'},
  {id:57,domain:'performing',front:'SES Identity Verification & Authentication',plain:'Before SES will send mail, you must prove you own the email address or domain, and set up signatures so it doesn\'t look like spam.',back:'Email identity: verify one address via confirmation link. Domain identity: verify ownership via DNS, send from any @domain address. DKIM: signs outgoing mail (Easy DKIM = 3 CNAME records). Works with SPF + DMARC for inbox deliverability.'},
  {id:58,domain:'performing',front:'SES Configuration Sets & Dedicated IPs',plain:'Configuration sets track what happens to your emails; dedicated IPs give you your own sending reputation instead of sharing one.',back:'Configuration sets: attach rules to outgoing mail, publish events (send/deliver/open/click/bounce/complaint) to CloudWatch/SNS/Firehose, assign dedicated IP pools. Dedicated IP: isolated sending reputation, needs warm-up. Use separate pools for marketing vs transactional mail.'},
  {id:59,domain:'performing',front:'SES Bounce & Complaint Handling',plain:'SES tells you when an email permanently fails, temporarily fails, or gets marked as spam — and you must act on it or get suspended.',back:'Hard bounce: permanent failure (bad address). Soft bounce: temporary (mailbox full). Complaint: recipient marked as spam. SES sends notifications via SNS — must update suppression list or risk account sending suspension if rates exceed thresholds.'},
  {id:60,domain:'resilient',front:'Outposts vs Local Zones vs Wavelength',plain:'Outposts puts AWS hardware in your building, Local Zones puts AWS near your city, Wavelength puts AWS inside mobile networks.',back:'Outposts: AWS hardware physically IN your data center, fully managed by AWS. Local Zones: AWS-owned infrastructure placed near a metro area for single-digit-ms latency, just another AZ in your VPC. Wavelength: AWS compute embedded in telco 5G networks for ultra-low-latency mobile apps.'},
  {id:61,domain:'resilient',front:'Storage Gateway Types',plain:'Storage Gateway bridges your on-prem hardware to S3 — as a file share, a block-storage drive, or a virtual tape backup system.',back:'File Gateway: NFS/SMB on-prem access to S3 with local caching. Volume Gateway: iSCSI block storage backed by EBS snapshots (Cached or Stored mode). Tape Gateway: virtual tape library backed by S3/Glacier for existing backup software. For ONGOING hybrid access, not one-time transfer.'},
  {id:62,domain:'resilient',front:'EKS Anywhere vs EKS on Outposts',plain:'EKS Anywhere runs Kubernetes on your own hardware; EKS on Outposts runs it on AWS hardware sitting in your building.',back:'EKS Anywhere: run Kubernetes (EKS Distro) on YOUR own hardware/VMware anywhere, no AWS Outposts required, AWS-supported tooling consistent with cloud EKS. EKS on Outposts: Kubernetes on AWS-supplied Outposts hardware in your data center, managed control plane in the parent Region.'},

const LESSONS=[
  {day:1,domain:'secure',title:'IAM Foundations',content:`**Core identity types:**
- Users: long-term credentials for a person or application; one user = one identity
- Groups: collections of users sharing permissions (groups cannot be nested inside other groups)
- Roles: temporary credentials assumed by users, services, or external identities — no password or long-term access keys attached
- Policies: JSON documents defining permissions as Allow/Deny statements over Actions + Resources + Conditions

**Policy types you must be able to distinguish:**
- Identity-based policies: attached to users/groups/roles (AWS managed, customer managed, or inline)
- Resource-based policies: attached directly to a resource (S3 bucket policy, SQS queue policy, KMS key policy) — the only policy type that can grant cross-account access on its own
- Permission boundaries: an advanced feature setting the MAXIMUM permissions an identity-based policy can grant — a ceiling, never a grant
- Service Control Policies (SCPs): Organizations-level guardrails limiting what member accounts can do; apply to every principal including root, but never apply to the management account
- Access Control Lists (ACLs): legacy mechanism for cross-account resource permissions (S3 bucket/object ACLs)
- Session policies: passed programmatically when assuming a role via STS to further restrict that session only

**Policy evaluation logic — memorize this exact order:**
1. Start from an implicit DENY (deny-everything by default)
2. An explicit DENY anywhere (identity policy, resource policy, SCP, permission boundary, or session policy) → final result is DENY, no exceptions
3. An explicit ALLOW in an applicable policy, with no explicit deny anywhere → ALLOW
4. No explicit allow found anywhere → implicit DENY

Mental model: every applicable "fence" (SCP, permission boundary, session policy, resource policy) must say yes, AND at least one identity/resource policy must explicitly grant the action, AND nothing anywhere says an explicit no.

**IAM roles & STS in depth:**
- Roles are assumed through AWS Security Token Service (STS), which returns temporary credentials: AccessKeyId, SecretAccessKey, and SessionToken
- Temporary credential lifetime ranges from 15 minutes to 36 hours depending on how the role is assumed and configured
- Key STS API calls: AssumeRole (same- or cross-account), AssumeRoleWithSAML (enterprise federation via a SAML 2.0 identity provider), AssumeRoleWithWebIdentity (legacy social-login federation — Cognito Identity Pools is the modern replacement), GetSessionToken (for MFA-protected API calls)
- EC2 instance roles deliver credentials through the Instance Metadata Service (IMDS) — always prefer an instance role over storing access keys on an instance
- Cross-account pattern: Account A creates a role with a trust policy naming Account B as a trusted principal; a user/role in Account B calls sts:AssumeRole to receive temporary credentials scoped to Account A

**Federation & external identities:**
- SAML 2.0 federation lets enterprises authenticate against an existing on-prem Active Directory / IdP without duplicating users in IAM
- Federation with web identity providers (Google, Facebook, Amazon) is largely superseded by Cognito Identity Pools
- IAM Identity Center (successor to AWS SSO) provides centralized workforce access across many AWS accounts and SaaS apps, and can connect to external IdPs like Okta or Azure AD

**Hard limits & facts the exam tests directly:**
- Maximum of 10 managed policies attached to a single user, group, or role
- IAM is a GLOBAL service — users, groups, roles, and policies are not tied to a region (unlike almost everything else in AWS)
- MFA options: virtual MFA (authenticator app), U2F security key, hardware TOTP token; you can REQUIRE MFA in a policy with the condition key aws:MultiFactorAuthPresent
- The root account should have MFA enabled, no access keys, and be reserved for account-level tasks only (billing changes, closing the account, support plan changes)
- Credential reports and IAM Access Analyzer's "last accessed" data help you find and remove unused permissions

**IAM best practices the exam rewards:**
- Apply least privilege: start from nothing and add only what is required
- Use roles for workloads running on AWS compute — never hardcode long-term credentials in code or AMIs
- Use groups to manage permissions for many users at once instead of per-user policies
- Enable MFA everywhere, especially for any account with elevated privileges
- Use IAM Access Analyzer to find resources shared with entities outside your account and to validate policies before deploying them

**Exam traps:**
- "Multi-AZ standby" is a resilience/RDS concept, not an IAM concept — a very common distractor on identity questions
- SCPs never GRANT anything; they only cap what can be allowed — you still need an identity or resource policy to actually grant access
- A permission boundary that "allows" S3 access does nothing on its own — boundaries restrict, they never substitute for an identity policy's grant
- Inline policies live and die with the single identity they're attached to; managed policies are reusable, independently versioned, and shareable across many identities`},
  {day:2,domain:'secure',title:'S3 Security & Encryption',content:`**Why encryption exists alongside IAM — not instead of it:**
- IAM answers: "Who is allowed to call AWS APIs?" — it controls logical access at the software layer
- Encryption answers: "What happens if access controls are bypassed?" — it protects the data at the physical layer
- Imagine your S3 bucket has a perfectly configured IAM policy: only authorized roles can read it. But that data is sitting on a physical hard drive in an AWS data center. If someone with physical access to that hardware acts maliciously — or credentials are stolen, or there's an insider threat at the infrastructure level — unencrypted data is fully readable by anyone who gets their hands on it
- Encryption means the raw bytes on disk are unreadable ciphertext. Without the key, the data is worthless even if you have the physical drive
- This is defense in depth: never rely on a single security layer. Access controls + encryption = compromising one layer doesn't expose data

**Encryption at rest — know all four and when to use each:**
- SSE-S3 (SSE-AES256): AWS owns and manages the keys; simplest option, encryption is automatic and free
- SSE-KMS (SSE-KMS / aws:kms): keys live in AWS KMS — gives you an audit trail in CloudTrail, key rotation, and fine-grained key policies; can hit KMS request-rate quotas under heavy load
- SSE-C: you supply your own encryption key with every request; S3 performs the encryption but never stores your key — you must keep track of it yourself or lose access permanently
- Client-side encryption: you encrypt the data yourself before it ever reaches S3, using a library like the AWS Encryption SDK or the S3 Encryption Client — S3 just stores opaque ciphertext

**Encryption in transit:**
- HTTPS (TLS) for data moving to/from S3; you can enforce it with a bucket policy condition "aws:SecureTransport: false" → Deny
- Default encryption can be set at the bucket level so every new object is encrypted automatically (SSE-S3 or SSE-KMS)

**Access control — layered, evaluated together:**
- Bucket Policy: resource-based JSON policy attached to the bucket; can grant cross-account access directly
- IAM Policy: identity-based, attached to the calling user/role
- Access Control Lists (ACLs): legacy, object/bucket-level grants — AWS now recommends disabling ACLs entirely (Bucket Owner Enforced setting)
- VPC Endpoint Policy: controls what S3 access is permitted when traffic leaves through a Gateway/Interface VPC endpoint
- The effective permission is the union of allows minus any explicit deny — same DENY-wins logic as IAM evaluation generally

**Key security features to know cold:**
- S3 Block Public Access: four independent toggles (block new public ACLs, block any public ACLs, block new public bucket policies, block any public bucket policies) settable at the account level or per-bucket — account-level settings override bucket-level
- Object Lock (WORM — Write Once Read Many): Governance mode (users with special permission can override/delete) vs Compliance mode (nobody, including root, can delete or overwrite until retention expires) — used for regulatory/legal-hold requirements
- MFA Delete: requires MFA authentication to permanently delete an object version or change bucket versioning state — only the bucket owner (root) can enable/disable it, and only via the CLI/API with MFA
- Versioning: required for Object Lock and MFA Delete; protects against accidental overwrite/delete; can dramatically increase storage costs if not paired with lifecycle rules
- Presigned URLs: generated by an authenticated principal to grant time-limited GET/PUT access to a specific object without sharing IAM credentials — commonly used for temporary downloads/uploads from web/mobile apps
- S3 Access Points: named network endpoints with their own policies, simplifying access management for shared buckets with many different applications/teams
- S3 Object Ownership / Bucket Owner Enforced: disables ACLs so the bucket owner automatically owns every object, simplifying permissions management

**Logging & auditing for S3:**
- S3 Server Access Logging: detailed records of requests made to a bucket, delivered to another bucket
- CloudTrail data events: log individual object-level API calls (GetObject, PutObject) — these cost extra and are off by default
- Macie: uses ML to discover and classify sensitive data (PII, credentials) stored in S3

**Exam traps:**
- SSE-C requires YOU to manage the key — lose it and the data is unrecoverable; this is the differentiator vs SSE-KMS
- A bucket policy alone cannot override account-level Block Public Access settings — account level wins
- Enabling default encryption does not retroactively encrypt existing objects already stored unencrypted
- Presigned URLs inherit the permissions of the user who generated them — if that user's permissions are revoked, previously generated URLs can stop working`},
  {day:3,domain:'resilient',title:'Auto Scaling Deep Dive',content:`**ASG building blocks:**
- Launch Template (current, preferred — supports versioning, multiple instance types, Spot + On-Demand mixes) vs Launch Configuration (legacy, immutable, being phased out — cannot be edited once created)
- Min / Max / Desired capacity: ASG always tries to keep the group at Desired, never below Min or above Max
- Health checks: EC2 status checks (default — only knows if the instance itself is up) or ELB health checks (knows if the application behind the instance is actually responding) — switch to ELB checks whenever instances sit behind a load balancer
- Default cooldown period: pause further scaling activity after a scaling event so metrics can stabilize
- Multiple Availability Zones: ASG automatically attempts to balance instances evenly across the AZs you configure

**The five scaling policy types — know when to pick each:**
1. Target Tracking — simplest and most recommended; you pick a metric (e.g., average CPU = 50%) and ASG manages the alarms and math for you
2. Step Scaling — define multiple "steps" that respond proportionally to how far over/under threshold the alarm is (e.g., +1 instance if CPU is 50-70%, +3 if CPU > 70%)
3. Simple Scaling — one alarm triggers one scaling action, then must wait out the cooldown before scaling again (the original/legacy approach, mostly superseded)
4. Predictive Scaling — uses machine learning on historical load patterns to forecast traffic and provision capacity AHEAD of demand (great for predictable daily/weekly cycles)
5. Scheduled Scaling — set capacity changes for known dates/times (Black Friday, month-end batch jobs, business hours only)

**Scaling on metrics:**
- Can scale on standard CloudWatch metrics (CPUUtilization, NetworkIn/Out, RequestCountPerTarget from an ALB) or custom/application metrics published to CloudWatch
- "Scale-out" = add instances (handle more load); "scale-in" = remove instances (save cost) — exam often phrases questions using these exact terms

**Lifecycle hooks — the exact flow:**
Instance enters Pending:Wait (on launch) or Terminating:Wait (on terminate) → ASG pauses → your custom action runs (e.g., install software, pull logs, deregister from a service registry) → you call CompleteLifecycleAction with CONTINUE or ABANDON → instance proceeds to InService or Terminated
- Useful for: warming up an instance with configuration before it receives traffic, or gracefully draining connections/saving state before termination

**Instance refresh:**
- Performs a rolling replacement of every instance in the ASG (e.g., to roll out a new AMI or launch template version)
- You configure a "minimum healthy percentage" so capacity never drops below an acceptable level during the rollout, plus a warm-up time per batch

**Termination policies:**
- Control which instance ASG removes first during scale-in (default: balance AZs first, then oldest launch template/configuration, then closest to next billing hour) — can be customized (OldestInstance, NewestInstance, OldestLaunchTemplate, custom Lambda)

**Exam traps:**
- ASG by itself does not improve availability unless it spans multiple AZs — a single-AZ ASG just keeps replacing failed instances in the same place
- Scaling policies react to CloudWatch alarms, which have their own evaluation periods — there is always some lag between a load spike and new capacity coming online; predictive/scheduled scaling exists specifically to remove that lag for known patterns
- Warm pools: pre-initialize instances in a stopped/running state to reduce the time it takes to scale out (separate from lifecycle hooks)`},
  {day:4,domain:'performing',title:'CloudFront Architecture',content:`**What CloudFront actually does:**
A global Content Delivery Network (CDN) with 450+ edge locations that caches content close to users — reducing latency, reducing load on your origin, and (for S3 origins) reducing data transfer costs since CloudFront-to-internet pricing differs from S3-to-internet egress.

**Distribution types:** Web (HTTP/HTTPS, the one you'll actually use) and RTMP (legacy Adobe Flash media streaming — effectively deprecated, mostly a "wrong answer" trap on the exam now)

**Origin types you can attach:**
- S3 bucket (most common — static websites, media, downloads)
- Application Load Balancer / EC2 / any custom HTTP backend (dynamic content)
- MediaStore / MediaPackage (video-on-demand and live streaming workflows)
- You can mix multiple origins in one distribution and route by path

**Cache behavior hierarchy:**
- A distribution has exactly one Default Cache Behavior plus any number of Path Pattern behaviors (e.g., "/images/*", "/api/*")
- Path-based behaviors are evaluated in the order you define them, first match wins, default behavior catches everything else
- Each behavior controls: which origin to use, viewer protocol policy (HTTP/HTTPS/redirect), allowed HTTP methods, cache key/TTL settings, and which viewer headers/cookies/query strings to forward

**Cache control:**
- TTL settings (Min/Max/Default) determine how long objects stay cached at edge locations before CloudFront re-checks the origin
- Cache invalidation: force CloudFront to fetch fresh content before TTL expires (costs money beyond the free monthly allotment) — versioned object names/paths are usually a cheaper, faster alternative
- Cache Policies and Origin Request Policies (newer model) separate "what varies the cache key" from "what gets forwarded to the origin"

**Performance features:**
- Origin Shield: an additional caching layer in front of your origin that consolidates requests from all edge locations — reduces origin load and improves cache hit ratio for less-popular content
- S3 Transfer Acceleration: uses CloudFront's global edge network to speed up uploads INTO an S3 bucket over long distances (different feature from caching downloads OUT)
- Lambda@Edge: run Node.js/Python functions at edge locations, can modify requests/responses at four points (viewer request, origin request, origin response, viewer response); supports longer execution and larger packages
- CloudFront Functions: lightweight JavaScript, sub-millisecond startup, much cheaper — ideal for simple operations like header manipulation, URL rewrites/redirects, and access authorization checks at massive scale

**Security features:**
- Origin Access Control (OAC): the modern, recommended way to restrict an S3 origin so it can ONLY be reached through CloudFront (replaces the older Origin Access Identity / OAI, which had SSE-KMS and some region limitations)
- Signed URLs: grant time-limited access to a SINGLE file — use when you need per-request control or your users don't have cookies enabled
- Signed Cookies: grant time-limited access to MULTIPLE files (e.g., an entire video course) — set once, applies to many requests
- Field-Level Encryption: encrypts specific sensitive fields (e.g., credit card numbers) all the way through to your origin
- Geo-restriction: allow-list or block-list specific countries
- Integrates with AWS WAF (Layer 7 rules) and AWS Shield (DDoS protection) directly at the edge

**Exam traps:**
- "My S3 bucket is getting hit with too much direct traffic / high egress costs" → answer is almost always "put CloudFront in front of it with OAC", not "increase bucket capacity" (S3 scales automatically anyway)
- Signed URL = one object; Signed Cookie = many objects — this distinction shows up often in scenario questions
- CloudFront Functions vs Lambda@Edge: pick Functions for simple, high-scale, low-latency edge logic; pick Lambda@Edge when you need more compute, longer runtime, or access to the request body/external network calls`},
  {day:5,domain:'cost',title:'Pricing Models & Cost Optimization',content:`**EC2 purchasing options — full picture:**
- On-Demand: pay per second/hour, no commitment — best for short-term, spiky, or unpredictable workloads and for first-time/unknown workloads
- Reserved Instances (1 or 3 year terms): commit to a specific instance configuration in exchange for a steep discount
