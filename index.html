        </button>
        <span className="text-slate-400 text-xs">{read.length}/{LESSONS.length} completed</span>
      </div>
    </div>
  );
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
function Quiz({onAnswer}){
  const[domain,setDomain]=useState('all');
  const[session,setSession]=useState(null);
  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[showExp,setShowExp]=useState(false);
  const[sessionResults,setSessionResults]=useState([]);

  const startQuiz=()=>{
    const pool=domain==='all'?QUESTIONS:QUESTIONS.filter(q=>q.domain===domain);
    setSession(shuffle(pool).slice(0,10));
    setIdx(0);setSelected(null);setShowExp(false);setSessionResults([]);
  };

  const isCorrectOpt=(q,i)=>Array.isArray(q.ans)?q.ans.includes(i):i===q.ans;
  const correctLabel=(q)=>Array.isArray(q.ans)?q.ans.map(i=>q.opts[i]).join(' / '):q.opts[q.ans];

  const handleSelect=(i)=>{
    if(selected!==null)return;
    setSelected(i);setShowExp(true);
    const q=session[idx];
    const correct=isCorrectOpt(q,i);
    onAnswer({domain:q.domain,sub:q.sub,correct,qid:q.id,ts:Date.now()});
    setSessionResults(r=>[...r,{correct,dontKnow:false,domain:q.domain,sub:q.sub,qtext:q.q,ans:correctLabel(q)}]);
  };

  const handleDontKnow=()=>{
    if(selected!==null)return;
    setSelected('dk');setShowExp(true);
    const q=session[idx];
    onAnswer({domain:q.domain,sub:q.sub,correct:false,dontKnow:true,qid:q.id,ts:Date.now()});
    setSessionResults(r=>[...r,{correct:false,dontKnow:true,domain:q.domain,sub:q.sub,qtext:q.q,ans:correctLabel(q)}]);
  };

  const next=()=>{
    if(idx<session.length-1){setIdx(i=>i+1);setSelected(null);setShowExp(false);}
    else setSession('done');
  };

  if(!session){
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-slate-900 text-xl font-bold mb-2">Practice Quiz</h1>
        <p className="text-slate-400 text-sm mb-5">10 randomized questions · adaptive difficulty</p>
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="text-slate-600 text-sm font-semibold mb-3">Focus on domain:</div>
          <div className="grid grid-cols-2 gap-2 mb-6 sm:grid-cols-3">
            {[{id:'all',label:'All Domains',color:'text-slate-700'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label,color:v.color,bg:v.bg}))].map(d=>(
              <button key={d.id} onClick={()=>setDomain(d.id)}
                className={`text-sm py-2 px-3 rounded-lg border-2 font-medium transition-all ${domain===d.id?`border-indigo-500 text-indigo-700 bg-indigo-50`:`border-slate-200 text-slate-500 hover:border-slate-300 hover:bg-slate-50`}`}>
                {d.label}
              </button>
            ))}
          </div>
          <button onClick={startQuiz} className="bg-indigo-600 text-white text-sm font-bold px-8 py-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md">
            Start Quiz →
          </button>
        </div>
      </div>
    );
  }

  if(session==='done'){
    const correct=sessionResults.filter(r=>r.correct).length;
    const missed=sessionResults.filter(r=>!r.correct);
    // Group missed by subtopic
    const bySubtopic={};
    missed.forEach(r=>{
      const key=`${r.sub}||${r.domain}`;
      if(!bySubtopic[key])bySubtopic[key]={sub:r.sub,domain:r.domain,items:[]};
      bySubtopic[key].items.push(r);
    });
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-slate-900 text-xl font-bold mb-5">Results</h1>
        <div className={`rounded-2xl p-6 mb-4 text-center ${correct>=7?'bg-emerald-50':correct>=5?'bg-amber-50':'bg-red-50'}`}>
          <div className={`text-5xl font-black mb-1 ${correct>=7?'text-emerald-600':correct>=5?'text-amber-600':'text-red-500'}`}>
            {correct}/10
          </div>
          <div className={`text-sm font-semibold mb-4 ${correct>=7?'text-emerald-600':correct>=5?'text-amber-600':'text-red-500'}`}>
            {pct(correct,10)}% · {correct>=7?'Great work! 🎉':correct>=5?'Getting there 💪':'Keep studying 📚'}
          </div>
          <div className="flex flex-wrap justify-center gap-3 mb-5">
            {Object.keys(DOMAINS).map(d=>{
              const dr=sessionResults.filter(r=>r.domain===d);
              if(!dr.length)return null;
              const sc=dr.filter(r=>r.correct).length;
              return<div key={d} className={`text-xs px-3 py-1 rounded-full font-semibold ${DOMAINS[d].bg} ${DOMAINS[d].color}`}>
                {DOMAINS[d].label}: {sc}/{dr.length}
              </div>;
            })}
          </div>
          <button onClick={()=>{setSession(null);setDomain('all');}} className="bg-white text-slate-700 font-semibold text-sm px-5 py-2 rounded-lg border-2 border-slate-200 hover:border-slate-300 transition-colors">
            New Quiz
          </button>
        </div>

        {missed.length>0&&(
          <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
            <div className="text-slate-800 font-bold mb-0.5">Review List</div>
            <div className="text-slate-400 text-xs mb-4">{missed.length} topic{missed.length!==1?'s':''} to revisit</div>
            <div className="space-y-4">
              {Object.values(bySubtopic).map((group,i)=>(
                <div key={i} className={`${DOMAINS[group.domain].bg} rounded-lg p-3`}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className={`${DOMAINS[group.domain].color} text-xs font-bold`}>{group.sub}</span>
                    <span className="text-slate-300 text-xs">·</span>
                    <span className="text-slate-400 text-xs">{DOMAINS[group.domain].label}</span>
                    {group.items.some(r=>r.dontKnow)&&<span className="text-xs text-slate-400 bg-white border border-slate-200 px-1.5 py-0.5 rounded-full">didn't know</span>}
                  </div>
                  <div className="space-y-2 pl-2 border-l-2 border-white/70">
                    {group.items.map((r,j)=>(
                      <div key={j}>
                        <div className="text-slate-600 text-xs leading-relaxed">{r.qtext}</div>
                        <div className={`${DOMAINS[group.domain].color} text-xs mt-0.5 font-semibold`}>→ {r.ans}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  const q=session[idx];
  const d=DOMAINS[q.domain];

  return(
    <div className="p-4 md:p-6 max-w-2xl">
      <div className="flex items-center justify-between mb-3">
        <h1 className="text-slate-900 text-xl font-bold">Quiz</h1>
        <span className="text-slate-400 text-sm font-medium">{idx+1} / {session.length}</span>
      </div>
      <ProgressBar value={idx+1} max={session.length} domain={q.domain} className="mb-5"/>
      <div className={`bg-white border-l-4 border border-slate-200 rounded-xl p-5 mb-4 shadow-sm`}>
        <div className="flex items-center gap-2 mb-3">
          <Tag domain={q.domain}/><span className="text-slate-400 text-xs font-medium uppercase tracking-wide">{q.sub}</span>
        </div>
        <p className="text-slate-800 text-sm leading-relaxed font-medium">{q.q}</p>
      </div>
      <div className="space-y-2 mb-3">
        {q.opts.map((opt,i)=>{
          let cls='border-slate-200 bg-white text-slate-700 hover:border-indigo-300 hover:bg-indigo-50/40';
          let letterCls='bg-slate-100 text-slate-500';
          if(selected!==null){
            if(isCorrectOpt(q,i)){cls='border-emerald-400 bg-emerald-50 text-emerald-800';letterCls='bg-emerald-400 text-white';}
            else if(i===selected&&!isCorrectOpt(q,i)&&selected!=='dk'){cls='border-red-400 bg-red-50 text-red-700';letterCls='bg-red-400 text-white';}
            else{cls='border-slate-100 bg-slate-50 text-slate-400';letterCls='bg-slate-200 text-slate-400';}
          }
          return(
            <button key={i} onClick={()=>handleSelect(i)}
              className={`w-full text-left text-sm px-3 py-3 rounded-lg border-2 transition-all flex items-start gap-0 ${cls}`}>
              <span className={`opt-letter ${letterCls}`}>{String.fromCharCode(65+i)}</span>
              <span className="flex-1 leading-snug pt-0.5">{opt}</span>
            </button>
          );
        })}
      </div>
      {selected===null&&(
        <button onClick={handleDontKnow}
          className="w-full text-sm px-4 py-2.5 rounded-lg border-2 border-dashed border-slate-200 text-slate-400 hover:border-slate-300 hover:text-slate-500 hover:bg-slate-50 transition-colors mb-4">
          I don't know this one
        </button>
      )}
      {showExp&&(
        <div className={`rounded-xl p-4 mb-4 ${selected==='dk'?'bg-amber-50 border-2 border-amber-200':'bg-indigo-50 border-2 border-indigo-100'}`}>
          {selected==='dk'&&<div className="text-amber-700 text-xs font-semibold mb-2 flex items-center gap-1">✓ Correct: {correctLabel(q)}</div>}
          <div className={`text-xs font-semibold mb-1.5 ${selected==='dk'?'text-amber-600':'text-indigo-600'}`}>Explanation</div>
          <p className="text-slate-700 text-sm leading-relaxed">{q.exp}</p>
        </div>
      )}
      {selected!==null&&(
        <button onClick={next} className="bg-indigo-600 text-white text-sm font-semibold px-5 py-2.5 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
          {idx<session.length-1?'Next Question →':'View Results'}
        </button>
      )}
    </div>
  );
}

// ── Flashcards ────────────────────────────────────────────────────────────────
function Flashcards(){
  const[conf,setConf]=useStore('flash_conf',[]);
  const[domain,setDomain]=useState('all');
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[showAll,setShowAll]=useState(false);

  const cards=useMemo(()=>domain==='all'?FLASHCARDS:FLASHCARDS.filter(c=>c.domain===domain),[domain]);
  const card=cards[Math.min(idx,cards.length-1)];
  const cardConf=conf.find(c=>c.id===card?.id);

  const setCardConf=(level)=>{
    setConf(c=>{const filtered=c.filter(x=>x.id!==card.id);return[...filtered,{id:card.id,conf:level}]});
  };

  const go=(dir)=>{setIdx(i=>(i+dir+cards.length)%cards.length);setFlipped(false)};

  const stats=useMemo(()=>({
    know:conf.filter(c=>c.conf==='know').length,
    sorta:conf.filter(c=>c.conf==='sorta').length,
    nope:conf.filter(c=>c.conf==='nope').length,
  }),[conf]);

  if(showAll){
    return(
      <div className="p-4 md:p-6 max-w-4xl">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={()=>setShowAll(false)} className="text-slate-400 hover:text-slate-600 text-sm">← Back</button>
          <h1 className="text-slate-800 text-xl font-semibold">All Flashcards</h1>
        </div>
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
          {FLASHCARDS.map((c,i)=>{
            const cv=conf.find(x=>x.id===c.id);
            return(
              <div key={c.id} className="bg-white border border-slate-200 rounded-lg p-3 cursor-pointer hover:border-slate-200"
                onClick={()=>{setDomain(c.domain);setIdx(cards.findIndex(x=>x.id===c.id)||0);setShowAll(false);setFlipped(false)}}>
                <div className="flex items-center justify-between mb-1">
                  <Tag domain={c.domain} small/>
                  {cv&&<span className={`text-xs ${cv.conf==='know'?'text-emerald-600':cv.conf==='sorta'?'text-amber-600':'text-red-400'}`}>
                    {cv.conf==='know'?'✓ know':cv.conf==='sorta'?'~ sorta':'✗ nope'}
                  </span>}
                </div>
                <div className="text-slate-600 text-sm">{c.front}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div className="p-4 md:p-6 max-w-2xl">
      <div className="flex items-center justify-between mb-6">
        <h1 className="text-slate-800 text-xl font-semibold">Flashcards</h1>
        <div className="flex items-center gap-3 text-xs">
          <span className="text-emerald-600">✓ {stats.know}</span>
          <span className="text-amber-600">~ {stats.sorta}</span>
          <span className="text-red-400">✗ {stats.nope}</span>
          <button onClick={()=>setShowAll(true)} className="text-slate-400 hover:text-slate-600 border border-slate-200 px-2 py-1 rounded ml-2">All</button>
        </div>
      </div>

      <div className="flex gap-2 mb-5 flex-wrap">
        {[{id:'all',label:'All (' + FLASHCARDS.length + ')'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label}))].map(d=>(
          <button key={d.id} onClick={()=>{setDomain(d.id);setIdx(0);setFlipped(false)}}
            className={`text-xs px-2.5 py-1 rounded border transition-colors ${domain===d.id?'border-indigo-500 text-indigo-600 bg-indigo-50':'border-slate-200 text-slate-500 hover:border-slate-400'}`}>
            {d.label}
          </button>
        ))}
      </div>

      <div className="text-slate-400 text-xs mb-3 text-center">{idx+1} / {cards.length} · Click card to flip</div>

      <div className="relative mb-4 cursor-pointer select-none" style={{height:290}} onClick={()=>setFlipped(f=>!f)}>
        {/* Front face */}
        <div style={{
          position:'absolute',inset:0,borderRadius:16,background:'#fff',
          border:'2px solid #e2e8f0',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          padding:'28px',textAlign:'center',
          boxShadow:'0 4px 24px rgba(0,0,0,.07)',
          transition:'opacity .22s ease,transform .22s ease',
          opacity:flipped?0:1,
          transform:flipped?'scale(.97)':'scale(1)',
          pointerEvents:flipped?'none':'auto',
        }}>
          {card&&<div style={{position:'absolute',top:0,left:0,right:0,height:5,borderRadius:'14px 14px 0 0',background:{secure:'#10b981',resilient:'#0ea5e9',performing:'#f59e0b',cost:'#8b5cf6'}[card.domain]}}/>}
          <div className="text-slate-400 text-xs font-semibold tracking-widest mb-3">CONCEPT</div>
          <div className="text-slate-900 text-lg font-semibold leading-snug mb-3">{card?.front}</div>
          {card&&<Tag domain={card.domain}/>}
          <div className="text-slate-300 text-xs mt-4">tap to reveal →</div>
        </div>
        {/* Back face */}
        <div style={{
          position:'absolute',inset:0,borderRadius:16,
          background:{secure:'#f0fdf4',resilient:'#f0f9ff',performing:'#fffbeb',cost:'#faf5ff'}[card?.domain]||'#f8fafc',
          border:'2px solid',
          borderColor:{secure:'#bbf7d0',resilient:'#bae6fd',performing:'#fde68a',cost:'#e9d5ff'}[card?.domain]||'#e2e8f0',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          padding:'28px',textAlign:'center',
          boxShadow:'0 4px 24px rgba(0,0,0,.07)',
          transition:'opacity .22s ease,transform .22s ease',
          opacity:flipped?1:0,
          transform:flipped?'scale(1)':'scale(1.03)',
          pointerEvents:flipped?'auto':'none',
          overflowY:'auto',
        }}>
          <div className="text-slate-400 text-xs font-semibold tracking-widest mb-3">ANSWER</div>
          <div className="text-slate-800 text-sm leading-relaxed font-medium">{card?.back}</div>
        </div>
      </div>

      <div className="flex items-center justify-between mb-4">
        <button onClick={()=>go(-1)} className="text-slate-400 hover:text-slate-600 text-sm px-3 py-1.5 border border-slate-200 rounded hover:border-slate-400">← Prev</button>
        <div className="flex gap-2">
          {[{k:'nope',label:'✗ Nope',cls:'border-red-400 text-red-600 hover:bg-red-50 bg-white'},
            {k:'sorta',label:'~ Sorta',cls:'border-amber-400 text-amber-700 hover:bg-amber-50 bg-white'},
            {k:'know',label:'✓ Know',cls:'border-emerald-400 text-emerald-700 hover:bg-emerald-50 bg-white'}
          ].map(b=>(
            <button key={b.k} onClick={()=>setCardConf(b.k)}
              className={`text-xs px-3 py-1.5 rounded border transition-colors ${b.cls} ${cardConf?.conf===b.k?'opacity-100 font-semibold':'opacity-60'}`}>
              {b.label}
            </button>
          ))}
        </div>
        <button onClick={()=>go(1)} className="text-slate-400 hover:text-slate-600 text-sm px-3 py-1.5 border border-slate-200 rounded hover:border-slate-400">Next →</button>
      </div>
    </div>
  );
}

// ── Practice Exam ─────────────────────────────────────────────────────────────
const examAnswerCorrect=(userAns,qAns)=>{
  if(userAns===undefined||userAns===null)return false;
  if(Array.isArray(qAns)){
    if(!Array.isArray(userAns))return false;
    return qAns.length===userAns.length&&qAns.every(a=>userAns.includes(a));
  }
  return userAns===qAns;
};

function PracticeExam({onExamComplete}){
  const[phase,setPhase]=useState('setup');
  const[questions,setQuestions]=useState([]);
  const[answers,setAnswers]=useState({});
  const[timeLeft,setTimeLeft]=useState(7800);
  const[flagged,setFlagged]=useState(new Set());
  const[qIdx,setQIdx]=useState(0);
  const timerRef=useRef(null);

  const start=()=>{
    const pool=[];
    Object.entries(DOMAINS).forEach(([d,meta])=>{
      const dq=shuffle(QUESTIONS.filter(q=>q.domain===d));
      const n=Math.round(65*meta.pct/100);
      pool.push(...dq.slice(0,n));
    });
    const final=shuffle(pool).slice(0,65);
    setQuestions(final);setAnswers({});setTimeLeft(7800);setFlagged(new Set());setQIdx(0);
    setPhase('exam');
    timerRef.current=setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);setPhase('result');return 0;}return t-1;}),1000);
  };

  const submit=()=>{clearInterval(timerRef.current);setPhase('result');};

  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  useEffect(()=>{
    if(phase==='result'&&questions.length>0){
      const correct=questions.filter((q,i)=>examAnswerCorrect(answers[i],q.ans)).length;
      const score=Math.round(correct/questions.length*100);
      const byDomain={};
      Object.keys(DOMAINS).forEach(d=>{
        const dqs=questions.map((q,i)=>({...q,i})).filter(q=>q.domain===d);
        byDomain[d]={correct:dqs.filter(q=>examAnswerCorrect(answers[q.i],q.ans)).length,total:dqs.length};
      });
      const items=questions.map((q,i)=>({qid:q.id,domain:q.domain,sub:q.sub,correct:examAnswerCorrect(answers[i],q.ans)}));
      onExamComplete({ts:Date.now(),score,correct,total:questions.length,byDomain,date:today(),items});
    }
  },[phase]);

  const fmt=(s)=>`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  const answered=Object.keys(answers).length;
  const progress=pct(answered,65);

  if(phase==='setup'){
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-slate-800 text-xl font-semibold mb-6">Practice Exam</h1>
        <div className="bg-white border border-slate-200 rounded-lg p-5 space-y-4">
          <div className="text-slate-600 text-sm font-medium">SAA-C03 Simulation</div>
          <div className="grid grid-cols-2 gap-3 text-sm">
            <div className="text-slate-400">Questions: <span className="text-slate-700">65</span></div>
            <div className="text-slate-400">Time: <span className="text-slate-700">130 minutes</span></div>
            <div className="text-slate-400">Pass score: <span className="text-emerald-600">72% (720/1000)</span></div>
            <div className="text-slate-400">Format: <span className="text-slate-700">Multiple choice</span></div>
          </div>
          <div className="border-t border-slate-200 pt-3 space-y-1.5 text-xs text-slate-400">
            {Object.entries(DOMAINS).map(([k,d])=>(
              <div key={k} className="flex justify-between">
                <span className={d.color}>{d.label} Architectures</span>
                <span>{d.pct}% (~{Math.round(65*d.pct/100)} questions)</span>
              </div>
            ))}
          </div>
          <button onClick={start} className="bg-indigo-600 text-white text-sm font-semibold px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
            Begin Exam →
          </button>
        </div>
      </div>
    );
  }

  if(phase==='result'){
    const correct=questions.filter((q,i)=>examAnswerCorrect(answers[i],q.ans)).length;
    const score=Math.round(correct/questions.length*100);
    const pass=score>=72;
    const byDomain={};
    Object.keys(DOMAINS).forEach(d=>{
      const dqs=questions.map((q,i)=>({...q,i})).filter(q=>q.domain===d);
      byDomain[d]={correct:dqs.filter(q=>examAnswerCorrect(answers[q.i],q.ans)).length,total:dqs.length};
    });
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-slate-800 text-xl font-semibold mb-6">Exam Results</h1>
        <div className="bg-white border border-slate-200 rounded-lg p-5 space-y-5">
          <div>
            <div className={`text-5xl font-semibold mb-1 ${pass?'text-emerald-600':'text-red-400'}`}>{score}%</div>
            <div className={`text-sm ${pass?'text-emerald-600':'text-red-400'}`}>{pass?'PASS — Above 72% threshold':'FAIL — Below 72% threshold'}</div>
            <div className="text-slate-400 text-xs mt-1">{correct} / {questions.length} correct</div>
          </div>
          <div className="space-y-3">
            {Object.entries(byDomain).map(([d,s])=>(
              <div key={d}>
                <div className="flex justify-between text-xs mb-1">
                  <span className={DOMAINS[d].color}>{DOMAINS[d].label}</span>
                  <span className="text-slate-500">{s.correct}/{s.total} ({pct(s.correct,s.total)}%)</span>
                </div>
                <ProgressBar value={s.correct} max={s.total} domain={d}/>
              </div>
            ))}
          </div>
          <button onClick={()=>setPhase('setup')} className="border border-slate-200 text-slate-600 text-sm px-4 py-2 rounded hover:border-slate-400 transition-colors">
            Take Another Exam
          </button>
        </div>
      </div>
    );
  }

  const q=questions[qIdx];
  const d=q?DOMAINS[q.domain]:{color:'text-slate-500',border:'border-slate-200',bg:'bg-white'};

  return(
    <div className="flex flex-col h-screen">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-white sticky top-0">
        <div className="text-sm text-slate-500">Q {qIdx+1}/{questions.length}</div>
        <div className={`text-lg font-semibold ${timeLeft<600?'text-red-400':timeLeft<1800?'text-amber-600':'text-emerald-600'}`}>
          {fmt(timeLeft)}
        </div>
        <div className="flex items-center gap-2">
          <span className="hidden sm:inline text-xs text-slate-400">{answered}/65</span>
          <button onClick={submit} className="text-xs border border-red-400/50 text-red-400 px-3 py-1.5 rounded hover:bg-red-400/10">Submit</button>
        </div>
      </div>

      <div className="flex flex-1 overflow-hidden">
        {/* Question panel */}
        <div className="flex-1 overflow-y-auto p-4 md:p-6">
          <ProgressBar value={answered} max={65} domain={q?.domain} className="mb-5"/>
          {q&&(
            <>
              <div className={`bg-white border ${d.border} rounded-lg p-5 mb-4`}>
                <div className="flex items-center gap-2 mb-3">
                  <Tag domain={q.domain}/><span className="text-slate-400 text-xs">{q.sub}</span>
                  <button onClick={()=>setFlagged(f=>{const n=new Set(f);n.has(qIdx)?n.delete(qIdx):n.add(qIdx);return n;})}
                    className={`ml-auto text-xs ${flagged.has(qIdx)?'text-amber-600':'text-slate-400 hover:text-slate-500'}`}>
                    {flagged.has(qIdx)?'⚑ flagged':'⚐ flag'}
                  </button>
                </div>
                <p className="text-slate-700 text-sm leading-relaxed">{q.q}</p>
              </div>
              <div className="space-y-2">
                {q.opts.map((opt,i)=>(
                  <button key={i} onClick={()=>setAnswers(a=>({...a,[qIdx]:i}))}
                    className={`w-full text-left text-sm px-4 py-3 rounded border transition-colors ${answers[qIdx]===i?'border-emerald-400 text-emerald-600 bg-emerald-50':'border-slate-200 text-slate-600 hover:border-slate-400'}`}>
                    <span className="text-slate-400 mr-2">{String.fromCharCode(65+i)}.</span>{opt}
                  </button>
                ))}
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={()=>setQIdx(i=>Math.max(0,i-1))} disabled={qIdx===0}
                  className="text-sm px-4 py-2 border border-slate-200 text-slate-500 rounded hover:border-slate-400 disabled:opacity-30">← Prev</button>
                <button onClick={()=>setQIdx(i=>Math.min(questions.length-1,i+1))} disabled={qIdx===questions.length-1}
                  className="text-sm px-4 py-2 border border-slate-200 text-slate-500 rounded hover:border-slate-400 disabled:opacity-30">Next →</button>
              </div>
            </>
          )}
        </div>

        {/* Question grid */}
        <div className="hidden md:block w-48 border-l border-slate-200 overflow-y-auto p-3">
          <div className="text-xs text-slate-400 mb-2">Navigator</div>
          <div className="grid grid-cols-5 gap-1">
            {questions.map((_,i)=>(
              <button key={i} onClick={()=>setQIdx(i)}
                className={`text-xs w-full aspect-square rounded flex items-center justify-center transition-colors
                  ${i===qIdx?'bg-indigo-600 text-white':
                    flagged.has(i)?'bg-orange-400/20 text-amber-600 border border-amber-400/40':
                    answers[i]!==undefined?'bg-slate-200 text-slate-600':'bg-white text-slate-400 border border-slate-200'}`}>
                {i+1}
              </button>
            ))}
          </div>
          <div className="mt-3 space-y-1 text-xs text-slate-400">
            <div><span className="inline-block w-3 h-3 bg-green-400 rounded mr-1"/>Current</div>
            <div><span className="inline-block w-3 h-3 bg-slate-200 rounded mr-1"/>Answered</div>
            <div><span className="inline-block w-3 h-3 bg-orange-400/20 border border-amber-400/40 rounded mr-1"/>Flagged</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Analytics ─────────────────────────────────────────────────────────────────
function Analytics({quizHistory,examHistory,flashConf}){
  const[tab,setTab]=useState('summary');
  const[expandedExam,setExpandedExam]=useState(null);

  const qMap=useMemo(()=>{const m={};QUESTIONS.forEach(q=>m[q.id]=q);return m;},[]);

  const domainStats=useMemo(()=>{
    return Object.entries(DOMAINS).map(([key,d])=>{
      const qs=quizHistory.filter(h=>h.domain===key);
      const correct=qs.filter(h=>h.correct).length;
      const subMap={};
      qs.forEach(h=>{
        if(!subMap[h.sub])subMap[h.sub]={correct:0,total:0};
        subMap[h.sub].total++;
        if(h.correct)subMap[h.sub].correct++;
      });
      return{key,label:d.label,color:d.color,border:d.border,bg:d.bg,correct,total:qs.length,pct:d.pct,subs:subMap};
    });
  },[quizHistory]);

  const flashStats=useMemo(()=>{
    const know=flashConf.filter(f=>f.conf==='know').length;
    const sorta=flashConf.filter(f=>f.conf==='sorta').length;
    const nope=flashConf.filter(f=>f.conf==='nope').length;
    return{know,sorta,nope,total:FLASHCARDS.length};
  },[flashConf]);

  const recentExams=examHistory.slice(-5).reverse();

  const recentQuiz=[...quizHistory].reverse().slice(0,100);
  const recentExams=[...examHistory].reverse();

  return(
    <div className="p-4 md:p-6 space-y-5 max-w-4xl">
      <div className="flex items-center justify-between">
        <h1 className="text-slate-800 text-xl font-semibold">Analytics</h1>
        <div className="flex gap-1 bg-slate-100 rounded-lg p-0.5">
          {[{id:'summary',label:'Summary'},{id:'log',label:'Question Log'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`text-xs font-medium px-3 py-1.5 rounded-md transition-all ${tab===t.id?'bg-white text-slate-800 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {tab==='log'&&(
        <div className="space-y-5">
          {/* Quiz question log */}
          <div className="bg-white border border-slate-200 rounded-xl p-4">
            <div className="text-slate-700 text-sm font-semibold mb-1">Quiz History</div>
            <div className="text-slate-400 text-xs mb-4">{quizHistory.length} total attempts · showing last {recentQuiz.length}</div>
            {recentQuiz.length===0?(
              <div className="text-slate-400 text-sm py-4 text-center">No quiz attempts yet — start a quiz to build your history.</div>
            ):(
              <div className="space-y-2 max-h-[600px] overflow-y-auto pr-1">
                {recentQuiz.map((h,i)=>{
                  const q=qMap[h.qid];
                  return(
                    <div key={i} className={`flex items-start gap-3 p-3 rounded-lg border text-xs ${h.correct?'border-emerald-200 bg-emerald-50/40':'border-red-200 bg-red-50/40'}`}>
                      <span className={`shrink-0 font-bold mt-0.5 ${h.correct?'text-emerald-600':'text-red-400'}`}>{h.correct?'✓':'✗'}</span>
                      <div className="flex-1 min-w-0">
                        <div className="text-slate-700 font-medium leading-snug mb-1">{q?q.q:`Question #${h.qid}`}</div>
                        {q&&!h.correct&&<div className="text-slate-400 leading-snug">Correct: <span className="text-emerald-700 font-medium">{Array.isArray(q.ans)?q.ans.map(a=>q.opts[a]).join(' / '):q.opts[q.ans]}</span></div>}
                      </div>
                      <div className="shrink-0 flex flex-col items-end gap-1">
                        <Tag domain={h.domain}/>
                        <span className="text-slate-300">{new Date(h.ts).toLocaleDateString()}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Exam attempts with per-question breakdown */}
          <div className="bg-white border border-slate-200 rounded-xl p-4">
            <div className="text-slate-700 text-sm font-semibold mb-1">Practice Exam Attempts</div>
            <div className="text-slate-400 text-xs mb-4">{examHistory.length} total exam{examHistory.length!==1?'s':''} · click to see questions</div>
            {recentExams.length===0?(
              <div className="text-slate-400 text-sm py-4 text-center">No practice exams yet.</div>
            ):(
              <div className="space-y-2">
                {recentExams.map((e,i)=>{
                  const expanded=expandedExam===i;
                  return(
                    <div key={i} className="border border-slate-200 rounded-lg overflow-hidden">
                      <button onClick={()=>setExpandedExam(expanded?null:i)}

                        <div className="flex items-center gap-3">
                          <span className={`text-sm font-bold ${e.score>=72?'text-emerald-600':'text-red-400'}`}>{e.score}%</span>
                          <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${e.score>=72?'bg-emerald-100 text-emerald-700':'bg-red-50 text-red-500'}`}>{e.score>=72?'PASS':'FAIL'}</span>
                          <span className="text-slate-400 text-xs">{e.correct}/{e.total} correct</span>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className="text-slate-400 text-xs">{e.date||new Date(e.ts).toLocaleDateString()}</span>

                        </div>
                      </button>
                      {expanded&&(e.items?.length>0?(

                            const q=qMap[item.qid];

                                <span className={`shrink-0 font-bold mt-0.5 ${item.correct?'text-emerald-500':'text-red-400'}`}>{item.correct?'✓':'✗'}</span>
                                <div className="flex-1 min-w-0">
                                  <div className="text-slate-700 leading-snug mb-0.5">{q?q.q:`Question #${item.qid}`}</div>
                                  {q&&!item.correct&&<div className="text-slate-400">Correct: <span className="text-emerald-700 font-medium">{Array.isArray(q.ans)?q.ans.map(a=>q.opts[a]).join(' / '):q.opts[q.ans]}</span></div>}
                                </div>
                                <Tag domain={item.domain}/>
                              </div>
                            );
                          })}
                        </div>
                      ):(
                        <div className="border-t border-slate-100 px-4 py-3 text-xs text-slate-400">Per-question breakdown only available for exams taken after this update.</div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {tab==='summary'&&<>
      {/* Domain breakdown */}
      <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
        {domainStats.map(d=>(
          <div key={d.key} className={`bg-white border ${d.border} rounded-lg p-4`}>
            <div className="flex justify-between items-center mb-3">
              <span className={`${d.color} font-medium text-sm`}>{d.label} ({d.pct}%)</span>
              <span className="text-slate-500 text-sm">{d.total?`${pct(d.correct,d.total)}%`:'No data'}</span>
            </div>
            <ProgressBar value={d.total?pct(d.correct,d.total):0} max={100} domain={d.key} className="mb-3"/>
            <div className="text-slate-400 text-xs">{d.correct}/{d.total} questions correct</div>
            {Object.entries(d.subs).length>0&&(
              <div className="mt-3 pt-3 border-t border-slate-200 space-y-1.5">
                {Object.entries(d.subs).sort(([,a],[,b])=>pct(a.correct,a.total)-pct(b.correct,b.total)).map(([sub,s])=>(
                  <div key={sub} className="flex justify-between text-xs">
                    <span className="text-slate-400">{sub}</span>
                    <span className={pct(s.correct,s.total)>=70?'text-emerald-600':pct(s.correct,s.total)>=50?'text-amber-600':'text-red-400'}>
                      {pct(s.correct,s.total)}%
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Flashcard mastery */}
      <div className="bg-white border border-slate-200 rounded-lg p-4">
        <div className="text-slate-600 text-sm font-medium mb-3">Flashcard Mastery</div>
        <div className="flex gap-6 mb-3">
          <div><div className="text-emerald-600 text-xl font-semibold">{flashStats.know}</div><div className="text-slate-400 text-xs">Know it</div></div>
          <div><div className="text-amber-600 text-xl font-semibold">{flashStats.sorta}</div><div className="text-slate-400 text-xs">Sorta</div></div>
          <div><div className="text-red-400 text-xl font-semibold">{flashStats.nope}</div><div className="text-slate-400 text-xs">Nope</div></div>
          <div><div className="text-slate-500 text-xl font-semibold">{flashStats.total-flashStats.know-flashStats.sorta-flashStats.nope}</div><div className="text-slate-400 text-xs">Unseen</div></div>
        </div>
        <ProgressBar value={flashStats.know} max={flashStats.total} domain="secure" className="mb-1"/>
        <div className="text-slate-400 text-xs">{pct(flashStats.know,flashStats.total)}% mastered</div>
      </div>

      {/* Exam history */}
      <div className="bg-white border border-slate-200 rounded-lg p-4">
        <div className="text-slate-600 text-sm font-medium mb-3">Exam History</div>
        {recentExams.length===0?(
          <div className="text-slate-400 text-sm">No exam attempts yet.</div>
        ):(
          <div className="space-y-2">
            {recentExams.map((e,i)=>(
              <div key={i} className="flex items-center justify-between py-2 border-b border-slate-200 last:border-0">
                <div className="text-slate-400 text-xs">{e.date||new Date(e.ts).toLocaleDateString()}</div>

                  <div className={`text-sm font-semibold ${e.score>=72?'text-emerald-600':'text-red-400'}`}>{e.score}%</div>

// ── Notes ─────────────────────────────────────────────────────────────────────
function Notes(){
  const[notes,setNotes]=useStore('notes',{});
  const[domain,setDomain]=useState('secure');
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState('');

  const current=notes[domain]||'';

  const startEdit=()=>{setDraft(current);setEditing(true)};
  const save=()=>{setNotes(n=>({...n,[domain]:draft}));setEditing(false)};
  const discard=()=>{setEditing(false);setDraft(current)};

  return(
    <div className="p-4 md:p-6 max-w-3xl">
      <h1 className="text-slate-800 text-xl font-semibold mb-6">Notes</h1>
      <div className="flex gap-2 mb-5 flex-wrap">
        {Object.entries(DOMAINS).map(([k,d])=>(
          <button key={k} onClick={()=>{setDomain(k);setEditing(false)}}
            className={`text-xs px-3 py-1.5 rounded border transition-colors ${domain===k?`${d.border} ${d.color} ${d.bg}`:'border-slate-200 text-slate-400 hover:border-slate-400'}`}>
            {d.label}
          </button>
        ))}
      </div>

      <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b border-slate-200">
          <div className="flex items-center gap-2">
            <Tag domain={domain}/>
            <span className="text-slate-500 text-sm">Notes</span>
          </div>
          {!editing?(
            <button onClick={startEdit} className="text-xs text-slate-400 hover:text-slate-600 border border-slate-200 px-2 py-1 rounded hover:border-slate-400">Edit</button>
          ):(
            <div className="flex gap-2">
              <button onClick={save} className="text-xs text-emerald-600 border border-emerald-400/40 px-2 py-1 rounded hover:bg-emerald-50">Save</button>
              <button onClick={discard} className="text-xs text-slate-400 border border-slate-200 px-2 py-1 rounded hover:border-slate-400">Discard</button>
            </div>
          )}
        </div>
        {editing?(
          <textarea value={draft} onChange={e=>setDraft(e.target.value)}
            className="w-full bg-transparent text-slate-600 text-sm p-4 min-h-64 resize-none border-none"
            placeholder={`Notes for ${DOMAINS[domain].label} Architecture...\n\nUse plain text or markdown-style formatting.\n- Bullet points work\n** Bold text **\n\nExam tips, gotchas, service comparisons...`}/>
        ):(
          <div className="p-4 min-h-64">
            {current?(
              <pre className="text-slate-600 text-sm whitespace-pre-wrap font-mono leading-relaxed">{current}</pre>
            ):(
              <div className="text-slate-500 text-sm">No notes yet for {DOMAINS[domain].label}. Click Edit to start.</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function Leaderboard({quizHistory,examHistory,streak}){
  const milestones=[
    {label:'First Quiz',done:quizHistory.length>=1,icon:'◉'},
    {label:'10 Questions',done:quizHistory.length>=10,icon:'◉'},
    {label:'50 Questions',done:quizHistory.length>=50,icon:'◉'},
    {label:'100 Questions',done:quizHistory.length>=100,icon:'◉'},
    {label:'First Exam',done:examHistory.length>=1,icon:'◎'},
    {label:'First PASS',done:examHistory.some(e=>e.score>=72),icon:'◎'},
    {label:'3-Day Streak',done:streak>=3,icon:'◆'},
    {label:'7-Day Streak',done:streak>=7,icon:'◆'},
    {label:'80%+ Exam Score',done:examHistory.some(e=>e.score>=80),icon:'★'},
    {label:'90%+ Exam Score',done:examHistory.some(e=>e.score>=90),icon:'★'},
    {label:'Flashcard Master (20 known)',done:(S.get('flash_conf')||[]).filter(f=>f.conf==='know').length>=20,icon:'⬜'},
  ];

  const examBest=examHistory.length?Math.max(...examHistory.map(e=>e.score)):null;
  const totalCorrect=quizHistory.filter(h=>h.correct).length;
  const accuracy=quizHistory.length?pct(totalCorrect,quizHistory.length):0;

  return(
    <div className="p-4 md:p-6 max-w-2xl space-y-6">
      <h1 className="text-slate-800 text-xl font-semibold">Personal Progress</h1>

      <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
        {[
          {label:'Questions',val:quizHistory.length,color:'text-emerald-600'},
          {label:'Accuracy',val:`${accuracy}%`,color:'text-sky-600'},
          {label:'Best Exam',val:examBest!==null?`${examBest}%`:'—',color:'text-amber-600'},
          {label:'Streak',val:`${streak}d`,color:'text-violet-600'},
        ].map(s=>(
          <div key={s.label} className="bg-white border border-slate-200 rounded-lg p-3 text-center">
            <div className={`${s.color} text-2xl font-semibold`}>{s.val}</div>
            <div className="text-slate-400 text-xs mt-1">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="bg-white border border-slate-200 rounded-lg p-4">
        <div className="text-slate-600 text-sm font-medium mb-4">Milestones</div>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
          {milestones.map((m,i)=>(
            <div key={i} className={`flex items-center gap-2 text-sm py-1.5 border-b border-slate-200/50 last:border-0 ${m.done?'text-slate-700':'text-slate-400'}`}>
              <span className={m.done?'text-emerald-600':'text-slate-500'}>{m.done?'✓':'○'}</span>
              <span>{m.icon}</span>
              {m.label}
            </div>
          ))}
        </div>
      </div>

      {examHistory.length>0&&(
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-slate-600 text-sm font-medium mb-3">Exam Score History</div>
          <div className="flex items-end gap-1 h-20">
            {examHistory.slice(-10).map((e,i)=>(
              <div key={i} className="flex-1 flex flex-col items-center gap-1">
                <div className={`w-full rounded-sm ${e.score>=72?'bg-emerald-500':'bg-red-400'}`} style={{height:`${Math.max(4,e.score*0.7)}%`}}/>
                <div className="text-xs text-slate-400" style={{fontSize:'9px'}}>{e.score}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-between text-xs text-slate-400 mt-1">
            <span>{examHistory.length} attempts</span>
            <span>Pass line: 72%</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,onReset}){
  const[confirm,setConfirm]=useState(false);

  const toggle=(k)=>setSettings(s=>({...s,[k]:!s[k]}));
  const update=(k,v)=>setSettings(s=>({...s,[k]:v}));

  return(
    <div className="p-4 md:p-6 max-w-xl space-y-6">
      <h1 className="text-slate-800 text-xl font-semibold">Settings</h1>

      <div className="bg-white border border-slate-200 rounded-lg divide-y divide-slate-200">
        <div className="px-4 py-3 flex items-center justify-between">
          <div>
            <div className="text-slate-700 text-sm">Exam Target Date</div>
            <div className="text-slate-400 text-xs">When are you sitting SAA-C03?</div>
          </div>
          <input type="date" value={settings.targetDate||''} onChange={e=>update('targetDate',e.target.value)}
            className="bg-slate-100 border border-slate-200 text-slate-600 text-sm px-2 py-1 rounded"/>
        </div>

        {[
          {k:'studyReminders',label:'Study Reminders',sub:'Daily browser notifications'},
          {k:'showExplanations',label:'Show Explanations',sub:'Immediately after answering'},
          {k:'adaptiveQuiz',label:'Adaptive Mode',sub:'Weight weak domains higher'},
        ].map(s=>(
          <div key={s.k} className="px-4 py-3 flex items-center justify-between">
            <div>
              <div className="text-slate-700 text-sm">{s.label}</div>
              <div className="text-slate-400 text-xs">{s.sub}</div>
            </div>
            <button onClick={()=>toggle(s.k)}
              className={`w-10 h-5 rounded-full transition-colors relative ${settings[s.k]?'bg-emerald-500':'bg-slate-200'}`}>
              <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-transform ${settings[s.k]?'translate-x-5':'translate-x-0.5'}`}/>
            </button>
          </div>
        ))}
      </div>

      {settings.targetDate&&(()=>{
        const days=Math.ceil((new Date(settings.targetDate)-new Date())/86400000);
        return days>0?(
          <div className="bg-amber-50 border border-amber-300 rounded-lg px-4 py-3">
            <div className="text-amber-600 text-sm font-medium">{days} days until exam</div>
            <div className="text-amber-600/70 text-xs mt-0.5">Stay consistent. {Math.round(days/7)} weeks remaining.</div>
          </div>
        ):null;
      })()}

      <div className="bg-white border border-red-400/20 rounded-lg p-4">
        <div className="text-red-400 text-sm font-medium mb-1">Danger Zone</div>
        <div className="text-slate-400 text-xs mb-3">This will delete all quiz history, exam attempts, flashcard ratings, and notes.</div>
        {!confirm?(
          <button onClick={()=>setConfirm(true)} className="text-sm border border-red-400/40 text-red-400 px-4 py-2 rounded hover:bg-red-400/10 transition-colors">
            Reset All Progress
          </button>
        ):(
          <div className="flex gap-2">
            <button onClick={()=>{onReset();setConfirm(false)}} className="text-sm bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition-colors">
              Confirm Reset
            </button>
            <button onClick={()=>setConfirm(false)} className="text-sm border border-slate-200 text-slate-500 px-4 py-2 rounded hover:border-slate-400">
              Cancel
            </button>
          </div>
        )}
      </div>

      <div className="text-slate-500 text-xs">
        Data stored in {window.storage?'Claude artifact storage':'localStorage'}. All progress is local to this browser.
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[active,setActive]=useState('dashboard');
  const[quizHistory,setQuizHistory]=useStore('quiz_history',[]);
  const[examHistory,setExamHistory]=useStore('exam_history',[]);
  const[flashConf]=useStore('flash_conf',[]);
  const[settings,setSettings]=useStore('settings',{targetDate:'',studyReminders:false,showExplanations:true,adaptiveQuiz:true});
  const[streak,setStreak]=useStore('streak',0);
  const[lastStudy,setLastStudy]=useStore('last_study','');

  // Streak logic
  useEffect(()=>{
    const td=today();
    if(lastStudy===td)return;
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const ystr=yesterday.toISOString().slice(0,10);
    setStreak(lastStudy===ystr?s=>s+1:1);
    setLastStudy(td);
  },[]);

  const handleReset=()=>{
    ['quiz_history','exam_history','flash_conf','notes','lesson_read'].forEach(k=>{
      window.storage?window.storage.setItem(k,'null'):localStorage.setItem(k,'null');
    });
    setQuizHistory([]);setExamHistory([]);setStreak(0);
  };

  const renderPage=()=>{
    switch(active){
      case'dashboard':return<Dashboard quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf} streak={streak} setActive={setActive} settings={settings}/>;
      case'lesson':return<Lesson/>;
      case'quiz':return<Quiz onAnswer={a=>setQuizHistory(h=>[...h,a])}/>;
      case'flashcards':return<Flashcards/>;
      case'exam':return<PracticeExam onExamComplete={r=>setExamHistory(h=>[...h,r])}/>;
      case'analytics':return<Analytics quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf}/>;
      case'notes':return<Notes/>;
      case'leaderboard':return<Leaderboard quizHistory={quizHistory} examHistory={examHistory} streak={streak}/>;
      case'settings':return<Settings settings={settings} setSettings={setSettings} onReset={handleReset}/>;
      default:return null;
    }
  };

  return(
    <div className="flex min-h-screen bg-white font-mono">
      <Sidebar active={active} setActive={setActive} streak={streak}/>
      <main className="flex-1 overflow-y-auto pb-16 md:pb-0">
        {renderPage()}
      </main>
      <BottomNav active={active} setActive={setActive}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
