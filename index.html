  - Standard RI: up to ~72% off, locked to a specific instance family/size/region/OS/tenancy, CAN be sold on the Reserved Instance Marketplace if no longer needed
  - Convertible RI: up to ~66% off, can be exchanged for a different instance family/OS/tenancy during the term — trades a bit of discount for flexibility, CANNOT be resold
  - Scheduled RI (deprecated/retiring): used to reserve capacity for predictable recurring time windows — Savings Plans + Capacity Reservations now cover this
- Savings Plans (the modern, more flexible commitment model — measured in $/hour spend, not specific instances):
  - Compute Savings Plans: most flexible — applies automatically across EC2 (any family/size/region/OS/tenancy), Fargate, AND Lambda
  - EC2 Instance Savings Plans: locked to a specific instance family within a region, but offers the highest discount of the Savings Plans options
- Spot Instances: bid on spare AWS capacity for up to ~90% off On-Demand — AWS can reclaim with a 2-minute interruption warning; ideal for fault-tolerant, stateless, flexible workloads (batch processing, CI/CD, big data, image rendering, distributed training)
- Dedicated Hosts vs Dedicated Instances: Hosts give you a physical server (useful for license/compliance requirements that need visibility into the underlying hardware and socket/core counts); Instances just guarantee your VMs aren't co-located with other accounts' VMs

**Choosing the right model — the exam's favorite scenario type:**
- Steady-state, predictable, 24/7 production workload → Reserved Instances or Savings Plans
- Short-term, unpredictable, or "testing something new" → On-Demand
- Fault-tolerant, interruptible, flexible timing → Spot
- Need flexibility across instance families/regions over time → Convertible RI or Compute Savings Plans
- Licensing requires dedicated hardware/visibility → Dedicated Hosts

**The five pillars of cost optimization (AWS's official framework):**
1. Right-size resources before making any commitment — use Compute Optimizer / Trusted Advisor recommendations
2. Increase elasticity — turn things off when not in use (dev/test environments on a schedule, Auto Scaling to match demand)
3. Choose the optimal pricing model for each workload's actual usage pattern (mixing On-Demand + Spot + Savings Plans within one fleet is common and tested)
4. Optimize storage — S3 Lifecycle policies (move to IA/Glacier as data ages), Intelligent-Tiering for unpredictable access, delete unattached EBS volumes and old snapshots, choose gp3 over gp2 for better price/performance
5. Measure, monitor, and continuously improve — Cost Explorer for trend analysis, AWS Budgets for proactive alerts, Cost & Usage Reports for the most granular breakdown

**Cost visibility & governance tools:**
- Cost Explorer: visualize and analyze costs/usage over time, forecast future spend, filter by service/tag/account
- AWS Budgets: set custom cost, usage, or RI/Savings Plans coverage thresholds and get alerted before you overspend
- Cost and Usage Report (CUR): the most comprehensive, line-item-level data — exportable to S3 and queryable with Athena
- Cost Allocation Tags: tag resources so costs can be broken down by project/team/environment in Cost Explorer and CUR
- AWS Organizations consolidated billing: combine usage across accounts for volume pricing tiers and a single bill, while still seeing each account's costs separately
- Compute Optimizer: ML-driven rightsizing recommendations for EC2, Auto Scaling groups, EBS, Lambda

**Exam traps:**
- Spot is never the right answer for a workload that "cannot tolerate interruption" — that's an instant disqualifier in scenario questions
- Reserved Instances and Savings Plans are a BILLING discount — they do not reserve actual physical capacity (that's what Capacity Reservations or zonal RIs do)
- Standard RI can be resold; Convertible RI cannot — but Convertible can change attributes mid-term, Standard cannot`},
  {day:6,domain:'secure',title:'VPC Security Architecture',content:`**Defense in depth — layer by layer, outside in:**
1. AWS Shield (Standard is free & automatic for everyone; Advanced is paid, adds 24/7 DDoS Response Team + cost protection) — defends against Layer 3/4 volumetric attacks at the edge
2. AWS WAF — Layer 7 web application firewall; attaches to CloudFront, ALB, API Gateway, or AppSync; rules based on IP sets, SQL injection/XSS pattern matching, rate-based rules, geo-match
3. Network ACLs (NACLs) — stateless, subnet-level firewall; evaluates rules in numeric order (lowest first), supports explicit ALLOW and explicit DENY
4. Security Groups — stateful, instance/ENI-level firewall; ALLOW rules only (no explicit deny — you simply don't add a rule)
5. GuardDuty — continuous ML-based threat detection across VPC Flow Logs, DNS logs, and CloudTrail events; flags things like cryptocurrency mining, command-and-control traffic, and compromised credentials

**Stateful vs stateless — the #1 tested distinction:**
- Security Groups are STATEFUL: if you allow inbound traffic, the response is automatically allowed back out (and vice versa) — you only need to write the rule once
- NACLs are STATELESS: you must explicitly allow BOTH the inbound request AND the outbound response (e.g., allow inbound 443 from 0.0.0.0/0 AND allow outbound on the ephemeral port range 1024-65535)

**VPC Flow Logs:**
- Capture metadata about IP traffic going to/from network interfaces — NOT packet contents/payloads (for that you'd need Traffic Mirroring)
- Each record shows: source/destination IP and port, protocol, packet/byte counts, action taken (ACCEPT or REJECT), and the time window
- Can be created at the VPC, Subnet, or individual ENI level
- Destinations: Amazon S3 (for long-term storage/analysis with Athena) or CloudWatch Logs (for real-time monitoring/alarming)
- Common use: troubleshooting why traffic is being blocked, or feeding security tooling/SIEMs

**Private connectivity options — when to use which:**
- VPC Peering: direct 1:1 private connection between two VPCs; NON-transitive (if A peers with B, and B peers with C, A cannot reach C through B) — gets complex to manage at scale (mesh of N×(N-1)/2 connections)
- Transit Gateway: a regional hub-and-spoke router; fully transitive, supports thousands of VPC/VPN/Direct Connect attachments, can peer across regions — the answer whenever a question describes "many VPCs need to talk to each other and to on-prem"
- AWS PrivateLink (via Interface VPC Endpoints): exposes a service privately to consumer VPCs without peering, internet gateways, NAT, or route tables — traffic never traverses the public internet; ideal for SaaS/multi-tenant service exposure
- VPC Endpoints come in two flavors: Gateway endpoints (S3 and DynamoDB only — added to route tables, free) and Interface endpoints (powered by PrivateLink, an ENI with a private IP, supports most other services, small hourly + data charge)

**Hybrid connectivity for security architectures:**
- Site-to-Site VPN: IPSec tunnel over the public internet, quick to set up, variable latency
- Direct Connect: dedicated private physical network connection to AWS — consistent low latency, higher cost, longer lead time to provision; often paired with a VPN as a backup path
- Client VPN: OpenVPN-based, lets individual users/devices connect securely into a VPC

**Exam traps:**
- "Stateful" = Security Group (remembers connections, return traffic auto-allowed); "Stateless" = NACL (must allow both directions explicitly)
- NACL rules are evaluated in order by rule number — the first matching rule wins, so an explicit DENY with a low number can override a higher-numbered ALLOW
- Security Groups can reference other security groups as the source/destination — useful for tiered architectures (e.g., "allow traffic from the web-tier SG only")
- VPC Peering does not support transitive routing — Transit Gateway is the answer when the scenario involves 3+ VPCs needing full mesh connectivity`},
  {day:7,domain:'resilient',title:'Database Resilience Patterns',content:`**RDS Multi-AZ vs Read Replicas — the distinction the exam tests relentlessly:**
- Multi-AZ: SYNCHRONOUS replication to a standby in a different AZ, purely for HIGH AVAILABILITY/disaster recovery — the standby is NOT readable, you can't query it, and you don't choose when failover happens (AWS does it automatically, ~1-2 minutes, triggered by AZ outage, instance failure, or manual reboot-with-failover)
- Read Replicas: ASYNCHRONOUS replication, purely for PERFORMANCE/read scaling — the replica IS readable (offload reporting/analytics queries from the primary), can be created in the same region, a different region, or even from a Multi-AZ source; promotion to a standalone instance is a MANUAL action you trigger
- You can combine both: a Multi-AZ primary with cross-region read replicas for both HA and global read performance
- RDS Backups: automated backups give Point-In-Time Recovery (restore to any second within a 1-35 day retention window, stored in S3, deleted when you delete the instance); manual snapshots persist indefinitely until you delete them, even after the source instance is gone

**Aurora — why it's usually the "best" answer on RDBMS questions:**
- Storage layer is decoupled from compute: data is automatically replicated 6 ways across 3 Availability Zones, and the storage volume self-heals (auto-repairs corrupted blocks) and grows in 10GB increments up to 128TB
- Performance: roughly 5× the throughput of standard MySQL and 3× that of standard PostgreSQL on comparable hardware
- Up to 15 Aurora Replicas sharing the SAME underlying storage volume as the primary — replication lag is typically under 10ms (vs. potentially seconds for standard RDS read replicas), and any replica can be promoted to writer with no data loss
- Aurora Global Database: one primary region for writes plus up to 5 secondary (read-only) regions, with typical cross-region replication lag under 1 second — secondary regions can be promoted for disaster recovery with RTO in just over a minute
- Aurora Backtrack: "rewind" the database to an earlier point in time IN PLACE, without provisioning a new instance or restoring from a snapshot — much faster than a traditional point-in-time restore
- Aurora Serverless: auto-scales compute capacity up/down (and to zero) based on load — good for unpredictable/intermittent workloads
- Cloning: create a new Aurora cluster from an existing one almost instantly using copy-on-write — useful for spinning up test/dev copies of production without doubling storage cost

**DynamoDB resilience features:**
- Global Tables: fully managed multi-region, multi-active replication — any region can read AND write, with "last writer wins" conflict resolution; gives you both low-latency global access and regional disaster resilience
- Point-In-Time Recovery (PITR): continuous backups allowing restore to any second in the preceding 35 days, with no performance impact on the table
- On-Demand capacity mode: pay-per-request, scales instantly, best for unpredictable/spiky traffic with no capacity planning
- Provisioned capacity mode (with optional Auto Scaling): you set Read/Write Capacity Units, cheaper at steady, predictable volumes — pairs with Application Auto Scaling to adjust within bounds
- DAX (DynamoDB Accelerator): in-memory cache sitting in front of DynamoDB, reduces read latency from milliseconds to microseconds — different from Global Tables (DAX is a cache, not a replication mechanism)

**General resilience patterns for databases:**
- Always separate "how do I survive a failure" (Multi-AZ, Global Tables, Aurora replicas across AZs) from "how do I scale reads / reduce load" (read replicas, DAX, ElastiCache)
- Backups (automated/PITR/manual snapshots) protect against logical failures (bad deploys, accidental deletes, corruption); Multi-AZ/replication protects against infrastructure failures (AZ/instance outages) — a complete design needs BOTH

**Exam traps:**
- A Multi-AZ standby cannot be used to offload read traffic — that requires a read replica, a completely separate feature
- "We need to reduce read load on our primary database" → read replica or DAX/ElastiCache, never Multi-AZ
- "We need automatic failover with zero data loss during an AZ outage" → Multi-AZ (RDS) or Aurora's inherent multi-AZ storage — not read replicas (async = possible data loss)`},
  {day:8,domain:'performing',title:'Compute Performance Optimization',content:`**EC2 instance family naming & purpose — decode the letters:**
- C — Compute optimized: high CPU-to-memory ratio; HPC, batch processing, gaming servers, scientific modeling, ML/DL inference, ad-serving
- R / X — Memory optimized: high memory-to-CPU ratio; in-memory databases (Redis, SAP HANA), real-time big data analytics, large caches
- I / D / H — Storage optimized: high, fast, local instance storage; NoSQL databases (Cassandra, MongoDB), data warehousing, distributed file systems
- P / G / Trn / Inf — Accelerated computing: GPUs or custom AI chips; ML model training (P/Trn), graphics/video workloads (G), ML inference (Inf)
- M / T — General purpose: balanced compute/memory/network; T-series are "burstable" (accumulate CPU credits during idle periods, spend them during spikes — watch for "credit exhaustion" scenario questions); M-series are steady balanced workhorses
- The number after the letter = generation (higher = newer/better); a trailing "n" often denotes enhanced networking, "d" denotes local NVMe storage, "g"/"gn" denotes Graviton (ARM)

**Graviton (AWS's custom ARM-based processors):**
- Claims up to ~40% better price-performance over comparable x86 instances for many workloads
- Requires your application/runtime to support ARM architecture (most modern managed runtimes — Java, Python, Node, Go — support it; some legacy/native binaries may not without recompilation)
- The exam likes Graviton as the answer to "how do we reduce compute costs without sacrificing performance"

**Networking performance features:**
- Enhanced Networking (via ENA — Elastic Network Adapter): provides higher bandwidth (up to 100 Gbps on the largest instances), higher packet-per-second performance, and lower inter-instance latency using SR-IOV
- Elastic Fabric Adapter (EFA): a network device for HPC and tightly-coupled workloads (MPI — Message Passing Interface); bypasses the OS networking stack (OS-bypass) for ultra-low and consistent inter-node latency — think large-scale ML training clusters and CFD simulations
- Placement Groups — three strategies, pick based on the goal:
  - Cluster: pack instances close together in a single AZ → lowest network latency / highest throughput (HPC, tightly-coupled apps) — but a single hardware failure can take out the whole group
  - Spread: spread instances across distinct underlying hardware (max 7 per AZ) → minimizes the chance that correlated hardware failure affects multiple instances (small numbers of critical individual instances)
  - Partition: divide instances into logical partitions on separate hardware racks, each partition has its own network/power → large distributed systems that handle their own replication (HDFS, Cassandra, Kafka)

**Storage performance — choosing the right option:**
- EBS volume types: gp3/gp2 (general purpose SSD — baseline + burst IOPS), io1/io2 (provisioned IOPS SSD — consistent high performance for I/O-intensive databases), io2 Block Express (highest performance tier, up to 256,000 IOPS and 4,000 MB/s throughput per volume), st1 (throughput-optimized HDD — big sequential workloads like big data/log processing), sc1 (cold HDD — infrequently accessed data, cheapest)
- gp3 lets you provision IOPS and throughput INDEPENDENTLY of volume size (a big improvement over gp2, where more performance meant buying more capacity)
- Instance Store: physically attached NVMe storage — the highest possible IOPS/throughput because there's no network hop, but it is EPHEMERAL (all data is lost when the instance is stopped or terminated, though a simple reboot is fine) — only use for temporary/cache/replicated data
- EBS volumes persist independently of the instance lifecycle and can be detached/reattached/snapshotted

**Other performance levers:**
- AMI choice: pre-baked, optimized images reduce instance launch/boot time
- Hibernation: preserves in-memory (RAM) state to disk so an instance resumes instantly instead of cold-booting
- Burstable (T-series) credits: monitor CPU credit balance — sustained high CPU can exhaust credits and throttle performance; "Unlimited" mode allows sustained bursting at an extra cost

**Exam traps:**
- "We need the absolute lowest network latency between nodes for an HPC cluster" → Cluster Placement Group + EFA, not just "a bigger instance type"
- Instance store performance is excellent but the data is gone on stop/terminate — never the right answer for anything requiring durability
- io2 Block Express is the answer whenever a question demands the highest possible sustained IOPS for a mission-critical database`},
  {day:9,domain:'resilient',title:'VPC Networking Deep Dive',content:`**VPC building blocks:**
- CIDR block sizing: from /16 (65,536 addresses, the largest VPC) down to /28 (16 addresses, the smallest subnet) — AWS reserves exactly 5 IP addresses in every subnet (network address, VPC router, DNS server, reserved for future use, and the broadcast address — even though VPCs don't support broadcast)
- A VPC can span multiple Availability Zones, but each SUBNET lives in exactly one AZ — this is why "deploy across multiple AZs" always means "create subnets in multiple AZs"
- Route Tables: control where subnet traffic goes; each subnet is associated with exactly one route table (the "main" route table by default, or a custom one)
- Internet Gateway (IGW): horizontally scaled, redundant VPC component that allows communication between your VPC and the internet; a subnet is "public" specifically because its route table sends 0.0.0.0/0 traffic to an IGW (plus the instance has a public/Elastic IP)
- NAT Gateway: AWS-managed, highly available WITHIN a single AZ (you should deploy one per AZ for resilience), requires an Elastic IP, allows outbound-only IPv4 internet access for instances in private subnets — instances on the internet can't initiate connections back in
- NAT Instance (legacy/self-managed alternative): an EC2 instance configured to perform NAT — you manage scaling/patching/HA yourself; almost always the "wrong"/legacy answer vs. NAT Gateway on the exam now
- Egress-Only Internet Gateway: the IPv6 equivalent of a NAT Gateway (stateful, outbound-only)

**Security layers — full stack, outside to inside:**
1. Security Groups: stateful, operate at the instance/ENI level, support ALLOW rules only (default = deny all inbound, allow all outbound) — return traffic is automatically permitted
2. Network ACLs (NACLs): stateless, operate at the SUBNET level, support both ALLOW and explicit DENY rules, evaluated in order by rule number (lowest first, first match wins) — you must explicitly permit both directions of traffic
3. VPC Flow Logs: capture IP traffic METADATA (source/dest IP & port, protocol, bytes, ACCEPT/REJECT) — NOT packet payloads — at the VPC, subnet, or ENI level; deliverable to S3 or CloudWatch Logs for analysis/troubleshooting/compliance

**Connectivity options — matching the scenario to the tool:**
- VPC Peering: a direct, private 1:1 connection between exactly two VPCs (same or different accounts/regions); explicitly NON-TRANSITIVE — peering A↔B and B↔C does NOT let A reach C
- Transit Gateway: a regional, fully transitive routing hub supporting thousands of attachments — VPCs, VPN connections, and Direct Connect gateways can all attach and route through it; can be peered across regions for global architectures
- AWS PrivateLink / Interface VPC Endpoints: privately expose a service to consumer VPCs over ENIs with private IPs — no peering, IGW, NAT, or public IPs required; the standard way to safely expose SaaS or shared internal services
- Gateway VPC Endpoints: free, route-table-based private access — but ONLY for S3 and DynamoDB
- Site-to-Site VPN: quick-to-establish IPSec tunnel over the public internet between your VPC and on-premises network; variable latency since it traverses the internet
- Direct Connect: a dedicated private physical network link between your data center and AWS — consistent low latency and higher bandwidth, but slower to provision (weeks) and costs more; commonly paired with VPN as a failover path
- Client VPN: OpenVPN-based managed service letting individual remote users/devices securely connect into your VPC

**Exam trap (the single most repeated VPC concept on the exam):**
Security Groups are STATEFUL — return traffic for an allowed request is automatically allowed, you write one rule. NACLs are STATELESS — you must write separate ALLOW rules for inbound AND outbound traffic for the connection to work both ways (commonly: allow inbound 443 from the internet, AND allow outbound on ephemeral ports 1024-65535 back to the internet).`},
  {day:10,domain:'performing',title:'Container Services Overview',content:`**ECS (Elastic Container Service) — AWS's native orchestrator:**
- Proprietary to AWS — simpler learning curve, deep native integration with ALB/NLB, CloudWatch, IAM (via Task Roles), Secrets Manager, and Service Discovery
- Task Definition: a JSON blueprint describing one or more containers — images, CPU/memory allocations, port mappings, environment variables, IAM task role, logging configuration, volumes
- Task: a running instance of a task definition (like an instantiated container group)
- Service: keeps a specified number of tasks running, replaces unhealthy ones, integrates with a load balancer, and manages rolling deployments
- Cluster: a logical grouping of tasks/services and the infrastructure they run on
- Launch types: EC2 (you provision/manage/patch the underlying EC2 instances that host containers — more control, can be cheaper at scale) vs. Fargate (serverless — AWS manages the infrastructure entirely, you just specify resource needs)
- Task Role vs Task Execution Role: Task Role grants the application inside the container permissions to call AWS APIs; Task Execution Role grants ECS itself permission to pull images and write logs on the task's behalf — a frequently confused exam pairing

**EKS (Elastic Kubernetes Service):**
- A fully managed Kubernetes control plane — use it when your org already standardizes on Kubernetes or needs to be cloud-portable
- Works with standard Kubernetes tooling: kubectl, Helm charts, existing K8s manifests/operators port over with minimal change
- Node options: Managed Node Groups (AWS automates provisioning and lifecycle of worker EC2 nodes), Self-Managed Nodes (you control everything about the worker nodes), or Fargate profiles (run pods with no nodes to manage at all)
- EKS Anywhere / EKS Distro: run the same Kubernetes distribution on-premises or at the edge for hybrid consistency

**Choosing ECS vs EKS — the exam's framing:**
- "Team is new to containers / wants AWS-native simplicity / no Kubernetes expertise needed" → ECS
- "Team already runs Kubernetes / needs portability across clouds / wants the K8s ecosystem" → EKS

**Fargate — serverless compute for containers:**
- Works as a launch type for both ECS and EKS — removes the need to provision, patch, or scale EC2 instances
- Billing is per-vCPU and per-GB-memory consumed, billed by the second (with a minimum charge), so you pay only for what your tasks/pods actually use
- Each task/pod runs in its own dedicated kernel runtime environment — strong workload isolation, no "noisy neighbor" problem from sharing a host kernel
- For persistent or shared storage with Fargate (which has no attachable EBS), mount Amazon EFS — the standard pattern for stateful Fargate workloads

**ECR (Elastic Container Registry):**
- A fully managed Docker/OCI container image registry, tightly integrated with ECS, EKS, and Lambda (container image support)
- Images are stored on Amazon S3 under the hood (inheriting S3's eleven-9s durability)
- Supports image scanning (basic and enhanced, the latter via Inspector) for vulnerabilities, lifecycle policies to expire old images, and cross-region/cross-account replication
- Private repositories use IAM-based access control; public repositories are available via the ECR Public Gallery

**Exam traps:**
- "We don't want to manage servers at all for our containers" → Fargate (works with either ECS or EKS — the question is testing whether you pick the launch type, not the orchestrator)
- A Task Execution Role lets ECS pull your image and ship logs; a Task Role lets your APPLICATION call AWS services (e.g., read from S3) — mixing these up is a classic wrong-answer trap
- Fargate tasks cannot use instance store or attach EBS volumes directly — EFS is the durable shared-storage answer`},
  {day:11,domain:'resilient',title:'Database Services Decision Tree',content:`**The exam's core question: "what kind of data, what kind of access pattern?" Walk the tree:**

**1. Structured / relational / needs SQL joins & ACID transactions → RDS or Aurora:**
- RDS supports MySQL, PostgreSQL, MariaDB, Oracle, and SQL Server (lift-and-shift from on-prem RDBMS, license-aware workloads)
- Aurora (MySQL- or PostgreSQL-compatible) is AWS's preferred answer when performance and availability matter: ~5× the throughput of standard MySQL, ~3× standard PostgreSQL, auto-scaling storage in 10GB increments up to 128TB, 6-way replication across 3 AZs
- Use RDS/Aurora when: data is structured with relationships, you need complex queries/joins, transactions must be ACID-compliant, or you're migrating an existing SQL-based application

**2. Key-value / document, need single-digit-millisecond latency at any scale → DynamoDB:**
- Fully managed, serverless NoSQL — no servers to provision or patch
- Access patterns: lookups by primary key (partition key, optionally + sort key); supports secondary indexes for additional query patterns
- Global Tables for active-active multi-region; DAX for microsecond read caching; Streams for change-data-capture triggering Lambda
- The default "best" answer whenever a question describes a high-scale, low-latency, serverless application data store

**3. MongoDB-compatible document workloads → DocumentDB:**
- Designed as a drop-in-ish replacement for self-managed MongoDB; stores flexible JSON-like documents
- Use when migrating an existing MongoDB application and you want to keep using MongoDB drivers/tools/queries

**4. Highly connected data / relationships ARE the data → Neptune:**
- Purpose-built graph database; query with Gremlin (property graph) or SPARQL (RDF graph)
- Classic use cases: social networks (who-knows-whom), recommendation engines, fraud detection networks, knowledge graphs

**5. Caching / sub-millisecond in-memory access → ElastiCache:**
- Redis: rich data structures, persistence (snapshots/AOF), pub/sub messaging, replication, Multi-AZ with automatic failover, transactions — pick this when you need more than a simple cache
- Memcached: simpler, multi-threaded, no persistence, no replication — pick this for a pure, simple, horizontally scalable cache layer
- Common pattern: cache-aside in front of RDS/DynamoDB to reduce read load and latency

**6. Cassandra-compatible wide-column workloads → Keyspaces (for Apache Cassandra):**
- Serverless, fully managed, compatible with Cassandra Query Language (CQL) and existing Cassandra drivers/tools
- Virtually unlimited storage per table; pick this when migrating an existing Cassandra workload without rearchitecting

**7. Petabyte-scale analytics / data warehousing → Redshift:**
- Columnar storage + Massively Parallel Processing (MPP) optimized for complex aggregate queries across huge datasets
- Redshift Spectrum: query data directly in S3 without loading it into the warehouse first — bridges your data lake and warehouse
- Connects to standard BI tools (QuickSight, Tableau) via JDBC/ODBC

**8. Ad-hoc SQL queries directly on data already sitting in S3 → Athena:**
- Serverless, pay-per-query ($5 per TB scanned) — no infrastructure, no ETL required to get started
- Converting source data to a columnar format like Parquet can cut the amount scanned (and therefore cost) by ~10×

**Migration tooling:**
- AWS DMS (Database Migration Service): replicates a live database to AWS with minimal downtime, supports continuous replication via Change Data Capture (CDC) for ongoing sync
- AWS SCT (Schema Conversion Tool): converts schemas/code when source and target engines differ (heterogeneous migrations, e.g., Oracle → Aurora PostgreSQL) — DMS handles the data, SCT handles the schema/code

**Exam traps:**
- "We need complex joins across normalized tables" → relational (RDS/Aurora), never DynamoDB
- "We need to scale to millions of reads/writes per second with predictable single-digit-ms latency" → DynamoDB, not RDS (RDS does not scale horizontally for writes the way DynamoDB does)
- DMS moves the DATA; SCT converts the SCHEMA/code — a heterogeneous migration (different engines) typically needs both`},
  {day:12,domain:'secure',title:'Security Services Overview',content:`**Identity & access management:**
- IAM: the foundation — users, groups, roles, policies; enforce least privilege and MFA everywhere
- Cognito: authentication/authorization for YOUR APPLICATIONS (not for AWS console/CLI access) — User Pools handle sign-up/sign-in/user directories (issue JWT tokens), Identity Pools exchange those (or social/SAML) identities for temporary AWS credentials so the app can call AWS services directly
- Directory Service: managed Microsoft Active Directory in AWS — for enterprises that need native AD compatibility, trust relationships with on-prem AD, or AD-dependent applications
- IAM Identity Center: centralized workforce SSO across AWS accounts and SaaS applications (the modern successor to AWS SSO)
- RAM (Resource Access Manager): securely share AWS resources you own (subnets, Transit Gateways, License Manager configurations, Aurora clusters, etc.) with other accounts or within your Organization — avoids duplicating resources

**Threat detection & continuous monitoring:**
- GuardDuty: intelligent, ML/threat-intel-driven detection that continuously analyzes VPC Flow Logs, DNS query logs, and CloudTrail management/S3 data events to surface things like compromised instances, reconnaissance activity, and unusual API behavior — turn it on with one click, no agents to install
- Inspector: automated, continuous vulnerability scanning for EC2 instances, container images in ECR, and Lambda functions — finds software vulnerabilities (CVEs) and unintended network exposure, and assigns risk scores
- Macie: ML-powered service that discovers, classifies, and protects sensitive data in S3 (PII, credentials, financial data) — answers "do we have data we shouldn't, and where is it?"
- Security Hub: the aggregation/dashboard layer — collects and correlates findings from GuardDuty, Inspector, Macie, Config, and partner tools into one place, and runs automated checks against compliance standards (CIS AWS Foundations, PCI DSS, AWS Foundational Security Best Practices)
- Mental model for the pipeline: GuardDuty/Inspector/Macie DETECT → Security Hub AGGREGATES & scores compliance → EventBridge/Lambda/Step Functions AUTOMATE the response

**Encryption, certificates & secrets:**
- KMS (Key Management Service): centrally create, manage, and control cryptographic keys; supports envelope encryption (a data key encrypts your data, and KMS's master key encrypts the data key); every key usage is logged to CloudTrail for auditing; integrates natively with most AWS storage/database services for encryption-at-rest
- ACM (Certificate Manager): provision, manage, and deploy free public SSL/TLS certificates for use with ALB, CloudFront, and API Gateway — handles renewal automatically (note: ACM certificates cannot be exported/used directly on EC2 instances)
- Secrets Manager: securely stores and automatically ROTATES credentials (database passwords, API keys, OAuth tokens) on a schedule using Lambda — the key differentiator vs. Systems Manager Parameter Store, which stores config/secrets but does NOT natively rotate them (though it's cheaper and integrates well for general configuration)

**Network-layer protection:**
- WAF (Web Application Firewall): Layer 7 protection — define rules to block common exploits (SQL injection, XSS via OWASP managed rule groups), rate-based rules (block IPs making too many requests), geographic restrictions; attaches to CloudFront, ALB, API Gateway, AppSync
- Shield Standard: automatic, free, protects every AWS customer against the most common Layer 3/4 (network/transport) DDoS attacks
- Shield Advanced: paid (~$3,000/month per organization), adds enhanced detection for larger/more sophisticated attacks, 24/7 access to the DDoS Response Team (DRT), and cost protection (credits for scaling charges incurred during an attack)

**Exam traps:**
- Cognito User Pools = authentication (who are you?); Cognito Identity Pools = authorization to AWS resources (what temporary AWS permissions do you get?) — these are frequently tested as a pair
- Macie finds SENSITIVE DATA; GuardDuty finds THREATS/malicious activity; Inspector finds VULNERABILITIES in your resources — three different questions, three different services
- Secrets Manager rotates secrets automatically; Parameter Store is cheaper but does not rotate on its own — "we need automatic credential rotation" always points to Secrets Manager`},
  {day:13,domain:'performing',title:'Serverless Architecture Patterns',content:`**Core serverless building blocks:**
- Lambda: run code without provisioning servers; max execution time 15 minutes, up to 10GB memory (CPU scales with memory), default concurrency limit of 1,000 concurrent executions per region (soft limit, can be raised); billed per millisecond of execution + memory allocated
- API Gateway: fully managed API front door — REST APIs (full feature set: request/response transformation, usage plans), HTTP APIs (newer, cheaper, lower latency, fewer features), and WebSocket APIs (persistent bidirectional connections, e.g., chat apps); built-in throttling, caching, and multiple auth mechanisms (IAM, Cognito, Lambda authorizers)
- DynamoDB: the default serverless database pairing — on-demand mode for unpredictable load, provisioned (+ auto scaling) for steady predictable load
- SQS / SNS: SQS = pull-based queue that decouples producers from consumers and smooths spiky load (Standard = at-least-once/best-effort ordering, FIFO = exactly-once/strict ordering with lower throughput); SNS = pub/sub push-based fan-out to many subscribers (SQS queues, Lambda, HTTP endpoints, email/SMS) simultaneously
- EventBridge: a serverless event bus that routes events between AWS services, SaaS apps, and your own applications based on rules — the modern backbone for event-driven architectures, supports schema discovery and replaying events
- Step Functions: visually orchestrate multi-step workflows as state machines — built-in error handling, retries with backoff, parallel branches, and human-approval wait states; the answer whenever a question describes "coordinate multiple Lambda functions/services in a specific sequence with error handling"

**Lambda best practices the exam expects you to recognize:**
- Keep functions small, focused, and stateless — one function, one job
- Externalize configuration via environment variables (and secrets via Secrets Manager/Parameter Store) instead of hardcoding
- Use Lambda Layers to share common code/dependencies across multiple functions (combined unzipped deployment package limit ~250MB including layers)
- Provisioned Concurrency: pre-initializes a specified number of execution environments so requests never hit a "cold start" — crucial for latency-sensitive, user-facing functions; (contrast with Reserved Concurrency, which CAPS how many concurrent executions a function can use — a different lever entirely, for protecting downstream resources or guaranteeing capacity)
- Lambda@Edge: deploy functions to CloudFront edge locations to run logic close to users at four possible trigger points (viewer request, origin request, origin response, viewer response)
- Use Dead Letter Queues (DLQs) or Lambda Destinations to capture and handle failed asynchronous invocations

**Common serverless architecture patterns (the exam draws scenarios straight from these):**
- Classic web/mobile backend: API Gateway → Lambda → DynamoDB (+ Cognito for auth)
- Event-driven processing: S3 ObjectCreated event or DynamoDB Streams → triggers Lambda for real-time processing/transformation
- Decoupled fan-out: SNS topic → multiple SQS queues (one per consumer team/service) → each queue's Lambda processes independently — protects each consumer from the others' failures and load spikes
- Orchestrated multi-step workflow: Step Functions state machine coordinates a sequence of Lambda invocations, parallel branches, retries, and waits, finally writing results to RDS/DynamoDB/S3
- Scheduled/batch jobs: EventBridge Scheduler/rules trigger Lambda on a cron-like schedule

**When NOT to use Lambda — the exam tests this boundary constantly:**
- Long-running processes (> 15 minutes): use Fargate or EC2 instead
- Workloads needing a persistent connection to a database with connection pooling at scale: consider RDS Proxy in front of Lambda, or a container-based service
- Workloads requiring specialized hardware (GPUs) or very large memory beyond Lambda's ceiling: use EC2/Fargate

**Exam traps:**
- Lambda's hard ceiling is 15 minutes — any scenario describing hours-long batch processing should point you to Fargate, EC2, or Batch, never Lambda
- SNS fans a message OUT to many subscribers; SQS holds messages for ONE set of consumers to pull — "SNS to multiple SQS queues" is the canonical fan-out pattern combining both
- Reserved Concurrency limits a function's max usage (protective ceiling); Provisioned Concurrency pre-warms environments (performance booster) — these solve opposite-feeling but distinct problems and are commonly swapped as wrong answers`},
  {day:14,domain:'performing',title:'Analytics & Streaming Data',content:`**Batch / on-demand analytics tools:**
- Athena: serverless, interactive SQL queries directly against data sitting in S3 — no infrastructure to manage, no data loading; billed at $5 per TB of data scanned, so converting source data to a columnar format like Parquet/ORC (and partitioning it) can cut costs by roughly 10× by reducing how much is scanned per query
- EMR (Elastic MapReduce): managed clusters running big-data frameworks (Hadoop, Spark, Hive, Presto, HBase) — process petabyte-scale datasets; can decouple compute from storage by reading directly from S3 (EMRFS) instead of HDFS, letting you spin clusters up/down on demand
- Redshift: petabyte-scale data warehouse using columnar storage and Massively Parallel Processing (MPP) for fast complex aggregate queries across huge structured datasets; Redshift Spectrum extends queries directly into S3 data without first loading it — bridging warehouse and data lake
- Glue: serverless ETL (Extract, Transform, Load) — Glue Crawlers scan your data sources and infer schemas into the Glue Data Catalog (a central metadata repository other services like Athena/Redshift Spectrum/EMR can all reference), and Glue Jobs (Spark-based, serverless) transform data between formats/locations

**Streaming / real-time data tools:**
- Kinesis Data Streams: low-latency streaming ingestion for custom real-time processing — data is organized into shards, each shard supports up to 1 MB/sec (or 1,000 records/sec) of write throughput and 2 MB/sec of read throughput; configurable retention from 1 to 365 days; you write your own consumer applications (KCL, Lambda)
- Kinesis Data Firehose: the "easy button" for streaming delivery — fully managed, near-real-time (buffers data for as little as 60 seconds before delivery), automatically loads streaming data into destinations like S3, Redshift, OpenSearch Service, or third-party/HTTP endpoints, can also transform data in-flight via Lambda
- Amazon MSK (Managed Streaming for Apache Kafka): run Apache Kafka without operating the brokers/ZooKeeper yourself — pick this when you have an existing Kafka-based architecture or need Kafka's specific ecosystem/semantics, deployed across multiple AZs for resilience
- Managed Service for Apache Flink (formerly Kinesis Data Analytics): real-time stream processing and analytics with sub-second latency — run SQL or Flink applications directly against streaming data

**Choosing the right streaming tool — the exam's framing:**
- "We need to write custom logic to process records as they arrive in real time, with full control over consumers" → Kinesis Data Streams
- "We just need to reliably get streaming data INTO S3/Redshift/OpenSearch with minimal setup" → Kinesis Data Firehose
- "We already run Kafka and need to lift it into AWS" → MSK
- "We need SQL-based real-time analytics directly on the stream" → Managed Service for Apache Flink

**Visualization:**
- QuickSight: serverless business intelligence (BI) — connects to many AWS data sources (Redshift, Athena, RDS, S3) and SaaS sources, offers ML-powered insights/anomaly detection and natural-language Q&A, with pay-per-session pricing that scales economically to large numbers of viewers

**The classic "data lake" reference architecture (memorize this flow — it appears in many scenario questions):**
1. Ingest raw data → S3 (the data lake itself, cheap and durable)
2. Catalog it → Glue Crawlers populate the Glue Data Catalog with inferred schemas
3. Query it → Athena runs serverless SQL directly against the cataloged S3 data (or Redshift Spectrum for warehouse-integrated queries)
4. Visualize it → QuickSight builds dashboards on top of the query layer
- Streaming variant: Kinesis (ingest in real time) → S3 (land it) → Glue (catalog/transform) → Redshift or Athena (analyze) → QuickSight (visualize)

**Exam traps:**
- Athena needs NO ETL or infrastructure — if a question stresses "serverless," "no infrastructure," and "query data already in S3," Athena beats Redshift/EMR
- Kinesis Data Streams puts the processing burden on YOU (you write consumers); Firehose is "set and forget" delivery — a question emphasizing "fully managed, minimal operational overhead, near-real-time delivery to S3" wants Firehose, not Data Streams`},
  {day:15,domain:'resilient',title:'Resilience & DR Patterns',content:`**RTO and RPO — define these precisely, the exam will quote you numbers and ask which strategy fits:**
- RTO (Recovery Time Objective): the maximum acceptable length of time your system can be DOWN after a disaster before it must be back up — answers "how long can we be offline?"
- RPO (Recovery Point Objective): the maximum acceptable amount of DATA LOSS measured in time — answers "how much data can we afford to lose, going back from the moment of failure?"
- Smaller RTO/RPO = more resilient architecture = higher cost and complexity. The exam gives you numeric targets and expects you to pick the cheapest strategy that still satisfies them

**The four DR strategies — ordered from cheapest/slowest to most expensive/fastest:**
1. Backup & Restore: simplest and cheapest — regularly back up data (e.g., to S3, snapshots) and restore everything from scratch when disaster strikes; RTO and RPO are typically measured in HOURS
2. Pilot Light: a minimal version of the environment is always running in the DR region (e.g., a replicated database kept in sync), while the rest of the stack (app servers, etc.) stays switched off until needed — when disaster strikes, you "turn up the lights" by scaling out the rest; RTO/RPO in tens of minutes
3. Warm Standby: a scaled-down BUT FULLY FUNCTIONAL copy of the production environment runs continuously in the DR region — during a disaster you simply scale it up to full production capacity; reduces RTO to minutes
4. Multi-site Active/Active (Hot Standby): full production-scale deployments running simultaneously in two or more regions, actively serving traffic — near-zero RTO/RPO, but the most expensive and architecturally complex option (requires data synchronization strategies like DynamoDB Global Tables or Aurora Global Database)

**High availability patterns within and across regions:**
- Multi-AZ (within a region): automatic synchronous replication and failover — RDS Multi-AZ, ElastiCache Redis Multi-AZ, ALB spans AZs natively, EFS is inherently multi-AZ
- Multi-region: Route 53 routing policies for global resilience — Failover routing (active-passive, automatic switch on health-check failure), Latency-based routing (send users to the lowest-latency healthy region), Geolocation/Geoproximity routing; combined with Aurora Global Database or DynamoDB Global Tables for the data layer
- ASG + ELB: automatically detects and replaces unhealthy EC2 instances and distributes traffic only to healthy ones — the standard compute-tier resilience pattern
- DynamoDB Global Tables: multi-region, MULTI-ACTIVE (every region can read AND write) replication with "last writer wins" conflict resolution — gives you both low global latency and built-in regional disaster tolerance simultaneously

**Backup tooling — know what each actually covers:**
- AWS Backup: a centralized, policy-based backup service spanning RDS, DynamoDB, EFS, EBS, FSx, EC2, Storage Gateway, and more — define backup plans once and apply them across services/accounts via AWS Organizations
- S3 Cross-Region Replication (CRR): asynchronous, automatic object-level replication of an S3 bucket's contents to a bucket in a different region (Same-Region Replication / SRR also exists for compliance/latency reasons within a region)
- RDS automated backups: enable Point-In-Time Recovery with 1-35 days of retention, stored in S3 — restoring creates a NEW instance (you cannot restore in place)

**Putting it together — how the exam frames a DR scenario:**
"Our RTO is 1 hour and RPO is 5 minutes, and budget is limited" → that combination of fast recovery + tight data-loss tolerance + cost sensitivity typically rules out pure Backup & Restore (too slow) and Multi-site Active/Active (too costly), pointing you toward Warm Standby or a Pilot Light with continuously-replicating data stores

**Exam traps:**
- RTO ≠ RPO — RTO is about DOWNTIME duration, RPO is about DATA LOSS amount; mixing these up flips the correct answer
- "We need near-zero downtime and near-zero data loss, cost is not the primary concern" → Multi-site Active/Active, never Backup & Restore
- Multi-AZ alone does not protect against a regional disaster — only multi-region strategies (Pilot Light, Warm Standby, Active/Active, Global Tables/Aurora Global) do`},
  {day:16,domain:'cost',title:'Cost Optimization & FinOps',content:`**S3 storage classes — full lineup, ordered cheapest-to-retrieve to cheapest-to-store:**
- S3 Standard: frequently accessed data, milliseconds access, highest storage cost
- S3 Intelligent-Tiering: automatically moves objects between access tiers based on changing access patterns — no retrieval fees, small monitoring fee; the answer when access patterns are UNKNOWN or unpredictable
- S3 Standard-IA (Infrequent Access): lower storage cost, retrieval fee applies — for data accessed less often but needed quickly when requested
- S3 One Zone-IA: like Standard-IA but stored in a SINGLE AZ — cheaper, but you lose AZ-level resilience (fine for easily-recreatable data like secondary backup copies/thumbnails)
- S3 Glacier Instant Retrieval: archive storage with millisecond retrieval — for archives accessed roughly once a quarter
- S3 Glacier Flexible Retrieval: minutes-to-hours retrieval, cheaper storage — for archives accessed a couple times a year
- S3 Glacier Deep Archive: cheapest storage of all, 12-hour retrieval — for long-term retention/compliance archives accessed rarely if ever (e.g., 7-10 year regulatory retention)
- S3 Lifecycle Policies: automate the transition between these classes over time (e.g., Standard for 30 days → Standard-IA for 60 days → Glacier Deep Archive after 1 year → expire after 7 years)

**EC2 / compute purchasing optimization (recap & extension):**
- On-Demand for unpredictable/short-term; Reserved Instances and Savings Plans for steady-state predictable workloads (1-3 year commitment, up to ~72% off); Spot for fault-tolerant/flexible workloads (up to ~90% off, 2-minute interruption notice)
- Compute Savings Plans give the most flexibility (auto-applies across EC2, Fargate, Lambda, any family/region); EC2 Instance Savings Plans and Standard RIs give bigger discounts in exchange for being locked to specific configurations
- Graviton (ARM-based) instances: typically up to ~40% better price-performance for compatible workloads — a frequent "lower cost without losing performance" answer
- Auto Scaling: matches capacity to actual demand automatically, eliminating the cost of idle over-provisioned capacity — schedule scale-in during predictable off-peak windows (nights/weekends for dev environments)

**Storage & data-transfer optimization beyond S3:**
- EBS: delete unattached volumes, snapshot and remove old/unused volumes, prefer gp3 over gp2 (better baseline performance per dollar, and IOPS/throughput are billed independently of size)
- Use VPC Endpoints (Gateway endpoints for S3/DynamoDB are free) to avoid NAT Gateway data processing charges for traffic that stays within AWS
- CloudFront in front of S3/origins reduces origin egress costs and improves performance simultaneously

**Visibility & governance tools — know exactly what each shows you:**
- Cost Explorer: visualize historical spend, spot trends, forecast future costs, and drill down by service/account/tag/region — your go-to for "where is the money going and why"
- AWS Budgets: PROACTIVE — define thresholds for cost, usage, or Reserved Instance/Savings Plans utilization/coverage, and get alerted via SNS/email before you exceed them
- Cost and Usage Report (CUR): the single most granular, comprehensive dataset available — exports line-item billing data to S3, queryable with Athena/Redshift/QuickSight for custom analysis
- Compute Optimizer: ML-driven rightsizing recommendations across EC2, Auto Scaling Groups, EBS volumes, and Lambda functions
- Trusted Advisor: automated checks across five categories — cost optimization, performance, security, fault tolerance, and service limits — surfaces idle resources, underutilized instances, and unblocked savings opportunities
- AWS Organizations consolidated billing: combine usage across all member accounts for volume discount tiers while still seeing itemized costs per account

**Exam traps:**
- "Data with completely unpredictable access patterns" → Intelligent-Tiering (don't manually pick a tier and don't write a lifecycle policy you'll have to maintain)
- "Compliance requires we keep data for 7 years and access it maybe once" → Glacier Deep Archive, the cheapest possible storage class
- Cost Explorer answers "what happened and why"; Budgets answers "alert me before it happens again"; CUR answers "give me every line item" — these get swapped as wrong answers constantly`},
  {day:17,domain:'secure',title:'Monitoring, Auditing & Compliance',content:`**CloudWatch — the "what is happening right now / over time" service:**
- Metrics: time-ordered data points for resources — EC2 (CPU, network, disk by default at 5-min granularity, or 1-min with detailed monitoring), RDS, Lambda (invocations, duration, errors, throttles), and your own custom application metrics published via PutMetricData
- Logs: ingest, store, and search log data — organized into Log Groups (e.g., per application/Lambda function) containing Log Streams (e.g., per instance/invocation); CloudWatch Logs Insights lets you run a purpose-built query language across log groups for fast troubleshooting
- Alarms: watch a metric against a threshold over an evaluation period and trigger actions on breach — notify via SNS, trigger Auto Scaling actions, or directly recover/stop/terminate/reboot an EC2 instance
- Dashboards: build customizable visual views of metrics; can span multiple accounts and regions for centralized observability
- Specialized add-ons: Container Insights (ECS/EKS cluster and task/pod-level metrics), Lambda Insights (enhanced function-level performance metrics), Application Insights (automatic problem detection for .NET/SQL Server apps)
- CloudWatch Synthetics: run scripted "canaries" that continuously test your endpoints/APIs from outside, just like a real user would

**CloudTrail — the "who did what, when, and from where" service:**
- Logs essentially every API call made within your account: the identity of the caller, the time, the source IP address, the request parameters, and the response
- Management events (control-plane operations like creating/deleting resources): logged by default, with the most recent 90 days viewable for free in the Event History
- Data events (data-plane operations — e.g., S3 GetObject/PutObject, Lambda Invoke): NOT logged by default because of the volume/cost involved — must be explicitly enabled
- CloudTrail Insights: automatically detects unusual API call volume or error-rate patterns — surfaces things like a sudden burst of resource creation that might indicate a compromised account
- For retention beyond 90 days or organization-wide visibility, configure a trail to deliver logs continuously to an S3 bucket (and optionally CloudWatch Logs); query historical trail data in S3 using Athena

**AWS Config — the "what does my environment look like, and is it compliant" service:**
- Continuously records the configuration state of your AWS resources and how that configuration changes over time — answers "what did this resource look like at 3pm last Tuesday, and what changed?"
- Managed Rules: pre-built compliance checks for common best practices (e.g., "is S3 encryption enabled," "are EBS volumes encrypted") — roughly 150 available per region
- Custom Rules: Lambda-backed checks for organization-specific compliance logic that managed rules don't cover
- Aggregators: roll up configuration and compliance data across multiple accounts and regions into a single view — essential for org-wide governance
- Primary use cases: drift detection (did someone manually change something outside of IaC?), compliance auditing/reporting, and detailed change history for troubleshooting and forensics

**The compliance/security pipeline — how these fit together (a frequent exam scenario shape):**
GuardDuty (threat detection), Inspector (vulnerability scanning), and Macie (sensitive-data discovery) all generate FINDINGS → Security Hub aggregates and correlates those findings plus runs its own compliance standard checks (CIS, PCI DSS) → EventBridge rules can route findings to Lambda/Step Functions/SNS for automated remediation or alerting. AWS Config feeds compliance state into this picture too, and CloudTrail provides the immutable audit trail underpinning all of it.

**Exam traps:**
- CloudWatch tells you about PERFORMANCE/operational health (metrics, logs, alarms); CloudTrail tells you WHO did WHAT (API audit trail); Config tells you HOW THINGS ARE CONFIGURED and whether that's compliant — three different questions that get conflated in distractor answers
- S3/Lambda data events in CloudTrail cost extra and are OFF by default — "we're not seeing object-level S3 access logs in CloudTrail" is solved by enabling data events, not by switching services
- "We need to know if our resources drift from our approved baseline configuration" → AWS Config, not CloudTrail or CloudWatch`},
  {day:18,domain:'resilient',title:'Networking & Content Delivery',content:`**Elastic Load Balancing — three types, pick by OSI layer and need:**
- Application Load Balancer (ALB, Layer 7): understands HTTP/HTTPS/gRPC/WebSocket; supports content-based routing (by path, host header, HTTP header, query string, source IP), integrates with WAF, can perform redirects and fixed responses, and routes to multiple target types (EC2, IP addresses, Lambda functions, containers)
- Network Load Balancer (NLB, Layer 4): handles TCP/UDP/TLS at extremely high throughput with ultra-low latency; supports a static IP per AZ (and Elastic IPs) — the answer whenever a question requires a fixed IP address or needs to handle millions of requests per second
- Gateway Load Balancer (GLB, Layer 3): deploys, scales, and manages third-party virtual security appliances (firewalls, intrusion detection/prevention systems) — transparently inserts inline traffic inspection into the network path using GENEVE protocol on port 6081
- All three support health checks, access logging, and cross-zone load balancing (distributing traffic evenly across targets in ALL enabled AZs rather than just the AZ the request arrived in)
- Sticky sessions (session affinity): ALB and "Classic" LB can bind a user's session to a specific target using cookies — useful for stateful applications that don't share session data externally

**Picking the right load balancer — exam framing:**
- "Route based on URL path or hostname / need WAF integration / HTTP-aware routing" → ALB
- "Need a static IP / extreme performance / raw TCP-UDP-TLS traffic" → NLB
- "Deploying third-party virtual firewall/IDS appliances transparently inline" → GLB

**CloudFront — global content delivery (recap & extension):**
- 450+ edge locations cache content close to users, reducing both latency AND your origin's data-transfer/egress costs
- Works with virtually any origin (S3, ALB, EC2, MediaStore, custom HTTP)
- Layered security: Origin Access Control for S3 origins, WAF for Layer 7 rules, Shield for DDoS, free ACM certificates for HTTPS, signed URLs (single object) / signed cookies (multiple objects) for restricted content, Lambda@Edge / CloudFront Functions to run logic at the edge

**API Gateway — managing API traffic:**
- Throttling: default account/region limits are 10,000 requests per second steady-state with a 5,000 RPS burst — configurable per method/stage via usage plans
- Usage Plans + API Keys: meter and monetize API access — assign different throttle/quota tiers to different API consumers/customers
- Caching: an optional response cache per stage with configurable TTL, reducing calls to your backend and improving latency
- Authorization options: IAM (sigv4-signed requests), Cognito User Pools (JWT-based), or Lambda authorizers (fully custom auth logic, e.g., validating a third-party token)

**Route 53 — DNS and traffic management:**
- Health Checks: actively monitor the health of endpoints (HTTP/HTTPS/TCP), and can be combined — e.g., a "calculated" health check that depends on the status of several child health checks, or alarm-based checks tied to CloudWatch
- Routing policies: Simple (one resource), Weighted (percentage-based traffic split — great for A/B testing or gradual rollouts), Latency-based (route to the region with lowest latency for the user), Failover (active-passive DR), Geolocation (route by user's geographic location, e.g., for content/legal restrictions), Geoproximity (route based on geographic location with the ability to shift traffic via a "bias"), Multi-value answer (return multiple healthy records, basic load balancing with health checks)
- Traffic Flow: a visual editor for building sophisticated combinations of these routing policies
- Private Hosted Zones: resolve custom/internal domain names for resources inside one or more VPCs, without exposing them publicly

**Exam traps:**
- A static IP requirement instantly rules out ALB (it doesn't provide one) and points to NLB
- "We need to inspect/filter traffic with a third-party firewall appliance transparently" → Gateway Load Balancer, a frequently-overlooked correct answer
- CloudFront isn't just about speed — emphasize that it ALSO reduces origin load and egress costs; "our S3 bill/load is too high from direct downloads" is solved by adding CloudFront, not by upgrading S3`},
  {day:19,domain:'performing',title:'Migration & Transfer Services',content:`**The 7 Rs of migration — AWS's official framework for "what should we do with this workload?":**
1. Retire: decommission it entirely — you discover during assessment that nobody uses it
2. Retain: keep it on-premises for now (regulatory requirements, latency-sensitive, not yet ready to move)
3. Rehost ("Lift & Shift"): move the application as-is with minimal changes — fastest path to the cloud, often the first step before later optimization (tools: MGN, VM Import/Export)
4. Relocate: move infrastructure to the cloud without purchasing new hardware or rewriting applications — e.g., moving VMware workloads to VMware Cloud on AWS, or Kubernetes workloads to EKS
5. Repurchase ("Drop and Shop"): move to a different product, typically a SaaS replacement (e.g., switching a CRM to Salesforce, a ticketing system to ServiceNow)
6. Replatform ("Lift, Tinker, and Shift" / "Lift & Optimize"): make a few cloud optimizations without changing core architecture — e.g., moving a self-managed database to RDS, or a web app to Elastic Beanstalk
7. Refactor / Re-architect: redesign the application using cloud-native approaches — usually driven by a strong business need to add features, scale, or performance that's hard to achieve in the existing environment (e.g., rebuilding monoliths as microservices on Lambda/ECS/DynamoDB)

**Application & workload migration tools:**
- AWS Application Migration Service (MGN): the recommended lift-and-shift tool — performs continuous, block-level replication of on-prem (or other-cloud) servers into AWS, allowing fast, minimal-downtime cutover; replaces the older Server Migration Service (SMS)
- AWS DMS (Database Migration Service): migrates databases into AWS with minimal downtime; supports Change Data Capture (CDC) for ongoing/continuous replication so the source stays in sync with the target during a long cutover window
- AWS SCT (Schema Conversion Tool): converts database schema and code when migrating between different database engines (heterogeneous migrations) — pairs with DMS for the data itself

**Data transfer tools — match the tool to the data pattern:**
- AWS DataSync: automates moving large amounts of data between on-premises storage (NFS, SMB) or other clouds and AWS storage services (S3, EFS, FSx); encrypted in transit (TLS), can achieve up to 10 Gbps per task — designed for ONE-TIME migrations or SCHEDULED/recurring transfers, not continuous real-time streaming
- AWS Transfer Family: fully managed support for file transfers directly into and out of S3 or EFS using SFTP, FTPS, and FTP protocols — for organizations with existing file-transfer workflows that need to keep using those protocols
- Storage Gateway: a hybrid storage service connecting on-premises environments to AWS storage for ONGOING use (not a one-time migration) — File Gateway (NFS/SMB access to S3), Volume Gateway (iSCSI block storage backed by EBS snapshots, cached or stored modes), Tape Gateway (virtual tape library backed by S3/Glacier, for replacing physical backup tape infrastructure)
- Snow Family (Snowcone, Snowball Edge, Snowmobile): physical devices for transferring very large amounts of data when network bandwidth is insufficient, too slow, or too costly — Snowcone is small/portable, Snowball Edge adds significant compute for edge processing, Snowmobile is a literal shipping-container-sized data truck for exabyte-scale migrations

**Assessment & tracking tools:**
- AWS Application Discovery Service: inventories on-premises servers/applications and maps their dependencies — the foundational step ("what do we even have, and how is it connected?") before planning any migration wave
- AWS Migration Hub: a central dashboard to track the progress of migrations across multiple AWS and partner tools — gives leadership a single pane of glass over the whole migration program

**Exam traps:**
- DataSync = scheduled/one-time bulk transfer; Storage Gateway = ongoing hybrid-cloud storage access — a question describing "we need continuous, ongoing access from our on-prem app to cloud storage" wants Storage Gateway, while "move our file share data to S3 once (or on a schedule) and we're done" wants DataSync
- "Our network link is too slow/expensive to move 200TB of data" → Snow Family, not DataSync (DataSync assumes you have usable bandwidth)
- Rehost is the fastest way to get to the cloud but rarely the most cost-optimized end state — exam scenarios about "minimizing migration time" want Rehost/MGN; scenarios about "maximizing long-term efficiency" want Replatform or Refactor`},
  {day:20,domain:'resilient',title:'Management & Governance Tools',content:`**Infrastructure as Code (IaC) — defining and deploying environments repeatably:**
- CloudFormation: AWS's native IaC service — write declarative templates in JSON or YAML describing the resources you want, and CloudFormation creates/updates/deletes them as a "stack"; using it costs nothing extra beyond the resources themselves; StackSets let you deploy the same stack consistently across many accounts and regions at once — the standard answer for "deploy this baseline everywhere"
- CDK (Cloud Development Kit): define infrastructure using familiar programming languages (TypeScript, Python, Java, C#) — CDK code compiles down to CloudFormation templates under the hood, giving you the power of loops/conditionals/abstraction/testing while still deploying through CloudFormation's engine
- Systems Manager: a suite of capabilities for operating your fleet — Run Command (execute commands across many instances without SSH), Patch Manager (automate OS/software patching), State Manager (keep instances in a defined configuration state), Session Manager (browser-based shell access without opening SSH ports), Parameter Store (hierarchical config/secret storage), and hybrid activation for managing on-premises servers alongside EC2

**Multi-account governance — building the "landing zone":**
- AWS Organizations: create a hierarchy of accounts (in Organizational Units), get consolidated billing across them (volume discounts apply account-wide), and apply Service Control Policies (SCPs) as top-down permission guardrails that cap what member accounts can do
- AWS Control Tower: builds on Organizations to automatically set up a secure, well-architected multi-account "Landing Zone" — provides Account Factory (self-service account provisioning with guardrails baked in), and both preventive guardrails (implemented as SCPs, stop bad actions before they happen) and detective guardrails (implemented as Config rules, flag non-compliant resources after the fact)
- IAM Identity Center (successor to AWS SSO): provides centralized workforce access management — one place to manage who can access which AWS accounts (with which permission sets) and which connected SaaS/business applications, can federate with external identity providers

**Compliance, auditing & cost-governance tools:**
- AWS Config: continuously records resource configuration and evaluates it against rules — answers "is everything configured the way it should be, and what changed?"
- CloudTrail: immutable log of every API call across your account(s) — the foundational audit trail; export continuously to S3 for retention beyond the default 90-day window, and analyze historical logs with Athena
- Trusted Advisor: automated best-practice checks across five pillars — cost optimization, security, performance, fault tolerance, and service quotas/limits — surfaces concrete, actionable recommendations
- License Manager: centrally track and manage software licenses (especially for Bring-Your-Own-License scenarios with vendors like Oracle, SAP, and Microsoft) to avoid both under- and over-spending on licensing and stay compliant with license terms

**Operational visibility & automation:**
- CloudWatch: the operational nervous system — metrics, logs, alarms, dashboards, and synthetic canaries
- EventBridge: route and react to events across AWS services, SaaS partners, and your own applications — the backbone for building automated operational responses (e.g., "when GuardDuty flags a finding, automatically isolate the instance")
- Systems Manager OpsCenter: a central place to view, investigate, and resolve operational issues, aggregating related alerts/findings/changes into "OpsItems" for faster root-cause analysis
- AWS Health Dashboard: gives you a personalized view of AWS service health and any events/maintenance specifically affecting YOUR account's resources (distinct from the public Service Health Dashboard, which shows general AWS-wide status)

**The complete "enterprise governance" stack — the way the exam frames a capstone scenario:**
Organizations (account structure + consolidated billing) + SCPs (preventive top-down guardrails) + Control Tower (automated landing zone setup) + Config + Aggregators (detective compliance checks across all accounts) + Security Hub (centralized findings & compliance scoring) + IAM Identity Center (centralized human access). Each layer contributes a DIFFERENT kind of control — prevention, detection, automation, identity, or visibility — and exam questions about "enforcing compliance across hundreds of accounts" expect you to recognize which layer solves which specific part of the problem.

**Exam traps:**
- SCPs prevent (stop an action before it happens); Config rules detect (flag it after the fact, for remediation) — Control Tower's "preventive vs detective guardrails" terminology maps directly onto this distinction
- CloudFormation StackSets, not individual stacks, is the answer whenever a scenario says "deploy consistently across many accounts/regions"
- "We need a quick way to assess our overall account health across cost, security, and performance with zero setup" → Trusted Advisor, the built-in automated advisor`},
  {day:21,domain:'performing',title:'Simple Email Service (SES)',content:`**What SES is for:**
- A fully managed, highly scalable email-sending and -receiving platform — used for transactional email (password resets, order confirmations, OTP codes), marketing/bulk email, and automated notifications
- Pay-as-you-go pricing with no minimum commitments — exam framing: "the company needs to send millions of transactional emails cost-effectively" → SES, not running your own mail server (SMTP relay) on EC2

**Three ways to send mail through SES:**
- SES API: call SendEmail or SendRawEmail directly (supports attachments, custom headers, multipart MIME) — preferred for application integration
- SMTP interface: point any SMTP-capable application/library at SES's SMTP endpoint using SMTP credentials (separate from IAM access keys, generated specifically for SES)
- Console: manual one-off sends, mainly for testing and verification

**Identity verification — two types of "identity" you can verify:**
- Email address identity: verify a single from-address by clicking a link sent to that inbox — fine for testing or very small senders
- Domain identity: verify ownership of an entire domain by adding DNS records — lets you send from ANY address @that domain (no@example.com, support@example.com, etc.) without verifying each one individually
- Domain verification is done by adding a TXT record (ownership proof) AND, for full deliverability, configuring DKIM

**DKIM setup — exam-relevant detail:**
- DKIM (DomainKeys Identified Mail) cryptographically signs outgoing messages so receiving mail servers can verify the email genuinely came from your domain and wasn't altered in transit
- Easy DKIM: SES generates a public/private key pair; you add 3 CNAME records to your domain's DNS (Route 53 or elsewhere) pointing to SES-hosted public keys — SES then signs every outgoing message automatically
- BYODKIM (Bring Your Own DKIM): use your own key pair if you have an existing DKIM setup elsewhere
- DKIM works alongside SPF (an authorized-senders DNS record) and DMARC (a policy record telling receivers what to do if SPF/DKIM fail) — together these three are what gets your mail INTO inboxes instead of spam folders. Exam trap: "emails are landing in recipients' spam folders" → check DKIM/SPF/DMARC configuration, not sending rate

**Sandbox mode vs Production access — a classic exam scenario:**
- Every new SES account starts in the SANDBOX: you can only send TO verified email addresses/domains, and sending is capped (e.g., 200 emails/24hr, 1 email/sec) — designed to prevent abuse and let you test safely
- To send to arbitrary, unverified recipients (i.e., real customers), you must request to move OUT of the sandbox into production access via a support case, describing your use case, bounce/complaint handling process, and how you obtain recipient consent
- Sending limits in production scale up over time based on your sending reputation (AWS reviews and raises your daily quota and max send rate automatically as you demonstrate good sending hygiene)
- Exam trap: "the application can email the developer's test inbox but fails to email real customers" → account is still in SES sandbox; the fix is requesting production access, NOT an IAM permission change

**Dedicated IPs and IP pools:**
- By default, SES sends from a shared IP pool — your deliverability reputation is partly influenced by other senders sharing those IPs
- Dedicated IP: an IP address allocated solely to your account — gives you full control over your own sending reputation, recommended for high-volume senders who want reputation isolation; takes time to "warm up" (gradually ramp sending volume so receiving ISPs build trust in the new IP)
- Dedicated IP pools: group dedicated IPs and route different types of mail (e.g., marketing vs transactional) through different pools via configuration sets — so a marketing campaign's reputation issues don't affect critical transactional email deliverability
- Standard vs Managed dedicated IPs: AWS can also auto-manage warm-up and IP assignment for you (Easy Managed Dedicated IPs)

**Configuration sets — the operational control layer:**
- A configuration set is a named set of rules you attach to outgoing emails (via header or API parameter) to control HOW those emails are sent and tracked, without changing application code for every variation
- Event publishing: configuration sets can publish sending events — sends, deliveries, opens, clicks, bounces, complaints, rejects — to CloudWatch (metrics/dashboards), SNS (real-time notifications), Kinesis Data Firehose (stream to S3/analytics), or Pinpoint
- IP pool assignment: a configuration set can route mail through a specific dedicated IP pool
- Reputation tracking: enable reputation metrics per configuration set to monitor bounce/complaint rates for different mail streams independently

**Feedback handling — bounces and complaints:**
- Bounce: the receiving server permanently rejects the email (e.g., mailbox doesn't exist) — "hard bounce"; or temporarily rejects it (mailbox full) — "soft bounce"
- Complaint: the recipient marked the message as spam/junk via their mail client's "report spam" button
- SES forwards bounce and complaint notifications back to you via SNS topics (configured per identity or per configuration set) — your application MUST process these and stop sending to addresses that bounce or complain
- Why this matters: AWS monitors your account's bounce rate and complaint rate — if these exceed thresholds (roughly >5% bounce, >0.1% complaint, as general guidance), SES can pause or suspend your sending privileges entirely
- Best practice architecture: SNS notification → SQS queue or Lambda → update a suppression list / mark the recipient address as invalid in your database so you never email it again. SES also has a built-in account-level Suppression List that automatically stops sending to addresses with recent hard bounces or complaints

**Exam traps:**
- "Emails sent from the application aren't reaching real users, only test addresses work" → SES sandbox restriction, request production access
- "Need to send from any address @company.com without verifying each one" → verify the DOMAIN identity (with DKIM), not individual email addresses
- "Marketing campaign's spam complaints are hurting transactional email deliverability" → separate dedicated IP pools via configuration sets
- "Need real-time visibility into delivery failures to maintain list hygiene" → configuration set event publishing to SNS/CloudWatch + automated suppression handling
- SES is for SENDING/RECEIVING email at scale — it is not a general pub/sub or push-notification service (that's SNS) and not a managed message queue (that's SQS)`},
  {day:22,domain:'performing',title:'Hybrid & Edge Computing',content:`**The core question these services answer:** "Some of our workload can't run in a standard AWS Region — because of latency, data residency, connectivity, or where the hardware needs to physically sit." Each service below solves a DIFFERENT flavor of that problem — the exam tests whether you can match the constraint to the right one.

**AWS Outposts — AWS infrastructure IN your data center:**
- Physical racks of real AWS-designed compute/storage hardware, shipped to and installed in YOUR on-premises data center or co-location facility, but fully managed by AWS (monitoring, patching, updates — same as in-Region hardware)
- Runs a subset of AWS services locally with the SAME APIs, SDKs, and console you already use — EC2, EBS, S3 (on Outposts), ECS/EKS, RDS on Outposts
- Connects back to a "parent" AWS Region for management and any services not available locally
- Use cases: low-latency access to on-prem systems, local data processing for data-residency/regulatory requirements (data must physically stay in-country/in-building), migrating latency-sensitive legacy applications without a full rewrite
- Two form factors: Outposts racks (full 42U racks, large capacity) and Outposts servers (1U/2U single servers, smaller footprint for space-constrained sites like retail stores)
- Exam trap: "must run AWS services but data must never leave our own building" → Outposts (the hardware is physically on-site), NOT Local Zones (which is still AWS-owned infrastructure elsewhere)

**AWS Local Zones — AWS infrastructure NEAR you, but still AWS-owned:**
- An extension of an AWS Region placed in or near a large population/industry center, providing single-digit-millisecond latency to end users in that metro area
- You don't own or host any hardware — Local Zones are AWS data centers, just smaller and geographically closer to specific cities than the parent Region
- Appear as just another Availability Zone you can opt into within your existing VPC — same APIs, same console, you simply choose the Local Zone as the AZ when launching supported resources (commonly EC2, EBS, ALB, ECS/EKS, RDS)
- Use cases: latency-sensitive applications (real-time gaming, live video streaming, AR/VR, media production, real-time ad-serving) for users concentrated in a specific city, where the nearest full Region is too far away
- Exam trap distinguishing the trio: Outposts = hardware physically inside YOUR facility; Local Zones = AWS facility physically close to a metro area, still AWS-owned/operated; Wavelength Zones = AWS infrastructure embedded WITHIN telecom providers' 5G networks, for ultra-low-latency mobile/edge applications

**AWS Wavelength (often paired with Local Zones in exam scenarios):**
- Embeds AWS compute/storage at the edge of 5G telecom networks, so traffic from 5G mobile devices reaches your application without leaving the telco network — eliminates the multiple hops to a Region
- Use cases: connected vehicles, smart factories/IoT, immersive AR/VR experiences requiring near-instant response over mobile networks

**Snow Family — moving DATA (and sometimes compute) to/from AWS physically:**
