        ):(
          <div className="flex gap-2">
            <button onClick={()=>{onReset();setConfirm(false)}} className="text-sm bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition-colors">
              Confirm Reset
            </button>
            <button onClick={()=>setConfirm(false)} className="text-sm border border-slate-200 text-slate-500 px-4 py-2 rounded hover:border-slate-400">
              Cancel
            </button>
          </div>
        )}
      </div>

      <div className="text-slate-500 text-xs">
        Data stored in {window.storage?'Claude artifact storage':'localStorage'}. All progress is local to this browser.
      </div>
    </div>
  );
}

// ── Vocab / Glossary ─────────────────────────────────────────────────────────
const VOCAB_CATS=['All','Compute','Storage','Database','Networking','Security','Monitoring','Messaging','Analytics','Management','Migration'];
const catColor={
  Compute:'#f97316',Storage:'#0ea5e9',Database:'#8b5cf6',Networking:'#06b6d4',
  Security:'#10b981',Monitoring:'#f59e0b',Messaging:'#ec4899',Analytics:'#6366f1',
  Management:'#64748b',Migration:'#84cc16',
};
function Vocab({plainMode,setPlainMode,startVocabQuiz}){
  const[search,setSearch]=useState('');
  const[cat,setCat]=useState('All');
  const[weak,setWeak]=useStore('vocab_weak',{});
  const togglePin=(term)=>{
    setWeak(w=>{
      if(w[term]){const{[term]:_,...rest}=w;return rest;}
      return{...w,[term]:{wrong:0,correctStreak:0,manual:true}};
    });
  };
  const filtered=useMemo(()=>{
    const q=search.toLowerCase().trim();
    return VOCAB.filter(v=>{
      const matchCat=cat==='All'||v.cat===cat;
      const matchQ=!q||v.term.toLowerCase().includes(q)||v.def.toLowerCase().includes(q);
      return matchCat&&matchQ;
    }).sort((a,b)=>a.term.localeCompare(b.term));
  },[search,cat]);
  return(
    <div className="p-4 md:p-8 max-w-4xl mx-auto">
      <div className="mb-6 flex items-start justify-between gap-3 flex-wrap">
        <div>
          <h1 className="text-2xl font-bold text-slate-900 mb-1">AWS Glossary</h1>
          <p className="text-slate-500 text-sm">{VOCAB.length} terms across {VOCAB_CATS.length-1} categories</p>
        </div>
        <div className="flex items-center gap-2">
          <PlainToggle on={plainMode} setOn={setPlainMode}/>
          <button onClick={()=>startVocabQuiz&&startVocabQuiz(cat)}
            className="text-xs font-semibold px-3 py-2 rounded-lg text-white transition-opacity hover:opacity-90"
            style={{background:'#7c3aed'}}>
            Quiz Yourself →
          </button>
        </div>
      </div>
      {/* Search */}
      <div className="relative mb-4">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
        <input
          className="w-full pl-8 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm bg-white focus:border-slate-400 transition-colors"
          placeholder="Search terms or definitions…"
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />
      </div>
      {/* Category filter */}
      <div className="flex gap-2 flex-wrap mb-6">
        {VOCAB_CATS.map(c=>(
          <button
            key={c}
            onClick={()=>setCat(c)}
            style={cat===c&&c!=='All'?{background:catColor[c],borderColor:catColor[c],color:'#fff'}:{}}
            className={`px-3 py-1 rounded-full text-xs font-semibold border transition-all ${
              cat===c
                ? c==='All'?'bg-slate-800 border-slate-800 text-white':'border-transparent'
                : 'bg-white border-slate-200 text-slate-600 hover:border-slate-400'
            }`}
          >{c}</button>
        ))}
      </div>
      {/* Results count */}
      {search&&<p className="text-xs text-slate-400 mb-4">{filtered.length} result{filtered.length!==1?'s':''}</p>}
      {/* Term cards */}
      {filtered.length===0?(
        <div className="text-center py-16 text-slate-400">
          <div className="text-4xl mb-3">📭</div>
          <p className="font-medium">No terms found</p>
          <p className="text-xs mt-1">Try a different search or category</p>
        </div>
      ):(
        <div className="grid gap-3 md:grid-cols-2">
          {filtered.map(v=>(
            <div key={v.term} className="bg-white border border-slate-200 rounded-xl p-4 hover:shadow-md transition-shadow">
              <div className="flex items-start justify-between gap-2 mb-2">
                <span className="font-bold text-slate-900 text-sm leading-tight">{v.term}</span>
                <div className="flex items-center gap-1.5 shrink-0">
                  <span
                    className="text-xs font-semibold px-2 py-0.5 rounded-full"
                    style={{background:catColor[v.cat]+'22',color:catColor[v.cat]}}
                  >{v.cat}</span>
                  <button onClick={()=>togglePin(v.term)} title={weak[v.term]?'Remove from Focus Areas':'Add to Focus Areas'}
                    className="text-sm leading-none"
                    style={{color:weak[v.term]?'#7c3aed':'#cbd5e1',background:'none',border:'none',cursor:'pointer',padding:0}}>
                    {weak[v.term]?'★':'☆'}
                  </button>
                </div>
              </div>
              {plainMode&&v.plain?(
                <p className="text-slate-700 text-xs leading-relaxed">{v.plain}</p>
              ):(
                <p className="text-slate-500 text-xs leading-relaxed">{v.def}</p>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Vocab Quiz ────────────────────────────────────────────────────────────────
function VocabQuiz({plainMode,startCat}){
  const[history,setHistory]=useStore('vocab_quiz_history',[]);
  const[weak,setWeak]=useStore('vocab_weak',{});
  const[cat,setCat]=useState(startCat&&startCat!=='All'?startCat:'all');
  const[session,setSession]=useState(null);
  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[results,setResults]=useState([]);

  useEffect(()=>{if(startCat&&startCat!=='All')setCat(startCat)},[startCat]);

  const weakCount=Object.keys(weak).length;
  const pool=cat==='all'?VOCAB:cat==='focus'?VOCAB.filter(v=>weak[v.term]):VOCAB.filter(v=>v.cat===cat);

  const startQuiz=()=>{
    const n=Math.min(10,pool.length);
    const distractSource=(cat!=='all'&&cat!=='focus'&&pool.length>=4)?pool:VOCAB;
    const picks=shuffle(pool).slice(0,n);
    const qs=picks.map(term=>{
      const wrongPool=distractSource.filter(v=>v.term!==term.term);
      const correctText=plainMode&&term.plain?term.plain:term.def;
      const distractorTexts=shuffle(wrongPool).slice(0,3).map(v=>plainMode&&v.plain?v.plain:v.def);
      const opts=shuffle([correctText,...distractorTexts]);
      return{term:term.term,cat:term.cat,opts,ans:opts.indexOf(correctText)};
    });
    setSession(qs);setIdx(0);setSelected(null);setResults([]);
  };

  const handleSelect=(i)=>{
    if(selected!==null)return;
    setSelected(i);
    const q=session[idx];
    const correct=i===q.ans;
    setResults(r=>[...r,{term:q.term,cat:q.cat,correct,correctAns:q.opts[q.ans]}]);
    setWeak(w=>{
      const cur=w[q.term];
      if(correct){
        if(!cur)return w;
        const streak=(cur.correctStreak||0)+1;
        if(streak>=3&&!cur.manual){const{[q.term]:_,...rest}=w;return rest;}
        return{...w,[q.term]:{...cur,correctStreak:streak}};
      }
      return{...w,[q.term]:{wrong:(cur?.wrong||0)+1,correctStreak:0,manual:cur?.manual||false}};
    });
  };

  const next=()=>{
    if(idx<session.length-1){setIdx(i=>i+1);setSelected(null);}
    else setSession('done');
  };

  useEffect(()=>{
    if(session!=='done')return;
    const score=results.filter(r=>r.correct).length;
    setHistory(h=>[...h,{ts:Date.now(),score,total:results.length,cat}]);
  },[session]);

  if(!session){
    const best=history.filter(h=>h.cat===cat).sort((a,b)=>pct(b.score,b.total)-pct(a.score,a.total))[0];
    return(
      <div style={{padding:'24px',maxWidth:580}}>
        <h1 style={{fontSize:20,fontWeight:800,color:'#f4f4f5',marginBottom:4,letterSpacing:'-0.01em'}}>Vocab Quiz</h1>
        <p style={{fontSize:12,color:'#52525b',marginBottom:20}}>Multiple choice · matched against the AWS glossary</p>
        <div style={{background:'#111113',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:20}}>
          <div style={{fontSize:11,fontWeight:700,color:'#52525b',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12}}>Category</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:20}}>
            {weakCount>0&&(
              <button onClick={()=>setCat('focus')}
                style={{padding:'8px 12px',borderRadius:6,border:`1px solid ${cat==='focus'?'#a78bfa66':'rgba(255,255,255,0.07)'}`,background:cat==='focus'?'#7c3aed11':'transparent',color:cat==='focus'?'#a78bfa':'#52525b',fontSize:12,fontWeight:cat==='focus'?600:400,cursor:'pointer',transition:'all .12s'}}>
                ★ Focus Areas ({weakCount})
              </button>
            )}
            {['all',...VOCAB_CATS.filter(c=>c!=='All')].map(c=>{
              const on=cat===c;
              const acc=c==='all'?'#7c3aed':catColor[c];
              return(
                <button key={c} onClick={()=>setCat(c)}
                  style={{padding:'8px 12px',borderRadius:6,border:`1px solid ${on?acc+'66':'rgba(255,255,255,0.07)'}`,background:on?acc+'11':'transparent',color:on?acc:'#52525b',fontSize:12,fontWeight:on?600:400,cursor:'pointer',transition:'all .12s'}}>
                  {c==='all'?'All Categories':c}
                </button>
              );
            })}
          </div>
          <div style={{fontSize:12,color:'#3f3f46',marginBottom:16}}>
            {pool.length===0&&cat==='focus'?'No focus terms tracked yet.':`${pool.length} term${pool.length!==1?'s':''} in pool · ${Math.min(10,pool.length)} questions this round`}
          </div>
          {best&&<div style={{fontSize:11,color:'#52525b',marginBottom:16}}>Best in this category: <span style={{color:'#a78bfa',fontWeight:700}}>{pct(best.score,best.total)}%</span></div>}
          <button onClick={startQuiz} disabled={pool.length===0}
            style={{background:pool.length===0?'rgba(255,255,255,0.05)':'#7c3aed',color:pool.length===0?'#3f3f46':'white',border:'none',borderRadius:8,padding:'11px 28px',fontSize:13,fontWeight:700,cursor:pool.length===0?'not-allowed':'pointer'}}>
            Start Quiz →
          </button>
        </div>
      </div>
    );
  }

  if(session==='done'){
    const correct=results.filter(r=>r.correct).length;
    const total=results.length;
    const missed=results.filter(r=>!r.correct);
    const score=pct(correct,total);
    const acc=score>=70?'#22c55e':score>=50?'#f59e0b':'#ef4444';
    return(
      <div style={{padding:'24px',maxWidth:580}}>
        <h1 style={{fontSize:20,fontWeight:800,color:'#f4f4f5',marginBottom:16,letterSpacing:'-0.01em'}}>Results</h1>
        <div style={{background:'#111113',border:`1px solid ${acc}33`,borderRadius:10,padding:24,marginBottom:12,textAlign:'center'}}>
          <div style={{fontSize:52,fontWeight:900,color:acc,letterSpacing:'-0.04em',lineHeight:1}}>{correct}/{total}</div>
          <div style={{fontSize:13,color:acc,fontWeight:600,marginTop:6,marginBottom:18}}>{score}% · {score>=70?'Great work!':score>=50?'Getting there':'Keep studying'}</div>
          <button onClick={()=>setSession(null)}
            style={{background:'none',border:'1px solid rgba(255,255,255,0.12)',borderRadius:6,padding:'7px 18px',color:'#d4d4d8',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            New Quiz
          </button>
        </div>
        {missed.length>0&&(
          <div style={{background:'#111113',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:20}}>
            <div style={{fontSize:13,fontWeight:700,color:'#f4f4f5',marginBottom:2}}>Review List</div>
            <div style={{fontSize:11,color:'#52525b',marginBottom:16}}>{missed.length} term{missed.length!==1?'s':''} to revisit</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {missed.map((r,i)=>{
                const a=catColor[r.cat]||'#7c3aed';
                return(
                  <div key={i} style={{borderLeft:`2px solid ${a}`,paddingLeft:12}}>
                    <div style={{fontSize:11,color:a,fontWeight:700,marginBottom:4}}>{r.term} <span style={{color:'#52525b',fontWeight:400}}>· {r.cat}</span></div>
                    <div style={{fontSize:11,color:'#71717a',lineHeight:1.5}}>{r.correctAns}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  const q=session[idx];
  const accent=catColor[q.cat]||'#7c3aed';

  return(
    <div style={{padding:'24px',maxWidth:580}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div>
          <div style={{fontSize:10,color:'#3f3f46',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:3}}>{q.cat}</div>
          <div style={{fontSize:16,fontWeight:800,color:'#f4f4f5'}}>Question {idx+1} <span style={{color:'#3f3f46',fontWeight:400}}>/ {session.length}</span></div>
        </div>
      </div>
      <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2,marginBottom:20}}>
        <div style={{height:3,width:`${((idx+1)/session.length)*100}%`,background:accent,borderRadius:2,transition:'width .3s'}}/>
      </div>
      <div style={{background:'#111113',borderLeft:`3px solid ${accent}`,borderTop:'1px solid rgba(255,255,255,0.07)',borderRight:'1px solid rgba(255,255,255,0.07)',borderBottom:'1px solid rgba(255,255,255,0.07)',borderRadius:8,padding:20,marginBottom:14}}>
        <div style={{fontSize:11,color:'#52525b',fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}}>Which definition matches this term?</div>
        <p data-noexpand="true" style={{fontSize:20,color:'#e4e4e7',lineHeight:1.4,fontWeight:800}}>{q.term}</p>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
        {q.opts.map((opt,i)=>{
          let borderColor='rgba(255,255,255,0.07)';
          let bg='#111113';
          let textColor='#d4d4d8';
          let letterBg='rgba(255,255,255,0.06)';
          let letterColor='#71717a';
          if(selected!==null){
            if(i===q.ans){borderColor='#22c55e';bg='rgba(34,197,94,0.06)';textColor='#86efac';letterBg='#22c55e';letterColor='#fff';}
            else if(i===selected){borderColor='#ef4444';bg='rgba(239,68,68,0.06)';textColor='#fca5a5';letterBg='#ef4444';letterColor='#fff';}
            else{borderColor='rgba(255,255,255,0.04)';textColor='#3f3f46';letterColor='#3f3f46';}
          }
          return(
            <button key={i} onClick={()=>handleSelect(i)} disabled={selected!==null}
              style={{width:'100%',textAlign:'left',padding:'11px 14px',borderRadius:8,border:`1px solid ${borderColor}`,background:bg,cursor:selected!==null?'default':'pointer',display:'flex',alignItems:'flex-start',gap:0,transition:'all .12s'}}>
              <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:22,borderRadius:'50%',background:letterBg,color:letterColor,fontSize:10,fontWeight:700,flexShrink:0,marginRight:12}}>{String.fromCharCode(65+i)}</span>
              <span style={{fontSize:13,color:textColor,lineHeight:1.55,flex:1}}>{opt}</span>
            </button>
          );
        })}
      </div>
      {selected!==null&&(
        <button onClick={next} style={{background:'#7c3aed',color:'white',border:'none',borderRadius:8,padding:'11px 22px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
          {idx<session.length-1?'Next Question →':'View Results'}
        </button>
      )}
    </div>
  );
}

// ── Vocab Focus Areas ───────────────────────────────────────────────────────────
function VocabFocus({plainMode,startVocabQuiz}){
  const[weak,setWeak]=useStore('vocab_weak',{});
  const[search,setSearch]=useState('');

  const entries=useMemo(()=>{
    return Object.entries(weak).map(([term,meta])=>{
      const v=VOCAB.find(x=>x.term===term);
      return v?{...v,...meta}:null;
    }).filter(Boolean).sort((a,b)=>(b.wrong||0)-(a.wrong||0));
  },[weak]);

  const searchResults=useMemo(()=>{
    const q=search.toLowerCase().trim();
    if(!q)return[];
    return VOCAB.filter(v=>!weak[v.term]&&(v.term.toLowerCase().includes(q)||v.def.toLowerCase().includes(q))).slice(0,8);
  },[search,weak]);

  const pin=(term)=>setWeak(w=>({...w,[term]:{...(w[term]||{wrong:0,correctStreak:0}),manual:true}}));
  const unpin=(term)=>setWeak(w=>{const{[term]:_,...rest}=w;return rest;});

  return(
    <div style={{padding:'24px',maxWidth:640}}>
      <h1 style={{fontSize:20,fontWeight:800,color:'#f4f4f5',marginBottom:4,letterSpacing:'-0.01em'}}>Focus Areas</h1>
      <p style={{fontSize:12,color:'#52525b',marginBottom:20}}>Terms you keep missing in Vocab Quiz land here automatically — or pin any term yourself.</p>

      <div style={{background:'#111113',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:20,marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:'#52525b',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:10}}>Add any term</div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search all glossary terms…"
          style={{width:'100%',background:'#0c0c0e',border:'1px solid rgba(255,255,255,0.09)',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#e4e4e7',marginBottom:searchResults.length?10:0}}/>
        {searchResults.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {searchResults.map(v=>(
              <button key={v.term} onClick={()=>{pin(v.term);setSearch('');}}
                style={{textAlign:'left',padding:'8px 12px',borderRadius:6,border:'1px solid rgba(255,255,255,0.07)',background:'transparent',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:'#d4d4d8'}}>{v.term} <span style={{color:'#52525b'}}>· {v.cat}</span></span>
                <span style={{fontSize:11,color:'#a78bfa',fontWeight:600}}>+ Add</span>
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div style={{fontSize:13,fontWeight:700,color:'#f4f4f5'}}>{entries.length} term{entries.length!==1?'s':''} tracked</div>
        <button onClick={()=>startVocabQuiz&&startVocabQuiz('focus')} disabled={entries.length===0}
          style={{background:entries.length?'#7c3aed':'rgba(255,255,255,0.05)',color:entries.length?'white':'#3f3f46',border:'none',borderRadius:8,padding:'9px 18px',fontSize:12,fontWeight:700,cursor:entries.length?'pointer':'not-allowed'}}>
          Quiz These Terms →
        </button>
      </div>

      {entries.length===0?(
        <div style={{textAlign:'center',padding:'48px 0',color:'#3f3f46'}}>
          <div style={{fontSize:13}}>Nothing here yet.</div>
          <div style={{fontSize:12,marginTop:4}}>Miss a term in Vocab Quiz, or pin one above, and it'll show up here.</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {entries.map(v=>{
            const a=catColor[v.cat]||'#7c3aed';
            return(
              <div key={v.term} style={{background:'#111113',borderLeft:`3px solid ${a}`,borderTop:'1px solid rgba(255,255,255,0.07)',borderRight:'1px solid rgba(255,255,255,0.07)',borderBottom:'1px solid rgba(255,255,255,0.07)',borderRadius:8,padding:'12px 16px',display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#f4f4f5'}}>{v.term}</span>
                    <span style={{fontSize:10,color:a,fontWeight:600}}>{v.cat}</span>
                    {v.wrong>0&&<span style={{fontSize:10,color:'#ef4444',fontWeight:700}}>missed {v.wrong}×</span>}
                    {v.manual&&<span style={{fontSize:10,color:'#a78bfa'}}>📌 pinned</span>}
                  </div>
                  <div style={{fontSize:12,color:'#a1a1aa',lineHeight:1.5}}>{plainMode&&v.plain?v.plain:v.def}</div>
                </div>
                <button onClick={()=>unpin(v.term)}
                  style={{background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:6,padding:'5px 10px',color:'#52525b',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>
                  Remove
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── History ───────────────────────────────────────────────────────────────────
function History({quizHistory,examHistory}){
  const[expandedQuiz,setExpandedQuiz]=useState(null);
  const[expandedExam,setExpandedExam]=useState(null);

  const qMap=useMemo(()=>{const m={};QUESTIONS.forEach(q=>m[q.id]=q);return m;},[]);

  const quizSessions=useMemo(()=>{
    const grouped={};
    quizHistory.forEach(h=>{
      const sid=h.sessionId||('day_'+new Date(h.ts).toISOString().slice(0,10));
      if(!grouped[sid])grouped[sid]={sid,ts:h.ts,items:[]};
      grouped[sid].items.push(h);
      if(h.ts>grouped[sid].ts)grouped[sid].ts=h.ts;
    });
    return Object.values(grouped).sort((a,b)=>b.ts-a.ts);
  },[quizHistory]);

  const examSessions=[...examHistory].reverse();

  const QuestionRow=({item,qMap})=>{
    const[showExp,setShowExp]=useState(false);
    const q=qMap[item.qid];
    const userOptText=item.userAns==='dk'?"I don't know"
      :Array.isArray(item.userAns)?item.userAns.map(a=>q?.opts?.[a]).filter(Boolean).join(' + ')
      :(item.userAns!==undefined&&q)?q.opts[item.userAns]:'—';
    const correctOptText=q?(Array.isArray(q.ans)?q.ans.map(a=>q.opts[a]).join(' / '):q.opts[q.ans]):'—';
    return(
      <div className={`px-4 py-3 text-xs border-b border-slate-50 last:border-0 ${item.correct?'':'bg-red-50/40'}`}>
        <div className="flex items-start gap-2 mb-2">
          <span className={`font-bold mt-0.5 shrink-0 text-sm ${item.correct?'text-emerald-500':'text-red-400'}`}>{item.correct?'✓':'✗'}</span>
          <span className="text-slate-700 leading-snug font-medium flex-1">{q?q.q:`Question #${item.qid}`}</span>
          <Tag domain={item.domain}/>
        </div>
        <div className="ml-5 space-y-1">
          <div className="text-slate-500">You answered: <span className={`font-semibold ${item.correct?'text-emerald-600':'text-red-400'}`}>{userOptText}</span></div>
          {!item.correct&&<div className="text-slate-500">Correct answer: <span className="font-semibold text-emerald-600">{correctOptText}</span></div>}
          {q?.exp&&(
            <button onClick={()=>setShowExp(s=>!s)} className="text-indigo-400 hover:text-indigo-600 underline-offset-2 hover:underline mt-1">
              {showExp?'Hide':'Show'} explanation
            </button>
          )}
          {showExp&&q?.exp&&<div className="text-slate-400 leading-relaxed italic border-l-2 border-indigo-200 pl-2 mt-1">{q.exp}</div>}
        </div>
      </div>
    );
  };

  return(
    <div className="p-4 md:p-6 max-w-3xl space-y-6">
      <h1 className="text-slate-800 text-xl font-semibold">Attempt History</h1>

      {/* Quiz sessions */}
      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
          <div>
            <div className="text-slate-700 text-sm font-semibold">Quiz Sessions</div>
            <div className="text-slate-400 text-xs mt-0.5">{quizSessions.length} session{quizSessions.length!==1?'s':''} · {quizHistory.length} questions answered</div>
          </div>
          <span className="text-slate-300 text-xs">◉</span>
        </div>
        {quizSessions.length===0?(
          <div className="p-8 text-center text-slate-400 text-sm">No quiz sessions yet — start a quiz to build your history.</div>
        ):(
          <div className="divide-y divide-slate-100">
            {quizSessions.map((sess,i)=>{
              const expanded=expandedQuiz===i;
              const correct=sess.items.filter(q=>q.correct).length;
              const score=Math.round(correct/sess.items.length*100);
              const domains=[...new Set(sess.items.map(q=>q.domain))];
              return(
                <div key={sess.sid}>
                  <button onClick={()=>setExpandedQuiz(expanded?null:i)}
                    className="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-50 transition-colors text-left">
                    <div className="flex items-center gap-3 flex-wrap">
                      <span className={`text-sm font-bold tabular-nums ${score>=80?'text-emerald-600':score>=60?'text-amber-500':'text-red-400'}`}>{score}%</span>
                      <span className="text-slate-400 text-xs">{correct}/{sess.items.length} correct</span>
                      <div className="flex gap-1">{domains.map(d=><Tag key={d} domain={d}/>)}</div>
                    </div>
                    <div className="flex items-center gap-3 shrink-0">
                      <span className="text-slate-400 text-xs">{new Date(sess.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
                      <span className="text-slate-300 text-xs">{expanded?'▲':'▼'}</span>
                    </div>
                  </button>
                  {expanded&&(
                    <div className="border-t border-slate-100 max-h-[500px] overflow-y-auto">
                      {sess.items.map((item,j)=><QuestionRow key={j} item={item} qMap={qMap}/>)}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Exam attempts */}
      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
          <div>
            <div className="text-slate-700 text-sm font-semibold">Practice Exam Attempts</div>
            <div className="text-slate-400 text-xs mt-0.5">{examHistory.length} attempt{examHistory.length!==1?'s':''}</div>
          </div>
          <span className="text-slate-300 text-xs">◎</span>
        </div>
        {examSessions.length===0?(
          <div className="p-8 text-center text-slate-400 text-sm">No practice exams yet.</div>
        ):(
          <div className="divide-y divide-slate-100">
            {examSessions.map((e,i)=>{
              const expanded=expandedExam===i;
              return(
                <div key={i}>
                  <button onClick={()=>setExpandedExam(expanded?null:i)}
                    className="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-50 transition-colors">
                    <div className="flex items-center gap-3">
                      <span className={`text-sm font-bold tabular-nums ${e.score>=72?'text-emerald-600':'text-red-400'}`}>{e.score}%</span>
                      <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${e.score>=72?'bg-emerald-100 text-emerald-700':'bg-red-50 text-red-500'}`}>{e.score>=72?'PASS':'FAIL'}</span>
                      <span className="text-slate-400 text-xs">{e.correct}/{e.total} correct</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-slate-400 text-xs">{e.date||new Date(e.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
                      <span className="text-slate-300 text-xs">{expanded?'▲':'▼'}</span>
                    </div>
                  </button>
                  {expanded&&(e.items?.length>0?(
                    <div className="border-t border-slate-100 max-h-[500px] overflow-y-auto">
                      {e.items.map((item,j)=><QuestionRow key={j} item={item} qMap={qMap}/>)}
                    </div>
                  ):(
                    <div className="border-t border-slate-100 px-4 py-3 text-xs text-slate-400">Per-question detail only available for exams taken after the latest update.</div>
                  ))}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Console Labs ─────────────────────────────────────────────────────────────
function ConsoleLabs(){
  const[selected,setSelected]=useState(null);
  const[openPhase,setOpenPhase]=useState(0);
  const[checked,setChecked]=useStore('labs_checked',{});
  const[done,setDone]=useStore('labs_done',[]);

  const phaseColor={wrong:'#ef4444',fix:'#10b981',teardown:'#f97316'};
  const phaseBg={wrong:'bg-red-50 border-red-200',fix:'bg-emerald-50 border-emerald-200',teardown:'bg-orange-50 border-orange-200'};
  const phaseLabel={wrong:'⚠ Wrong Way First',fix:'✓ Fix It Properly',teardown:'🧹 Teardown'};

  const toggleStep=(labId,phaseId,stepN)=>{
    const key=`${labId}_${phaseId}_${stepN}`;
    setChecked(c=>({...c,[key]:!c[key]}));
  };

  const phaseProgress=(lab,phase)=>{
    const total=phase.steps.length;
    const done=phase.steps.filter(s=>checked[`${lab.id}_${phase.id}_${s.n}`]).length;
    return{done,total};
  };

  const labProgress=(lab)=>{
    const allSteps=lab.phases.flatMap(p=>p.steps.map(s=>`${lab.id}_${p.id}_${s.n}`));
    const doneCount=allSteps.filter(k=>checked[k]).length;
    return{done:doneCount,total:allSteps.length};
  };

  if(selected){
    const lab=CONSOLE_LABS.find(l=>l.id===selected);
    const prog=labProgress(lab);
    const allDone=prog.done===prog.total;
    return(
      <div className="p-4 md:p-6 max-w-3xl">
        <button onClick={()=>{setSelected(null);setOpenPhase(0);}} className="text-slate-400 hover:text-slate-600 text-sm mb-4 flex items-center gap-1">← Back to Labs</button>
        <div className="flex items-center gap-2 mb-1 flex-wrap">
          <span className="text-xs font-bold px-2 py-0.5 rounded-full text-white bg-indigo-500">{lab.tag}</span>
          {lab.services.map(s=><span key={s} className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">{s}</span>)}
          <span className="text-xs text-slate-400 ml-auto">{lab.timeEstimate}</span>
        </div>
        <h2 className="text-slate-900 text-xl font-bold mb-3 leading-snug">{lab.title}</h2>
        <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-4">
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">The Scenario</div>
          <p className="text-slate-700 text-sm leading-relaxed">{lab.businessContext}</p>
        </div>
        <div className="flex items-center gap-3 mb-5">
          <div className="flex-1 bg-slate-200 rounded-full h-2">
            <div className="bg-indigo-500 h-2 rounded-full transition-all" style={{width:`${prog.total?Math.round(prog.done/prog.total*100):0}%`}}/>
          </div>
          <span className="text-xs text-slate-500 font-semibold whitespace-nowrap">{prog.done}/{prog.total} steps</span>
          {allDone&&!done.includes(lab.id)&&(
            <button onClick={()=>setDone(d=>[...d,lab.id])} className="text-xs bg-emerald-600 text-white px-3 py-1 rounded-lg font-semibold">Mark Complete</button>
          )}
        </div>

        <div className="space-y-3">
          {lab.phases.map((phase,pi)=>{
            const pp=phaseProgress(lab,phase);
            const isOpen=openPhase===pi;
            return(
              <div key={phase.id} className={`border rounded-xl overflow-hidden ${phaseBg[phase.type]}`}>
                <button onClick={()=>setOpenPhase(isOpen?-1:pi)}
                  className="w-full flex items-center justify-between p-4 text-left">
                  <div>
                    <div className="text-xs font-bold uppercase tracking-wide mb-0.5" style={{color:phaseColor[phase.type]}}>{phaseLabel[phase.type]}</div>
                    <div className="font-semibold text-slate-800 text-sm">{phase.name}</div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0 ml-3">
                    <span className="text-xs text-slate-500 font-medium">{pp.done}/{pp.total}</span>
                    <span className="text-slate-400 text-xs">{isOpen?'▲':'▼'}</span>
                  </div>
                </button>
                {isOpen&&(
                  <div className="px-4 pb-4 pt-0">
                    <div className={`text-xs rounded-lg p-3 mb-4 border font-medium leading-relaxed`}
                      style={{background:'rgba(139,92,246,0.08)',borderColor:'rgba(196,181,253,0.2)',color:'#a78bfa'}}>
                      <span className="font-bold uppercase tracking-wide text-xs block mb-1">📋 Exam Concept This Phase Teaches</span>
                      {phase.examConcept}
                    </div>
                    <div className="flex justify-end mb-2">
                      <button onClick={()=>{
                        const allChecked=phase.steps.every(s=>checked[`${lab.id}_${phase.id}_${s.n}`]);
                        setChecked(c=>{
                          const next={...c};
                          phase.steps.forEach(s=>{next[`${lab.id}_${phase.id}_${s.n}`]=!allChecked;});
                          return next;
                        });
                      }} className="text-xs text-indigo-500 hover:text-indigo-700 font-semibold border border-indigo-200 hover:border-indigo-400 px-3 py-1 rounded-lg transition-all">
                        {phase.steps.every(s=>checked[`${lab.id}_${phase.id}_${s.n}`])?'Uncheck all':'Check all'}
                      </button>
                    </div>
                    <div className="space-y-2">
                      {phase.steps.map(step=>{
                        const key=`${lab.id}_${phase.id}_${step.n}`;
                        const isChecked=!!checked[key];
                        return(
                          <div key={step.n} className={`rounded-xl border transition-all ${isChecked?'opacity-60 bg-slate-50 border-slate-200':'bg-white border-slate-200'}`}>
                            <button onClick={()=>toggleStep(lab.id,phase.id,step.n)}
                              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all ${isChecked?'':'hover:bg-slate-50'}`}>
                              <div className={`w-10 h-10 rounded border-2 flex items-center justify-center shrink-0 transition-all ${isChecked?'bg-indigo-600 border-indigo-600':'border-slate-400 bg-white'}`}>
                                {isChecked&&<svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>}
                              </div>
                              <div className="flex-1 min-w-0">
                                <div className="text-xs font-bold text-slate-400 mb-0.5">Step {step.n}</div>
                                <p className={`text-sm leading-relaxed whitespace-pre-line ${isChecked?'line-through text-slate-400':'text-slate-700'}`}>{step.text}</p>
                              </div>
                            </button>
                            {(step.warn||step.tip)&&(
                              <div className="px-4 pb-3 space-y-2">
                                {step.warn&&(
                                  <div className="bg-red-50 border border-red-200 rounded-lg p-2.5">
                                    <span className="text-xs font-bold text-red-600 block mb-0.5">⚠ Why This Is Wrong</span>
                                    <p className="text-xs text-red-700 leading-relaxed">{step.warn}</p>
                                  </div>
                                )}
                                {step.tip&&(
                                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-2.5">
                                    <span className="text-xs font-bold text-blue-600 block mb-0.5">💡 Production Note</span>
                                    <p className="text-xs text-blue-700 leading-relaxed">{step.tip}</p>
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div className="p-4 md:p-6 max-w-4xl">
      <div className="mb-6">
        <h1 className="text-slate-900 text-2xl font-bold mb-1">Console Labs</h1>
        <p className="text-slate-500 text-sm">Hands-on walkthroughs. Build it wrong first — then fix it the production way. Every lab ends with a teardown so you don't get billed.</p>
      </div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-6 text-xs text-amber-800 leading-relaxed">
        <span className="font-bold">Before you start:</span> Use an AWS account you control. These labs use free-tier services where possible, but the teardown step is not optional — always complete it to avoid surprise charges.
      </div>
      <div className="text-xs text-slate-400 mb-3">{done.length}/{CONSOLE_LABS.length} labs completed</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {CONSOLE_LABS.map(lab=>{
          const prog=labProgress(lab);
          const isDone=done.includes(lab.id);
          const pct=prog.total?Math.round(prog.done/prog.total*100):0;
          return(
            <div key={lab.id} onClick={()=>setSelected(lab.id)}
              className="bg-white border border-slate-200 rounded-xl p-4 cursor-pointer hover:shadow-md transition-all hover:border-indigo-200 group">
              <div className="flex items-start justify-between mb-2">
                <span className="text-xs font-bold px-2 py-0.5 rounded-full text-white bg-indigo-500">{lab.tag}</span>
                <div className="flex items-center gap-2">
                  {isDone&&<span className="text-emerald-500 text-xs font-bold">✓ Done</span>}
                  <span className="text-slate-400 text-xs">{lab.timeEstimate}</span>
                </div>
              </div>
              <h3 className="text-slate-800 text-sm font-semibold leading-snug mb-2 group-hover:text-indigo-700 transition-colors">{lab.title}</h3>
              <div className="flex flex-wrap gap-1 mb-3">
                {lab.services.map(s=><span key={s} className="text-xs bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">{s}</span>)}
              </div>
              {pct>0&&(
                <div className="flex items-center gap-2 mb-2">
                  <div className="flex-1 bg-slate-200 rounded-full h-1.5">
                    <div className="bg-indigo-500 h-1.5 rounded-full" style={{width:`${pct}%`}}/>
                  </div>
                  <span className="text-xs text-slate-400">{pct}%</span>
                </div>
              )}
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-1">
                  {'⬡⬡⬡⬡⬡'.split('').slice(0,5).map((_,i)=>(
                    <span key={i} className={`text-xs ${i<lab.difficulty?'text-indigo-500':'text-slate-200'}`}>⬡</span>
                  ))}
                </div>
                <div className="text-indigo-500 text-xs font-semibold">{isDone?'Review →':'Start lab →'}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[active,setActive]=useState('home');
  const[quizHistory,setQuizHistory]=useStore('quiz_history',[]);
  const[examHistory,setExamHistory]=useStore('exam_history',[]);
  const[flashConf]=useStore('flash_conf',[]);
  const[settings,setSettings]=useStore('settings',{targetDate:'',studyReminders:false,showExplanations:true,adaptiveQuiz:true});
  const[streak,setStreak]=useStore('streak',0);
  const[lastStudy,setLastStudy]=useStore('last_study','');
  const[quizDomain,setQuizDomain]=useState('all');
  const[gapReport,setGapReport]=useStore('gap_report',null);
  const[skillMap,setSkillMap]=useStore('skill_map',{});
  const[readinessHistory,setReadinessHistory]=useStore('readiness_history',[]);
  const[plainMode,setPlainMode]=useStore('plain_mode',false);
  const[vocabQuizCat,setVocabQuizCat]=useState('all');

  const startTargeted=(domain)=>{setQuizDomain(domain||'all');setActive('quiz');};
  const startVocabQuiz=(cat)=>{setVocabQuizCat(cat||'all');setActive('vocabquiz');};

  // Updates both quizHistory and per-question skillMap on every answer
  const handleQuizAnswer=(a)=>{
    setQuizHistory(h=>[...h,a]);
    setSkillMap(m=>{
      const p=m[a.qid]||{correct:0,wrong:0,streak:0,lastResult:null,lastSeen:0};
      const s=a.correct?(p.streak>0?p.streak+1:1):(p.streak<0?p.streak-1:-1);
      return{...m,[a.qid]:{correct:p.correct+(a.correct?1:0),wrong:p.wrong+(a.correct?0:1),lastResult:a.correct,lastSeen:a.ts,streak:s}};
    });
  };
  // Saves a readiness snapshot after each quiz session
  const handleSessionComplete=(snap)=>{setReadinessHistory(h=>[...h,snap])};

  // Streak logic
  useEffect(()=>{
    const td=today();
    if(lastStudy===td)return;
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const ystr=yesterday.toISOString().slice(0,10);
    setStreak(lastStudy===ystr?s=>s+1:1);
    setLastStudy(td);
  },[]);

  const handleReset=()=>{
    ['quiz_history','exam_history','flash_conf','notes','lesson_read','gap_report','skill_map','readiness_history'].forEach(k=>{
      window.storage?window.storage.setItem(k,'null'):localStorage.setItem(k,'null');
    });
    setQuizHistory([]);setExamHistory([]);setStreak(0);setGapReport(null);setSkillMap({});setReadinessHistory([]);
  };

  const renderPage=()=>{
    switch(active){
      case'home':return<Welcome setActive={setActive}/>;
      case'assessment':return<GapAssessment onAnswer={handleQuizAnswer} setActive={setActive} startTargeted={startTargeted} setGapReport={setGapReport}/>;
      case'dashboard':return<Dashboard quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf} streak={streak} setActive={setActive} settings={settings} startTargeted={startTargeted} gapReport={gapReport} readinessHistory={readinessHistory}/>;
      case'architect':return<ArchitectMind/>;
      case'labs':return<ConsoleLabs/>;
      case'learn':return<Learn/>;
      case'lesson':return<Lesson/>;
      case'quiz':return<Quiz onAnswer={handleQuizAnswer} startDomain={quizDomain} quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf} skillMap={skillMap} onSessionComplete={handleSessionComplete}/>;
      case'flashcards':return<Flashcards plainMode={plainMode} setPlainMode={setPlainMode}/>;
      case'vocab':return<Vocab plainMode={plainMode} setPlainMode={setPlainMode} startVocabQuiz={startVocabQuiz}/>;
      case'vocabquiz':return<VocabQuiz plainMode={plainMode} startCat={vocabQuizCat}/>;
      case'vocabfocus':return<VocabFocus plainMode={plainMode} startVocabQuiz={startVocabQuiz}/>;
      case'exam':return<PracticeExam onExamComplete={r=>setExamHistory(h=>[...h,r])}/>;
      case'history':return<History quizHistory={quizHistory} examHistory={examHistory}/>;
      case'analytics':return<Analytics quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf}/>;
      case'notes':return<Notes/>;
      case'leaderboard':return<Leaderboard quizHistory={quizHistory} examHistory={examHistory} streak={streak}/>;
      case'settings':return<Settings settings={settings} setSettings={setSettings} onReset={handleReset}/>;
      default:return null;
    }
  };

  return(
    <div className="flex min-h-screen" style={{background:'#09090b',color:'#e4e4e7'}}>
      {active!=='home'&&<Sidebar active={active} setActive={setActive} streak={streak}/>}
      <main className="flex-1 overflow-y-auto pb-16 md:pb-0">
        {renderPage()}
      </main>
      {active!=='home'&&<BottomNav active={active} setActive={setActive}/>}
      {active!=='notes'&&<QuickNotes setActive={setActive}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
