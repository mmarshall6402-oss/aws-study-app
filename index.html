- Snow Family: physical data transfer when network bandwidth is insufficient

**Assessment tools:**
- Application Discovery Service: inventory on-prem servers, map dependencies
- Migration Hub: centralized tracking for all migration activities

**Exam trap:** DataSync is for one-time or scheduled data transfer (not real-time streaming). Storage Gateway is for ongoing hybrid access.`},
  {day:20,domain:'resilient',title:'Management & Governance Tools',content:`**Infrastructure as Code:**
- CloudFormation: declarative JSON/YAML, free for AWS resources, StackSets for multi-account
- CDK (Cloud Development Kit): define IaC using Python/TypeScript/Java (compiles to CloudFormation)
- Systems Manager: run commands, patch, config management across EC2 + on-prem

**Account governance:**
- Organizations: hierarchy, consolidated billing, SCPs for guardrails
- Control Tower: Landing Zone, Account Factory, detective + preventive guardrails
- IAM Identity Center (SSO): centralized access for all accounts + apps

**Compliance & governance:**
- Config: resource config history, compliance rules, aggregated view
- CloudTrail: immutable API audit log (export to S3 for >90 day retention)
- Trusted Advisor: checks cost/security/performance/fault tolerance/limits
- License Manager: track software licenses (BYOL for Oracle, SAP, Microsoft)

**Operational tools:**
- CloudWatch: metrics/logs/alarms/dashboards
- EventBridge: automated responses to AWS events
- Systems Manager OpsCenter: investigate and resolve operational issues
- Health Dashboard: personalized service health for your account

**Exam tip:** For multi-account compliance enforcement → Organizations + SCPs + Config Aggregator + Security Hub. Each layer adds a different control plane.`},

  return <span className={`${d.color} ${small?'text-xs':'text-xs'} border ${d.border} px-1.5 py-0.5 rounded`}>{d.label}</span>;
}

function ProgressBar({value,max,domain,className=''}){
  const d=DOMAINS[domain]||{color:'text-gray-400'};
  const w=max?Math.min(100,Math.round(value/max*100)):value;
  const colors={secure:'bg-green-400',resilient:'bg-cyan-400',performing:'bg-orange-400',cost:'bg-pink-400'};

    <div className={`w-full bg-gray-800 rounded-full h-1.5 ${className}`}>
      <div className={`${bg} h-1.5 rounded-full transition-all`} style={{width:`${w}%`}}/>
    </div>
  );
}

        <div className="fixed inset-0 z-40 md:hidden" onClick={()=>setMore(false)}>
          <div className="absolute bottom-16 left-0 right-0 bg-gray-900 border-t border-gray-800 p-2 grid grid-cols-2 gap-1" onClick={e=>e.stopPropagation()}>
            {secondary.map(n=>(
              <button key={n.id} onClick={()=>{setActive(n.id);setMore(false)}}
                className={`flex items-center gap-2 px-3 py-2.5 rounded text-sm transition-colors ${active===n.id?'bg-gray-800 text-white':'text-gray-400'}`}>
                <span className="text-xs">{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        </div>
      )}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-gray-950 border-t border-gray-800 flex">
        {primary.map(n=>(
          <button key={n.id} onClick={()=>{setActive(n.id);setMore(false)}}
            className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 text-xs transition-colors ${active===n.id?'text-green-400':'text-gray-500'}`}>
            <span className="text-base leading-none">{n.icon}</span>{n.label}
          </button>
        ))}
        <button onClick={()=>setMore(m=>!m)}
          className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 text-xs transition-colors ${more||secondary.find(n=>n.id===active)?'text-green-400':'text-gray-500'}`}>
          <span className="text-base leading-none">···</span>More
        </button>
      </nav>
    </>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({quizHistory,examHistory,flashConf,streak,setActive}){
  const domainScores=useMemo(()=>{
    const scores={};
    Object.keys(DOMAINS).forEach(d=>{
      const qs=quizHistory.filter(h=>h.domain===d);
      scores[d]={correct:qs.filter(h=>h.correct).length,total:qs.length};
    });
    return scores;
  },[quizHistory]);

  const weak=Object.entries(domainScores).filter(([,v])=>v.total>0).sort(([,a],[,b])=>pct(a.correct,a.total)-pct(b.correct,b.total));
  const totalCards=FLASHCARDS.length;
  const known=flashConf.filter(f=>f.conf==='know').length;

  return(
    <div className="p-4 md:p-6 space-y-6">
      <div>

      </div>

      <div className="grid grid-cols-2 gap-3 lg:grid-cols-4">
        {[
          {label:'Quiz Questions',val:quizHistory.length,sub:`${quizHistory.filter(h=>h.correct).length} correct`,color:'text-green-400'},
          {label:'Flashcard Mastery',val:`${pct(known,totalCards)}%`,sub:`${known}/${totalCards} known`,color:'text-cyan-400'},
          {label:'Last Exam Score',val:lastExam?`${lastExam.score}%`:'—',sub:lastExam?`${lastExam.correct}/${lastExam.total} correct`:'No attempts',color:'text-orange-400'},
          {label:'Day Streak',val:streak,sub:'consecutive days',color:'text-pink-400'},
        ].map(c=>(
          <div key={c.label} className="bg-gray-900 border border-gray-800 rounded-lg p-4">
            <div className="text-gray-500 text-xs mb-1">{c.label}</div>
            <div className={`${c.color} text-2xl font-semibold`}>{c.val}</div>
            <div className="text-gray-600 text-xs mt-1">{c.sub}</div>

      </div>

      <div className="grid grid-cols-1 gap-3 lg:grid-cols-2">
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
          <div className="text-gray-300 text-sm font-medium mb-3">Domain Performance</div>
          <div className="space-y-3">
            {Object.entries(DOMAINS).map(([key,d])=>{
              const s=domainScores[key]||{correct:0,total:0};
              return(
                <div key={key}>
                  <div className="flex justify-between text-xs mb-1">
                    <span className={d.color}>{d.label} ({d.pct}%)</span>
                    <span className="text-gray-400">{s.total?`${pct(s.correct,s.total)}%`:'No data'}</span>
                  </div>
                  <ProgressBar value={s.total?pct(s.correct,s.total):0} max={100} domain={key}/>

            })}

        </div>

        <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
          <div className="text-gray-300 text-sm font-medium mb-3">Quick Actions</div>
          <div className="space-y-2">
            {[
              {label:'→ Today\'s Lesson',id:'lesson',color:'text-green-400'},
              {label:'→ Practice Quiz',id:'quiz',color:'text-cyan-400'},
              {label:'→ Review Flashcards',id:'flashcards',color:'text-orange-400'},
              {label:'→ Take Practice Exam',id:'exam',color:'text-pink-400'},

// ── Daily Lesson ──────────────────────────────────────────────────────────────
function Lesson(){
  const lessonIdx=dayOfYear()%LESSONS.length;
  const lesson=LESSONS[lessonIdx];
  const d=DOMAINS[lesson.domain];
  const[read,setRead]=useStore('lesson_read',[]);
  const isRead=read.includes(lessonIdx);

  const renderMd=(text)=>text.split('\n').map((line,i)=>{
    if(line.startsWith('**')&&line.endsWith('**'))return<div key={i} className="text-gray-200 font-semibold mt-3 mb-1">{line.slice(2,-2)}</div>;
    if(line.startsWith('- '))return<div key={i} className="text-gray-400 text-sm ml-2">• {line.slice(2)}</div>;
    if(line.match(/^\d+\./))return<div key={i} className="text-gray-400 text-sm ml-2">{line}</div>;
    if(line==='')return<div key={i} className="h-1"/>;
    return<div key={i} className="text-gray-300 text-sm">{line}</div>;
  });

  return(
    <div className="p-4 md:p-6 max-w-3xl">
      <div className="flex items-center gap-3 mb-6">
        <div>
          <div className="flex items-center gap-2">
            <h1 className="text-gray-100 text-xl font-semibold">{lesson.title}</h1>
            <Tag domain={lesson.domain}/>
          </div>
          <div className="text-gray-500 text-xs mt-1">Day {lessonIdx+1} of {LESSONS.length} · {d.label} Architecture</div>
        </div>
      </div>
      <div className={`bg-gray-900 border ${d.border} rounded-lg p-5 space-y-1`}>
        {renderMd(lesson.content)}
      </div>
      <div className="mt-4 flex items-center gap-3">
        <button onClick={()=>setRead(r=>isRead?r.filter(x=>x!==lessonIdx):[...r,lessonIdx])}
          className={`text-sm px-4 py-2 rounded border transition-colors ${isRead?'border-green-400 text-green-400 bg-green-400/10':'border-gray-700 text-gray-400 hover:border-gray-500'}`}>
          {isRead?'✓ Marked as Read':'Mark as Read'}
        </button>
        <span className="text-gray-600 text-xs">{read.length}/{LESSONS.length} lessons read</span>
      </div>
    </div>
  );
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
function Quiz({onAnswer}){
  const[domain,setDomain]=useState('all');
  const[session,setSession]=useState(null);
  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[showExp,setShowExp]=useState(false);
  const[sessionResults,setSessionResults]=useState([]);

  const startQuiz=()=>{
    const pool=domain==='all'?QUESTIONS:QUESTIONS.filter(q=>q.domain===domain);
    setSession(shuffle(pool).slice(0,10));
    setIdx(0);setSelected(null);setShowExp(false);setSessionResults([]);
  };

  const isCorrectOpt=(q,i)=>Array.isArray(q.ans)?q.ans.includes(i):i===q.ans;
  const correctLabel=(q)=>Array.isArray(q.ans)?q.ans.map(i=>q.opts[i]).join(' / '):q.opts[q.ans];

  const handleSelect=(i)=>{
    if(selected!==null)return;
    setSelected(i);setShowExp(true);
    const q=session[idx];
    const correct=isCorrectOpt(q,i);
    onAnswer({domain:q.domain,sub:q.sub,correct,qid:q.id,ts:Date.now()});
    setSessionResults(r=>[...r,{correct,dontKnow:false,domain:q.domain,sub:q.sub,qtext:q.q,ans:correctLabel(q)}]);
  };

  const handleDontKnow=()=>{
    if(selected!==null)return;
    setSelected('dk');setShowExp(true);
    const q=session[idx];
    onAnswer({domain:q.domain,sub:q.sub,correct:false,dontKnow:true,qid:q.id,ts:Date.now()});
    setSessionResults(r=>[...r,{correct:false,dontKnow:true,domain:q.domain,sub:q.sub,qtext:q.q,ans:correctLabel(q)}]);
  };

  const next=()=>{
    if(idx<session.length-1){setIdx(i=>i+1);setSelected(null);setShowExp(false);}
    else setSession('done');
  };

  if(!session){
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-gray-100 text-xl font-semibold mb-6">Adaptive Quiz</h1>
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-5">
          <div className="text-gray-400 text-sm mb-4">Select domain focus:</div>
          <div className="grid grid-cols-2 gap-2 mb-6 sm:grid-cols-3">
            {[{id:'all',label:'All Domains',color:'text-gray-300'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label,color:v.color}))].map(d=>(
              <button key={d.id} onClick={()=>setDomain(d.id)}
                className={`text-sm py-2 px-3 rounded border transition-colors ${domain===d.id?'border-green-400 text-green-400 bg-green-400/10':'border-gray-700 text-gray-500 hover:border-gray-500'}`}>
                {d.label}
              </button>
            ))}
          </div>
          <button onClick={startQuiz} className="bg-green-400 text-gray-950 text-sm font-semibold px-6 py-2.5 rounded hover:bg-green-300 transition-colors">
            Start 10-Question Quiz →
          </button>
        </div>
      </div>
    );
  }

  if(session==='done'){
    const correct=sessionResults.filter(r=>r.correct).length;
    const missed=sessionResults.filter(r=>!r.correct);
    // Group missed by subtopic
    const bySubtopic={};
    missed.forEach(r=>{
      const key=`${r.sub}||${r.domain}`;
      if(!bySubtopic[key])bySubtopic[key]={sub:r.sub,domain:r.domain,items:[]};
      bySubtopic[key].items.push(r);
    });
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-gray-100 text-xl font-semibold mb-6">Quiz Complete</h1>
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-5 mb-4">
          <div className={`text-4xl font-semibold mb-2 ${correct>=7?'text-green-400':correct>=5?'text-orange-400':'text-red-400'}`}>
            {correct}/10
          </div>
          <div className="text-gray-400 text-sm mb-4">{pct(correct,10)}% accuracy this session</div>
          <div className="flex flex-wrap gap-x-4 gap-y-1 mb-5">
            {Object.keys(DOMAINS).map(d=>{
              const dr=sessionResults.filter(r=>r.domain===d);
              if(!dr.length)return null;
              return<div key={d} className="text-xs">
                <span className={DOMAINS[d].color}>{DOMAINS[d].label}: </span>
                <span className="text-gray-400">{dr.filter(r=>r.correct).length}/{dr.length}</span>
              </div>;
            })}
          </div>
          <button onClick={()=>{setSession(null);setDomain('all');}} className="border border-gray-700 text-gray-300 text-sm px-4 py-2 rounded hover:border-gray-500 transition-colors">
            New Quiz
          </button>
        </div>

        {missed.length>0&&(
          <div className="bg-gray-900 border border-gray-800 rounded-lg p-5">
            <div className="text-gray-300 text-sm font-medium mb-1">Study List</div>
            <div className="text-gray-600 text-xs mb-4">{missed.length} topic{missed.length!==1?'s':''} to review</div>
            <div className="space-y-4">
              {Object.values(bySubtopic).map((group,i)=>(
                <div key={i}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className={`${DOMAINS[group.domain].color} text-xs font-medium`}>{group.sub}</span>
                    <span className="text-gray-700 text-xs">·</span>
                    <span className="text-gray-600 text-xs">{DOMAINS[group.domain].label}</span>
                    {group.items.some(r=>r.dontKnow)&&<span className="text-xs text-gray-600 border border-gray-700 px-1.5 py-0.5 rounded">didn't know</span>}
                  </div>
                  <div className="space-y-2 pl-3 border-l border-gray-800">
                    {group.items.map((r,j)=>(
                      <div key={j}>
                        <div className="text-gray-500 text-xs leading-relaxed">{r.qtext}</div>
                        <div className="text-gray-700 text-xs mt-0.5">→ {r.ans}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  const q=session[idx];
  const d=DOMAINS[q.domain];

  return(
    <div className="p-4 md:p-6 max-w-2xl">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-gray-100 text-xl font-semibold">Quiz</h1>
        <div className="text-gray-500 text-sm">{idx+1} / {session.length}</div>
      </div>
      <ProgressBar value={idx+1} max={session.length} domain={q.domain} className="mb-5"/>
      <div className={`bg-gray-900 border ${d.border} rounded-lg p-5 mb-4`}>
        <div className="flex items-center gap-2 mb-3">
          <Tag domain={q.domain}/><span className="text-gray-600 text-xs">{q.sub}</span>
        </div>
        <p className="text-gray-200 text-sm leading-relaxed">{q.q}</p>
      </div>
      <div className="space-y-2 mb-3">
        {q.opts.map((opt,i)=>{
          let cls='border-gray-700 text-gray-300 hover:border-gray-500';
          if(selected!==null){
            if(isCorrectOpt(q,i))cls=`border-green-400 text-green-400 bg-green-400/10`;
            else if(i===selected&&!isCorrectOpt(q,i)&&selected!=='dk')cls=`border-red-400 text-red-400 bg-red-400/10`;
            else cls='border-gray-800 text-gray-600';
          }
          return(
            <button key={i} onClick={()=>handleSelect(i)}
              className={`w-full text-left text-sm px-4 py-3 rounded border transition-colors ${cls}`}>
              <span className="text-gray-500 mr-2">{String.fromCharCode(65+i)}.</span>{opt}
            </button>
          );
        })}
      </div>
      {selected===null&&(
        <button onClick={handleDontKnow}
          className="w-full text-sm px-4 py-2.5 rounded border border-gray-700 text-gray-500 hover:border-gray-500 hover:text-gray-400 transition-colors mb-4">
          ? I don't know
        </button>
      )}
      {showExp&&(
        <div className={`rounded-lg p-4 mb-4 ${selected==='dk'?'bg-orange-400/10 border border-orange-400/20':'bg-gray-900 border border-gray-700'}`}>
          {selected==='dk'&&<div className="text-orange-400 text-xs font-medium mb-1">Correct answer: {correctLabel(q)}</div>}
          <div className="text-xs text-gray-500 mb-1">{selected==='dk'?'Explanation':'Explanation'}</div>
          <p className="text-gray-300 text-sm">{q.exp}</p>
        </div>
      )}
      {selected!==null&&(
        <button onClick={next} className="bg-gray-800 text-gray-200 text-sm px-5 py-2.5 rounded hover:bg-gray-700 transition-colors">
          {idx<session.length-1?'Next Question →':'View Results'}
        </button>
      )}
    </div>
  );
}

// ── Flashcards ────────────────────────────────────────────────────────────────
function Flashcards(){
  const[conf,setConf]=useStore('flash_conf',[]);
  const[domain,setDomain]=useState('all');
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[showAll,setShowAll]=useState(false);

  const cards=useMemo(()=>domain==='all'?FLASHCARDS:FLASHCARDS.filter(c=>c.domain===domain),[domain]);
  const card=cards[Math.min(idx,cards.length-1)];
  const cardConf=conf.find(c=>c.id===card?.id);

  const setCardConf=(level)=>{
    setConf(c=>{const filtered=c.filter(x=>x.id!==card.id);return[...filtered,{id:card.id,conf:level}]});
  };

  const go=(dir)=>{setIdx(i=>(i+dir+cards.length)%cards.length);setFlipped(false)};

  const stats=useMemo(()=>({
    know:conf.filter(c=>c.conf==='know').length,
    sorta:conf.filter(c=>c.conf==='sorta').length,
    nope:conf.filter(c=>c.conf==='nope').length,
  }),[conf]);

  if(showAll){
    return(
      <div className="p-4 md:p-6 max-w-4xl">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={()=>setShowAll(false)} className="text-gray-500 hover:text-gray-300 text-sm">← Back</button>
          <h1 className="text-gray-100 text-xl font-semibold">All Flashcards</h1>
        </div>
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
          {FLASHCARDS.map((c,i)=>{
            const cv=conf.find(x=>x.id===c.id);
            return(
              <div key={c.id} className="bg-gray-900 border border-gray-800 rounded-lg p-3 cursor-pointer hover:border-gray-700"
                onClick={()=>{setDomain(c.domain);setIdx(cards.findIndex(x=>x.id===c.id)||0);setShowAll(false);setFlipped(false)}}>
                <div className="flex items-center justify-between mb-1">

                  {cv&&<span className={`text-xs ${cv.conf==='know'?'text-green-400':cv.conf==='sorta'?'text-orange-400':'text-red-400'}`}>
                    {cv.conf==='know'?'✓ know':cv.conf==='sorta'?'~ sorta':'✗ nope'}
                  </span>}
                </div>
                <div className="text-gray-300 text-sm">{c.front}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div className="p-4 md:p-6 max-w-2xl">
      <div className="flex items-center justify-between mb-6">
        <h1 className="text-gray-100 text-xl font-semibold">Flashcards</h1>
        <div className="flex items-center gap-3 text-xs">
          <span className="text-green-400">✓ {stats.know}</span>
          <span className="text-orange-400">~ {stats.sorta}</span>
          <span className="text-red-400">✗ {stats.nope}</span>
          <button onClick={()=>setShowAll(true)} className="text-gray-500 hover:text-gray-300 border border-gray-700 px-2 py-1 rounded ml-2">All</button>
        </div>
      </div>

      <div className="flex gap-2 mb-5 flex-wrap">
        {[{id:'all',label:'All'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label}))].map(d=>(
          <button key={d.id} onClick={()=>{setDomain(d.id);setIdx(0);setFlipped(false)}}
            className={`text-xs px-2.5 py-1 rounded border transition-colors ${domain===d.id?'border-green-400 text-green-400':'border-gray-700 text-gray-500 hover:border-gray-500'}`}>
            {d.label}
          </button>
        ))}
      </div>

      <div className="text-gray-500 text-xs mb-3 text-center">{idx+1} / {cards.length} · Click card to flip</div>

      <div className="flip-card mb-4 cursor-pointer" onClick={()=>setFlipped(f=>!f)}>
        <div className={`flip-inner ${flipped?'flipped':''}`}>
          <div className={`flip-face bg-gray-900 border ${card?DOMAINS[card.domain].border:'border-gray-700'} text-center`}>
            <div className="text-gray-500 text-xs mb-3">CONCEPT</div>
            <div className="text-gray-100 text-lg font-medium">{card?.front}</div>
            {card&&<Tag domain={card.domain} small/>}
          </div>
          <div className="flip-face flip-back bg-gray-800 border border-gray-700">
            <div className="text-gray-500 text-xs mb-3">EXPLANATION</div>
            <div className="text-gray-200 text-sm text-center leading-relaxed">{card?.back}</div>
          </div>
        </div>
      </div>

      <div className="flex items-center justify-between mb-4">
        <button onClick={()=>go(-1)} className="text-gray-500 hover:text-gray-300 text-sm px-3 py-1.5 border border-gray-700 rounded hover:border-gray-500">← Prev</button>
        <div className="flex gap-2">
          {[{k:'nope',label:'✗ Nope',cls:'border-red-400/50 text-red-400 hover:bg-red-400/10'},
            {k:'sorta',label:'~ Sorta',cls:'border-orange-400/50 text-orange-400 hover:bg-orange-400/10'},
            {k:'know',label:'✓ Know',cls:'border-green-400/50 text-green-400 hover:bg-green-400/10'}
          ].map(b=>(
            <button key={b.k} onClick={()=>setCardConf(b.k)}

              {b.label}

          ))}

        <button onClick={()=>go(1)} className="text-gray-500 hover:text-gray-300 text-sm px-3 py-1.5 border border-gray-700 rounded hover:border-gray-500">Next →</button>
      </div>
    </div>
  );
}

// ── Practice Exam ─────────────────────────────────────────────────────────────
function PracticeExam({onExamComplete}){
  const[phase,setPhase]=useState('setup');
  const[questions,setQuestions]=useState([]);
  const[answers,setAnswers]=useState({});
  const[timeLeft,setTimeLeft]=useState(7800);
  const[flagged,setFlagged]=useState(new Set());
  const[qIdx,setQIdx]=useState(0);
  const timerRef=useRef(null);

  const start=()=>{
    const pool=[];
    Object.entries(DOMAINS).forEach(([d,meta])=>{
      const dq=shuffle(QUESTIONS.filter(q=>q.domain===d));
      const n=Math.round(65*meta.pct/100);
      pool.push(...dq.slice(0,n));
    });
    const final=shuffle(pool).slice(0,65);
    setQuestions(final);setAnswers({});setTimeLeft(7800);setFlagged(new Set());setQIdx(0);
    setPhase('exam');
    timerRef.current=setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);setPhase('result');return 0;}return t-1;}),1000);
  };

  const submit=()=>{clearInterval(timerRef.current);setPhase('result');};

  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  useEffect(()=>{
    if(phase==='result'&&questions.length>0){
      const correct=questions.filter((q,i)=>answers[i]===q.ans).length;
      const score=Math.round(correct/questions.length*100);
      const byDomain={};
      Object.keys(DOMAINS).forEach(d=>{
        const dqs=questions.map((q,i)=>({...q,i})).filter(q=>q.domain===d);
        byDomain[d]={correct:dqs.filter(q=>answers[q.i]===q.ans).length,total:dqs.length};
      });
      onExamComplete({ts:Date.now(),score,correct,total:questions.length,byDomain,date:today()});
    }
  },[phase]);

  const fmt=(s)=>`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  const answered=Object.keys(answers).length;
  const progress=pct(answered,65);

  if(phase==='setup'){
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-gray-100 text-xl font-semibold mb-6">Practice Exam</h1>
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-5 space-y-4">
          <div className="text-gray-300 text-sm font-medium">SAA-C03 Simulation</div>
          <div className="grid grid-cols-2 gap-3 text-sm">
            <div className="text-gray-500">Questions: <span className="text-gray-200">65</span></div>
            <div className="text-gray-500">Time: <span className="text-gray-200">130 minutes</span></div>
            <div className="text-gray-500">Pass score: <span className="text-green-400">72% (720/1000)</span></div>
            <div className="text-gray-500">Format: <span className="text-gray-200">Multiple choice</span></div>
          </div>
          <div className="border-t border-gray-800 pt-3 space-y-1.5 text-xs text-gray-500">
            {Object.entries(DOMAINS).map(([k,d])=>(
              <div key={k} className="flex justify-between">
                <span className={d.color}>{d.label} Architectures</span>
                <span>{d.pct}% (~{Math.round(65*d.pct/100)} questions)</span>
              </div>
            ))}
          </div>
          <button onClick={start} className="bg-green-400 text-gray-950 text-sm font-semibold px-6 py-2.5 rounded hover:bg-green-300 transition-colors">
            Begin Exam →
          </button>
        </div>
      </div>
    );
  }

  if(phase==='result'){
    const correct=questions.filter((q,i)=>answers[i]===q.ans).length;
    const score=Math.round(correct/questions.length*100);
    const pass=score>=72;
    const byDomain={};
    Object.keys(DOMAINS).forEach(d=>{
      const dqs=questions.map((q,i)=>({...q,i})).filter(q=>q.domain===d);
      byDomain[d]={correct:dqs.filter(q=>answers[q.i]===q.ans).length,total:dqs.length};
    });
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-gray-100 text-xl font-semibold mb-6">Exam Results</h1>
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-5 space-y-5">
          <div>
            <div className={`text-5xl font-semibold mb-1 ${pass?'text-green-400':'text-red-400'}`}>{score}%</div>
            <div className={`text-sm ${pass?'text-green-400':'text-red-400'}`}>{pass?'PASS — Above 72% threshold':'FAIL — Below 72% threshold'}</div>
            <div className="text-gray-500 text-xs mt-1">{correct} / {questions.length} correct</div>
          </div>
          <div className="space-y-3">
            {Object.entries(byDomain).map(([d,s])=>(
              <div key={d}>
                <div className="flex justify-between text-xs mb-1">
                  <span className={DOMAINS[d].color}>{DOMAINS[d].label}</span>
                  <span className="text-gray-400">{s.correct}/{s.total} ({pct(s.correct,s.total)}%)</span>
                </div>
                <ProgressBar value={s.correct} max={s.total} domain={d}/>
              </div>
            ))}
          </div>
          <button onClick={()=>setPhase('setup')} className="border border-gray-700 text-gray-300 text-sm px-4 py-2 rounded hover:border-gray-500 transition-colors">
            Take Another Exam
          </button>
        </div>
      </div>
    );
  }

  const q=questions[qIdx];
  const d=q?DOMAINS[q.domain]:{color:'text-gray-400',border:'border-gray-700',bg:'bg-gray-900'};

  return(
    <div className="flex flex-col h-screen">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800 bg-gray-950 sticky top-0">
        <div className="text-sm text-gray-400">Q {qIdx+1}/{questions.length}</div>
        <div className={`text-lg font-semibold ${timeLeft<600?'text-red-400':timeLeft<1800?'text-orange-400':'text-green-400'}`}>
          {fmt(timeLeft)}
        </div>
        <div className="flex items-center gap-2">
          <span className="hidden sm:inline text-xs text-gray-500">{answered}/65</span>
          <button onClick={submit} className="text-xs border border-red-400/50 text-red-400 px-3 py-1.5 rounded hover:bg-red-400/10">Submit</button>
        </div>
      </div>

      <div className="flex flex-1 overflow-hidden">
        {/* Question panel */}
        <div className="flex-1 overflow-y-auto p-4 md:p-6">
          <ProgressBar value={answered} max={65} domain={q?.domain} className="mb-5"/>
          {q&&(
            <>
              <div className={`bg-gray-900 border ${d.border} rounded-lg p-5 mb-4`}>
                <div className="flex items-center gap-2 mb-3">
                  <Tag domain={q.domain}/><span className="text-gray-600 text-xs">{q.sub}</span>
                  <button onClick={()=>setFlagged(f=>{const n=new Set(f);n.has(qIdx)?n.delete(qIdx):n.add(qIdx);return n;})}
                    className={`ml-auto text-xs ${flagged.has(qIdx)?'text-orange-400':'text-gray-600 hover:text-gray-400'}`}>
                    {flagged.has(qIdx)?'⚑ flagged':'⚐ flag'}
                  </button>
                </div>
                <p className="text-gray-200 text-sm leading-relaxed">{q.q}</p>
              </div>
              <div className="space-y-2">
                {q.opts.map((opt,i)=>(
                  <button key={i} onClick={()=>setAnswers(a=>({...a,[qIdx]:i}))}
                    className={`w-full text-left text-sm px-4 py-3 rounded border transition-colors ${answers[qIdx]===i?'border-green-400 text-green-400 bg-green-400/10':'border-gray-700 text-gray-300 hover:border-gray-500'}`}>
                    <span className="text-gray-500 mr-2">{String.fromCharCode(65+i)}.</span>{opt}
                  </button>
                ))}
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={()=>setQIdx(i=>Math.max(0,i-1))} disabled={qIdx===0}
                  className="text-sm px-4 py-2 border border-gray-700 text-gray-400 rounded hover:border-gray-500 disabled:opacity-30">← Prev</button>
                <button onClick={()=>setQIdx(i=>Math.min(questions.length-1,i+1))} disabled={qIdx===questions.length-1}
                  className="text-sm px-4 py-2 border border-gray-700 text-gray-400 rounded hover:border-gray-500 disabled:opacity-30">Next →</button>
              </div>
            </>
          )}
        </div>

        {/* Question grid */}
        <div className="hidden md:block w-48 border-l border-gray-800 overflow-y-auto p-3">
          <div className="text-xs text-gray-600 mb-2">Navigator</div>
          <div className="grid grid-cols-5 gap-1">
            {questions.map((_,i)=>(
              <button key={i} onClick={()=>setQIdx(i)}
                className={`text-xs w-full aspect-square rounded flex items-center justify-center transition-colors
                  ${i===qIdx?'bg-green-400 text-gray-950':
                    flagged.has(i)?'bg-orange-400/20 text-orange-400 border border-orange-400/40':
                    answers[i]!==undefined?'bg-gray-700 text-gray-300':'bg-gray-900 text-gray-600 border border-gray-800'}`}>
                {i+1}
              </button>
            ))}
          </div>
          <div className="mt-3 space-y-1 text-xs text-gray-600">
            <div><span className="inline-block w-3 h-3 bg-green-400 rounded mr-1"/>Current</div>
            <div><span className="inline-block w-3 h-3 bg-gray-700 rounded mr-1"/>Answered</div>
            <div><span className="inline-block w-3 h-3 bg-orange-400/20 border border-orange-400/40 rounded mr-1"/>Flagged</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Analytics ─────────────────────────────────────────────────────────────────
function Analytics({quizHistory,examHistory,flashConf}){
  const domainStats=useMemo(()=>{
    return Object.entries(DOMAINS).map(([key,d])=>{
      const qs=quizHistory.filter(h=>h.domain===key);
      const correct=qs.filter(h=>h.correct).length;
      const subMap={};
      qs.forEach(h=>{
        if(!subMap[h.sub])subMap[h.sub]={correct:0,total:0};
        subMap[h.sub].total++;
        if(h.correct)subMap[h.sub].correct++;
      });
      return{key,label:d.label,color:d.color,border:d.border,bg:d.bg,correct,total:qs.length,pct:d.pct,subs:subMap};
    });
  },[quizHistory]);

  const flashStats=useMemo(()=>{
    const know=flashConf.filter(f=>f.conf==='know').length;
    const sorta=flashConf.filter(f=>f.conf==='sorta').length;
    const nope=flashConf.filter(f=>f.conf==='nope').length;
    return{know,sorta,nope,total:FLASHCARDS.length};
  },[flashConf]);

  const recentExams=examHistory.slice(-5).reverse();

  return(
    <div className="p-4 md:p-6 space-y-6 max-w-4xl">
      <h1 className="text-gray-100 text-xl font-semibold">Analytics</h1>

      {/* Domain breakdown */}
      <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
        {domainStats.map(d=>(
          <div key={d.key} className={`bg-gray-900 border ${d.border} rounded-lg p-4`}>
            <div className="flex justify-between items-center mb-3">
              <span className={`${d.color} font-medium text-sm`}>{d.label} ({d.pct}%)</span>
              <span className="text-gray-400 text-sm">{d.total?`${pct(d.correct,d.total)}%`:'No data'}</span>
            </div>
            <ProgressBar value={d.total?pct(d.correct,d.total):0} max={100} domain={d.key} className="mb-3"/>
            <div className="text-gray-500 text-xs">{d.correct}/{d.total} questions correct</div>
            {Object.entries(d.subs).length>0&&(
              <div className="mt-3 pt-3 border-t border-gray-800 space-y-1.5">
                {Object.entries(d.subs).sort(([,a],[,b])=>pct(a.correct,a.total)-pct(b.correct,b.total)).map(([sub,s])=>(
                  <div key={sub} className="flex justify-between text-xs">
                    <span className="text-gray-500">{sub}</span>
                    <span className={pct(s.correct,s.total)>=70?'text-green-400':pct(s.correct,s.total)>=50?'text-orange-400':'text-red-400'}>
                      {pct(s.correct,s.total)}%
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Flashcard mastery */}
      <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div className="text-gray-300 text-sm font-medium mb-3">Flashcard Mastery</div>
        <div className="flex gap-6 mb-3">
          <div><div className="text-green-400 text-xl font-semibold">{flashStats.know}</div><div className="text-gray-500 text-xs">Know it</div></div>
          <div><div className="text-orange-400 text-xl font-semibold">{flashStats.sorta}</div><div className="text-gray-500 text-xs">Sorta</div></div>
          <div><div className="text-red-400 text-xl font-semibold">{flashStats.nope}</div><div className="text-gray-500 text-xs">Nope</div></div>
          <div><div className="text-gray-400 text-xl font-semibold">{flashStats.total-flashStats.know-flashStats.sorta-flashStats.nope}</div><div className="text-gray-500 text-xs">Unseen</div></div>
        </div>
        <ProgressBar value={flashStats.know} max={flashStats.total} domain="secure" className="mb-1"/>
        <div className="text-gray-600 text-xs">{pct(flashStats.know,flashStats.total)}% mastered</div>
      </div>

      {/* Exam history */}
      <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div className="text-gray-300 text-sm font-medium mb-3">Exam History</div>
        {recentExams.length===0?(
          <div className="text-gray-600 text-sm">No exam attempts yet.</div>
        ):(
          <div className="space-y-2">
            {recentExams.map((e,i)=>(
              <div key={i} className="flex items-center justify-between py-2 border-b border-gray-800 last:border-0">
                <div className="text-gray-500 text-xs">{e.date||new Date(e.ts).toLocaleDateString()}</div>
                <div className="flex items-center gap-3">
                  <div className={`text-sm font-semibold ${e.score>=72?'text-green-400':'text-red-400'}`}>{e.score}%</div>
                  <div className={`text-xs px-2 py-0.5 rounded ${e.score>=72?'bg-green-400/10 text-green-400':'bg-red-400/10 text-red-400'}`}>
                    {e.score>=72?'PASS':'FAIL'}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Notes ─────────────────────────────────────────────────────────────────────
function Notes(){
  const[notes,setNotes]=useStore('notes',{});
  const[domain,setDomain]=useState('secure');
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState('');

  const current=notes[domain]||'';

  const startEdit=()=>{setDraft(current);setEditing(true)};
  const save=()=>{setNotes(n=>({...n,[domain]:draft}));setEditing(false)};
  const discard=()=>{setEditing(false);setDraft(current)};

  return(
    <div className="p-4 md:p-6 max-w-3xl">
      <h1 className="text-gray-100 text-xl font-semibold mb-6">Notes</h1>
      <div className="flex gap-2 mb-5 flex-wrap">
        {Object.entries(DOMAINS).map(([k,d])=>(
          <button key={k} onClick={()=>{setDomain(k);setEditing(false)}}
            className={`text-xs px-3 py-1.5 rounded border transition-colors ${domain===k?`${d.border} ${d.color} ${d.bg}`:'border-gray-700 text-gray-500 hover:border-gray-500'}`}>
            {d.label}
          </button>
        ))}
      </div>

      <div className="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800">
          <div className="flex items-center gap-2">
            <Tag domain={domain}/>
            <span className="text-gray-400 text-sm">Notes</span>
          </div>
          {!editing?(
            <button onClick={startEdit} className="text-xs text-gray-500 hover:text-gray-300 border border-gray-700 px-2 py-1 rounded hover:border-gray-500">Edit</button>
          ):(
            <div className="flex gap-2">
              <button onClick={save} className="text-xs text-green-400 border border-green-400/40 px-2 py-1 rounded hover:bg-green-400/10">Save</button>
              <button onClick={discard} className="text-xs text-gray-500 border border-gray-700 px-2 py-1 rounded hover:border-gray-500">Discard</button>
            </div>
          )}
        </div>
        {editing?(
          <textarea value={draft} onChange={e=>setDraft(e.target.value)}
            className="w-full bg-transparent text-gray-300 text-sm p-4 min-h-64 resize-none border-none"
            placeholder={`Notes for ${DOMAINS[domain].label} Architecture...\n\nUse plain text or markdown-style formatting.\n- Bullet points work\n** Bold text **\n\nExam tips, gotchas, service comparisons...`}/>
        ):(
          <div className="p-4 min-h-64">
            {current?(
              <pre className="text-gray-300 text-sm whitespace-pre-wrap font-mono leading-relaxed">{current}</pre>
            ):(
              <div className="text-gray-700 text-sm">No notes yet for {DOMAINS[domain].label}. Click Edit to start.</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function Leaderboard({quizHistory,examHistory,streak}){
  const milestones=[
    {label:'First Quiz',done:quizHistory.length>=1,icon:'◉'},
    {label:'10 Questions',done:quizHistory.length>=10,icon:'◉'},
    {label:'50 Questions',done:quizHistory.length>=50,icon:'◉'},
    {label:'100 Questions',done:quizHistory.length>=100,icon:'◉'},
    {label:'First Exam',done:examHistory.length>=1,icon:'◎'},
    {label:'First PASS',done:examHistory.some(e=>e.score>=72),icon:'◎'},
    {label:'3-Day Streak',done:streak>=3,icon:'◆'},
    {label:'7-Day Streak',done:streak>=7,icon:'◆'},
    {label:'80%+ Exam Score',done:examHistory.some(e=>e.score>=80),icon:'★'},
    {label:'90%+ Exam Score',done:examHistory.some(e=>e.score>=90),icon:'★'},
    {label:'Flashcard Master (20 known)',done:(S.get('flash_conf')||[]).filter(f=>f.conf==='know').length>=20,icon:'⬜'},
  ];

  const examBest=examHistory.length?Math.max(...examHistory.map(e=>e.score)):null;
  const totalCorrect=quizHistory.filter(h=>h.correct).length;
  const accuracy=quizHistory.length?pct(totalCorrect,quizHistory.length):0;

  return(
    <div className="p-4 md:p-6 max-w-2xl space-y-6">
      <h1 className="text-gray-100 text-xl font-semibold">Personal Progress</h1>

      <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
        {[
          {label:'Questions',val:quizHistory.length,color:'text-green-400'},
          {label:'Accuracy',val:`${accuracy}%`,color:'text-cyan-400'},
          {label:'Best Exam',val:examBest!==null?`${examBest}%`:'—',color:'text-orange-400'},
          {label:'Streak',val:`${streak}d`,color:'text-pink-400'},
        ].map(s=>(
          <div key={s.label} className="bg-gray-900 border border-gray-800 rounded-lg p-3 text-center">
            <div className={`${s.color} text-2xl font-semibold`}>{s.val}</div>
            <div className="text-gray-600 text-xs mt-1">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div className="text-gray-300 text-sm font-medium mb-4">Milestones</div>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
          {milestones.map((m,i)=>(
            <div key={i} className={`flex items-center gap-2 text-sm py-1.5 border-b border-gray-800/50 last:border-0 ${m.done?'text-gray-200':'text-gray-600'}`}>
              <span className={m.done?'text-green-400':'text-gray-700'}>{m.done?'✓':'○'}</span>
              <span>{m.icon}</span>
              {m.label}
            </div>
          ))}
        </div>
      </div>

      {examHistory.length>0&&(
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-4">
          <div className="text-gray-300 text-sm font-medium mb-3">Exam Score History</div>
          <div className="flex items-end gap-1 h-20">
            {examHistory.slice(-10).map((e,i)=>(
              <div key={i} className="flex-1 flex flex-col items-center gap-1">
                <div className={`w-full rounded-sm ${e.score>=72?'bg-green-400':'bg-red-400'}`} style={{height:`${Math.max(4,e.score*0.7)}%`}}/>
                <div className="text-xs text-gray-600" style={{fontSize:'9px'}}>{e.score}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-between text-xs text-gray-600 mt-1">
            <span>{examHistory.length} attempts</span>
            <span>Pass line: 72%</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,onReset}){
  const[confirm,setConfirm]=useState(false);

  const toggle=(k)=>setSettings(s=>({...s,[k]:!s[k]}));
  const update=(k,v)=>setSettings(s=>({...s,[k]:v}));

  return(
    <div className="p-4 md:p-6 max-w-xl space-y-6">
      <h1 className="text-gray-100 text-xl font-semibold">Settings</h1>

      <div className="bg-gray-900 border border-gray-800 rounded-lg divide-y divide-gray-800">
        <div className="px-4 py-3 flex items-center justify-between">
          <div>
            <div className="text-gray-200 text-sm">Exam Target Date</div>
            <div className="text-gray-500 text-xs">When are you sitting SAA-C03?</div>
          </div>
          <input type="date" value={settings.targetDate||''} onChange={e=>update('targetDate',e.target.value)}
            className="bg-gray-800 border border-gray-700 text-gray-300 text-sm px-2 py-1 rounded"/>
        </div>

        {[
          {k:'studyReminders',label:'Study Reminders',sub:'Daily browser notifications'},
          {k:'showExplanations',label:'Show Explanations',sub:'Immediately after answering'},
          {k:'adaptiveQuiz',label:'Adaptive Mode',sub:'Weight weak domains higher'},
        ].map(s=>(
          <div key={s.k} className="px-4 py-3 flex items-center justify-between">
            <div>
              <div className="text-gray-200 text-sm">{s.label}</div>
              <div className="text-gray-500 text-xs">{s.sub}</div>
            </div>
            <button onClick={()=>toggle(s.k)}
              className={`w-10 h-5 rounded-full transition-colors relative ${settings[s.k]?'bg-green-400':'bg-gray-700'}`}>
              <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-transform ${settings[s.k]?'translate-x-5':'translate-x-0.5'}`}/>
            </button>
          </div>
        ))}
      </div>

      {settings.targetDate&&(()=>{
        const days=Math.ceil((new Date(settings.targetDate)-new Date())/86400000);
        return days>0?(
          <div className="bg-orange-400/10 border border-orange-400/30 rounded-lg px-4 py-3">
            <div className="text-orange-400 text-sm font-medium">{days} days until exam</div>
            <div className="text-orange-400/70 text-xs mt-0.5">Stay consistent. {Math.round(days/7)} weeks remaining.</div>
          </div>
        ):null;
      })()}

      <div className="bg-gray-900 border border-red-400/20 rounded-lg p-4">
        <div className="text-red-400 text-sm font-medium mb-1">Danger Zone</div>
        <div className="text-gray-500 text-xs mb-3">This will delete all quiz history, exam attempts, flashcard ratings, and notes.</div>
        {!confirm?(
          <button onClick={()=>setConfirm(true)} className="text-sm border border-red-400/40 text-red-400 px-4 py-2 rounded hover:bg-red-400/10 transition-colors">
            Reset All Progress
          </button>
        ):(
          <div className="flex gap-2">
            <button onClick={()=>{onReset();setConfirm(false)}} className="text-sm bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition-colors">
              Confirm Reset
            </button>
            <button onClick={()=>setConfirm(false)} className="text-sm border border-gray-700 text-gray-400 px-4 py-2 rounded hover:border-gray-500">
              Cancel
            </button>
          </div>
        )}
      </div>

      <div className="text-gray-700 text-xs">
        Data stored in {window.storage?'Claude artifact storage':'localStorage'}. All progress is local to this browser.
      </div>
    </div>
  );
}

function App(){

  const[examHistory,setExamHistory]=useStore('exam_history',[]);

  const[streak,setStreak]=useStore('streak',0);
  const[lastStudy,setLastStudy]=useStore('last_study','');

  // Streak logic
  useEffect(()=>{
    const td=today();
    if(lastStudy===td)return;
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const ystr=yesterday.toISOString().slice(0,10);
    setStreak(lastStudy===ystr?s=>s+1:1);
    setLastStudy(td);
  },[]);

  const handleReset=()=>{
    ['quiz_history','exam_history','flash_conf','notes','lesson_read'].forEach(k=>{
      window.storage?window.storage.setItem(k,'null'):localStorage.setItem(k,'null');
    });
    setQuizHistory([]);setExamHistory([]);setStreak(0);
  };

  const renderPage=()=>{
    switch(active){
      case'dashboard':return<Dashboard quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf} streak={streak} setActive={setActive}/>;
      case'lesson':return<Lesson/>;
      case'quiz':return<Quiz onAnswer={a=>setQuizHistory(h=>[...h,a])}/>;
      case'flashcards':return<Flashcards/>;
      case'exam':return<PracticeExam onExamComplete={r=>setExamHistory(h=>[...h,r])}/>;
      case'analytics':return<Analytics quizHistory={quizHistory} examHistory={examHistory} flashConf={flashConf}/>;
      case'notes':return<Notes/>;
      case'leaderboard':return<Leaderboard quizHistory={quizHistory} examHistory={examHistory} streak={streak}/>;
      case'settings':return<Settings settings={settings} setSettings={setSettings} onReset={handleReset}/>;
      default:return null;
    }
  };

  return(
    <div className="flex min-h-screen bg-gray-950 font-mono">
      <Sidebar active={active} setActive={setActive} streak={streak}/>
      <main className="flex-1 overflow-y-auto pb-16 md:pb-0">
        {renderPage()}
      </main>
      <BottomNav active={active} setActive={setActive}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
