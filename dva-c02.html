const LESSONS=[
  {day:1,domain:'dev',title:'Lambda Fundamentals & Execution Model',content:`**What Lambda actually is:**
- A managed compute service that runs your code in response to events, without you provisioning or managing servers
- You are billed for the number of invocations and the compute time consumed (duration × memory), rounded to the nearest millisecond
- Supports multiple runtimes (Node.js, Python, Java, Go, .NET, Ruby, custom runtimes) and container images up to 10GB (pulled from ECR)

**The execution lifecycle — memorize this:**
1. INIT phase: a new execution environment is created — the runtime starts, and any code OUTSIDE the handler function runs exactly once
2. INVOKE phase: the handler function runs, once per event, using whatever was set up during INIT
3. The execution environment is FROZEN (not destroyed) after the response is returned, and can be reused for a later invocation — this is a "warm start"
4. If no invocation arrives for a while, AWS eventually destroys the environment — the next invocation needs a fresh INIT ("cold start")

**Cold starts, and how to reduce them:**
- A cold start = a brand-new environment must go through INIT before handling the invocation — adds latency (typically tens to hundreds of ms, more for large packages/JVM runtimes)
- Reduce impact with: Provisioned Concurrency (pre-warms N environments so they're always ready), smaller deployment packages, fewer/lighter dependencies, and moving expensive setup (DB connections, SDK clients) to the global scope so it only runs once per environment, not once per invocation

~~~
// Node.js — WRONG: reconnects every invocation
exports.handler = async (event) => {
  const client = new DynamoDBClient({});
  return client.send(new GetItemCommand(params));
};

// RIGHT: client created once during INIT, reused on warm invocations
const client = new DynamoDBClient({});
exports.handler = async (event) => {
  return client.send(new GetItemCommand(params));
};
~~~

**Memory, CPU, and duration:**
- CPU is allocated proportionally to configured memory — there is no separate "vCPU" setting
- Raising memory on a CPU-bound function can reduce duration enough that total cost (which is duration × price-per-ms-per-memory) stays flat or even drops
- Timeout can be set up to 15 minutes; a function that legitimately needs to run longer should be redesigned (e.g. Step Functions orchestrating multiple shorter Lambda calls, or a container/ECS task)

**Concurrency controls:**
- Unreserved account concurrency: the default shared pool (soft limit, raisable via a quota increase request)
- Reserved concurrency: guarantees AND caps a specific function's concurrent executions, carved out of the account pool
- Provisioned concurrency: pre-initializes a set number of environments so they're always warm — the only setting that actually removes cold starts, at an added cost even when idle

**Sharing code across functions — Lambda Layers:**
- A layer packages libraries/dependencies (or any shared code) as a .zip, extracted to /opt at runtime
- Up to 5 layers can be attached to a single function; layers are versioned and can be shared across an account or publicly

**Exam traps:**
- "Increase timeout" is not the fix for every slow function — check whether the real cause is a cold start, a slow downstream dependency, or CPU starvation from low memory
- $LATEST should never be invoked directly by production traffic — always use a published version or an alias
- Environment variables are the standard way to vary behavior per environment (dev/staging/prod) without maintaining separate code packages`},
  {day:2,domain:'dev',title:'API Gateway Deep Dive',content:`**REST API vs HTTP API — know the trade-offs:**
- REST API: full feature set — request validation, API keys/usage plans, WAF integration, private APIs, edge-optimized or regional endpoints, response caching
- HTTP API: lower latency, lower cost (up to ~70% cheaper), simpler feature set, built for proxy integrations to Lambda or an HTTP backend, supports JWT authorizers natively
- WebSocket API: a third type, for persistent bidirectional connections (chat apps, live dashboards)

**Integration types:**
- Lambda proxy integration: the entire request (headers, body, path params, query string) is passed to Lambda as an event object, and Lambda's response must match a specific shape (statusCode, headers, body)
- Lambda custom (non-proxy) integration: API Gateway uses mapping templates to transform the request/response, decoupling the API's shape from the Lambda function's input/output
- HTTP integration: proxies to an existing HTTP endpoint (e.g. an ALB or a public API) without Lambda involved at all
- Mock integration: returns a canned response with no backend call at all — used for CORS preflight (OPTIONS) responses or stubbing

**Request validation:**
- Configure a request validator on a method to check required query string parameters/headers and validate the body against a JSON Schema model
- Invalid requests are rejected with a 400 BEFORE the backend integration is ever invoked — saves unnecessary Lambda invocations and simplifies backend code

**CORS — a frequent source of confusion:**
- Browsers block cross-origin responses unless Access-Control-Allow-Origin (and related headers) are present
- Enabling "CORS" in the console configures the OPTIONS preflight (mock) response — but for Lambda PROXY integrations, the actual GET/POST/etc. response headers must be returned by your function code itself, since API Gateway passes the response through mostly unmodified

~~~
// Example Lambda proxy response including CORS headers
return {
  statusCode: 200,
  headers: {
    'Access-Control-Allow-Origin': '*',
    'Content-Type': 'application/json'
  },
  body: JSON.stringify({ ok: true })
};
~~~

**Throttling & caching:**
- Account-level, stage-level, and method-level throttle limits (rate + burst) protect the backend from being overwhelmed
- Usage plans + API keys let you throttle/meter individual API consumers separately (common for a metered public API product)
- Response caching (REST APIs only) serves repeated identical GET requests from a per-stage cache for a configurable TTL, reducing backend load and latency

**Custom domains:**
- Base path mapping routes different URL paths under one custom domain to different APIs/stages (e.g. api.example.com/v1 → API A, /v2 → API B)
- Requires an ACM certificate (regional for REST/HTTP regional endpoints, us-east-1 for edge-optimized)

**Timeouts and long-running work:**
- API Gateway has a hard 29-second integration timeout — it cannot be increased
- For work that might take longer, decouple: return a job ID immediately, process asynchronously (SQS/Step Functions/async Lambda invoke), and expose a separate status-polling endpoint (or push updates via WebSockets/SNS)

**Exam traps:**
- Enabling CORS in the console is necessary but often not sufficient for Lambda proxy integrations — the function must also return the headers
- HTTP APIs don't support API keys/usage plans or request validation the way REST APIs do — pick REST API if you need those features`},
  {day:3,domain:'dev',title:'DynamoDB Data Modeling & Capacity',content:`**Core concepts:**
- A table has a primary key: either just a partition key (simple), or a partition key + sort key (composite) — items with the same partition key are stored together and can be range-queried by sort key
- DynamoDB is schemaless beyond the primary key — different items in the same table can have different attributes
- Throughput is spread across partitions based on the partition key's distribution — an uneven key distribution causes "hot partitions"

**Query vs Scan — always prefer Query:**
- Query: looks up items by partition key (optionally narrowed by a sort key condition) — efficient, reads only matching items
- Scan: reads every item in the table (or index), optionally applying a FilterExpression AFTER reading — expensive, and you're billed for every item READ, not just what's returned
- If you find yourself needing to Scan+Filter for a common access pattern, that's usually a sign the table/index design needs to change

**Secondary indexes:**
- Global Secondary Index (GSI): its own partition key (and optional sort key), independent of the base table's key — supports a completely different access pattern; eventually consistent by default; can be added or removed after table creation
- Local Secondary Index (LSI): same partition key as the base table, a different sort key — must be defined at table creation time, can't be added later; supports strongly consistent reads

**Capacity modes:**
- On-demand: pay per request, instantly scales to handle bursts, zero capacity planning — best for unpredictable or spiky traffic
- Provisioned (with optional auto scaling): set RCU/WCU, cheaper at steady predictable load, but can throttle (ProvisionedThroughputExceededException) if traffic spikes faster than auto scaling reacts

**Consistency:**
- Eventually consistent reads (default): may briefly return stale data, cost 0.5 RCU per 4KB
- Strongly consistent reads: always reflect the latest successful write, cost 1 RCU per 4KB, not available on GSIs

**Conditional writes & optimistic locking:**
~~~
// Only update if the item's current version matches what we last read
UpdateItem:
  Key: { id: "order-123" }
  UpdateExpression: "SET price = :p, version = version + :one"
  ConditionExpression: "version = :expectedVersion"
  ExpressionAttributeValues: { ":p": 49.99, ":expectedVersion": 3, ":one": 1 }
~~~
- If another writer already changed the item (version no longer matches), the call fails with ConditionalCheckFailedException — implementing optimistic locking without an external lock service

**DynamoDB Streams:**
- A time-ordered log of item-level changes (INSERT/MODIFY/REMOVE), retained 24 hours
- Can trigger a Lambda function per batch of records — used for real-time processing, replication to another system, or maintaining a derived/aggregated view

**Caching in front of DynamoDB:**
- DAX: DynamoDB-specific, API-compatible, write-through cache — microsecond reads, minimal code changes, only works with DynamoDB
- ElastiCache: general-purpose cache, more code changes required, but works with any data source

**Exam traps:**
- FilterExpression does not reduce RCU cost — it filters after reading, so a non-selective filter still charges for every item read
- A hot partition is a key-distribution problem, not a capacity problem — throwing more provisioned capacity at it doesn't fix uneven access patterns`},
  {day:4,domain:'dev',title:'Messaging: SQS, SNS & EventBridge',content:`**Why decouple with messaging at all:**
- Point-to-point synchronous calls tightly couple services — if the downstream is slow or down, the caller is affected immediately
- Messaging/queueing lets producers and consumers operate independently, absorbs traffic spikes, and enables retry without losing work

**SQS — queues:**
- Standard queue: at-least-once delivery, best-effort ordering, nearly unlimited throughput — expect occasional duplicates and out-of-order delivery, so consumers must be idempotent
- FIFO queue: exactly-once processing (with deduplication), strict ordering within a message group, throughput more limited (though high-throughput mode raises this significantly)
- Visibility timeout: how long a received message is hidden from other consumers before it reappears if not deleted — tune it to be longer than your typical processing time
- Long polling (ReceiveMessageWaitTimeSeconds > 0, up to 20s): waits for a message instead of returning empty immediately, cutting wasted API calls
- Dead-letter queue (DLQ): a redrive policy with maxReceiveCount automatically moves messages that keep failing to a separate queue for inspection, instead of looping forever or blocking healthy messages

**SNS — pub/sub:**
- A topic with multiple subscribers (Lambda, SQS, HTTP/S, email, SMS) — publishing once fans a message out to every subscriber in parallel (fan-out pattern)
- Subscription filter policies let each subscriber receive only messages whose attributes match a JSON filter, without any publisher/subscriber code changes
- A very common pattern: SNS → multiple SQS queues (one per consumer team) — combines fan-out with the durability/retry semantics of a queue per consumer

~~~
// Common fan-out: SNS topic subscribed by 3 SQS queues
OrderPlaced (SNS topic)
  ├─ subscription → SQS: Inventory queue
  ├─ subscription → SQS: Email queue
  └─ subscription → SQS: Analytics queue
~~~

**EventBridge — event routing:**
- A central event bus receives events from AWS services, your own applications (PutEvents), and SaaS partners
- Rules match events using declarative event patterns (matching on source, detail-type, or specific field values) and route matching events to one or more targets
- Scheduled rules (cron()/rate() expressions) invoke targets on a fixed timer, functioning like managed cron — no incoming event required
- Compared to SNS: EventBridge is built for many-source, pattern-based routing across a broader ecosystem (including third-party SaaS), while SNS is simpler pub/sub fan-out from your own publishers

**Choosing between them:**
- Need strict ordering + exactly-once? → SQS FIFO
- Need one event delivered to many independent subscribers? → SNS fan-out (or EventBridge if sources/patterns are more complex)
- Need to route based on rich event content from many different sources, including third-party SaaS, or run on a schedule? → EventBridge
- Need a buffer/backlog so consumers process at their own pace? → SQS (SNS and EventBridge don't hold undelivered messages the way a queue does)

**Exam traps:**
- SNS does not retain messages for slow consumers the way SQS does — if you need buffering, put an SQS queue behind the SNS subscription
- A standard SQS queue can and will occasionally deliver a message more than once — this is normal, not a bug, and the consumer must handle it idempotently`},
  {day:5,domain:'dev',title:'Orchestration with Step Functions',content:`**Why orchestrate instead of chaining Lambda calls in code:**
- Hand-rolled orchestration (one Lambda invoking the next synchronously) is hard to visualize, hard to retry correctly, and mixes business logic with control flow
- Step Functions state machines model the workflow declaratively (as JSON, Amazon States Language) with built-in retry, error handling, parallelism, and a visual execution history for debugging

**Core state types:**
- Task: does work — invokes a Lambda function, or calls another AWS service directly (DynamoDB, SNS, ECS, etc.) via optimized/native SDK integrations, without needing a Lambda wrapper for many services
- Choice: branches based on the input, similar to if/else
- Parallel: runs multiple branches concurrently, waiting for all to finish
- Map: runs the same set of steps over each item in an array (dynamic parallelism sized to the input)
- Wait: pauses for a fixed time or until a timestamp
- Succeed / Fail: terminal states

**Retry and error handling — built in, not hand-coded:**
~~~
"ChargeCard": {
  "Type": "Task",
  "Resource": "arn:aws:lambda:...:function:chargeCard",
  "Retry": [{ "ErrorEquals": ["States.Timeout"], "IntervalSeconds": 2, "MaxAttempts": 3, "BackoffRate": 2.0 }],
  "Catch": [{ "ErrorEquals": ["States.ALL"], "Next": "RefundAndNotify" }],
  "Next": "ShipOrder"
}
~~~
- Retry: automatically re-attempts a failed step on specific errors, with configurable backoff — no custom retry loop needed
- Catch: routes to a fallback state on error instead of failing the whole execution — used for compensating actions (refunds, alerts) or graceful degradation

**Standard vs Express Workflows:**
- Standard: up to 1 year execution duration, priced per state transition, exactly-once semantics, full execution history retained for auditing — good for order processing, human-approval workflows, anything long-running or requiring an audit trail
- Express: up to 5 minutes duration, priced by duration + memory + requests (like Lambda), at-least-once semantics, optimized for very high-volume, short-duration event processing (e.g. IoT data pipelines, streaming transformations)

**Synchronous vs asynchronous Express:**
- Asynchronous Express: fire-and-forget, like Standard, but for short workflows
- Synchronous Express: the caller waits for the result inline — useful when an API Gateway request needs a workflow's result before responding

**Common developer use cases:**
- Multi-step order processing with compensating transactions on failure (saga pattern)
- Fan-out processing of many items via Map state instead of a hand-rolled loop
- Coordinating a human-in-the-loop approval step (a Task waits on a callback token until an external system calls SendTaskSuccess/SendTaskFailure)

**Exam traps:**
- Standard Workflows are NOT cheaper for high-volume, sub-second workflows — that's what Express is for
- Retry/Catch happen in the state machine definition, not in application code — a common exam distractor is choosing "wrap the Lambda code in try/catch" when the actual best-practice answer is the Step Functions Retry/Catch fields`},
  {day:6,domain:'dev',title:'Infrastructure as Code for Serverless: SAM',content:`**What SAM is and isn't:**
- SAM (Serverless Application Model) is an open-source framework that EXTENDS CloudFormation with simplified resource types for serverless applications
- A SAM template is still a CloudFormation template — SAM resource types (AWS::Serverless::Function, ::Api, ::SimpleTable) get "transformed" into the equivalent full CloudFormation resources at deploy time
- SAM is not a replacement for CloudFormation — it's shorthand plus a purpose-built CLI

**Core SAM resource types:**
- AWS::Serverless::Function: defines a Lambda function — handler, runtime, code URI, memory, timeout, and Events (triggers like an API endpoint, an S3 event, a schedule) in one block, instead of separately wiring a Lambda resource + permissions + trigger resource by hand
- AWS::Serverless::Api: defines an API Gateway REST API, often implicitly created just by declaring an Api event on a function
- AWS::Serverless::SimpleTable: a simplified DynamoDB table declaration for basic cases

**The SAM CLI workflow:**
~~~
sam init          # scaffold a new serverless app from a template
sam build          # resolve dependencies, prepare deployment artifacts
sam local invoke    # run a function locally in a Docker container matching the Lambda runtime
sam local start-api  # emulate API Gateway + Lambda locally for end-to-end local testing
sam deploy --guided  # package artifacts to S3/ECR and deploy the CloudFormation stack
~~~

**Local testing before deploying:**
- sam local invoke runs the function inside a Docker container that emulates the real Lambda execution environment, accepting a sample event JSON file — catches obvious bugs before spending a deploy cycle
- sam local start-api spins up a local API Gateway emulator in front of your functions for full request/response testing

**Safe deployments with DeploymentPreference:**
~~~
MyFunction:
  Type: AWS::Serverless::Function
  Properties:
    AutoPublishAlias: live
    DeploymentPreference:
      Type: Canary10Percent5Minutes
      Alarms:
        - !Ref ErrorRateAlarm
~~~
- AutoPublishAlias automatically publishes a new version and updates the named alias on every deploy
- DeploymentPreference (backed by CodeDeploy under the hood) declares a canary/linear traffic-shifting strategy directly in the template, with automatic rollback if the referenced CloudWatch alarm fires during the shift

**Parameters for multi-environment deploys:**
- The same template can be deployed to dev/staging/prod by supplying different Parameter values (e.g. a different DynamoDB table name or Lambda memory size per environment) — avoiding maintaining separate templates

**Exam traps:**
- sam deploy still ultimately calls CloudFormation — everything you know about change sets, rollback behavior, and stack states still applies to a SAM-deployed stack
- SAM is specifically for serverless resources — a stack that's mostly EC2/VPC/RDS infrastructure is typically better served by plain CloudFormation or CDK`},
  {day:7,domain:'dev',title:'Containers for Developers: ECS, EKS, Fargate & ECR',content:`**Why containers, and how AWS runs them:**
- Containers package an application with its dependencies for consistent behavior across environments — Docker is the de facto standard image format
- Amazon ECS (Elastic Container Service) and Amazon EKS (Elastic Kubernetes Service) are AWS's two container orchestrators — ECS uses AWS-native concepts (task definitions, services, clusters), EKS runs standard Kubernetes

**Launch types — where your containers actually run:**
- EC2 launch type: you manage the underlying EC2 instances (patching, scaling, capacity) that host your containers — more control, more operational overhead
- Fargate launch type: serverless containers — you define the task/pod's CPU/memory needs and AWS provisions and manages the compute, no EC2 fleet to manage at all — works with both ECS and EKS

**ECS core concepts:**
- Task definition: a blueprint (JSON) describing one or more containers — image, CPU/memory, environment variables, port mappings, IAM roles. Task definitions are IMMUTABLE — every change registers a new revision
- Task: a running instance of a task definition
- Service: keeps a specified number of tasks running, integrates with a load balancer (auto-registers/deregisters task IPs with a target group), and manages deployments (rolling update, or blue/green via CodeDeploy)
- Cluster: a logical grouping of tasks/services (and, for EC2 launch type, the underlying instances)

**Two IAM roles you need to know for ECS/Fargate:**
- Task execution role: used by the ECS agent itself to pull the container image from ECR and write logs to CloudWatch — infrastructure-level permissions
- Task role: used by the application code INSIDE the container to call other AWS services (S3, DynamoDB, etc.) — application-level permissions, same idea as a Lambda execution role

**Amazon ECR:**
- A managed Docker/OCI image registry, integrated with IAM for push/pull access control
- Supports image scanning on push (basic, open-source based, or enhanced via Amazon Inspector) to surface known CVEs automatically
- Lifecycle policies auto-expire old/untagged images (e.g. "keep only the last 10 tagged images") to control storage cost

~~~
# Typical CodeBuild steps to build and push to ECR
aws ecr get-login-password | docker login --username AWS --password-stdin <account>.dkr.ecr.<region>.amazonaws.com
docker build -t my-app .
docker tag my-app:latest <account>.dkr.ecr.<region>.amazonaws.com/my-app:latest
docker push <account>.dkr.ecr.<region>.amazonaws.com/my-app:latest
~~~

**Lambda vs Fargate vs EC2 — when to pick which:**
- Lambda: short-lived, event-driven, bursty workloads, near-zero idle cost, 15-minute max duration
- Fargate: longer-running or steady-state containerized workloads, no server management, more control over runtime/dependencies than Lambda, no hard duration limit
- EC2 (self-managed or via ECS/EKS EC2 launch type): maximum control (custom AMIs, GPU instances, specific kernel needs), most operational responsibility

**Exam traps:**
- A task definition is immutable — "editing" it always means registering a new revision and updating the service to use it
- Fargate removes server management, but you still choose CPU/memory sizing per task — it isn't fully serverless in the "pay nothing when idle" Lambda sense, since a Fargate task that's running is billed continuously`},
  {day:8,domain:'security',title:'IAM Foundations for Developers',content:`**The four identity types:**
- Users: long-term credentials for a person or application
- Groups: collections of users sharing permissions (cannot be nested)
- Roles: temporary credentials, assumed by users, services, or external identities — no long-term password or access keys attached
- Policies: JSON documents defining Allow/Deny over Actions + Resources + Conditions

**Policy types you must distinguish:**
- Identity-based policies: attached to a user/group/role (AWS managed, customer managed, or inline)
- Resource-based policies: attached directly to a resource (S3 bucket policy, SQS queue policy, KMS key policy, Lambda resource policy) — the only type that can grant cross-account access on its own
- Permissions boundaries: set the MAXIMUM permissions an identity-based policy on that same identity can grant — a ceiling, never a grant
- Service Control Policies (SCPs): AWS Organizations guardrails limiting what member accounts can do, applying to every principal including root
- Session policies: passed when assuming a role via STS to further restrict just that session

**Policy evaluation — the exact order:**
1. Start from implicit DENY
2. An explicit DENY anywhere (identity, resource, SCP, boundary, session policy) → final DENY, no exceptions
3. An explicit ALLOW somewhere applicable, with no explicit deny anywhere → ALLOW
4. No explicit allow found → implicit DENY

**Roles and STS in practice, for a developer:**
- EC2/Lambda/ECS execution roles deliver temporary credentials automatically — the SDK's default credential provider chain finds them with zero code
- Cross-account access: Account A creates a role trusting Account B; a caller in B does sts:AssumeRole to get temporary creds scoped to A
- Session duration for AssumeRole defaults to 1 hour, configurable up to a 12-hour maximum on the role

**A worked example — least privilege for a Lambda function:**
~~~
{
  "Version": "2012-10-17",
  "Statement": [{
    "Effect": "Allow",
    "Action": ["dynamodb:GetItem", "dynamodb:PutItem"],
    "Resource": "arn:aws:dynamodb:us-east-1:123456789012:table/Orders"
  }]
}
~~~
- Scope both the Action list AND the Resource ARN to exactly what's needed — never attach AdministratorAccess "to be safe"

**Debugging AccessDenied:**
- Check for a Deny anywhere in the chain, not just whether an Allow exists
- For KMS specifically: BOTH the identity policy AND the key's own key policy must allow the action — a permissive identity policy alone is not enough
- Use the IAM Policy Simulator to dry-run whether a policy would allow/deny a specific action+resource before attaching it

**Exam traps:**
- SCPs never grant permissions — they only cap what CAN be allowed; you still need an identity/resource policy to actually grant access
- A permission boundary that "allows" an action does nothing on its own — it restricts, it never substitutes for a grant
- No attached policy = no permissions. IAM's default is deny-everything`},
  {day:9,domain:'security',title:'Encryption & KMS Deep Dive',content:`**Why encryption matters even with good IAM:**
- IAM answers "who can call the API?" — a logical/software-layer control
- Encryption answers "what happens if that control is bypassed, or someone gets the raw disk?" — a data-layer control
- Defense in depth: never rely on IAM alone for sensitive data; encryption means the raw bytes are worthless without the key

**KMS key types:**
- Customer managed key (CMK): full control — key policy, optional automatic annual rotation, can disable or schedule deletion
- AWS managed key (aws/service prefix): rotation is automatic but less configurable, cannot be deleted, policy is fixed
- AWS owned key: not visible or manageable by the customer at all — used internally by some services

**Envelope encryption — how large data actually gets encrypted:**
- KMS's direct Encrypt/Decrypt API is capped at 4KB — you can't send a whole file through it directly
- GenerateDataKey returns a plaintext data key (used locally, in memory, to encrypt your actual data fast with AES) plus that key's KMS-encrypted form, stored alongside the ciphertext for later decryption
- This means only a small key — not your actual payload — ever crosses the network to KMS

~~~
// Simplified envelope encryption flow
dataKey = kms.GenerateDataKey(keyId, keySpec="AES_256")
ciphertext = AES_encrypt(plaintextData, dataKey.Plaintext)
store(ciphertext, dataKey.CiphertextBlob)   // store both together
// later, to decrypt:
plaintextKey = kms.Decrypt(dataKey.CiphertextBlob)
plaintextData = AES_decrypt(ciphertext, plaintextKey)
~~~

**The KMS access-control gotcha:**
- Unlike most AWS services, a KMS key's OWN resource policy (key policy) acts as a primary gate
- Even a fully permissive IAM identity policy is not enough by itself — the key policy must also allow that principal (directly, or via the default "Enable IAM User Permissions" statement that delegates to IAM policies)
- This is one of the most common sources of unexpected AccessDenied errors on the exam and in real life

**Encryption at rest, made automatic:**
- S3 bucket default encryption (SSE-S3 or SSE-KMS) applies to every new object automatically, even if the uploader's PutObject call didn't specify encryption
- EBS "encryption by default" (a per-region account setting) auto-encrypts every new volume and snapshot

**Encryption in transit:**
- API Gateway's default endpoint is HTTPS-only — there's no way to call it over plain HTTP
- AWS does NOT automatically encrypt traffic between instances/containers inside a VPC — if you need TLS for "internal" service-to-service traffic, you must implement it yourself (app-level HTTPS or a service mesh with mTLS)

**Exam traps:**
- "The identity policy has an Allow, so it should work" is the classic KMS trap — always also check the key policy
- Only customer managed keys can be disabled/deleted or have their rotation and policy fully controlled`},
  {day:10,domain:'security',title:'Secrets Management: Secrets Manager & Parameter Store',content:`**The core problem they solve:**
- Hardcoded credentials in code, config files, or environment variables are a security liability — if leaked (a public repo, a log line, a screenshot), they must be treated as compromised and rotated
- Both services exist to centralize secret/config storage outside of application code, retrieved at runtime via the SDK

**AWS Secrets Manager:**
- Purpose-built for secrets that need rotation: database credentials, API keys, OAuth tokens
- Built-in, AWS-maintained rotation Lambda function templates for RDS, Redshift, and DocumentDB — enabling rotation is largely a configuration step (schedule + template), not custom development for the common case
- Costs per secret stored plus API calls — more expensive than Parameter Store, but you're paying for the rotation automation

**AWS Systems Manager Parameter Store:**
- General-purpose configuration storage: feature flags, endpoint URLs, non-sensitive or moderately sensitive config
- Standard parameters are free (up to a generous limit); SecureString parameters are encrypted via KMS
- No native automatic rotation workflow — if you need scheduled rotation, Secrets Manager is the better fit
- Supports hierarchical paths (e.g. /myapp/prod/db-host) for organizing configuration by environment

**When to pick which:**
- Need automatic rotation with minimal custom code (RDS/Redshift/DocumentDB)? → Secrets Manager
- Plain configuration values, or you're cost-sensitive and don't need built-in rotation? → Parameter Store
- Cross-account/cross-region secret sharing with replication? → Secrets Manager supports multi-region secret replication natively

**Retrieving secrets at runtime — the pattern:**
~~~
// Node.js — fetch a secret at cold start, cache it for the life of the environment
let cachedSecret;
const getDbPassword = async () => {
  if (cachedSecret) return cachedSecret;
  const resp = await secretsManagerClient.send(
    new GetSecretValueCommand({ SecretId: 'prod/db/password' })
  );
  cachedSecret = JSON.parse(resp.SecretString).password;
  return cachedSecret;
};
~~~
- Fetching once and caching in global scope (not on every invocation) avoids unnecessary API calls and latency, same principle as reusing SDK clients

**Incident response — a leaked secret:**
- Deleting a bad commit does not undo exposure — git history, forks, and caches may still have it, and anyone who saw it already has it
- The credential itself must be rotated/changed immediately; only after that is the leaked value truly neutralized

**Exam traps:**
- Parameter Store is not "worse" than Secrets Manager — it's the right, more cost-effective choice when you don't need rotation
- Secrets Manager's built-in rotation templates cover specific database engines — a fully custom secret (e.g. a third-party API key) still needs a custom rotation Lambda if automatic rotation is required`},
  {day:11,domain:'security',title:'Cognito: Authentication & Authorization',content:`**Two Cognito building blocks, two different jobs:**
- User Pool: a user directory — handles sign-up, sign-in, password policies, MFA, email/phone verification, and issues JWTs (ID token, access token, refresh token) on successful authentication
- Identity Pool (Federated Identities): exchanges a token (from a User Pool, or a third-party IdP like Google/Facebook/SAML) for temporary, scoped AWS credentials via STS — used when the app needs to call AWS services directly (e.g. upload to S3 from the client)

**They are commonly used together but solve different problems:**
- User Pool alone: enough if you just need login + an API that validates the user's identity (e.g. via a Cognito authorizer on API Gateway)
- User Pool + Identity Pool: needed when the client also needs to call AWS services (S3, DynamoDB) directly with temporary IAM credentials scoped to that specific user

**Which token goes where:**
- ID token: identity claims about the user (who they are) — used by the app itself, or as an alternative authorizer input
- Access token: authorizes calls to resource servers/APIs — sent in the Authorization header to a Cognito-authorizer-protected API Gateway endpoint
- Refresh token: used only to obtain new ID/access tokens when they expire — never sent to your API directly

**Scoping AWS access per user with policy variables:**
~~~
{
  "Effect": "Allow",
  "Action": ["s3:GetObject", "s3:PutObject"],
  "Resource": "arn:aws:s3:::my-app-bucket/private/\${cognito-identity.amazonaws.com:sub}/*"
}
~~~
- A single IAM role attached to the Identity Pool's "authenticated" role can dynamically scope every user to only their own S3 prefix, using the caller's unique identity ID as a policy variable — no per-user IAM role needed

**Security configuration on the User Pool:**
- Password complexity policy and required MFA are configured directly on the User Pool
- Email/phone verification can be required before a user is allowed to sign in
- Cognito supports federation from external IdPs (SAML, OIDC, social logins) so the User Pool becomes a single front door regardless of how the user actually authenticated

**Exam traps:**
- Identity Pools do NOT handle sign-up/sign-in themselves — that's the User Pool's job; Identity Pools only exchange an already-issued token for AWS credentials
- Sending the refresh token to your backend API is a common wrong-answer distractor — only ID/access tokens go to APIs`},
  {day:12,domain:'security',title:'VPC Networking Essentials for Developers',content:`**The basics every developer needs:**
- A VPC is a private network you define, split into subnets across Availability Zones
- Public subnet: has a route to an Internet Gateway. Private subnet: does not — reachability to the internet is a ROUTE TABLE property, not a security group property
- Security Groups: stateful, instance/ENI-level, allow-only rules, evaluate all rules together
- Network ACLs (NACLs): stateless, subnet-level, support explicit ALLOW and DENY, rules evaluated in ascending numeric order until a match

**Getting Lambda (or any compute) to reach private resources:**
- By default, Lambda runs outside any customer VPC and can't reach VPC-only resources (like a private RDS instance)
- Attaching VPC configuration (specific subnets + a security group) makes Lambda attach ENIs inside that VPC, giving it network access to private resources
- Trade-off: once VPC-attached, Lambda only has the networking of those subnets — if they're private with no NAT Gateway route, the function LOSES the outbound internet access it had by default before being VPC-attached

**Private, cost-effective access to AWS services:**
- VPC Gateway Endpoint: for S3 and DynamoDB specifically — routes traffic privately within AWS, no NAT Gateway data-processing charges, added as a route table target
- VPC Interface Endpoint (PrivateLink): an ENI with a private IP in your subnet, for private connectivity to most other AWS services (and to your own Private APIs / NLB-fronted services)

**Connecting VPCs and on-premises networks:**
- VPC Peering: private, non-transitive connection between two VPCs — requires route table entries on both sides, and is NOT transitive (A↔B and B↔C does not mean A↔C)
- Direct Connect: dedicated physical link to AWS, bypasses the public internet entirely, consistent low latency
- Site-to-Site VPN: encrypted tunnel over the public internet, faster to provision, commonly used as a Direct Connect failover

**A common developer debugging scenario:**
~~~
Symptom: Lambda in a VPC times out calling a public third-party API,
         but worked fine before the function was VPC-attached.
Root cause: private subnet has no route to a NAT Gateway.
Fix: add a NAT Gateway in a public subnet, and a route from the
     private subnet's route table to that NAT Gateway for 0.0.0.0/0.
~~~

**Private APIs:**
- API Gateway Private APIs are only reachable via a VPC interface endpoint inside a specified VPC, combined with a resource policy — never exposed to the public internet, useful for internal-only services

**Exam traps:**
- "The security group must be blocking it" is a common wrong-first-guess — always check the route table first when the symptom is "can't reach the internet at all," since SGs only control what's allowed once traffic can already be routed
- NACLs evaluate in rule-number order and stop at the first match — a broad ALLOW at a low rule number can accidentally override a more specific DENY at a higher number`},
  {day:13,domain:'security',title:'Application Security: WAF, Shield, GuardDuty, Macie & Compliance Tooling',content:`**Perimeter protection — filtering bad traffic before it reaches your app:**
- AWS WAF: inspects HTTP(S) requests against rules — AWS Managed Rules cover common attack patterns (SQL injection, XSS), custom rules match your own conditions, and rate-based rules automatically block IPs exceeding a request threshold. Attaches to CloudFront, API Gateway, and ALB
- AWS Shield Standard: automatic, free, always-on protection against common network/transport-layer DDoS attacks for every AWS customer — no configuration needed
- AWS Shield Advanced: paid tier adding more advanced detection/mitigation, 24/7 DDoS Response Team access, and cost protection against scaling charges incurred during an attack

**Detection and monitoring services — know what each one actually does:**
- Amazon GuardDuty: agentless, ML-based threat detection — continuously analyzes CloudTrail (management + data events), VPC Flow Logs, and DNS logs, generating findings for things like compromised credentials, reconnaissance, or communication with known-malicious IPs
- Amazon Macie: automatically discovers and classifies sensitive data (PII, credentials, financial data) stored in S3 using ML and pattern matching
- AWS Config: continuously evaluates resource CONFIGURATION against rules (managed or custom), flagging drift/non-compliance — e.g. "no S3 bucket should be publicly readable"
- AWS CloudTrail: the complete audit log of API activity — who called what, when, from where, and whether it succeeded. The 90-day event history in the console is only a browsing convenience; durable retention requires delivering logs to S3

**A quick way to keep these straight:**
- "Is this API call allowed/logged?" → CloudTrail
- "Is this resource's current configuration compliant?" → Config
- "Is there malicious activity happening right now?" → GuardDuty
- "Is there sensitive data sitting somewhere it shouldn't be?" → Macie
- "Is this HTTP request malicious?" → WAF (prevention) vs GuardDuty (detection after the fact)

**Durable, tamper-resistant audit log retention:**
~~~
Compliance requirement: retain CloudTrail logs for 7 years, protected
from deletion even by an administrator.
Solution: deliver CloudTrail to an S3 bucket with versioning +
          S3 Object Lock in COMPLIANCE mode, and a matching
          lifecycle policy — not the 90-day console event history.
~~~

**Identity federation at scale:**
- IAM Identity Center (successor to AWS SSO) centralizes federated access across many AWS accounts and SaaS apps using an external identity provider (Active Directory, Okta, Azure AD) — avoids creating individual IAM users per person per account

**Exam traps:**
- GuardDuty detects and alerts — it does not block traffic by itself; WAF is what actually blocks malicious requests
- CloudTrail's default 90-day event history is not the same as durable, compliance-grade log retention`},
  {day:14,domain:'deploy',title:'CI/CD Foundations: CodePipeline & CodeBuild',content:`**The pipeline mental model:**
- A CI/CD pipeline automates the path from a code commit to a deployed environment, with each stage running only after the previous one succeeds
- AWS CodePipeline orchestrates this as ordered stages (Source → Build → Test → Deploy), each containing one or more actions

**Source stage — where the pipeline starts:**
- CodeCommit, GitHub/GitHub Enterprise/Bitbucket (via CodeStar Connections), or S3 (a zipped artifact) can all trigger a pipeline
- GitHub sources use a webhook (via CodeStar Connections) to trigger the pipeline automatically on a push to the tracked branch — CodePipeline isn't limited to CodeCommit

**Build stage — CodeBuild and buildspec.yml:**
~~~
version: 0.2
phases:
  install:
    commands:
      - npm install
  pre_build:
    commands:
      - npm test
  build:
    commands:
      - npm run build
artifacts:
  files:
    - '**/*'
  base-directory: dist
~~~
- Phases run in order: install → pre_build → build → post_build; any command returning non-zero fails that phase (and the build)
- The artifacts section defines exactly which output files get packaged and passed to the next stage

**Building and pushing Docker images:**
- Requires enabling Privileged Mode on the CodeBuild project (Docker-in-Docker needs elevated container privileges)
- The CodeBuild service role needs ECR permissions (ecr:GetAuthorizationToken to log in, ecr:PutImage etc. to push)

**How artifacts move between stages:**
- Each action declares named input/output artifacts; CodePipeline stores outputs in an S3 artifact bucket behind the scenes and automatically makes them available as inputs to later stages — no manual file transfer

**Release gates — Manual Approval:**
- A built-in Manual Approval action type pauses pipeline execution until a human explicitly approves or rejects (optionally notified via SNS) — commonly placed just before a production deploy stage

**Default failure behavior — no extra config needed:**
- If any action in a stage fails (e.g. CodeBuild exits non-zero because tests failed), the stage fails and the pipeline halts there — it does not automatically continue to Deploy

**Exam traps:**
- Don't assume CodePipeline only works with CodeCommit — GitHub/Bitbucket sources are fully supported via CodeStar Connections
- A failed build stage stopping the pipeline is the DEFAULT behavior, not something you need to configure separately`},
  {day:15,domain:'deploy',title:'CodeDeploy Deployment Strategies',content:`**What CodeDeploy actually deploys to:**
- EC2/On-Premises: deploys application revisions (from S3 or GitHub) to instances defined by tags, an Auto Scaling group association, or a CloudFormation stack association
- Lambda: shifts traffic between function versions via an alias
- ECS: shifts ALB traffic between two task sets (blue/green)

**appspec.yml — the deployment spec:**
- For EC2/on-premises: defines file locations to copy, plus lifecycle event hooks (BeforeInstall, AfterInstall, ApplicationStart, ValidateService, etc.) pointing at scripts to run at each stage
- For Lambda: names the function version/alias being deployed
- For ECS: references the task definition and container/port being deployed

**EC2/on-premises deployment types:**
- In-place: instances are taken out of service, updated, then put back — some capacity dips during the rollout, controlled by minimum-healthy-hosts
- Blue/green: an entirely new set of instances is provisioned with the new revision; traffic cuts over only once they're healthy, and the old instances remain available briefly for rollback

**Lambda traffic shifting:**
- Canary: shift X% of traffic immediately, wait N minutes (during which alarms can trigger rollback), then shift the rest — e.g. Canary10Percent5Minutes
- Linear: shift a fixed percentage every N minutes until 100% — e.g. Linear10PercentEvery1Minute
- AllAtOnce: shifts 100% immediately — fastest but no gradual safety net

~~~
Deployment lifecycle for Lambda (simplified):
  1. New version published, alias still points 100% at old version
  2. CodeDeploy begins shifting per the DeploymentConfig
  3. CloudWatch alarm(s) monitored throughout the shift
  4. Alarm fires → automatic rollback to old version
  5. No alarm, shift completes → alias points 100% at new version
~~~

**ECS blue/green (via CodeDeploy):**
- Provisions a new (green) task set alongside the running (blue) one, behind a second ALB target group
- Shifts traffic between the two target groups (all-at-once or gradually), running health checks throughout
- Automatically rolls back to the blue task set if health checks fail or a configured alarm fires — a safer alternative to ECS's native in-place rolling update, which offers less traffic-shifting control

**Automatic rollback — configure it, don't rely on manual reaction:**
- Deployment groups support automatic rollback triggered by deployment failure and/or a specified CloudWatch alarm crossing its threshold, avoiding the need for a human to notice and react

**Exam traps:**
- appspec.yml's structure is different for EC2/on-prem (lifecycle hooks) vs Lambda/ECS (version/task info) — know which shape applies to which compute target
- "AllAtOnce" for Lambda means no gradual rollout at all — it is not the same as a canary with 100% at step one`},
  {day:16,domain:'deploy',title:'CloudFormation & Infrastructure as Code',content:`**Core building blocks:**
- Resources: the infrastructure being declared (required section)
- Parameters: input values supplied at deploy time, letting one template serve multiple environments (e.g. an InstanceType or Environment parameter)
- Mappings: static lookup tables (e.g. environment → instance type) referenced via !FindInMap
- Outputs: values exposed after deployment, optionally exported for cross-stack reference
- Intrinsic functions: !Ref (returns a resource's default identifying value — differs by resource type, e.g. bucket name for S3), !GetAtt (returns a SPECIFIC named attribute, like Arn), !Sub, !ImportValue, !FindInMap

**Change sets — preview before you commit:**
- A change set computes the diff between the current stack and a proposed update, showing exactly which resources would be added, modified (and whether that FORCES REPLACEMENT), or removed — nothing is applied until the change set is explicitly executed
- Critical for stateful resources like RDS: some property changes update in place, others force replacement (data loss risk) — always check before applying

**Failure handling:**
- A failed CREATE rolls back fully, landing the stack in ROLLBACK_COMPLETE — this state CANNOT be updated further; the stack must be deleted and recreated after fixing the root cause
- A failed UPDATE, by default, automatically rolls back to the last known-good state (UPDATE_ROLLBACK_COMPLETE)

**Drift detection:**
- Compares actual live resource configuration against what the template declares, flagging any resource manually changed outside of CloudFormation (e.g. someone edited a security group rule directly in the console) as DRIFTED, with a diff of exactly what changed

**Scaling infrastructure-as-code across a large template or organization:**
- Nested stacks: a parent template references child templates as AWS::CloudFormation::Stack resources — decomposes a large template into smaller, reusable, independently testable pieces, deployed/updated together
- StackSets: deploy the SAME template across many accounts and regions from a single administrative operation, integrating with AWS Organizations for account targeting

**Cross-stack references:**
~~~
# Exporting stack
Outputs:
  VpcId:
    Value: !Ref MyVpc
    Export:
      Name: shared-vpc-id

# Importing stack (different template)
Resources:
  MySubnet:
    Properties:
      VpcId: !ImportValue shared-vpc-id
~~~
- CloudFormation blocks deleting or modifying an export while another active stack still imports it

**Beyond raw CloudFormation:**
- SAM: shorthand + CLI specifically for serverless resources, transforms into standard CloudFormation
- AWS CDK: define infrastructure in a real programming language (TypeScript/Python/Java/etc.) with loops, conditionals, and reusable constructs; the cdk synth command compiles it down to a CloudFormation template

**Exam traps:**
- !Ref does not always return an ARN — its return value is resource-type-specific; use !GetAtt for a specific attribute like Arn
- ROLLBACK_COMPLETE is a dead end for UpdateStack — the only path forward is deleting and recreating the stack`},
  {day:17,domain:'deploy',title:'Elastic Beanstalk & Multi-Environment Strategy',content:`**What Beanstalk actually manages for you:**
- A PaaS: you upload application code (or a container), and Beanstalk provisions and manages the underlying EC2 instances, load balancer, Auto Scaling group, and health monitoring
- You can still override underlying configuration (via .ebextensions or the console) when you need something beyond the defaults — it's not a black box

**The four deployment policies — know the trade-offs cold:**
- All at once: deploys to every instance simultaneously — fastest, but causes brief downtime since all instances update at once. Fine for dev/low-traffic environments where downtime is acceptable
- Rolling: updates instances in batches, taking each batch out of service temporarily — reduces (but doesn't eliminate) capacity during rollout, no full downtime
- Rolling with additional batch: like Rolling, but launches new instances for the first batch BEFORE taking any old ones down, maintaining full capacity throughout
- Immutable: launches an entirely new, fully healthy set of instances in a temporary Auto Scaling group before shifting traffic and terminating the old ones — zero downtime, safest, but costs roughly double capacity briefly and takes longer
- Blue/Green: an entirely separate environment, tested independently, then production traffic is cut over by swapping environment CNAMEs — old environment stays available for an instant rollback by swapping back

~~~
Choosing a policy:
  Dev environment, downtime OK           → All at once
  Prod, want to preserve full capacity    → Rolling with additional batch
  Prod, zero downtime required            → Immutable
  Prod, want to fully test before cutover → Blue/Green
~~~

**Environment configuration and multi-environment setup:**
- Environment variables/configuration differ per Beanstalk environment (dev/staging/prod), so the same application version can behave differently per environment without separate code
- Saved configurations let you capture and reuse Beanstalk environment settings across new environments

**Health monitoring:**
- Beanstalk's enhanced health reporting monitors instance and application health beyond basic EC2/ELB metrics, surfacing application-level issues (like elevated 5xx rates) directly in the Beanstalk console

**When Beanstalk is (and isn't) the right choice:**
- Good fit: teams wanting to deploy code quickly without hand-building the surrounding infrastructure, standard web app patterns
- Less ideal: highly customized architectures, serverless-first applications (better served by SAM/Lambda directly), or teams that already have mature CloudFormation/CDK pipelines and want full control

**Exam traps:**
- "All at once" and "Immutable" are opposite ends of the risk/cost spectrum — All at once is fastest+riskiest, Immutable is safest+most expensive per deploy
- Blue/Green on Beanstalk means two SEPARATE environments with a CNAME swap, not a single environment doing an internal traffic shift`},
  {day:18,domain:'deploy',title:'Advanced Deployment Patterns',content:`**Progressive delivery — reducing blast radius on every release:**
- Canary: shift a small percentage of traffic (or users) to the new version first, monitor real production metrics, then expand gradually only if healthy — minimizes exposure if something is wrong
- Linear: similar idea, but increases in fixed steady increments over time rather than one jump-then-wait
- Blue/Green: an entirely new environment/task-set/instance-set is stood up and validated before an instant (or near-instant) full cutover, with the old version kept around briefly for rollback

**Decoupling deployment from release — feature flags:**
- Deploying code and releasing a feature to users don't have to be the same event — ship the code dark (disabled), then turn it on via configuration
- AWS AppConfig is purpose-built for this: it supports gradual configuration rollout (a percentage over a duration) with automatic rollback tied to a CloudWatch alarm, entirely independent of a code deployment

~~~
Without feature flags: toggling a feature off requires a full redeploy
With feature flags: toggling a feature off is a config change via
                     AppConfig, seconds to propagate, no redeploy,
                     and can be automatically rolled back on alarm
~~~

**Rollback strategy by compute type:**
- Lambda: repoint the alias to the previous immutable version — near-instant, since versions never change once published
- ECS: CodeDeploy blue/green keeps the old (blue) task set around briefly, enabling a fast swap back
- EC2/CodeDeploy: automatic rollback configured on the deployment group, triggered by deployment failure or a CloudWatch alarm
- CloudFormation: automatic rollback to the last good state is the DEFAULT behavior on a failed update

**Writing infrastructure as real code — AWS CDK:**
- Define infrastructure using a general-purpose language (TypeScript, Python, Java, C#, Go) with loops, conditionals, classes, and reusable "constructs" (higher-level abstractions bundling multiple resources)
- The cdk synth command compiles the code down into a standard CloudFormation template; cdk deploy synthesizes and deploys it — everything you know about change sets and stack rollback still applies underneath
- Constructs can be shared/versioned as libraries across teams, unlike copy-pasted CloudFormation snippets

**Multi-account, multi-environment isolation:**
- The AWS-recommended pattern for strict dev/staging/prod isolation (separate billing, separate blast radius, separate IAM boundaries) is separate AWS accounts, centrally managed via AWS Organizations
- The same IaC templates and CI/CD pipelines are parameterized and deployed into each account — isolation comes from account boundaries, not naming conventions within one account

**Exam traps:**
- A canary and a blue/green deployment solve a similar problem (safe rollout) with different mechanics — canary shifts a percentage of traffic to the SAME environment/version pool over time, while blue/green cuts over between two ENTIRELY SEPARATE environments/task sets
- Feature flags and deployment strategies (canary/blue-green) are complementary, not the same thing — one controls what code is running, the other controls what capability is exposed to users`},
  {day:19,domain:'troubleshoot',title:'Monitoring & Observability: CloudWatch and X-Ray',content:`**The three pillars, and which AWS tool covers each:**
- Metrics (numbers over time): CloudWatch Metrics — built-in per-service metrics plus custom metrics you publish
- Logs (structured/unstructured event records): CloudWatch Logs — collected from Lambda, ECS, API Gateway access logs, and more
- Traces (the path and timing of a single request across services): AWS X-Ray

**CloudWatch Alarms — turning a metric into an action:**
- Watches a metric (or a metric math expression, like Errors/Invocations for an error rate) against a threshold over an evaluation period
- Can trigger actions including SNS notifications (for paging on-call), Auto Scaling actions, or triggering another automated response
- Composite alarms combine multiple underlying alarms with AND/OR logic to reduce noisy, single-metric false alarms

**CloudWatch Logs Insights — querying logs interactively:**
~~~
fields @timestamp, @message
| filter @message like /ERROR/
| stats count() by bin(5m)
~~~
- A purpose-built query language (filter, stats, parse, sort, bin) for interactively searching and aggregating log data across one or more log groups, without exporting logs elsewhere first
- Common uses: finding all 5xx API Gateway requests in the last hour, aggregating Lambda error counts by function, correlating a specific request ID across log lines

**Publishing custom metrics without adding latency — Embedded Metric Format (EMF):**
- Instead of calling the CloudWatch PutMetricData API synchronously (which adds latency and a failure point to your request path), log a specially structured JSON blob
- CloudWatch Logs automatically extracts the embedded metric values into CloudWatch Metrics asynchronously — the standard, low-overhead way to emit custom business metrics (like "orders placed per minute") from Lambda

**X-Ray distributed tracing:**
- Propagates a trace ID through a request as it crosses instrumented services (API Gateway → Lambda → DynamoDB, etc.), building a service map and per-segment timing
- Lets you answer "which specific hop in this slow request is actually the bottleneck?" in one view, instead of manually cross-referencing separate, disconnected log groups by timestamp
- Requires instrumenting your code with the X-Ray SDK (or auto-instrumentation where available) and enabling active tracing on the relevant services

**Putting it together — a realistic incident workflow:**
1. A CloudWatch Alarm on error rate fires, pages on-call via SNS
2. CloudWatch Logs Insights query narrows down to the specific failing requests/request IDs
3. X-Ray trace for one of those request IDs pinpoints exactly which downstream call is slow or erroring
4. Fix is applied; the alarm clears once the error rate metric recovers

**Exam traps:**
- CloudTrail is an API audit log, not an application performance/observability tool — it won't show you why your Lambda function is slow
- A metric looking healthy on average doesn't mean the system is healthy — always pair alarms with percentile-aware thresholds where tail latency matters`},
  {day:20,domain:'troubleshoot',title:'Debugging Lambda & API Gateway Errors',content:`**Reading a Lambda error correctly — match the symptom to the cause:**
- "Task timed out after N seconds": the function (or a downstream call it's waiting on) took longer than the configured timeout — check for a slow/unresponsive dependency, or a timeout set too low for legitimate work
- "Runtime exited with error: signal: killed": almost always an out-of-memory condition — the process exceeded its configured memory and was terminated; fix by increasing memory
- "AccessDenied" calling another AWS service: check the execution role's permissions AND any resource-based policy (bucket policy, KMS key policy) — don't assume the identity policy alone is the full picture

**API Gateway status codes — what each one is actually telling you:**
- 400: request validation failed (missing required parameter, malformed JSON body) — check the request validator/model configuration and the actual request payload
- 403: an authorizer rejected the request, or a resource policy denied it — check the Lambda/Cognito authorizer logic and any API Gateway resource policy
- 429: throttling — the request rate exceeded a configured limit (account, stage/method, or usage plan); client should retry with backoff, or the limit may need raising
- 502: for a Lambda proxy integration, the function returned a response that didn't match the expected shape (or threw an unhandled exception) — check CloudWatch Logs for the actual error and verify the return value's structure
- 504: the backend integration took longer than API Gateway's fixed 29-second integration timeout — this cannot be increased; long-running work needs to be decoupled (return a job ID, process async)

**The CORS debugging checklist, in order:**
~~~
1. Is the actual response (not just OPTIONS) including
   Access-Control-Allow-Origin? For Lambda proxy integrations,
   your function must set this header itself.
2. Does the allowed origin match exactly (scheme + host + port)?
3. Is the OPTIONS preflight method itself configured/allowed
   on that resource?
4. If credentials are involved, is Access-Control-Allow-Credentials
   set, and is the Origin NOT a wildcard in that case?
~~~

**A structured approach to any "it's broken in prod" report:**
1. Check CloudWatch Logs for the actual exception/stack trace first — don't guess
2. Check the relevant CloudWatch metric (Errors, Throttles, Duration) for the affected function/API around the reported time
3. If it spans multiple services, pull the X-Ray trace for a specific failing request ID
4. Check IAM last-accessed data / recent policy changes if the symptom is a sudden new AccessDenied
5. Check for a recent deployment correlating with the start of the issue — if so, consider rolling back first and investigating root cause separately

**Exam traps:**
- A 502 is not the same failure mode as a 504 — 502 is a malformed/erroring backend response, 504 is the backend simply taking too long
- Increasing a Lambda function's timeout is not a fix for every error — it only helps if the actual root cause is genuinely "needed more time," not memory exhaustion, a permissions error, or a bug`},
  {day:21,domain:'troubleshoot',title:'Performance Optimization Patterns',content:`**Cold starts — the recurring theme:**
- Reduce impact with Provisioned Concurrency (eliminates cold starts for that reserved capacity), smaller deployment packages, fewer/lighter dependencies, and moving expensive initialization to the global/module scope so it runs once per environment instead of once per invocation

**The memory-CPU relationship — a genuinely useful optimization lever:**
- Lambda allocates CPU proportionally to configured memory — there's no separate CPU dial
- For a CPU-bound function, raising memory can cut duration enough that total cost (duration × price-per-ms-per-memory) stays flat or even decreases, despite the higher per-ms rate — always worth testing empirically rather than assuming "more memory = more cost"

**Reducing round trips:**
- BatchGetItem/BatchWriteItem combine many individual DynamoDB item operations (up to 100 for get, 25 for write) into far fewer network round trips than looping individual calls
- Multipart upload parallelizes large S3 uploads into independently-retryable parts, improving throughput over a single PutObject for big files

**Caching — picking the right layer:**
- DAX: DynamoDB-specific, API-compatible, write-through, microsecond reads — minimal code change, only works in front of DynamoDB
- ElastiCache (Redis/Memcached): general-purpose, works with any data source, requires more code changes, supports richer data structures (sorted sets, etc.)
- API Gateway response caching: caches whole HTTP responses per stage for repeated identical GET requests, reducing backend load

**A classic stale-cache trap:**
~~~
Symptom: a write to DynamoDB isn't reflected in API responses for
         several minutes, even though the write itself succeeded.
Cause:   the cache entry's TTL hasn't expired, and the write path
         doesn't invalidate/update the cache.
Fix:     shorten TTL, or explicitly invalidate/update the cache
         entry as part of the write path (write-through/write-behind).
~~~

**Reducing per-invocation overhead:**
- Instantiate SDK clients (and open DB connections) outside the handler, in global/module scope, so they're created once during INIT and reused across warm invocations instead of being recreated on every single call
- Watch for accidentally re-parsing large config/JSON on every invocation instead of caching the parsed result globally

**Reading the right latency statistic:**
- p50 (median) can look perfectly healthy while a meaningful fraction of requests are much slower — always check p90/p95/p99 to catch tail-latency problems affecting a subset of real users

**Exam traps:**
- "Add more memory" and "add caching" are not universal answers — the right optimization depends on whether the bottleneck is CPU, cold starts, network round trips, or a genuinely slow downstream dependency; always identify the actual bottleneck (e.g. via X-Ray) before optimizing`},
  {day:22,domain:'troubleshoot',title:'Resilience Patterns: Retries, Idempotency, Circuit Breakers & DLQs',content:`**Why transient failures are normal, not exceptional, in distributed systems:**
- Network blips, brief throttling, and momentary downstream unavailability are expected at scale — resilient systems are designed to absorb them gracefully rather than propagate every hiccup as a user-facing failure

**Retry with exponential backoff and jitter:**
- AWS SDKs implement this by default for retryable errors: each retry waits longer than the last (exponential), with some randomization (jitter) so many clients retrying at once don't all hammer the service in lockstep
- Retrying immediately with no delay ("retry storm") can make throttling worse, not better — this is why naive immediate-retry loops are a common exam wrong-answer

**Idempotency — required once you accept at-least-once delivery:**
- SQS standard queues, many async systems, and client-side retries all mean a given operation might be processed more than once
- The fix lives in your code, not the queue: use an idempotency key (a unique value per logical operation) and record it with a conditional write (e.g. DynamoDB ConditionExpression) so a duplicate is detected and skipped/short-circuited instead of reprocessed
- This matters especially for anything with a side effect that shouldn't repeat — charging a card, sending an email, decrementing inventory

**Dead-letter queues — isolating poison-pill messages:**
- A redrive policy with maxReceiveCount automatically moves a message to a DLQ after it's failed processing that many times, instead of looping forever or blocking healthy messages behind it
- For Lambda functions processing SQS batches, enabling partial batch response (ReportBatchItemFailures) ensures only the specific failed message IDs are retried, not the entire batch (avoiding needless reprocessing of already-successful messages)

**The circuit breaker pattern — failing fast during a known outage:**
~~~
State machine (simplified):
  CLOSED (normal) --[failure threshold hit]--> OPEN (fail fast, no calls)
  OPEN --[cooldown timer elapses]--> HALF-OPEN (try one test call)
  HALF-OPEN --[success]--> CLOSED
  HALF-OPEN --[failure]--> OPEN (reset cooldown)
~~~
- Without a circuit breaker, every invocation calling a known-unresponsive downstream service wastes its full timeout waiting, burning cost and concurrency during an outage
- A circuit breaker detects the pattern of repeated failures and short-circuits further calls for a cooldown window, periodically testing whether the dependency has recovered

**Graceful degradation:**
- When a non-critical dependency fails, consider whether the system can still serve a reduced but useful response (e.g. show cached/stale recommendations instead of a hard error) rather than failing the entire request

**Putting resilience patterns together in one request path:**
1. SDK retry with backoff absorbs brief transient failures automatically
2. A circuit breaker stops wasting time/resources once failures become sustained, not just occasional
3. Idempotency keys make it safe for retries (at any layer) to happen more than once
4. A DLQ catches anything that still can't be processed, for later inspection, instead of silently dropping it

**Exam traps:**
- "The queue should just retry forever" is never the right answer for messages that are fundamentally malformed/unprocessable — that's exactly what a DLQ + maxReceiveCount is for
- Idempotency is an application-design responsibility — no AWS service makes your code idempotent for you automatically`},
