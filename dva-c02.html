{id:165,domain:'troubleshoot',sub:'Debugging',q:'A CloudFormation deployment fails with "ROLLBACK_COMPLETE" and the team cannot update the stack further — every UpdateStack attempt is rejected. What must be done first?',opts:['Nothing can be done; the AWS account must be closed and recreated','A stack in ROLLBACK_COMPLETE cannot be updated directly — it must be deleted (and, if needed, resources re-created) before deploying a new stack, since ROLLBACK_COMPLETE indicates the very first creation failed and rolled back entirely', 'Simply retry UpdateStack a few more times until it succeeds', 'Manually edit the stack\'s state in the console'],ans:1,exp:'ROLLBACK_COMPLETE specifically means the stack\'s initial CREATE failed and everything was rolled back — such a stack has no successfully created resources to update and CloudFormation blocks UpdateStack on it; the only path forward is to delete the stack (cleanly, since most/all resources were already rolled back) and re-attempt creation, ideally after fixing whatever caused the original failure.',plain:'A ROLLBACK_COMPLETE stack can\'t be updated — delete it and recreate, after fixing the original failure cause.'},
{id:166,domain:'troubleshoot',sub:'Performance',q:'An API\'s p50 (median) latency looks fine in CloudWatch, but users are complaining about slow responses. What CloudWatch metric statistic should the team look at instead to catch this kind of problem?',opts:['The Sum statistic only','A higher percentile like p99 (or p90/p95), which reveals tail latency affecting a subset of users that the median can completely hide', 'The Minimum statistic', 'SampleCount alone'],ans:1,exp:'The median (p50) only tells you about the middle of the distribution and can look perfectly healthy even while a meaningful fraction of requests (the tail) are much slower — p99/p95/p90 percentiles surface exactly this kind of "some users have a bad time" problem that averages and medians hide.',plain:'Median/average latency can hide a slow tail — check p99/p95 to catch what a subset of users actually experiences.'},
{id:167,domain:'troubleshoot',sub:'Circuit breaker',q:'A Lambda function calls a downstream service that has become completely unresponsive, and every invocation now wastes its full timeout duration waiting before failing, driving up cost and concurrency usage during the outage.',opts:['This is unavoidable and must simply be tolerated until the downstream service recovers','Implement a circuit-breaker pattern that tracks recent failures and, once a threshold is hit, fails fast (without waiting for the full timeout) for a cooldown period before trying the downstream call again', 'Increase the function\'s timeout further so it can wait even longer', 'Disable the function entirely for the duration of the outage'],ans:1,exp:'A circuit breaker detects repeated failures to a specific downstream dependency and "opens," short-circuiting further calls (failing fast immediately) for a cooldown window instead of letting every invocation burn its full timeout against a known-unresponsive service — reducing wasted duration/cost and concurrency pressure during an outage, then periodically testing (half-open state) whether the dependency has recovered.',plain:'A circuit breaker fails fast during a known outage instead of every invocation waiting out its full timeout.'},
];

// ── Flashcards ────────────────────────────────────────────────────────────────
const FLASHCARDS=[
  {id:1,domain:'dev',front:'Lambda Cold Start vs Warm Start',plain:'A cold start spins up a brand-new sandbox; a warm start reuses one that\'s already running.',back:'Cold start: new execution environment initialized (download code, start runtime, run global-scope init) — adds latency. Warm start: existing environment reused, init code already ran. Reduce cold starts with provisioned concurrency, smaller packages, fewer dependencies.'},
  {id:2,domain:'dev',front:'Lambda Layers',plain:'Layers let many functions share the same library code without copy-pasting it into every package.',back:'A Lambda layer packages shared code/dependencies once, attached to multiple functions (up to 5 layers per function). Keeps deployment packages smaller and updates centralized. Extracted into /opt at runtime.'},
  {id:3,domain:'dev',front:'Reserved vs Provisioned Concurrency',plain:'Reserved sets a concurrency ceiling/guarantee; provisioned pre-warms environments so there\'s no cold start.',back:'Reserved concurrency: guarantees (and caps) a pool of concurrent executions for a function, subtracted from account-level unreserved pool. Provisioned concurrency: pre-initializes N execution environments so invocations are warm immediately — costs more, eliminates cold starts.'},
  {id:4,domain:'dev',front:'Lambda Versions vs Aliases',plain:'A version is a frozen snapshot; an alias is a movable pointer to one (or a weighted split of two).',back:'Publishing creates an immutable numbered version (code+config frozen). An alias is a named pointer (e.g. "prod") to a version, or split by weight across two versions for gradual rollout. Clients invoke the alias, not $LATEST.'},
  {id:5,domain:'dev',front:'Lambda Execution Role',plain:'The execution role gives the function temporary AWS credentials automatically — no hardcoded keys needed.',back:'An IAM role Lambda assumes on the function\'s behalf, providing temporary credentials to the SDK via the runtime environment. Grants only the specific permissions the function needs (least privilege).'},
  {id:6,domain:'dev',front:'Lambda + VPC Networking',plain:'Attaching Lambda to a VPC gives it access to private resources, but private subnets still need a NAT Gateway for internet access.',back:'VPC config (subnets+security group) attaches ENIs so Lambda can reach VPC-only resources like private RDS. Private subnets need a route to a NAT Gateway for outbound internet; without it, Lambda loses internet access it had by default outside a VPC.'},
  {id:7,domain:'dev',front:'DynamoDB Query vs Scan',plain:'Query looks up by key (fast, cheap); Scan reads the whole table and filters after (slow, expensive).',back:'Query: uses partition key (+ optional sort key condition), efficient, reads only matching items. Scan: reads every item in the table/index, optionally filtered client-side after reading — expensive at scale, avoid for common access patterns.'},
  {id:8,domain:'dev',front:'DynamoDB GSI vs LSI',plain:'A GSI gets its own partition key for a totally different access pattern; an LSI just adds a different sort order within the same partition key.',back:'Global Secondary Index (GSI): own partition+sort key, eventually consistent by default, can be added/removed anytime, separate throughput. Local Secondary Index (LSI): same partition key as base table, different sort key, must be created at table creation, supports strong consistency.'},
  {id:9,domain:'dev',front:'DynamoDB Consistency Models',plain:'Eventually consistent is cheaper and usually fine; strongly consistent always sees the very latest write but costs 2x.',back:'Eventually consistent read (default): may return slightly stale data, costs 0.5 RCU per 4KB. Strongly consistent read: always reflects the latest successful write, costs 1 full RCU per 4KB, not available on GSIs.'},
  {id:10,domain:'dev',front:'DynamoDB Streams',plain:'Streams give you a live feed of every insert/update/delete, so you can trigger code in near real time.',back:'A time-ordered log of item-level changes, retained 24 hours, that can trigger a Lambda function per batch of records. Used for real-time processing, replication, and audit trails.'},
  {id:11,domain:'dev',front:'DynamoDB Capacity Modes',plain:'On-demand needs zero planning and scales instantly; provisioned is cheaper at steady, predictable load if you tune it right.',back:'On-demand: pay per request, auto-scales instantly, no capacity planning. Provisioned: set RCU/WCU (with optional auto scaling target), cheaper for steady predictable traffic, can throttle if traffic exceeds capacity faster than auto scaling reacts.'},
  {id:12,domain:'dev',front:'DynamoDB Hot Partition',plain:'A hot partition happens when too much traffic hits one partition key value — spread the load with a better key.',back:'Occurs when a small set of partition key values get disproportionate traffic, since DynamoDB spreads capacity by partition. Fixed by higher-cardinality keys or write sharding (adding a random/calculated suffix).'},
  {id:13,domain:'dev',front:'DynamoDB Conditional Writes',plain:'A ConditionExpression makes a write fail unless a check on the current item passes — the basis for optimistic locking.',back:'A ConditionExpression on Put/Update/Delete fails the request (ConditionalCheckFailedException) unless the condition holds — e.g. checking a version attribute to implement optimistic locking without an external lock service.'},
  {id:14,domain:'dev',front:'DAX vs ElastiCache',plain:'DAX is a drop-in cache only for DynamoDB; ElastiCache is a general-purpose cache for anything.',back:'DAX: DynamoDB-specific, API-compatible write-through cache, microsecond reads, minimal code change. ElastiCache (Redis/Memcached): general-purpose in-memory store for any data source — caching, sessions, leaderboards.'},
  {id:15,domain:'dev',front:'SQS Visibility Timeout',plain:'It\'s the window a message is hidden after being received — if not deleted in time, it comes back for someone else to try.',back:'The time a received-but-not-yet-deleted message is invisible to other consumers. If the consumer crashes/fails to delete before it expires, the message reappears in the queue for reprocessing.'},
  {id:16,domain:'dev',front:'SQS Standard vs FIFO',plain:'Standard is fast and cheap with best-effort order; FIFO guarantees exact order and exactly-once processing.',back:'Standard: at-least-once delivery, best-effort ordering, nearly unlimited throughput. FIFO: exactly-once processing, strict ordering within a message group, throughput limited (though high-throughput mode raises this).'},
  {id:17,domain:'dev',front:'SQS Long Polling',plain:'Long polling waits for a message instead of returning empty right away — fewer wasted API calls.',back:'Set ReceiveMessageWaitTimeSeconds > 0 (up to 20s) so ReceiveMessage waits for a message to arrive instead of returning immediately when empty — reduces empty responses and API cost versus short polling.'},
  {id:18,domain:'dev',front:'SQS Dead-Letter Queue (DLQ)',plain:'A DLQ automatically catches messages that keep failing, so bad messages don\'t block good ones.',back:'A redrive policy on the source queue names a DLQ + maxReceiveCount; once a message is received that many times without deletion, it\'s moved to the DLQ automatically, isolating poison-pill messages.'},
  {id:19,domain:'dev',front:'SNS Fan-Out Pattern',plain:'One message published to a topic goes out to every subscriber at once — email, SQS, Lambda, all in parallel.',back:'Publish once to an SNS topic; every subscription (Lambda, SQS, HTTP, email, SMS) receives it independently and in parallel, decoupling the publisher from how many/which consumers exist.'},
  {id:20,domain:'dev',front:'SNS Subscription Filter Policy',plain:'A filter policy lets each subscriber opt into only the messages it actually cares about, based on message attributes.',back:'JSON filter policy attached to a subscription; SNS only delivers messages whose attributes match the policy to that specific subscriber, no code changes needed on publisher or subscriber.'},
  {id:21,domain:'dev',front:'EventBridge Rules',plain:'Rules match events (by pattern) or run on a schedule (cron/rate), then send them to one or more targets.',back:'Event pattern rules match incoming events by content and route to targets (Lambda, SQS, Step Functions, etc.). Scheduled rules use cron()/rate() expressions like a managed cron job — no event trigger needed.'},
  {id:22,domain:'dev',front:'Step Functions: Standard vs Express',plain:'Standard is for long, auditable workflows billed per step; Express is for high-volume, short workflows billed by duration.',back:'Standard Workflows: up to 1 year duration, priced per state transition, full execution history/exactly-once semantics. Express Workflows: up to 5 minutes, priced by duration+memory+requests, at-least-once semantics, built for high-volume event processing.'},
  {id:23,domain:'dev',front:'Step Functions Retry/Catch',plain:'Retry automatically re-attempts a failed step; Catch routes to a fallback step instead of failing the whole workflow.',back:'A Task state\'s Retry field defines automatic retry with backoff on specific errors; Catch defines a fallback state to transition to when an error isn\'t (or can\'t be) resolved by retrying — native error handling with no custom code.'},
  {id:24,domain:'dev',front:'Idempotency in Distributed Systems',plain:'If a message might be delivered twice, your code has to produce the same result either way.',back:'At-least-once delivery (SQS standard, many async systems) means duplicates are normal — design handlers to be idempotent, e.g. checking/recording a unique idempotency key with a conditional write before processing.'},
  {id:25,domain:'dev',front:'Cognito User Pool vs Identity Pool',plain:'User Pool = who the user is (login/auth). Identity Pool = temporary AWS credentials for that user.',back:'User Pool: user directory, sign-up/sign-in, issues JWTs (ID/access/refresh tokens). Identity Pool: exchanges those tokens (or other IdP tokens) for temporary, scoped IAM credentials via STS so the app can call AWS services directly.'},
  {id:26,domain:'dev',front:'S3 Presigned URLs',plain:'A presigned URL lets someone perform one specific S3 action for a limited time, without ever getting real AWS credentials.',back:'Generated server-side using the signer\'s credentials, grants time-limited access to a specific S3 action (GetObject/PutObject) — lets a browser upload/download directly to a private bucket without exposing credentials or making the bucket public.'},
  {id:27,domain:'dev',front:'Multipart Upload',plain:'Splitting a big file into parts and uploading them in parallel is faster and more resilient than one giant upload.',back:'Recommended for objects over ~100MB (required over 5GB): splits the object into independently-uploaded, retryable parts uploaded in parallel, improving throughput and resiliency versus a single PutObject call.'},
  {id:28,domain:'security',front:'IAM Policy Evaluation Order',plain:'Deny always wins. Otherwise you need at least one explicit Allow and no Deny anywhere.',back:'1) Default implicit deny. 2) Explicit Deny anywhere (identity, resource, SCP, boundary, session policy) → DENY, no exceptions. 3) Explicit Allow with no Deny found → ALLOW. 4) No Allow found → implicit DENY.'},
  {id:29,domain:'security',front:'Permissions Boundary',plain:'A boundary is a ceiling on what an identity\'s own policies can grant — it never grants anything by itself.',back:'Sets the MAXIMUM permissions an identity-based policy attached to that user/role can grant. A permissive identity policy is still capped by the boundary. Does not grant access on its own — still need an Allow.'},
  {id:30,domain:'security',front:'Service Control Policy (SCP)',plain:'SCPs are org-wide guardrails that cap what every account (even root) can do — they never grant permissions.',back:'Attached at the AWS Organizations root/OU/account level, restricts maximum permissions for every principal in affected accounts, including the root user. Never grants access — always paired with identity/resource policies that actually allow actions.'},
  {id:31,domain:'security',front:'Cross-Account Role Assumption',plain:'The resource-owning account defines a role trusting the calling account; the caller assumes it via STS to get temporary creds.',back:'Account B creates a role with a trust policy naming Account A as trusted principal. A calls sts:AssumeRole to receive temporary credentials scoped to that role\'s permissions in B — the standard secure cross-account access pattern.'},
  {id:32,domain:'security',front:'External ID (Cross-Account)',plain:'ExternalId is a shared secret-like value that stops someone from assuming your role just by guessing your account ID.',back:'A Condition on sts:ExternalId in a trust policy, used especially for third-party access, mitigating the "confused deputy" problem — the caller must know the pre-shared ExternalId, not just the trusted account ID.'},
  {id:33,domain:'security',front:'KMS Key Policy vs IAM Policy',plain:'KMS is special: BOTH the identity policy AND the key\'s own policy must allow the action.',back:'Unlike most services, a KMS key\'s resource policy acts as a primary gate — even a fully permissive identity policy is not enough unless the key policy also permits that principal (directly, or via the default "Enable IAM User Permissions" statement).'},
  {id:34,domain:'security',front:'Envelope Encryption / GenerateDataKey',plain:'Only a small data key touches KMS; the actual (possibly huge) data is encrypted locally with that key.',back:'GenerateDataKey returns a plaintext data key (used locally to encrypt data fast, symmetrically) and its KMS-encrypted form (stored alongside the ciphertext). Avoids sending large payloads to KMS, which caps direct Encrypt calls at 4KB.'},
  {id:35,domain:'security',front:'Customer Managed Key vs AWS Managed Key',plain:'Customer managed = you control policy/rotation/deletion. AWS managed = the service controls it, you can\'t delete it.',back:'Customer managed key (CMK): full control of key policy, optional auto rotation, can disable/schedule deletion. AWS managed key (aws/service): rotation automatic and less configurable, cannot be deleted. AWS owned key: not visible/manageable by the customer at all.'},
  {id:36,domain:'security',front:'Secrets Manager vs Parameter Store',plain:'Secrets Manager costs more but auto-rotates secrets; Parameter Store is free/cheap for plain config.',back:'Secrets Manager: built-in automatic rotation (RDS/Redshift/DocumentDB templates included), costs per secret. Parameter Store: free tier for standard parameters, SecureString supports KMS encryption, no native rotation workflow.'},
  {id:37,domain:'security',front:'Security Group vs Network ACL',plain:'Security Groups guard instances and only ever allow; NACLs guard subnets, evaluate rules in order, and can explicitly deny.',back:'Security Group: stateful, instance/ENI-level, allow rules only, evaluates all rules. NACL: stateless, subnet-level, allow AND deny rules, evaluated in ascending rule-number order until a match.'},
  {id:38,domain:'security',front:'VPC Gateway Endpoint',plain:'A Gateway Endpoint gives private subnets free, private access to S3/DynamoDB with no NAT Gateway needed.',back:'Routes traffic to S3 or DynamoDB privately within the AWS network, avoiding the public internet and NAT Gateway data-processing charges — added as a route table target, S3/DynamoDB only.'},
  {id:39,domain:'security',front:'VPC Interface Endpoint (PrivateLink)',plain:'An Interface Endpoint (ENI in your subnet) gives private access to most other AWS services, and can also front your own Private API.',back:'Powered by AWS PrivateLink; creates an ENI with a private IP in your subnet for private connectivity to most AWS services (and to Private APIs/NLB-fronted services) without traversing the public internet.'},
  {id:40,domain:'security',front:'VPC Peering',plain:'Peering connects two VPCs privately, as if on one network — but it\'s not transitive.',back:'Private, non-transitive connection between two VPCs (same or cross-account/region). Requires route table entries in both VPCs and compatible (non-overlapping) CIDR ranges. A peers B, B peers C does NOT mean A can reach C.'},
  {id:41,domain:'security',front:'Direct Connect vs Site-to-Site VPN',plain:'Direct Connect is a dedicated private line; VPN is encrypted but still travels over the public internet.',back:'Direct Connect: dedicated physical connection to AWS, bypasses the public internet, consistent low latency/high throughput. Site-to-Site VPN: encrypted tunnel over the public internet, faster to set up, often used as a Direct Connect failover.'},
  {id:42,domain:'security',front:'AWS WAF',plain:'WAF filters malicious HTTP requests (like SQL injection or rate-limit abuse) at the edge, before they reach your app.',back:'Inspects HTTP(S) requests against rules — AWS Managed Rules for common attack patterns (SQLi, XSS), custom rules, and rate-based rules — attachable to CloudFront, API Gateway, and ALB.'},
  {id:43,domain:'security',front:'GuardDuty',plain:'GuardDuty is agentless ML threat detection that watches your CloudTrail, VPC Flow Logs, and DNS logs for you.',back:'Continuously analyzes CloudTrail (management+data events), VPC Flow Logs, and DNS logs using threat intel + anomaly detection to generate findings (compromised credentials, recon, malicious IP communication) — no agents to deploy.'},
  {id:44,domain:'security',front:'Amazon Macie',plain:'Macie automatically finds sensitive data like PII sitting in your S3 buckets.',back:'Uses ML and pattern matching to discover, classify, and report on sensitive data (PII, credentials, financial data) in S3, generating findings without manual inspection of every object.'},
  {id:45,domain:'security',front:'AWS Config',plain:'Config continuously checks whether your resources still match the rules you defined, and flags drift.',back:'Continuously records resource configuration state and evaluates it against managed/custom Config Rules, flagging non-compliant resources (e.g. a publicly readable S3 bucket) and optionally auto-remediating.'},
  {id:46,domain:'security',front:'CloudTrail',plain:'CloudTrail is the audit log of every API call: who did it, when, from where.',back:'Records API activity across AWS services — caller identity, timestamp, source IP, request/response — deliverable to S3 for durable, long-term audit storage. The 90-day console event history is only a browsing convenience, not durable storage.'},
  {id:47,domain:'security',front:'Origin Access Control (OAC)',plain:'OAC lets CloudFront read from a fully private S3 bucket, without making the bucket public.',back:'Lets CloudFront authenticate its S3 origin requests via SigV4; the bucket policy is scoped to allow GetObject only from that specific distribution — replaces the older Origin Access Identity (OAI).'},
  {id:48,domain:'security',front:'S3 Default Encryption',plain:'Default encryption means every new object gets encrypted automatically, even if the uploader forgot to ask.',back:'Bucket-level setting (SSE-S3 or SSE-KMS) applying encryption to every new object automatically, regardless of whether the PutObject request specified encryption headers.'},
  {id:49,domain:'security',front:'EBS Encryption by Default',plain:'A per-region account setting that auto-encrypts every new EBS volume and snapshot, no opt-in required.',back:'Once enabled per region, every newly created EBS volume/snapshot is automatically encrypted, removing dependence on individual launches remembering to check "encrypt this volume."'},
  {id:50,domain:'security',front:'ACM (Certificate Manager)',plain:'ACM gives you free, auto-renewing TLS certificates for CloudFront/ALB/API Gateway.',back:'Issues free public TLS certificates for integrated services (CloudFront, ALB, API Gateway custom domains) and auto-renews them as long as domain validation stays in place — no manual renewal.'},
  {id:51,domain:'security',front:'IAM Identity Center',plain:'The successor to AWS SSO — one login for federated users across many AWS accounts and SaaS apps.',back:'Provides centralized federated access across multiple AWS accounts (and SaaS apps) using an external identity provider (Active Directory, Okta, Azure AD), avoiding per-account IAM user sprawl.'},
  {id:52,domain:'security',front:'ABAC (Attribute-Based Access Control)',plain:'Instead of listing every resource ARN, one policy grants access based on matching tags.',back:'Uses Condition keys like aws:ResourceTag/key-name (and principal tags) so a single policy scales dynamically as resources are tagged, instead of a new static ARN-based statement per resource.'},
  {id:53,domain:'security',front:'MFA Condition Key',plain:'aws:MultiFactorAuthPresent lets you require MFA before allowing a sensitive action or role assumption.',back:'A Condition key checked in identity/trust policies to require the caller\'s session was authenticated with MFA before permitting an action — commonly used to gate elevated "deploy" or "admin" role assumption.'},
  {id:54,domain:'security',front:'Trust Policy vs Identity Policy',plain:'A trust policy says WHO can assume a role; an identity policy says WHAT that role (once assumed) can do.',back:'Trust policy (AssumeRolePolicyDocument): defines which principal is allowed to assume the role. Identity-based policy on the role: defines the actual permissions granted once assumed. Both are required for the role to function.'},
  {id:55,domain:'security',front:'CloudFront Signed URLs/Cookies',plain:'Signed URLs/cookies let you grant time-limited access to private CloudFront content without making it public.',back:'Grant time-limited, optionally IP-restricted access to private content served via CloudFront (used for paid/premium content), similar in spirit to S3 presigned URLs but at the CDN layer.'},
  {id:56,domain:'security',front:'IAM Access Analyzer',plain:'Access Analyzer finds resources shared with anyone outside your account/org that you might not have intended to share.',back:'Analyzes resource-based policies (S3 buckets, KMS keys, IAM roles, etc.) to identify resources accessible from outside your account or AWS Organization, and can validate policies before deployment.'},
  {id:57,domain:'security',front:'Shield Standard vs Shield Advanced',plain:'Standard is free and automatic for everyone; Advanced is paid, with more protection and DDoS cost protection.',back:'Shield Standard: free, automatic, protects against common network/transport-layer DDoS for every AWS customer. Shield Advanced: paid, adds advanced detection/mitigation, 24/7 DRT access, and cost protection against scaling charges from an attack.'},
  {id:58,domain:'security',front:'API Gateway Private API',plain:'A Private API is only reachable from inside a specific VPC via an interface endpoint — never from the public internet.',back:'Accessible only via a VPC interface (PrivateLink) endpoint in a specified VPC, combined with a resource policy that can further restrict which VPC/endpoint may invoke it.'},
  {id:59,domain:'security',front:'Bucket Policy vs IAM Policy (Same Account)',plain:'Within the same account, an Allow on the identity policy alone is enough — no bucket-policy statement required.',back:'Same-account access: identity-based Allow is sufficient on its own (bucket policy is optional). Cross-account access: also requires an explicit resource-based (bucket policy) grant, since the identity policy alone can\'t cross account boundaries.'},
  {id:60,domain:'deploy',front:'CodePipeline Stages',plain:'A pipeline is a sequence of stages — Source, Build, Deploy — each running only after the previous one succeeds.',back:'Orchestrates the release process: Source stage detects new commits, Build stage runs CodeBuild, Deploy stage pushes to targets (CodeDeploy, CloudFormation, ECS, S3, etc.) — automated end-to-end from commit to deployed environment.'},
  {id:61,domain:'deploy',front:'buildspec.yml Phases',plain:'install → pre_build → build → post_build, run in order; any non-zero exit fails the build.',back:'CodeBuild\'s config file: install (dependencies), pre_build (login/tests/linting), build (compile/package), post_build (notifications/packaging). The artifacts section defines what output files to publish.'},
  {id:62,domain:'deploy',front:'appspec.yml',plain:'CodeDeploy\'s deployment spec — lifecycle hooks for EC2/on-prem, or version/task info for Lambda/ECS.',back:'For EC2/on-premises: defines file copies and lifecycle event hooks (BeforeInstall, AfterInstall, ApplicationStart, etc.) pointing to scripts. For Lambda/ECS: defines the function version/alias or task definition/container being deployed.'},
  {id:63,domain:'deploy',front:'CodeDeploy Deployment Configs (Lambda/ECS)',plain:'Canary jumps then waits then finishes; Linear increases steadily; both can auto-rollback on an alarm.',back:'Canary: shift X% immediately, wait N minutes, then shift the rest. Linear: shift a fixed % every N minutes until 100%. Both integrate with a CloudWatch alarm for automatic rollback if triggered during the shift.'},
  {id:64,domain:'deploy',front:'Change Sets',plain:'A Change Set previews exactly what a stack update would do, before you actually commit to it.',back:'Computes the diff between current stack state and a proposed template/parameter update — shows adds, modifies (and whether that forces replacement), and removes — without applying anything until explicitly executed.'},
  {id:65,domain:'deploy',front:'CloudFormation Drift Detection',plain:'Drift detection finds resources that were changed manually outside of CloudFormation.',back:'Compares actual live resource configuration against what the template declares, flagging DRIFTED resources with a diff of exactly what was changed out-of-band (e.g. a manually edited security group rule).'},
  {id:66,domain:'deploy',front:'CloudFormation StackSets',plain:'StackSets deploy the same template across many accounts and regions from a single operation.',back:'Extends CloudFormation to create/update/delete stacks across many target accounts and regions simultaneously, integrating with AWS Organizations for account targeting.'},
  {id:67,domain:'deploy',front:'Elastic Beanstalk Deployment Policies',plain:'All-at-once is fastest but causes downtime; Rolling/Rolling-with-batch reduces capacity temporarily; Immutable and Blue/Green avoid downtime entirely.',back:'All at once: fast, brief full downtime. Rolling: batches of instances updated in place, some capacity lost during rollout. Immutable: new instances stood up fully before traffic shifts, zero downtime, ~2x capacity briefly. Blue/Green: entirely separate environment, swap CNAMEs when ready.'},
  {id:68,domain:'deploy',front:'ECR Lifecycle Policy',plain:'Lifecycle policies auto-delete old/untagged container images so storage costs don\'t creep up forever.',back:'Rules like "expire untagged images older than 14 days" or "keep only the last 10 images per tag prefix," applied automatically on a schedule — no manual cleanup needed.'},
  {id:69,domain:'deploy',front:'ECR Image Scanning',plain:'ECR can automatically scan pushed images for known vulnerabilities (CVEs) in OS packages.',back:'Basic scanning (open-source, on push) or enhanced scanning (continuous, powered by Amazon Inspector) automatically surfaces known CVEs in an image\'s OS packages without a separate external tool.'},
  {id:70,domain:'deploy',front:'ECS Rolling Update Percentages',plain:'minimumHealthyPercent = floor on tasks kept running; maximumPercent = ceiling on total tasks during rollout.',back:'minimumHealthyPercent controls how many existing tasks may be stopped before starting replacements. maximumPercent controls how many extra tasks (above desired count) may run simultaneously during the deployment.'},
  {id:71,domain:'deploy',front:'ECS Blue/Green via CodeDeploy',plain:'CodeDeploy stands up a whole new (green) task set behind a second target group, then shifts ALB traffic over, with automatic rollback on failure.',back:'Provisions a new task set alongside the running one, shifts ALB traffic between two target groups (all-at-once or gradually), runs health checks, and can auto-rollback to the old (blue) task set on failure.'},
  {id:72,domain:'deploy',front:'Manual Approval Action (CodePipeline)',plain:'A pipeline can pause and wait for a human to explicitly click "approve" before continuing — a release gate.',back:'A built-in CodePipeline action type that halts execution at that point until an authorized user approves/rejects (optionally via SNS notification) — commonly placed before a production deploy stage.'},
  {id:73,domain:'deploy',front:'CloudFormation Nested Stacks',plain:'Nested stacks break a huge template into smaller, reusable child templates referenced from a parent.',back:'A parent template references other templates as AWS::CloudFormation::Stack resources, decomposing large infrastructure into smaller, independently testable, reusable components deployed/updated together as one unit.'},
  {id:74,domain:'deploy',front:'CloudFormation Cross-Stack References',plain:'Outputs + Export in one stack, !ImportValue in another — the standard way to share values between stacks.',back:'A stack declares an Output with an Export Name; other stacks reference it via !ImportValue. CloudFormation blocks deleting/modifying an export while another stack still imports it.'},
  {id:75,domain:'deploy',front:'SAM DeploymentPreference',plain:'SAM\'s shorthand for declaring a CodeDeploy-style canary/linear Lambda rollout, right in the template.',back:'Property on a serverless function combined with AutoPublishAlias — configures traffic-shifting strategy (e.g. Canary10Percent5Minutes) backed by CodeDeploy, with automatic rollback tied to a CloudWatch alarm.'},
  {id:76,domain:'deploy',front:'AWS CDK',plain:'CDK lets you write infrastructure in a real programming language (loops, conditionals, classes), then synthesize it into CloudFormation.',back:'Define infrastructure using TypeScript/Python/Java/etc., with `cdk synth` compiling the code down into a standard CloudFormation template that deploys like any other stack — full programming-language power over raw YAML/JSON.'},
  {id:77,domain:'deploy',front:'Feature Flags / AWS AppConfig',plain:'Feature flags decouple deploying code from releasing a feature — toggle behavior via config, not a redeploy.',back:'AppConfig safely rolls out configuration (including feature flags) independently of code deployments, supporting gradual rollout percentage/duration and automatic rollback tied to a CloudWatch alarm.'},
  {id:78,domain:'deploy',front:'CodeArtifact',plain:'A private, managed package repository (npm/Maven/PyPI) that can cache packages from public registries.',back:'Fully managed artifact repository supporting common package formats, with upstream repository caching from public registries like npmjs.com — reduces external dependency and adds internal governance over third-party packages.'},
  {id:79,domain:'deploy',front:'CodePipeline Artifact Passing',plain:'CodePipeline passes files between stages via an S3 artifact bucket, using declared input/output artifact names.',back:'Each action declares named input/output artifacts; CodePipeline stores outputs in its S3 artifact store and makes them available as inputs to later stages/actions automatically — no manual file transfer.'},
  {id:80,domain:'troubleshoot',front:'Lambda "Signal: killed"',plain:'This almost always means the function ran out of memory and was terminated.',back:'Indicates an out-of-memory condition — the process exceeded its configured memory limit. Fix: increase the memory allocation (which also raises the CPU share, sometimes speeding things up too).'},
  {id:81,domain:'troubleshoot',front:'CloudWatch Logs Insights',plain:'A query language for interactively searching and aggregating CloudWatch Logs data, in place — no export needed.',back:'Supports filter/stats/parse/sort operations across one or more log groups, e.g. finding all 5xx API Gateway requests in the last hour or aggregating Lambda error counts by function.'},
  {id:82,domain:'troubleshoot',front:'CloudWatch Alarm on Error Rate',plain:'A metric-math alarm (Errors/Invocations) with an SNS action is the standard way to page on-call automatically.',back:'CloudWatch Alarms watch a metric or math expression against a threshold over an evaluation period, triggering actions (like publishing to SNS) — the building block for automated alerting, unlike CloudTrail (audit) or X-Ray (tracing).'},
  {id:83,domain:'troubleshoot',front:'X-Ray Distributed Tracing',plain:'X-Ray follows one request across every service using a shared trace ID, showing exactly where time is spent.',back:'Propagates a trace ID through a request across instrumented services (API Gateway, Lambda, downstream calls), producing a service map and per-segment timing — pinpoints bottlenecks far faster than cross-referencing separate log groups.'},
  {id:84,domain:'troubleshoot',front:'ReportBatchItemFailures (SQS-Lambda)',plain:'Without this, one bad message fails the whole batch, causing unnecessary reprocessing of already-successful ones.',back:'Enables partial batch response for SQS-triggered Lambda: the function reports only the specific failed message IDs, so only those (not the entire batch) get retried.'},
  {id:85,domain:'troubleshoot',front:'Circuit Breaker Pattern',plain:'A circuit breaker fails fast during a known outage instead of every invocation waiting out its full timeout.',back:'Tracks recent failures to a downstream dependency; once a threshold is hit, it "opens" and short-circuits further calls for a cooldown period, then periodically tests (half-open) whether the dependency has recovered — reduces wasted duration/cost during an outage.'},
  {id:86,domain:'troubleshoot',front:'DynamoDB FilterExpression Cost Trap',plain:'A filter is applied AFTER the read — you\'re still billed for every item read, not just the ones returned.',back:'FilterExpression runs after items matching KeyConditionExpression are read; capacity is billed on items read, not items returned. A non-selective filter can read (and charge for) far more than it returns. Fix by narrowing the key condition/GSI design, not by filtering harder.'},
  {id:87,domain:'troubleshoot',front:'Lambda Proxy Integration CORS Gotcha',plain:'Enabling "CORS" in the API Gateway console isn\'t enough for a Lambda proxy integration — your function\'s own response must include the headers.',back:'With Lambda proxy integration, API Gateway mostly passes the function\'s response straight through. The console CORS toggle configures the OPTIONS/mock response, but the real GET/POST response headers (Access-Control-Allow-Origin, etc.) must be returned by the function itself.'},
  {id:88,domain:'troubleshoot',front:'ROLLBACK_COMPLETE Stack State',plain:'A stack stuck in ROLLBACK_COMPLETE can\'t be updated — it must be deleted and recreated.',back:'Means the stack\'s very first CREATE failed and fully rolled back, leaving nothing successfully created to update. CloudFormation blocks UpdateStack on it; delete the stack and re-attempt creation after fixing the root cause.'},
  {id:89,domain:'troubleshoot',front:'p50 vs p99 Latency',plain:'Median latency can look perfectly healthy while a meaningful chunk of users have a slow, painful experience.',back:'p50 (median) only describes the middle of the distribution. p99/p95/p90 percentiles reveal tail latency — the "some users have it bad" problem that averages and medians completely hide.'},
  {id:90,domain:'troubleshoot',front:'Idempotency Key Pattern',plain:'Client sends a unique key per logical operation; server records it with a conditional write so retries don\'t reprocess.',back:'Server-side hardening for duplicate/retried requests (e.g. payments): store processed idempotency keys (DynamoDB conditional PutItem); a duplicate key returns the original result instead of reprocessing — used when the client\'s retry behavior can\'t be changed.'},
  {id:91,domain:'troubleshoot',front:'Lambda Memory ≈ CPU',plain:'There\'s no separate CPU dial in Lambda — more memory also means more CPU, which can cut duration (and sometimes cost).',back:'Lambda allocates CPU proportionally to configured memory. A CPU-bound function may be CPU-starved at low memory; raising memory can dramatically cut duration, sometimes reducing total cost (duration × price) despite the higher per-ms rate.'},
  {id:92,domain:'troubleshoot',front:'BatchGetItem / BatchWriteItem',plain:'Batch operations combine many individual item calls into far fewer network round trips.',back:'BatchGetItem (up to 100 items) and BatchWriteItem (up to 25 items) combine many individual Get/Put/Delete calls across one or more tables into a single API round trip, cutting network overhead versus looping individual calls.'},
  {id:93,domain:'troubleshoot',front:'Embedded Metric Format (EMF)',plain:'EMF publishes custom CloudWatch metrics via structured log output — no synchronous API call, no added latency.',back:'A function logs a specially structured JSON blob; CloudWatch Logs automatically extracts the embedded metric values into CloudWatch Metrics asynchronously, avoiding a blocking PutMetricData call in the request path.'},
  {id:94,domain:'troubleshoot',front:'VPC Lambda ENI Scaling Limits',plain:'Bursty VPC-Lambda scaling failures often trace back to subnets that are too small or confined to one AZ.',back:'VPC-attached Lambda creates/reuses ENIs to scale concurrency within configured subnets. Too-small CIDR ranges or single-AZ subnets can constrain a sudden concurrency burst — fix with larger subnets spread across multiple AZs.'},
  {id:95,domain:'troubleshoot',front:'Rolling Back a Bad Lambda Deploy',plain:'Rollback = repoint the alias to the previous immutable version. Fast, safe, and far better than live-editing under pressure.',back:'Because Lambda versions are immutable, reverting is just repointing the alias\'s target version (or letting a configured CodeDeploy alarm-triggered rollback do it) — near-instant, unlike attempting to "fix forward" live in production.'},
];
