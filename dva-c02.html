{id:86,domain:'security',sub:'API Gateway',q:'An internal API should only be callable from within a specific VPC, never from the public internet, even though it is built on API Gateway.',opts:['This is not possible — all API Gateway APIs are public','Create a Private API Gateway endpoint with a VPC endpoint (interface endpoint) and a resource policy restricting access to that VPC', 'Use an HTTP API instead of a REST API', 'Attach a NAT Gateway to the API'],ans:1,exp:'API Gateway supports Private APIs, accessible only via a VPC interface endpoint (powered by AWS PrivateLink) inside a specified VPC, combined with a resource policy that can further restrict which VPC(s)/VPC endpoint(s) may invoke it — keeping the API off the public internet entirely.',plain:'Private APIs + a VPC interface endpoint + a resource policy keep an API internal-only.'},
{id:87,domain:'security',sub:'Trust policies',q:'A trust policy on an IAM role includes a Condition requiring sts:ExternalId to match a specific value when a third-party SaaS vendor assumes the role. Why is this pattern used?',opts:['To encrypt the session credentials','To mitigate the "confused deputy" problem, ensuring only requests that know the shared external ID can assume the role even if the vendor account ID is somehow guessed', 'To enable MFA automatically', 'It has no security purpose, only cosmetic logging'],ans:1,exp:'The external ID condition is AWS\'s recommended mitigation for the confused deputy problem in third-party cross-account access: it requires the caller to also supply a specific, pre-shared secret-like value, so simply knowing (or guessing) the trusted account ID is not sufficient to assume the role.',plain:'ExternalId prevents the confused-deputy problem in third-party cross-account role assumption.'},
{id:88,domain:'security',sub:'IAM',q:'An organization wants to give federated corporate users access to the AWS Console and CLI across many AWS accounts using their existing Active Directory credentials, without creating individual IAM users per person per account.',opts:['Create an IAM user for every employee in every account they need','Use AWS IAM Identity Center (successor to AWS SSO) integrated with the corporate identity provider for centralized federated access', 'Share one IAM user\'s credentials among the whole team', 'Disable IAM entirely and use only the root account'],ans:1,exp:'IAM Identity Center provides centralized, federated access to multiple AWS accounts (and SaaS apps) using an external identity provider like Active Directory, letting users sign in once and assume appropriately-scoped permission sets per account — avoiding per-account IAM user sprawl.',plain:'IAM Identity Center centralizes federated access across many accounts instead of per-account IAM users.'},
{id:89,domain:'security',sub:'KMS',q:'A company must be able to prove, for compliance, exactly when a specific KMS key was used to decrypt data and by which principal. Where does this information appear?',opts:['Nowhere — KMS usage is not logged','CloudTrail logs every KMS API call (including Decrypt/Encrypt/GenerateDataKey) with the calling principal and timestamp', 'Only in the KMS key policy itself', 'Only in VPC Flow Logs'],ans:1,exp:'KMS API calls, including cryptographic operations like Decrypt and GenerateDataKey, are logged to CloudTrail as data/management events with full caller identity and timestamp detail, providing the audit trail needed for compliance around key usage.',plain:'CloudTrail logs every KMS operation with who called it and when — the compliance audit trail.'},
{id:90,domain:'security',sub:'Secrets rotation',q:'An RDS database credential stored in Secrets Manager needs to rotate automatically every 30 days without any custom code, since RDS is a natively supported rotation target.',opts:['Write a custom Lambda rotation function from scratch — Secrets Manager has no built-in RDS support','Enable rotation on the secret and select the Secrets Manager–provided RDS rotation template/Lambda function, setting a 30-day schedule', 'Manually update the secret value every 30 days', 'Use Parameter Store instead, since it supports rotation and Secrets Manager does not'],ans:1,exp:'Secrets Manager ships built-in, AWS-maintained rotation Lambda function templates for common database engines including RDS, Redshift, and DocumentDB — enabling rotation is largely a configuration step (schedule + which template) rather than custom development. Parameter Store, by contrast, has no native rotation workflow.',plain:'Secrets Manager has a built-in RDS rotation template — no custom Lambda code needed for the common case.'},
{id:91,domain:'security',sub:'IAM',q:'A newly created IAM role has no policies attached at all. What permissions does an entity assuming that role have by default?',opts:['Full access, since IAM defaults to allow','Effectively none — everything is implicitly denied until an identity-based policy explicitly allows an action', 'Read-only access to all services', 'Access equal to the account root user'],ans:1,exp:'IAM\'s default posture is implicit deny: with no policies attached granting any Allow, every action is denied by default. Permissions only exist once explicitly granted by an identity-based (or applicable resource-based) policy.',plain:'No attached policy means no permissions — IAM defaults to deny-everything.'},
{id:92,domain:'security',sub:'Data protection',q:'Data in transit between two microservices running on ECS within the same VPC should be encrypted, not just relying on the VPC being "private." What is a common way to achieve this at the application layer?',opts:['VPCs already encrypt all internal traffic automatically, so nothing further is needed','Use TLS/mTLS between the services (e.g. via a service mesh or application-level HTTPS), since VPC-internal traffic is not encrypted by AWS by default', 'Enable S3 default encryption', 'Use Security Groups to encrypt traffic'],ans:1,exp:'AWS does not automatically encrypt traffic between instances/containers inside a VPC (a common exam misconception) — TLS must be implemented at the application or service-mesh layer (e.g. App Mesh with mTLS, or HTTPS between services) if encryption in transit is required even for "internal" traffic.',plain:'VPC-internal traffic is not encrypted by default — TLS/mTLS must be added at the app or mesh layer.'},
{id:93,domain:'security',sub:'IAM',q:'A policy statement has "Effect":"Allow" for s3:GetObject on a bucket, and a separate SCP has an explicit "Effect":"Deny" for the same action on the same resource. What is the net result?',opts:['Allow wins because it is more specific','Deny always wins over Allow, regardless of which policy layer it comes from', 'The most recently created policy wins', 'The result is undefined and depends on the region'],ans:1,exp:'Across every layer of AWS policy evaluation (identity policy, resource policy, permissions boundary, SCP, session policy), an explicit Deny anywhere always overrides any Allow anywhere else — there is no precedence based on specificity, recency, or policy type when a Deny is present.',plain:'An explicit Deny anywhere always beats an Allow anywhere else — no exceptions.'},
{id:94,domain:'security',sub:'Networking',q:'A company wants private, dedicated network connectivity from its on-premises data center to its AWS VPC, bypassing the public internet entirely, for consistent low latency and higher bandwidth than a VPN.',opts:['A Site-to-Site VPN over the public internet','AWS Direct Connect, a dedicated physical network connection into AWS', 'A VPC Peering connection', 'An Internet Gateway with a static route'],ans:1,exp:'Direct Connect establishes a dedicated, private physical network link between on-premises infrastructure and AWS, avoiding the public internet entirely and offering more consistent latency/throughput than an internet-routed Site-to-Site VPN (which can be used as a Direct Connect failover instead).',plain:'Direct Connect is the dedicated, non-internet physical link to AWS; VPN still goes over the public internet.'},
{id:95,domain:'security',sub:'IAM',q:'A CI/CD pipeline running in CodeBuild needs permissions to deploy CloudFormation stacks. What should be attached to CodeBuild to grant these permissions, following best practice?',opts:['Hardcoded IAM user access keys stored as CodeBuild environment variables','An IAM service role attached to the CodeBuild project, scoped to only the CloudFormation/deploy actions it needs', 'The AWS account root credentials', 'No permissions are needed since CodeBuild runs inside AWS'],ans:1,exp:'CodeBuild (like Lambda and EC2) uses an IAM service role attached to the project/build, which the CodeBuild service assumes to get temporary credentials — avoiding hardcoded long-term keys in build environment variables, which is both a security anti-pattern and unnecessary since roles solve this natively.',plain:'Attach a scoped IAM service role to CodeBuild instead of hardcoding credentials as env vars.'},
{id:96,domain:'security',sub:'Compliance',q:'A company must retain CloudTrail logs for 7 years for regulatory compliance, protected from accidental or malicious deletion, even by administrators.',opts:['Store logs only in CloudWatch Logs with no retention policy','Deliver CloudTrail logs to an S3 bucket with versioning and S3 Object Lock (compliance mode) enabled, and a lifecycle policy retaining them for 7 years', 'Rely on the default 90-day CloudTrail event history', 'Disable CloudTrail after 90 days to save cost'],ans:1,exp:'CloudTrail\'s default 90-day event history is only a browsing convenience, not durable long-term storage. For durable, tamper-resistant retention, logs should be delivered to S3 with Object Lock in compliance mode (which prevents deletion/overwrite even by the root user until the retention period expires) and an appropriate lifecycle policy.',plain:'Use S3 + Object Lock (compliance mode) for tamper-proof, long-term CloudTrail log retention — the 90-day console history isn\'t durable storage.'},
{id:97,domain:'security',sub:'IAM',q:'A developer wants to grant a role permission to perform any S3 action, but only on objects with a specific tag, using attribute-based access control (ABAC) instead of listing every bucket ARN explicitly.',opts:['ABAC is not supported by IAM','Use a Condition block referencing resource tags (e.g. aws:ResourceTag) in the policy so access is scoped dynamically by tag rather than by static ARN', 'Create a separate policy per bucket manually', 'Use bucket versioning instead'],ans:1,exp:'ABAC lets policies grant/deny access based on resource tags (and principal tags) via Condition keys like aws:ResourceTag/key-name, so a single policy scales dynamically as resources are tagged, instead of needing a new static ARN-based statement for every new resource.',plain:'ABAC uses tag-based Condition keys so one policy scales across resources instead of listing every ARN.'},
// ── DEPLOYMENT (40) ──
{id:98,domain:'deploy',sub:'CodePipeline',q:'A team wants a fully automated pipeline: a commit to CodeCommit/GitHub triggers a build in CodeBuild, then automatically deploys to CodeDeploy, with each stage only starting after the previous one succeeds.',opts:['Manually trigger each step via the console','AWS CodePipeline, with a Source stage, a Build stage (CodeBuild), and a Deploy stage (CodeDeploy) chained together', 'A single CodeBuild buildspec that does everything with no orchestration', 'AWS Config rules'],ans:1,exp:'CodePipeline is the orchestration service that models a release process as ordered stages/actions (Source → Build → Deploy, etc.), automatically triggering each stage after the prior one succeeds and providing a visual pipeline, manual approval gates, and rollback visibility.',plain:'CodePipeline orchestrates Source → Build → Deploy stages automatically, running each after the last succeeds.'},
{id:99,domain:'deploy',sub:'CodeBuild',q:'A CodeBuild project needs to define install, pre-build, build, and post-build commands, plus which files to output as build artifacts. What file defines this?',opts:['appspec.yml','buildspec.yml', 'template.yaml', 'Dockerfile'],ans:1,exp:'buildspec.yml (in the repo root, or specified inline) defines CodeBuild\'s phases (install, pre_build, build, post_build) and the artifacts section describing which files to package as output — the standard configuration file CodeBuild reads.',plain:'buildspec.yml defines CodeBuild\'s phases and output artifacts.'},
{id:100,domain:'deploy',sub:'CodeDeploy',q:'A CodeDeploy deployment to EC2/on-premises instances needs to define lifecycle event hooks (like ApplicationStop, BeforeInstall, AfterInstall, ApplicationStart) that run custom scripts during deployment. What file specifies this?',opts:['buildspec.yml','appspec.yml', 'taskdef.json', 'template.yaml'],ans:1,exp:'appspec.yml is CodeDeploy\'s deployment specification: for EC2/on-premises deployments it defines the files to copy and lifecycle event hooks pointing to scripts; for Lambda/ECS deployments it defines a different but analogous structure (function versions/aliases, or task definition/container info).',plain:'appspec.yml drives CodeDeploy deployments — lifecycle hooks for EC2, or function/task config for Lambda/ECS.'},
{id:101,domain:'deploy',sub:'CodeDeploy',q:'A team deploying a new Lambda function version wants traffic gradually shifted from the old version to the new one over 10 minutes, automatically rolling back if a CloudWatch alarm fires during the shift.',opts:['Update the Lambda function code directly with no traffic shifting','Use CodeDeploy with a canary or linear deployment configuration for Lambda, backed by a CloudWatch alarm for automatic rollback', 'Manually update the alias percentage every minute by hand', 'Use Elastic Beanstalk instead of Lambda'],ans:1,exp:'CodeDeploy natively supports Lambda traffic shifting using canary (a percentage jump then wait, then 100%) or linear (steady percentage increases over time) deployment configurations, and can automatically roll back to the previous version if a specified CloudWatch alarm enters ALARM state during the shift.',plain:'CodeDeploy + Lambda alias traffic shifting (canary/linear) + a CloudWatch alarm gives automatic gradual rollout and rollback.'},
{id:102,domain:'deploy',sub:'Lambda',q:'A Lambda function is updated frequently, but production traffic should always point to a stable, tested version rather than $LATEST, while still allowing safe traffic-shifted rollouts of new versions.',opts:['Always invoke $LATEST directly from clients','Publish immutable Lambda versions and point a Lambda alias (e.g. "prod") at the desired version, updating the alias (with optional weighted routing) to roll out new versions', 'Delete and recreate the function for every deployment', 'Use environment variables to track the current version'],ans:1,exp:'Publishing a version creates an immutable snapshot of the function code+config; an alias is a named pointer to a version (or split between two versions by weight) that clients invoke instead of $LATEST directly, enabling controlled, gradual rollouts and instant rollback by repointing the alias.',plain:'Aliases point at immutable published versions, letting you roll out/roll back without clients ever calling $LATEST.'},
{id:103,domain:'deploy',sub:'ECS',q:'An ECS service running on Fargate needs a zero-downtime deployment strategy that runs new tasks alongside old ones, shifts traffic gradually via the load balancer, and can automatically roll back on failed health checks.',opts:['A rolling update only, with no traffic shifting or automated rollback','Blue/green deployment via AWS CodeDeploy integrated with the ECS service, using two target groups behind the load balancer', 'Manually stopping all old tasks before starting new ones', 'Recreating the entire ECS cluster for every deployment'],ans:1,exp:'CodeDeploy\'s blue/green deployment type for ECS provisions a new (green) task set alongside the running (blue) one, shifts ALB traffic between two target groups (all-at-once or gradually), runs health checks, and can automatically roll back to blue on failure — a safer alternative to the ECS-native rolling update, which replaces tasks in place with less traffic-shifting control.',plain:'CodeDeploy blue/green for ECS shifts ALB traffic between old/new task sets with automated rollback on failure.'},
{id:104,domain:'deploy',sub:'CloudFormation',q:'A team wants to preview exactly what a CloudFormation stack update will change (which resources will be modified, replaced, or deleted) before actually applying it.',opts:['There is no way to preview changes before applying an update','Create a Change Set, review the proposed actions, then execute it', 'Delete and recreate the stack from scratch', 'Enable drift detection'],ans:1,exp:'A Change Set computes the diff between the current stack state and a proposed template/parameter update, listing exactly which resources would be added, modified (and whether that requires replacement), or removed — without applying anything until the change set is explicitly executed.',plain:'Change Sets preview exactly what a stack update would do before you commit to it.'},
{id:105,domain:'deploy',sub:'CloudFormation',q:'A CloudFormation stack update fails partway through. What is CloudFormation\'s default behavior, and what does it do to the stack?',opts:['It leaves the stack in whatever partial state it reached','By default it automatically rolls back to the last known good state (UPDATE_ROLLBACK_COMPLETE)', 'It deletes the entire stack immediately', 'It pauses indefinitely awaiting manual intervention with no automatic action'],ans:1,exp:'By default, CloudFormation automatically attempts to roll back a failed stack update to the previous working configuration, ending in UPDATE_ROLLBACK_COMPLETE (or UPDATE_ROLLBACK_FAILED if rollback itself fails) — this automatic safety net is a core CloudFormation behavior, though it can be disabled per-update if needed.',plain:'CloudFormation auto-rolls-back a failed update to the last good state by default.'},
{id:106,domain:'deploy',sub:'CloudFormation',q:'A CloudFormation stack\'s actual resource configuration was manually changed outside of CloudFormation (e.g. someone edited a security group rule directly in the console). How can the team detect this divergence?',opts:['CloudFormation automatically reverts manual changes with no detection needed','Run drift detection on the stack, which compares actual resource state against the template-defined expected state', 'Delete and redeploy the stack blindly', 'Check CloudTrail logs manually for every resource'],ans:1,exp:'Drift detection compares the actual current configuration of stack resources against what the template declares, flagging any resource as DRIFTED (with a diff of exactly what changed) if it was modified outside of CloudFormation — the purpose-built tool for catching this kind of out-of-band change.',plain:'Drift detection finds resources that were changed manually outside of CloudFormation.'},
{id:107,domain:'deploy',sub:'CloudFormation',q:'A company wants to deploy the same CloudFormation template consistently across dozens of AWS accounts and regions in an AWS Organization, from a single management operation.',opts:['Manually deploy the template account by account','AWS CloudFormation StackSets, which deploy and manage stacks across multiple accounts and regions from one operation', 'Nested stacks only, within a single account', 'AWS Config aggregators'],ans:1,exp:'StackSets extend CloudFormation to create, update, or delete stacks across many target accounts and regions simultaneously from a single administrative operation, integrating with AWS Organizations for account targeting — designed exactly for this multi-account/multi-region rollout scenario.',plain:'StackSets deploy one template consistently across many accounts/regions from one place.'},
{id:108,domain:'deploy',sub:'Elastic Beanstalk',q:'An Elastic Beanstalk environment must deploy updates with zero downtime and full capacity maintained throughout, at the cost of running double the instances briefly and taking longer to deploy.',opts:['All at once deployment policy','Immutable deployment policy, which launches a full set of new instances in a new ASG before shifting traffic and terminating the old ones', 'In-place rolling deployment with no batch size set', 'A single-instance environment'],ans:1,exp:'Immutable deployments launch an entirely new, fully healthy set of instances (in a temporary auto scaling group) alongside the existing environment, only shifting traffic once the new instances pass health checks, then terminating the old ones — the safest Beanstalk deployment policy with zero downtime, at the cost of roughly double capacity during rollout.',plain:'Immutable deployment: fully new instances stand up before traffic shifts — safest, but costs double capacity briefly.'},
{id:109,domain:'deploy',sub:'Elastic Beanstalk',q:'An Elastic Beanstalk environment needs the fastest, simplest deployment method for a low-traffic dev environment where brief downtime during deployment is acceptable.',opts:['Immutable deployment','All at once deployment, which deploys to every instance simultaneously and briefly takes them all out of service', 'Blue/green with a separate environment swap', 'Traffic splitting canary deployment'],ans:1,exp:'"All at once" deploys the new version to every instance simultaneously — it\'s the fastest and simplest Beanstalk deployment policy, but causes brief downtime since all instances are updated (and thus temporarily unavailable) at once, making it suitable only where downtime is acceptable, like a dev environment.',plain:'All-at-once is fastest but causes brief downtime — fine for non-critical/dev environments.'},
{id:110,domain:'deploy',sub:'Elastic Beanstalk',q:'A team wants to test a new Elastic Beanstalk application version against production traffic risk-free, with the ability to instantly swap back if something goes wrong, by standing up a completely separate environment first.',opts:['Rolling deployment','Blue/green deployment: deploy the new version to a separate environment, then swap environment URLs (CNAMEs) once verified', 'In-place deployment only', 'Deleting the production environment and recreating it'],ans:1,exp:'Blue/green on Elastic Beanstalk means standing up a brand-new, fully separate environment (green) running the new version, testing it independently, and then swapping the environment CNAMEs so it becomes production — with the old environment (blue) still available for an instant rollback by swapping back.',plain:'Blue/green stands up a whole new environment and swaps URLs once verified — instant rollback by swapping again.'},
{id:111,domain:'deploy',sub:'ECR',q:'A container image repository is accumulating hundreds of old, untagged images from CI builds, driving up storage costs. What ECR feature automatically removes old images based on rules?',opts:['S3 lifecycle policies, since ECR uses S3 under the hood directly','An ECR lifecycle policy, defining rules like expiring untagged images after N days or keeping only the most recent N tagged images', 'Manually deleting images from the console every week', 'Disabling image scanning'],ans:1,exp:'ECR lifecycle policies let you define rules (e.g. expire untagged images older than 14 days, or keep only the last 10 images matching a tag prefix) that automatically clean up old images on a schedule, without manual intervention or direct S3 lifecycle management (ECR manages its own underlying storage).',plain:'ECR lifecycle policies auto-expire old/untagged images based on rules you define.'},
{id:112,domain:'deploy',sub:'ECR',q:'A security team requires every container image pushed to ECR to be automatically scanned for known OS package vulnerabilities before it is deployed.',opts:['This requires a separate third-party tool; ECR has no scanning capability','Enable ECR image scanning (basic or enhanced/Inspector-powered), which scans images on push and reports CVE findings', 'Manually run a vulnerability scanner locally before every push', 'Use S3 Macie to scan container images'],ans:1,exp:'ECR supports image scanning on push (basic scanning using the Clair-based open-source scanner, or enhanced scanning powered by Amazon Inspector for continuous, deeper scanning), automatically surfacing known CVEs in the image\'s OS packages without needing a separate external tool.',plain:'ECR can scan images on push and report CVEs automatically — no external tool required.'},
{id:113,domain:'deploy',sub:'CodePipeline',q:'A CodePipeline deployment to production should pause and wait for a human to explicitly approve the release before continuing to the deploy stage.',opts:['This is not supported in CodePipeline','Add a Manual Approval action as a stage/action in the pipeline, which pauses execution until approved (or rejected) via console/SNS notification', 'Use a CloudWatch alarm to pause the pipeline', 'Disable the pipeline and re-enable it manually for every release'],ans:1,exp:'CodePipeline supports a built-in Manual Approval action type that halts pipeline execution at that point until an authorized user approves or rejects it (optionally notified via an SNS topic), commonly placed before a production deploy stage as a release gate.',plain:'A Manual Approval action pauses the pipeline for a human sign-off before continuing.'},
{id:114,domain:'deploy',sub:'CodeArtifact',q:'A company\'s build process pulls the same third-party npm/Maven/PyPI packages repeatedly, and wants a private, managed artifact repository to cache and control these dependencies internally.',opts:['Amazon S3 with manual uploads','AWS CodeArtifact, a managed package repository supporting npm, Maven, PyPI, and more, with upstream repository caching', 'Amazon ECR, since it stores all artifact types', 'AWS CodeCommit'],ans:1,exp:'CodeArtifact is a fully managed artifact repository for common package formats (npm, PyPI, Maven, NuGet, generic), supporting upstream repositories that cache packages from public registries like npmjs.com — reducing external dependency and giving internal governance over third-party packages.',plain:'CodeArtifact is the managed package repository (npm/Maven/PyPI) with upstream caching; ECR is only for container images.'},
{id:115,domain:'deploy',sub:'SAM',q:'A SAM template defines a Lambda function\'s AutoPublishAlias property along with a DeploymentPreference of Canary10Percent5Minutes. What does this configure?',opts:['Nothing — these are unused SAM properties','Automatic Lambda version publishing plus a CodeDeploy-managed canary deployment shifting 10% of traffic to the new version, waiting 5 minutes, then shifting the rest, with automatic rollback on alarm', 'A fixed 10% traffic split forever, never reaching 100%', 'A blue/green ECS deployment'],ans:1,exp:'SAM\'s AutoPublishAlias automatically creates a new Lambda version and alias per deployment, and DeploymentPreference (backed by CodeDeploy under the hood) defines the traffic-shifting strategy — Canary10Percent5Minutes sends 10% of traffic to the new version, waits 5 minutes (during which any configured alarms can trigger automatic rollback), then completes the shift to 100%.',plain:'SAM DeploymentPreference configures CodeDeploy-style canary/linear Lambda rollouts declaratively in the template.'},
{id:116,domain:'deploy',sub:'CI/CD',q:'A CodeBuild buildspec.yml needs to run "npm install", then "npm test", then "npm run build", in that order, failing the build if any step fails. Which buildspec sections should contain these commands?',opts:['All commands in a single artifacts section','install phase: npm install; pre_build phase: npm test; build phase: npm run build', 'A single env section listing all three commands', 'The version field of buildspec.yml'],ans:1,exp:'buildspec.yml phases run in order — install (dependencies), pre_build (e.g. tests, linting, logging in to a registry), build (the actual build/compile step), and post_build (packaging, notifications) — and CodeBuild fails the phase (and the build) if any command in that phase returns a non-zero exit code.',plain:'buildspec phases run in order: install → pre_build → build → post_build, failing on any bad exit code.'},
{id:117,domain:'deploy',sub:'CloudFormation',q:'A CloudFormation template needs to share an exported value (like a VPC ID) with other stacks in the same account and region, so those other stacks can reference it without hardcoding.',opts:['Use a Parameter in the exporting stack','Use the Outputs section with an Export name in the source stack, and !ImportValue in the consuming stack', 'Manually copy the value between templates', 'Use nested stacks exclusively'],ans:1,exp:'A stack can declare an Output with an Export Name, making that value available to any other stack in the same account/region via the !ImportValue intrinsic function — the standard cross-stack reference mechanism, avoiding hardcoded values or manual copy-paste between templates.',plain:'Outputs + Export in one stack, !ImportValue in another — the standard cross-stack sharing pattern.'},
{id:118,domain:'deploy',sub:'CloudFormation',q:'A CloudFormation stack has an exported Output currently being referenced by !ImportValue in another active stack. What happens if you try to delete or modify that export?',opts:['It succeeds silently with no restriction','CloudFormation blocks the change/deletion until no other stack is importing that value', 'The importing stack is automatically deleted first', 'The export is renamed automatically'],ans:1,exp:'CloudFormation prevents you from deleting a stack (or modifying/removing an export) if another active stack still imports that exported value via !ImportValue, to avoid breaking the dependent stack — the dependency must be removed from the importing stack first.',plain:'You can\'t delete/change an export that another stack is still importing — remove the dependency first.'},
{id:119,domain:'deploy',sub:'ECS',q:'An ECS task definition needs to be updated with a new container image tag as part of a deployment. What is created, and how does the ECS service pick it up?',opts:['The existing task definition is edited in place','A new task definition revision is registered (task definitions are immutable), and the ECS service is updated to use that new revision, triggering a rolling or blue/green deployment', 'ECS automatically detects new image tags in ECR with zero configuration', 'The cluster must be deleted and recreated'],ans:1,exp:'Task definitions are immutable — every change (like a new image tag) registers a new revision, and the ECS service must be explicitly updated to reference that new task definition revision, which then triggers the service\'s configured deployment strategy (rolling update, or CodeDeploy blue/green).',plain:'Task definitions are immutable — a new revision is registered and the service is updated to use it.'},
{id:120,domain:'deploy',sub:'Deployment strategy',q:'A team wants to release a new feature to only 5% of production users first, monitor error rates, and expand to 100% only if metrics stay healthy, minimizing blast radius if something is wrong.',opts:['All-at-once deployment','A canary deployment strategy, shifting a small percentage of traffic first and expanding gradually based on monitored health', 'A single, one-time full rollback plan with no gradual rollout', 'A blue/green deployment with an instant 100% cutover'],ans:1,exp:'Canary deployments intentionally limit initial exposure to a small traffic percentage, using real production monitoring to validate the new version before expanding further — minimizing blast radius versus an all-at-once or immediate full-cutover strategy.',plain:'Canary deployments start small (e.g. 5%) and expand only if metrics stay healthy — minimizing blast radius.'},
{id:121,domain:'deploy',sub:'Rollback',q:'A CodeDeploy deployment to EC2 instances fails health checks partway through. What should be configured so CodeDeploy automatically reverts to the last known good deployment without manual intervention?',opts:['Nothing — CodeDeploy never rolls back automatically','Enable automatic rollback on the deployment group, configured to trigger on deployment failure or a specified CloudWatch alarm', 'Manually redeploy the previous version after noticing the failure', 'Disable health checks so failures are never detected'],ans:1,exp:'CodeDeploy deployment groups support automatic rollback configuration, triggering on deployment failure and/or a specified CloudWatch alarm threshold, redeploying the last known-good revision without requiring a human to notice and react manually.',plain:'Enable automatic rollback on the deployment group so failures self-heal without manual redeploys.'},
{id:122,domain:'deploy',sub:'CodeCommit alternative',q:'A team currently uses a third-party Git provider like GitHub for source control and wants CodePipeline to trigger automatically on every push to the main branch.',opts:['This integration is not possible; only CodeCommit can be a CodePipeline source','Configure CodePipeline with a GitHub (via CodeStar Connections/CodeStarSourceConnection) source action, which supports webhook-based triggering on push', 'Manually re-upload the code to CodePipeline after every push', 'Migrate to CodeCommit first, since GitHub is unsupported'],ans:1,exp:'CodePipeline supports numerous source providers beyond CodeCommit, including GitHub, GitHub Enterprise, and Bitbucket via CodeStar Connections, which uses a webhook to trigger the pipeline automatically on new commits to the configured branch.',plain:'CodePipeline can source from GitHub (via CodeStar Connections) and trigger automatically on push — not just CodeCommit.'},
{id:123,domain:'deploy',sub:'Feature flags',q:'A team wants to deploy new code to production but keep the new feature dark (disabled) for all users initially, then turn it on gradually for specific user segments without a new deployment.',opts:['Redeploy the application every time the feature should be toggled','Use a feature flag/toggle (e.g. via AWS AppConfig) so the code path is controlled by configuration, decoupling deployment from release', 'Use CodeDeploy canary deployments exclusively for this purpose', 'This requires manual code changes for every toggle'],ans:1,exp:'Feature flags (using a service like AWS AppConfig, or a general feature-flag pattern) decouple deploying code from releasing a feature to users — the code ships dark and is toggled on/off or targeted at segments via configuration, without requiring a new deployment for every change in exposure.',plain:'Feature flags decouple deployment from release — toggle features via config, not redeploys.'},
{id:124,domain:'deploy',sub:'AppConfig',q:'A team wants to safely roll out a configuration change (like a feature flag or app parameter) gradually, with automatic rollback if a CloudWatch alarm fires during the rollout, without touching application code at all.',opts:['Manually edit environment variables and redeploy for every change','AWS AppConfig, which supports gradual deployment strategies for configuration data with monitor-based automatic rollback', 'Store configuration in a public S3 bucket with no rollout control', 'Use CodeDeploy exclusively, since AppConfig cannot do gradual rollout'],ans:1,exp:'AppConfig is purpose-built for safely deploying configuration (including feature flags) independently of application code deployments, supporting deployment strategies with a defined rollout percentage/duration and automatic rollback tied to CloudWatch alarms if the configuration change causes problems.',plain:'AppConfig safely rolls out configuration/feature-flag changes with monitored, automatic-rollback deployments.'},
{id:125,domain:'deploy',sub:'CloudFormation',q:'A large CloudFormation template managing a VPC, an ECS cluster, and an RDS database is becoming hard to maintain as one file. What CloudFormation feature helps decompose it into reusable, independently manageable pieces?',opts:['Multiple unrelated top-level templates with no linkage','Nested stacks, where a parent template references child templates as AWS::CloudFormation::Stack resources', 'Copy-pasting the VPC resources into every other template', 'StackSets, since they are meant for decomposing a single template'],ans:1,exp:'Nested stacks let a parent template reference other templates as stack resources, decomposing a large infrastructure definition into smaller, reusable, independently testable components (e.g. a standard VPC template reused across many parent stacks) while still deploying/updating them together as one unit.',plain:'Nested stacks break a large template into smaller, reusable child templates referenced from a parent.'},
{id:126,domain:'deploy',sub:'ECS',q:'An ECS service deployment must ensure the minimum healthy percent and maximum percent settings control how aggressively old tasks are replaced during a rolling deployment. What do these two settings control?',opts:['They control container image size limits','minimumHealthyPercent controls how many existing tasks may be stopped before starting replacements; maximumPercent controls how many extra tasks above the desired count may run during deployment', 'They control CPU/memory reservation only', 'They are unrelated to deployments and only affect auto scaling'],ans:1,exp:'For ECS rolling updates, minimumHealthyPercent sets the floor on how many tasks (as a % of desiredCount) must stay running/healthy during deployment, and maximumPercent sets the ceiling on how many total tasks (including new ones) may run simultaneously — together they control how much capacity dips or spikes during a rolling deployment.',plain:'minimumHealthyPercent = floor on tasks kept running; maximumPercent = ceiling on total tasks during rollout.'},
{id:127,domain:'deploy',sub:'CodeBuild',q:'A CodeBuild project needs to build a Docker image and push it to ECR as part of the pipeline. What must be true about the CodeBuild build environment and IAM role for this to work?',opts:['Docker builds are not supported in CodeBuild','Privileged mode must be enabled (for Docker-in-Docker) and the CodeBuild service role must have ECR push permissions (and often ecr:GetAuthorizationToken)', 'CodeBuild automatically has Docker and ECR access with no configuration', 'The build must run on an EC2 instance outside of CodeBuild'],ans:1,exp:'Building Docker images inside CodeBuild requires enabling privileged mode on the build project (since Docker needs elevated container privileges to run its own daemon), and the CodeBuild service role must be granted ECR permissions (authenticate via ecr:GetAuthorizationToken, then push with ecr:PutImage etc.) to push the resulting image.',plain:'Docker builds in CodeBuild need privileged mode enabled plus an ECR-permissioned service role.'},
{id:128,domain:'deploy',sub:'Lambda',q:'A team wants to guarantee that a Lambda function\'s $LATEST code is never directly invoked by production traffic, protecting against unpublished, still-being-edited code accidentally running in prod.',opts:['This cannot be prevented','Always invoke through a published version or an alias pointing to a specific version, never $LATEST, and restrict IAM/resource policies accordingly', 'Disable the Lambda console entirely', 'Use only inline code editing, never $LATEST'],ans:1,exp:'$LATEST always reflects the most recent, potentially untested, in-progress code changes; the standard practice is to have production traffic invoke a published version (immutable snapshot) or an alias pointing to one, and to restrict access so only intended callers (e.g. via IAM policy on specific version/alias ARNs) can invoke it.',plain:'Never let production traffic hit $LATEST directly — invoke a published version or an alias instead.'},
{id:129,domain:'deploy',sub:'Systems Manager',q:'A team wants to run a defined set of commands (e.g. patch installation) across a fleet of EC2 instances on demand or on a schedule, without SSH access or a bastion host.',opts:['AWS Systems Manager Run Command, executed against instances with the SSM Agent installed and an appropriate IAM instance role', 'CodeDeploy only', 'Manual SSH loops via a script', 'AWS Config'],ans:0,exp:'Systems Manager Run Command lets you execute predefined or custom command documents across a targeted fleet of managed instances (which need the SSM Agent and an IAM instance profile with SSM permissions), without requiring SSH access, open inbound ports, or a bastion host.',plain:'SSM Run Command executes commands across an EC2 fleet with no SSH access required.'},
{id:130,domain:'deploy',sub:'Systems Manager',q:'A CI/CD pipeline needs to deploy application code onto EC2 instances that are not managed by CodeDeploy, pulling artifacts from S3 and running install scripts using Systems Manager instead.',opts:['This is only possible with CodeDeploy','AWS Systems Manager Automation/Run Command documents can pull artifacts and execute deployment scripts as an alternative to CodeDeploy', 'SSM cannot interact with S3', 'Manually RDP/SSH into every instance for every deploy'],ans:1,exp:'While CodeDeploy is the purpose-built deployment service, Systems Manager (via Run Command or Automation documents) can also be scripted to pull artifacts from S3 and execute install/deployment steps on managed instances — a valid alternative pattern, especially when instances are already SSM-managed for other operational tasks.',plain:'SSM Run Command/Automation can also drive deployments to EC2 as an alternative to CodeDeploy.'},
{id:131,domain:'deploy',sub:'CloudFormation',q:'A CloudFormation stack update needs to replace an RDS instance\'s DB instance class, but the team wants to guarantee no data loss even if the update fails partway through, given RDS replacement risk.',opts:['CloudFormation resource updates are always non-destructive by default with no risk','Check the resource\'s update behavior (whether the change requires replacement) in the documentation beforehand, take a manual snapshot first, and consider a Change Set to preview whether replacement will occur', 'Never update RDS instances via CloudFormation under any circumstances', 'Disable the DeletionPolicy attribute to avoid any risk'],ans:1,exp:'Some CloudFormation property changes force resource replacement (data loss risk for stateful resources like RDS) while others update in place — reviewing the change set beforehand shows whether replacement is required, and setting a DeletionPolicy of Snapshot (or taking a manual snapshot first) protects against data loss if replacement does occur.',plain:'Check the Change Set for replacement risk on stateful resources, and use DeletionPolicy: Snapshot or a manual snapshot as a safety net.'},
{id:132,domain:'deploy',sub:'CodePipeline',q:'A CodePipeline stage runs a CodeBuild action, and the team wants pipeline execution to fail and stop immediately if the CodeBuild project\'s tests fail, without proceeding to the deploy stage.',opts:['This requires manual monitoring, since CodePipeline always proceeds to the next stage','This is the default behavior — a failed action (like a CodeBuild project returning a non-zero exit) fails the stage and halts pipeline progression to subsequent stages automatically', 'You must manually configure a Deny policy for this', 'CodePipeline ignores CodeBuild exit codes'],ans:1,exp:'CodePipeline\'s default behavior is exactly this: if an action within a stage fails (e.g. CodeBuild exits non-zero because tests failed), the stage is marked failed and pipeline execution stops there, never automatically proceeding to later stages like Deploy — no extra configuration is required for this safety behavior.',plain:'A failed CodeBuild action automatically halts the pipeline — later stages never run. This is default behavior.'},
{id:133,domain:'deploy',sub:'ECS',q:'A team wants ECS Fargate tasks to automatically register/deregister with an Application Load Balancer target group as tasks start and stop, without manual target group management.',opts:['Manual registration is always required for Fargate','Configure the ECS service with a load balancer integration; ECS automatically registers new tasks\' IPs with the target group and deregisters them on stop', 'Use Classic Load Balancers only, since ALBs cannot integrate with ECS', 'Deploy a static list of IPs to the target group ahead of time'],ans:1,exp:'When an ECS service is configured with a load balancer (target group), ECS automatically registers each new task\'s IP/port with the target group as it becomes healthy, and deregisters it (with connection draining) when the task is stopped — fully automated, no manual target group edits needed.',plain:'ECS auto-manages ALB target group registration/deregistration for its tasks — no manual steps needed.'},
{id:134,domain:'deploy',sub:'CloudFormation',q:'A developer wants to author CloudFormation-equivalent infrastructure using a general-purpose programming language (like TypeScript or Python) with loops, conditionals, and reusable constructs, then synthesize it to a CloudFormation template.',opts:['This is not possible; CloudFormation only accepts YAML/JSON directly','AWS CDK (Cloud Development Kit), which lets you define infrastructure in a programming language and synthesizes it into a CloudFormation template for deployment', 'AWS SAM, since SAM also uses general-purpose languages', 'Terraform is the only tool that supports this'],ans:1,exp:'The AWS CDK lets developers define infrastructure using familiar programming languages (TypeScript, Python, Java, etc.), with the full power of that language (loops, conditionals, classes, reusable constructs), and the `cdk synth` step compiles/synthesizes that code down into a standard CloudFormation template that then deploys like any other stack.',plain:'CDK lets you write infrastructure in a real programming language, then synthesizes it into CloudFormation.'},
{id:135,domain:'deploy',sub:'CodeDeploy',q:'A CodeDeploy deployment group for an EC2/on-premises deployment needs to identify which instances receive the new revision. What mechanism is commonly used to target instances?',opts:['CodeDeploy targets a random subset of all instances in the account with no way to scope it','EC2 tag groups, an Auto Scaling group, or a CloudFormation stack association, specified on the deployment group', 'A hardcoded list of public IP addresses only', 'The instances must be selected manually in real time during every deployment'],ans:1,exp:'A CodeDeploy deployment group specifies its target instances declaratively — by EC2 tags, by an associated Auto Scaling group (so CodeDeploy automatically deploys to newly launched instances too), or via CloudFormation stack association — rather than a manual, one-off instance selection each time.',plain:'Deployment groups target instances via tags, an ASG association, or CloudFormation — not manual per-deploy selection.'},
{id:136,domain:'deploy',sub:'Multi-environment',q:'A company wants strict isolation between its dev, staging, and production environments — separate billing, separate blast radius, separate IAM — while still deploying the same CloudFormation templates/pipelines to each.',opts:['Use a single AWS account with different resource name prefixes for each environment','Use separate AWS accounts per environment (e.g. via AWS Organizations), parameterizing the same templates/pipeline per account', 'This level of isolation is only possible with separate AWS Organizations entirely', 'Use IAM users named "dev", "staging", "prod" within one account'],ans:1,exp:'The AWS-recommended multi-environment isolation pattern is separate accounts per environment (managed centrally via AWS Organizations), giving true isolation of billing, blast radius, and IAM boundaries — while the same infrastructure-as-code templates and CI/CD pipelines are simply parameterized and deployed into each account.',plain:'Separate AWS accounts per environment (via Organizations) give real isolation, while IaC/pipelines stay shared and parameterized.'},
{id:137,domain:'deploy',sub:'CodePipeline',q:'A pipeline\'s deploy stage needs to pass build artifacts (like a packaged Lambda zip or a CloudFormation template) from the build stage to the deploy stage. How does CodePipeline pass this data between stages?',opts:['Stages cannot pass data to each other; each stage must independently rebuild everything','Each action declares input and output artifacts, and CodePipeline stores them in an S3 artifact bucket, passing references between stages automatically', 'Manually uploading artifacts to a shared EFS volume', 'Using environment variables shared globally across the whole pipeline'],ans:1,exp:'CodePipeline actions declare named input/output artifacts; behind the scenes, CodePipeline stores each action\'s output artifacts in an S3 bucket (the pipeline\'s artifact store) and makes them available as input artifacts to subsequent stages/actions automatically, without any manual file transfer.',plain:'CodePipeline passes artifacts between stages via an S3 artifact store, using declared input/output artifact names.'},
// ── TROUBLESHOOTING & OPTIMIZATION (30) ──
{id:138,domain:'troubleshoot',sub:'Lambda',q:'A Lambda function intermittently fails with "Task timed out after 3.00 seconds" errors, but succeeds when re-run. The function calls a downstream HTTP API that occasionally responds slowly. What are two reasonable fixes?',opts:['Reduce the function\'s memory to save cost','Increase the function\'s timeout setting to accommodate slow calls, and/or add retry logic with backoff for the downstream call', 'Delete the function and recreate it', 'Switch the function to a container image, which fixes timeouts automatically'],ans:1,exp:'A default or too-low timeout combined with an occasionally slow downstream dependency directly causes intermittent timeout errors. Raising the timeout to a value appropriate for the worst-case downstream latency, and/or adding retry-with-backoff logic (with a shorter per-attempt timeout) for transient slowness, are the standard fixes — not memory or a runtime change unrelated to the actual bottleneck.',plain:'Intermittent Lambda timeouts calling a slow downstream API: raise the timeout and/or add retry-with-backoff.'},
{id:139,domain:'troubleshoot',sub:'Lambda',q:'A Lambda function\'s CloudWatch Logs show "Runtime exited with error: signal: killed" and the function processes large in-memory datasets. What is the most likely cause and fix?',opts:['A timeout misconfiguration, fixed by adjusting the timeout only','The function is exceeding its configured memory limit (which is killed by the runtime), fixed by increasing the memory allocation', 'A missing IAM permission', 'An unsupported Lambda runtime version'],ans:1,exp:'"Signal: killed" typically indicates an out-of-memory condition — the process consumed more memory than the function\'s configured limit and was terminated by the execution environment. Since Lambda memory and CPU scale together, increasing the memory setting both resolves the OOM condition and can also speed up processing.',plain:'"Signal: killed" usually means Lambda ran out of memory — increase the memory setting.'},
{id:140,domain:'troubleshoot',sub:'Lambda',q:'A Lambda function behind API Gateway shows consistently higher latency for the first request after a period of inactivity, but is fast on subsequent requests. What phenomenon is this, and what reduces it?',opts:['This is caused by DynamoDB throttling only','Cold starts — a new execution environment must be initialized; mitigations include provisioned concurrency, smaller deployment packages, and initializing SDK clients outside the handler', 'This is a permanent, unfixable characteristic of API Gateway', 'This is caused by CloudFront caching being disabled'],ans:1,exp:'Cold starts occur when Lambda must initialize a brand-new execution environment (download code, start the runtime, run init code) before handling the first invocation in that environment; subsequent "warm" invocations reuse it and are fast. Provisioned concurrency, smaller packages/fewer dependencies, and moving expensive initialization (like SDK clients) to the global scope all reduce cold-start impact.',plain:'The first-request slowness is a cold start — reduce it with provisioned concurrency, smaller packages, and global-scope init.'},
{id:141,domain:'troubleshoot',sub:'IAM',q:'An application receives "AccessDenied" calling s3:PutObject, even though the caller\'s IAM policy has an explicit Allow for s3:PutObject on that exact bucket ARN. What else should be checked?',opts:['Nothing else — the identity policy is always sufficient','Check for an explicit Deny in any applicable SCP or permissions boundary, and check the S3 bucket policy for a conflicting Deny or missing cross-account grant', 'The IAM policy simply needs to be re-saved', 'Restart the application to refresh cached credentials'],ans:1,exp:'An Allow in the identity policy can still be overridden by an explicit Deny anywhere else in the evaluation chain (SCP, permissions boundary, session policy) or by a bucket policy Deny statement; for cross-account access, a missing bucket policy grant (not just a Deny) can also cause AccessDenied even with a permissive identity policy.',plain:'AccessDenied despite an Allow: check for a Deny elsewhere (SCP/boundary/bucket policy) or a missing cross-account grant.'},
{id:142,domain:'troubleshoot',sub:'DynamoDB',q:'An application logs frequent ProvisionedThroughputExceededException errors on a DynamoDB table during traffic spikes, even though average traffic is well within the provisioned capacity. What is happening and what fixes it?',opts:['The table has too many GSIs, which must be removed entirely','Traffic is likely concentrated on a hot partition or the spike briefly exceeds capacity; fixes include switching to on-demand capacity, using auto scaling with headroom, or improving key distribution', 'DynamoDB tables cannot handle any traffic spikes under any configuration', 'The application must switch to RDS instead'],ans:1,exp:'Average utilization looking fine but spiky throttling usually points to either a hot partition (uneven key distribution concentrating load) or short bursts exceeding provisioned capacity faster than auto scaling can react; switching to on-demand mode (which absorbs bursts natively) or improving partition key cardinality/write sharding are standard fixes.',plain:'Spiky throttling despite low average usage: check for hot partitions, or switch to on-demand capacity mode.'},
{id:143,domain:'troubleshoot',sub:'API Gateway',q:'Clients calling a public API Gateway endpoint intermittently receive HTTP 429 "Too Many Requests" responses during traffic bursts. What is the most likely cause and what should the client do?',opts:['A bug in API Gateway that requires an AWS support ticket','API Gateway throttling (account/stage/method-level limits or a usage plan) rejecting requests over the configured rate; the client should implement retry with exponential backoff and, if legitimate, request a limit increase', 'The Lambda function\'s memory is too low', 'The API\'s custom domain certificate has expired'],ans:1,exp:'HTTP 429 from API Gateway indicates throttling — the request rate exceeded the configured limit (account-level default, per-stage/method throttling, or a usage plan\'s rate/burst limits). Well-behaved clients should back off and retry with exponential backoff/jitter, and if the limit is genuinely too low for legitimate traffic, request a service quota increase or adjust the usage plan.',plain:'429 means throttling — retry with backoff on the client side, and raise limits if the traffic is legitimate.'},
{id:144,domain:'troubleshoot',sub:'SQS',q:'Messages in an SQS queue are being processed, but a small percentage keep reappearing and are never successfully deleted, eventually piling up. Where should the team look to understand why, without losing the problematic messages?',opts:['Immediately purge the queue to clear the backlog','Configure a dead-letter queue with an appropriate maxReceiveCount so failing messages are isolated there for inspection, then examine those payloads/logs for the actual processing error', 'Increase the message retention period to infinite', 'Disable the consumer entirely'],ans:1,exp:'Messages that repeatedly fail processing and are never deleted are the classic "poison pill" symptom; the correct response is to configure (or check) a dead-letter queue with a maxReceiveCount threshold so they stop looping in the main queue and get isolated for root-cause inspection (bad data format, a bug triggered only by that payload, etc.) without deleting them and losing the evidence.',plain:'Repeatedly failing messages are poison pills — route them to a DLQ via maxReceiveCount and inspect them there.'},
{id:145,domain:'troubleshoot',sub:'CloudWatch',q:'A team needs to search and analyze large volumes of Lambda CloudWatch Logs using an ad-hoc query language (e.g. filtering by a specific request ID and aggregating error counts) without exporting logs elsewhere.',opts:['Manually download and grep every log stream','CloudWatch Logs Insights, a purpose-built query language for interactively searching and analyzing CloudWatch Logs data', 'AWS Config', 'VPC Flow Logs'],ans:1,exp:'CloudWatch Logs Insights provides a query language (filter, stats, sort, parse, etc.) for interactively searching, filtering, and aggregating log data stored in CloudWatch Logs — including cross-log-group queries — without needing to export logs to another system first.',plain:'CloudWatch Logs Insights lets you query/aggregate log data interactively, in place.'},
{id:146,domain:'troubleshoot',sub:'CloudWatch',q:'A team wants to be automatically notified when a Lambda function\'s error rate exceeds 5% over a 5-minute period, and have that notification trigger an SNS-based page to on-call engineers.',opts:['Manually check the CloudWatch console every few minutes','Create a CloudWatch Alarm on the function\'s Errors/Invocations metrics (or a math expression for error rate) with an SNS topic as the alarm action', 'Enable X-Ray tracing, since it sends alerts automatically', 'Use CloudTrail, since it monitors application-level errors'],ans:1,exp:'CloudWatch Alarms watch a metric (or a metric math expression, like Errors/Invocations for error rate) against a threshold over an evaluation period, and can trigger actions including publishing to an SNS topic — the standard building block for automated alerting/paging, unlike CloudTrail (API audit log) or X-Ray (tracing) which don\'t natively page on-call.',plain:'A CloudWatch Alarm on an error-rate metric expression, with an SNS action, is the standard way to page on-call.'},
{id:147,domain:'troubleshoot',sub:'X-Ray',q:'A distributed trace in X-Ray shows a request spending 800ms in a segment labeled a downstream DynamoDB call, while the Lambda function\'s own processing time is only 20ms. What does this indicate, and what is a next step?',opts:['The Lambda function\'s code is inefficient and needs optimization first','The bottleneck is the DynamoDB call itself — investigate throttling, hot partitions, missing indexes causing a Scan instead of Query, or add DAX caching', 'X-Ray segment timings are unreliable and should be ignored','The API Gateway integration timeout must be increased to fix the root cause'],ans:1,exp:'X-Ray\'s per-segment timing pinpoints exactly which part of the call chain is slow; here it clearly identifies DynamoDB as the bottleneck (not Lambda\'s own code), so the investigation should focus on DynamoDB-side causes — throttling/hot partitions, an inefficient Scan instead of an indexed Query, or adding DAX for read-heavy hot paths — rather than optimizing unrelated Lambda code.',plain:'X-Ray segment timing pinpoints the exact slow hop — here, DynamoDB — so investigate there, not elsewhere.'},
{id:148,domain:'troubleshoot',sub:'API Gateway',q:'A Lambda-backed API Gateway endpoint returns HTTP 502 "Bad Gateway" to clients. What is a common cause of a 502 specifically (as opposed to a 500 or 503), and where should the developer look first?',opts:['502 always means the client sent invalid JSON','502 commonly means the Lambda integration returned a malformed response (not matching the expected proxy integration format) — check the function\'s return value structure and CloudWatch Logs for the actual exception', 'API Gateway is down, requiring an AWS status page check only', 'The client\'s TLS certificate is invalid'],ans:1,exp:'For Lambda proxy integrations, API Gateway expects a specific response shape (statusCode, headers, body); if the function throws an unhandled exception or returns something that doesn\'t match that shape, API Gateway surfaces it as a 502. The fix starts with checking the function\'s CloudWatch Logs for the actual error/exception and verifying the handler\'s return format.',plain:'502 from a Lambda proxy integration usually means a malformed response or unhandled exception — check the logs and the return shape.'},
{id:149,domain:'troubleshoot',sub:'Networking',q:'After moving a Lambda function into a VPC to reach a private RDS instance, the function now times out calling an external public API it previously called successfully. What is the most likely cause?',opts:['The Lambda runtime was downgraded automatically','The function\'s subnets are private with no route to a NAT Gateway, so it lost its outbound internet path once VPC-attached', 'RDS is blocking all outbound Lambda traffic', 'VPC-attached functions cannot use environment variables'],ans:1,exp:'Once attached to a VPC, a Lambda function only has the networking of the subnets/security groups it\'s placed in — if those are private subnets with no route to a NAT Gateway, the function loses its previous default internet access and can no longer reach public endpoints, even though it could before being VPC-attached.',plain:'VPC-attached Lambda in a private subnet loses internet access unless routed through a NAT Gateway.'},
{id:150,domain:'troubleshoot',sub:'Caching',q:'An API\'s read-heavy endpoint is under heavy DynamoDB read load, and the team adds ElastiCache in front of it, but a subsequent write to DynamoDB isn\'t reflected in API responses for several minutes. What is the likely cause?',opts:['DynamoDB itself is slow to persist writes','A stale cache — the cache entry\'s TTL/expiration hasn\'t elapsed and/or the write path doesn\'t invalidate or update the cache when data changes', 'ElastiCache does not support DynamoDB as a data source at all', 'The application is reading from a different AWS region'],ans:1,exp:'This is a classic cache-invalidation problem: if the write path only updates DynamoDB and doesn\'t also invalidate/update the corresponding cache entry, reads keep serving stale cached data until the TTL naturally expires. The fix is either a shorter TTL, write-through/cache invalidation on write, or accepting the staleness window if it\'s acceptable for the use case.',plain:'Stale reads after a write usually mean the cache wasn\'t invalidated/updated — check the write path and TTL.'},
{id:151,domain:'troubleshoot',sub:'Lambda',q:'A Lambda function processing SQS messages in batches occasionally reports the entire batch as failed even though only one message in the batch actually had bad data, causing unnecessary reprocessing of already-successful messages.',opts:['This is unavoidable with SQS-Lambda batch processing','Enable partial batch response (ReportBatchItemFailures) so the function can report only the specific failed message IDs, letting the rest of the batch be treated as successfully processed', 'Reduce the batch size to 1 for every queue permanently', 'Switch to SNS instead of SQS'],ans:1,exp:'Without partial batch response enabled, an unhandled error anywhere in batch processing causes Lambda to treat the whole batch as failed, redelivering every message including ones already processed successfully. Enabling ReportBatchItemFailures lets the function explicitly report which specific message IDs failed, so only those are retried.',plain:'Enable ReportBatchItemFailures so only the actually-failed messages in a batch get retried, not the whole batch.'},
{id:152,domain:'troubleshoot',sub:'Performance',q:'A Node.js Lambda function creates a new AWS SDK client instance inside the handler on every invocation, and profiling shows this adds measurable latency to every request, even warm ones. What is the fix?',opts:['Switch to a compiled language, since the SDK is only slow in Node.js','Move the SDK client instantiation outside the handler (module/global scope) so it is created once during INIT and reused across warm invocations', 'Increase the function timeout to absorb the extra latency', 'Disable X-Ray tracing to save time'],ans:1,exp:'Creating an SDK client involves some setup cost (config resolution, credential provider chain, connection pool init); doing this inside the handler repeats that cost on every single invocation. Moving it to the global/module scope means it runs once per execution environment (during INIT) and is reused for every warm invocation in that environment, removing the redundant per-invocation overhead.',plain:'Instantiate SDK clients outside the handler (global scope) so warm invocations reuse them instead of recreating them.'},
{id:153,domain:'troubleshoot',sub:'Debugging',q:'An application throws intermittent errors that are hard to reproduce locally, and the team needs to correlate a specific failed user request across API Gateway, multiple Lambda functions, and DynamoDB to find the root cause.',opts:['Manually cross-reference timestamps across separate, unrelated log groups','Enable X-Ray distributed tracing across all the services and use the trace ID to view the entire request\'s end-to-end call chain and timing in one place', 'Add print statements everywhere and redeploy repeatedly until reproduced', 'Rely solely on CloudWatch composite alarms'],ans:1,exp:'X-Ray is designed exactly for this: it propagates a trace ID through the request across every instrumented service, letting you view one request\'s complete call chain (including timing and errors at each hop) in a single trace/service map, instead of manually correlating timestamps across disconnected log groups.',plain:'X-Ray traces one request across every service using a shared trace ID — the tool built for this exact problem.'},
{id:154,domain:'troubleshoot',sub:'Cost/Performance',q:'A Lambda function is configured with 128MB of memory and takes 4 seconds to complete a CPU-bound task, and the team is trying to reduce both cost and duration. What is a counter-intuitive but often effective first thing to try?',opts:['Reduce memory further to 64MB to save cost per millisecond','Increase the memory allocation, since more memory also grants more CPU — often reducing duration enough that total cost (duration × price-per-ms) actually goes down', 'Switch to a different programming language only', 'Disable logging to reduce execution time'],ans:1,exp:'Because Lambda allocates CPU proportionally to memory, a CPU-bound function at low memory may be CPU-starved; increasing memory increases available CPU and can cut duration dramatically — since billing is duration × price-per-ms-per-memory-size, a shorter duration at higher memory sometimes costs the same or less than a longer duration at low memory. This trade-off should be tested empirically per function.',plain:'For CPU-bound functions, more memory = more CPU = often shorter (and sometimes cheaper) execution — test empirically.'},
{id:155,domain:'troubleshoot',sub:'DynamoDB',q:'A DynamoDB table query using a FilterExpression is returning correct results but consuming far more read capacity than expected for the amount of data actually returned. Why, and what is the fix?',opts:['FilterExpression is applied before DynamoDB reads the items, so this behavior is unexpected and indicates a bug','FilterExpression is applied AFTER items are read (and RCUs are charged on items read, not items returned), so a non-selective filter still reads and charges for many non-matching items — the fix is to model the access pattern into the key/index design (e.g. a GSI) instead of filtering', 'Filtering is free and this must be caused by something unrelated', 'Switching to Scan instead of Query would use less capacity'],ans:1,exp:'DynamoDB applies FilterExpression after retrieving items matching the KeyConditionExpression, and capacity is consumed based on items read (before filtering), not items returned — so a query that reads 1000 items but filters down to 10 still costs the RCUs for 1000. The scalable fix is designing the key schema/GSI so the KeyConditionExpression itself narrows the read, rather than relying on a post-read filter.',plain:'FilterExpression is billed on items read, not items returned — fix expensive filtering with better key/GSI design, not more filters.'},
{id:156,domain:'troubleshoot',sub:'CORS',q:'A browser-based single-page app calling an API Gateway endpoint gets a console error: "No \'Access-Control-Allow-Origin\' header is present on the requested resource," even though CORS was enabled in the API Gateway console for that resource.',opts:['This error always means the API itself is down','A common cause is that the Lambda function\'s own response (for a Lambda proxy integration) doesn\'t include the CORS headers itself, since API Gateway CORS config alone doesn\'t inject headers into proxy integration responses — the function must return them', 'CORS errors are always caused by an expired TLS certificate', 'The browser needs to be restarted'],ans:1,exp:'With Lambda proxy integration, API Gateway passes the Lambda function\'s response through mostly as-is — enabling "CORS" in the console configures the mock/OPTIONS response and documentation, but the actual Lambda response for the real GET/POST/etc. must itself include Access-Control-Allow-Origin (and related) headers in its returned headers object, or the browser will still block it.',plain:'For Lambda proxy integrations, the function\'s own response must include CORS headers — enabling CORS in the console isn\'t enough by itself.'},
{id:157,domain:'troubleshoot',sub:'S3/CloudFront',q:'Users accessing static assets through a CloudFront distribution in front of a private S3 bucket intermittently receive 403 Forbidden errors, while direct S3 console access (with appropriate IAM permissions) works fine.',opts:['CloudFront never supports private S3 origins','The CloudFront Origin Access Control (OAC) configuration or the S3 bucket policy may be missing/misconfigured for that specific distribution, or object-level permissions/ACLs differ per object', 'The distribution needs to be deleted and recreated every time this happens', 'This always indicates a DDoS attack in progress'],ans:1,exp:'403s from CloudFront on a private S3 origin typically trace back to the OAC/OAI setup: either the bucket policy doesn\'t grant that specific distribution\'s OAC principal access, or specific objects have conflicting ACLs/permissions overriding the bucket-level policy — worth checking both the bucket policy statement and, if any objects were uploaded with explicit ACLs, those individual object permissions.',plain:'403s through CloudFront on a private S3 origin usually mean the OAC/bucket-policy grant is missing or an object has a conflicting ACL.'},
{id:158,domain:'troubleshoot',sub:'Lambda',q:'A Lambda function\'s reserved concurrency is set to 10, and during a traffic spike, requests beyond that start failing with "TooManyRequestsException" / throttling. What are appropriate responses?',opts:['This indicates a bug in Lambda itself that AWS Support must fix','This is expected behavior at the configured concurrency limit; options include raising reserved concurrency (if account limits allow), adding an SQS buffer in front to smooth bursts, or implementing client-side retry with backoff', 'Concurrency limits cannot be changed once set', 'Switch the function to a container image to remove concurrency limits'],ans:1,exp:'Reserved concurrency is an intentional hard cap on how many concurrent executions that function may have; once traffic exceeds it, further invocations are throttled by design. Valid responses include raising the limit (within account-level unreserved concurrency availability), decoupling the spike using an SQS queue as a buffer so Lambda drains it at a sustainable rate, or having callers retry with backoff.',plain:'Hitting a concurrency limit is expected — raise it, buffer with SQS, or retry with backoff on the client.'},
{id:159,domain:'troubleshoot',sub:'Debugging',q:'A production incident requires quickly finding all API Gateway requests that resulted in a 5xx status code in the last hour, across a high-volume API, without manually scrolling through raw logs.',opts:['Manually download all logs and search with a text editor','Enable API Gateway access logging to CloudWatch Logs, then use CloudWatch Logs Insights with a filter/stats query on the status field', 'Use AWS Config, since it tracks HTTP status codes', 'Disable the API temporarily until root cause is found'],ans:1,exp:'With API Gateway access logging enabled (delivering structured log entries to CloudWatch Logs), CloudWatch Logs Insights can run a targeted query (e.g. filter status >= 500 | stats count() by …) to quickly surface exactly the failing requests, far faster than manual log scrolling.',plain:'API Gateway access logs + a CloudWatch Logs Insights query quickly surfaces all 5xx requests in a time window.'},
{id:160,domain:'troubleshoot',sub:'Idempotency',q:'A payment API occasionally receives duplicate POST requests from a client\'s retry logic after network timeouts, risking duplicate charges. The client cannot be changed. How should the API be hardened server-side?',opts:['Nothing can be done server-side; this is entirely a client problem','Require an idempotency key header from the client and, server-side, store processed idempotency keys (e.g. in DynamoDB with a conditional write) so a duplicate request with the same key returns the original result instead of reprocessing', 'Increase the API Gateway timeout to prevent client retries', 'Disable retries at the API Gateway level'],ans:1,exp:'The standard hardening pattern is an idempotency key: the client sends a unique key per logical operation (even across retries of the same operation), and the server records processed keys atomically (e.g. a DynamoDB conditional PutItem) — a duplicate request with a previously-seen key is detected and the original result is returned without reprocessing the payment.',plain:'An idempotency key + a server-side conditional write on that key prevents duplicate processing of retried requests.'},
{id:161,domain:'troubleshoot',sub:'Monitoring',q:'A team wants to publish a custom business metric (like "orders placed per minute") from within Lambda function code, viewable and alarmable in CloudWatch, with minimal added latency to the function\'s response time.',opts:['Call the CloudWatch PutMetricData API synchronously before returning, waiting for the response every time','Use CloudWatch Embedded Metric Format (EMF), emitting structured metric data as part of the function\'s log output — CloudWatch automatically extracts it into metrics asynchronously with no extra API call latency', 'This requires a separate EC2 instance dedicated to metrics publishing', 'Custom metrics are not supported from Lambda'],ans:1,exp:'Embedded Metric Format lets a function simply log a specially structured JSON blob (via a logging library or manually), and CloudWatch Logs automatically extracts embedded metric values into CloudWatch Metrics asynchronously — avoiding the added latency and failure surface of a synchronous PutMetricData API call directly in the request path.',plain:'EMF publishes custom metrics via structured log output — no synchronous API call, no added latency.'},
{id:162,domain:'troubleshoot',sub:'Networking',q:'A Lambda function attached to a VPC intermittently fails with ENI (elastic network interface) attachment timeouts or errors during traffic spikes, even though the subnets have available IP addresses.',opts:['This never happens with VPC-attached Lambda','The subnets may not have enough available IP addresses at that moment for the burst of new ENIs Lambda needs to scale concurrency, or ENI limits are being hit — fix by using larger/more subnets across multiple AZs', 'The function\'s memory setting is too high', 'This always indicates an IAM permissions problem'],ans:1,exp:'VPC-attached Lambda functions historically create/reuse ENIs to scale concurrency within the configured subnets; if those subnets are too small (few available IPs) or too few (single AZ), a sudden burst of concurrent executions can be constrained by ENI/IP availability. Using larger CIDR ranges and spreading subnets across multiple AZs gives Lambda more room to scale.',plain:'VPC Lambda scaling issues under bursty load often trace back to too-small subnets — use larger subnets across multiple AZs.'},
{id:163,domain:'troubleshoot',sub:'Deployment',q:'After a Lambda deployment, error rates spike immediately. The team wants to revert to the previous working version as fast as possible while investigating the root cause separately.',opts:['Start editing the current code live in the console to try to fix it forward under pressure','Repoint the production alias back to the previous known-good published version (or trigger an automated CodeDeploy rollback if configured), which is near-instant since versions are immutable', 'Delete the function and redeploy from scratch', 'Wait for the next scheduled deployment window'],ans:1,exp:'Because Lambda versions are immutable, rolling back is simply repointing the alias to the previous version\'s ARN (or letting a configured CodeDeploy alarm-triggered rollback do it automatically) — this is near-instant and far safer under incident pressure than attempting to "fix forward" live in production.',plain:'Rollback = repoint the alias to the previous immutable version — fast and safe, unlike live-editing under pressure.'},
{id:164,domain:'troubleshoot',sub:'Optimization',q:'An application makes many small, sequential AWS SDK calls (e.g. a GetItem per item in a loop of 100 DynamoDB items), and the team wants to reduce total latency without changing the underlying data model.',opts:['This cannot be optimized without redesigning the table','Use DynamoDB\'s BatchGetItem (or BatchWriteItem for writes) to combine many individual item operations into fewer round trips', 'Add more Lambda memory only', 'Switch every call to a Scan operation instead'],ans:1,exp:'BatchGetItem/BatchWriteItem let the SDK combine up to 100 items (or 25 for batch write) per API call across one or more tables into a single round trip, dramatically reducing the network latency overhead of looping many individual GetItem/PutItem calls — a common, low-risk performance optimization requiring no schema change.',plain:'Batch operations (BatchGetItem/BatchWriteItem) combine many individual calls into far fewer round trips.'},
