  {
    id:'p2',title:'Automate everything that will happen more than once',
    summary:"If you\'ve done a manual deployment step twice, the third time should be automated. Manual processes don\'t scale, and they fail silently in exactly the way automated ones don\'t.",
    body:"Every manual step in a deployment or operational process is a place where a tired engineer at 2am can make a mistake, skip a step, or do it slightly differently than last time. Automation isn't about moving fast for its own sake — it's about making the process the SAME every single time, which is what actually makes it safe to run under pressure. This applies to deployments (CI/CD pipelines instead of manual console clicks), infrastructure (CloudFormation/CDK instead of manually clicking through the console), and operational responses (an automated rollback triggered by a CloudWatch alarm instead of waiting for a human to notice and react). The investment in automation pays for itself the second time something goes wrong at an inconvenient hour.",
    bullets:["A CI/CD pipeline (CodePipeline/CodeBuild/CodeDeploy) turns 'deploy' from a risky manual ritual into a repeatable, auditable process","Infrastructure as code (CloudFormation/SAM/CDK) means your infrastructure is defined once and reviewed like code, not clicked into existence and undocumented","Automatic rollback (CodeDeploy alarms, CloudFormation's default rollback behavior) means recovery doesn't depend on someone noticing at 3am","A runbook that says 'SSH into the instance and restart the service' is a candidate for automation, not a permanent operational procedure","If a step needs a specific person who 'knows how to do it,' that's a bus-factor risk as much as an automation gap"],
    warning:"The trap: 'we'll automate it once things settle down.' Things never settle down. The manual process someone swore was temporary six months ago is now load-bearing, undocumented, and only one person knows how to run it correctly."
  },
  {
    id:'p3',title:'Design for failure — everything fails eventually',
    summary:"Networks partition, dependencies time out, instances die, and deployments occasionally break something. Resilient systems assume this will happen and are designed to degrade gracefully, not designed to prevent failure from ever occurring.",
    body:"A common beginner mistake is designing systems that work great as long as nothing ever goes wrong — no dependency timeout, no duplicate message, no partial failure mid-transaction. At any real scale, over a long enough time window, every one of those things WILL happen, and often simultaneously during your highest-traffic moment. The resilient-systems mindset flips the question from 'how do we prevent failure' (impossible to fully achieve) to 'what happens when this specific thing fails, and is that acceptable?' This is why patterns like retries with exponential backoff, circuit breakers, dead-letter queues, and idempotency aren't optional nice-to-haves — they're the actual substance of a production-grade system, not decoration on top of one.",
    bullets:["Assume at-least-once delivery everywhere messages/events are involved, and design handlers to be idempotent as a default, not an afterthought","A circuit breaker around a flaky dependency protects the REST of your system from that one dependency's bad day","A dead-letter queue isn't a failure — it's the correct outcome for a message that genuinely cannot be processed, isolating it instead of blocking or looping forever","Automatic rollback (CodeDeploy alarms, canary deployments) assumes SOME deployments will be bad, and designs the blast radius accordingly","Multi-AZ isn't paranoia — it's acknowledging that a single data center WILL have an outage eventually, on a timeline you don't control"],
    warning:"The trap: a system that has 'worked fine for two years' with no retry logic, no circuit breakers, and no DLQs isn't evidence the failure modes don't matter — it's evidence you haven't hit the unlucky day yet. Resilience patterns are cheap to build in from the start and expensive to retrofit after a bad outage."
  },
  {
    id:'p4',title:'Observability is not optional',
    summary:"You cannot debug, optimize, or safely operate a system you cannot see inside of. Logging, metrics, and tracing are part of the application, not an afterthought bolted on after launch.",
    body:"A common pattern in immature systems: something breaks in production, and the first response is adding a print statement and redeploying to see what's happening — repeated several times before the actual bug is found. Mature systems are built observable from day one: structured logs (so they're queryable, not just readable), custom metrics for business-relevant signals (not just infrastructure CPU/memory), and distributed tracing across service boundaries (so a slow request's actual bottleneck is visible in one place instead of requiring cross-referencing five separate log groups by timestamp). This investment pays off constantly, not just during incidents — it's also how you find optimization opportunities and validate that a change actually improved things.",
    bullets:["Structured (JSON) logs are queryable with CloudWatch Logs Insights; unstructured text logs require manual grepping under pressure","X-Ray tracing pinpoints the actual bottleneck in a multi-service request instead of requiring guesswork","Custom business metrics (orders/minute, signup conversion rate) matter as much as infrastructure metrics (CPU, memory) for understanding system health","An alarm that pages a human should be tied to a symptom users actually experience (error rate, latency), not just a proxy metric that might not matter","If you can't answer 'why was this specific request slow' without redeploying new logging, you don't have enough observability yet"],
    warning:"The trap: adding logging/tracing only after the first bad incident. By then you've already lost the debugging data for THAT incident, and you'll be building the safety net during the fire instead of before it."
  },
  {
    id:'p5',title:'Security is a feature, not a phase',
    summary:"Bolting security on at the end of a project is far more expensive — in engineering time and in risk — than designing with least privilege and defense in depth from the start.",
    body:"'We'll secure it before launch' treats security as a checklist item instead of a design constraint, and it shows: overly broad IAM policies because scoping them down after the fact means finding every actual permission in use, secrets hardcoded because retrofitting Secrets Manager means finding every place a credential is read, and no encryption because adding it after data already exists means a migration, not a config flag. Security built in from the start — least-privilege IAM roles from day one, secrets in Secrets Manager/Parameter Store from day one, encryption enabled by default — costs almost nothing extra at design time and avoids an expensive, risky retrofit later.",
    bullets:["Write the least-privilege IAM policy for a new Lambda function as part of writing the function, not as a hardening pass six months later","Default to Secrets Manager/Parameter Store for any credential from the first commit — hardcoded values are a habit that's hard to fully clean up later","Enable default encryption (S3, EBS) at the account level once, rather than remembering to opt in resource-by-resource forever","Threat-model new features during design ('what happens if this input is malicious/this token is stolen') rather than during a pre-launch security review","A security finding caught in code review costs minutes; the same finding caught in a post-launch audit costs a migration, an incident report, and possibly a customer's trust"],
    warning:"The trap: treating a security review as a gate to pass through once, right before launch. Security debt accumulates the same way technical debt does, and a system that was 'secure enough at launch' still needs the same design discipline applied to everything built after it."
  },
  {
    id:'p6',title:'Optimize for change, not for today\'s requirement',
    summary:"The requirement you're building against today is not the requirement you'll have in a year. Loosely coupled systems absorb change; tightly coupled ones require a rewrite every time the business pivots.",
    body:"It's tempting to build the tightest, most efficient solution to exactly today's stated requirement — but requirements change constantly, and a system tightly coupled to one specific version of a requirement has to be substantially rebuilt every time that requirement shifts. Loose coupling — services communicating through well-defined interfaces (an API, a queue, an event) instead of direct, synchronous, implementation-specific calls — means a change on one side of the interface doesn't force a change on the other. This doesn't mean over-engineering for hypothetical futures (that's its own trap — see 'constraints are the design'); it means preferring interfaces and patterns that are naturally easy to extend or swap out later, at roughly the same engineering cost as a tightly coupled version today.",
    bullets:["Async messaging (SQS/SNS/EventBridge) between services is naturally more change-tolerant than direct synchronous calls, since either side can evolve independently","An abstraction behind a well-defined interface (e.g. a payment-provider interface, even with only one implementation today) makes swapping providers later a contained change, not a rewrite","Feature flags (AWS AppConfig) let requirements change (a feature on/off, a rollout percentage) without a code deployment at all","Versioned APIs (API Gateway stages, Lambda aliases) let you evolve a contract without breaking existing callers","This is a balance, not an absolute — YAGNI (you aren't gonna need it) still applies; the goal is cheap optionality, not speculative complexity for every possible future"],
    warning:"The trap: over-applying this principle into speculative, never-used abstraction layers 'in case we need to swap it out someday.' The skill is recognizing which specific things are LIKELY to change (the payment provider, the notification channel) versus building unnecessary flexibility everywhere out of habit."
  },
];
// ── Vocab / Glossary Data ─────────────────────────────────────────────────────
const VOCAB=[
  // Compute
  {term:'Lambda',cat:'Compute',plain:'Run code without managing any servers — you pay only when it runs.',def:'Serverless compute that runs code in response to events (API calls, S3 uploads, DynamoDB streams). Billed per-ms of execution. Max 15-minute runtime, up to 10GB memory, container images up to 10GB.'},
  {term:'Lambda Layer',cat:'Compute',plain:'A shared package of code/libraries multiple functions can reuse.',def:'A .zip archive of shared code/dependencies, extracted to /opt at runtime. Up to 5 layers per function. Keeps deployment packages smaller and centralizes shared library updates.'},
  {term:'Lambda Version',cat:'Compute',plain:'A frozen, numbered snapshot of a function\'s code and configuration.',def:'Publishing a version creates an immutable snapshot (code + config) that never changes again. $LATEST always reflects the most recent, possibly untested edits.'},
  {term:'Lambda Alias',cat:'Compute',plain:'A movable, named pointer to one (or a weighted split of two) function versions.',def:'A named pointer (e.g. "prod") clients invoke instead of a version directly. Can split traffic by weight between two versions for gradual rollout.'},
  {term:'Provisioned Concurrency',cat:'Compute',plain:'Keeps a set number of Lambda environments pre-warmed so there\'s no cold start.',def:'Pre-initializes N execution environments so invocations respond immediately. Costs extra even when idle; the only setting that fully removes cold starts for that capacity.'},
  {term:'Reserved Concurrency',cat:'Compute',plain:'Guarantees (and caps) how many concurrent executions a function may have.',def:'Carves out a guaranteed pool of concurrency from the account-level limit for one function, also acting as a hard ceiling — invocations beyond it are throttled.'},
  {term:'EC2',cat:'Compute',plain:'Rent a virtual computer in the cloud and pay only for what you use.',def:'Elastic Compute Cloud. Resizable virtual servers. Choose instance type (CPU/RAM/GPU), OS, and storage. Billed per second (Linux) or per hour (Windows).'},
  {term:'ECS',cat:'Compute',plain:'Runs your containerized apps without you building the orchestration yourself.',def:'Elastic Container Service. Managed container orchestration. Runs on EC2 (you manage hosts) or Fargate (serverless). Integrates with ALB, IAM task roles, and CloudWatch.'},
  {term:'EKS',cat:'Compute',plain:'Run standard Kubernetes without managing the tricky control-plane part yourself.',def:'Elastic Kubernetes Service. Managed Kubernetes control plane. You run worker nodes on EC2 or Fargate. Best for teams already using Kubernetes tooling.'},
  {term:'Fargate',cat:'Compute',plain:'Run containers without ever provisioning or managing a server.',def:'Serverless compute engine for containers, works with ECS and EKS. You specify CPU/memory per task; AWS provisions the underlying compute.'},
  {term:'Elastic Beanstalk',cat:'Compute',plain:'Upload your app code and AWS handles the deployment and infrastructure.',def:'PaaS that provisions and manages EC2 instances, load balancer, Auto Scaling, and health monitoring from just your application code.'},
  {term:'Task Definition',cat:'Compute',plain:'A blueprint describing what container(s) to run and how.',def:'Immutable ECS blueprint (JSON): image, CPU/memory, IAM roles, port mappings. Every change registers a new revision.'},
  {term:'ECS Service',cat:'Compute',plain:'Keeps a desired number of ECS tasks running and manages their deployment.',def:'Maintains a specified task count, integrates with a load balancer (auto register/deregister), and manages rolling or blue/green deployments.'},

  // Storage
  {term:'S3',cat:'Storage',plain:'Store any file, any amount, accessible from anywhere.',def:'Simple Storage Service. Object storage with 11 9s durability. Objects up to 5TB, stored in buckets. Storage classes: Standard, IA, Glacier, Intelligent-Tiering.'},
  {term:'S3 Presigned URL',cat:'Storage',plain:'A time-limited link that grants access to one specific S3 action without sharing credentials.',def:'Generated server-side using the signer\'s credentials; grants temporary permission (e.g. PutObject) without exposing credentials or making the bucket public.'},
  {term:'S3 Multipart Upload',cat:'Storage',plain:'Uploads a large file in parallel chunks instead of one big transfer.',def:'Splits an object into independently-uploaded, retryable parts uploaded in parallel — recommended over ~100MB, required over 5GB.'},
  {term:'S3 Event Notification',cat:'Storage',plain:'Automatically triggers a Lambda function (or SQS/SNS) when an S3 object changes.',def:'Configured on a bucket to invoke a target (Lambda, SQS, SNS, EventBridge) on object create/delete/restore events.'},
  {term:'EBS',cat:'Storage',plain:'A virtual hard drive that attaches to a single server.',def:'Elastic Block Store. Network-attached block storage for EC2. Types: gp3 (general SSD), io2 (provisioned IOPS). Single-AZ; snapshots are cross-region-copyable.'},
  {term:'EFS',cat:'Storage',plain:'A shared drive that many servers/containers can read and write at the same time.',def:'Elastic File System. Managed NFS that scales automatically and mounts across multiple AZs and compute types (EC2, Lambda, ECS/Fargate).'},
  {term:'ECR',cat:'Storage',plain:'The managed registry where you store and version container images.',def:'Elastic Container Registry. Docker/OCI image registry integrated with IAM. Supports image scanning on push and lifecycle policies to auto-expire old images.'},
  {term:'CloudFront',cat:'Storage',plain:'A global content delivery network that caches content close to users.',def:'CDN that caches content at edge locations worldwide for low latency, supports custom domains via ACM, and can front a private S3 origin via OAC.'},

  // Database
  {term:'DynamoDB',cat:'Database',plain:'A fast, fully managed NoSQL database that scales automatically.',def:'Key-value/document NoSQL database. Single-digit-ms latency at any scale. Primary key is a partition key, optionally + sort key.'},
  {term:'DynamoDB GSI',cat:'Database',plain:'An index with its own partition key, enabling a completely different query pattern.',def:'Global Secondary Index — independent partition (+sort) key from the base table, eventually consistent by default, can be added/removed anytime.'},
  {term:'DynamoDB LSI',cat:'Database',plain:'An index with the same partition key but a different sort key.',def:'Local Secondary Index — same partition key as the base table, different sort key. Must be defined at table creation; supports strong consistency.'},
  {term:'DynamoDB Streams',cat:'Database',plain:'A live feed of every insert/update/delete on a table.',def:'Time-ordered log of item-level changes, retained 24 hours, can trigger a Lambda function per batch of records for real-time processing.'},
  {term:'DAX',cat:'Database',plain:'A drop-in, DynamoDB-compatible cache for microsecond reads.',def:'DynamoDB Accelerator — a write-through, API-compatible in-memory cache sitting in front of DynamoDB, minimal code change required.'},
  {term:'Conditional Write',cat:'Database',plain:'A write that only succeeds if a condition on the item currently holds true.',def:'A ConditionExpression on Put/Update/Delete causes the call to fail (ConditionalCheckFailedException) unless the condition matches — enables optimistic locking.'},
  {term:'RDS',cat:'Database',plain:'A managed relational database — AWS handles patching, backups, and failover.',def:'Relational Database Service. Supports MySQL, PostgreSQL, MariaDB, Oracle, SQL Server. Offers Multi-AZ for HA and read replicas for read scaling.'},
  {term:'Aurora',cat:'Database',plain:'AWS\'s own faster, more resilient MySQL/PostgreSQL-compatible database.',def:'Cloud-native relational engine, MySQL/PostgreSQL-compatible, storage auto-scales, up to 15 read replicas, faster failover than standard RDS.'},
  {term:'Aurora Serverless',cat:'Database',plain:'Aurora that automatically scales capacity up and down, even to zero.',def:'On-demand, auto-scaling configuration of Aurora — capacity adjusts to load automatically, good for variable or infrequent workloads.'},
  {term:'ElastiCache',cat:'Database',plain:'A fast, general-purpose in-memory cache/data store (Redis or Memcached).',def:'Managed in-memory data store for caching, session storage, and leaderboards. Redis supports rich data structures; Memcached is simpler and multi-threaded.'},
  {term:'RDS Proxy',cat:'Database',plain:'Pools and manages database connections so serverless apps don\'t exhaust them.',def:'A fully managed connection pooler for RDS/Aurora, reducing connection overhead from bursty clients like Lambda, and improving failover time.'},
  {term:'DocumentDB',cat:'Database',plain:'A managed, MongoDB-compatible document database.',def:'MongoDB-compatible managed document database service, separate from DynamoDB, for teams standardized on MongoDB drivers/tooling.'},

  // Messaging & Events
  {term:'SQS',cat:'Messaging',plain:'A managed message queue that decouples producers from consumers.',def:'Simple Queue Service. Standard (at-least-once, best-effort order) or FIFO (exactly-once, strict order) queues. Visibility timeout hides in-flight messages.'},
  {term:'SQS DLQ',cat:'Messaging',plain:'A queue that automatically catches messages that keep failing to process.',def:'Dead-letter queue — configured via a redrive policy + maxReceiveCount on the source queue, isolating poison-pill messages from healthy ones.'},
  {term:'SNS',cat:'Messaging',plain:'A pub/sub service that fans one message out to many independent subscribers.',def:'Simple Notification Service. Publish once to a topic; every subscription (Lambda, SQS, HTTP, email, SMS) receives it in parallel.'},
  {term:'EventBridge',cat:'Messaging',plain:'Routes events to targets using pattern-matching rules, including on a schedule.',def:'A central event bus receiving events from AWS services, custom apps, and SaaS partners; rules route matching events to targets, or run on a cron/rate schedule.'},
  {term:'Step Functions',cat:'Messaging',plain:'Orchestrates multi-step workflows with built-in retry, branching, and error handling.',def:'State machine service (Amazon States Language) for orchestrating Task/Choice/Parallel/Map states across Lambda and other AWS service integrations.'},
  {term:'Kinesis Data Streams',cat:'Messaging',plain:'Ingests and processes massive real-time data streams with multiple independent readers.',def:'High-throughput streaming ingestion; supports multiple independent consumers and configurable retention (24hrs–365 days) for replay.'},
  {term:'Kinesis Data Firehose',cat:'Messaging',plain:'Automatically loads streaming data into a destination like S3 or Redshift.',def:'Fully managed delivery stream that batches, transforms, and loads streaming data into S3, Redshift, OpenSearch, or third-party destinations — no code needed.'},
  {term:'SES',cat:'Messaging',plain:'A service for sending and receiving email at scale.',def:'Simple Email Service. Send transactional/marketing email or receive inbound email programmatically, with reputation/bounce/complaint tracking.'},

  // API & Networking
  {term:'API Gateway',cat:'Networking',plain:'A managed front door for your APIs — routing, throttling, and auth without a server.',def:'Fully managed API front end. REST API (full features), HTTP API (cheaper, simpler), or WebSocket API (persistent connections). Integrates with Lambda, HTTP backends.'},
  {term:'API Gateway Proxy Integration',cat:'Networking',plain:'Passes the whole HTTP request to Lambda and expects a specific response shape back.',def:'The entire request (headers/body/params) is passed to Lambda as an event; the function\'s response must include statusCode, headers, and body.'},
  {term:'VPC',cat:'Networking',plain:'Your own private, isolated network within AWS.',def:'Virtual Private Cloud — a logically isolated network you define, split into subnets across Availability Zones.'},
  {term:'Security Group',cat:'Networking',plain:'A stateful firewall attached to individual instances/ENIs that only allows traffic, never denies.',def:'Instance/ENI-level, stateful, allow-only rules — all rules evaluated together, no explicit deny.'},
  {term:'Network ACL',cat:'Networking',plain:'A stateless, subnet-level firewall that can explicitly allow or deny, in rule order.',def:'Subnet-level, stateless firewall supporting explicit ALLOW and DENY rules, evaluated in ascending rule-number order until a match.'},
  {term:'NAT Gateway',cat:'Networking',plain:'Lets resources in a private subnet reach the internet without being reachable from it.',def:'Managed NAT service placed in a public subnet; private subnets route outbound traffic through it for internet access without inbound exposure.'},
  {term:'VPC Endpoint',cat:'Networking',plain:'Private, in-network connectivity to AWS services without going over the public internet.',def:'Gateway Endpoint (S3/DynamoDB, free, route-table based) or Interface Endpoint (PrivateLink, ENI-based, most other services).'},
  {term:'VPC Peering',cat:'Networking',plain:'A private, non-transitive network connection between two VPCs.',def:'Connects two VPCs privately via route table entries on both sides; explicitly NOT transitive (A-B and B-C does not mean A-C).'},
  {term:'Application Load Balancer',cat:'Networking',plain:'Distributes HTTP(S) traffic across multiple targets, routing by path/host.',def:'Layer 7 load balancer supporting path/host-based routing, WebSocket, and native integration with ECS service target-group registration.'},
  {term:'Route 53',cat:'Networking',plain:'AWS\'s managed DNS service, also used for health checks and traffic routing.',def:'Managed DNS with routing policies (simple, weighted, latency, failover, geolocation) and health-check-based failover.'},

  // Security & IAM
  {term:'IAM Role',cat:'Security',plain:'Temporary credentials assumed by a user, service, or another account — no long-term keys.',def:'An identity with a trust policy (who can assume it) and permissions policies (what it can do), assumed via STS for temporary credentials.'},
  {term:'IAM Policy',cat:'Security',plain:'A JSON document defining what actions are allowed or denied on what resources.',def:'Identity-based or resource-based document with Effect/Action/Resource/Condition statements, evaluated with explicit-deny-wins logic.'},
  {term:'Execution Role',cat:'Security',plain:'The role Lambda assumes on your function\'s behalf to call other AWS services.',def:'An IAM role attached to a Lambda function providing temporary credentials via the runtime environment, scoped to least privilege.'},
  {term:'Service Control Policy',cat:'Security',plain:'An org-wide guardrail capping what every account (even root) can do.',def:'Attached at the AWS Organizations root/OU/account level; restricts maximum permissions for every principal in affected accounts; never grants access.'},
  {term:'Permissions Boundary',cat:'Security',plain:'A ceiling on what an identity\'s own attached policies can grant.',def:'Sets the maximum permissions an identity-based policy on that same user/role can grant; never grants access on its own.'},
  {term:'KMS',cat:'Security',plain:'A managed service for creating and controlling encryption keys.',def:'Key Management Service. Customer managed keys (full control), AWS managed keys, or AWS owned keys. Both the identity policy AND the key policy must allow an action.'},
  {term:'Envelope Encryption',cat:'Security',plain:'Only a small data key touches KMS; the actual data is encrypted locally with that key.',def:'GenerateDataKey returns a plaintext data key (used locally to encrypt data) and its KMS-encrypted form, stored alongside the ciphertext.'},
  {term:'Secrets Manager',cat:'Security',plain:'Stores credentials and can automatically rotate them on a schedule.',def:'Managed secret storage with built-in rotation Lambda templates for RDS/Redshift/DocumentDB; costs more than Parameter Store but adds rotation.'},
  {term:'Parameter Store',cat:'Security',plain:'Free/cheap storage for configuration values, with optional KMS encryption.',def:'Part of Systems Manager; standard parameters are free, SecureString parameters use KMS. No native rotation workflow.'},
  {term:'Cognito User Pool',cat:'Security',plain:'A user directory that handles sign-up, sign-in, and issues login tokens.',def:'Manages user sign-up/sign-in, MFA, password policy, and issues JWTs (ID/access/refresh tokens) on successful authentication.'},
  {term:'Cognito Identity Pool',cat:'Security',plain:'Exchanges a login token for temporary AWS credentials scoped to that user.',def:'Federated Identities — exchanges a User Pool (or other IdP) token for temporary, scoped IAM credentials via STS.'},
  {term:'STS',cat:'Security',plain:'Issues short-lived, temporary AWS credentials.',def:'Security Token Service. Issues temporary credentials via AssumeRole, AssumeRoleWithSAML, AssumeRoleWithWebIdentity, GetSessionToken.'},
  {term:'AWS WAF',cat:'Security',plain:'Filters malicious HTTP requests before they reach your app.',def:'Web Application Firewall — inspects HTTP(S) requests against managed/custom/rate-based rules. Attaches to CloudFront, API Gateway, ALB.'},
  {term:'GuardDuty',cat:'Security',plain:'Agentless, ML-based threat detection across your account.',def:'Continuously analyzes CloudTrail, VPC Flow Logs, and DNS logs for threats (compromised credentials, recon, malicious IP contact) — no agents needed.'},
  {term:'ACM',cat:'Security',plain:'Free, auto-renewing TLS certificates for AWS services.',def:'AWS Certificate Manager — issues free public certificates for CloudFront, ALB, and API Gateway custom domains, auto-renewed while validated.'},

  // DevOps & CI/CD
  {term:'CodePipeline',cat:'DevOps',plain:'Orchestrates the release process as automated stages: source, build, deploy.',def:'Automates commit-to-deploy: Source stage detects changes, Build stage runs CodeBuild, Deploy stage pushes to targets — each stage gated on the last succeeding.'},
  {term:'CodeBuild',cat:'DevOps',plain:'A managed build service that compiles/tests code per a buildspec file.',def:'Runs phases defined in buildspec.yml (install/pre_build/build/post_build) in a managed, pay-per-build-minute environment.'},
  {term:'CodeDeploy',cat:'DevOps',plain:'Automates deployments to EC2, Lambda, or ECS with configurable rollout strategies.',def:'Supports in-place/blue-green (EC2), canary/linear (Lambda), and blue-green via a second target group (ECS), with alarm-based automatic rollback.'},
  {term:'buildspec.yml',cat:'DevOps',plain:'The file that tells CodeBuild what commands to run and what to output.',def:'CodeBuild\'s config file: install/pre_build/build/post_build phases plus an artifacts section defining output files.'},
  {term:'appspec.yml',cat:'DevOps',plain:'The file that tells CodeDeploy how to deploy — hooks for EC2, version info for Lambda/ECS.',def:'CodeDeploy\'s deployment spec: lifecycle hooks (EC2/on-prem) or version/task definition reference (Lambda/ECS).'},
  {term:'CodeArtifact',cat:'DevOps',plain:'A private, managed package repository (npm/Maven/PyPI) with upstream caching.',def:'Managed artifact repository supporting common package formats, with upstream repositories caching from public registries.'},
  {term:'CloudFormation',cat:'DevOps',plain:'Defines your AWS infrastructure as a template that gets created/updated automatically.',def:'Infrastructure as code — Resources/Parameters/Mappings/Outputs in YAML/JSON, deployed and tracked as a stack with rollback support.'},
  {term:'Change Set',cat:'DevOps',plain:'A preview of exactly what a CloudFormation stack update would do, before you apply it.',def:'Computes the diff between current and proposed stack state — shows adds/modifies (and replacement risk)/removes before execution.'},
  {term:'StackSet',cat:'DevOps',plain:'Deploys the same CloudFormation template across many accounts and regions at once.',def:'Extends CloudFormation to create/update/delete stacks across many target accounts/regions from one administrative operation.'},
  {term:'SAM',cat:'DevOps',plain:'CloudFormation shorthand plus a CLI, purpose-built for serverless apps.',def:'Serverless Application Model — simplified resource types (Function/Api/SimpleTable) that transform into CloudFormation, with a CLI for local testing/deploy.'},
  {term:'AWS CDK',cat:'DevOps',plain:'Write infrastructure in a real programming language, then synthesize it to CloudFormation.',def:'Cloud Development Kit — define infrastructure in TypeScript/Python/Java/etc.; cdk synth compiles it to a standard CloudFormation template.'},
  {term:'Blue/Green Deployment',cat:'DevOps',plain:'Stand up a whole new environment, then cut traffic over once it\'s verified.',def:'An entirely separate environment/task-set runs the new version, tested independently, then traffic cuts over (often instantly), with the old version kept briefly for rollback.'},
  {term:'Canary Deployment',cat:'DevOps',plain:'Shift a small percentage of traffic first, then expand only if metrics stay healthy.',def:'Sends a defined percentage of traffic to a new version, waits, monitors (often via a CloudWatch alarm), then completes or automatically rolls back.'},
  {term:'Feature Flag',cat:'DevOps',plain:'Toggles a feature on/off via configuration, without a new deployment.',def:'Decouples deploying code from releasing a feature; AWS AppConfig supports gradual, monitored feature-flag rollout with automatic rollback.'},

  // Monitoring & Observability
  {term:'CloudWatch Metrics',cat:'Monitoring',plain:'Numbers over time — CPU, invocation count, error rate, and more.',def:'Time-series metric data, built-in per service plus custom metrics you publish (directly or via Embedded Metric Format).'},
  {term:'CloudWatch Alarm',cat:'Monitoring',plain:'Watches a metric against a threshold and triggers an action, like paging on-call.',def:'Evaluates a metric or metric-math expression over a period against a threshold; can trigger SNS notifications, Auto Scaling, or automated rollback.'},
  {term:'CloudWatch Logs Insights',cat:'Monitoring',plain:'A query language for interactively searching and aggregating log data.',def:'Supports filter/stats/parse/sort operations across one or more CloudWatch Logs groups, without exporting logs elsewhere.'},
  {term:'Embedded Metric Format',cat:'Monitoring',plain:'Publishes custom metrics via structured log output — no synchronous API call needed.',def:'A structured JSON log blob that CloudWatch Logs automatically extracts into CloudWatch Metrics asynchronously, avoiding added request-path latency.'},
  {term:'X-Ray',cat:'Monitoring',plain:'Traces a single request across every service it touches, showing exactly where time is spent.',def:'Distributed tracing: propagates a trace ID across instrumented services, producing a service map and per-segment timing.'},
  {term:'CloudTrail',cat:'Monitoring',plain:'The audit log of every API call: who did it, when, from where.',def:'Records API activity (caller identity, timestamp, source IP, parameters) across AWS services; deliverable to S3 for durable retention.'},
  {term:'AWS Config',cat:'Monitoring',plain:'Continuously checks whether resources still match the rules you defined.',def:'Records resource configuration state and evaluates it against managed/custom Config Rules, flagging non-compliant/drifted resources.'},

  // Resilience & Patterns
  {term:'Idempotency',cat:'Patterns',plain:'Processing the same request twice produces the same result as processing it once.',def:'A design property required whenever at-least-once delivery is possible; typically implemented via a unique key recorded with a conditional write.'},
  {term:'Circuit Breaker',cat:'Patterns',plain:'Fails fast during a known outage instead of every call waiting out its full timeout.',def:'Tracks recent failures to a dependency; once a threshold is hit, opens and short-circuits further calls for a cooldown, then tests recovery (half-open).'},
  {term:'Exponential Backoff with Jitter',cat:'Patterns',plain:'Retries wait progressively longer, with some randomness, instead of hammering a failing service.',def:'The default AWS SDK retry strategy for retryable errors — increasing delay between attempts plus randomization to avoid synchronized retry storms.'},
  {term:'Cold Start',cat:'Patterns',plain:'The extra delay when Lambda has to initialize a brand-new execution environment.',def:'Occurs when no warm execution environment is available; INIT phase (runtime start + global-scope code) runs before the first invocation completes.'},
  {term:'Fan-Out',cat:'Patterns',plain:'One event delivered to many independent subscribers at once.',def:'A publish-once, deliver-to-many pattern, typically via SNS topic subscriptions or EventBridge rules with multiple targets.'},
  {term:'Dead-Letter Queue',cat:'Patterns',plain:'Automatically catches messages that keep failing, so they don\'t block or loop forever.',def:'A queue named in a redrive policy with maxReceiveCount; messages that repeatedly fail processing are moved there for isolated inspection.'},
  {term:'Saga Pattern',cat:'Patterns',plain:'A sequence of local transactions with compensating actions if a later step fails.',def:'Coordinates a multi-step distributed transaction (e.g. via Step Functions) where each step has a defined rollback/compensation action on failure.'},
  {term:'Least Privilege',cat:'Patterns',plain:'Grant only the exact permissions needed — nothing broader "to be safe."',def:'A core IAM design principle: scope both actions and resource ARNs in a policy to precisely what a workload requires, never a broad managed policy by default.'},
];

// ── SM-2 Spaced Repetition ────────────────────────────────────────────────────
function sm2Update(prev={},rating){
  // rating: 0=nope, 1=sorta, 2=know
  const ease=Math.max(1.3,(prev.ease||2.5)+(0.1-(2-rating)*(0.08+(2-rating)*0.02)));
  const reps=rating>=1?(prev.reps||0)+1:0;
  let interval=prev.interval||1;
  if(rating<1){interval=1;}
  else if(reps<=1){interval=1;}
  else if(reps===2){interval=6;}
  else{interval=Math.round((prev.interval||1)*ease);}
  const next=new Date();next.setDate(next.getDate()+interval);
  return{ease,reps,interval,nextReview:next.toISOString().slice(0,10)};
}

function renderLessonMd(text,d){
  const lines=text.split('\n');
  const out=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(line.startsWith('~~~')){
      const code=[];
      i++;
      while(i<lines.length&&!lines[i].startsWith('~~~')){code.push(lines[i]);i++}
      i++;
      out.push(<pre key={out.length} className="mono text-xs bg-slate-100 text-slate-700 p-3 my-2 overflow-x-auto leading-relaxed whitespace-pre">{code.join('\n')}</pre>);
      continue;
    }
    if(line.startsWith('**')&&line.endsWith('**')){out.push(<div key={out.length} className={`${d.color} font-bold text-sm mt-5 mb-2 uppercase tracking-wide`}>{line.slice(2,-2)}</div>);i++;continue}
    if(line.startsWith('- ')){out.push(<div key={out.length} className="text-slate-600 text-sm ml-3 flex gap-2 py-0.5"><span className={`${d.color} mt-0.5 flex-shrink-0`}>•</span><span>{line.slice(2)}</span></div>);i++;continue}
    if(line.match(/^\d+\./)){out.push(<div key={out.length} className="text-slate-600 text-sm ml-3 py-0.5">{line}</div>);i++;continue}
    if(line===''){out.push(<div key={out.length} className="h-2"/>);i++;continue}
    out.push(<div key={out.length} className="text-slate-700 text-sm leading-relaxed">{line}</div>);i++;
  }
  return out;
}

// ── Readiness ─────────────────────────────────────────────────────────────────
function calcReadiness(quizHistory,examHistory,flashConf){
  const dWeights={dev:0.32,security:0.26,deploy:0.24,troubleshoot:0.18};
  const byDomain={};
  let quizSum=0,wSum=0;
  Object.entries(dWeights).forEach(([d,w])=>{
    const qs=quizHistory.filter(h=>h.domain===d);
    const c=qs.filter(h=>h.correct).length;
    byDomain[d]={correct:c,total:qs.length,pct:qs.length>0?Math.round(c/qs.length*100):null};
    if(qs.length>=5){quizSum+=(c/qs.length)*w;wSum+=w;}
  });
  const quizPct=wSum>0?Math.round((quizSum/wSum)*100):0;
  const hasExam=examHistory.length>0;
  const recent=examHistory.slice(-5);
  const avgExam=hasExam?Math.round(recent.reduce((s,e)=>s+e.score,0)/recent.length):0;
  const examPct=hasExam?Math.round(Math.min(100,(avgExam/85)*100)):0;
  const known=(flashConf||[]).filter(f=>f.conf==='know').length;
  const flashPct=Math.round((known/ALL_FLASH.length)*100);
  const tried=new Set(quizHistory.map(h=>h.qid)).size;
  const covPct=Math.round(Math.min(100,(tried/(QUESTIONS.length*0.5))*100));
  const w=hasExam?{exam:0.45,quiz:0.30,flash:0.15,cov:0.10}:{exam:0,quiz:0.55,flash:0.25,cov:0.20};
  const total=Math.round(Math.min(100,examPct*w.exam+quizPct*w.quiz+flashPct*w.flash+covPct*w.cov));
  return{total,examPct,quizPct,flashPct,covPct,byDomain,hasExam,avgExam,known,tried};
}

const domainHex={dev:'#10b981',security:'#0ea5e9',deploy:'#f59e0b',troubleshoot:'#8b5cf6'};

function Learn(){
  const[read,setRead]=useStore('lesson_read',[]);
  const[activeIdx,setActiveIdx]=useState(null);
  const[domainFilter,setDomainFilter]=useState('all');

  const grouped=useMemo(()=>{
    const g={};
    Object.keys(DOMAINS).forEach(k=>g[k]=[]);
    LESSONS.forEach((l,i)=>g[l.domain].push({...l,idx:i}));
    return g;
  },[]);

  if(activeIdx!==null){
    const lesson=LESSONS[activeIdx];
    const d=DOMAINS[lesson.domain];
    const isRead=read.includes(activeIdx);
    const domainLessons=grouped[lesson.domain];
    const pos=domainLessons.findIndex(l=>l.idx===activeIdx);
    return(
      <div className="p-4 md:p-6 max-w-3xl">
        <button onClick={()=>setActiveIdx(null)} className="text-slate-400 hover:text-slate-600 text-sm mb-4">← Back to curriculum</button>
        <div className="flex items-center gap-3 mb-5">
          <div className="w-1 self-stretch rounded-full" style={{background:domainHex[lesson.domain]}}/>
          <div className="flex-1">
            <div className="flex items-center gap-2 flex-wrap">
              <h1 className="text-slate-900 text-xl font-bold">{lesson.title}</h1>
              <Tag domain={lesson.domain}/>
            </div>
            <div className="text-slate-400 text-xs mt-1">{d.label} · Topic {pos+1} of {domainLessons.length}</div>
          </div>
        </div>
        <div className="bg-white rounded-xl border-l-4 border border-slate-200 p-5 space-y-0.5 shadow-sm" style={{borderLeftColor:domainHex[lesson.domain]}}>
          {renderLessonMd(lesson.content,d)}
        </div>
        <div className="mt-4 flex items-center gap-3 flex-wrap">
          <button onClick={()=>setRead(r=>isRead?r.filter(x=>x!==activeIdx):[...r,activeIdx])}
            className={`text-sm px-4 py-2 rounded-lg border-2 font-medium transition-colors ${isRead?'border-emerald-400 text-emerald-700 bg-emerald-50':'border-slate-200 text-slate-500 hover:border-slate-300'}`}>
            {isRead?'✓ Completed':'Mark Complete'}
          </button>
          <button disabled={pos===0} onClick={()=>setActiveIdx(domainLessons[pos-1].idx)}
            className="text-sm px-3 py-2 border border-slate-200 text-slate-500 rounded-lg hover:border-slate-400 disabled:opacity-30 transition-colors">← Prev topic</button>
          <button disabled={pos===domainLessons.length-1} onClick={()=>setActiveIdx(domainLessons[pos+1].idx)}
            className="text-sm px-3 py-2 border border-slate-200 text-slate-500 rounded-lg hover:border-slate-400 disabled:opacity-30 transition-colors">Next topic →</button>
        </div>
      </div>
    );
  }

  const domainsToShow=domainFilter==='all'?Object.keys(DOMAINS):[domainFilter];

  return(
    <div className="p-4 md:p-8 max-w-4xl mx-auto">
      <div className="mb-5 flex items-start justify-between flex-wrap gap-4">
        <div>
          <h1 className="text-2xl font-bold text-slate-900 mb-1">Learn</h1>
          <p className="text-slate-500 text-sm">{LESSONS.length} study guides covering everything you need for the DVA-C02 — browse by domain and work through them at your own pace.</p>
        </div>
        <div className="shrink-0 text-right">
          <div className="text-2xl font-bold text-slate-900">{read.length}<span className="text-slate-300 text-base">/{LESSONS.length}</span></div>
          <div className="text-xs text-slate-400">topics completed</div>
        </div>
      </div>
      <ProgressBar value={read.length} max={LESSONS.length} className="mb-6"/>

      <div className="flex gap-2 flex-wrap mb-6">
        {[{id:'all',label:'All'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label}))].map(d=>(
          <button key={d.id} onClick={()=>setDomainFilter(d.id)}
            style={domainFilter===d.id&&d.id!=='all'?{background:domainHex[d.id],borderColor:domainHex[d.id],color:'#fff'}:{}}
            className={`text-xs px-3 py-1 rounded-full border font-semibold transition-all ${domainFilter===d.id?(d.id==='all'?'bg-slate-800 border-slate-800 text-white':'border-transparent'):'bg-white border-slate-200 text-slate-600 hover:border-slate-400'}`}>
            {d.label}
          </button>
        ))}
      </div>

      {domainsToShow.map(dk=>{
        const d=DOMAINS[dk];
        const lessons=grouped[dk];
        const completed=lessons.filter(l=>read.includes(l.idx)).length;
        return(
          <div key={dk} className="mb-7">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span style={{width:10,height:10,borderRadius:'50%',background:domainHex[dk]}}/>
                <h2 className={`font-bold text-sm uppercase tracking-wide ${d.color}`}>{d.label} <span className="text-slate-400 font-medium normal-case">· {d.pct}% of exam</span></h2>
              </div>
              <span className="text-xs text-slate-400">{completed}/{lessons.length} done</span>
            </div>
            <div className="grid gap-2 sm:grid-cols-2">
              {lessons.map(l=>{
                const isRead=read.includes(l.idx);
                return(
                  <div key={l.idx} onClick={()=>setActiveIdx(l.idx)}
                    className="bg-white border border-slate-200 rounded-xl p-4 cursor-pointer hover:shadow-md hover:border-slate-300 transition-all flex items-center justify-between gap-3">
                    <span className="text-slate-700 text-sm font-medium leading-snug">{l.title}</span>
                    {isRead?<span className="text-emerald-500 text-lg shrink-0">✓</span>:<span className="text-slate-200 text-lg shrink-0">○</span>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

  return(

        <div className="flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <h1 className="text-slate-900 text-xl font-bold">{lesson.title}</h1>
            <Tag domain={lesson.domain}/>

      <div className="bg-white rounded-xl border-l-4 border border-slate-200 p-5 space-y-0.5 shadow-sm" style={{borderLeftColor:{dev:'#10b981',security:'#0ea5e9',deploy:'#f59e0b',troubleshoot:'#8b5cf6'}[lesson.domain]}}>
        {renderLessonMd(lesson.content,d)}
      </div>

          className={`text-sm px-4 py-2 rounded-lg border-2 font-medium transition-colors ${isRead?`border-emerald-400 text-emerald-700 bg-emerald-50`:'border-slate-200 text-slate-500 hover:border-slate-300'}`}>
          {isRead?'✓ Completed':'Mark Complete'}

      </div>
