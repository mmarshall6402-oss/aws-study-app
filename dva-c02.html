<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── AWS abbreviation expansion ───────────────────────────────────────────────
// Every abbreviated AWS service/term rendered anywhere in the app gets its full
// name appended in parentheses, e.g. "S3 (Simple Storage Service)". Applied at
// render time (see the React.createElement patch below), so it covers questions,
// flashcards, lessons, labs, the glossary, and all UI text without touching data.
const ABBR={
  // Services
  S3:'Simple Storage Service',EC2:'Elastic Compute Cloud',IAM:'Identity and Access Management',
  STS:'Security Token Service',KMS:'Key Management Service',SQS:'Simple Queue Service',
  SNS:'Simple Notification Service',SES:'Simple Email Service',RDS:'Relational Database Service',
  EBS:'Elastic Block Store',EFS:'Elastic File System',ECS:'Elastic Container Service',
  EKS:'Elastic Kubernetes Service',ECR:'Elastic Container Registry',EMR:'Elastic MapReduce',
  ELB:'Elastic Load Balancing',ALB:'Application Load Balancer',NLB:'Network Load Balancer',
  GLB:'Gateway Load Balancer',CLB:'Classic Load Balancer',VPC:'Virtual Private Cloud',
  WAF:'Web Application Firewall',ACM:'AWS Certificate Manager',SSM:'AWS Systems Manager',
  DMS:'Database Migration Service',MGN:'Application Migration Service',
  MSK:'Managed Streaming for Apache Kafka',QLDB:'Quantum Ledger Database',
  DAX:'DynamoDB Accelerator',RAM:'Resource Access Manager',CDK:'Cloud Development Kit',
  SCT:'Schema Conversion Tool',DX:'Direct Connect',
  // AWS concepts & exam terms
  SCP:'Service Control Policy',NACL:'Network Access Control List',ACL:'Access Control List',
  SG:'Security Group',ASG:'Auto Scaling Group',AMI:'Amazon Machine Image',
  AZ:'Availability Zone',OU:'Organizational Unit',TGW:'Transit Gateway',IGW:'Internet Gateway',
  NAT:'Network Address Translation',EIP:'Elastic IP address',ENI:'Elastic Network Interface',
  ENA:'Elastic Network Adapter',EFA:'Elastic Fabric Adapter',OAC:'Origin Access Control',
  OAI:'Origin Access Identity',GSI:'Global Secondary Index',LSI:'Local Secondary Index',
  DLQ:'Dead-Letter Queue',FIFO:'First-In, First-Out',TTL:'Time To Live',
  IOPS:'Input/Output Operations Per Second',RTO:'Recovery Time Objective',
  RPO:'Recovery Point Objective',DR:'Disaster Recovery',CRR:'Cross-Region Replication',
  RTC:'Replication Time Control',IMDS:'Instance Metadata Service',KCL:'Kinesis Client Library',
  MPP:'Massively Parallel Processing',IaC:'Infrastructure as Code',CDC:'Change Data Capture',
  RI:'Reserved Instance',SP:'Savings Plan',IA:'Infrequent Access',CMK:'Customer Master Key',
  DEK:'Data Encryption Key',HSM:'Hardware Security Module',MFA:'Multi-Factor Authentication',
  SSO:'Single Sign-On',PII:'Personally Identifiable Information',
  DDoS:'Distributed Denial of Service',DRT:'DDoS Response Team',SLA:'Service Level Agreement',
  TPS:'Transactions Per Second',RPS:'Requests Per Second',
  // Security & identity
  SAML:'Security Assertion Markup Language',OIDC:'OpenID Connect',JWT:'JSON Web Token',
  IdP:'Identity Provider',PKI:'Public Key Infrastructure',CA:'Certificate Authority',
  U2F:'Universal 2nd Factor',TOTP:'Time-based One-Time Password',XSS:'Cross-Site Scripting',
  SQLi:'SQL injection',OWASP:'Open Worldwide Application Security Project',
  CVE:'Common Vulnerabilities and Exposures',
  // Email & protocols
  DKIM:'DomainKeys Identified Mail',SPF:'Sender Policy Framework',
  DMARC:'Domain-based Message Authentication, Reporting and Conformance',
  SMTP:'Simple Mail Transfer Protocol',SFTP:'SSH File Transfer Protocol',
  FTPS:'File Transfer Protocol Secure',NFS:'Network File System',SMB:'Server Message Block',
  CIDR:'Classless Inter-Domain Routing',DNS:'Domain Name System',VPN:'Virtual Private Network',
  CDN:'Content Delivery Network',
  // General tech
  ML:'Machine Learning',BI:'Business Intelligence',ETL:'Extract, Transform, Load',
  HPC:'High-Performance Computing',OLAP:'Online Analytical Processing',
  MPI:'Message Passing Interface',K8s:'Kubernetes',IoT:'Internet of Things',
  VPS:'Virtual Private Server',PaaS:'Platform as a Service',VM:'Virtual Machine',
  CLI:'Command Line Interface',SDK:'Software Development Kit',DDL:'Data Definition Language',
  SSD:'Solid State Drive',HDD:'Hard Disk Drive',
};
// Expansions whose auto-pluralized form would read wrong
const ABBR_PLURAL_OVERRIDE={CIDR:'Classless Inter-Domain Routing',CVE:'Common Vulnerabilities and Exposures',IOPS:'Input/Output Operations Per Second'};
const pluralizeLast=full=>{
  const w=full.split(' ');const last=w[w.length-1];
  w[w.length-1]=/(?:x|ch|sh|s)$/.test(last)?last+'es':/[^aeiou]y$/.test(last)?last.slice(0,-1)+'ies':last+'s';
  return w.join(' ');
};
const ABBR_RE=new RegExp('\\b('+Object.keys(ABBR).sort((a,b)=>b.length-a.length).join('|')+')(s)?\\b','g');
function expandAbbr(text){
  if(typeof text!=='string'||!text)return text;
  const seen=new Set();
  return text.replace(ABBR_RE,(m,base,plural,off,str)=>{
    const prev=str[off-1]||'';
    const rest=str.slice(off+m.length);
    // Already sitting next to its own expansion, e.g. "Service Control Policies (SCPs)"
    // or "DEK (Data Encryption Key)" — leave it, and count it as introduced.
    if(prev==='('||/^\s*\(/.test(rest)){seen.add(base);return m;}
    // Skip slash/hyphen compounds ("CPU/RAM/GPU", "Multi-AZ", "S3-IA") and possessives ("ASG's")
    if(prev==='/'||prev==='-'||rest[0]==='/'||rest[0]==='-'||rest[0]==="'")return m;
    if(seen.has(base))return m; // expand only the first occurrence per text chunk
    seen.add(base);
    const full=plural?(ABBR_PLURAL_OVERRIDE[base]||pluralizeLast(ABBR[base])):ABBR[base];
    return m+' ('+full+')';
  });
}
// Patch React.createElement so every string child rendered by any component is
// expanded. Elements can opt out with data-noexpand (used where the expansion
// would reveal a quiz/flashcard answer).
const SKIP_EXPAND_TAGS=new Set(['textarea','input','script','style']);
const _createElement=React.createElement;
React.createElement=function(type,props,...children){
  if((typeof type==='string'&&SKIP_EXPAND_TAGS.has(type))||(props&&props['data-noexpand'])){
    return _createElement(type,props,...children);
  }
  return _createElement(type,props,...children.map(c=>typeof c==='string'?expandAbbr(c):c));
};

// ── Storage ──────────────────────────────────────────────────────────────────
// Prefixed so this app's progress never collides with the SAA-C03 app's data
// when both are served from the same origin (same browser, same GitHub Pages site).
const STORAGE_PREFIX='dva_';
const S={
  get:(k)=>{try{const kk=STORAGE_PREFIX+k;const w=window.storage;return JSON.parse(w?w.getItem(kk):localStorage.getItem(kk))}catch{return null}},
  set:(k,v)=>{try{const kk=STORAGE_PREFIX+k;const s=JSON.stringify(v);window.storage?window.storage.setItem(kk,s):localStorage.setItem(kk,s)}catch{}}
};
const useStore=(k,def)=>{
  const[v,sv]=useState(()=>{const s=S.get(k);return s!==null?s:def});
  const set=useCallback(x=>{const n=typeof x==='function'?x(v):x;sv(n);S.set(k,n)},[k,v]);
  return[v,set];
};

// ── Domain meta ──────────────────────────────────────────────────────────────
const DOMAINS={
  dev:{label:'Development',color:'text-emerald-600',bg:'bg-emerald-50',border:'border-emerald-300',pct:32},
  security:{label:'Security',color:'text-sky-600',bg:'bg-sky-50',border:'border-sky-300',pct:26},
  deploy:{label:'Deployment',color:'text-amber-600',bg:'bg-amber-50',border:'border-amber-300',pct:24},
  troubleshoot:{label:'Troubleshooting',color:'text-violet-600',bg:'bg-violet-50',border:'border-violet-300',pct:18},
};

// ── Question Bank (167 questions) ─────────────────────────────────────────────
const QUESTIONS=[
// ── DEVELOPMENT (53) ──
{id:1,domain:'dev',sub:'Lambda',q:'A developer wants a Lambda function to reuse a database connection across invocations instead of reconnecting every time. Where should the connection be initialized?',opts:['Inside the handler function, on every invocation','Outside the handler function, in the global scope of the deployment package','In a separate Lambda function invoked synchronously before the main one','In an environment variable evaluated at invoke time'],ans:1,exp:'Code outside the handler runs once per execution environment (during INIT) and persists across warm invocations of that same environment, so a connection opened there is reused. Code inside the handler re-runs on every invocation.',plain:'Open the connection outside the handler so it survives across warm starts.'},
{id:2,domain:'dev',sub:'Lambda',q:'Which Lambda concurrency feature keeps execution environments pre-initialized so invocations avoid cold-start latency?',opts:['Reserved concurrency','Provisioned concurrency','Unreserved account concurrency','Auto-scaling target tracking'],ans:1,exp:'Provisioned concurrency pre-warms a specified number of execution environments so they are ready to respond immediately, eliminating cold starts for that capacity. Reserved concurrency only caps/guarantees a pool of concurrency; it does not pre-initialize anything.',plain:'Provisioned concurrency keeps warm environments ready; reserved concurrency just reserves a slot count.'},
{id:3,domain:'dev',sub:'Lambda',q:'A Lambda function needs shared utility code and a third-party library used by 10 other functions. What is the best way to share this code without duplicating it in every deployment package?',opts:['Copy the code into each function\'s package','Package the shared code as a Lambda layer and attach it to each function','Store the code in S3 and download it in the handler on every invocation','Create a single Lambda function that all others invoke synchronously'],ans:1,exp:'Lambda layers let you package libraries/dependencies once and attach the same layer to multiple functions, keeping deployment packages smaller and updates centralized. Downloading from S3 on every invocation adds latency and cost; duplicating code creates maintenance overhead.',plain:'Layers are the built-in mechanism to share code/libraries across many functions.'},
{id:4,domain:'dev',sub:'API Gateway',q:'An API Gateway REST API needs to let a single-page app hosted on a different domain call it from the browser. Requests are failing with a browser console error about the response missing a header. What must be enabled?',opts:['AWS WAF','CORS (Cross-Origin Resource Sharing) on the API resources','API Gateway usage plans','Mutual TLS authentication'],ans:1,exp:'Browsers block cross-origin responses unless the server returns the Access-Control-Allow-Origin header (and related CORS headers) on both the actual request and the OPTIONS preflight. API Gateway must have CORS explicitly enabled/configured on the resource to return those headers.',plain:'Cross-origin browser calls need CORS enabled on the API so the right headers come back.'},
{id:5,domain:'dev',sub:'API Gateway',q:'Which API Gateway feature lets you serve two versions of an API from the same custom domain by directing traffic based on the request path?',opts:['Stage variables','Base path mapping','Lambda authorizers','Request validators'],ans:1,exp:'Base path mapping maps a path under a custom domain (e.g. /v1, /v2) to a specific API and stage, letting one domain front multiple API versions or APIs entirely. Stage variables are per-stage configuration values used inside integrations, not routing.',plain:'Base path mapping routes different URL paths under one custom domain to different API stages.'},
{id:6,domain:'dev',sub:'API Gateway',q:'A public API is receiving more traffic than the backend Lambda function can comfortably handle, causing throttling errors for legitimate clients. Which API Gateway feature reduces load on the backend for repeated identical GET requests?',opts:['API Gateway response caching','Lambda reserved concurrency','A dead-letter queue','Request validation'],ans:0,exp:'API Gateway can cache responses for a configurable TTL per stage, so repeated identical requests are served from the cache instead of invoking the backend every time, reducing load and latency. Reserved concurrency controls Lambda scaling but doesn\'t reduce the number of invocations.',plain:'Enable API Gateway caching so repeated GET requests don\'t all hit the Lambda function.'},
{id:7,domain:'dev',sub:'DynamoDB',q:'A table stores orders with a partition key of orderId. The app needs to frequently query "all orders for a given customerId, sorted by order date" without scanning the whole table. What should the developer add?',opts:['A DynamoDB Stream','A Global Secondary Index (GSI) with customerId as partition key and orderDate as sort key','A second table that duplicates all order data','A Scan operation with a FilterExpression on customerId'],ans:1,exp:'A GSI lets you query by an attribute other than the base table\'s primary key, with its own partition/sort key — exactly the customerId+orderDate access pattern described. Scan+FilterExpression reads the entire table and filters client-side, which is inefficient and expensive at scale.',plain:'Add a GSI keyed on customerId+orderDate so you can Query instead of Scan.'},
{id:8,domain:'dev',sub:'DynamoDB',q:'Which DynamoDB read option returns the most recently committed data at the cost of roughly double the read capacity of a standard read?',opts:['Eventually consistent read','Strongly consistent read','Transactional read','Global table replicated read'],ans:1,exp:'A strongly consistent read reflects all writes that received a successful response prior to the read, and it consumes twice the read capacity units of an eventually consistent read on the same item. Eventually consistent reads may occasionally return stale data but are cheaper and the default.',plain:'Strongly consistent reads always see the latest write, but cost 2x the RCUs.'},
{id:9,domain:'dev',sub:'DynamoDB',q:'An application must update an item only if a version attribute still matches the value the client last read, to prevent two users from silently overwriting each other\'s changes. What DynamoDB feature implements this?',opts:['DynamoDB Streams','A conditional write using a ConditionExpression','Global tables','Time to Live (TTL)'],ans:1,exp:'A ConditionExpression on a PutItem/UpdateItem call makes the write fail (ConditionalCheckFailedException) unless the condition (e.g. version = :expectedVersion) is true, implementing optimistic locking without a separate lock service. Streams capture changes after the fact; they don\'t prevent conflicting writes.',plain:'Use a ConditionExpression to implement optimistic locking on writes.'},
{id:10,domain:'dev',sub:'DynamoDB',q:'A serverless app needs to react in real time whenever an item is inserted, modified, or deleted in a DynamoDB table, triggering a Lambda function for each change. What should be enabled?',opts:['DynamoDB Accelerator (DAX)','DynamoDB Streams with a Lambda trigger','A scheduled EventBridge rule that scans the table every minute','S3 Event Notifications'],ans:1,exp:'DynamoDB Streams captures a time-ordered sequence of item-level changes and can directly trigger a Lambda function per batch of records, giving near real-time reaction to table changes. DAX is a read-through cache, unrelated to change capture.',plain:'DynamoDB Streams + a Lambda trigger reacts to inserts/updates/deletes in near real time.'},
{id:11,domain:'dev',sub:'DynamoDB',q:'A table is experiencing ProvisionedThroughputExceededException errors on a small number of partition key values that receive disproportionately more traffic than others. What is this problem called, and what is a common fix?',opts:['Cold start; fix by enabling provisioned concurrency','Hot partition; fix by adding higher-cardinality attributes to the partition key or using write sharding','Split-brain; fix by enabling strong consistency','Throttling; fix by switching to Scan instead of Query'],ans:1,exp:'A hot partition occurs when a small set of partition key values gets far more read/write traffic than others, since DynamoDB spreads throughput across partitions by key. Adding a random or calculated suffix to the key (write sharding) or choosing a higher-cardinality key spreads the load more evenly.',plain:'Uneven traffic across keys causes hot partitions — fix with a higher-cardinality key or write sharding.'},
{id:12,domain:'dev',sub:'DynamoDB',q:'Which DynamoDB capacity mode automatically scales throughput up and down based on actual traffic with no capacity planning, billing per request?',opts:['Provisioned capacity with auto scaling','On-demand capacity mode','Reserved capacity mode','Burst capacity mode'],ans:1,exp:'On-demand capacity mode charges per read/write request and instantly accommodates traffic spikes with no need to set or manage RCU/WCU values. Provisioned capacity with auto scaling still requires configuring a target utilization and min/max bounds, and reacts more slowly to sudden spikes.',plain:'On-demand mode bills per-request and needs zero capacity planning.'},
{id:13,domain:'dev',sub:'SQS',q:'A worker fleet consumes messages from a standard SQS queue but sometimes crashes mid-processing before deleting a message. What SQS setting controls how long that message stays invisible to other consumers before becoming available again?',opts:['Message retention period','Visibility timeout','Delivery delay','Long polling wait time'],ans:1,exp:'The visibility timeout is the window during which a message that has been received is hidden from other consumers; if the consumer doesn\'t delete it within that window (e.g. because it crashed), the message becomes visible again for reprocessing. Retention period is how long an undeleted message stays in the queue at all before being discarded.',plain:'Visibility timeout hides an in-flight message; if not deleted in time, it reappears for another consumer.'},
{id:14,domain:'dev',sub:'SQS',q:'An order-processing queue must guarantee messages are processed in the exact order they were sent and exactly once. Which SQS queue type should be used?',opts:['Standard queue','FIFO queue','Delay queue','Dead-letter queue'],ans:1,exp:'FIFO (First-In-First-Out) queues preserve exact ordering within a message group and provide exactly-once processing (when combined with deduplication). Standard queues offer best-effort ordering and at-least-once delivery, which can result in duplicates or out-of-order delivery.',plain:'FIFO queues guarantee strict order and exactly-once processing; Standard queues do not.'},
{id:15,domain:'dev',sub:'SQS',q:'A consumer application is polling an SQS queue frequently and incurring unnecessary API costs even when the queue is empty, because each poll returns immediately with no messages. What reduces this cost while still processing messages promptly?',opts:['Increase the visibility timeout','Enable long polling by setting ReceiveMessageWaitTimeSeconds > 0','Switch to a FIFO queue','Decrease the message retention period'],ans:1,exp:'Long polling makes ReceiveMessage wait up to the configured time (max 20s) for a message to arrive instead of returning immediately when the queue is empty, cutting the number of empty responses and API calls. Visibility timeout and retention period don\'t affect polling frequency.',plain:'Long polling waits for a message instead of returning empty immediately, cutting wasted API calls.'},
{id:16,domain:'dev',sub:'SQS',q:'Messages that repeatedly fail processing (exceeding a maxReceiveCount) should be automatically moved out of the main queue for later inspection, without blocking new messages. What should be configured?',opts:['A visibility timeout of 0','A redrive policy pointing to a dead-letter queue (DLQ)','A FIFO queue with content-based deduplication','Server-side encryption with a customer managed KMS key'],ans:1,exp:'A redrive policy on the source queue specifies a DLQ and a maxReceiveCount; once a message has been received that many times without being deleted, SQS automatically moves it to the DLQ, isolating poison-pill messages while healthy messages keep flowing.',plain:'A redrive policy + DLQ automatically isolates messages that keep failing.'},
{id:17,domain:'dev',sub:'SNS',q:'A team wants a single event ("order placed") to trigger three independent downstream systems: an email service, an inventory Lambda function, and an SQS queue for analytics. What pattern fits best?',opts:['Direct point-to-point calls from the order service to each of the three systems','SNS pub/sub with an SNS topic and three separate subscriptions (fan-out)','A single SQS queue polled by all three systems','Synchronous API Gateway calls to each downstream system in sequence'],ans:1,exp:'The SNS fan-out pattern publishes one message to a topic and delivers it to every subscriber (Lambda, SQS, email, HTTP endpoints, etc.) in parallel, decoupling the publisher from the number and identity of consumers. Point-to-point calls tightly couple the order service to every downstream system.',plain:'SNS fan-out delivers one message to many independent subscribers at once.'},
{id:18,domain:'dev',sub:'SNS',q:'A subscriber to an SNS topic should only receive notifications where the message attribute "priority" equals "high", filtering out lower-priority messages before they reach that subscriber. What should be configured?',opts:['A dead-letter queue on the subscription','A subscription filter policy','A topic-level access policy','FIFO topic ordering'],ans:1,exp:'A subscription filter policy is JSON evaluated against message attributes; SNS only delivers messages to that subscriber when the attributes match, without any code change on the publisher or subscriber side.',plain:'Filter policies let each subscriber receive only the messages matching specific attribute values.'},
{id:19,domain:'dev',sub:'EventBridge',q:'A company wants to decouple many AWS services and SaaS partner events into a central event bus, then route specific event types to specific targets using pattern matching, without writing custom routing logic in each consumer.',opts:['Amazon MQ','Amazon EventBridge with rules and event patterns','AWS Step Functions Standard workflow','Amazon Kinesis Data Streams'],ans:1,exp:'EventBridge is built for this: a central event bus receives events from AWS services, custom apps, and SaaS partners, and rules with event patterns route matching events to one or more targets (Lambda, Step Functions, SQS, etc.) declaratively.',plain:'EventBridge routes events to targets using declarative pattern-matching rules on a central bus.'},
{id:20,domain:'dev',sub:'EventBridge',q:'An application needs to invoke a Lambda function every night at 2 AM UTC on a fixed schedule, independent of any application event. What EventBridge feature should be used?',opts:['An event pattern rule','A scheduled rule using a cron or rate expression','A custom event bus','An archive and replay'],ans:1,exp:'EventBridge scheduled rules use cron() or rate() expressions to invoke targets on a fixed schedule, functioning like a managed cron job. Event pattern rules react to events as they occur rather than on a timer.',plain:'A scheduled (cron/rate) EventBridge rule runs targets on a fixed timer.'},
{id:21,domain:'dev',sub:'Step Functions',q:'A workflow must call three Lambda functions in sequence, retry a specific step on transient failure, and branch to a different step based on the result of one call. Which service is purpose-built for orchestrating this?',opts:['Amazon SWF only, since Step Functions cannot retry','AWS Step Functions state machine with Retry/Catch and Choice states','A single monolithic Lambda function containing all the logic with try/catch blocks','SNS fan-out to all three Lambda functions simultaneously'],ans:1,exp:'Step Functions state machines natively support sequencing (Task states), automatic retry/backoff and error handling (Retry/Catch fields), and conditional branching (Choice state) — visually and declaratively, without hand-rolled orchestration code in a single function.',plain:'Step Functions state machines natively handle sequencing, retries, and branching in workflows.'},
{id:22,domain:'dev',sub:'Step Functions',q:'Which Step Functions workflow type is billed per state transition, best suited for long-running, auditable workflows, and supports up to a one-year execution duration?',opts:['Express Workflows','Standard Workflows','Synchronous Express Workflows','Activity Workflows'],ans:1,exp:'Standard Workflows are priced per state transition, can run for up to a year, and provide a full execution history for auditing — ideal for order processing, human approval steps, etc. Express Workflows are priced by duration/memory and are optimized for high-volume, short-duration event processing instead.',plain:'Standard Workflows: long-running, auditable, priced per transition. Express: high-volume, short, priced by duration.'},
{id:23,domain:'dev',sub:'SDK',q:'An application repeatedly calls a DynamoDB API and occasionally receives ProvisionedThroughputExceededException during traffic bursts. The AWS SDK already retries failed requests automatically. What retry strategy does the SDK use by default to avoid overwhelming the service further?',opts:['Immediate retry with no delay','Exponential backoff with jitter','A fixed 60-second delay between every retry','No retry — the application must catch and retry manually'],ans:1,exp:'AWS SDKs implement exponential backoff (increasing delay between attempts) with jitter (randomization) by default for retryable errors, which spreads out retried requests over time instead of causing a retry storm that worsens throttling.',plain:'AWS SDKs auto-retry throttled calls using exponential backoff with jitter.'},
{id:24,domain:'dev',sub:'SDK',q:'A Lambda function needs temporary AWS credentials to call S3 and DynamoDB. What is the recommended way to supply these credentials to the AWS SDK inside the function code?',opts:['Hardcode an IAM user\'s access key and secret key as environment variables','Attach an IAM execution role to the function; the SDK picks up temporary credentials automatically','Store long-term credentials in a config file bundled with the deployment package','Prompt for credentials via API Gateway on every request'],ans:1,exp:'Lambda\'s execution role provides temporary, automatically-rotated credentials to the SDK via the Lambda runtime environment with zero code changes — the SDK\'s default credential provider chain picks them up. Hardcoding long-term keys is a security anti-pattern the exam consistently flags as wrong.',plain:'Use an IAM execution role, not hardcoded keys — the SDK finds the role\'s temporary credentials automatically.'},
{id:25,domain:'dev',sub:'SDK',q:'A batch job processes millions of S3 objects and needs the best throughput when uploading large files. Which S3 upload approach should the developer use?',opts:['A single PutObject call per file regardless of size','Multipart upload, splitting large objects into parts uploaded in parallel','Uploading through API Gateway as base64-encoded payloads','Uploading via SNS message attachments'],ans:1,exp:'Multipart upload splits an object into independently-uploaded parts (in parallel, with retry per part) and is recommended by AWS for objects over ~100MB, improving throughput and resiliency versus a single PutObject call. The AWS SDK\'s TransferManager/upload utilities handle this automatically for large files.',plain:'Multipart upload parallelizes and speeds up large-file uploads to S3.'},
{id:26,domain:'dev',sub:'Idempotency',q:'A payment-processing Lambda function is triggered by an SQS standard queue, which can occasionally deliver the same message more than once. What must the function do to avoid charging a customer twice for the same payment?',opts:['Nothing — SQS standard queues never redeliver messages','Design the function to be idempotent, e.g. by checking/recording a unique idempotency key before processing','Switch the Lambda runtime to a compiled language','Increase the SQS message retention period'],ans:1,exp:'SQS standard queues provide at-least-once delivery, so duplicate deliveries are expected and normal. The function itself must be idempotent — for example, storing processed idempotency keys (like the payment/order ID) in DynamoDB with a conditional write and skipping if already processed — regardless of the queue type.',plain:'At-least-once delivery means your code must be idempotent, not the queue.'},
{id:27,domain:'dev',sub:'Cognito',q:'A mobile app needs to let users sign up and log in with a username/password, and separately needs to grant temporary, scoped AWS credentials to call S3 directly from the app after login. Which two Cognito components are needed?',opts:['A single Cognito Identity Pool handles both','A Cognito User Pool for authentication and a Cognito Identity Pool for temporary AWS credentials','IAM Identity Center for authentication and STS directly for credentials','A Cognito User Pool alone provides both authentication and AWS credentials'],ans:1,exp:'A User Pool is the user directory/authentication service (sign-up, sign-in, tokens). An Identity Pool exchanges those tokens (or other identity provider tokens) for temporary, scoped IAM credentials via STS so the app can call AWS services directly. They serve distinct purposes and are commonly used together.',plain:'User Pool = who the user is (auth). Identity Pool = temporary AWS credentials for that user.'},
{id:28,domain:'dev',sub:'Cognito',q:'After a user authenticates against a Cognito User Pool, the app receives a JWT. Which token should be sent to a custom backend API to verify the caller\'s identity and included in the Authorization header for API Gateway Cognito authorizers?',opts:['The refresh token','The ID token or access token','The client secret','The identity pool token'],ans:1,exp:'The ID token contains identity claims about the user; the access token authorizes calls to resource servers/APIs. API Gateway Cognito User Pool authorizers validate the access token (or ID token, depending on config) passed in the Authorization header. The refresh token is only used to obtain new tokens, never sent to APIs directly.',plain:'Send the ID/access token to the API; the refresh token is only for getting new tokens.'},
{id:29,domain:'dev',sub:'S3',q:'A web app needs to let a browser upload a file directly to a private S3 bucket without routing the file through the application backend, while keeping the bucket private overall. What should the backend generate?',opts:['A public bucket policy allowing anonymous PutObject','A presigned URL for a PutObject request, with a short expiration','An IAM user\'s long-term access keys shared with the browser','A CloudFront signed cookie'],ans:1,exp:'A presigned URL is generated server-side using the backend\'s credentials and grants time-limited permission to perform one specific S3 action (like PutObject), without making the bucket public or exposing any credentials to the browser.',plain:'Presigned URLs let a browser upload directly to a private bucket without exposing credentials.'},
{id:30,domain:'dev',sub:'S3',q:'A static website hosted in S3 needs to serve content globally with low latency and support HTTPS on a custom domain. What should be placed in front of the S3 bucket?',opts:['An Application Load Balancer','Amazon CloudFront as a CDN with an ACM certificate','AWS Global Accelerator only','A second S3 bucket in every region'],ans:1,exp:'CloudFront caches content at edge locations worldwide for low latency, supports custom domains with an ACM certificate for HTTPS, and is the standard pattern for serving static S3-hosted content globally.',plain:'CloudFront in front of S3 gives global low-latency delivery and easy HTTPS on a custom domain.'},
{id:31,domain:'dev',sub:'Containers',q:'A team is containerizing a microservice and wants to run it on AWS without managing any EC2 servers, while still using standard Docker images. Which combination fits?',opts:['ECS or EKS with the Fargate launch type','ECS with the EC2 launch type only','AWS Lambda with a zip deployment package','Elastic Beanstalk with a single-instance environment'],ans:0,exp:'Fargate is a serverless compute engine for containers that works with both ECS and EKS — you define the task/pod and AWS provisions and manages the underlying compute, so there\'s no EC2 fleet to patch or scale manually. EC2 launch type still requires managing the underlying instances.',plain:'Fargate runs your containers without you managing any servers.'},
{id:32,domain:'dev',sub:'Containers',q:'Where should a team store and version Docker container images before deploying them to ECS or EKS on AWS?',opts:['Amazon S3','Amazon Elastic Container Registry (ECR)','AWS CodeCommit','Amazon EFS'],ans:1,exp:'ECR is a managed Docker/OCI container image registry integrated with IAM for access control and natively supported as an image source by ECS, EKS, and Lambda container images. S3 stores objects, not container image manifests/layers, and isn\'t used this way.',plain:'ECR is the managed registry for storing and versioning container images.'},
{id:33,domain:'dev',sub:'Elastic Beanstalk',q:'A developer wants to deploy a web application (code only, no infrastructure templates) and have AWS automatically provision and manage the EC2 instances, load balancer, auto scaling, and health monitoring. Which service fits best?',opts:['AWS CloudFormation','AWS Elastic Beanstalk','AWS CodeDeploy','Amazon EC2 Image Builder'],ans:1,exp:'Elastic Beanstalk is a PaaS: you upload application code (or a container) and Beanstalk provisions and manages the underlying EC2 instances, load balancer, auto scaling group, and health monitoring for you, while still allowing configuration overrides when needed. CloudFormation instead requires you to define all the infrastructure explicitly.',plain:'Elastic Beanstalk provisions and manages the infrastructure for you from just your code.'},
{id:34,domain:'dev',sub:'Caching',q:'A read-heavy application queries the same aggregate data from DynamoDB thousands of times per second, causing excessive read costs. Sub-millisecond, DynamoDB-API-compatible caching is required with minimal code change. What should be used?',opts:['Amazon ElastiCache for Redis, rewriting all data access code','Amazon DynamoDB Accelerator (DAX)','Amazon CloudFront','S3 Transfer Acceleration'],ans:1,exp:'DAX is a DynamoDB-specific, write-through, in-memory cache that sits in front of DynamoDB and is API-compatible with the DynamoDB SDK, so most read code needs little to no change while gaining microsecond-to-millisecond latency and dramatically reduced read load.',plain:'DAX is a drop-in, DynamoDB-compatible cache — minimal code changes required.'},
{id:35,domain:'dev',sub:'Caching',q:'A general-purpose web app wants to cache database query results and session data using a fast, general in-memory key-value store, with the option of complex data structures like sorted sets. Which service fits?',opts:['Amazon ElastiCache for Redis','Amazon RDS read replicas only','Amazon DynamoDB Accelerator (DAX)','AWS Storage Gateway'],ans:0,exp:'ElastiCache for Redis is a general-purpose, in-memory data store supporting rich data structures (sorted sets, hashes, lists) and is commonly used for caching, session storage, and leaderboards across many data sources, not just DynamoDB. DAX only works in front of DynamoDB specifically.',plain:'ElastiCache for Redis is the general-purpose in-memory cache/data-structure store.'},
{id:36,domain:'dev',sub:'Secrets',q:'An application needs a database password that can be automatically rotated on a schedule without any application downtime or manual intervention. Where should it be stored?',opts:['As a plaintext Lambda environment variable','In AWS Secrets Manager with automatic rotation configured','Hardcoded in the application source code','In a public S3 bucket with restricted IAM access'],ans:1,exp:'Secrets Manager natively supports automatic, scheduled rotation of secrets (including built-in rotation Lambda functions for RDS, Redshift, and DocumentDB) and updates the secret value in place, which applications retrieve at runtime via the SDK/API — avoiding hardcoded or stale credentials.',plain:'Secrets Manager can auto-rotate credentials on a schedule with no app downtime.'},
{id:37,domain:'dev',sub:'Secrets',q:'An application needs simple key-value application configuration values (like a feature flag and an API endpoint URL) that don\'t require automatic rotation. Which is the more cost-effective AWS service for this?',opts:['AWS Secrets Manager, since it is the only option for configuration','AWS Systems Manager Parameter Store','Amazon RDS','AWS Key Management Service (KMS)'],ans:1,exp:'Parameter Store (part of Systems Manager) offers free-tier standard parameters for configuration values and supports encryption via KMS for SecureString parameters, making it the more cost-effective choice for plain configuration data that doesn\'t need Secrets Manager\'s built-in rotation workflows.',plain:'Parameter Store is the low-cost option for plain config values; Secrets Manager adds rotation.'},
{id:38,domain:'dev',sub:'Lambda',q:'A Lambda function packaged as a container image exceeds the 250MB zip deployment limit because it bundles large ML libraries. What is the maximum container image size Lambda supports, and where must the image be stored?',opts:['250MB, stored in S3','10GB, stored in Amazon ECR','1GB, stored in Amazon EFS only','Unlimited size, stored in any Docker registry'],ans:1,exp:'Lambda container images can be up to 10GB and must be pushed to Amazon ECR (Lambda pulls the image from ECR at invoke/init time); this is the standard workaround for functions with dependencies too large for the zip-based 250MB unzipped limit.',plain:'Container-image Lambda supports up to 10GB images, but only from ECR.'},
{id:39,domain:'dev',sub:'Lambda',q:'A Lambda function needs to access a private RDS database that lives inside a VPC with no public endpoint. What must be configured on the Lambda function?',opts:['Nothing — Lambda can always reach VPC resources by default','VPC configuration on the function (subnets + security group) so Lambda attaches an ENI in that VPC','A NAT Gateway attached directly to the Lambda function','An API Gateway VPC link'],ans:1,exp:'By default a Lambda function runs outside any customer VPC and cannot reach VPC-only resources. Configuring the function with specific subnets and a security group causes Lambda to attach elastic network interfaces (ENIs) inside that VPC, giving it network access to resources like a private RDS instance.',plain:'Attach the Lambda function to the VPC (subnets + security group) to reach private resources like RDS.'},
{id:40,domain:'dev',sub:'Lambda',q:'A Lambda function needs outbound internet access (e.g. to call a public third-party API) while also being attached to a VPC to reach a private database. What additional resource is required?',opts:['An Internet Gateway attached to the private subnet directly','A NAT Gateway in a public subnet, with Lambda\'s subnets routing outbound traffic through it','A second Lambda function acting as a proxy','A VPC endpoint for every third-party API'],ans:1,exp:'A VPC-attached Lambda function only has the networking of the subnets it\'s placed in. Private subnets need a route to a NAT Gateway (in a public subnet) to reach the public internet, since an Internet Gateway alone doesn\'t provide outbound access for resources in a private subnet.',plain:'VPC Lambda needs a NAT Gateway route for outbound internet access from private subnets.'},
{id:41,domain:'dev',sub:'API Gateway',q:'A backend team wants API Gateway to reject malformed requests (missing required parameters or invalid JSON body) before they ever reach the Lambda function, to save invocations and simplify function code.',opts:['Enable a Lambda authorizer','Enable request validation with a JSON Schema model on the method','Enable response caching','Enable a usage plan with a strict throttle limit'],ans:1,exp:'API Gateway request validators can check for required query parameters/headers and validate the request body against a JSON Schema model, rejecting invalid requests with a 400 before invoking the backend integration at all — reducing unnecessary Lambda invocations and simplifying downstream validation code.',plain:'Request validation with a JSON Schema model rejects bad requests before they hit Lambda.'},
{id:42,domain:'dev',sub:'API Gateway',q:'Which API Gateway type is generally lower-latency and lower-cost than a REST API for simple proxy integrations to Lambda or HTTP backends, but with fewer built-in features like request validation and API keys?',opts:['WebSocket API','HTTP API','Private API','Edge-optimized REST API'],ans:1,exp:'HTTP APIs are a newer, lighter-weight API Gateway API type optimized for low-latency, low-cost proxy integrations (Lambda or HTTP backend) with a smaller feature set than REST APIs (no built-in usage plans/API keys, more limited request validation) — the right choice when you don\'t need those REST API–only features.',plain:'HTTP APIs are cheaper and faster for simple proxy integrations, but have fewer features than REST APIs.'},
{id:43,domain:'dev',sub:'Kinesis',q:'A clickstream application needs to ingest and process millions of events per second in real time, with multiple independent consumers reading the same stream, and the ability to replay recent data. Which service fits?',opts:['Amazon SQS standard queue','Amazon Kinesis Data Streams','Amazon SNS','AWS Step Functions'],ans:1,exp:'Kinesis Data Streams is designed for high-throughput, real-time streaming ingestion, supports multiple independent consumers reading the same data (each tracking its own position), and retains data for a configurable period (24 hours to 365 days) enabling replay. SQS is a queue: once a message is consumed and deleted it\'s gone, and it doesn\'t support multiple independent full-stream consumers the same way.',plain:'Kinesis Data Streams: high-throughput, replayable, multi-consumer streaming — unlike SQS.'},
{id:44,domain:'dev',sub:'Serverless patterns',q:'An API endpoint needs to accept a file upload, process it asynchronously (which can take several minutes), and let the client poll for status. What pattern avoids making the client wait on a long-running synchronous Lambda invocation?',opts:['Increase the API Gateway and Lambda timeout to the maximum and keep it synchronous','Return immediately with a job ID, process the file asynchronously (e.g. via SQS + Lambda or Step Functions), and expose a separate status endpoint','Use a WebSocket for every request regardless of duration','Have the client retry the same POST request repeatedly until it succeeds'],ans:1,exp:'API Gateway has a hard 29-second integration timeout, so long-running work should be decoupled: accept the request, hand off processing asynchronously (SQS, Step Functions, or an async Lambda invocation), return a job ID immediately, and let the client poll a separate status endpoint (or use WebSockets/SNS for push updates).',plain:'Decouple long work from the request: return a job ID immediately, process async, poll for status.'},
{id:45,domain:'dev',sub:'SAM',q:'A developer wants to define a Lambda function, its API Gateway trigger, and a DynamoDB table in a single template, then use CLI commands to build, package, and deploy locally with minimal boilerplate compared to raw CloudFormation. What should they use?',opts:['AWS CDK exclusively','The AWS Serverless Application Model (SAM), an extension of CloudFormation with simplified serverless resource types','Terraform','AWS OpsWorks'],ans:1,exp:'SAM extends CloudFormation with simplified resource types (AWS::Serverless::Function, ::Api, ::SimpleTable) and provides a CLI (sam build, sam package/deploy, sam local invoke) purpose-built for serverless application development, transforming into standard CloudFormation at deploy time.',plain:'SAM is CloudFormation with serverless shorthand and a CLI for building/testing/deploying locally.'},
{id:46,domain:'dev',sub:'SAM',q:'What SAM CLI command lets a developer invoke a Lambda function locally (in a Docker container matching the Lambda runtime) to test it before deploying?',opts:['sam deploy','sam local invoke','sam validate','sam logs'],ans:1,exp:'sam local invoke runs the function inside a Docker container that emulates the actual Lambda execution environment, letting developers test function behavior (including with a sample event payload) without deploying to AWS first.',plain:'sam local invoke tests a Lambda function locally in a Lambda-like Docker container.'},
{id:47,domain:'dev',sub:'X-Ray',q:'A distributed application spans API Gateway, multiple Lambda functions, and DynamoDB. A specific request is slow, and the team needs to see exactly which downstream call is the bottleneck across the whole call chain. What should be enabled?',opts:['CloudWatch Logs alone','AWS X-Ray active tracing across the services, with the X-Ray SDK instrumenting downstream calls','A CloudWatch composite alarm','VPC Flow Logs'],ans:1,exp:'X-Ray provides distributed tracing: it stitches together a service map and per-segment timing across API Gateway, Lambda, and downstream AWS calls (when instrumented with the X-Ray SDK), making it possible to see exactly where time is spent in a single request\'s trace. Logs alone don\'t correlate timing across services without significant manual work.',plain:'X-Ray traces a request across every service in the chain and shows exactly where time is spent.'},
{id:48,domain:'dev',sub:'CloudFormation',q:'A CloudFormation template needs to reference the ARN of an S3 bucket created earlier in the same template, without hardcoding it. Which intrinsic function returns that value?',opts:['!Ref only ever returns an ARN for any resource','!GetAtt BucketLogicalId.Arn','!Sub with no parameters','!ImportValue'],ans:1,exp:'!GetAtt retrieves a specific attribute of a resource (like Arn, DomainName) defined elsewhere in the same template; the exact attributes available depend on the resource type. !Ref returns different things depending on resource type — for S3 buckets it returns the bucket name, not the ARN. !ImportValue is for cross-stack values exported by a different stack.',plain:'!GetAtt fetches a specific attribute like Arn; !Ref returns type-dependent default values (bucket name for S3).'},
{id:49,domain:'dev',sub:'CloudFormation',q:'A team wants the same CloudFormation template to deploy a small EC2 instance type in the dev environment and a larger one in production, without maintaining two separate templates.',opts:['Duplicate the template and hardcode different instance types','Use CloudFormation Parameters (and optionally Mappings) so the instance type is supplied per deployment/environment','Manually edit the resource block before each deployment','Use nested stacks exclusively, since Parameters can\'t vary by environment'],ans:1,exp:'Parameters let a single template accept different input values at deploy time (e.g. an InstanceType parameter with allowed values), and Mappings can define environment-specific lookups (dev vs prod) referenced via !FindInMap — avoiding template duplication entirely.',plain:'CloudFormation Parameters (plus Mappings) let one template vary by environment at deploy time.'},
{id:50,domain:'dev',sub:'CI/CD',q:'A team commits code to a Git repository and wants every commit to a specific branch to automatically trigger a build, run tests, and deploy to a staging environment with no manual steps. What AWS pattern implements this?',opts:['Manually running a deploy script after each commit','A CI/CD pipeline (e.g. AWS CodePipeline) with a source stage on the branch, a CodeBuild build/test stage, and a deploy stage','A CloudWatch alarm that triggers on repository size','An SNS topic subscribed by the developer\'s email'],ans:1,exp:'CodePipeline models the entire release process as stages: a source stage detects new commits on the tracked branch, a build/test stage runs CodeBuild, and a deploy stage pushes to staging automatically — fully automating the path from commit to deployed environment.',plain:'A CodePipeline pipeline automates commit → build/test → deploy with zero manual steps.'},
{id:51,domain:'dev',sub:'Testing',q:'A developer wants fast local unit tests for Lambda handler logic without invoking real AWS services or incurring API calls/costs during the test run. What is the best approach?',opts:['Run tests only against the deployed production Lambda function','Mock/stub the AWS SDK calls in unit tests (e.g. using a mocking library) and test business logic in isolation','Use sam local invoke exclusively for every unit test','Skip unit testing and rely only on manual console testing'],ans:1,exp:'Fast, reliable unit tests mock/stub AWS SDK client calls so tests run in-process without network calls, cost, or dependency on live AWS resources. sam local invoke is useful for integration-style local testing but is heavier and slower than pure unit tests for isolated logic.',plain:'Mock the SDK calls for fast unit tests of your handler logic in isolation.'},
{id:52,domain:'dev',sub:'Lambda',q:'A Lambda function\'s handler code needs to differ in behavior between a "dev" and "prod" deployment (e.g. a different downstream table name) without maintaining separate code packages. What is the standard mechanism?',opts:['Separate Lambda function code for every environment','Environment variables set per-function (e.g. via SAM/CloudFormation parameters) read at runtime','Hardcoded if/else blocks checking the AWS account ID','A different programming language per environment'],ans:1,exp:'Lambda environment variables let the same deployment package behave differently per environment (e.g. TABLE_NAME=dev-orders vs TABLE_NAME=prod-orders) by reading process/OS environment variables at runtime, commonly set via SAM parameters or CloudFormation per stack.',plain:'Environment variables let one code package behave differently across dev/prod deployments.'},
{id:53,domain:'dev',sub:'Lambda',q:'A Lambda function occasionally needs more CPU for a compute-heavy step. Lambda does not let you configure vCPUs directly. How is CPU power actually controlled?',opts:['By choosing a specific EC2 instance type for the function','CPU is allocated proportionally to the configured memory size — increasing memory also increases CPU', 'By enabling provisioned concurrency','CPU cannot be changed under any circumstances'],ans:1,exp:'Lambda allocates CPU (and other resources) proportionally to the memory setting: increasing the function\'s memory also increases its available vCPU share, which is why CPU-bound functions are often sped up simply by raising memory, even though cost per ms also rises.',plain:'Lambda CPU scales with the memory setting — there\'s no separate CPU dial.'},
// ── SECURITY (44) ──
{id:54,domain:'security',sub:'IAM',q:'A Lambda function needs to read from a specific S3 bucket and write to a specific DynamoDB table, and nothing else. What is the best-practice way to grant these permissions?',opts:['Attach the AdministratorAccess managed policy to the execution role for simplicity','Create an execution role with a least-privilege policy naming only the specific S3 bucket ARN and DynamoDB table ARN and the exact actions needed','Embed an IAM user\'s access keys as environment variables','Grant permissions at the account level via an SCP'],ans:1,exp:'Least privilege means granting only the specific actions on the specific resources actually required, scoped in the resource ARNs of the policy — not broad managed policies like AdministratorAccess, which the exam always flags as wrong when a narrower option exists.',plain:'Scope the execution role\'s policy to exactly the resources and actions needed — nothing broader.'},
{id:55,domain:'security',sub:'IAM',q:'Which IAM policy element specifies the maximum permissions an identity can have, acting as a ceiling that a separately attached identity-based policy still cannot exceed?',opts:['A resource-based policy','A permissions boundary','A service control policy','A trust policy'],ans:1,exp:'A permissions boundary is an advanced IAM feature attached to a user or role that sets the maximum permissions that identity\'s own identity-based policies can grant — even a permissive identity-based policy is capped by the boundary. SCPs serve a similar capping role but at the AWS Organizations account level, not per-identity.',plain:'A permissions boundary caps what an identity-based policy attached to that same identity can grant.'},
{id:56,domain:'security',sub:'IAM',q:'An EC2 instance in Account A needs to read objects from an S3 bucket owned by Account B. What is the standard secure pattern to enable this cross-account access?',opts:['Share Account B\'s root credentials with Account A','Account B creates an IAM role with a trust policy allowing Account A\'s role/account to assume it, and Account A\'s instance assumes that role via STS','Make the S3 bucket public','Account A creates an identical IAM user in Account B manually'],ans:1,exp:'Cross-account access is done via role assumption: the resource-owning account (B) defines a role with a trust policy naming the calling account/role (A) as a trusted principal, and A calls sts:AssumeRole to get temporary credentials scoped to that role\'s permissions in B. No credential sharing or public exposure required.',plain:'Cross-account access uses AssumeRole with a trust policy — never shared credentials or public resources.'},
{id:57,domain:'security',sub:'IAM',q:'A Lambda function\'s execution role has an S3 GetObject Allow statement, but the target S3 bucket policy has no statement referencing the Lambda role at all. Will the GetObject call succeed?',opts:['No — a resource-based policy grant is always required in addition to the identity policy', 'Yes, as long as the S3 bucket is not encrypted with a customer managed KMS key', 'Yes — for same-account access, an explicit Allow on the identity policy is sufficient without a matching bucket policy statement', 'No — S3 always requires MFA for any GetObject call'],ans:2,exp:'For same-account access, an Allow in the identity-based policy (the execution role) is sufficient on its own — no matching resource-based (bucket) policy statement is required, since IAM evaluates identity-based and resource-based policies as independent OR paths within the same account. Cross-account access, however, does require an explicit resource-based policy grant (or a role trust relationship).',plain:'Same-account: identity policy alone is enough. Cross-account: you also need a resource-based/trust grant.'},
{id:58,domain:'security',sub:'IAM',q:'A company wants every account in an AWS Organization, including the root user of every member account, to be permanently blocked from disabling CloudTrail, regardless of what IAM policies are attached in each account.',opts:['An IAM permissions boundary attached in each account','A Service Control Policy (SCP) with a Deny statement on the CloudTrail-disabling actions, attached at the OU or organization root','A resource-based policy on the CloudTrail trail','A password policy'],ans:1,exp:'SCPs are the only mechanism that applies org-wide, to every principal in every member account (including root), and cannot be overridden by permissions within that account. An explicit Deny SCP guarantees the restriction cannot be bypassed by any identity or resource policy in the member accounts.',plain:'Only an SCP enforces a rule across every account, including root, with no override possible.'},
{id:59,domain:'security',sub:'IAM',q:'What is the maximum lifetime typically available for temporary security credentials obtained via sts:AssumeRole using the role\'s default maximum session duration setting?',opts:['15 minutes, fixed and non-configurable','Up to 12 hours, configurable up to a maximum of 12 hours on the role','Exactly 36 hours always','Credentials never expire once issued via AssumeRole'],ans:1,exp:'The default maximum session duration for AssumeRole is 1 hour, but it can be configured on the role up to a maximum of 12 hours; GetFederationToken and some other STS calls have different maximums (like 36 hours), so the exact limit depends on which STS API is used and the role\'s configuration.',plain:'AssumeRole sessions can be configured up to 12 hours max; not all STS calls share the same limit.'},
{id:60,domain:'security',sub:'KMS',q:'An application needs to encrypt data client-side using an AWS KMS customer managed key without sending the actual plaintext data to KMS (only small amounts of key material should cross the network). What KMS operation supports this pattern?',opts:['kms:Encrypt on the entire payload directly','GenerateDataKey, which returns a plaintext data key (used locally to encrypt the data) and its encrypted form (stored alongside the ciphertext)','kms:CreateKey for every encryption operation','kms:PutKeyPolicy'],ans:1,exp:'Envelope encryption: the app calls GenerateDataKey to get a plaintext data key (used locally, in memory, to encrypt the actual data with a fast symmetric algorithm) and its KMS-encrypted counterpart, which is stored next to the ciphertext for later decryption. This avoids sending large payloads to KMS, since KMS\'s direct Encrypt API is limited to small payloads (4KB).',plain:'GenerateDataKey enables envelope encryption — only a small data key touches KMS, not the whole payload.'},
{id:61,domain:'security',sub:'KMS',q:'A company must encrypt sensitive data at rest and retain full control over key rotation scheduling, key policy, and the ability to disable/delete the key, rather than relying on AWS-managed defaults. What KMS key type fits?',opts:['An AWS owned key','An AWS managed key (aws/service prefix)','A customer managed key (CMK)','An S3-managed key (SSE-S3)'],ans:2,exp:'Customer managed keys give full control: the customer defines the key policy, can enable/configure automatic annual rotation, and can disable or schedule deletion of the key. AWS managed keys are controlled by the AWS service (rotation is automatic and less configurable, and you cannot delete them), and AWS owned keys aren\'t visible or manageable by the customer at all.',plain:'Only customer managed keys give you full control over policy, rotation, and deletion.'},
{id:62,domain:'security',sub:'KMS',q:'An application receives an "access denied" error calling kms:Decrypt even though the caller\'s IAM identity policy has an explicit Allow for kms:Decrypt on that key\'s ARN. What is a likely missing piece specific to KMS?',opts:['KMS never checks identity policies, only resource policies','The KMS key policy itself must also allow the calling principal — KMS keys require both the identity policy and the key policy to permit the action', 'The key must be an AWS managed key instead of customer managed', 'The caller must use a VPC endpoint for all KMS calls'],ans:1,exp:'Unlike most services, KMS key policies act as the primary access control gate: even a fully permissive IAM identity policy is not enough by itself unless the key\'s own resource policy also grants access to that principal (directly or via a policy statement allowing IAM policies to grant access, like the default "Enable IAM User Permissions" statement).',plain:'KMS requires both the identity policy AND the key policy to allow the caller — a common exam trap.'},
{id:63,domain:'security',sub:'Secrets',q:'A hardcoded database password was accidentally committed to a public Git repository. What is the correct immediate remediation, beyond removing it from the repo?',opts:['Nothing further is needed once the commit is deleted from the latest branch','Rotate/change the actual credential immediately, since anyone who saw the commit (even briefly, or via git history/forks) may already have it', 'Rename the environment variable that referenced it','Enable MFA on the IAM user that owns the credential'],ans:1,exp:'Once a secret is exposed publicly, it must be treated as compromised — deleting the commit does not remove it from git history, forks, caches, or anyone who already cloned/viewed it. The credential itself (the database password) must be rotated/changed, and ideally moved into Secrets Manager going forward.',plain:'An exposed secret must be rotated immediately — deleting the commit alone doesn\'t undo the exposure.'},
{id:64,domain:'security',sub:'Cognito',q:'A Cognito User Pool requires developers to enforce that users verify their email address before they can sign in, and that passwords meet a minimum complexity policy. Where is this configured?',opts:['In the Cognito Identity Pool settings','In the User Pool\'s sign-up/verification and password policy settings', 'In an IAM policy attached to the pool', 'In an S3 bucket policy'],ans:1,exp:'Email/phone verification requirements and password complexity policies (minimum length, character requirements) are configured directly on the User Pool itself as part of its sign-up and security settings — this is core User Pool functionality, unrelated to Identity Pools (which only deal with AWS credential exchange).',plain:'Email verification and password policy are User Pool settings, not Identity Pool settings.'},
{id:65,domain:'security',sub:'Networking',q:'A subnet-level firewall must explicitly deny traffic from a known malicious IP range while allowing all other traffic, and the rules should be evaluated in a specific numbered order. Which AWS feature is designed for this?',opts:['A Security Group','A Network ACL (NACL) with an explicit deny rule at a low rule number', 'AWS WAF', 'A VPC endpoint policy'],ans:1,exp:'NACLs are stateless, subnet-level firewalls that support explicit ALLOW and DENY rules evaluated in ascending numeric order until a match is found — the only VPC networking construct that supports explicit deny by IP range at the subnet level. Security Groups only support Allow rules and are evaluated per-instance/ENI, not by ordered rule number.',plain:'NACLs support explicit DENY rules evaluated in order; Security Groups only ever allow.'},
{id:66,domain:'security',sub:'Networking',q:'An application running in a private subnet needs to call the S3 API without traversing the public internet or requiring a NAT Gateway, for both security and cost reasons. What should be created?',opts:['An Internet Gateway attached to the private subnet','A VPC Gateway Endpoint for S3', 'A Direct Connect connection', 'A public IP address on the private instances'],ans:1,exp:'A VPC Gateway Endpoint (for S3 and DynamoDB specifically) routes traffic to those services privately within the AWS network, avoiding both the public internet and any NAT Gateway data-processing charges — a common cost-optimization and security pattern.',plain:'A Gateway Endpoint gives private subnets direct, free, private access to S3/DynamoDB — no NAT needed.'},
{id:67,domain:'security',sub:'Networking',q:'Two VPCs in the same AWS region, owned by the same account, need private IP connectivity to each other without routing through the public internet. What should be created?',opts:['A NAT Gateway in each VPC','A VPC Peering connection between the two VPCs, with routes added in each route table', 'A public Elastic Load Balancer shared by both VPCs', 'Two separate Internet Gateways'],ans:1,exp:'VPC Peering establishes a private, non-transitive network connection between two VPCs (same or different accounts/regions), letting resources communicate using private IPs as if on the same network, after configuring routes in each VPC\'s route tables and adjusting security groups/NACLs.',plain:'VPC Peering connects two VPCs privately; remember to add routes on both sides.'},
{id:68,domain:'security',sub:'WAF',q:'A public web application behind CloudFront and API Gateway is being targeted by SQL injection attempts and a flood of requests from a small set of IP addresses. What service filters malicious requests at the edge before they reach the application?',opts:['AWS Shield Advanced only, since WAF cannot inspect request content','AWS WAF with managed rule groups (e.g. SQL injection protection) and rate-based rules', 'A NACL rule blocking all inbound traffic', 'Amazon GuardDuty, which blocks traffic automatically'],ans:1,exp:'AWS WAF inspects HTTP(S) requests against configurable rules — including AWS Managed Rules for common attack patterns like SQL injection/XSS, and rate-based rules that automatically block IPs exceeding a request threshold — and can be attached to CloudFront, API Gateway, and ALB. GuardDuty is a threat-detection service that generates findings; it doesn\'t block traffic on its own.',plain:'WAF inspects and filters malicious HTTP requests (SQLi, rate limits) at the edge; GuardDuty only detects and alerts.'},
{id:69,domain:'security',sub:'Encryption',q:'Data must be encrypted in transit between a client and an API Gateway endpoint. What is the standard mechanism, and is it on by default for the default execute-api endpoint?',opts:['TLS/HTTPS, and yes it is enforced by default on the default API Gateway domain', 'Plaintext HTTP by default, TLS must be manually enabled', 'IPsec VPN, configured separately', 'Client-side encryption of the request body only'],ans:0,exp:'API Gateway\'s default execute-api endpoint only accepts HTTPS (TLS) — there is no way to call it over plain HTTP — so encryption in transit is enforced by default without extra configuration. Custom domains still require an ACM certificate to be attached to support HTTPS on that domain.',plain:'API Gateway\'s default endpoint is HTTPS-only, out of the box.'},
{id:70,domain:'security',sub:'Encryption',q:'A company must ensure that all new objects written to an S3 bucket are automatically encrypted at rest, even if the uploading application forgets to specify encryption on the PutObject call. What should be configured?',opts:['A bucket policy that denies PutObject unless it is over HTTPS only','Default encryption (SSE-S3 or SSE-KMS) enabled on the bucket, so unencrypted PutObject requests are automatically encrypted server-side', 'A Lambda function triggered after upload to re-encrypt objects', 'IAM policies alone, since encryption cannot be enforced at the bucket level'],ans:1,exp:'S3 bucket default encryption applies a specified encryption setting (SSE-S3 or SSE-KMS) to every new object automatically, even when the PUT request itself doesn\'t specify encryption headers — removing reliance on every calling application remembering to set them.',plain:'Bucket default encryption auto-encrypts every new object, even if the uploader forgot to ask for it.'},
{id:71,domain:'security',sub:'IAM',q:'A developer wants to test what a specific IAM policy would actually allow or deny for a given action and resource before attaching it to a role, without making a real API call. What tool should be used?',opts:['CloudTrail Insights','The IAM Policy Simulator', 'AWS Trusted Advisor', 'AWS Config Rules'],ans:1,exp:'The IAM Policy Simulator lets you test the effect of existing or draft IAM policies against specific actions and resources, showing whether the request would be allowed or denied and why — without needing to actually invoke the API.',plain:'The IAM Policy Simulator lets you dry-run policy decisions before attaching a policy for real.'},
{id:72,domain:'security',sub:'IAM',q:'A Lambda function\'s execution role trust policy has no statement allowing lambda.amazonaws.com as a principal. What will happen when Lambda tries to invoke the function using that role?',opts:['The function will run normally since trust policies only affect cross-account access','Lambda will be unable to assume the role, and function invocation will fail with a permissions error', 'The function will run with reduced permissions instead of failing', 'IAM will automatically add the missing trust statement'],ans:1,exp:'The trust policy (AssumeRolePolicyDocument) on an execution role determines which principal (here, the Lambda service itself) is allowed to assume that role. Without lambda.amazonaws.com listed as a trusted principal, Lambda cannot assume the role at all, and the function cannot execute — this is a required part of every Lambda execution role.',plain:'Without lambda.amazonaws.com in the trust policy, Lambda can\'t assume the role and the function fails.'},
{id:73,domain:'security',sub:'Auditing',q:'A security team needs a complete, immutable record of every API call made in an AWS account — who made it, when, from what IP, and whether it succeeded — for compliance and forensic investigation.',opts:['Amazon CloudWatch Metrics','AWS CloudTrail', 'AWS Config', 'VPC Flow Logs'],ans:1,exp:'CloudTrail records API activity across AWS services as events, including caller identity, timestamp, source IP, request parameters, and response elements, and can deliver logs to S3 for long-term, tamper-evident storage — the standard tool for auditing "who did what, when."',plain:'CloudTrail is the API call audit log: who did what, when, from where.'},
{id:74,domain:'security',sub:'Auditing',q:'A security team wants continuous evaluation of whether AWS resources comply with organizational rules (e.g. "no S3 bucket should be publicly readable") and to be notified automatically when a resource drifts out of compliance.',opts:['AWS CloudTrail','AWS Config with managed or custom Config Rules', 'Amazon Inspector', 'AWS Trusted Advisor only'],ans:1,exp:'AWS Config continuously records resource configuration state and evaluates it against Config Rules (managed or custom), flagging non-compliant resources and optionally triggering remediation — purpose-built for continuous compliance monitoring, unlike CloudTrail which is an activity log rather than a configuration-state evaluator.',plain:'AWS Config continuously checks resource configuration against rules and flags drift/non-compliance.'},
{id:75,domain:'security',sub:'GuardDuty',q:'A security team wants automated, ML-based threat detection across an AWS account — flagging things like API calls from known-malicious IPs, unusual API activity, or compromised credentials — without deploying any agents.',opts:['AWS WAF','Amazon GuardDuty, which analyzes CloudTrail, VPC Flow Logs, and DNS logs', 'AWS Shield Standard', 'Amazon Macie only'],ans:1,exp:'GuardDuty is a managed threat-detection service that continuously analyzes CloudTrail management/data events, VPC Flow Logs, and DNS logs (with no agents to deploy) using threat intelligence and anomaly detection, generating findings for things like compromised credentials, reconnaissance, or communication with known-malicious IPs.',plain:'GuardDuty is agentless, ML-based threat detection across CloudTrail/VPC Flow Logs/DNS.'},
{id:76,domain:'security',sub:'Macie',q:'A company stores customer data in S3 and needs automated discovery of sensitive data like PII (social security numbers, credit card numbers) across many buckets, without manually inspecting every object.',opts:['Amazon Macie','AWS Config', 'Amazon Inspector', 'AWS Firewall Manager'],ans:0,exp:'Macie uses machine learning and pattern matching to automatically discover, classify, and report on sensitive data (PII, credentials, financial data) stored in S3, generating findings that highlight buckets/objects containing sensitive content.',plain:'Macie automatically discovers and classifies sensitive data like PII in S3.'},
{id:77,domain:'security',sub:'IAM',q:'A company wants developers to be able to assume an elevated "deploy" role only when they have recently authenticated with MFA, to reduce risk if their long-term credentials are compromised.',opts:['This cannot be enforced in IAM','Add a Condition using the aws:MultiFactorAuthPresent condition key to the role\'s trust policy or the sts:AssumeRole permission', 'Require MFA only on the AWS root account', 'Use a permissions boundary instead of a condition'],ans:1,exp:'IAM supports the aws:MultiFactorAuthPresent condition key, which can be required in a policy (identity policy allowing AssumeRole, or the role\'s trust policy) so that assuming the role — or performing a specific action — is only permitted when the caller\'s session was authenticated with MFA.',plain:'Use the aws:MultiFactorAuthPresent condition key to require MFA before allowing a sensitive action/role.'},
{id:78,domain:'security',sub:'S3',q:'A public-facing website needs to serve S3-hosted assets through CloudFront, but the S3 bucket itself must remain fully private with no public access, and CloudFront should be the only entity allowed to read from it.',opts:['Make the bucket public and rely on CloudFront caching alone','Use an Origin Access Control (OAC) and a bucket policy that only allows the specific CloudFront distribution to read the bucket', 'Grant public read access only to image files', 'Use a NACL to restrict bucket access'],ans:1,exp:'Origin Access Control (the modern replacement for Origin Access Identity) lets CloudFront authenticate its requests to the S3 origin using SigV4, and the bucket policy is scoped to allow GetObject only from that specific CloudFront distribution — keeping the bucket private to everyone except CloudFront.',plain:'OAC + a scoped bucket policy lets only CloudFront read a fully private S3 bucket.'},
{id:79,domain:'security',sub:'Certificate Manager',q:'A team needs a free, auto-renewing TLS certificate to use with a CloudFront distribution and an Application Load Balancer serving a custom domain. What should they provision it with?',opts:['A self-signed certificate uploaded to IAM','AWS Certificate Manager (ACM), requesting a public certificate for the domain', 'AWS Secrets Manager', 'Manually purchasing a certificate from a third-party CA and uploading it every year'],ans:1,exp:'ACM issues free public TLS certificates for use with integrated services like CloudFront, ALB, and API Gateway custom domains, and automatically renews them before expiration as long as domain validation stays in place — removing the manual renewal burden of a third-party certificate.',plain:'ACM gives free, auto-renewing TLS certs for CloudFront/ALB/API Gateway.'},
{id:80,domain:'security',sub:'IAM',q:'A developer accidentally leaked an IAM user\'s long-term access key in a public forum post. Beyond rotating the key, what is a good preventive control to reduce future risk from long-term credentials in general?',opts:['Rely solely on strong passwords for the IAM user','Prefer IAM roles with temporary credentials over long-term IAM user access keys wherever possible, and use access key age/rotation policies where keys are unavoidable', 'Disable CloudTrail to reduce the audit surface', 'Grant the user AdministratorAccess so at least all actions are logged'],ans:1,exp:'The best long-term mitigation is architectural: prefer roles (temporary, auto-rotated credentials) over IAM users with static long-term keys wherever the workload allows it (EC2/Lambda/ECS roles, federation for humans). Where long-term keys are unavoidable, enforce rotation policies and monitor key age via IAM credential reports.',plain:'Prefer roles with temporary credentials over long-term access keys; rotate keys where they\'re unavoidable.'},
{id:81,domain:'security',sub:'Cognito',q:'A Cognito Identity Pool must give authenticated users read/write access only to a folder in S3 named after their own Cognito identity ID, and no access to other users\' folders. How is this enforced?',opts:['A bucket policy alone, since Identity Pools cannot use IAM policy variables','An IAM role attached to authenticated identities, with a policy using the ${cognito-identity.amazonaws.com:sub} policy variable scoped to each user\'s own S3 prefix', 'Cognito automatically isolates every user\'s data with no IAM configuration needed', 'A separate S3 bucket must be created per user'],ans:1,exp:'IAM policies attached to the Identity Pool\'s authenticated role can use policy variables like ${cognito-identity.amazonaws.com:sub} (the caller\'s unique identity ID) inside a resource ARN, so a single shared policy dynamically scopes each user to only their own S3 prefix at evaluation time.',plain:'A policy variable like ${cognito-identity.amazonaws.com:sub} scopes one shared role to each user\'s own S3 prefix.'},
{id:82,domain:'security',sub:'Networking',q:'A company\'s compliance policy requires that EC2 instances in a specific subnet never have direct routes to the internet, even accidentally, regardless of what security group rules are applied later.',opts:['Rely on security groups only, since they are the final authority','Place those instances in a private subnet with no route to an Internet Gateway or NAT Gateway in its route table', 'Disable all security group rules', 'Use a NACL with only inbound deny rules'],ans:1,exp:'Whether a subnet can reach the internet is determined by its route table, not security groups — a subnet with no route to an Internet Gateway (or NAT Gateway) simply cannot route traffic to the public internet regardless of how permissive the security group is, making this the reliable way to guarantee isolation.',plain:'Internet reachability is a route-table property, not a security-group property — route table controls it.'},
{id:83,domain:'security',sub:'Shield',q:'A company running a public web application on CloudFront and ALB wants proactive, automatic protection against large-scale DDoS attacks, without deploying anything themselves.',opts:['AWS Shield Standard, automatically included at no extra cost for all AWS customers using CloudFront/Route 53','A custom-built rate limiter in application code only', 'AWS Config', 'Amazon Macie'],ans:0,exp:'AWS Shield Standard is automatically enabled for all AWS customers at no additional cost and provides protection against common, most frequently occurring network and transport layer DDoS attacks, especially effective when combined with CloudFront and Route 53. Shield Advanced adds more advanced, paid protections and DDoS cost protection.',plain:'Shield Standard is free, automatic, always-on DDoS protection for every AWS customer.'},
{id:84,domain:'security',sub:'IAM',q:'A cross-account role\'s trust policy needs to restrict which specific external account and even which specific role in that account can assume it, rather than trusting the entire external account broadly.',opts:['Trust policies can only specify an account ID, never a specific role','Specify the exact IAM role ARN as the Principal in the trust policy instead of the account root', 'Use a resource-based policy on IAM itself', 'This level of restriction is not possible in IAM'],ans:1,exp:'A trust policy\'s Principal can name a specific IAM role ARN (arn:aws:iam::123456789012:role/SpecificRole) rather than the broader account root (arn:aws:iam::123456789012:root), tightly scoping exactly which identity in the external account is allowed to assume the role.',plain:'Name the exact role ARN as Principal to scope trust tighter than the whole external account.'},
{id:85,domain:'security',sub:'Data protection',q:'An application must ensure that data written to an EBS volume and its snapshots is always encrypted, even if a developer forgets to check the "encrypt this volume" box when launching a new instance.',opts:['This cannot be enforced account-wide','Enable EBS encryption by default at the account/region level, so every new volume and snapshot is automatically encrypted', 'Manually encrypt each volume after creation', 'Rely on IAM policies to require encryption'],ans:1,exp:'EBS encryption by default is a per-region account setting that, once enabled, automatically encrypts all newly created EBS volumes and snapshots in that region without depending on the person launching the instance to remember to opt in.',plain:'Enable "EBS encryption by default" per region so every new volume is auto-encrypted with no opt-in needed.'},
