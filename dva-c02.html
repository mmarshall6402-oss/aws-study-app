// ── Quiz ──────────────────────────────────────────────────────────────────────
function Quiz({onAnswer,startDomain,quizHistory,examHistory,flashConf,skillMap,onSessionComplete}){
  const[domain,setDomain]=useState(startDomain||'all');
  const[session,setSession]=useState(null);
  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[showExp,setShowExp]=useState(false);
  const[sessionResults,setSessionResults]=useState([]);
  const[recalled,setRecalled]=useState(false);
  const[timer,setTimer]=useState(30);
  const[typed,setTyped]=useState('');

  const sessionIdRef=useRef(null);
  const preReadinessRef=useRef(null);

  useEffect(()=>{
    if(!session||session==='done'||recalled||selected!==null)return;
    setTimer(30);
    const iv=setInterval(()=>setTimer(t=>{if(t<=1){clearInterval(iv);setRecalled(true);return 0;}return t-1;}),1000);
    return()=>clearInterval(iv);
  },[idx,recalled,session,selected]);

  // Snapshot readiness when session completes
  useEffect(()=>{
    if(session!=='done'||!onSessionComplete)return;
    const postR=calcReadiness(quizHistory||[],examHistory||[],flashConf||[]);
    onSessionComplete({date:today(),ts:Date.now(),total:postR.total,byDomain:postR.byDomain,preTotal:preReadinessRef.current});
  },[session]);

  const startQuiz=()=>{
    sessionIdRef.current='q_'+Date.now();
    // Capture readiness before this session's answers land
    preReadinessRef.current=calcReadiness(quizHistory||[],examHistory||[],flashConf||[]).total;
    // Adaptive pool: weight toward unseen + wrong questions
    const rawPool=domain==='all'?QUESTIONS:QUESTIONS.filter(q=>q.domain===domain);
    const sm=skillMap||{};
    const scored=rawPool.map(q=>{
      const sk=sm[q.id];
      if(!sk||!sk.lastSeen)return{q,score:50};
      return{q,score:(sk.wrong||0)*3-(sk.correct||0)*1.5};
    }).sort((a,b)=>b.score-a.score);
    const top=scored.slice(0,Math.min(20,scored.length)).map(x=>x.q);
    setSession(shuffle(top).slice(0,10));
    setIdx(0);setSelected(null);setShowExp(false);setSessionResults([]);setRecalled(false);setTimer(30);setTyped('');
  };

  const isCorrectOpt=(q,i)=>Array.isArray(q.ans)?q.ans.includes(i):i===q.ans;
  const correctLabel=(q)=>Array.isArray(q.ans)?q.ans.map(i=>q.opts[i]).join(' / '):q.opts[q.ans];

  const handleSelect=(i)=>{
    if(selected!==null)return;
    setSelected(i);setShowExp(true);
    const q=session[idx];
    const correct=isCorrectOpt(q,i);
    onAnswer({domain:q.domain,sub:q.sub,correct,qid:q.id,ts:Date.now(),sessionId:sessionIdRef.current,userAns:i});
    setSessionResults(r=>[...r,{correct,dontKnow:false,domain:q.domain,sub:q.sub,qtext:q.q,ans:correctLabel(q)}]);
  };

  const handleDontKnow=()=>{
    if(selected!==null)return;
    setSelected('dk');setShowExp(true);setRecalled(true);
    const q=session[idx];
    onAnswer({domain:q.domain,sub:q.sub,correct:false,dontKnow:true,qid:q.id,ts:Date.now(),sessionId:sessionIdRef.current,userAns:'dk'});
    setSessionResults(r=>[...r,{correct:false,dontKnow:true,domain:q.domain,sub:q.sub,qtext:q.q,ans:correctLabel(q)}]);
  };

  const next=()=>{
    if(idx<session.length-1){setIdx(i=>i+1);setSelected(null);setShowExp(false);setRecalled(false);setTimer(30);setTyped('');}
    else setSession('done');
  };

  const domainAccent={all:'#7c3aed',dev:'#22c55e',security:'#38bdf8',deploy:'#f59e0b',troubleshoot:'#a78bfa'};

  if(!session){
    return(
      <div style={{padding:'24px',maxWidth:580}}>
        <h1 style={{fontSize:20,fontWeight:800,color:'#f4f4f5',marginBottom:4,letterSpacing:'-0.01em'}}>Practice Quiz</h1>
        <p style={{fontSize:12,color:'#52525b',marginBottom:20}}>10 randomized questions · type your recall first</p>
        <div style={{background:'#111113',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:20}}>
          <div style={{fontSize:11,fontWeight:700,color:'#52525b',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12}}>Focus domain</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:20}}>
            {[{id:'all',label:'All Domains'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label}))].map(d=>{
              const on=domain===d.id;
              const acc=domainAccent[d.id];
              return(
                <button key={d.id} onClick={()=>setDomain(d.id)}
                  style={{padding:'8px 10px',borderRadius:6,border:`1px solid ${on?acc+'66':'rgba(255,255,255,0.07)'}`,background:on?acc+'11':'transparent',color:on?acc:'#52525b',fontSize:12,fontWeight:on?600:400,cursor:'pointer',transition:'all .12s'}}>
                  {d.label}
                </button>
              );
            })}
          </div>
          <button onClick={startQuiz} style={{background:'#7c3aed',color:'white',border:'none',borderRadius:8,padding:'11px 28px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            Start Quiz →
          </button>
        </div>
      </div>
    );
  }

  if(session==='done'){
    const correct=sessionResults.filter(r=>r.correct).length;
    const missed=sessionResults.filter(r=>!r.correct);
    const bySubtopic={};
    missed.forEach(r=>{
      const key=`${r.sub}||${r.domain}`;
      if(!bySubtopic[key])bySubtopic[key]={sub:r.sub,domain:r.domain,items:[]};
      bySubtopic[key].items.push(r);
    });
    const acc=correct>=7?'#22c55e':correct>=5?'#f59e0b':'#ef4444';
    const dAcc={dev:'#22c55e',security:'#38bdf8',deploy:'#f59e0b',troubleshoot:'#a78bfa'};
    const postR=calcReadiness(quizHistory||[],examHistory||[],flashConf||[]);
    const preTotal=preReadinessRef.current;
    const rDelta=preTotal!==null?postR.total-preTotal:null;
    const toPass=Math.max(0,72-postR.total);
    return(
      <div style={{padding:'24px',maxWidth:580}}>
        <h1 style={{fontSize:20,fontWeight:800,color:'#f4f4f5',marginBottom:16,letterSpacing:'-0.01em'}}>Results</h1>
        <div style={{background:'#111113',border:`1px solid ${acc}33`,borderRadius:10,padding:24,marginBottom:12,textAlign:'center'}}>
          <div style={{fontSize:52,fontWeight:900,color:acc,letterSpacing:'-0.04em',lineHeight:1}}>{correct}/10</div>
          <div style={{fontSize:13,color:acc,fontWeight:600,marginTop:6,marginBottom:12}}>{pct(correct,10)}% · {correct>=7?'Great work!':correct>=5?'Getting there':'Keep studying'}</div>
          {rDelta!==null&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:14,padding:'10px 16px',background:'rgba(255,255,255,0.03)',borderRadius:6,flexWrap:'wrap'}}>
              <span style={{fontSize:10,color:'#52525b',fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>Exam Readiness</span>
              <span style={{fontSize:13,fontWeight:800,color:'#71717a'}}>{preTotal}%</span>
              <span style={{fontSize:11,color:'#3f3f46'}}>→</span>
              <span style={{fontSize:13,fontWeight:800,color:postR.total>=(preTotal||0)?'#22c55e':'#ef4444'}}>{postR.total}%</span>
              <span style={{fontSize:11,fontWeight:700,color:rDelta>0?'#22c55e':rDelta<0?'#ef4444':'#52525b'}}>
                {rDelta>0?`+${rDelta}%`:rDelta<0?`${rDelta}%`:'no change'}
              </span>
              <span style={{fontSize:10,color:'#3f3f46'}}>·</span>
              <span style={{fontSize:10,color:toPass===0?'#22c55e':'#52525b',fontWeight:600}}>
                {toPass===0?'Goal reached! ✓':`${toPass}% to pass (72% goal)`}
              </span>
            </div>
          )}
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:8,marginBottom:18}}>
            {Object.keys(DOMAINS).map(d=>{
              const dr=sessionResults.filter(r=>r.domain===d);
              if(!dr.length)return null;
              const sc=dr.filter(r=>r.correct).length;
              return<div key={d} style={{fontSize:11,padding:'3px 10px',borderRadius:4,background:dAcc[d]+'18',color:dAcc[d],fontWeight:600}}>
                {DOMAINS[d].label}: {sc}/{dr.length}
              </div>;
            })}
          </div>
          <button onClick={()=>{setSession(null);setDomain('all');}}
            style={{background:'none',border:'1px solid rgba(255,255,255,0.12)',borderRadius:6,padding:'7px 18px',color:'#d4d4d8',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            New Quiz
          </button>
        </div>

        {missed.length>0&&(
          <div style={{background:'#111113',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:20}}>
            <div style={{fontSize:13,fontWeight:700,color:'#f4f4f5',marginBottom:2}}>Review List</div>
            <div style={{fontSize:11,color:'#52525b',marginBottom:16}}>{missed.length} topic{missed.length!==1?'s':''} to revisit</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {Object.values(bySubtopic).map((group,i)=>{
                const a=dAcc[group.domain];
                return(
                  <div key={i} style={{borderLeft:`2px solid ${a}`,paddingLeft:12}}>
                    <div style={{fontSize:11,color:a,fontWeight:700,marginBottom:6}}>{group.sub} <span style={{color:'#52525b',fontWeight:400}}>· {DOMAINS[group.domain].label}</span></div>
                    {group.items.map((r,j)=>(
                      <div key={j} style={{marginBottom:6}}>
                        <div style={{fontSize:11,color:'#71717a',lineHeight:1.5}}>{r.qtext}</div>
                        <div style={{fontSize:11,color:a,fontWeight:600,marginTop:2}}>→ {r.ans}</div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  const q=session[idx];
  const d=DOMAINS[q.domain];
  const dAccent={dev:'#22c55e',security:'#38bdf8',deploy:'#f59e0b',troubleshoot:'#a78bfa'}[q.domain];

  return(
    <div style={{padding:'24px',maxWidth:580}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div>
          <div style={{fontSize:10,color:'#3f3f46',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:3}}>{d.label} · {q.sub}</div>
          <div style={{fontSize:16,fontWeight:800,color:'#f4f4f5'}}>Question {idx+1} <span style={{color:'#3f3f46',fontWeight:400}}>/ {session.length}</span></div>
        </div>
        {!recalled&&selected===null&&(
          <div style={{width:40,height:40,borderRadius:'50%',border:`1.5px solid ${timer<=10?'#ef4444':dAccent}`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:timer<=10?'#ef4444':dAccent}}>{timer}</div>
        )}
      </div>
      <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2,marginBottom:20}}>
        <div style={{height:3,width:`${((idx+1)/session.length)*100}%`,background:dAccent,borderRadius:2,transition:'width .3s'}}/>
      </div>
      <div style={{background:'#111113',borderLeft:`3px solid ${dAccent}`,border:'1px solid rgba(255,255,255,0.07)',borderRadius:8,padding:20,marginBottom:14}}>
        <p style={{fontSize:14,color:'#e4e4e7',lineHeight:1.7,fontWeight:500}}>{q.q}</p>
      </div>
      {!recalled&&selected===null?(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{background:'rgba(124,58,237,0.08)',border:'1px solid rgba(124,58,237,0.2)',borderRadius:8,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{color:'#a78bfa',fontSize:14}}>✏</span>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#a78bfa',marginBottom:2}}>Write your answer first</div>
              <div style={{fontSize:11,color:'#6d6d9a'}}>Commit something before you see the options — even a few words.</div>
            </div>
          </div>
          <textarea
            value={typed}
            onChange={e=>setTyped(e.target.value)}
            placeholder="Type your answer here..."
            rows={3}
            autoFocus
            style={{width:'100%',background:'#0c0c0e',border:'1px solid rgba(255,255,255,0.09)',borderRadius:8,padding:'12px 14px',fontSize:13,color:'#e4e4e7',resize:'none',lineHeight:1.6}}
          />
          <button
            onClick={()=>setRecalled(true)}
            disabled={typed.trim().length===0}
            style={{width:'100%',padding:'13px 0',borderRadius:8,border:'none',fontSize:13,fontWeight:700,cursor:typed.trim().length>0?'pointer':'not-allowed',background:typed.trim().length>0?'#7c3aed':'rgba(255,255,255,0.05)',color:typed.trim().length>0?'white':'#3f3f46',transition:'background .15s'}}>
            Reveal Options →
          </button>
          <button onClick={handleDontKnow}
            style={{width:'100%',padding:'10px 0',borderRadius:8,border:'1px dashed rgba(255,255,255,0.1)',background:'none',fontSize:12,color:'#52525b',cursor:'pointer'}}>
            I don't know this one
          </button>
        </div>
      ):(
        <>
          {typed&&selected===null&&(
            <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:8,padding:'8px 14px',marginBottom:10,display:'flex',gap:10,alignItems:'flex-start'}}>
              <span style={{fontSize:10,fontWeight:700,color:'#3f3f46',textTransform:'uppercase',letterSpacing:'0.08em',whiteSpace:'nowrap',marginTop:2}}>Your recall</span>
              <span style={{fontSize:12,color:'#71717a',fontStyle:'italic',lineHeight:1.5}}>{typed}</span>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
            {q.opts.map((opt,i)=>{
              let borderColor='rgba(255,255,255,0.07)';
              let bg='#111113';
              let textColor='#d4d4d8';
              let letterBg='rgba(255,255,255,0.06)';
              let letterColor='#71717a';
              if(selected!==null){
                if(isCorrectOpt(q,i)){borderColor='#22c55e';bg='rgba(34,197,94,0.06)';textColor='#86efac';letterBg='#22c55e';letterColor='#fff';}
                else if(i===selected&&!isCorrectOpt(q,i)&&selected!=='dk'){borderColor='#ef4444';bg='rgba(239,68,68,0.06)';textColor='#fca5a5';letterBg='#ef4444';letterColor='#fff';}
                else{borderColor='rgba(255,255,255,0.04)';textColor='#3f3f46';letterColor='#3f3f46';}
              }
              return(
                <button key={i} onClick={()=>handleSelect(i)}
                  style={{width:'100%',textAlign:'left',padding:'11px 14px',borderRadius:8,border:`1px solid ${borderColor}`,background:bg,cursor:'pointer',display:'flex',alignItems:'flex-start',gap:0,transition:'all .12s'}}>
                  <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:22,borderRadius:'50%',background:letterBg,color:letterColor,fontSize:10,fontWeight:700,flexShrink:0,marginRight:12}}>{String.fromCharCode(65+i)}</span>
                  <span style={{fontSize:13,color:textColor,lineHeight:1.55,flex:1}}>{opt}</span>
                </button>
              );
            })}
          </div>
          {selected===null&&(
            <button onClick={handleDontKnow}
              style={{width:'100%',padding:'9px 0',borderRadius:8,border:'1px dashed rgba(255,255,255,0.08)',background:'none',fontSize:12,color:'#3f3f46',cursor:'pointer',marginBottom:12}}>
              I don't know this one
            </button>
          )}
          {showExp&&(
            <div style={{background:selected==='dk'?'rgba(245,158,11,0.07)':'rgba(124,58,237,0.07)',border:`1px solid ${selected==='dk'?'rgba(245,158,11,0.2)':'rgba(124,58,237,0.2)'}`,borderRadius:8,padding:'14px 16px',marginBottom:12}}>
              {selected==='dk'&&<div style={{fontSize:11,fontWeight:700,color:'#fbbf24',marginBottom:6}}>✓ Correct: {correctLabel(q)}</div>}
              <div style={{fontSize:10,fontWeight:700,color:selected==='dk'?'#d97706':'#a78bfa',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:6}}>Explanation</div>
              <p style={{fontSize:12,color:'#a1a1aa',lineHeight:1.65}}>{q.exp}</p>
            </div>
          )}
          {selected!==null&&(
            <button onClick={next} style={{background:'#7c3aed',color:'white',border:'none',borderRadius:8,padding:'11px 22px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              {idx<session.length-1?'Next Question →':'View Results'}
            </button>
          )}
        </>
      )}
    </div>
  );
}

// ── Gap Assessment ────────────────────────────────────────────────────────────
function GapAssessment({onAnswer,setActive,startTargeted,setGapReport}){
  const[session]=useState(()=>{
    const byDomain=Object.keys(DOMAINS).map(d=>shuffle(QUESTIONS.filter(q=>q.domain===d)).slice(0,4));
    return shuffle(byDomain.flat()).slice(0,15);
  });
  const[idx,setIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[results,setResults]=useState([]);
  const[phase,setPhase]=useState('quiz');
  const[loadStep,setLoadStep]=useState(0);
  const sessionIdRef=useRef('gap_'+Date.now());

  useEffect(()=>{
    if(phase!=='report'||!setGapReport)return;
    const dWeights={dev:0.32,security:0.26,deploy:0.24,troubleshoot:0.18};
    const ds={};
    Object.keys(DOMAINS).forEach(d=>{
      const dr=results.filter(r=>r.domain===d);
      ds[d]=dr.length>0?Math.round(dr.filter(r=>r.correct).length/dr.length*100):null;
    });
    const total=Math.round(Object.entries(dWeights).reduce((s,[d,w])=>{const v=ds[d];return v!==null?s+v*w:s},0));
    const sorted=Object.entries(ds).filter(([,v])=>v!==null).sort(([,a],[,b])=>a-b);
    setGapReport({ts:Date.now(),date:today(),domainScores:ds,totalScore:total,isReady:total>=70,worst:sorted[0]||null,secondWorst:sorted[1]||null});
  },[phase]);

  const q=session[idx];
  const isCorrect=(i)=>Array.isArray(q?.ans)?q.ans.includes(i):i===q?.ans;

  const handleSelect=(i)=>{
    if(selected!==null)return;
    setSelected(i);
    const correct=isCorrect(i);
    onAnswer({domain:q.domain,sub:q.sub,correct,qid:q.id,ts:Date.now(),sessionId:sessionIdRef.current,userAns:i});
    setResults(r=>[...r,{domain:q.domain,correct}]);
  };

  const handleDK=()=>{
    if(selected!==null)return;
    setSelected('dk');
    onAnswer({domain:q.domain,sub:q.sub,correct:false,dontKnow:true,qid:q.id,ts:Date.now(),sessionId:sessionIdRef.current,userAns:'dk'});
    setResults(r=>[...r,{domain:q.domain,correct:false}]);
  };

  const handleNext=()=>{
    if(idx<session.length-1){setIdx(i=>i+1);setSelected(null);}
    else{
      setPhase('loading');
      [0,1,2,3,4,5].forEach((s,i)=>setTimeout(()=>setLoadStep(s),i*600+200));
      setTimeout(()=>setPhase('report'),6*600+600);
    }
  };

  if(phase==='loading'){
    const steps=['Scoring '+session.length+' answers','Mapping 4 domains','Weighting your exam blueprint','Reading your confidence','Identifying top gaps','Compiling report'];
    return(
      <div className="flex items-center justify-center min-h-[70vh] p-6">
        <div className="max-w-xs w-full">
          <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 text-center">BUILDING</div>
          <h2 className="text-2xl font-bold text-slate-900 mb-1 text-center">Preparing your <span className="text-indigo-600 italic">gap report.</span></h2>
          <p className="text-slate-400 text-sm mb-6 text-center">A few seconds.</p>
          <div className="w-full bg-slate-100 rounded-full h-1.5 mb-6 overflow-hidden">
            <div className="bg-indigo-600 h-1.5 rounded-full transition-all duration-500" style={{width:`${Math.round((loadStep/steps.length)*100)}%`}}/>
          </div>
          <div className="space-y-3">
            {steps.map((s,i)=>(
              <div key={i} className="flex items-center gap-3">
                <div className={`w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-bold transition-all ${i<loadStep?'bg-indigo-600 text-white':i===loadStep?'border-2 border-indigo-400':' border-2 border-slate-200'}`}>
                  {i<loadStep?'✓':''}
                </div>
                <span className={`text-sm transition-colors ${i<loadStep?'text-slate-800 font-medium':i===loadStep?'text-indigo-600':'text-slate-300'}`}>{s}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(phase==='report'){
    const dWeights={dev:0.32,security:0.26,deploy:0.24,troubleshoot:0.18};
    const domainScores={};
    Object.keys(DOMAINS).forEach(d=>{
      const dr=results.filter(r=>r.domain===d);
      domainScores[d]=dr.length>0?Math.round(dr.filter(r=>r.correct).length/dr.length*100):null;
    });
    const totalScore=Math.round(Object.entries(dWeights).reduce((sum,[d,w])=>{
      const s=domainScores[d];return s!==null?sum+s*w:sum;
    },0));
    const passing=70;
    const isReady=totalScore>=passing;
    const sorted=Object.entries(domainScores).filter(([,v])=>v!==null).sort(([,a],[,b])=>a-b);
    const worst=sorted[0];
    const secondWorst=sorted[1];
    return(
      <div className="p-4 md:p-6 max-w-4xl">
        <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-3 mb-5 flex items-center gap-2">
          <span className="text-indigo-500">✓</span>
          <span className="text-indigo-700 text-sm font-medium">You're in. Here's your full gap report.</span>
          <span className="text-indigo-400 text-xs ml-auto hidden sm:block">Fix your top gap when you're ready</span>
        </div>
        <div className="flex flex-col md:flex-row gap-5">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-2">
              <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${isReady?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-600'}`}>● {isReady?'Ready':'Not ready'}</span>
              <span className="text-xs text-slate-400 font-semibold uppercase tracking-wide">Assessment Verdict</span>
            </div>
            <h2 className="text-2xl md:text-3xl font-bold text-slate-900 mb-2 leading-tight">
              If you sat the exam today,<br/>you'd likely <span className={`italic ${isReady?'text-emerald-600':'text-red-500'}`}>{isReady?'pass.':'not pass.'}</span>
            </h2>
            <p className="text-slate-500 text-sm mb-1">Below is what's dragging your score down, and how to close it.</p>
            <div className="flex items-center gap-3 text-xs text-slate-400 mb-5">
              <span>Based on <strong className="text-slate-600">{session.length} questions</strong></span>
              <span>·</span><span>Exam <strong className="text-slate-600">DVA-C02</strong></span>
            </div>
            {(worst||secondWorst)&&(
              <div className="mb-5">
                <h3 className="text-slate-800 font-bold mb-3 text-sm">What's dragging your score down</h3>
                <div className="grid grid-cols-2 gap-3">
                  {[worst,secondWorst].filter(Boolean).map(([d,s],i)=>(
                    <div key={d} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                      <div className="flex items-center justify-between mb-2">
                        <span className="text-xs font-bold text-slate-400">{i===0?'01 MOST COSTLY':'02 SECOND BIGGEST'}</span>
                        <span className="text-xs font-bold text-red-500 bg-red-50 px-1.5 py-0.5 rounded-full">● Critical</span>
                      </div>
                      <div className="font-semibold text-slate-800 text-sm mb-2">{DOMAINS[d].label}</div>
                      <div className="text-xs text-slate-400 mb-0.5">YOU</div>
                      <div className="text-3xl font-black text-slate-900">{s}%</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                <span className="font-bold text-slate-800 text-sm">Against the exam blueprint</span>
                <span className="text-xs text-slate-400">{Object.keys(DOMAINS).length} domains · passing {passing}%</span>
              </div>
              <div className="px-4 py-2 grid grid-cols-4 text-xs text-slate-400 font-semibold uppercase tracking-wide border-b border-slate-50">
                <span>Domain</span><span>Weight</span><span className="col-span-2">Your Score · Status</span>
              </div>
              {Object.entries(DOMAINS).map(([d,meta])=>{
                const score=domainScores[d];
                const weight=Math.round(dWeights[d]*100);
                const ok=score!==null&&score>=passing;
                return(
                  <div key={d} className="grid grid-cols-4 px-4 py-3 items-center border-b border-slate-50 last:border-0">
                    <span className="text-slate-700 text-sm font-medium">{meta.label}</span>
                    <span className="text-slate-500 text-sm">{weight}%</span>
                    <div className="flex items-center gap-2">
                      <div className="w-14 bg-slate-100 rounded-full h-1.5 hidden sm:block">
                        <div className={`h-1.5 rounded-full ${ok?'bg-emerald-500':'bg-red-400'}`} style={{width:`${score||0}%`}}/>
                      </div>
                      <span className="text-sm font-bold text-slate-700">{score!==null?score+'%':'—'}</span>
                    </div>
                    <span className={`text-xs font-bold px-2 py-0.5 rounded-full w-fit ${ok?'bg-emerald-50 text-emerald-700':'bg-red-50 text-red-600'}`}>
                      ● {score===null?'—':ok?'Good':'Critical'}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="md:w-60 flex-shrink-0 space-y-4">
            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Your Readiness</span>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${isReady?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-600'}`}>● {isReady?'Ready':'Not ready'}</span>
              </div>
              <div className={`text-6xl font-black leading-none mb-1 ${isReady?'text-emerald-500':totalScore>=50?'text-amber-500':'text-red-500'}`}>{totalScore}<span className="text-2xl font-bold text-slate-400">%</span></div>
              <p className="text-slate-500 text-xs mb-4">{passing-totalScore>0?`${passing-totalScore}% short of pass threshold — close your top domain first.`:'You meet the pass threshold!'}</p>
              <div className="relative bg-slate-100 rounded-full h-3 mb-1 overflow-hidden">
                <div className={`absolute inset-y-0 left-0 rounded-full transition-all duration-700 ${isReady?'bg-emerald-500':totalScore>=50?'bg-amber-400':'bg-red-400'}`} style={{width:`${Math.min(totalScore,100)}%`}}/>
                <div className="absolute top-0 bottom-0 w-0.5 bg-white/80" style={{left:`${passing}%`}}/>
              </div>
              <div className="flex justify-between text-[10px] text-slate-400 mb-4"><span>0</span><span>{passing}% pass</span><span>100%</span></div>
              <div className="text-xs text-slate-500 border-t border-slate-100 pt-3 flex justify-between">
                <span>Real exam</span><span className="font-semibold text-slate-700">Pass at 720/1000</span>
              </div>
            </div>
            {worst&&(
              <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
                <div className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Next Step</div>
                <h3 className="font-bold text-slate-800 mb-2">Fix your top gap now</h3>
                <p className="text-slate-500 text-xs mb-4">Your first targeted session focuses on <strong>{DOMAINS[worst[0]].label}</strong> — your weakest domain.</p>
                <button onClick={()=>startTargeted?startTargeted(worst[0]):setActive('quiz')} className="w-full bg-indigo-600 text-white text-sm font-bold py-2.5 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm">
                  Start first session →
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  if(!q)return null;
  const d=DOMAINS[q.domain];
  return(
    <div className="p-4 md:p-6 max-w-2xl">
      <div className="flex items-center justify-between mb-1">
        <div className="text-xs text-slate-400 font-semibold uppercase tracking-widest">{d.label}</div>
        <span className="text-slate-400 text-sm">Question {idx+1} / {session.length}</span>
      </div>
      <ProgressBar value={idx+1} max={session.length} domain={q.domain} className="mb-5"/>
      <div className="bg-white border border-slate-200 rounded-xl p-5 mb-4 shadow-sm">
        <div className="flex items-center gap-2 mb-3"><Tag domain={q.domain}/><span className="text-slate-400 text-xs uppercase tracking-wide">{q.sub}</span></div>
        <p className="text-slate-800 font-medium text-sm leading-relaxed">{q.q}</p>
      </div>
      <div className="space-y-2 mb-3">
        {q.opts.map((opt,i)=>{
          let cls='border-slate-200 bg-white text-slate-700 hover:border-indigo-300 hover:bg-indigo-50/40';
          let lc='bg-slate-100 text-slate-500';
          if(selected!==null){
            if(isCorrect(i)){cls='border-emerald-400 bg-emerald-50 text-emerald-800';lc='bg-emerald-400 text-white';}
            else if(i===selected){cls='border-red-400 bg-red-50 text-red-700';lc='bg-red-400 text-white';}
            else{cls='border-slate-100 bg-slate-50 text-slate-400';lc='bg-slate-200 text-slate-400';}
          }
          return(
            <button key={i} onClick={()=>handleSelect(i)} className={`w-full text-left text-sm px-3 py-3 rounded-lg border-2 transition-all flex items-start ${cls}`}>
              <span className={`opt-letter ${lc}`}>{String.fromCharCode(65+i)}</span>
              <span className="flex-1 leading-snug pt-0.5">{opt}</span>
            </button>
          );
        })}
      </div>
      {selected===null&&(
        <button onClick={handleDK} className="w-full text-sm px-4 py-2.5 rounded-lg border-2 border-dashed border-slate-200 text-slate-400 hover:border-slate-300 hover:bg-slate-50 transition-colors mb-4">
          I do not know
        </button>
      )}
      {selected!==null&&(
        <button onClick={handleNext} className="bg-indigo-600 text-white text-sm font-bold px-6 py-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm">
          {idx<session.length-1?'Submit answer →':'View Gap Report →'}
        </button>
      )}
    </div>
  );
}

// ── Flashcards ────────────────────────────────────────────────────────────────
const VOCAB_CAT_DOMAIN={Compute:'dev',Storage:'dev',Database:'dev',Messaging:'dev',Networking:'security',Security:'security',DevOps:'deploy',Monitoring:'troubleshoot',Patterns:'troubleshoot'};

const VOCAB_CARDS=VOCAB.map(v=>({
  id:'v_'+v.term.replace(/\s+/g,'_'),
  domain:VOCAB_CAT_DOMAIN[v.cat]||'deploy',
  source:'vocab',
  front:v.term,
  back:v.def,
  plain:v.plain,
  badge:v.cat,
}));

const QUESTION_CARDS=QUESTIONS.map(q=>{
  const correctIdxs=Array.isArray(q.ans)?q.ans:[q.ans];
  const correctAnswers=correctIdxs.map(i=>q.opts[i]).join(' / ');
  return{
    id:'q_fc_'+q.id,
    domain:q.domain,
    source:'question',
    front:q.q,
    back:`✓ ${correctAnswers}\n\n${q.exp}`,
    plain:q.plain,
    badge:q.sub,
  };
});

const ALL_FLASH=[...FLASHCARDS.map(c=>({...c,source:'concept'})),...VOCAB_CARDS,...QUESTION_CARDS];

function Flashcards({plainMode,setPlainMode}){
  const[conf,setConf]=useStore('flash_conf',[]);
  const[domain,setDomain]=useState('all');
  const[source,setSource]=useState('all');
  const[confFilter,setConfFilter]=useState('all');
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[showAll,setShowAll]=useState(false);
  const[shuffleOn,setShuffleOn]=useState(false);
  const[shuffleSeed,setShuffleSeed]=useState(0);
  const[srMode,setSrMode]=useState(false);

  const todayStr=today();
  const dueToday=useMemo(()=>ALL_FLASH.filter(c=>{
    const cv=conf.find(x=>x.id===c.id);
    return !cv||!cv.nextReview||cv.nextReview<=todayStr;
  }),[conf,todayStr]);

  const cards=useMemo(()=>{
    let c=srMode?dueToday:ALL_FLASH;
    if(!srMode){
      if(source!=='all')c=c.filter(x=>x.source===source);
      if(domain!=='all')c=c.filter(x=>x.domain===domain);
      if(confFilter!=='all'){
        c=c.filter(x=>{
          const cv=conf.find(y=>y.id===x.id);
          return confFilter==='new'?!cv:cv?.conf===confFilter;
        });
      }
    }
    if(shuffleOn)c=shuffle(c);
    return c;
  },[domain,source,confFilter,conf,shuffleOn,shuffleSeed,srMode,dueToday]);

  const toggleShuffle=()=>{
    setShuffleOn(s=>!s);
    setShuffleSeed(s=>s+1);
    setIdx(0);setFlipped(false);
  };
  const reshuffle=()=>{setShuffleSeed(s=>s+1);setIdx(0);setFlipped(false)};

  const card=cards[Math.min(idx,cards.length-1)];
  const cardConf=conf.find(c=>c.id===card?.id);

  const setCardConf=(level)=>{
    const rating=level==='know'?2:level==='sorta'?1:0;
    const prev=conf.find(x=>x.id===card.id)||{};
    const sr=sm2Update(prev,rating);
    setConf(c=>{const filtered=c.filter(x=>x.id!==card.id);return[...filtered,{id:card.id,conf:level,...sr}]});
    if(srMode)setTimeout(()=>go(1),350);
  };

  const go=(dir)=>{setIdx(i=>(i+dir+cards.length)%cards.length);setFlipped(false)};

  const stats=useMemo(()=>({
    know:conf.filter(c=>c.conf==='know').length,
    sorta:conf.filter(c=>c.conf==='sorta').length,
    nope:conf.filter(c=>c.conf==='nope').length,
    new:ALL_FLASH.length-conf.length,
  }),[conf]);

  const setFilter=(f)=>{setConfFilter(c=>c===f?'all':f);setIdx(0);setFlipped(false)};

  const domainColors={dev:'#10b981',security:'#0ea5e9',deploy:'#f59e0b',troubleshoot:'#8b5cf6'};
  const domainBg={dev:'#f0fdf4',security:'#f0f9ff',deploy:'#fffbeb',troubleshoot:'#faf5ff'};
  const domainBorder={dev:'#bbf7d0',security:'#bae6fd',deploy:'#fde68a',troubleshoot:'#e9d5ff'};

  if(showAll){
    return(
      <div className="p-4 md:p-6 max-w-4xl">
        <div className="flex items-center gap-3 mb-4">
          <button onClick={()=>setShowAll(false)} className="text-slate-400 hover:text-slate-600 text-sm">← Back</button>
          <h1 className="text-slate-800 text-xl font-semibold">All Cards ({cards.length})</h1>
        </div>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-2 lg:grid-cols-3">
          {cards.map((c,i)=>{
            const cv=conf.find(x=>x.id===c.id);
            return(
              <div key={c.id} className="bg-white border border-slate-200 rounded-lg p-3 cursor-pointer hover:shadow-sm transition-shadow"
                onClick={()=>{setIdx(i);setShowAll(false);setFlipped(false)}}>
                <div className="flex items-center justify-between mb-1.5">
                  <div className="flex items-center gap-1.5">
                    <span style={{width:8,height:8,borderRadius:'50%',background:domainColors[c.domain],display:'inline-block'}}/>
                    <span className="text-xs text-slate-400">{c.badge||DOMAINS[c.domain]?.label}</span>
                  </div>
                  {cv&&<span className={`text-xs ${cv.conf==='know'?'text-emerald-600':cv.conf==='sorta'?'text-amber-600':'text-red-400'}`}>
                    {cv.conf==='know'?'✓':cv.conf==='sorta'?'~':'✗'}
                  </span>}
                </div>
                <div className="text-slate-700 text-xs leading-snug line-clamp-2">{c.front}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const frontLabel=card?.source==='question'?'QUESTION':card?.source==='vocab'?'TERM':'CONCEPT';

  const pill=(on,color='#7c3aed')=>({
    fontSize:11,padding:'5px 11px',borderRadius:5,border:`1px solid ${on?color+'55':'rgba(255,255,255,0.07)'}`,
    background:on?color+'12':'transparent',color:on?color:'#52525b',cursor:'pointer',fontWeight:on?600:400,
  });

  return(
    <div style={{padding:'24px',maxWidth:580}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <h1 style={{fontSize:18,fontWeight:800,color:'#f4f4f5',letterSpacing:'-0.01em'}}>Flashcards</h1>
        <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
          <PlainToggle on={plainMode} setOn={setPlainMode} dark/>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>{setSrMode(s=>!s);setIdx(0);setFlipped(false)}} style={pill(srMode,'#a78bfa')}>
            📅 SR {srMode?`(${cards.length} due)`:`(${dueToday.length})`}
          </button>
          {!srMode&&<button onClick={shuffleOn?reshuffle:toggleShuffle} style={pill(shuffleOn,'#6366f1')}>
            🔀 {shuffleOn?'Shuffled':'Shuffle'}
          </button>}
          {shuffleOn&&!srMode&&<button onClick={()=>{setShuffleOn(false);setIdx(0);setFlipped(false)}} style={pill(false)}>↺ Order</button>}
          <button onClick={()=>setShowAll(true)} style={pill(false)}>All</button>
          </div>
        </div>
      </div>

      {srMode&&(
        <div style={{background:'rgba(139,92,246,0.07)',border:'1px solid rgba(139,92,246,0.2)',borderRadius:8,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#a78bfa'}}>Spaced Repetition Mode</div>
            <div style={{fontSize:11,color:'#6d6d9a',marginTop:2}}>{dueToday.length} card{dueToday.length!==1?'s':''} due today</div>
          </div>
          <button onClick={()=>{setSrMode(false);setIdx(0);setFlipped(false)}} style={pill(false)}>Exit</button>
        </div>
      )}

      {!srMode&&(
        <>
          <div style={{display:'flex',gap:4,marginBottom:10,background:'rgba(255,255,255,0.04)',padding:4,borderRadius:7,width:'fit-content'}}>
            {[{k:'all',label:`All ${ALL_FLASH.length}`},{k:'concept',label:'Concepts'},{k:'vocab',label:'Vocab'},{k:'question',label:'Questions'}].map(s=>(
              <button key={s.k} onClick={()=>{setSource(s.k);setIdx(0);setFlipped(false)}}
                style={{fontSize:11,padding:'5px 10px',borderRadius:5,border:'none',background:source===s.k?'#1c1c1f':'transparent',color:source===s.k?'#f4f4f5':'#52525b',cursor:'pointer',fontWeight:source===s.k?600:400}}>
                {s.label}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:5,marginBottom:8,flexWrap:'wrap'}}>
            {[{id:'all',label:'All'},...Object.entries(DOMAINS).map(([k,v])=>({id:k,label:v.label}))].map(d=>{
              const a={all:'#7c3aed',dev:'#22c55e',security:'#38bdf8',deploy:'#f59e0b',troubleshoot:'#a78bfa'}[d.id];

}

// ── Practice Exam ─────────────────────────────────────────────────────────────
const examAnswerCorrect=(userAns,qAns)=>{
  if(userAns===undefined||userAns===null)return false;
  if(Array.isArray(qAns)){
    if(!Array.isArray(userAns))return false;
    return qAns.length===userAns.length&&qAns.every(a=>userAns.includes(a));
  }
  return userAns===qAns;
};

function PracticeExam({onExamComplete}){
  const[phase,setPhase]=useState('setup');
  const[questions,setQuestions]=useState([]);
  const[answers,setAnswers]=useState({});
  const[timeLeft,setTimeLeft]=useState(7800);
  const[flagged,setFlagged]=useState(new Set());
  const[qIdx,setQIdx]=useState(0);
  const timerRef=useRef(null);

  const start=()=>{
    const pool=[];
    Object.entries(DOMAINS).forEach(([d,meta])=>{
      const dq=shuffle(QUESTIONS.filter(q=>q.domain===d));
      const n=Math.round(65*meta.pct/100);
      pool.push(...dq.slice(0,n));
    });
    const final=shuffle(pool).slice(0,65);
    setQuestions(final);setAnswers({});setTimeLeft(7800);setFlagged(new Set());setQIdx(0);
    setPhase('exam');
    timerRef.current=setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);setPhase('result');return 0;}return t-1;}),1000);
  };

  const submit=()=>{clearInterval(timerRef.current);setPhase('result');};

  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  useEffect(()=>{
    if(phase==='result'&&questions.length>0){
      const correct=questions.filter((q,i)=>examAnswerCorrect(answers[i],q.ans)).length;
      const score=Math.round(correct/questions.length*100);
      const byDomain={};
      Object.keys(DOMAINS).forEach(d=>{
        const dqs=questions.map((q,i)=>({...q,i})).filter(q=>q.domain===d);
        byDomain[d]={correct:dqs.filter(q=>examAnswerCorrect(answers[q.i],q.ans)).length,total:dqs.length};
      });
      const items=questions.map((q,i)=>({qid:q.id,domain:q.domain,sub:q.sub,correct:examAnswerCorrect(answers[i],q.ans),userAns:answers[i]}));
      onExamComplete({ts:Date.now(),score,correct,total:questions.length,byDomain,date:today(),items});
    }
  },[phase]);

  const fmt=(s)=>`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  const answered=Object.keys(answers).length;
  const progress=pct(answered,65);

  if(phase==='setup'){
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-slate-800 text-xl font-semibold mb-6">Practice Exam</h1>
        <div className="bg-white border border-slate-200 rounded-lg p-5 space-y-4">
          <div className="text-slate-600 text-sm font-medium">DVA-C02 Simulation</div>
          <div className="grid grid-cols-2 gap-3 text-sm">
            <div className="text-slate-400">Questions: <span className="text-slate-700">65</span></div>
            <div className="text-slate-400">Time: <span className="text-slate-700">130 minutes</span></div>
            <div className="text-slate-400">Pass score: <span className="text-emerald-600">72% (720/1000)</span></div>
            <div className="text-slate-400">Format: <span className="text-slate-700">Multiple choice</span></div>
          </div>
          <div className="border-t border-slate-200 pt-3 space-y-1.5 text-xs text-slate-400">
            {Object.entries(DOMAINS).map(([k,d])=>(
              <div key={k} className="flex justify-between">
                <span className={d.color}>{d.label} Architectures</span>
                <span>{d.pct}% (~{Math.round(65*d.pct/100)} questions)</span>
              </div>
            ))}
          </div>
          <button onClick={start} className="bg-indigo-600 text-white text-sm font-semibold px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
            Begin Exam →
          </button>
        </div>
      </div>
    );
  }

  if(phase==='result'){
    const correct=questions.filter((q,i)=>examAnswerCorrect(answers[i],q.ans)).length;
    const score=Math.round(correct/questions.length*100);
    const pass=score>=72;
    const byDomain={};
    Object.keys(DOMAINS).forEach(d=>{
      const dqs=questions.map((q,i)=>({...q,i})).filter(q=>q.domain===d);
      byDomain[d]={correct:dqs.filter(q=>examAnswerCorrect(answers[q.i],q.ans)).length,total:dqs.length};
    });
    return(
      <div className="p-4 md:p-6 max-w-2xl">
        <h1 className="text-slate-800 text-xl font-semibold mb-6">Exam Results</h1>
        <div className="bg-white border border-slate-200 rounded-lg p-5 space-y-5">
          <div>
            <div className={`text-5xl font-semibold mb-1 ${pass?'text-emerald-600':'text-red-400'}`}>{score}%</div>
            <div className={`text-sm ${pass?'text-emerald-600':'text-red-400'}`}>{pass?'PASS — Above 72% threshold':'FAIL — Below 72% threshold'}</div>
            <div className="text-slate-400 text-xs mt-1">{correct} / {questions.length} correct</div>
          </div>
          <div className="space-y-3">
            {Object.entries(byDomain).map(([d,s])=>(
              <div key={d}>
                <div className="flex justify-between text-xs mb-1">
                  <span className={DOMAINS[d].color}>{DOMAINS[d].label}</span>
                  <span className="text-slate-500">{s.correct}/{s.total} ({pct(s.correct,s.total)}%)</span>
                </div>
                <ProgressBar value={s.correct} max={s.total} domain={d}/>
              </div>
            ))}
          </div>
          <button onClick={()=>setPhase('setup')} className="border border-slate-200 text-slate-600 text-sm px-4 py-2 rounded hover:border-slate-400 transition-colors">
            Take Another Exam
          </button>
        </div>
      </div>
    );
  }

  const q=questions[qIdx];
  const d=q?DOMAINS[q.domain]:{color:'text-slate-500',border:'border-slate-200',bg:'bg-white'};

  return(
    <div className="flex flex-col h-screen">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-white sticky top-0">
        <div className="text-sm text-slate-500">Q {qIdx+1}/{questions.length}</div>
        <div className={`text-lg font-semibold ${timeLeft<600?'text-red-400':timeLeft<1800?'text-amber-600':'text-emerald-600'}`}>
          {fmt(timeLeft)}
        </div>
        <div className="flex items-center gap-2">
          <span className="hidden sm:inline text-xs text-slate-400">{answered}/65</span>
          <button onClick={submit} className="text-xs border border-red-400/50 text-red-400 px-3 py-1.5 rounded hover:bg-red-400/10">Submit</button>
        </div>
      </div>

      <div className="flex flex-1 overflow-hidden">
        {/* Question panel */}
        <div className="flex-1 overflow-y-auto p-4 md:p-6">
          <ProgressBar value={answered} max={65} domain={q?.domain} className="mb-5"/>
          {q&&(
            <>
              <div className={`bg-white border ${d.border} rounded-lg p-5 mb-4`}>
                <div className="flex items-center gap-2 mb-3">
                  <Tag domain={q.domain}/><span className="text-slate-400 text-xs">{q.sub}</span>
                  <button onClick={()=>setFlagged(f=>{const n=new Set(f);n.has(qIdx)?n.delete(qIdx):n.add(qIdx);return n;})}
                    className={`ml-auto text-xs ${flagged.has(qIdx)?'text-amber-600':'text-slate-400 hover:text-slate-500'}`}>
                    {flagged.has(qIdx)?'⚑ flagged':'⚐ flag'}
                  </button>
                </div>
                <p className="text-slate-700 text-sm leading-relaxed">{q.q}</p>
              </div>
              <div className="space-y-2">
                {q.opts.map((opt,i)=>(
                  <button key={i} onClick={()=>setAnswers(a=>({...a,[qIdx]:i}))}
                    className={`w-full text-left text-sm px-4 py-3 rounded border transition-colors ${answers[qIdx]===i?'border-emerald-400 text-emerald-600 bg-emerald-50':'border-slate-200 text-slate-600 hover:border-slate-400'}`}>
                    <span className="text-slate-400 mr-2">{String.fromCharCode(65+i)}.</span>{opt}
                  </button>
                ))}
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={()=>setQIdx(i=>Math.max(0,i-1))} disabled={qIdx===0}
                  className="text-sm px-4 py-2 border border-slate-200 text-slate-500 rounded hover:border-slate-400 disabled:opacity-30">← Prev</button>
                <button onClick={()=>setQIdx(i=>Math.min(questions.length-1,i+1))} disabled={qIdx===questions.length-1}
                  className="text-sm px-4 py-2 border border-slate-200 text-slate-500 rounded hover:border-slate-400 disabled:opacity-30">Next →</button>
              </div>
            </>
          )}
        </div>

        {/* Question grid */}
        <div className="hidden md:block w-48 border-l border-slate-200 overflow-y-auto p-3">
          <div className="text-xs text-slate-400 mb-2">Navigator</div>
          <div className="grid grid-cols-5 gap-1">
            {questions.map((_,i)=>(
              <button key={i} onClick={()=>setQIdx(i)}
                className={`text-xs w-full aspect-square rounded flex items-center justify-center transition-colors
                  ${i===qIdx?'bg-indigo-600 text-white':
                    flagged.has(i)?'bg-orange-400/20 text-amber-600 border border-amber-400/40':
                    answers[i]!==undefined?'bg-slate-200 text-slate-600':'bg-white text-slate-400 border border-slate-200'}`}>
                {i+1}
              </button>
            ))}
          </div>
          <div className="mt-3 space-y-1 text-xs text-slate-400">
            <div><span className="inline-block w-3 h-3 bg-green-400 rounded mr-1"/>Current</div>
            <div><span className="inline-block w-3 h-3 bg-slate-200 rounded mr-1"/>Answered</div>
            <div><span className="inline-block w-3 h-3 bg-orange-400/20 border border-amber-400/40 rounded mr-1"/>Flagged</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Analytics ─────────────────────────────────────────────────────────────────
function Analytics({quizHistory,examHistory,flashConf}){
  const[tab,setTab]=useState('summary');
  const[expandedExam,setExpandedExam]=useState(null);

  const qMap=useMemo(()=>{const m={};QUESTIONS.forEach(q=>m[q.id]=q);return m;},[]);

  const domainStats=useMemo(()=>{
    return Object.entries(DOMAINS).map(([key,d])=>{
      const qs=quizHistory.filter(h=>h.domain===key);
      const correct=qs.filter(h=>h.correct).length;
      const subMap={};
      qs.forEach(h=>{
        if(!subMap[h.sub])subMap[h.sub]={correct:0,total:0};
        subMap[h.sub].total++;
        if(h.correct)subMap[h.sub].correct++;
      });
      return{key,label:d.label,color:d.color,border:d.border,bg:d.bg,correct,total:qs.length,pct:d.pct,subs:subMap};
    });
  },[quizHistory]);

  const flashStats=useMemo(()=>{
    const know=flashConf.filter(f=>f.conf==='know').length;
    const sorta=flashConf.filter(f=>f.conf==='sorta').length;
    const nope=flashConf.filter(f=>f.conf==='nope').length;
    return{know,sorta,nope,total:ALL_FLASH.length};
  },[flashConf]);

  const recentExamsSummary=examHistory.slice(-5).reverse();

  const recentQuiz=[...quizHistory].reverse().slice(0,100);
  const recentExams=[...examHistory].reverse();

  return(
    <div className="p-4 md:p-6 space-y-5 max-w-4xl">
      <div className="flex items-center justify-between">
        <h1 className="text-slate-800 text-xl font-semibold">Analytics</h1>
        <div className="flex gap-1 bg-slate-100 rounded-lg p-0.5">
          {[{id:'summary',label:'Summary'},{id:'log',label:'Question Log'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`text-xs font-medium px-3 py-1.5 rounded-md transition-all ${tab===t.id?'bg-white text-slate-800 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {tab==='log'&&(
        <div className="space-y-5">
          {/* Quiz question log */}
          <div className="bg-white border border-slate-200 rounded-xl p-4">
            <div className="text-slate-700 text-sm font-semibold mb-1">Quiz History</div>
            <div className="text-slate-400 text-xs mb-4">{quizHistory.length} total attempts · showing last {recentQuiz.length}</div>
            {recentQuiz.length===0?(
              <div className="text-slate-400 text-sm py-4 text-center">No quiz attempts yet — start a quiz to build your history.</div>
            ):(
              <div className="space-y-2 max-h-[600px] overflow-y-auto pr-1">
                {recentQuiz.map((h,i)=>{
                  const q=qMap[h.qid];
                  return(
                    <div key={i} className={`flex items-start gap-3 p-3 rounded-lg border text-xs ${h.correct?'border-emerald-200 bg-emerald-50/40':'border-red-200 bg-red-50/40'}`}>
                      <span className={`shrink-0 font-bold mt-0.5 ${h.correct?'text-emerald-600':'text-red-400'}`}>{h.correct?'✓':'✗'}</span>
                      <div className="flex-1 min-w-0">
                        <div className="text-slate-700 font-medium leading-snug mb-1">{q?q.q:`Question #${h.qid}`}</div>
                        {q&&!h.correct&&<div className="text-slate-400 leading-snug">Correct: <span className="text-emerald-700 font-medium">{Array.isArray(q.ans)?q.ans.map(a=>q.opts[a]).join(' / '):q.opts[q.ans]}</span></div>}
                      </div>
                      <div className="shrink-0 flex flex-col items-end gap-1">
                        <Tag domain={h.domain}/>
                        <span className="text-slate-300">{new Date(h.ts).toLocaleDateString()}</span>
                      </div>
                    </div>

                })}
              </div>

          {/* Exam attempts with per-question breakdown */}
          <div className="bg-white border border-slate-200 rounded-xl p-4">
            <div className="text-slate-700 text-sm font-semibold mb-1">Practice Exam Attempts</div>
            <div className="text-slate-400 text-xs mb-4">{examHistory.length} total exam{examHistory.length!==1?'s':''} · click to see questions</div>

              <div className="text-slate-400 text-sm py-4 text-center">No practice exams yet.</div>

                    <div key={i} className="border border-slate-200 rounded-lg overflow-hidden">

                                  {q&&!item.correct&&<div className="text-slate-400">Correct: <span className="text-emerald-700 font-medium">{Array.isArray(q.ans)?q.ans.map(a=>q.opts[a]).join(' / '):q.opts[q.ans]}</span></div>}
                                </div>
                                <Tag domain={item.domain}/>
                              </div>
                            );
                          })}

                      ):(
                        <div className="border-t border-slate-100 px-4 py-3 text-xs text-slate-400">Per-question breakdown only available for exams taken after this update.</div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {tab==='summary'&&<>
      {/* Domain breakdown */}
